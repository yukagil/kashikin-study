理由に当てはまるものはどれか、を問うています。当てはまるのはａとｃなので、答えは②「ａｃ」です。\nａは、個人で申請する人は貸付けの仕事を３年以上やった経験が必要で、これがないと登録を断られます。ｃは、お客さんを守るための社内ルールをきちんと作っていないと、これも登録を断られます。\nｂは、経験者は営業所ごとに１人いればよく、何人も必要というわけではないので誤りです。ｄは、法人のお金の余力（純資産）は5,000万円以上あればよく、１億円あれば十分クリアしているので断る理由になりません。\n数字（３年・5,000万円）はそのまま覚えておくと得点しやすいです。","19-3":"この問題は、貸金業者が届出をするとき「あらかじめ（事前）」なのか「あとから（事後）」なのかを問うています。正しいのはａとｄなので、答えは②「ａｄ」です。\nａの営業所の場所を変えるときは、変える前に届け出る事前届出でよいです。ｄの貸金業以外の別事業の種類を変えたときは、変えてから２週間以内に届け出る事後届出です。\nｂのホームページアドレスの変更は「あとから２週間以内」でよいのに、「あらかじめ」と書いてあるので誤りです。ｃの業務の種類・方法の変更も事後届出でよいのに、事前と扱っている点が誤りです。\nコツは、『お店の場所は事前、それ以外の細かい変更は事後が多い』とざっくり押さえることです。","19-4":"この問題は、貸金業を正しく運営するための決まり（監督指針など）について、正しい記述の数を問うています。ａ〜ｄすべて正しいので、答えは④「４個」です。\nａは、信用情報を返済能力の調査以外に使わないようにする仕組みを作る義務があること、ｂは、業務を外部に委託したら委託先をきちんと監督すること、ｃは、ノルマばかり重視せず法令遵守を大切にしているか、ｄは、お客さんの情報管理を内部監査などでチェックしているか、いずれも監督指針や法律に書かれているとおりの正しい内容です。\nこの手の『全部正しい』問題は、どこかに引っかけがないか一つずつ丁寧に読むのがコツです。","19-5":"この問題は、お客さんからの苦情への対応体制について、正しい記述の数を問うています。正しいのはａ・ｂ・ｄの３つなので、答えは③「３個」です。\nａは電話・手紙・メールなど受付手段を増やすこと、ｂは苦情を単なる事務処理で終わらせず、話をよく聞いて納得を目指すこと、ｄは対応結果を記録・分析して再発防止に活かすこと、いずれも正しい内容です。\nｃは、軽い案件まで「すべて直ちに」内部監査部門や経営陣に報告する体制までは求められていないので誤りです。求められるのは重要な案件をきちんと報告する体制です。\n『すべて』『必ず』『直ちに』のような言い切りは、引っかけのサインとして注意しましょう。","19-6":"この問題は、貸金業務取扱主任者と従業者名簿のルールを問うています。正しいのは④で、従業者名簿は最後に書き込んだ日から10年間保存する義務があります。\n①は、主任者は営業時間中ずっとその場に居続ける必要まではなく、常識的に見て常時勤務しているといえる実態があれば足りるので誤りです。②は、主任者は貸金業の仕事をする人50人につき1人でよく、50人ちょうどなら1人で足りるのに「2人以上」としている点が誤りです。③は、広告だけの業務や対面しない業務の人でも従業者名簿に載る対象になり得るのに、載らないとしている点が誤りです。\n『10年保存』という数字はよく問われるので覚えておきましょう。","19-7":"この問題は、禁止されている行為が『行政処分だけ』か『刑事罰まである』かを問うています。正しいのはａとｂなので、答えは①「ａｂ」です。\nａの保証人になろうとする人へ誤解させる説明は、行政処分の対象にはなりますが刑事罰の直接の対象ではありません。ｂの暴力団員などを業務に使うことは、行政処分に加えて刑事罰（懲役・罰金）まである重い違反です。\nｃの断定的判断の提供は行政処分の対象ですが、すぐ刑事罰になるわけではないので誤り。ｄの証明書を持たせず働かせることも行政処分の対象で、すぐ刑事罰にはならないので誤りです。\n『暴力団関係は特に重い（刑事罰あり）』とイメージで覚えると解きやすいです。","19-8":"この問題は、お金を貸す前の返済能力の調査で、信用情報機関の情報を必ず使わないといけない場面はどれかを問うています。正しいのは④です。\n④は、極度方式貸付け（あらかじめ決めた枠内で何度も借りられる方式）の1回1回では、基本契約を結ぶときに信用情報で調べていれば足り、毎回は不要なので正しいです。\n①は、個人事業者も個人のお客さんに含まれるので信用情報の調査が必要です。②は、保証人についても信用情報の調査が必要です。③は、いったん減らした枠を元の額まで戻すのは新たに枠を設けるのと同じような影響があるので、信用情報の調査が必要です。\n『枠を増やす・戻すときは要調査』と押さえておきましょう。","19-9":"この問題は、借入総額の規制（総量規制）の対象から外れる『除外契約』に当てはまるものはどれかを問うています。正しいのはｂとｄなので、答えは③「ｂｄ」です。\nｂは、上場している株や国債などを担保にして、貸す額がその時価の範囲内なら除外契約にあたります。ｄは、売る予定の不動産の代金で返す貸付けで、返済能力を超えず生活にも支障がない場合は除外契約にあたります。\nｱの住宅資金のつなぎ融資は除外契約にあたる類型なのに「あたらない」としている点が誤り。ｃは、担保が本人以外の人の不動産（物上保証）でも、返済能力を超えなければ除外契約になり得るので誤りです。\n除外契約は『しっかりした担保や当てがあるもの』とイメージすると覚えやすいです。","19-10":"この問題は、極度方式基本契約が借りすぎ（基準額超過）になっていないか調べる手続きのルールを問うています。正しいのは②で、調査が必要な場合は、所定の期間の末日から3週間以内に信用情報機関へ個人信用情報を依頼しなければなりません。\n①は、調査が必要になるのは『期間内の貸付け合計が5万円超』かつ『期間末の残高合計が10万円超』の両方を満たすときで、残高の条件を無視している点が誤りです。③は、枠を減らす措置をとっても、その後も3か月以内ごとの調査は続ける必要があるので誤り。④は、貸付け停止を解除したとき『1か月以内』という一律の期限はないので誤りです。\n『5万円超かつ10万円超』『3週間以内』の数字が要点です。","19-11":"この問題は、契約を結んだときに渡す書面（契約締結時の書面）に何を書くかを問うています。正しいのは①です。\n①は、極度方式基本契約の書面には、枠いっぱいを1回借りたと仮定するなど一定の仮定を置き、その仮定に基づく返済総額・返済期間・回数と、その仮定自体を書かなければならず、正しい内容です。\n②は、個別の契約の書面は基本契約の番号を書くだけで省略はできないので誤り。③は、取引状況の書面を渡せば個別契約ごとの記載を無条件に省略できるわけではないので誤り。④は、枠の引下げも引上げも書面の記載事項の変更にあたり、そのたびに書面を渡す必要があるので誤りです。\n書面は『変更のたびに渡し直す』が基本と覚えましょう。","19-12":"この問題は、契約締結時の書面に書いた内容が変わったとき、どうするかを問うています。正しいのは③です。\n③は、保証人がいる場合に返済期日や返済金額が変わったときは、借りた本人だけでなく保証人にも新しい書面を渡さなければならず、正しい内容です。\n①は、貸金業者側の商号や住所が変わっただけでは、相手に書面を渡し直す必要はないので誤り。②は、利率の引下げも重要な変更なので新しい書面を渡す必要があり、渡さなくてよいわけではないので誤り。④は、変わった部分だけでなく、記載事項全体を書いた書面を渡す必要があるので誤りです。\n『保証人にも渡す』『変更後は全体を書く』がポイントです。","19-13":"この問題は、貸金業者が備える帳簿のルールを問うています。正しいのはｂとｄなので、答えは③「ｂｄ」です。\nｂは、契約締結時の書面の写しを保存すれば、帳簿の一部の記載に代えてよいので正しいです。ｄは、帳簿の閲覧・写し請求は、権利行使の調査目的でないことが明らかな場合を除いて、拒めないので正しいです。\nｱは、代理店でも営業所にあたれば帳簿を備える必要があるのに「不要」としている点が誤り。ｃは、保証人や弁済した人も、自分が関係する部分については本人の承諾なしに閲覧・写しを請求できるのに、「債務者の承諾が必要」としている点が誤りです。\n『関係者は自分の分を自分で見られる』と押さえましょう。","19-14":"この問題は、取立て行為の規制を問うています。正しいのは④で、監督指針上、しつこく繰り返す電話・電報・メール・訪問などは、私生活や仕事の平穏を害するおそれが大きいとされています。\n①は、電話や訪問が禁止される時間帯は『午後9時から午前8時まで』なのに、「午後8時から午前9時まで」とずらしている点が誤りです。②は、債務者以外の人からの弁済受領そのものが一律禁止というわけではないので誤り。③は、家族に知られないよう頼まれている場合はプライバシー侵害のおそれが大きいのですが、頼まれていなくても一律に該当するとまではいえないので誤りです。\n時間帯『午後9時〜午前8時』の数字は必ず覚えましょう。","19-15":"この問題は、貸金業者がしなければならない『開始等の届出』にあたるものはどれかを問うています。正しいのはｂとｃなので、答えは③「ｂｃ」です。\nｂの業務を外部に委託し始めた・やめたときや、ｃの貸金業協会に入った・抜けたときは、いずれも届出が必要です。\nｱの貸付債権の譲渡・譲受けそのものは、この開始等の届出の対象ではなく別の枠組みで扱われるので誤り。ｄは、届出の期限は該当した日から『2週間以内』なのに「30日以内」としている点が誤りです。\n届出は『2週間以内』が基本の期限、と覚えておくと役立ちます。","19-16":"この問題は、行政庁による貸金業者の監督のルールを問うています。正しいのは②で、取立て制限者に債権を譲渡した際、その手続きをした取締役が相手が取立て制限者だと知っていた場合、行政庁はその取締役の解任を命じることができます。\n①は、法令違反がなくても、業務の適正確保のため必要なら立入検査などができるので誤り。③は、暴力団員などと知りながら保証契約を結ぶのは重い違反で、業務停止だけでなく登録取消しの対象にもなり得るので誤り。④は、業務改善命令の内容を決めるときは、自主的な改善の取組みなどの事情も考慮されるのに、「考慮しない」としている点が誤りです。\n『重い違反は登録取消しもあり得る』と押さえましょう。","19-17":"この問題は、指定信用情報機関への情報提供や同意のルールを問うています。正しいのはｃとｄなので、答えは④「ｃｄ」です。\nｃは、調査のために取った信用情報を勧誘に使い回すことなどは、目的外使用にあたるので注意が必要、という正しい内容です。ｄは、情報提供を依頼する際の同意は書面か電磁的方法で取る必要があり、口頭だけではダメなので正しいです。\nｱは、情報提供のタイミングは『基本契約締結時に遅滞なく』ではなく、貸付けの都度など政令等で定める時なので誤り。ｂは、同意記録の保存期間が『10年間』というのは正確でないので誤りです。\n『同意は口頭ではダメ』『調査目的以外に使い回さない』が要点です。","19-18":"この問題は、金利の規制（出資法・利息制限法）を問うています。正しいのは④で、営業的な金銭の貸し借りで、遅れたときの賠償額の予定が元本に対し年20％を超える部分は、利息制限法で無効になります。\n①は、元本50万円に年20％は出資法の上限（年20％）以内なので刑事罰にはならず、誤り。②は、特約上限利率が定められなかった場合の扱いを踏まえると、年10％の保証料がすぐ刑事罰対象とはいえないので誤り。③は、媒介手数料の超過部分が無効になる説明として、本肢の内容は正確さを欠くので誤りです。\n出資法の上限『年20％』はとても大事な数字です。","19-19":"この問題は、金融ADR（トラブルを裁判以外で解決する仕組み）について、間違っているものを選ぶ問題です。間違いは②です。\n②は、指定紛争解決機関の名称は、契約締結時の書面だけでなく契約締結前の書面にも表示しなければならないのに、「前の書面には不要」としているので誤りです。\n①は、協会に入っていない貸金業者も指定紛争解決機関と契約を結ぶ措置をとり、その相手を公表する必要があるので正しい。③は、訴訟中の件で紛争解決手続が始まったら、その旨などを機関に報告する必要があり正しい。④は、機関からの手続応諾の求めを正当な理由なく拒めないので正しいです。\n『前の書面にも名称を書く』が引っかけの急所です。","19-20":"この問題は、年収証明書（収入を証明する書類）を取らなければならない場面について、間違っているものを選ぶ問題です。間違いは③です。\n③は、他社の残高がすべて除外契約に係るものなら、それは借りすぎ判定の計算から外れるので、一律に年収証明書が必要とはいえないのに「必要」としている点が誤りです。\n①は、貸す額40万円＋他社残高70万円＝110万円で100万円を超えるので年収証明書が必要、正しい。②は、2年前の源泉徴収票では古く、改めて取る必要があるので正しい。④は、合算額が100万円を超えると知った日から2か月以内に取る必要があり正しいです。\n『100万円超』『2か月以内』の数字と、除外契約は計算から外れる点を押さえましょう。","19-21":"この問題は、借入残高を段階的に減らすための借換え（総量規制の例外）の要件として、当てはまらないものを選ぶ問題です。当てはまらないのは①です。\n①は、この借換えの要件は『毎月の返済負担が今より増えないこと』であって、将来支払う返済金額の『合計額』を比べる要件は定められていないので、要件として誤りです。\n②の1か月の負担が増えないこと、③の利率が今より上がらないこと（複数あれば加重平均利率と比較）、④の担保や保証人を新たに増やさないことは、いずれも本当の要件なので正しいです。\n借換えの要件は『毎月の負担・利率・担保保証を今より重くしない』と覚えると整理しやすいです。","19-22":"この問題は、貸付条件の広告のルールについて、間違っているものを選ぶ問題です。間違いは②です。\n②は、登録番号は括弧書き（更新回数を示す部分）も含めて省略せずに表示しなければならないのに、「省略できる」としている点が誤りです。\n①は、広告に載せる電話番号に携帯電話番号は使えないので正しい。③は、担保が必要な場合はその担保に関する事項を表示する必要があり正しい。④は、景品表示法や屋外広告物法の条例など他の法令に違反する広告は禁止されるので正しいです。\n『登録番号は括弧書きまで全部書く』が引っかけの急所です。","19-23":"この問題は、契約を結ぶ前に渡す書面（契約締結前の書面）について、間違っているものを選ぶ問題です。間違いは①です。\n①は、契約締結前の書面は内容をよく検討できる余裕をもって渡すべきとされますが、『少なくとも契約締結の前日までに』という一律の期限が決まっているわけではないので、監督指針の内容として誤りです。\n②は、契約前なので契約年月日や相手の氏名・住所は記載事項に含まれず正しい。③は、8ポイント以上の文字で書く必要があり正しい。④は、契約前に記載事項が変わったら書面を渡し直す必要があり正しいです。\n『前日まで』のような具体的すぎる期限には注意しましょう。","19-24":"この問題は、弁済を受けたときに渡す受取証書のルールについて、間違っているものを選ぶ問題です。間違いは④です。\n④は、全額返済のときも通常の受取証書に全部弁済の旨などを書けば足り、これとは別に『完済証明書』という書面を必ず渡す法律上の義務はないので誤りです。\n①は、窓口で弁済を受けたら直ちに受取証書を渡す必要があり正しい。②は、口座振込みの場合は請求があったときに渡せばよく正しい。③は、第三者が返済した場合は受取証書に債務者と弁済者の両方の氏名を書く必要があり正しいです。\n『完済証明書は別途義務ではない』が引っかけの急所です。","19-25":"この問題は、債権譲渡等の規制について、間違っているものを選ぶ問題です。間違いは①です。\n①は、譲受人に通知すべき事項の説明として、『譲受人が貸金業者である場合を除く』という限定など、記述内容が法律の定めと合っていないので誤りです。\n②は、債権を譲り受けた人にも帳簿の備付け・保存義務があるので正しい。③は、債権譲渡の際に譲受人との責任分担や債務者保護の規定を整えることが監督指針で求められており正しい。④は、債権の管理回収を業として行う場合に弁護士法などとの抵触を確認しているかが着眼点とされ正しいです。\n通知に関する細かい限定表現には注意して読みましょう。","19-26":"この問題は、複数の貸付契約があるときの利息制限法の上限利率について、間違っているものを選ぶ問題です。間違いは①です。\n利息制限法の上限は、元本10万円未満は年20％、10万円以上100万円未満は年18％、100万円以上は年15％です。①は、残存元本15万円＋新規90万円＝105万円で年15％が基準になる点は正しいものの、無効になる範囲や対象契約の扱いの説明が制限法の考え方と合わないので誤りです。\n②は合計28万円で年18％区分、超過部分のみ無効で正しい。③④は同時に結んだ複数契約は元本を合算して上限を判定する考え方に沿っており正しいです。\n上限利率の3段階（20％・18％・15％）は必ず覚えましょう。","19-27":"この問題は、名前は利息でなくても実質は利息とみなされる『みなし利息』について、間違っているものを選ぶ問題です。間違いは②です。\n②は、お客さんの都合（紛失など）による契約書面の再発行手数料は、実費相当のものなので利息とはみなされないのに、「みなされる」としている点が誤りです。\n①は、ATM利用料は所定の上限（少額取引につき110円など）の範囲内なら利息とみなされず正しい。③は、契約書に貼る印紙代（顧客負担分）は利息とみなされず正しい。④は、カードの発行手数料は原則として利息とみなされるので正しいです。\n『実費・お客さん都合のものはみなし利息にならない』と押さえましょう。","19-28":"この問題は、判断能力が十分でない人の行為能力について、正しいものを選ぶ問題です。正しいのは③です。\n③は、被補助人は、家庭裁判所が『同意が必要』と決めた特定の行為以外は、単独で有効にできるので正しいです。\n①は、成年被後見人の行為は、後見人が同意していても（日用品の購入など日常の行為を除き）取り消せるので誤り。②は、相続の承認・放棄は重要な行為で、被保佐人は保佐人の同意が必要なので誤り。④は、営業を許された未成年者はその営業に関してだけ成年者と同じ扱いで、すべての行為ではないので誤りです。\n保護の度合いは『後見＞保佐＞補助』の順に強い、と整理すると解きやすいです。","19-29":"この問題は、無効と取消しのルールについて、正しいものを選ぶ問題です。正しいのは④です。\n④は、取り消された行為で給付を受けた制限行為能力者などは、現に残っている利益（現存利益）の範囲で返せばよいので正しいです。\n①は、無効な行為は追認しても原則有効にならず、新たな行為をしたとみなされるだけなので誤り。②は、成年被後見人は法定代理人の同意があっても自分では追認できないので誤り。③は、詐欺・強迫による取消しは、行為の時にさかのぼって無効になる（遡及効）のに、「将来に向かってのみ」としている点が誤りです。\n『取消しはさかのぼる』『制限行為能力者は現存利益だけ返す』を押さえましょう。","19-30":"この問題は、時効（一定期間で権利が消える等）のルールについて、正しいものを選ぶ問題です。正しいのは④です。\n④は、時効が完成したことを知らずに債務を認めた（承認した）場合でも、そのときから新たに時効が進み始めるので正しいです。\n①は、債権の時効は『権利行使できると知った時から5年』または『権利行使できる時から10年』の早い方で、一律5年ではないので誤り。②は、時効は当事者が援用（主張）しないと裁判所が勝手に認めることはできないので誤り。③は、強制執行が取下げで終わっても、その終了時から6か月は時効の完成が猶予されるので誤りです。\n『5年・10年』『援用が必要』『取下げでも6か月猶予』が要点です。","19-31":"この問題は、遅延損害金（返済が遅れたときの賠償）を、いくらの利率で請求できるかを問うています。正しいのは①です。\n遅延損害金の定めがない場合、金銭の遅れによる賠償は原則として約定利率で計算し、約定利率が法定利率より高ければ約定利率を使います。本問は約定が年15％なので、年15％で請求でき、①が正しいです。\n②は、約定利率と法定利率を足すという扱いは根拠がなく誤り。③は、約定利率が法定より高い本問で法定利率のみに限る点が誤り。④は、金銭債務では損害の証明は不要で当然に請求できるので誤りです。\n『金銭債務は損害の証明不要』『約定利率が高ければそれを使う』を押さえましょう。","19-32":"この問題は、保証・連帯保証のルールについて、正しいものを選ぶ問題です。正しいのは③です。\n③は、保証人が複数いる普通の保証では各自が頭割りの額だけ負う『分別の利益』がありますが、連帯保証人にはこれがなく、各自が全額を負うので正しいです。\n①は、保証契約は連帯保証も含め書面か電磁的記録がないと効力が生じず、口頭だけでは成立しないので誤り。②は、契約後に主債務が重くなっても保証人の負担は重くならないので誤り。④は、連帯保証人には催告の抗弁権・検索の抗弁権がなく、まず主債務者へと求められないので誤りです。\n『連帯保証人には分別の利益も抗弁権もない』と覚えましょう。","19-33":"この問題は、定型約款（不特定多数向けの決まった契約条件）のルールについて、正しいものを選ぶ問題です。正しいのは①です。\n①は、定型取引の定義（特定の者が不特定多数を相手に行い、内容が画一的なのが双方に合理的な取引）としてそのとおり正しいです。\n②は、準備した側は、合意前または合意後に相手から請求があったときに遅滞なく内容を示せば足り、必ず合意までに示す義務まではないので誤り。③は、要件を満たせば個別条項を知らなくても合意したとみなされる（不当条項等は除く）ので誤り。④は、相手の一般の利益に適合する場合のほか、合理的な変更なら個別合意なしで変更できるので誤りです。\n定義そのものを問う①が正解、という素直な問題です。","19-34":"この問題は、相続のルールについて、正しいものを選ぶ問題です。正しいのは④です。\n④は、相続人がいるか明らかでないとき、相続財産は法人（相続財産法人）として扱われるので正しいです。\n①は、代襲相続（子の子が代わりに相続する）は死亡・欠格・廃除の場合には起きますが、相続放棄をした人の子には起きないので誤り。②は、配偶者と直系尊属（親など）が相続人のとき、配偶者の相続分は3分の2なので、4分の3としている点が誤り。③は、限定承認は共同相続人全員でまとめて行う必要があり、個別にはできないので誤りです。\n『放棄には代襲なし』『限定承認は全員で』が引っかけの急所です。","19-35":"この問題は、株式会社の取締役・取締役会のルール（会社法）について、正しいものを選ぶ問題です。正しいのは②です。\n②は、代表取締役や業務執行取締役は、3か月に1回以上、自分の職務執行の状況を取締役会に報告しなければならないので正しいです。\n①は、取締役の任期は原則2年以内ですが、非公開会社では定款で最長10年まで伸ばせるので誤り。③は、多額の借財の決定は取締役会が自ら決める事項で、取締役個人に任せられないので誤り。④は、悪意や重過失で第三者に損害を与えた取締役は、会社とは別に自分自身も賠償責任を負うので誤りです。\n『3か月に1回報告』『多額の借財は取締役会マター』を押さえましょう。","19-36":"この問題は、犯罪収益移転防止法（犯収法）の取引時確認などについて、正しいものを選ぶ問題です。正しいのは④です。\n④は、特定事業者は自らの取引のリスクを調べた書面などを作り、必要に応じて見直し・変更するよう努める義務があるので正しいです。\n①は、金銭貸付けの契約に係る保証契約は原則として特定取引に含まれないので誤り。②は、会社の代表者が会社のために取引するときは、会社の確認に加えて代表者本人の確認も必要なので誤り。③は、記録の保存は取引終了後7年間で、「直ちに作成」など細部が正確でないので誤りです。\n保存期間『7年』はよく問われる数字です。","19-37":"この問題は、意思表示のルールについて、間違っているものを選ぶ問題です。間違いは①です。\n①は、心裡留保（本心でないと知りながらする意思表示）は原則として有効で、相手が本心でないと知っていた・知り得た場合に限り無効になります。原則を「無効」としている点が誤りです。\n②は、相手と通じたウソの意思表示（虚偽表示）は無効だが善意の第三者には対抗できず正しい。③は、解除の意思表示は発信後に表意者が死亡・意思能力喪失などになっても効力を妨げられず正しい。④は、相手が分からない等のときは公示による意思表示ができるので正しいです。\n『心裡留保は原則有効』が引っかけの急所です。","19-38":"この問題は、代理のルールについて、間違っているものを選ぶ問題です。間違いは①です。\n①は、代理人が『本人のために』と示さずにした意思表示でも、相手がそのことを知っていた・知り得たときは本人に直接効力が生じ、追認は不要なのに、「追認しなければ効力が生じない」としている点が誤りです。\n②は、委任による代理人は本人の許諾かやむを得ない事由がないと復代理人を選べず正しい。③は、法定代理人はやむを得ない事由があれば選任・監督の責任だけを負い正しい。④は、代理権授与表示による表見代理の要件どおりで、相手に悪意・過失があれば本人は責任を負わず正しいです。\n『相手が知っていれば顕名なしでも本人に効果』を押さえましょう。","19-39":"この問題は、期限の利益（返済期限までは返さなくてよい利益）を失う場合について、間違っているものを選ぶ問題です。間違いは③です。\n③は、利息の支払を1回遅れただけで当然に期限の利益を失うわけではなく、そうなるには特約（期限の利益喪失約款）が必要なので誤りです。\n①は、債務者が自分で担保を滅失させたときは期限の利益を主張できず正しい。②は、破産手続開始の決定を受けたときも主張できず正しい。④は、期限の利益は債務者のためのものと推定され、放棄して期限前に返済できるので正しいです。\n『利息1回の遅れで当然喪失、には特約が必要』が急所です。","19-40":"この問題は、抵当権のルールについて、間違っているものを選ぶ問題です。間違いは②です。\n②は、抵当権には随伴性があり、被担保債権が譲渡されれば特約がなくても抵当権も当然に一緒に移るのに、「特約がなければ移らない」としている点が誤りです。\n①は、抵当権者は賃料債権に物上代位して差し押さえ回収でき正しい。③は、主債務者でない保証人が不動産を譲り受けた場合は抵当権消滅請求ができ、本肢は『できない』としており正しい（保証人でも第三取得者として請求可という関係の整理）。④は、後順位抵当権者がいる場合、利息・遅延損害金は通算して満期後2年分に制限され正しいです。\n『抵当権は債権に付いて回る（随伴性）』を押さえましょう。","19-41":"この問題は、金銭消費貸借契約のルールについて、間違っているものを選ぶ問題です。間違いは②です。\n②は、利息は特約がなければ請求できず、この契約は原則として無利息なのに、「特約がなくても法定利息を請求できる」としている点が誤りです。\n①は、受け取って成立する要物契約と、書面による諾成的契約の両方の成立要件を正しく説明しており正しい。③は、返還時期を定めなかったときは相当の期間を定めて催告でき正しい。④は、金銭債務の遅れは不可抗力を言い訳にできず、期限到来時から遅滞責任を負うので正しいです。\n『利息は特約がないと取れない』が引っかけの急所です。","19-42":"この問題は、民事執行法のルールについて、間違っているものを選ぶ問題です。間違いは③です。\n③は、債権執行の差押命令の効力は、第三債務者（例えば給料を払う勤務先）に届いた時に生じるのに、「債務者に届いた時」としている点が誤りです。\n①は、強制執行は原則として執行文付きの債務名義の正本で行うが、少額訴訟の確定判決等は執行文なしでできる例外があり正しい。②は、金銭債権などへの強制執行は執行裁判所の差押命令で始まり正しい。④は、給与債権は原則4分の3（政令の額を超える場合はその額）が差押禁止で正しいです。\n『差押えの効力は第三債務者への送達時』が急所です。","19-43":"この問題は、個人情報保護法について、正しいものを選ぶ問題です。正しいのは④です。\n④は、業務で扱った個人情報データベース等を、不正な利益を図る目的で提供・盗用する行為は刑事罰（不正提供罪）の対象になるので正しいです。\n①は、取得状況から利用目的が明らかなら、改めて通知・公表は不要なので誤り。②は、事業を引き継いで得た個人情報は、引き継ぐ前の利用目的の範囲を超えて使えないので誤り。③は、本人への通知・公表で足りるのは関連性のある範囲内の変更で、範囲を超える変更には原則本人の同意が必要なので誤りです。\n『不正提供・盗用は刑事罰』を押さえましょう。","19-44":"この問題は、消費者契約法について、正しいものを選ぶ問題です。正しいのは②です。\n②は、消費者が後見・保佐・補助開始の審判を受けたことだけを理由に事業者へ解除権を与える条項（消費者が対価を提供する契約を除く）は無効なので正しいです。\n①は、消費者契約法に一般的なクーリング・オフの規定はなく、それは特定商取引法など別の法律の制度なので誤り。③は、不実告知で誤認して結んだ契約は無効ではなく『取り消せる』だけなので誤り。④は、解約損害賠償の予定は平均的損害を超える部分だけが無効で、条項全体が無効ではないので誤りです。\n『取り消せる（無効ではない）』『超える部分だけ無効』が急所です。","19-45":"この問題は、日本貸金業協会の紛争解決等業務の規則について、正しいものを選ぶ問題です。正しいのは②です。\n②は、苦情処理手続が始まった件で当事者間で直接交渉したら、協会員は交渉の日時・場所・手法・内容などを苦情受付課に報告しなければならないので正しいです。\n①は、苦情処理の申立ては個人に限られず法人等も対象になり得るので誤り。③は、紛争解決手続は原則非公開なのに「公開」としている点が誤り。④は、特別調停案について協会員は原則受諾義務を負いますが、本肢の例外条件が規則の定めと違うので誤りです。\n『紛争解決手続は原則非公開』を押さえましょう。","19-46":"この問題は、個人情報の漏えい等の報告について、間違っているものを選ぶ問題です。間違いは①です。\n①は、不正利用で財産的被害が生じるおそれがある漏えい等は、人数にかかわらず報告対象になるのに、「1,000人を超えなければ報告不要」としている点が誤りです。\n②は、高度な暗号化などの措置があれば報告対象から外れ得るので正しい。③は、報告対象事態では原則として本人への通知義務があり、困難なら代替措置で足りるので正しい。④は、委員会への報告はその時点で把握している事項を速やかに報告すれば足りる（速報・確報の仕組み）ので正しいです。\n『財産的被害のおそれは人数に関係なく報告』が急所です。","19-47":"この問題は、日本貸金業協会の貸付自粛対応の規則について、間違っているものを選ぶ問題です。間違いは③です。\n③は、貸付自粛情報は、申告者や本人が撤回・取消しをしなくても、一定の登録期間の経過などで抹消され得るのに、「撤回・取消ししない限り抹消されない」としている点が誤りです。\n①は、配偶者や二親等内の親族による申告は、所在不明・生命身体財産保護の必要・同意取得困難の要件をすべて満たせば認められ正しい。②は、本人はいつでも自分に関する申告を取り消せて正しい。④は、貸付自粛情報を受けた協会員は新規貸付けをしない措置を講ずるよう努める必要があり正しいです。\n『一定期間で抹消され得る』が急所です。","19-48":"この問題は、損益計算書から経常利益を計算する問題です。正しいのは③の580百万円です。\nまず営業利益を出します。売上高2,000－売上原価1,000－販管費400＝600百万円。次に経常利益は、これに営業外収益80を足し、営業外費用100を引いて、600＋80－100＝580百万円になります。\n注意点は、特別利益40と特別損失60は経常利益の計算には入れないことです。これらは経常利益の次の段階（税引前当期純利益）で使う項目です。\n『経常利益までは営業外まで、特別項目はその先』という順番を覚えると計算を間違えにくくなります。","19-49":"この問題は、キャッシュ・フロー計算書のどの区分に入るかを問うています。正しいのは②です。\n②は、減価償却費のように、損益計算書に載っているが実際のお金の増減を伴わない項目は、間接法の営業活動の区分で調整項目として掲記されるので正しいです。\n①の長期借入れの収入・返済の支出は財務活動なので誤り。③の社債の償還の支出・株式発行の収入も財務活動なので誤り。④の貸付けの支出・貸付金回収の収入は投資活動なので誤りです。\n『借入れ・社債・株式はお金の調達＝財務活動』『貸付け・回収は投資活動』とグループで覚えると整理しやすいです。","19-50":"この問題は、貸借対照表の区分について、間違っているものを選ぶ問題です。間違いは①です。\n①は、資産の部の大きな区分は『流動資産・固定資産・繰延資産』であり、『投資その他の資産』は固定資産の中の一部分（中区分）にすぎません。大区分に「投資その他の資産」を並べている点が誤りです。\n②は、1年内に期限が来ない預金を除く現金・預金は流動資産で正しい。③は、社債は固定負債で正しい。④は、株式会社の純資産の部は株主資本・評価換算差額等・株式引受権・新株予約権に区分され正しいです。\n『資産の大区分は流動・固定・繰延の3つ』を押さえましょう。","20-1":"この問題は、貸金業法で使われる言葉の意味が正しく説明できているかを問うています。正しいのはａだけなので、答えは①(1個)です。\nａは正解です。運送業者が仕事のついでにお金を貸すようなものは「貸金業」には入りません。だから「含まれない」で合っています。\nｂは間違いです。「債務者等」には、お金を借りた人や借りていた人だけでなく、保証人や物上保証人(自分の財産を担保に出した人)も含まれます。保証人を外している点が誤りです。\nｃも間違いです。「貸付けの契約」には、その貸付けにくっついてくる保証契約も含まれます。「含まれない」としたのが誤りです。\nｄも間違いです。住宅資金の貸付けには、家を建てる・買うだけでなく、家を直す(改良する)ためのお金も含まれます。\n覚え方のコツは、法律の言葉は「広く含める」方向で作られていることが多い、と押さえておくことです。","20-2":"この問題は、貸金業の登録のルールを正しく理解しているかを問うています。正しい組み合わせはｂとｄなので、答えは④です。\nｂは正解です。登録を更新したいときは、期限が切れる日の2か月前までに申請しなければなりません。\nｄも正解です。登録換え(別の役所の管轄に移す手続き)を申請するときは、今登録している役所を経由して申請します。\nａは間違いです。登録の有効期間は「3年」で、2年ではありません。ここは数字のひっかけです。\nｃも間違いです。登録換えを申請しただけではまだ新しい場所で営業はできません。新しい登録が済むまでは前の登録が効いているだけです。\n数字の「3年」と「更新は2か月前まで」はセットで覚えておくと安心です。","20-3":"この問題は、貸金業の登録を断られる理由(登録拒否事由)に当てはまるかを問うています。正しい組み合わせはａとｄなので、答えは②です。\nａは正解です。心や体の障害で貸金業の仕事をきちんとできない人が役員にいると、登録を断られます。\nｄも正解です。過去に監督処分で登録を取り消された会社の、取消し当時の役員だった人で、まだ5年たっていない人がいると断られます。\nｂは間違いです。罰金刑で問題になるのは、貸金業法や出資法、暴力団関係など特定の法律違反に限られます。道路交通法違反の罰金は含まれません。\nｃも間違いです。破産しても「復権」(法律上の権利が元に戻ること)を得た人は問題ありません。断られるのは復権していない人です。\n「復権していればOK」「道交法の罰金は関係ない」がポイントです。","20-4":"この問題は、貸金業者が届け出なければならない変更事項を問うています。正しい組み合わせはａとｃなので、答えは②です。\nａは正解です。他にやっている事業の種類を変えたときは、その日から2週間以内に登録した役所へ届け出ます。\nｃも正解です。業務の種類ややり方を変えたときも、同じく2週間以内に届け出ます。\nｂとｄは、それ自体は届出が必要な事項ですが、この問題の「正しい組み合わせ」には入りません。ｂのメールアドレスやｄの営業所の名称・所在地は、ａ・ｃとは扱いの区分が違うため、正解の組み合わせから外れています。\n「変更は2週間以内に届け出る」という基本の期限をまず押さえましょう。","20-5":"この問題は、監督指針が示す「よい内部監査のあり方」を問うています。正しい組み合わせはｃとｄなので、答えは④です。\nｃは正解です。社内の内部監査の代わりに外部の監査を使うときは、目的をはっきり伝え、その結果を業務改善に生かす体制が必要です。\nｄも正解です。一人でやっている個人の貸金業者が自己チェックをするときは、チェックリストを使って項目を決めるなど、きちんとした体制が求められます。\nａは間違いです。内部監査の部門は、チェックされる側の営業部門から独立していなければなりません。営業の指揮命令の下に置くのは不適切です。\nｂも間違いです。事業計画を作るのは経営陣などの仕事で、監査部門が主導して作ると、監査の独立性が保てなくなります。\n「監査する人は、される側から独立している」が大原則です。","20-6":"この問題は、貸金業務取扱主任者(店ごとに置く責任者)の制度を問うています。正しい組み合わせはａとｂなので、答えは①です。\nａは正解です。営業所ごとに、そこで働く人の数に対して主任者を50分の1以上の割合で置かなければなりません。\nｂも正解です。主任者はその営業所にいつも勤務している人で、しかも他の営業所の主任者として登録されたままではいけません。\nｃは間違いです。契約時に渡す書面(17条書面)に、主任者の名前や登録番号を書く義務はありません。\nｄも間違いです。予想できない理由で主任者が足りなくなったときの立て直し期間は「2週間以内」で、30日以内ではありません。\n「50分の1」「足りなくなったら2週間以内」の数字を押さえましょう。","20-7":"この問題は、お金を貸す前に行う「返済能力の調査」のルールを問うています。正解は④です。\n④が正しい理由は、手形(融通手形を除く)の割引を内容とする契約は、指定信用情報機関の情報を使う義務の対象外だからです。だから個人相手でも信用情報を使わなくてよいのです。\n①は間違いです。貸借の媒介(仲介)でも、返済能力の調査は必要です。\n②も間違いです。相手が法人でも、返済能力の調査そのものは必要です(信用情報機関を使う義務が個人に限られるのとは別の話です)。\n③も間違いです。個人事業者との契約は原則として信用情報を使う義務の対象になります。\n「返済能力の調査は基本必要」「信用情報を使わなくてよい例外がある」を区別するのがコツです。","20-8":"この問題は、収入を証明する書類(年収証明書)を求めるルールを問うています。正解は③です。\n③が正しいのは、給与明細を年収証明書として使う場合、地方税額から年収を合理的に計算できるときを除いて、直近2か月分以上を出してもらう必要があるからです。\n①は間違いです。保証契約は、借りる本人の貸付けそのものとは違い、一定の条件を満たさない限り年収証明書の提出義務が生じない場合があります。\n②も間違いです。100万円を超えるような場合は、改めて年収証明書を取り直す必要があります。\n④も間違いです。役所が行政サービスとして出す所得・課税証明書も年収証明書として使えます。\n「給与明細なら原則2か月分以上」を数字で覚えておきましょう。","20-9":"この問題は、極度方式(限度額を決めて何度でも借りられる)契約で、借りすぎになっていないかを定期的に調べるルールを問うています。正しい組み合わせはａとｃなので、答えは②です。\nａは正解です。3か月の期間の末日で残高の合計が10万円以下なら、この調査はしなくてよいです。\nｃも正解です。調査の結果、借りすぎ(基準額超過)に当たると分かったら、限度額を下げるか新たな貸付けを止める措置をとらなければなりません。\nｂは間違いです。年収証明書を求める条件の書き方が正確ではありません。\nｄも間違いです。減額などの措置をとっても、その後も3か月ごとの調査は続ける必要があります。\n「残高10万円以下なら調査不要」「該当したら減額か貸付停止」を押さえましょう。","20-10":"この問題は、店に貸付条件を掲示する義務(14条)や標識を掲げる義務(23条)を問うています。正解は②です。\n②が正しいのは、掲示すべき貸付条件の中に「主な返済の例」が含まれているからです。\n①は、掲示は営業所ごとに見やすい場所にというところは合っていますが、表現全体として他の記述と比べて正確さに欠ける部分があるため、正解ではありません。\n③は間違いです。ウェブサイトへの掲載は、規模などの条件に応じたもので、すべての業者に一律に義務づけられているわけではありません。\n④も間違いです。現金自動設備であっても標識の掲示は必要です。\n「返済の例も掲示する」がこの問題のカギです。","20-11":"この問題は、広告や勧誘のときに必ず示さなければならない事項を問うています。ａ～ｄすべてが該当するので、答えは④(4個)です。\nａの返済の方式・期間・回数、ｂの貸付けの利率、ｃの賠償額の予定(違約金を含む)の元本に対する割合、ｄの担保が必要な場合のその担保に関する事項、これらはすべて広告や勧誘のときに示さなければならない事項です。\nこの問題は「全部が答え」というパターンです。広告では、返し方・利率・違約金・担保という、お金を借りる人が判断に使う大事な情報をきちんと出さなければならない、と理解しておきましょう。迷ったときも「借りる人が知りたい基本情報はだいたい表示が必要」と考えると当たりやすいです。","20-12":"この問題は、契約を結ぶ前に渡す書面(契約締結前書面)のルールを問うています。正しいのは1個だけなので、答えは①です。\nａは正解です。極度方式基本契約を結ぶ前には、内容を説明する書面を相手に渡さなければなりません。\nｂは間違いです。極度方式の個別の貸付けは基本契約の枠内で行うものなので、契約締結前書面は基本的に基本契約のときに渡せばよく、個別の貸付けごとには原則不要です。\nｃも間違いです。保証契約の締結前書面は、保証人になろうとする人に渡せば足り、借りる本人にまで渡す義務はありません。\nｄも間違いです。記載事項に変更が生じた場合は、改めて書面を渡す必要がある場合があり、一律に不要とはいえません。\n「基本契約の前には渡す」「個別貸付けごとには原則不要」を区別しましょう。","20-13":"この問題は、貸金業者が持つ債権を他人に譲るとき(債権譲渡)の規制を問うています。正解は③です。\n③が正しいのは、譲る相手が暴力団員などであることを知っていた場合だけでなく、知り得た(知ることができた)場合も、行政処分の対象になり得るからです。\n①は間違いです。貸金業者から貸金業者へ譲るときでも、その債権が貸付けから生じたことなどを相手に通知する必要があります。\n②も間違いです。契約時の書面(17条書面)を渡す義務は最初の契約時のもので、債権を譲っただけで改めて渡す義務は生じません。\n④も間違いです。譲った側がきちんと注意を払っていた場合は、処分の対象とならない余地があります。\n「知っていた」だけでなく「知り得た」も対象、という点がポイントです。","20-14":"この問題は、貸金業者への監督や届出のルールを問うています。正しい組み合わせはｂとｃなので、答えは③です。\nｂは正解です。暴力団員などを業務に従事させたり補助者に使ったりした場合、役所は登録を取り消さなければなりません。\nｃも正解です。貸金業者は毎年、事業報告書を作り、事業年度が終わってから3か月以内に役所へ出さなければなりません。\nａは間違いです。業務改善命令は法令違反のときだけでなく、借りる人などの利益を害する事実があるときにも出せます。\nｄも間違いです。社内規則を作ったり変えたりするのに役所の承認を受ける、という制度は存在しません。\n「事業報告書は年度後3か月以内」の数字を覚えておきましょう。","20-15":"この問題は、指定信用情報機関への情報提供のルールを問うています。正解は②です。\n②が正しいのは、ある指定信用情報機関が、別の機関の加入業者からの依頼を受けたときは、正当な理由がある場合を除いて情報を提供しなければならないからです(機関どうしの情報のやり取り)。\n①は間違いです。全国銀行個人信用情報センターは、貸金業法上の指定信用情報機関ではありません。\n③も間違いです。極度額が個人信用情報として提供すべき事項に含まれるかについて、この書き方は正確ではありません。\n④も間違いです。信用情報の提供を依頼するときは、原則としてあらかじめ本人の同意が必要です。\n「情報提供の依頼には本人の同意が要る」を基本として押さえましょう。","20-16":"この問題は、廃業や死亡などがあったときの届出のルールで、間違っているものを選びます。正解は②です。\n②が間違いです。会社が合併で消える場合、届出をするのは消えた会社(Aの)代表役員だった人であり、存続する会社Bの代表取締役ではありません。ここが引っかけです。\n①は正しいです。個人業者が死亡したら、相続人がその事実を知った日から30日以内に届け出ます。\n③も正しいです。破産手続開始の決定があると、登録は効力を失います。\n④も正しいです。廃業しても、すでに結んだ契約を締結(結了)させるまでの範囲では、なお貸金業者とみなされます。\n「合併で消えた会社側が届け出る」という主体のひっかけに注意しましょう。","20-17":"この問題は、取引時確認や疑わしい取引の届出について、監督指針の考え方を問い、間違っているものを選びます。正解は③です。\n③が間違いです。疑わしい取引の「参考事例」はあくまで例であって、事例に当てはまらない取引でも、実質的に見て疑わしければ届出の対象になり得ます。「事例に当てはまらなければ届出しなくてよい」と言い切っている点が誤りです。\n①②④はいずれも正しい内容です。危険度調査書をふまえてリスクを分析し書面を作る(①)、実質的支配者や外国PEPsの確認体制を整える(②)、取引時確認と届出を一体的に運用する体制を作る(④)、これらはどれも指針が求める着眼点です。\n「参考事例はあくまで例、当てはまらなくても届出があり得る」と覚えましょう。","20-18":"この問題は、貸金業者の禁止行為について、間違っているものを選びます。正解は①です。\n①が間違いです。従業者証明書を持たせる義務は、借りる人と直接会って業務をする従業者を主に想定したものです。対面しない業務の人にまで一律に持たせなければならない、とする点が正確ではありません。\n②は正しいです。不確実なことを「確実だ」と思わせるような断定的判断の提供は禁止です。\n③も正しいです。借りる人の死亡で保険金が出る契約で、自殺による死亡を保険事故とすることは原則禁止です。\n④も正しいです。年金や手当の受給者の借入意欲をそそる広告・説明は禁止です。\n「証明書は対面業務の人が主眼」というひっかけに注意しましょう。","20-19":"この問題は、総量規制の対象から外れる「除外契約」に当てはまらないものを選びます。正解は②です。\n②が当てはまりません。居宅を担保にする貸付けは「除外契約」ではなく、別の枠である「例外契約」(顧客の利益保護に支障がない契約)に位置づけられます。除外契約の要件(不動産の売却代金で返すなど)には当てはまりません。\n①は不動産の売却代金で返す契約で、除外契約に当たります。\n③はつなぎ融資で、除外契約に当たります。\n④は高額療養費を払うための資金で、除外契約に当たります。\n「除外契約」と「例外契約」は別物です。この違いを意識すると解きやすくなります。","20-20":"この問題は、総量規制の「例外契約」について、間違っているものを選びます。正解は③です。\n③が間違いです。金融機関からの正規の貸付けが行われるまでのつなぎ融資が例外契約になるための返済期間の上限は「1か月」で、3か月ではありません。数字のひっかけです。\n①は正しいです。事業をする個人への貸付けが例外契約になるには、実地調査や確定申告書の確認などで事業の実態を確かめる必要があります。\n②も正しいです。100万円以下なら、事業や収支の状況から返済能力を超えないと認められることが要件になります。\n④も正しいです。例外契約の残高も、個人顧客合算額に算入されます。\n「つなぎ融資の例外は返済期間1か月」の数字を押さえましょう。","20-21":"この問題は、契約時に渡す書面(17条書面)のルールで、間違っているものを選びます。正解は④です。\n④が間違いです。契約時の書面は紙で渡すのが原則で、電子的な方法で提供できるのは相手の承諾を得たときだけです。「書面希望の申出があった場合を除いて電子提供できる」という書き方は、承諾がいらないかのようになっており誤りです。\n①は正しいです。極度方式基本契約の書面には、業者が受け取る書面の内容を書きます。\n②も正しいです。登録番号のかっこ書きは省略できます。\n③も正しいです。取引状況をまとめた書面を渡す場合は、簡易な記載で代えることが認められます。\n「電子提供は相手の承諾が必要」がポイントです。","20-22":"この問題は、契約時の書面を渡した後に内容が変わったとき、渡し直しが必要かを問い、間違っているものを選びます。正解は②です。\n②が間違いです。各回の返済金額を減らす変更は、書面を改めて渡すべき場合に当たります。「渡す必要はない」としたのが誤りです。\n①は正しいです。利率を引き下げる変更は借りる人に不利にならないので、渡し直しは不要です。\n③も正しいです。期限の利益喪失の定めを借りる人に有利に変える場合も、渡し直し不要です。\n④も正しいです。保証契約を解除する変更も、借りる人に不利益にならないので渡し直し不要です。\nポイントは「借りる人に不利益にならない変更は渡し直し不要」という考え方で、返済額の減額は再交付が必要な変更に当たる、と押さえましょう。","20-23":"この問題は、取立て行為の規制(21条)と監督指針の解釈で、間違っているものを選びます。正解は③です。\n③が間違いです。勤務先を訪問する旨を告げる行為が「それだけで違反にならない」とまでは言い切れず、状況によっては私生活の平穏を害する取立てとして違反になり得ます。一律にセーフとしている点が誤りです。\n①は正しいです。他に連絡方法がない場合は、夜間などの連絡でも正当な理由に当たる可能性が高いとされます。\n②も正しいです。直近で本人の申出が守られていない場合は、正当な理由に当たる可能性が高いとされます。\n④も正しいです。家族に知られないよう要請されている場合以外なら、家族が電話に出たとき貸金業者だと名乗っても直ちに違反にはなりません。\n「勤務先訪問を告げる=常にセーフ」ではない点に注意しましょう。","20-24":"この問題は、開始等の届出(24条の6の2)のルールで、間違っているものを選びます。正解は①です。\n①が間違いです。政令で定める使用人が破産手続開始の決定を受けたことは、この開始等の届出の対象として定められていません。届出の対象になるのは貸金業者自身が破産した場合などです。\n②は正しいです。主任者が死亡して設置の要件を欠くことになった場合は届出事項です。\n③も正しいです。使用人に法令違反があったことを知った場合も届出事項です。\n④も正しいです。純資産額が5000万円未満になったことを知った場合も届出事項です。\n「使用人の破産は開始等の届出には入らない」という点がひっかけです。","20-25":"この問題は、金利などの規制で、間違っているものを選びます。正解は④です。\n④が間違いです。貸金業者が利息制限法の上限を超える利息の契約を結んだだけでは、直ちに刑事罰にはなりません。刑事罰の対象になるのは出資法の上限金利(年20パーセント)を超えた場合です。ここを混同させるひっかけです。\n①は正しいです。貸借の媒介の手数料には出資法上の上限があります。\n②も正しいです。営業的金銭消費貸借の賠償額の予定は、年20パーセントを超える部分が無効になります。\n③も正しいです。保証料にも利息制限法上の上限規制があります。\n「利息制限法超過=無効」「出資法超過=刑事罰」という違いを押さえましょう。","20-26":"この問題は、同じ人に複数の貸付けがあるときの利息制限法の上限の考え方で、間違っているものを選びます。正解は④です。\n④が間違いです。第二契約は別の貸主Cによる初めての貸付けです。残高を合算して上限を判断するのは同じ貸主の間での話なので、Cとの契約はC・B間の元本30万円だけを基準に上限を考えます。30万円なら上限は年18パーセントなので、「15パーセント超過部分が無効」とするのは誤りです。\n①②③は、いずれも同じ貸主との既存残高を合算して上限を判定する考え方で、正しい内容です。\n利息制限法の上限は、元本10万円未満が年20パーセント、10万円以上100万円未満が年18パーセント、100万円以上が年15パーセントです。「合算は同じ貸主の間だけ」がポイントです。","20-27":"この問題は、利息とみなされる費用(みなし利息)で、間違っているものを選びます。正解は①です。\n①が間違いです。口座振替による弁済にかかる手数料は、原則としてみなし利息に当たります。「利息とみなされない」としたのが誤りです。\n②は正しいです。契約時の書面(17条書面)の交付費用は原則みなし利息に当たります。\n③も正しいです。カードの発行費用も原則みなし利息に当たります。\n④も正しいです。ATMなどの利用料は、一定の金額の範囲内(1万円以下の返済で110円など)ならみなし利息に含まれない特別ルールがあります。\n「口座振替手数料は原則みなし利息」「ATM利用料は少額なら除外」を区別して覚えましょう。","20-28":"この問題は、民法の意思表示のルールで、正しいものを選びます。正解は③です。\n③が正しいです。勘違い(錯誤)が、その取引にとって重要なもので、しかも本人に重大な過失がなかった場合は、その意思表示を取り消すことができます。\n①は間違いです。意思表示は、通知を発したときではなく、相手に届いたときに効力が生じます(到達主義)。\n②も間違いです。相手が誰か分からないときも、公示という方法で意思表示ができます。\n④も間違いです。第三者が強迫した場合は、相手が知っていたかどうかに関係なく取り消せます(だまされた詐欺の場合とは違います)。\n「強迫は相手の認識を問わず取り消せる」が詐欺との大きな違いです。","20-29":"この問題は、民法の代理のルールで、正しいものを選びます。正解は③です。\n③が正しいです。代理権がない人(無権代理)がした契約でも、相手が代理権のないことを知らなかった(善意)なら、本人が追認しない間はその契約を取り消せます。\n①は間違いです。本人のためにすると示さなくても(顕名がなくても)、相手がそれを知っていた場合は本人に効果が生じます。\n②も間違いです。代理権が消えた後の行為で相手に過失があれば、本人に効果は生じません(相手は善意無過失が必要)。\n④も間違いです。双方代理は原則として無権代理とみなされ、本人があらかじめ許した場合などを除き効果は生じません。\n「善意の相手は追認前に取り消せる」を押さえましょう。","20-30":"この問題は、法律行為の無効と取消しのルールで、正しいものを選びます。正解は②です。\n②が正しいです。取り消された法律行為は、初めから無効だったものとみなされます(さかのぼって効力を失う)。\n①は間違いです。未成年者は、法定代理人の同意がなくても、自分がした法律行為を単独で取り消せます。\n③も間違いです。無効と知って給付を受けた(悪意の)人は、利息を付けて返すなど、現に残っている利益だけにとどまらない返還義務を負う場合があります。\n④も間違いです。取消権は、追認できるときから5年、または行為のときから20年で時効消滅します。\n「取消しはさかのぼって無効」「取消権は5年・20年」を覚えましょう。","20-31":"この問題は、民法の根抵当権のルールで、正しいものを選びます。正解は④です。\n④が正しいです。元本の確定期日を決めていない場合、設定者は設定のときから3年たてば元本の確定を請求できます。\n①は間違いです。根抵当権は、担保する債権の範囲を決めなければなりません。\n②も間違いです。ふつうの抵当権は最後の2年分に限られますが、根抵当権は極度額の範囲内なら全部について行使できます。ここが抵当権との違いです。\n③も間違いです。元本確定前に債権だけを譲り受けた人は、その債権で根抵当権を行使できません(随伴性がない)。\n「根抵当は極度額の範囲で全部OK」「3年で確定請求」を押さえましょう。","20-32":"この問題は、民法の債権の効力で、正しいものを選びます。正解は①です。\n①が正しいです。債務不履行や損害について債権者にも過失があったときは、裁判所はそれを考慮して賠償の責任や金額を定めます(過失相殺)。\n②は間違いです。損害賠償として物や権利の価額の全部を支払ったときは、相手の承諾がなくても当然にその物などについて代位します。\n③も間違いです。債権者代位権では、相手の一身専属権(その人だけのもの)は対象になりません。\n④も間違いです。詐害行為取消権は裁判(訴え)によって行使しなければならず、裁判の外ではできません。\n「詐害行為取消権は必ず裁判で」がポイントです。","20-33":"この問題は、民法の債権譲渡の対抗要件(だれに主張できるか)で、正しいものを選びます。正解は①です。\n①が正しいです。譲渡人から債務者への通知が債務者に届けば、譲受人は債務者に対して債権を譲り受けたことを主張できます。\n②は間違いです。二重譲渡では確定日付のある証書による通知・承諾が優劣を決めるので、確定日付のない承諾より後でも確定日付のある通知を得たDが優先します。\n③も間違いです。確定日付のある通知が複数あるときの優劣は、日付の早い遅いではなく、債務者に届いた順で決まります。先に届いたDが優先します。\n④も間違いです。確定日付のある通知が差押えの送達より先に届いていれば、譲受人Cが差押債権者Eに優先します。\n「優劣は到達の順番」がカギです。","20-34":"この問題は、民法の相殺のルールで、正しいものを選びます。正解は④です。\n④が正しいです。相殺を禁止・制限する意思表示は、第三者がそれを知っていたか、重大な過失で知らなかったときに限って、その第三者に主張できます。\n①は間違いです。相殺の意思表示には、条件や期限を付けることができません。\n②も間違いです。時効で消えた債権でも、消える前に相殺できる状態(相殺適状)になっていれば、自分の側の債権として相殺できます。\n③も間違いです。相殺の効力は、両方の債権が相殺できる状態になったときにさかのぼって生じます(遡及効)。\n「相殺には条件・期限を付けられない」「効力はさかのぼる」を押さえましょう。","20-35":"この問題は、民法の相続のルールで、正しいものを選びます。正解は②です。\n②が正しいです。遺言で分割を禁じられた場合や不分割の契約がある場合を除き、共同相続人はいつでも協議で遺産の全部または一部を分割できます。\n①は間違いです。被相続人だけのもの(一身専属権)は相続されません。\n③も間違いです。金銭債務のような分けられる債務は、相続開始と同時に法定相続分どおりに当然分割されるので、遺産分割で一人が全部を引き受けても、債権者は他の相続人に法定相続分の支払を請求できます。\n④も間違いです。相続放棄は家庭裁判所への申述で効力が生じ、他の相続人への意思表示ではありません。\n「相続放棄は家庭裁判所へ申述」が引っかけどころです。","20-36":"この問題は、破産法のルールで、正しいものを選びます。正解は③です。\n③が正しいです。破産者が破産手続開始の後に破産財団の財産についてした法律行為は、破産手続の関係ではその効力を主張できません。\n①は間違いです。破産債権とは、破産手続開始「前」の原因で生じた財産上の請求権です。\n②も間違いです。別除権は破産手続によらないで行使できる権利です。\n④も間違いです。破産債権者が破産手続開始後に破産財団に対して債務を負った場合は、原則として相殺が禁止されます。\n「破産債権は開始前の原因」「別除権は手続によらず行使」を押さえましょう。","20-37":"この問題は、意思能力・行為能力のルールで、間違っているものを選びます。正解は③です。\n③が間違いです。未成年者が「自分は成年者だ」と信じさせるためにうそ(詐術)を使った場合、その行為は取り消せなくなり、法定代理人も取り消せません。「取り消せる」としたのが誤りです。\n①は正しいです。意思能力がない状態でした法律行為は無効です。\n②も正しいです。成年被後見人の定義として合っています。\n④も正しいです。法定代理人に1か月以上の期間を定めて追認するか催告し、その期間内に返事がなければ追認したものとみなされます。\n「詐術を使うと取り消せなくなる」がポイントです。","20-38":"この問題は、期限と期間の計算ルールで、間違っているものを選びます。正解は④です。\n④が答えです。週・月・年で期間を定めた場合、応当する日(起算日に対応する日)に満了するのが原則ですが、応当する日がない月のときは末日に満了するなどの決まりがあり、設問はその点をふまえた正確さが問われています。\n①は正しいです。始期を付けた法律行為は、期限が来るまで履行を請求できません。\n②も正しいです。担保を滅失・損傷・減少させた債務者は、期限の利益を主張できません。\n③も正しいです。日・週・月・年で期間を定めたときは初日を数えないのが原則で、午前零時から始まるときはこの限りではありません。\n「初日不算入」の原則をまず押さえましょう。","20-39":"この問題は、消滅時効のルールで、間違っているものを選びます。正解は③です。\n③が間違いです。時効を援用したときの効果は、援用のときからではなく、起算点(債権が発生したときなど)にさかのぼって生じます(遡及効)。「将来に向かってのみ」としたのが誤りです。\n①は正しいです。債権は、権利を行使できると知ったときから5年、または行使できるときから10年で時効消滅します。\n②も正しいです。保証人は主たる債務の消滅時効を援用できます。\n④も正しいです。時効利益の事前放棄は無効で、時効完成前に援用しない旨の合意はできません。\n「時効の効果はさかのぼる」「5年・10年」を押さえましょう。","20-40":"この問題は、連帯保証のルールで、間違っているものを選びます。正解は④です。\n④が間違いです。連帯保証人に対する請求などによる時効の完成猶予・更新は、原則として主たる債務者には効力が及びません(相対効の原則)。\n①は正しいです。逆に、主たる債務者への請求などによる時効の完成猶予・更新は、連帯保証人にも効力が及びます(付従性)。\n②も正しいです。連帯保証人は、主たる債務者が主張できる抗弁を使って債権者に対抗できます。\n③も正しいです。主たる債務者が相殺権を持つときは、連帯保証人はその範囲で履行を拒めます。\n「主債務者への効力は保証人に及ぶが、保証人への効力は主債務者に及ばない」という方向の違いに注意しましょう。","20-41":"この問題は、弁済のルールで、間違っているものを選びます。正解は②です。\n②が間違いです。受領権者らしい外観のある人への弁済が有効になるのは、弁済した人が善意で、しかも過失がない場合に限られます。「過失があっても有効」としたのが誤りです。\n①は正しいです。全部を消せない額を支払ったときは、原則として費用、利息、元本の順に充当します。\n③も正しいです。抵当不動産の第三取得者は、債務者の意思に反しても被担保債務を弁済できます。\n④も正しいです。差押えを受けた債権の第三債務者が自分の債権者に弁済したときは、差押債権者は損害の範囲で再度の弁済を請求できます。\n「善意かつ無過失が必要」が引っかけどころです。","20-42":"この問題は、犯罪収益移転防止法の取引時確認のルールで、間違っているものを選びます。正解は④です。\n④が間違いです。法人の事業の内容の確認は、代表者の申告だけではだめで、その法人が作った書類など事業内容を確認できる書類の提示や提出を受ける方法によることが求められます。\n①は正しいです。本人特定事項の内容(自然人は氏名・住居・生年月日、法人は名称・所在地)として合っています。\n②も正しいです。運転免許証の住居と現在の住居が違うときは、現住所が記載された官公庁発行書類の写しの送付を受けて確認できます。\n③も正しいです。自然人は本人特定事項のほか、取引の目的と職業の確認が必要です。\n「法人の事業内容は申告だけではだめ」がポイントです。","20-43":"この問題は、個人情報保護法の用語で、正しいものを選びます。正解は③です。\n③が正しいです。要配慮個人情報とは、人種・信条・社会的身分・病歴・犯罪の経歴・犯罪被害の事実など、不当な差別や偏見が生じないよう特に配慮が要る情報のことです。\n①は間違いです。個人情報は「生存する」個人に関する情報に限られます。\n②も間違いです。クレジットカード番号や電話番号は、原則として個人識別符号には当たりません。\n④も間違いです。個人データに当たるには個人情報データベース等を構成している必要があり、体系的に整理されていない映像などは個人データに当たりません。\n「個人情報は生存者に限る」「要配慮情報の中身」を押さえましょう。","20-44":"この問題は、金融分野のガイドラインでの第三者提供の制限で、正しいものを選びます。正解は②です。\n②が正しいです。個人信用情報機関に情報を提供すると、会員企業を通じて広く共有されるため、提供する事業者は原則として本人の同意を得ることとされています。\n①は間違いです。返済能力に関する信用情報の第三者提供では、オプトアウト(本人が拒否しない限り提供する方式)は認められません。\n③も間違いです。共同利用の「共同して利用する者の範囲」の通知は、本人が範囲を判断できる程度に明示すれば足り、全て個別に列挙する必要はない場合があります。\n④も間違いです。第三者提供の同意は、原則として書面(電磁的記録を含む)で得ることが求められます。\n「信用情報の提供は本人同意が原則、オプトアウト不可」を押さえましょう。","20-45":"この問題は、個人情報保護法のルールで、間違っているものを選びます。正解は③です。\n③が間違いです。本人が自分から公開している個人情報を取得した場合でも、事業者は原則として利用目的を本人に通知するか公表する必要があります。通知・公表の義務が一律に免除されるわけではありません。\n①は正しいです。決めた利用目的の範囲を超えて使うには、あらかじめ本人の同意が必要です。\n②も正しいです。合併などの事業承継で取得し、承継前の利用目的の範囲で使うなら、同意は不要です。\n④も正しいです。利用目的の変更は、変更前と関連性があると合理的に認められる範囲を超えてはいけません。\n「公開情報でも利用目的の通知・公表は原則必要」がポイントです。","20-46":"この問題は、日本貸金業協会の自主規制基本規則で、間違っているものを選びます。正解は④です。\n④が間違いです。勧誘を断られた場合の再勧誘の禁止について、「最低1年間」といった一律の期間は定められていません。断る意思が示された取引や類似取引の勧誘をしてはならない、と定められているにとどまります。期間を1年と限定した点が誤りです。\n①は正しいです。勧誘をするには、あらかじめ本人の承諾を得る必要があります。\n②も正しいです。勧誘リストに個人信用情報を書かないよう留意すべきとされています。\n③も正しいです。契約内容の理解が困難な人への勧誘は禁止です。\n「1年間という数字」が作られたひっかけです。","20-47":"この問題は、日本貸金業協会の紛争解決等業務の規則で、間違っているものを選びます。正解は①です。\n①が間違いです。苦情とは、自主的な交渉で解決できない不満足の表明のことですが、「当事者が和解できるもの」という限定は、苦情ではなく紛争処理手続(あっせんなど)の対象要件です。苦情の定義に和解可能性を付けている点が誤りです。\n②は正しいです。紛争解決等業務の内容や窓口を、ウェブサイトや店頭で公表しなければなりません。\n③も正しいです。苦情を持つ契約者等(個人・法人・一定の社団財団)は、苦情処理手続の開始を申し立てられます。\n④も正しいです。当事者である協会員等は、正当な理由なく事情聴取や資料提出の求めを拒めません。\n「和解可能性は紛争手続の要件、苦情の定義ではない」を押さえましょう。","20-48":"この問題は、会社計算規則の損益計算書のルールで、正しいものを選びます。正解は①です。\n①が正しいです。損益計算書は、売上高、売上原価、販売費及び一般管理費、営業外収益、営業外費用、特別利益、特別損失に区分して表示します。\n②は間違いです。当期純利益は、税引前当期純利益(経常利益に特別損益を加減したもの)から法人税等を引いた額です。\n③も間違いです。経常利益は、営業利益に営業外収益を足し営業外費用を引いたもので、特別利益・特別損失は入りません。\n④も間違いです。売上総利益は売上高から売上原価だけを引いたものです(販売費・一般管理費まで引くと営業利益になります)。\n利益の段階(売上総利益→営業利益→経常利益→当期純利益)の順番を整理して覚えましょう。","20-49":"この問題は、企業会計原則の一般原則で、間違っているものを選びます。正解は②です。\n②が間違いです。一般原則に「事業・財務収益区分の原則」という名前の原則はありません。設問はもっともらしい名前を作って並べた引っかけです。\n①は正しいです。財政状態や経営成績について真実な報告をする、これが真実性の原則です。\n③も正しいです。処理の原則や手続を毎期継続して使い、みだりに変えない、これが継続性の原則です。\n④も正しいです。不利な影響に備えて健全な会計処理をする、これが保守主義の原則です。\n一般原則は7つ(真実性・正規の簿記・資本取引と損益取引の区分・明瞭性・継続性・保守主義・単一性)で、その中にない名前が出たら疑いましょう。","20-50":"この問題は、会社計算規則の貸借対照表のルールで、間違っているものを選びます。正解は②です。\n②が間違いです。負債の部は「流動負債」と「固定負債」に区分するもので、「引当金その他の負債」という独立した区分はありません。\n①は正しいです。資産の部は流動資産、固定資産、繰延資産に区分します。\n③も正しいです。純資産の部は株主資本、評価・換算差額等、株式引受権、新株予約権に区分します。\n④も正しいです。資産の部の合計から負債の部の合計を引いた額は、純資産の部の合計と一致します(貸借対照表等式)。\n「負債は流動負債と固定負債の2区分」を押さえましょう。","21-1":"この問題は、貸金業法で使われる言葉の意味を正しく理解しているかを問うものです。適切なものはａ・ｃ・ｄの3つなので、正解は③になります。\nａは正しく、荷物を運ぶことを仕事にしている会社が、その取引のついでに行うお金の貸付けは「貸金業」から外して考えます。ｃも正しく、お金を貸す契約には、それにくっついてくる保証契約も含めて考えます。ｄも正しく、住宅資金の貸付契約には、家を建てる・買うお金だけでなく、家を直す（リフォームする）ためのお金も含まれます。\n間違いはｂです。「債務者等」という言葉には、お金を借りた人や過去に借りていた人だけでなく、保証人や過去に保証人だった人、担保を提供した人（物上保証人）なども含まれます。ｂはこれらを含まないと言っている点が誤りです。\n「〜等」とついている言葉は幅広く含む、と覚えておくと引っかかりにくくなります。","21-2":"この問題は、貸金業を始めるための「登録」と、その更新の手続きについて問うものです。正しいのは④です。\n④は、更新の申請をしたのに有効期間の最終日までに役所から「認める・認めない」の返事が来ないとき、その返事が出るまでは前の登録がそのまま生きている、という内容で正しいです。手続きの遅れで営業できなくなるのを防ぐための仕組みです。\n①は誤りで、登録の有効期間は2年ではなく3年です。②も誤りで、更新の申請は期限の1か月前ではなく2か月前までにしなければなりません。③も誤りで、登録換えを申請しただけでは前の登録はすぐには消えず、新しい登録がされるまでは前の登録が有効なままです。\n「有効期間は3年、更新は2か月前まで」とセットで覚えましょう。","21-3":"この問題は、貸金業者が登録内容を変えたときの「届出」のルールを問うものです。正しい組み合わせはａとｄなので、正解は②です。\nａは正しく、他にやっている事業の種類が変わったときは、変わった日から2週間以内に届け出ます。ｄも正しく、登録換えの申請は、今受けている登録をした役所（財務局長や都道府県知事）を通して行います。\n間違いはｂとｃです。ｂの電子メールアドレスやホームページアドレスの変更は、後から2週間以内ではなく「あらかじめ（事前に）」届け出る必要があります。逆にｃの業務の種類・方法の変更は、事前ではなく後から2週間以内に届け出れば足ります。\nこの2つは「事前」と「事後」が逆になっていて引っかけになっています。広告に載せる連絡先は事前、と押さえておきましょう。","21-4":"この問題は、貸金業の登録を断られる理由（登録拒否事由)にあたるものを選ぶ問題です。正しい組み合わせはａとｄで、正解は②です。\nａは正しく、心と体の不調で貸金業の仕事をきちんとできない人は登録を断られます。ｄも正しく、会社（法人）の場合は純資産（正味の財産）が5,000万円以上ないと登録できず、これに足りないと拒否されます。\n間違いはｂとｃです。ｂの罰金刑で登録を断られるのは、貸金業法や出資法、刑法などの特定の法律に違反した場合に限られ、道路交通法違反は含まれません。ｃは、破産しても『復権』を得れば（借金の清算が終わって元の立場に戻れば）もう拒否事由にはあたりません。\n『純資産は5,000万円以上必要』という数字は頻出なので必ず覚えましょう。","21-5":"この問題は、営業所ごとに置く『貸金業務取扱主任者』という専門の担当者の制度について、間違いを1つ選ぶものです。間違いは③なので正解は③です。\n③は、主任者の人数が決まった数を下回ったときに直す期間を『30日以内』としていますが、正しくは『2週間以内』です。ここが誤りです。\nほかは正しく、①は従業員50人につき主任者1人以上を置くルール、②は主任者はその営業所に常にいる人で他の営業所の主任者を兼ねていない人であること、④は従業者名簿を最後の記載から10年間保存すること、いずれも正しい内容です。\n『足りなくなったら2週間以内に補充』という数字がポイントです。","21-6":"この問題は、監督官庁が貸金業者を監督するときの考え方をまとめた『監督指針』について、正しいものを1つ選ぶ問題です。正解は③です。\n③は、業務を外部に委託する場合、その委託先をきちんと監督する体制を整えることが指針で示されている、という正しい内容です。\n①は誤りで、内部監査（社内をチェックする部門）は営業部門から独立していなければならず、営業の指揮下に置くのは不適切です。②も誤りで、反社会的勢力との取引がわかったら、支払いが滞るのを待つのではなく、できるだけ早く関係を断つべきです。④も誤りで、ごく小さな苦情まで全部すぐ報告せよとまでは求められておらず、重要なものが適切に報告される体制があればよいとされています。\nチェックする部門は独立、反社とはすぐ縁を切る、と押さえましょう。","21-7":"この問題も『監督指針』についてで、今度は間違いを1つ選ぶ問題です。間違いは③なので正解は③です。\n③は、個人の信用情報を返済能力の調査以外の目的に使わないための措置をとる義務は『法律で定められていない』と言っていますが、実際は貸金業法や監督指針でちゃんと定められています。ここが誤りです。\nほかは正しく、①は事業計画づくりに内部監査部門が主導的に関わるのは監査の独立性を損なうので不適切、②は苦情の記録・保存やADR機関の情報を活かして再発防止に使うことは指針の着眼点、④は従業員が他にいない一人でやる個人業者にも自己チェックによる体制づくりが求められる、いずれも正しい内容です。\n信用情報を目的外に使わない措置は『法律で定められている』が正しい、と覚えましょう。","21-8":"この問題は、お金を貸す前に返せるかどうかを調べる『返済能力調査』について、正しいものを1つ選ぶ問題です。正解は④です。\n④は、極度方式基本契約（一定額まで繰り返し借りられる契約）を結ぶときに信用情報機関を使って調べていれば、その枠内で個別に借りるたびに毎回信用情報を調べ直す必要はない、という正しい内容です。\n①は誤りで、貸付けの仲介(媒介)をするときも返済能力の調査は必要です。②も誤りで、法人（会社）が相手でも返済能力の調査自体は必要です（信用情報機関を必ず使う義務が個人に限られるのとは別の話です）。③も誤りで、保証人になろうとする人についても信用情報機関を使った調査が必要です。\n『基本契約のときに調べれば個別の借入れごとには不要』がポイントです。","21-9":"この問題は、個人にお金を貸すときに必要な『年収を証明する書類』のルールを問うものです。正しい組み合わせはａとｃで、正解は②です。\nａは正しく、貸す金額とその人が他社から借りている分を合わせた額が100万円を超えるときは、年収証明書をもらう必要があります。ｃも正しく、給与明細を年収証明書として使う場合は、住民税額から合理的に計算するときを除いて、直近2か月分以上が必要です。\n間違いはｂとｄです。ｂの市区町村が出す所得証明書や課税証明書も年収証明書として使えます。ｄは、合算額が100万円を超えるときは一度もらっていても改めて年収証明書をもらう必要があります。\n『合わせて100万円超なら年収証明書』という金額の基準を覚えましょう。","21-10":"この問題は、総量規制（借りすぎを防ぐルール）の対象外となる『除外契約』と、条件つきで認められる『例外契約』の区別を問うもので、間違いを1つ選びます。間違いは②なので正解は②です。\n②は、個人の自宅を担保にする貸付けを『除外契約』としていますが、これは除外ではなく、条件を満たせば『例外契約』として扱われるものです。ここが誤りです。\nほかは正しく、①は不動産の売却代金で返すことが確実な貸付けは除外契約、③は高額療養費を支払うためのお金の貸付けは除外契約、④はきちんとした融資が行われるまでの『つなぎ融資』が例外契約になるための返済期間の上限は1か月、いずれも正しい内容です。\n『除外』は最初から対象外、『例外』は条件つきでOK、という違いを意識しましょう。","21-11":"この問題は、総量規制について正しいものを1つ選ぶ問題です。正解は②です。\n②は、事業をしている個人との契約を例外契約とするには、その事業が本当にあるかを確認する必要がある、という正しい内容です。\n①は誤りで、例外契約の残高も、その人の借入れ合計額(合算額)には数え入れます。③も誤りで、総量規制の対象になるのは除外・例外の貸付けを『除いた』残高であって、それらを含めて年収の3分の1までとするのは間違いです。④も誤りで、少しずつ借り換えて残高を減らしていくタイプが例外契約になるには、新しい契約の毎月の返済負担が今より『増えない』ことが条件です。\n『総量規制は除外・例外を除いた残高で判定』『年収の3分の1』が基本です。","21-12":"この問題は、極度方式基本契約（繰り返し借りられる契約）が借りすぎになっていないかを調べる『基準額超過の調査』について、間違いを1つ選ぶものです。間違いは③なので正解は③です。\n③は、極度額を減らすなどの対応をしたら、その後は調査を続けなくてよい、と言っていますが、実際は対応後も3か月以内ごとの調査を続ける必要があります。ここが誤りです。\nほかは正しく、①は貸付残高が10万円以下なら調査は不要、②は借りすぎと認められるときは極度額を減らすか新たな貸付けを止める措置が必要、④は一定期間の貸付合計が5万円を超え、かつその期間末の残高合計が10万円を超えるときに調査が必要、いずれも正しい内容です。\n『措置をとっても調査は続ける』が引っかけポイントです。","21-13":"この問題は、貸金業者の広告や勧誘のルールを問うもので、正しいものの個数を答えます。正しいのはｂとｄの2個なので、正解は②です。\nｂは正しく、広告に載せる登録番号のうち、更新回数を示すカッコ書きの部分は省いてよいとされています。ｄも正しく、違約金など賠償額をあらかじめ決める場合は、その元本に対する割合を広告や説明で示さなければなりません。\n間違いはａとｃです。ａの広告に載せる電話番号は、登録簿に登録した番号でなければならず、担当者の携帯番号ではダメです。ｃの誇大広告の禁止に違反すると、業務改善命令だけでなく、業務停止命令などのより重い処分の対象にもなり得ます。\n『広告の電話番号は登録した番号』を押さえましょう。","21-14":"この問題は、契約を結ぶ『前』に渡す書面（契約締結前書面）について、正しいものを1つ選ぶ問題です。正解は①です。\n①は正しく、極度方式基本契約を結ぼうとするときは、契約する前に決められた書面を渡さなければなりません。\n②は誤りで、保証契約の締結前書面は、主債務者ではなく、保証人になろうとする本人に渡す必要があります。③も誤りで、書いてある内容に変更が生じたときは、改めて書面を渡す必要が出てくる場合があります。『一切不要』とは言えません。④も誤りで、これは契約『前』の書面なので、契約日や相手の氏名・住所のような契約後に確定する事項は記載事項になりません。\n『前』の書面には契約後に決まることは書けない、と考えると分かりやすいです。","21-15":"この問題は、契約を結んだ『とき』に渡す書面（契約締結時書面）について、間違いを1つ選ぶ問題です。間違いは①なので正解は①です。\n①は、相手が希望しなければ承諾を得ずに電子的な方法で渡せる、と言っていますが、電子的な方法で渡すには相手の承諾が必要です。ここが誤りです。\nほかは正しく、②は利率を引き下げるような相手に有利な変更なら書面を渡し直さなくてよい、③は登録番号のカッコ書き（登録回数）だけの変更は渡し直しが必要な重要な変更にはあたらない、④は極度方式基本契約の書面には『極度額を一度に借りたと仮定した場合の』返済総額や返済期間・回数を記載する、いずれも正しい内容です。\n『電子で渡すには承諾が必要』が引っかけポイントです。","21-16":"この問題は、契約締結時書面を渡し直す（再交付する）必要があるかを問うもので、正しいものを1つ選びます。正解は②です。\n②は正しく、極度額を一度下げてから、元の額の範囲内に戻す場合は、借りる人に新たな不利益がないので書面を渡し直す必要はありません。\n①は誤りで、毎回の返済額を減らすような重要な変更は渡し直しが必要です。③も誤りで、保証契約があるときに返済期日や返済額などが変わったら、保証人にも変更後の書面を渡さなければなりません。④も誤りで、個別の貸付契約の書面は、基本契約の番号を書けば済むのではなく、それぞれで契約日や貸付金額などの必要事項を記載しなければなりません。\n『相手が不利にならない変更なら渡し直し不要』という考え方が軸です。","21-17":"この問題は、お金を受け取ったときに渡す『受取証書』と、記録をつける『帳簿』について、正しいものを1つ選ぶ問題です。正解は④です。\n④は正しく、契約締結時書面の写しを保存しておけば、帳簿の一部の記載はそれで代えることが認められています。\n①は誤りで、口座振込みで返済を受けた場合は、相手から請求があったときに受取証書を渡せば足ります。②も誤りで、第三者が返済した場合は、借りた本人の名前と実際に払った人の名前の両方を書きます。③も誤りで、帳簿の保存期間は契約した日からではなく、その契約の最後の返済期日（債権が消えたときはその日）から10年間です。\n『帳簿は最後の返済期日から10年』という起算点に注意しましょう。","21-18":"この問題は、貸金業法21条の『取立てのルール』について、間違いを1つ選ぶ問題です。間違いは③なので正解は③です。\n③は、家族に知られないよう頼まれていても、その頼みの有無で違反かどうかの判断は変わらない、と言っていますが、実際は家族に知られたくないという要請がある場合はプライバシーを侵すおそれが特に大きいと判断されます。ここが誤りです。\nほかは正しく、①は正当な理由なく訪問などをしてはいけない時間帯は午後9時から午前8時まで、②は何度も繰り返す電話や訪問などは生活や仕事の平穏を害するおそれが大きい、④は勤務先を訪ねると告げる行為も状況によっては違反になり得る、いずれも正しい内容です。\n『午後9時〜午前8時は取立て禁止』という時間帯を覚えましょう。","21-19":"この問題は、貸付けの債権を他人に譲るときのルールを問うもので、正しいものの個数を答えます。正しいのはｂとｄの2個なので、正解は②です。\nｂは正しく、譲り受ける相手が暴力団員などだと知った、または知り得た場合は行政処分の対象になり得ます。ｄも正しく、債権を他人に譲ったときは原則として一定期間内に役所へ届け出る必要があります。\n間違いはａとｃです。ａは、譲り受ける相手が同じ貸金業者であっても、譲る側は『この債権には貸金業法24条が適用される』ことなどを通知しなければなりません。ｃは、債権を譲った後に17条書面にあたる書面を渡す義務を負うのは、譲り渡した側ではなく譲り受けた側です。\n譲渡後の書面交付義務は『譲受人』が負う、と押さえましょう。","21-20":"この問題は、貸金業者への監督処分と届出について、間違いを1つ選ぶ問題です。間違いは③なので正解は③です。\n③は、個人の貸金業者が亡くなったとき、相続人が知った日から『2週間以内』に届け出るとしていますが、正しくは『30日以内』です。ここが誤りです。\nほかは正しく、①は暴力団員などを業務に使ったら登録を必ず取り消される、②は事業報告書は毎年度が終わってから3か月以内に提出、④は業務改善命令は法令違反のときだけでなく利用者の利益を害する事実があるときなどにも出せる、いずれも正しい内容です。\n死亡の届出は『知った日から30日以内』という期間に注意しましょう。","21-21":"この問題は、貸金業者の届出事項について、正しい組み合わせを選ぶ問題です。正しいのはａとｄで、正解は②です。\nａは正しく、業務を第三者に委託し始めた・やめたときは、その日から2週間以内に届け出ます。ｄも正しく、破産手続開始の決定があると貸金業の登録の効力は失われます。\n間違いはｂとｃです。ｂの貸金業協会への加入・脱退の届出期限は『30日以内』ではなく『2週間以内』です。ｃは、合併で会社Ａが消えた場合、届出をするのは存続会社Ｂの代表ではなく、消えた会社Ａの代表だった人です。\n『消滅した会社の届出は、その消えた会社の元代表がする』という点が引っかけです。","21-22":"この問題は、借入れ状況などの情報を集める『指定信用情報機関』について、正しいものを1つ選ぶ問題です。正解は②です。\n②は正しく、指定信用情報機関は、別の指定信用情報機関に加盟する貸金業者から情報提供の依頼を受けたとき、正当な理由がなければ提供に応じなければなりません（機関どうしで情報を交流させる仕組みです）。\n①は誤りで、貸金業法上の指定信用情報機関は主に日本信用情報機構(JICC)とシー・アイ・シー(CIC)で、全国銀行個人信用情報センターは指定されていません。③も誤りで、情報提供への同意は書面か電子的な方法で得る必要があり、口頭だけではダメです。④も誤りで、極度方式貸付けは借りる都度など、定められたタイミングで信用情報を提供する必要があります。\n指定機関はJICCとCICの2つ、と覚えましょう。","21-23":"この問題は、利息制限法という法律が定める上限金利について、間違いを1つ選ぶ問題です。間違いは③なので正解は③です。\n③は、貸主が違っても借主が同じなら元本を合わせて上限金利を判定する、と言っていますが、元本を合算するのは『同じ貸主』に対する複数の契約の場合だけで、貸主が違えば借主が同じでも合算しません。ここが誤りです。\nほかは正しく、①は元本10万円未満なら上限は年20%、②は元本100万円以上なら上限は年15%、④は上限を超える利息の約束は契約全体ではなく超えた部分だけが無効、いずれも正しい内容です。\n上限金利は『10万円未満は20%、10万〜100万は18%、100万以上は15%』とセットで覚えましょう。","21-24":"この問題は、同じA社から追加で借りる場合の利息制限法の上限金利を、具体的な数字で計算させる問題です。正解は①です。\nすでに残っている元本20万円に、新しく借りる90万円を合わせると110万円になります。同じ貸主からの複数契約は元本を合算して判定するので、110万円は『100万円以上』の区分に入り、上限金利は年15%が適用されます。だから①が正しいのです。\n②は誤りで、新規の90万円だけで判定してはいけません（合算が必要）。③も誤りで、遅延損害金などの賠償額の予定が無効になるのは年30%ではなく年20%を超える部分です。④も誤りで、保証料も利息とみなして上限規制の対象になります。\n『同じ貸主なら残高と足して判定』が計算のカギです。","21-25":"この問題は、名目は利息でなくても実質的に利息として扱う『みなし利息』について、間違いを1つ選ぶ問題です。間違いは①なので正解は①です。\n①は、口座振替（引き落とし)の手数料はみなし利息に『あたらない』としていますが、実際は原則としてみなし利息に『あたります』。ここが誤りです。\nほかは正しく、②は契約締結時書面の交付費用は原則みなし利息にあたる、③はカードの発行費用も原則みなし利息にあたる、④はATMの利用料は1万円以下なら110円以内、1万円超なら220円以内であればみなし利息に含まれない特別ルールがある、いずれも正しい内容です。\nATMの利用料の金額（110円・220円）は具体的なので覚えておきましょう。","21-26":"この問題は、刑事罰の対象となる上限金利を定めた『出資法』について、間違いを1つ選ぶ問題です。間違いは②なので正解は②です。\n②は、利息制限法の上限を超える利息の契約を結んだだけで、すぐ出資法の刑事罰の対象になる、と言っていますが、刑事罰の対象になるのは出資法の上限（貸金業者なら年20%)を超えた場合です。利息制限法を超えただけでは、ただちに刑事罰にはなりません。ここが誤りです。\nほかは正しく、①は貸金業者の出資法上の上限金利は年20%、③は貸借の媒介手数料は元本に対し年5%を超えて受け取れない、④は貸金業者でない人どうしの貸し借りで刑事罰の対象になる上限は年109.5%、いずれも正しい内容です。\n『利息制限法超過＝民事上無効、出資法超過＝刑事罰』という違いを押さえましょう。","21-27":"この問題は、貸金業法で禁止されている行為について、間違いを1つ選ぶ問題です。間違いは①なので正解は①です。\n①は、対面しない業務だけをする人にも一律に従業者証明書を持たせなければならない、と言っていますが、証明書を携帯させる義務は主に利用者と対面して業務をする人を想定したもので、対面しない業務だけの人に一律に持たせる必要はありません。ここが誤りです。\nほかは正しく、②は不確実なことを『確実だ』と断定して勧誘するのは禁止、③は借りる人などの自殺を保険事故とする保険契約の締結は原則禁止、④は特定公正証書の作成を公証人に頼むときの書面交付・説明は頼む前に行う、いずれも正しい内容です。\n『対面しない業務だけの人には一律の携帯義務はない』が引っかけです。","21-28":"この問題は、民法の『意思表示』のルールについて、間違いを1つ選ぶ問題です。間違いは②なので正解は②です。\n②は、心裡留保（本心ではないと分かって行う意思表示）は、相手がそれを知っていたり知ることができた場合でも常に有効、と言っていますが、相手が『本心ではない』と知っていた・知ることができたときは無効になります。だから『常に有効』は誤りです。\nほかは正しく、①は意思表示は相手に届いたときから効力が生じる（到達主義）、③はうそで示し合わせた意思表示(虚偽表示)の無効は善意の第三者には対抗できない、④は通知を発した後に本人が亡くなっても意思表示の効力は妨げられない、いずれも正しい内容です。\n心裡留保は原則有効だが、相手が見抜けた場合は無効、と覚えましょう。","21-29":"この問題は、契約をする力（意思能力・行為能力)について、正しいものを1つ選ぶ問題です。正解は③です。\n③は正しく、未成年者が親などの同意なしに契約した場合でも、うそをついて自分を成人だと信じさせていたときは、本人も親も契約を取り消せません。うそをついた人を守る必要はないからです。\n①は誤りで、契約時に意思能力（判断する力）がなかったときは、取り消せるのではなく初めから無効です。②も誤りで、被保佐人がお金を借りるには保佐人の同意が必要です。④も誤りで、成年被後見人が後見人の同意を得て契約しても、日用品の購入など日常のこと以外は取り消せます（後見人の同意には意味がなく、実際に代理してもらう必要があるためです)。\n『意思能力なし＝無効』『うそをついた制限行為能力者は取り消せない』を押さえましょう。","21-30":"この問題は、他人の代わりに契約する『代理』について、正しいものを1つ選ぶ問題です。正解は①です。\n①は正しく、代理人Aが『本人Bのためにやっている』と示さずに意思表示をしても、相手Cがそれを知っていたときは、その効果は本人Bに直接生じます。\n②は誤りで、代理権がない場合(無権代理)、相手Cが代理権のないことを知らなかった(善意の)ときは、本人が追認しない間、契約を取り消せます。悪意のときに限る、というのは逆です。③も誤りで、代理権が消えた後の行為で相手Cに過失があると、表見代理は成立せず本人に効果は及びません(相手が善意かつ無過失であることが必要)。④も誤りで、同じ人が両方の当事者の代理をする『双方代理』は、本人があらかじめ許した場合を除き、原則として無権代理とみなされます。\n『示さなくても相手が知っていれば本人に効果が及ぶ』が①のポイントです。","21-31":"この問題は、法律行為の『無効』と『取消し』について、間違いを1つ選ぶ問題です。間違いは④なので正解は④です。\n④は、無効な行為を、無効と知って追認すれば、その行為の時にさかのぼって有効になる、と言っていますが、無効な行為を追認しても過去にさかのぼって有効になるわけではなく、新しく行為をしたものとみなされるだけです。ここが誤りです。\nほかは正しく、①は取り消された行為は初めから無効だったとみなされる、②は制限行為能力者は同意を得なくても自分で単独で取り消せる、③は意思無能力者は受け取った利益が今残っている分(現存利益)だけ返せばよい、いずれも正しい内容です。\n『無効な行為の追認は、さかのぼらず新たな行為とみなす』が引っかけです。","21-32":"この問題は、時間の経過で権利が消える『消滅時効』について、正しいものを1つ選ぶ問題です。正解は③です。\n③は正しく、貸付金債権は『権利を使えると知った時から5年』または『権利を使える時から10年』のどちらか早い方が過ぎると、時効で消えます。\n①は誤りで、時効で消えたと主張するには当事者による『援用』(時効を使うという意思表示)が必要で、裁判所が勝手に考慮することはできません。②も誤りで、債務があると認めた(承認した)場合は、時効完成を知らなくても時効の更新(リセット)の効力が生じます。④も誤りで、時効の完成前にあらかじめ『時効の利益を放棄する』と約束することはできません(弱い立場の人が押し付けられるのを防ぐためです)。\n『5年か10年の早い方』『時効には援用が必要』を押さえましょう。","21-33":"この問題は、繰り返し発生する債権をまとめて担保する『根抵当権』について、正しいものを1つ選ぶ問題です。正解は②です。\n②は正しく、元本を確定する期日を決めていない根抵当権では、担保を提供した人(設定者)は設定から3年たてば元本の確定を請求できます。\n①は誤りで、根抵当権は担保する債権の『範囲』を必ず定めなければならず、範囲を定めずに担保することはできません。③も誤りで、根抵当権は普通の抵当権のように利息が最後の2年分に限られず、極度額(上限額)の範囲内なら全部について行使できます。④も誤りで、元本が確定する前に債権が他人Cに譲られても、Cはその債権について根抵当権を行使できません(確定前の根抵当権は債権にくっついて移らない=随伴性がないためです)。\n『範囲を定める』『確定前は随伴性なし』が根抵当権のポイントです。","21-34":"この問題は、連帯保証について民法上正しいものを1つ選ぶ問題です。正解は①です。\n①は正しく、保証契約は書面(または電子的記録)でしなければ効力が生じません。口約束では保証契約は成立しません。\n②は誤りで、連帯保証人は普通の保証人と違い『まず本人に催告してくれ』と言う催告の抗弁権を持ちません。③も誤りで、債権者Aが主債務者Bに履行を請求して時効の完成が猶予されると、その効力は付従性により連帯保証人Cにも及びます。④も誤りで、AがCに請求したことによる時効の完成猶予や更新の効力は、原則として主債務者Bには及びません(相対効の原則)。\n『保証契約は書面が必要』『連帯保証人には催告・検索の抗弁権がない』を押さえましょう。","21-35":"この問題は、保証債務について間違いを1つ選ぶ問題です。間違いは③なので正解は③です。\n③は、連帯保証人が複数いる場合、各自が分別の利益を持ち自分の負担部分だけ保証すればよい、と言っていますが、連帯保証人には分別の利益がなく、各自が債務の全額について保証します。ここが誤りです。\nほかは正しく、①は普通の保証人は催告の抗弁権と検索の抗弁権を持つ、②は保証人は主債務者が持つ相殺権を理由に支払いを拒める、④は保証契約の後に主債務が重くなっても保証人の負担は自動的には重くならない、いずれも正しい内容です。\n『連帯保証人には分別の利益がない=全額背負う』が最重要ポイントです。","21-36":"この問題は、同じ債権を2人に譲る『二重譲渡』などの債権譲渡について、正しいものを1つ選ぶ問題です。正解は④です。\n④は正しく、まだ発生していない『将来の債権』も譲渡の対象にできます。\n①は誤りで、債権譲渡を債務者やその他の第三者に主張するには、譲渡人から債務者への通知か、債務者の承諾が必要です。②も誤りで、両方とも確定日付のある証書で通知した場合、優劣は日付の先後ではなく、その通知が債務者に『届いた日時』の先後で決まります。③も誤りで、譲渡を禁止する取り決め(譲渡制限)がある債権を譲っても、譲渡自体は有効です。\n『二重譲渡の優劣は到達の先後』『将来債権も譲渡できる』を押さえましょう。","21-37":"この問題は、借金などを返す『弁済』について、正しいものを1つ選ぶ問題です。正解は③です。\n③は正しく、返すべきものが複数あって当事者間で充てる順番の合意がないときは、費用→利息→元本の順に充てます。\n①は誤りで、受領権者らしい外観を持つ人への弁済が有効になるのは、弁済者が善意で『かつ過失がない』場合に限られます。善意だけでは足りません。②も誤りで、返済に正当な利益を持たない第三者は、債務者の意思に反しては返済できません。④も誤りで、差押えを受けた債権の第三債務者が差押えられた側(自分の債権者)に払ってしまったときは、差押債権者は損害の範囲で改めて支払いを請求できます。\n『充当は費用→利息→元本』『受領権者の外観への弁済は善意無過失が必要』を押さえましょう。","21-38":"この問題は、お互いの債権を打ち消し合う『相殺』について、間違いを1つ選ぶ問題です。間違いは②なので正解は②です。\n②は、貸付金債権が時効で消えた場合、消える前に相殺できる状態(相殺適状)だったとしても相殺できない、と言っていますが、消える前に相殺適状にあったなら、時効で消えた後でもその債権を使って相殺できます。ここが誤りです。\nほかは正しく、①は相殺の意思表示に条件や期限をつけられない、③は相殺は双方が相殺できる状態になった時にさかのぼって効力が生じる、④は相殺を禁止・制限する意思表示は、第三者がそれを知っていたか重大な過失で知らなかったときに限り対抗できる、いずれも正しい内容です。\n『相殺適状にあれば時効消滅後も相殺できる』が引っかけです。","21-39":"この問題は、借主が亡くなったときの相続について、正しいものを1つ選ぶ問題です。正解は④です。\n④は正しく、相続を放棄するには家庭裁判所へ申し出る(申述する)ことでその効力が生じます。\n①は誤りで、借金のような分けられる債務(可分債務)は、遺産分割を待たず、相続が始まると同時に法定相続分に応じて自動的に相続人へ分かれて引き継がれます。②も誤りで、限定承認は相続人の一人だけではできず、共同相続人全員で一緒にしなければなりません。③も誤りで、相続を放棄した場合はその子が代わりに相続する『代襲相続』は起きません(代襲は死亡・欠格・廃除のときだけです)。\n『相続放棄は家庭裁判所へ申述』『放棄では代襲は起きない』を押さえましょう。","21-40":"この問題は、借主が破産したときの取り扱いについて、間違いを1つ選ぶ問題です。間違いは③なので正解は③です。\n③は、抵当権などの別除権を持つ債権者は、被担保債権の全額について破産手続に参加し配当を受けられる、と言っていますが、別除権を持つ人は、まず担保を行使して、それでも足りなかった不足分についてだけ破産債権者として権利を行使できます(不足額責任主義)。ここが誤りです。\nほかは正しく、①は破産債権とは破産手続開始前の原因で生じた財産上の請求権、②は抵当権などの別除権は破産手続によらずに行使できる、④は破産手続開始後に破産財団に対して負った債務は原則として相殺できない、いずれも正しい内容です。\n『別除権者は不足額だけ破産債権として行使』がポイントです。","21-41":"この問題は、手形と電子記録債権について、間違いを1つ選ぶ問題です。間違いは②なので正解は②です。\n②は、手形の振出人は、直接の相手方への人的抗弁(その相手だけに主張できる事情)を、それを知らない(善意の)裏書譲受人にも対抗できる、と言っていますが、人的抗弁は善意の第三者には対抗できません(人的抗弁の切断)。ここが誤りです。\nほかは正しく、①は裏書が連続する手形の所持人は正当な権利者と推定され、自分で権利を証明しなくてよい、③は電子記録債権は原則として発生記録によって生じる、④は電子記録債権の譲渡は譲渡記録をしないと効力が生じない、いずれも正しい内容です。\n『人的抗弁は善意の第三者に対抗できない(切断される)』が引っかけです。","21-42":"この問題は、犯罪収益移転防止法(犯収法)に基づく『取引時確認』について、正しいものを1つ選ぶ問題です。正解は①です。\n①は正しく、個人(自然人)との特定取引では、氏名・住所・生年月日といった本人特定事項に加えて、取引の目的と職業も確認しなければなりません。\n②は誤りで、法人の事業内容の確認は代表者の申告だけでは足りず、定款や登記事項証明書などの書類で行う必要があります。③も誤りで、免許証の住所が今の住所と違うときは、今の住所が分かる別の公的書類などでの確認が必要です。④も誤りで、確認記録の保存期間は契約終了などから5年ではなく7年です。\n『個人は本人特定事項＋目的＋職業』『記録は7年保存』を押さえましょう。","21-43":"この問題は、個人情報保護法について、間違いを1つ選ぶ問題です。間違いは③なので正解は③です。\n③は、信用情報機関へ個人データを提供するとき、金融分野の事業者はオプトアウト(本人が拒否しない限り提供してよい方式)で本人の同意なく提供できる、と言っていますが、返済能力に関する情報を信用情報機関へ提供する場合はオプトアウトは認められず、原則として本人の同意が必要です。ここが誤りです。\nほかは正しく、①は個人情報は生存する個人に関する情報で死者は含まない、②は要配慮個人情報には人種・信条・社会的身分・病歴・犯罪の経歴が含まれる、④は業務委託に伴って渡す場合の委託先は原則として第三者にあたらない、いずれも正しい内容です。\n『信用情報機関への提供は本人の同意が必要(オプトアウト不可)』を押さえましょう。","21-44":"この問題は、消費者を守る消費者契約法について、正しいものを1つ選ぶ問題です。正解は②です。\n②は正しく、消費者契約法の取消権は、追認できる時から1年、または契約締結の時から5年を過ぎると時効で消えます。\n①は誤りで、事業者のうその説明(不実告知)で誤認して結んだ契約は、当然に無効になるのではなく取り消せるにとどまります。③も誤りで、損害賠償額を定める条項は、平均的な損害額を超える部分だけが無効で、条項全体が無効になるわけではありません。④も誤りで、クーリング・オフのような無条件解除権は特定商取引法など個別の法律の制度で、消費者契約法に一般的な規定はありません。\n『取消権は追認できる時から1年・契約から5年』という期間を押さえましょう。","21-45":"この問題は、不当な表示や景品を規制する景品表示法について、間違いを1つ選ぶ問題です。間違いは③なので正解は③です。\n③は、合理的な根拠資料の提出を求める『不実証広告規制』が有利誤認表示(取引条件を実際より有利に見せる表示)にも使える、と言っていますが、この規制は商品やサービスの内容についての『優良誤認表示』にだけ使われ、有利誤認表示には使えません。ここが誤りです。\nほかは正しく、①は優良誤認の疑いがあるとき内閣総理大臣は期間を定めて根拠資料の提出を求められる、②は期間内に資料を出さなければ不当表示とみなされる、④は景品類とは取引に付随して提供される物品・金銭その他の経済上の利益、いずれも正しい内容です。\n『不実証広告規制は優良誤認だけ』が引っかけです。","21-46":"この問題は、貸金業界が自分たちで定める『自主規制基本規則』について、間違いを1つ選ぶ問題です。間違いは②なので正解は②です。\n②は、勧誘を断った人への再勧誘の禁止期間が『一律に1年間』と定められている、と言っていますが、期間を一律1年と区切っているわけではなく、その取引や類似の取引について勧誘してはならない、と定められているにとどまります。ここが誤りです。\nほかは正しく、①は勧誘を断った人にはその取引や類似取引の勧誘をしてはいけない、③は契約内容を理解するのが難しい人への勧誘は禁止、④は勧誘リストに個人信用情報を書かないよう留意する、いずれも正しい内容です。\n『再勧誘禁止に一律◯年という期間の定めはない』が引っかけです。","21-47":"この問題は、貸金業に関するトラブル解決(紛争解決業務)について、正しいものを1つ選ぶ問題です。正解は①です。\n①は正しく、日本貸金業協会に入っていない貸金業者は、指定紛争解決機関と手続実施基本契約を結ぶなどの措置をとり、その相手方(どこと契約したか)を公表しなければなりません。\n②は誤りで、指定紛争解決機関の名称は、契約締結時書面だけでなく契約締結前書面にも表示しなければなりません。③も誤りで、加入している貸金業者は、正当な理由がなければ紛争解決手続への応諾の求めを拒めません。④も誤りで、紛争解決手続の申立ては利用者側だけでなく、加入している貸金業者の側からもできます。\n『紛争解決機関の名称は前書面・時書面の両方に表示』を押さえましょう。","21-48":"この問題は、会計のルールの土台となる『企業会計原則の一般原則』について、間違いを1つ選ぶ問題です。間違いは②なので正解は②です。\n②は、目的ごとに違う形式の財務諸表を作ってはならない、という内容を『正規の簿記の原則』の説明としていますが、これは『単一性の原則』の説明です。正規の簿記の原則は、すべての取引を正しい簿記に従って正確な帳簿に記録すべき、という原則です。ここが誤りです。\nほかは正しく、①は真実性の原則は他の原則の上位に立つ最上位の原則、③は資本取引と損益取引を区別し資本剰余金と利益剰余金を混同しない、④は保守主義の原則は健全な処理を求めるが過度に保守的な処理は認めない、いずれも正しい内容です。\n『単一性の原則』と『正規の簿記の原則』の説明の入れ替えに注意しましょう。","21-49":"この問題は、損益計算書で段階的に計算される利益(段階利益)について、正しい組み合わせを選ぶ問題です。正しいのはａ・ｂ・ｄで、正解は④です。\nａは正しく、売上総利益(粗利)は売上高から売上原価を引いて計算します。ｂも正しく、営業利益は売上総利益から販売費及び一般管理費を引いて計算し、本業のもうけを示します。ｄも正しく、当期純利益は税引前当期純利益から法人税等を引いて計算します。\n間違いはｃです。経常利益は、営業利益に『営業外収益』を足し『営業外費用』を引いて計算します。特別利益・特別損失は経常利益ではなく、その次の税引前当期純利益を計算するときに使う項目です。ここが誤りです。\n『経常利益は営業外の損益で計算、特別損益はその後』という順序を押さえましょう。","21-50":"この問題は、会社計算規則に基づく貸借対照表について、間違いを1つ選ぶ問題です。間違いは②なので正解は②です。\n②は、負債の部が『流動負債・固定負債・引当金その他の負債』の3つに分かれる、と言っていますが、負債の部は流動負債と固定負債の2つに分かれるだけで、独立した『引当金その他の負債』という区分はありません。ここが誤りです。\nほかは正しく、①は資産の部は流動資産・固定資産・繰延資産の3区分、③は純資産の部は株主資本・評価換算差額等・株式引受権・新株予約権の4区分、④は資産合計から負債合計を引いた額は純資産合計と一致する、いずれも正しい内容です。\n『負債の部は流動と固定の2区分だけ』という点を押さえましょう。"};
// ---------- 用語集（アンダーライン＆tips） ----------
const GTERMS = Object.keys(GLOSSARY).sort((a,b)=>b.length-a.length);
const GRE = GTERMS.length ? new RegExp("("+GTERMS.map(t=>t.replace(/[.*+?^${}()|[\]\\]/g,"\\$&")).join("|")+")","g") : null;
// 既にエスケープ済み(タグ混在)のHTML断片に対し、タグ外のテキストだけ用語をラップ
function glossify(html, skip){
  if(!GRE) return html;
  return html.replace(/(<[^>]+>)|([^<]+)/g, (m,tag,txt)=>{
    if(tag) return tag;
    return txt.replace(GRE, t=> (skip&&t===skip)?t : `<span class="gterm" onclick="showTip('${t}',event)">${t}</span>`);
  });
}
function showTip(term,ev){
  if(ev){ ev.stopPropagation(); ev.preventDefault(); }
  const g=GLOSSARY[term]; if(!g) return;
  const mask=document.createElement("div"); mask.className="tipmask";
  mask.innerHTML=`<div class="tipsheet" onclick="event.stopPropagation()">
    <div class="grab"></div>
    <div class="tt">${esc(term)}</div>
    <div class="yomi">${esc(g.yomi)}</div>
    <span class="catlbl">${esc(g.cat)}</span>
    <div class="def">${glossify(esc(g.def).replace(/\n/g,"<br>"), term)}</div>
    <button class="close" onclick="closeTip()">閉じる</button>
  </div>`;
  mask.onclick=closeTip;
  document.body.appendChild(mask);
}
function closeTip(){ const ms=document.querySelectorAll(".tipmask"); if(ms.length) ms[ms.length-1].remove(); }

const STORIES=[{"id":"kinri","cat":"金利","ic":"💰","title":"金利には天井がある","sub":"上限金利のふしぎを、やさしくほどく物語","chapters":[{"emoji":"🏠","title":"はじめての借り入れ","body":"こんにちは。今日は「金利の上限」のお話をしますね。\n\nある日、あなたの友だちが少しだけお金を借りることになりました。「利息って、いくらでも高くしていいの？」と不安そう。\n\nじつは、法律が「ここまでですよ」という天井をきちんと決めているんです。だから、貸す側が好きなだけ利息を取ることはできません。\n\nこの天井を決めているのが「利息制限法」と「出資法」という二つの法律。名前はむずかしそうですが、役割はシンプルです。一緒にゆっくり見ていきましょう。"},{"emoji":"📊","title":"利息制限法という天井","body":"まずは利息制限法から。この法律は、借りる金額（元本）が大きいほど上限を低くする、というやさしい仕組みになっています。\n\n・元本が10万円未満なら、年20%まで\n・10万円以上100万円未満なら、年18%まで\n・100万円以上なら、年15%まで\n\nもしこの天井を超える利息を約束してしまっても、超えた部分は「無効」。つまり払わなくてよいのです。\n\n金額が大きい人ほど負担が重くならないように、と考えられた優しいルールなんですね。","ex":{"q":"元本50万円を借りたとき、利息制限法の上限は年何%でしょう？","point":"10万円以上100万円未満なので、上限は年18%。100万円未満は18%、と覚えましょう。"}},{"emoji":"⚖️","title":"もうひとつの天井、出資法","body":"次は「出資法」です。こちらは、貸金業者が高すぎる利息を取ったときに刑事罰、つまり罰則を与えるための法律です。\n\n貸金業者の場合、年20%を超えると罰せられます。利息制限法が「超えた分は無効ですよ」という民事のルールなら、出資法は「やりすぎると罰しますよ」という強い警告なんですね。\n\nちなみに、返済が遅れたときに払う「遅延損害金」も、貸金業者では年20%が上限です。うっかり高くしすぎないよう、ここにも天井があるのです。"},{"emoji":"🌫️","title":"グレーゾーン金利の思い出","body":"じつは昔、こまった時代がありました。\n\n利息制限法の天井（18%など）と、出資法の天井（20%）の間。ここは「無効だけど罰則はない」という、あいまいな帯だったのです。これを「グレーゾーン金利」と呼び、多くの業者がこの帯で貸していました。\n\nでも2010年に完全施行された法改正で、このグレーゾーンは撤廃されました。\n\nそして、この帯で払いすぎていた利息は「過払い金」として、あとから返してもらえる場合があります。ニュースで聞いたことがあるかもしれませんね。"},{"emoji":"🧾","title":"名前を変えても利息は利息","body":"最後に、ちょっとした落とし穴のお話。\n\n「これは利息じゃなくて、礼金です」「手数料です」「調査料です」——そんなふうに名前を変えても、実質お金を借りる代償なら、すべて利息とみなされます。これを「みなし利息」といい、上限の計算に含めるんです。\n\nただし、契約を結ぶための費用や、返済のためにかかる費用など、一部は例外として除かれます。\n\n名目にごまかされず「本当に利息じゃないか？」と見る目。これが上限金利を理解する、いちばんの近道ですよ。お疲れさまでした。","ex":{"q":"貸すときに取る「調査料」は、上限金利の計算に含めますか？","point":"含めます。名目が何であれ実質的な利息はみなし利息として計算に入る、が基本。契約締結費用など一部だけが例外です。"}}]},{"id":"soryo","cat":"規制","ic":"⚖️","title":"総量規制ってなんだろう","sub":"借りすぎを防ぐ「年収の3分の1」のしくみを、いっしょに見ていきましょう","chapters":[{"emoji":"💡","title":"借りすぎを防ぐ「3分の1ルール」","body":"こんにちは。今日は「総量規制」を学びましょう。むずかしそうな名前ですが、しくみはシンプルです。\n個人が貸金業者から借りられるお金の残高は、原則として「年収の3分の1」までと決められています。たとえば年収300万円の人なら、上限はおよそ100万円ですね。\nどうしてこんなルールがあるのでしょう。それは、返せる以上に借りてしまう「借りすぎ」や、あちこちから借りて苦しくなる「多重債務」を防ぐためです。\nお客さまを守るための、やさしいブレーキだと思ってください。","ex":{"q":"総量規制で、個人が貸金業者から借りられる残高の原則的な上限は年収の何分の1まででしょう？","point":"「年収の3分の1」が基本の数字です。まずここをしっかり覚えましょう。"}},{"emoji":"🔍","title":"貸す前に「返せるか」を調べます","body":"貸金業者は、お金を貸す前に「この方はちゃんと返せるかな？」と返済能力を調べる義務があります。これを返済能力の調査といいます。\nそのとき使うのが「指定信用情報機関」というしくみです。ここに照会すれば、お客さまが他の会社からどれくらい借りているか（他社借入）を確認できます。\n自分のところだけを見ていては、合計でいくら借りているか分かりませんよね。だから業者どうしで情報を共有し、全体で3分の1を超えないようにチェックするのです。\n「調べてから貸す」。これが総量規制を支える土台です。","ex":{"q":"他社からの借入額を確認するために、貸金業者が照会する先はどこでしょう？","point":"「指定信用情報機関」です。全体の借入を把握するための大切な窓口ですね。"}},{"emoji":"📄","title":"収入証明書が必要になるとき","body":"3分の1までかどうかを確かめるには、年収を正しく知る必要があります。そこで登場するのが「収入証明書」です。源泉徴収票などがこれにあたります。\nいつでも必要なわけではありません。目安になる金額が決まっています。\n・1社からの借入が50万円を超えるとき\n・他社の分も合わせて、合計が100万円を超えるとき\nこのどちらかにあてはまると、収入証明書の提出が必要になります。\n金額が大きくなるほど、より慎重に年収を確認する、というわけですね。","ex":{"q":"A社1社だけで60万円を借りようとしています。収入証明書は必要でしょうか？","point":"必要です。「1社で50万円超」にあてはまるからですね。"}},{"emoji":"🚗","title":"「除外」と「例外」は別ものです","body":"総量規制には、少しまぎらわしい2つの言葉があります。「除外」と「例外」です。\n「除外」は、そもそも3分の1の残高に数えない契約のこと。住宅ローンや自動車ローン、高額療養費の貸付などが当てはまります。生活に欠かせない大きな買いものだからですね。\n「例外」は、3分の1を超えても認められる契約です。緊急の医療費、負担が軽くなる借換え（おまとめ）、個人事業者への事業性の貸付などが、一定の条件つきで認められます。\n「最初から数えない」のが除外、「超えてもよい」のが例外。ここを区別できれば大丈夫です。","ex":{"q":"住宅ローンは「除外」と「例外」のどちらでしょう？","point":"「除外」です。そもそも3分の1の残高に含めない、と覚えましょう。"}},{"emoji":"🏦","title":"銀行カードローンと、超えたときの対応","body":"最後にもう一つ。「銀行のカードローンは総量規制の対象になるの？」とよく聞かれます。\n答えは、対象外です。総量規制は貸金業法のルールで、銀行は貸金業者ではないからですね。ただし放置されているわけではなく、銀行業界には別途、自主的な取り組みがあります。\nまた、極度方式契約（かんたんに言うと、枠内で何度も借りられるタイプ）で、借入残高が基準額である年収の3分の1を超えてしまった場合はどうなるでしょう。このときは、貸金業者が新たな利用を停止するなどの対応をとります。\nお疲れさまでした。総量規制の全体像が、これでつながりましたね。","ex":{"q":"銀行のカードローンは、貸金業法の総量規制の対象になるでしょうか？","point":"対象外です。銀行は貸金業者ではないため、というのが理由ですね。"}}]},{"id":"shomen","cat":"書面","ic":"📄","title":"3つの書面 ～お金の流れを見守る紙たち～","sub":"契約の「前」「時」「返済のたび」に渡される書面のちがいを、やさしく整理します","chapters":[{"emoji":"🤝","title":"なぜ書面が大事なの？","body":"こんにちは。今日はお金を貸し借りするときに登場する「書面（しょめん）」のお話をしますね。\n書面とは、貸付の条件やお金のやりとりを紙などに書いて渡すものです。\nなぜわざわざ紙にするのでしょう。それは、借りる人が「どんな条件で借りたのか」「これまでいくら返したのか」を、いつでも自分の手で確認できるようにするためなんです。\n口約束だと、あとで「言った・言わない」でもめてしまいますよね。書面は、借りる人を守るための大切な仕組みなんですよ。","ex":{"q":"書面を渡す一番のねらいは何でしょう？","point":"借りる人が条件や履歴をいつでも確認でき、安心できるようにするため（借り手の保護）です。"}},{"emoji":"📋","title":"契約する「前」に渡す書面","body":"まず登場するのが「契約締結前（けいやくていけつまえ）の書面」です。名前のとおり、契約を結ぶ「前」に渡します。\nここには、金利や返済方法といった貸付の条件が書かれています。\nどうして契約の前なのでしょう。それは、借りる人が「この条件で本当に借りて大丈夫かな」とじっくり考える判断材料を、先に手にしておくためなんです。\n買い物でいえば、値札やパンフレットを見てから決めるのと同じ。あわてて契約せず、先に中身を確かめられるようにする、やさしい配慮なんですね。","ex":{"q":"契約締結前の書面は、いつ渡されますか？","point":"契約を結ぶ「前」です。判断材料を先に示すのが目的です。"}},{"emoji":"✍️","title":"契約が「成立したとき」の書面","body":"次は「契約締結時（けいやくていけつじ）の書面」。いわゆる17条書面（じゅうななじょうしょめん）と呼ばれるものです。\nこれは契約が成立したとき、遅滞（ちたい）なく渡されます。「遅滞なく」とは、正当な理由なくグズグズ引き延ばさずに、という意味ですよ。\n中身は、結ばれた契約内容の控えです。前の章の「前の書面」が“これから決める条件”なら、こちらは“決まった内容の記録”というイメージですね。\n手元に控えがあれば、あとから「どんな契約だったっけ？」と思ったときにすぐ見返せて安心です。","ex":{"q":"契約締結時の書面（17条書面）は、いつ渡されますか？","point":"契約が成立したとき、遅滞なく（引き延ばさずに）渡されます。契約内容の控えです。"}},{"emoji":"🧾","title":"「返済のたび」に渡す受取証書","body":"3つめは「受取証書（うけとりしょうしょ）」。いわゆる18条書面（じゅうはちじょうしょめん）です。\nこれは弁済（べんさい＝返済）を受け取ったとき、その都度（つど）直ちに渡されます。「直ちに」は、遅滞なくよりもさらに急いで、という強いニュアンスですよ。\nイメージはお店の領収書。返済するたびに「たしかに受け取りました」という証が手元に残ります。\n返した記録がきちんと残れば、「ちゃんと返したのに」というトラブルも防げますね。返済の一つひとつを見守ってくれる紙なんです。","ex":{"q":"受取証書（18条書面）は、いつ渡されますか？","point":"返済を受け取ったとき、その都度「直ちに」渡されます。領収書のようなものです。"}},{"emoji":"💳","title":"まとめ ～3つの見分け方と特例～","body":"最後に、3つの書面を「いつ渡すか」で整理しましょう。\n・前＝契約の「前」に（判断材料）\n・時＝契約が成立した「時」に遅滞なく（内容の控え）\n・受取証書＝返済の「都度」直ちに（領収書がわり）\nこの“前・時・都度”のリズムで覚えると忘れにくいですよ。\nなお、カードローンなどの極度方式基本契約では、1か月ごとに明細（マンスリーステートメント）をまとめて交付することで、都度の書面交付を簡略化できる特例もあります。\nどの書面も、借りる人が条件と履歴をいつでも確認できるようにする、思いやりの仕組みなんですね。","ex":{"q":"カードローン等で使える、都度の書面交付を簡略化する特例とは？","point":"極度方式基本契約では、1か月ごとに明細（マンスリーステートメント）をまとめて交付できます。"}}]},{"id":"touroku","cat":"登録","ic":"🏛","title":"登録と監督のしくみ","sub":"「きちんとした業者だけ」を守る入口のルール","chapters":[{"emoji":"🚪","title":"まずは登録から","body":"こんにちは。今日は貸金業の「入口」のお話です。\nお金を貸す商売、つまり貸金業を営むには、必ず「登録」を受けなければなりません。無登録での営業は認められないんですね。\nでは、どこに登録するのでしょう。ここがポイントです。営業所を2つ以上の都道府県に置くなら、内閣総理大臣（実際の窓口は財務局)に登録します。1つの都道府県の中だけで営業するなら、その都道府県知事に登録します。\n「複数の県にまたがるなら国、1県だけなら県」と覚えると、すっきり整理できますよ。","ex":{"q":"東京都と神奈川県に営業所を置く場合、登録先は都道府県知事である。◯か×か。","point":"2つ以上の都道府県にまたがるので、内閣総理大臣(財務局)への登録となり×。1つの都道府県内だけなら知事です。"}},{"emoji":"⏳","title":"3年ごとの更新","body":"登録は一度受ければ一生有効、というわけではありません。有効期間は3年と決まっています。\n3年経っても続けたいときは「更新」が必要です。ただし、うっかり忘れないよう注意してほしい期限があります。更新の申請は、有効期間が満了する日の2か月前までにしなければなりません。\nもし更新をしないまま満了日を迎えると、その登録は効力を失ってしまいます。せっかくの営業資格がなくなってしまうんですね。\n「3年ごと、2か月前までに」——このセットで覚えておきましょう。"},{"emoji":"💰","title":"登録に必要な条件","body":"誰でも申請すれば登録できる、というものでもありません。利用者を守るために、いくつかの条件が設けられています。\nまず、お金の面での体力です。純資産額が5000万円以上あることが求められます。すぐに経営が傾いてしまう業者では、利用者が困ってしまいますからね。\nそしてもう一つ大切なのが、人の配置です。営業所ごとに「貸金業務取扱主任者」を置く義務があります。しかも、従業者50人につき1人以上という割合も守らなければなりません。\nお金と人、その両面できちんとした体制を整えることが求められているんです。","ex":{"q":"従業者が120人いる営業所では、貸金業務取扱主任者は最低何人必要でしょう。","point":"50人に1人以上なので、120人なら3人以上が必要です(50・100・120で3区切り)。割合を下回らないよう配置します。"}},{"emoji":"📮","title":"変わったら・やめたら届け出る","body":"無事に登録できた後も、やるべきことがあります。それが「届出」です。\nまず変更の届出。商号や役員、営業所など、登録した内容が変わったときは、原則2週間以内に届け出ます。登録の情報を常に正しく保つためですね。\n次に廃業等の届出。商売をやめたり、本人が亡くなったり、会社が合併したりした場合には、決められた人が30日以内に届け出ます。とくに死亡のときは、相続人がその事実を知った日から30日以内、と数え方が決まっています。\n「変更は2週間、廃業などは30日」。期限の違いに気をつけましょう。"},{"emoji":"🛡","title":"登録できない人と、監督のねらい","body":"最後に、そもそも登録を受けられない人についてです。これを「登録拒否事由」といいます。\nたとえば、破産してまだ復権していない人、暴力団員、一定の前科がある人などは、登録を受けることができません。\nなぜこんなに細かくルールがあるのでしょう。それは、きちんとした業者だけに営業をさせ、利用者を守るためなんです。登録も、更新も、届出も、拒否事由も、すべてこの一つのねらいでつながっています。\nこう考えると、ばらばらに見えたルールが、一本の筋で理解できてきますよね。お疲れさまでした。","ex":{"q":"過去に破産したが、すでに復権している人は登録を受けられない。◯か×か。","point":"拒否されるのは「破産して復権していない」人です。復権していれば拒否事由にあたらないため×。"}}]},{"id":"toritate","cat":"取立て・広告","ic":"🚫","title":"取立てと広告のルール","sub":"お金を返してもらうときも、宣伝するときも。相手の暮らしを守る「やってはいけない」を、やさしく学びましょう。","chapters":[{"emoji":"🌙","title":"呼び出しにも「時間」と「場所」がある","body":"お金を貸したら、もちろん返してもらいたいですよね。でも、返済をお願いする「取立て」には、こまかなルールがあるんです。\n\nまず時間帯。正当な理由もないのに、社会通念に照らして不適当な時間帯、たとえば午後9時から午前8時までに電話をかけたり訪問したりすることは禁止されています。夜おそくや早朝に連絡が来たら、誰でも不安になってしまいますよね。\n\nそして場所。正当な理由なく、勤務先など自宅以外の場所へ電話・訪問することも禁止です。職場に電話が来たら、まわりに心配をかけてしまいますから。","ex":{"q":"正当な理由なく、夜10時に借りた人の勤務先へ電話をかけた。これはルール違反でしょうか。","point":"不適当な時間帯（例：午後9時〜午前8時）の連絡も、自宅以外への連絡も、正当な理由がなければどちらも禁止です。二重に違反にあたります。"}},{"emoji":"🤐","title":"借金を「まわりに知られない」権利","body":"お金を借りていることは、とてもプライベートなことですよね。だからこそ、それを第三者に知られないように守るルールがあります。\n\nはり紙や立て看板などを使って、その人が借りていることを他の人に明らかにする行為は禁止されています。ご近所さんや同僚に知られてしまったら、暮らしが立ちゆかなくなってしまいますよね。\n\nまた、相手を威迫したり、私生活や業務の平穏を害するような言動も禁止です。大声や乱暴な態度で追いつめることは、決して許されません。これらはすべて、借りた人の心と生活を守るためのルールなのです。"},{"emoji":"🪪","title":"「あなたは誰?」に答えるのが礼儀","body":"取立てをする人にも、守るべき「名乗り」のルールがあります。\n\n請求をするときには、貸金業者の名称や担当者の名前などを、きちんと明らかにしなければなりません。そのために証明書を携帯し、求められれば提示します。\n\n考えてみてください。名前も名乗らない相手から「お金を返して」と言われたら、本当にその会社に借りたのか、詐欺ではないか、不安になりますよね。だから「私は◯◯社の△△です」とはっきり示すことが、相手を守り、信頼される取立ての第一歩なのです。","ex":{"q":"取立てに来た人が、求められても名前や会社名を示さなかった。問題はありますか。","point":"請求時には名称・担当者名などを明らかにし、証明書を携帯・提示する必要があります。名乗らないのはルール違反です。"}},{"emoji":"📢","title":"広告は「盛りすぎ」ちゃダメ","body":"次は宣伝、つまり広告と勧誘のお話です。\n\nお金を貸すサービスの広告で、著しく事実と違うことを言ったり、実際よりずっと有利だと誤解させたりする「誇大広告」は禁止されています。「誰でも必ず借りられる!」のような盛りすぎの表現は、お客さんをだますことになってしまいますよね。\n\nそして、貸付の条件を示して広告するときは、登録番号や貸付利率など、必要な事項をきちんと表示しなければなりません。会社の身元や、いくら利息がかかるのかを正直に見せることで、お客さんが安心して選べるようになるのです。"},{"emoji":"🙅","title":"「いりません」の一言を大切に","body":"最後は、勧誘のマナーです。\n\n契約しない、という意思をはっきり示した相手に対して、しつこく勧誘を続けることは禁止されています。これを「再勧誘の禁止」といいます。\n\n「今は必要ありません」と断ったのに、何度も電話がかかってきたら、うんざりしてしまいますよね。相手の「いりません」という一言を、きちんと受けとめて引きさがる。それがルールです。\n\n取立ても広告も勧誘も、根っこは同じ。相手の暮らしと気持ちを大切にすること。この一本の芯を覚えておけば、きっと迷いませんよ。","ex":{"q":"「契約しません」と断られたのに、翌日また同じ相手に勧誘の電話をかけた。よいでしょうか。","point":"契約しない意思を示した相手へのしつこい勧誘は、再勧誘の禁止にあたり、してはいけません。"}}]},{"id":"hosho","cat":"民法","ic":"🤝","title":"保証のはなし","sub":"「代わりに返す」ってどういうこと？保証人を守るしくみを、いっしょに見ていきましょう","chapters":[{"emoji":"🤝","title":"保証人ってどんな人？","body":"こんにちは。今日は「保証」を学びましょう。よく耳にする「保証人」から始めますね。\n保証人とは、お金を借りた人（これを「主たる債務者」といいます）が返せなくなったとき、代わりに返す義務を負う人のことです。友だちの借金の後ろだてになる、そんなイメージですね。\n大切なのは、保証の約束のしかたです。保証契約は、書面（または電磁的記録、つまりデータでの記録）でしないと効力が生じません。「口約束だけ」では成立しないのです。\nうっかり重い責任を負わないよう、はっきり書面に残す。これが出発点です。","ex":{"q":"友だちに「保証人になってよ」と口約束だけしました。この保証契約は効力を持つでしょうか？","point":"持ちません。保証契約は書面（または電磁的記録）でしないと効力が生じないからですね。"}},{"emoji":"🛡️","title":"ふつうの保証人が持つ2つの盾","body":"ふつうの保証人には、身を守るための「2つの盾」があります。むずかしい名前ですが、中身はやさしいですよ。\n1つめは「催告の抗弁権」。貸主にいきなり請求されても、「まずは本人（借りた人）に請求してくださいね」と言える権利です。\n2つめは「検索の抗弁権」。「本人に返せる財産があるなら、そちらから先に取り立ててください」と言える権利です。\nどちらも、いきなり保証人が全部背負わされないための盾ですね。まずは本人から、というのが基本の順番なのです。","ex":{"q":"貸主からいきなり請求された保証人が「まず本人に請求して」と言える権利を何というでしょう？","point":"「催告の抗弁権」です。もう一つの「検索の抗弁権」とセットで覚えましょう。"}},{"emoji":"⚠️","title":"連帯保証は、ぐっと重い","body":"ここからが要注意です。「連帯保証人」という言葉を聞いたことはありますか。\n連帯保証人には、さきほどの2つの盾（催告の抗弁権・検索の抗弁権）がありません。つまり「まず本人に」も「本人の財産から先に」も言えないのです。\nそのため貸主は、本人を飛ばして、いきなり連帯保証人に全額を請求できます。連帯保証は、ふつうの保証よりずっと重い責任なのですね。\n「保証」と「連帯保証」。名前は似ていますが、負担の重さは大ちがい。ここはしっかり区別しておきましょう。","ex":{"q":"連帯保証人には「催告の抗弁権」と「検索の抗弁権」はあるでしょうか？","point":"ありません。だから貸主はいきなり連帯保証人に全額請求できます。ふつうの保証より重いのですね。"}},{"emoji":"💰","title":"代わりに返したら、取り返せる","body":"「保証人が代わりに返したら、そのお金は返ってこないの？」と心配になりますよね。\nご安心ください。保証人が代わりに返したときは、その分を主たる債務者（本人）に請求できます。これを「求償権」といいます。\nつまり、いったん保証人が立て替えても、あとで本人に「私が払った分を返してね」と請求できるわけですね。\nそして、少し似た立場に「物上保証人」という人もいます。これは自分の財産（不動産など）を担保として差し出す人。ただし、返済そのものの義務は負いません。財産で支える人、と覚えておきましょう。","ex":{"q":"保証人が本人に代わって借金を返しました。立て替えた分を本人に請求できる権利を何というでしょう？","point":"「求償権」です。代わりに返しても、あとで本人に取り返せるのですね。"}},{"emoji":"📈","title":"根保証と、保証人を守るしくみ","body":"最後に「根保証」を見ておきましょう。少し応用ですが、大事なところです。\n根保証とは、将来くり返し発生する、金額の決まっていない（不特定の）借金をまとめて保証する契約のことです。取引が続くたびに増える借金を、丸ごと引き受けるイメージですね。\nこのままだと保証人の負担が青天井になりかねません。そこでルールがあります。個人が保証人になる「個人根保証契約」では、保証する上限額（これを「極度額」といいます）を定めないと効力が生じません。\nこうした一連のしくみは、すべて「安易に重い責任を負わされないよう保証人を守る」ためにあります。お疲れさまでした。","ex":{"q":"個人が保証人になる個人根保証契約で、効力を生じさせるために必ず定める必要があるものは何でしょう？","point":"上限額である「極度額」です。定めないと効力が生じません。保証人を守るための大切なルールですね。"}}]}];
const STORY_BY_ID = Object.fromEntries(STORIES.map(s=>[s.id,s]));
function storyRead(id){ return store.get("story_"+id,false); }
function startStory(id){ S.storyId=id; S.storyCh=0; S.view="story"; render(); window.scrollTo(0,0); }
function storyGo(d){ const s=STORY_BY_ID[S.storyId]; if(!s)return; S.storyCh=Math.max(0,Math.min(s.chapters.length-1,(S.storyCh||0)+d)); render(); window.scrollTo(0,0); }
function finishStory(){ store.set("story_"+S.storyId,true); S.view="storylib"; render(); checkBadges(); }
function storyLibView(){
  const groups={}; STORIES.forEach(s=>{ (groups[s.cat]=groups[s.cat]||[]).push(s); });
  const readN=STORIES.filter(s=>storyRead(s.id)).length;
  const body=Object.keys(groups).map(cat=>`<div class="gcathdr">${esc(cat)}</div>`+groups[cat].map(s=>{
    const done=storyRead(s.id);
    return `<button class="row" onclick="startStory('${s.id}')"><div class="ic${done?" g":""}">${s.ic}</div><div class="tx"><b>${esc(s.title)}${done?' <span class="readtag">読了✓</span>':""}</b><span>${esc(s.sub)} ・ 全${s.chapters.length}章</span></div><div class="chev">›</div></button>`;
  }).join("")).join("");
  return `
  <button class="back" onclick="S.view='practice';render()">← 問題へ</button>
  <header class="top"><h1>物語で学ぶ</h1><div class="days">読了 <b>${readN}</b>/${STORIES.length}本</div></header>
  <p class="note" style="margin:0 0 14px">論点を物語でやさしく理解。用語は青い点線タップで意味が出ます。</p>
  ${body||"<p class='note'>準備中です。</p>"}`;
}
function storyView(){
  const s=STORY_BY_ID[S.storyId]; if(!s){ S.view="storylib"; return storyLibView(); }
  const i=S.storyCh||0, ch=s.chapters[i], last=i===s.chapters.length-1;
  const dots=s.chapters.map((c,ix)=>`<span class="idot ${ix===i?"on":ix<i?"past":""}"></span>`).join("");
  return `
  <button class="back" onclick="S.view='storylib';render()">← 一覧へ</button>
  <div class="introtop"><div class="idots">${dots}</div><div class="ichap">${s.ic} ${i+1} / ${s.chapters.length}</div></div>
  <div class="card introcard">
    <div class="iemoji">${ch.emoji||s.ic}</div>
    <div class="ititle">${esc(ch.title)}</div>
    <div class="ibody">${glossify(esc(ch.body).replace(/\n/g,"<br>"))}</div>
    ${ch.ex?`<div class="exbox"><div class="exlbl">例題で確認</div><div class="exq">${glossify(esc(ch.ex.q).replace(/\n/g,"<br>"))}</div><div class="expt">💡 ${esc(ch.ex.point)}</div></div>`:""}
  </div>
  <div class="navbtns">

// 予想得点: 分野別正答率 × 本試験配点。未着手分野は4択の期待値25%で置く
function predictScore(){

function scoreTrendSvg(big){

  const line=pts.map((v,i)=>`${X(i).toFixed(1)},${Y(v).toFixed(1)}`).join(" ");
  const area=`${pad},${(h-pad).toFixed(1)} ${line} ${(w-pad).toFixed(1)},${(h-pad).toFixed(1)}`;

}

// ---------- quiz sessions ----------
function startSession(qids,mode,examNo){
  if(!qids.length){ alert("該当する問題がありません"); return; }
  S.session={qids,i:0,mode,answers:{},examNo:examNo||null,deadline:mode==="exam"?now()+120*60*1000:null};
  S.view="quiz"; render(); if(mode==="exam") tickTimer();
}
function startDue(){
  const dq=dueQuestions().map(q=>q.id);
  if(dq.length){ startSession(shuffle(dq).slice(0,20),"drill"); }
  else { startCardSession(shuffle(dueCards()).slice(0,30)); }
}
function startQuick(){
  const un=shuffle(unseenList()).slice(0,6);
  const wk=shuffle(weakList()).slice(0,10-un.length);
  let pool=un.concat(wk);
  if(pool.length<10) pool=pool.concat(shuffle(ALL.filter(q=>!pool.includes(q))).slice(0,10-pool.length));
  startSession(shuffle(pool).map(q=>q.id),"drill");
}
function startWeak(){ startSession(weakList().slice(0,15).map(q=>q.id),"drill"); }
function startTopic(t){ startSession(shuffle(ALL.filter(q=>q.topic===t)).map(q=>q.id),"drill"); }
function startFiltered(){
  const c=document.getElementById("selCat").value, t=document.getElementById("selTopic").value;
  if(!c&&!t){ alert("分野か論点を選んでください"); return; }
  startSession(shuffle(ALL.filter(q=>(!c||q.category===c)&&(!t||q.topic===t))).map(q=>q.id),"drill");
}
function startExam(no){ const ex=DATA.exams.find(e=>e.exam===no); startSession(ex.questions.map(q=>q.id),"exam",no); }

function quizView(){
  const ss=S.session,q=byId[ss.qids[ss.i]],ans=ss.answers[q.id],isExam=ss.mode==="exam";

    let cls="choice";
    if(isExam){ if(ans===n)cls+=" sel"; }

    return `<button class="${cls}" onclick="answer(${n})">${CIRC[n]}</button>`; }).join("");
  let fb="";
  if(!isExam&&ans){
    const ok=ans===q.answer;

    fb=`<div class="verdict ${ok?"ok":"ng"}">${ok?"✅ 正解！":"❌ 不正解 — 正答は "+CIRC[q.answer]}</div>

      <div class="tiphint">＊青い点線がついた用語はタップすると意味が出ます</div>
      <details><summary>📖 条文ベースの詳しい解説を見る</summary>${glossify(esc(q.explanation).replace(/\n/g,"<br>"))}</details>
    </div>`:condExpl}

  }
  const qnav=isExam?`<div class="qnav">${ss.qids.map((id,ix)=>`<button class="${ss.answers[id]?"done":""} ${ix===ss.i?"cur":""}" onclick="jump(${ix})">${ix+1}</button>`).join("")}</div>`:"";
  return `
  <button class="back" onclick="quitSession()">← ${isExam?"中断して戻る":"ホームへ"}</button>
  <div class="progress-top"><span>${ss.i+1} / ${ss.qids.length} 問</span>${isExam?`<span class="timer" id="timer">--:--</span>`:`<span>${CATSHORT[q.category]}</span>`}</div>
  <div class="bar" style="margin-bottom:12px"><i style="width:${100*ss.i/ss.qids.length}%"></i></div>

    <div class="qmeta"><span>第${q.exam}回（${q.year}）問${q.no}</span><span>${esc(q.topic)||CATSHORT[q.category]}</span>${histBadge(q)}</div>
    <div class="qtext">${glossify(md(q.text))}</div>
    ${(()=>{const th=techHints(q); return th.length&&!isExam? `<details style="margin-top:10px"><summary style="cursor:pointer;font-size:12.5px;color:var(--purple);font-weight:700">🎓 この問題で使える技（${th.length}）</summary><div class="summ" style="margin-top:8px">${th.map(x=>`<p style="margin-bottom:6px;font-size:12.5px">・${x}</p>`).join("")}</div></details>`:"";})()}

      ${ss.i>0?`<button class="btn ghost" onclick="move(-1)">← 前へ</button>`:""}

        (isExam?`<button class="btn primary" onclick="finishExam()">採点する</button>`:`<button class="btn primary" onclick="quitSession()">終了する</button>`)}
    </div>
    ${qnav}
  </div>`;
}
function histBadge(q){ const h=hist[q.id]; return h&&h.a?`<span>${h.c||0}/${h.a}回正解</span>`:"<span>初見</span>"; }
function answer(n){
  const ss=S.session,q=byId[ss.qids[ss.i]];
  if(ss.mode==="exam"){ ss.answers[q.id]=n; render(); return; }
  if(ss.answers[q.id]) return;
  ss.answers[q.id]=n;
  const ok=n===q.answer;
  const h=hist[q.id]||{}; srsUpdate(h,ok); hist[q.id]=h;
  if(!ok) delete mastered[q.id];
  recordScore(); save(); render();
  maybeCelebrate(); checkBadges();
}
function move(d){ S.session.i=Math.min(Math.max(0,S.session.i+d),S.session.qids.length-1); render(); }
function jump(ix){ S.session.i=ix; render(); }
function quitSession(){ clearInterval(timerHandle); S.session=null; S.view="home"; render(); }

// ---------- exam ----------
let timerHandle=null;
function tickTimer(){
  clearInterval(timerHandle);
  timerHandle=setInterval(()=>{
    const ss=S.session; if(!ss||ss.mode!=="exam"){clearInterval(timerHandle);return;}
    const left=ss.deadline-now();
    if(left<=0){ finishExam(); return; }
    const el=document.getElementById("timer");
    if(el){ const m=Math.floor(left/60000),s=Math.floor(left%60000/1000);
      el.textContent=`⏱ ${String(m).padStart(2,"0")}:${String(s).padStart(2,"0")}`;
      if(left<10*60*1000)el.classList.add("low"); }
  },500);
}
function finishExam(){
  clearInterval(timerHandle);
  const ss=S.session; let score=0; const cat={};
  CATS.forEach(c=>cat[c]={n:0,c:0});
  ss.qids.forEach(id=>{ const q=byId[id],ok=ss.answers[id]===q.answer;
    cat[q.category].n++; if(ok){score++;cat[q.category].c++;}
    const h=hist[id]||{}; srsUpdate(h,ok); hist[id]=h; });
  examResults.push({exam:ss.examNo,score,date:new Date().toISOString().slice(0,10)});
  recordScore(); save();
  S.lastExam={score,cat,examNo:ss.examNo,qids:ss.qids,answers:ss.answers};
  S.session=null; S.view="examResult"; render();
  checkBadges();
}
function examResultView(){
  const r=S.lastExam,pass=r.score>=31;
  const wrongs=r.qids.filter(id=>r.answers[id]!==byId[id].answer);
  return `
  <button class="back" onclick="S.view='home';render()">← ホームへ</button>
  <div class="card center">
    <h2>第${r.examNo}回 本番モード結果</h2>
    <div class="big ${pass?"pass":"fail"}">${r.score} <span style="font-size:16px">/ 50点</span></div>
    <p style="font-weight:700" class="${pass?"pass":"fail"}">${pass?"🎉 合格ライン(31点)突破！":"合格ライン(31点)まであと"+(31-r.score)+"点"}</p>
    <p class="note">直近5年の合格点は28〜33点。安全圏は35点。</p>
    <table class="res">${CATS.map(c=>`<tr><td>${CATSHORT[c]}</td><td>${r.cat[c].c} / ${r.cat[c].n}</td></tr>`).join("")}</table>
  </div>

    <button class="btn primary" onclick='startSession(${JSON.stringify(wrongs)},"drill")'>今すぐ解説つきで復習する</button></div>`:""}`;
}

function cardPickView(){

function startDeckCards(di){ const pool=CARDS.filter(c=>c.deck===DECKS[di].category); startCardSession(shuffle([...pool]).slice(0,25)); }
function startTopicCards(di,ti){ const t=DECKS[di].topics[ti]; const pool=CARDS.filter(c=>c.topic===t.topic&&c.deck===DECKS[di].category); startCardSession([...pool]); }
function cardsView(){
  const cs=S.cardSession,c=cs.cards[cs.i];
  const summ = cs.i===0&&TOPICSUMM[c.topic]&&cs.cards.every(x=>x.topic===c.topic)
    ? `<div class="summ"><div class="cap">📌 ${esc(c.topic)} の要点</div>${esc(TOPICSUMM[c.topic])}</div>`:"";
  let body;
  if(!cs.revealed){
    body=`<div class="fcard">${esc(c.s)}</div>
    <div class="oxrow"><button class="o" onclick="cardAnswer(true)">○</button><button class="x" onclick="cardAnswer(false)">×</button></div>
    <div class="note center">この記述は正しい？</div>`;
  } else {
    const ok=cs.answered===c.o;
    body=`<div class="fcard">${esc(c.s)}</div>
    <div class="verdict ${ok?"ok":"ng"}">${ok?"✅ 正解！":"❌ 不正解"} — この記述は<b>${c.o?"○（正しい）":"×（誤り）"}</b></div>
    <div class="expl"><div class="cap">💡 根拠</div>${esc(c.why)}</div>
    <div class="navbtns"><button class="btn primary" onclick="nextCard()">${cs.i<cs.cards.length-1?"次のカード →":"結果を見る"}</button></div>`;
  }
  return `
  <button class="back" onclick="S.cardSession=null;S.view='cardPick';render()">← カード選択へ</button>
  <div class="progress-top"><span>${cs.i+1} / ${cs.cards.length} 枚</span><span>${esc(c.topic)}</span></div>
  <div class="bar" style="margin-bottom:12px"><i style="width:${100*cs.i/cs.cards.length}%"></i></div>
  ${summ}${body}`;
}
function cardAnswer(v){
  const cs=S.cardSession,c=cs.cards[cs.i];
  cs.answered=v; cs.revealed=true;
  const ok=v===c.o; if(ok)cs.right++;
  const h=chist[c.id]||{}; srsUpdate(h,ok); chist[c.id]=h; save(); render();
  maybeCelebrate(); checkBadges();
}
function nextCard(){
  const cs=S.cardSession;
  if(cs.i<cs.cards.length-1){ cs.i++; cs.revealed=false; cs.answered=null; render(); }
  else { alert(`結果: ${cs.right} / ${cs.cards.length} 正解`); S.cardSession=null; S.view="cardPick"; render(); }
}

function mileDays(m){ return Math.ceil((new Date(m.due+"T23:59:59+09:00")-new Date())/DAY); }
function mileDone(m){ return m.auto? !!m.auto() : !!miles[m.id]; }
function nextMileIdx(){ return MILES.findIndex(m=>!mileDone(m)); }
function nextMile(){ const i=nextMileIdx(); return i<0?null:MILES[i]; }
function mileProgress(m){
  if(!m.auto) return "";
  if(m.id==="basics"){ const seen=CARDS.filter(c=>chist[c.id]&&chist[c.id].a>0).length; return `カード ${seen}/${CARDS.length}枚`; }
  if(m.id==="phase1"){ const cs=catStats(); const t=CATS.filter(c=>cs[c].seen>=5).length; return `${t}/4分野に着手`; }
  if(m.id==="phase2"){ const off=ALL.filter(q=>q.exam>=16&&q.exam<=20); const a=off.reduce((s,q)=>s+((hist[q.id]&&hist[q.id].a)||0),0); return `${Math.min(100,Math.round(a/(off.length*3)*100))}%（3周ぶん）`; }
  if(m.id==="goal35"){ const best=examResults.reduce((b,e)=>Math.max(b,e.score),0); return `最高 ${best}点`; }
  return "";
}
function mileToggle(id){
  const i=MILES.findIndex(m=>m.id===id); if(i<0)return;
  const m=MILES[i]; if(m.auto) return;
  const nx=nextMileIdx(); const ni = nx<0?MILES.length:nx;
  if(i>ni) return;
  if(miles[id]) delete miles[id]; else miles[id]=now();
  save(); render();
}
function bannerHtml(){
  const m=nextMile(); if(!m) return "";
  const d=mileDays(m); const urgent=!m.auto && d<=14;
  const sub = m.auto? `自動で達成を判定します ・ ${mileProgress(m)}` : (d>=0?`あと${d}日・${m.due.slice(5).replace("-","/")}期限`:"期限超過！");

function streak(){
  let s=0; const d=new Date();
  const act=k=>days[k]||frozen[k];
  if(!act(d.toISOString().slice(0,10))) d.setDate(d.getDate()-1);
  while(act(d.toISOString().slice(0,10))){ s++; d.setDate(d.getDate()-1); }
  return s;
}
function calHtml(off){
  const base=new Date(); base.setDate(1); base.setMonth(base.getMonth()+off);
  const y=base.getFullYear(), m=base.getMonth();
  const startDow=new Date(y,m,1).getDay(), dim=new Date(y,m+1,0).getDate();
  const today=new Date().toISOString().slice(0,10);
  let h=`<div style="display:flex;justify-content:space-between;align-items:center;font-size:13px;font-weight:700">
    <button class="back" style="margin:0" onclick="S.calOff--;render()">‹ 前月</button><span>${y}年${m+1}月</span>
    <button class="back" style="margin:0" onclick="S.calOff++;render()">翌月 ›</button></div><div class="cal">`;
  h+=["日","月","火","水","木","金","土"].map(x=>`<div class="h">${x}</div>`).join("");
  for(let i=0;i<startDow;i++) h+="<div></div>";
  for(let dd=1;dd<=dim;dd++){
    const k=`${y}-${String(m+1).padStart(2,"0")}-${String(dd).padStart(2,"0")}`;
    const n=days[k]||0, lv=n>=30?"l3":n>=10?"l2":n>0?"l1":"";
    h+=`<div class="d ${lv} ${k===today?"today":""}" title="${n}問">${dd}</div>`;
  }
  return h+"</div>";
}

// ---------- 合格ロードマップ（独立画面） ----------
const MILE_TIME={intro:"約3分",strategy:"約5分",apply:"約15分",basics:"約3時間",phase1:"約3時間",phase2:"約20時間",goal35:"1回2時間",ticket:"約5分",final:"約30分",exam:"本番2時間"};
function roadmapView(){
  const nx=nextMileIdx(); const niIdx = nx<0?MILES.length:nx;
  const doneN=MILES.filter(mileDone).length;
  const milesHtml=MILES.map((m,i)=>{
    const done=mileDone(m), d=mileDays(m), isNext=i===niIdx, locked=i>niIdx, auto=!!m.auto;
    let dd;
    if(done) dd = auto?`達成 ✓`:`完了 ✓`;
    else if(m.read) dd = `読むと達成`;
    else if(auto) dd = `自動で判定中`;
    else if(locked) dd = `前のステップを終えると解放されます`;
    else dd = d>=0?`期限 ${m.due.slice(5).replace("-","/")}（あと${d}日）`:`<span class="over">期限超過（${m.due.slice(5).replace("-","/")}）</span>`;
    const prog = (!done&&auto)?` ・ ${mileProgress(m)}`:"";
    const tm = MILE_TIME[m.id]?`<span class="miletime">⏱ ${MILE_TIME[m.id]}</span>`:"";
    let chk;
    if(auto) chk=`<div class="chk auto ${done?"done":""}">${done?"✓":(m.read?"📖":"⏳")}</div>`;
    else if(locked) chk=`<div class="chk lock">🔒</div>`;
    else chk=`<button class="chk" onclick="mileToggle('${m.id}')">${done?"✓":""}</button>`;
    const link = (m.link&&isNext)?` ・ <a href="${m.link}" target="_blank" style="color:var(--primary-ink)">申込ページ</a>`:"";
    return `<div class="mile ${done?"done":""} ${locked&&!auto?"locked":""} ${isNext?"next":""}">
      ${chk}
      <div style="flex:1"><div class="lb">${esc(m.label)}${isNext&&!done?' <span class="nowtag">今ここ</span>':""} ${tm}</div>
      <div class="dd ${!done&&!locked&&d<0?"over":""}">${dd}${prog}${m.desc?" ・ "+esc(m.desc):""}${link}</div>
      ${isNext&&m.read&&!done?`<button class="btn primary" style="margin-top:8px" onclick="${m.openFn||"startIntro()"}">▶ ${m.id==="strategy"?"必勝法を読む":"物語を読む"}</button>`:""}</div>
    </div>`; }).join("");
  return `
  <header class="top"><h1>合格ロードマップ</h1><div class="days">本番 ${examDateStr()}<br>あと<b>${daysToExam()}</b>日</div></header>
  <div class="card"><div class="eyebrow">いまの段階</div>${phaseHtml()}
    <div class="note">① 暗記カードと分野別演習で基礎 → ② 過去問を3周（やさしい解説で理解）→ ③ 本番モードで仕上げ。参考書なし・このアプリだけで合格を目指せます。</div></div>
  <div class="card"><h2>ステップ（${doneN} / ${MILES.length} 達成）</h2>
    <div class="roadmap">${milesHtml}</div>
    <div class="note">上から順に進みます。緑は達成済み、「今ここ」が次にやること。⏱は所要時間の目安です。</div></div>`;
}

// ---------- 解法テクニック ----------
const TECHS=[
 ["設問の「適切」「適切でない」をまず○で囲む","この試験最大の事故は「適切でないもの」を問われて「適切なもの」を選ぶこと。問題文を読んだ瞬間、どちらを選ぶのかを問題用紙に大きくマークしてから肢を読む。全部の設問でやる。"],
 ["断定ワードは誤り肢のシグナル","「常に」「一切」「直ちに」「〜に限られる」「〜にかかわらず」を含む肢は誤りであることが多い。法律には必ず例外があるから。逆に「原則として」「〜の場合を除き」と留保がついた肢は正しいことが多い。決め手がないときの最終判断に使う。"],
 ["組合せ問題は2択に落とせる","「①ａｂ ②ａｄ ③ｂｃ ④ｃｄ」型は、確実に分かる肢が1つあれば選択肢が半分に絞れる。例えばａが正しいと確信できれば①②の2択。4つ全部分からなくていい、と知っているだけで心理的にかなり楽になる。"],
 ["数字を見たら「すり替え」を疑う","この試験の誤り肢の最頻出パターンは数字のすり替え。2週間↔30日（届出）、3年↔2年（登録有効期間）、50万↔100万（年収証明書）、20%↔109.5%（出資法）。数字が出たら単位・期間・主体をチェックする癖をつける。暗記カードの数値問題はこのための訓練。"],
 ["主体のすり替えにも注意","「譲渡人↔譲受人」「存続会社↔消滅会社の役員」「内閣総理大臣↔都道府県知事」など、義務を負う人を入れ替えるパターンも頻出。「誰が」やるのかを意識して読む。"],
 ["解く順番: 後ろから前へ","おすすめは 問48〜50（会計）→ 問43〜47（保護）→ 問1〜27（法令）→ 問28〜42（民法）。会計と保護は範囲が狭く短時間で確実に取れる得点源。頭が疲れる前に確保し、時間を食う民法を最後に回す。"],
 ["1問90秒で見切る","2時間50問＝1問2.4分だが、見直しの時間を残すため判断は90秒以内。分からなければ仮マークして問題番号に印をつけ、次へ。毎年2〜3問は誰も解けない難問が混ざっている。31点でいい試験で、満点はいらない。"],
 ["2択で迷ったら「保護に厚い方」","貸金業法の目的は資金需要者等の保護。最後まで絞れないときは、消費者保護に厚い解釈・規制が厳しい方の肢が正解になりやすい。"],
 ["個数問題は暗記カードで殴る","「適切なものの個数」問題は消去法が効かず、全肢の正誤判定が必要。ただし出るのは頻出テーマの焼き直しばかりなので、暗記カードの○×即答訓練がそのまま得点になる。毎年3〜5問、ここで差がつく。"],
 ["マークシートは10問ごとに照合","問題を飛ばした時のマークずれは、気づいた時には手遅れになる。10問解くごとに問題番号とマーク位置が合っているか確認。飛ばした問題も必ず仮マークしておく（無回答は期待値を捨てる行為）。"],
];
function techView(){
  return `
  <button class="back" onclick="S.view='practice';render()">← 問題へ</button>

// ---------- 問題ごとのテクニックヒント ----------
function techHints(q){
  const t=q.text, h=[];
  if(/適切でないもの|該当しないもの|合致しないもの/.test(t)) h.push("⚠️ <b>「〜でないもの」を選ぶ問題</b>。設問の指示を○で囲んでから肢を読む（正しい肢を選ばないこと！）");
  if(/個数/.test(t)&&/１個/.test(t)) h.push("<b>個数問題</b>: 消去法が効かない。ａ〜ｄを1つずつ○×で確定させる。暗記カードの知識をそのまま使う");
  else if(/①　ａ|①　ｂ/.test(t)) h.push("<b>組合せ問題</b>: 確実に分かる肢が1つあれば選択肢は2択に絞れる。自信のある肢から潰す");
  const kw=(t.match(/常に|一切|直ちに|に限られる|にかかわらず|のみ/g)||[]).filter((v,i,a)=>a.indexOf(v)===i);
  if(kw.length) h.push(`<b>断定ワード</b>「${kw.join("」「")}」を含む肢あり。法律には例外があるので誤り肢のシグナルになりやすい`);
  if(/[0-9０-９]+\s*(?:年|か月|週間|日|万円|％|%|割|分の)/.test(t)) h.push("<b>数字あり</b>: 期間・金額・主体のすり替えを疑う（2週間↔30日、3年↔2年、50万↔100万、譲渡人↔譲受人など）");
  return h.slice(0,3);
}

// ---------- ask Claude ----------
function askClaude(qid){
  const q=byId[qid];
  const msg=`【貸金業務取扱主任者 過去問の質問】第${q.exam}回${q.exam===21?"（AI予想模試）":""} 問${q.no}（論点: ${q.topic}）\n\n${q.text}\n\n正答: ${CIRC[q.answer]}\nアプリの解説: ${q.explanation}\n\nこの問題について、なぜこの正答になるのかを条文ベースでより丁寧に解説してください。関連する頻出のひっかけパターンもあれば教えてください。`;
  const done=()=>alert("質問内容をコピーしました。\nClaudeの「貸金業法対策」プロジェクトのチャットに貼り付けて送信してください。");
  if(navigator.clipboard&&navigator.clipboard.writeText){ navigator.clipboard.writeText(msg).then(done).catch(()=>fallbackCopy(msg,done)); }
  else fallbackCopy(msg,done);
}
function fallbackCopy(t,done){
  const ta=document.createElement("textarea"); ta.value=t; document.body.appendChild(ta);
  ta.select(); try{document.execCommand("copy");}catch(e){} document.body.removeChild(ta); done();
}

// ---------- backup ----------
function exportData(){
  const blob=new Blob([JSON.stringify({v:STORE_VERSION,hist,chist,examResults,days,miles,scoreHist,mastered,badges,frozen,freezes,freezeGranted,exported:new Date().toISOString()})],{type:"application/json"});
  const a=document.createElement("a"); a.href=URL.createObjectURL(blob);
  a.download=`kashikin_backup_${new Date().toISOString().slice(0,10)}.json`; a.click();
}
function importData(ev){
  const f=ev.target.files[0]; if(!f)return;
  const r=new FileReader();
  r.onload=()=>{ try{ const d=JSON.parse(r.result);
      if(!d.hist) throw 0;
      hist=d.hist; chist=d.chist||{}; examResults=d.examResults||[];
      if(d.days) days=d.days; if(d.miles) miles=d.miles;
      if(d.scoreHist) scoreHist=d.scoreHist; if(d.mastered) mastered=d.mastered; if(d.badges) badges=d.badges;
      if(d.frozen) frozen=d.frozen; if(typeof d.freezes==="number") freezes=d.freezes; if(typeof d.freezeGranted==="number") freezeGranted=d.freezeGranted;
      save(); migrateStore();
      alert("復元しました（学習履歴・連続日数・やることを含む）"); S.view="home"; render();
    }catch(e){ alert("ファイルを読み込めませんでした"); } };
  r.readAsText(f);
}
