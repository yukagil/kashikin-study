律ではない。"},{"s":"免責許可の決定が確定すると、破産者は破産手続による配当を除き、原則として破産債権について責任を免れる。","o":true,"why":"破産法253条1項本文の免責の効力である。"}]},{"topic":"民事訴訟・執行","summary":"強制執行は原則として執行文の付された債務名義の正本により実施するが、少額訴訟の確定判決等は執行文なしで実施できる例外がある。債権執行における差押命令の効力は第三債務者への送達時に生じる。給与債権は原則4分の3相当額が差押禁止となる。訴えの提起は訴状の提出によるが、簡易裁判所では口頭による提起も認められる。第一審に限り管轄裁判所を合意で定めることができる。","cards":[{"s":"強制執行は、原則として執行文の付された債務名義の正本に基づいて実施する。","o":true,"why":"民事執行法25条本文の原則である。"},{"s":"少額訴訟における確定判決に基づく強制執行は、執行文の付与を受けなくても実施することができる場合がある。","o":true,"why":"民事執行法25条ただし書の例外に該当する。"},{"s":"債権執行における差押命令の効力は、差押命令が債務者に送達された時に生ずる。","o":false,"why":"民事執行法145条5項により差押命令の効力は第三債務者への送達時に生ずる。"},{"s":"給与債権は、原則としてその支払期に受けるべき金額の4分の3に相当する部分が差押禁止となる。","o":true,"why":"民事執行法152条1項の規定である。"},{"s":"訴えの提起は、訴状を裁判所に提出してしなければならないが、簡易裁判所では口頭で訴えを提起することができる。","o":true,"why":"民事訴訟法133条1項・271条の規定である。"},{"s":"当事者は、第一審に限らず控訴審についても管轄裁判所を合意で定めることができる。","o":false,"why":"民事訴訟法11条1項により合意管轄は第一審に限られる。"},{"s":"口頭弁論の続行期日に当事者の一方が出頭しなかった場合に準備書面記載事項を陳述したものとみなす擬制陳述は、簡易裁判所の手続で認められる。","o":true,"why":"民事訴訟法158条は簡易裁判所の手続における特則である。"},{"s":"支配人は、商業登記簿に登記されていることにより、当然に訴訟代理人となることができる。","o":true,"why":"会社法11条1項及び商法上、支配人は裁判上の行為をする権限を有する。"}]},{"topic":"手形・電子記録債権","summary":"裏書の連続する手形の所持人は権利者と推定され、自ら実質的権利を証明する必要がない。手形の善意取得者や人的抗弁が切断された第三者には、振出人と直接の相手方間の事情（詐欺等）を対抗することができない。電子記録債権は発生記録により生じ、譲渡記録により譲渡の効力を生ずる。電子記録名義人への支払は支払者に悪意・重過失がない限り有効である。","cards":[{"s":"裏書の連続する手形の所持人は、適法な所持人と推定され、自ら実質的権利を有することを証明する必要はない。","o":true,"why":"手形法16条1項の権利推定の規定である。"},{"s":"手形の振出人は、直接の相手方に対する人的抗弁事由（詐欺等）を、当該事由につき善意無過失の裏書譲受人に対抗することができる。","o":false,"why":"手形法17条により人的抗弁は善意の第三者に対抗できない（人的抗弁の切断）。"},{"s":"電子記録債権は、原則として発生記録をすることによって生ずる。","o":true,"why":"電子記録債権法15条の規定である。"},{"s":"電子記録債権の譲渡は、譲渡記録をしなければその効力を生じない。","o":true,"why":"電子記録債権法17条の規定である。"},{"s":"電子記録債権について、電子記録名義人に対してした支払は、支払者に悪意又は重大な過失がある場合を除き、その効力を有する。","o":true,"why":"電子記録債権法21条の規定である。"},{"s":"手形の裏書は、被裏書人を指定しない白地式によってすることはできない。","o":false,"why":"手形法13条2項により白地式裏書も認められている。"},{"s":"電子記録債権の発生には、金銭債権の原因となる契約とは別に電子記録が必要であり、その電子記録によって債権の内容が定まる。","o":true,"why":"電子記録債権法9条の電子記録の効力の規定である。"},{"s":"手形の善意取得者は、無権利者から手形の交付を受けた場合であっても、悪意又は重大な過失がない限り手形上の権利を取得する。","o":true,"why":"手形法16条2項の善意取得の規定である。"}]},{"topic":"犯収法","summary":"特定事業者は取引時確認において自然人については本人特定事項に加え取引を行う目的及び職業を確認しなければならない。法人については本人特定事項に加え事業内容の確認が必要であり、代表者からの申告のみでは足りず当該法人が作成した書類等による確認を要する。運転免許証記載の住居と現在の住居が異なる場合は補完的な確認方法が必要である。取引記録・確認記録の保存期間は取引終了後7年間である。","cards":[{"s":"特定事業者は、自然人との特定取引において、本人特定事項に加え、取引を行う目的及び職業を確認しなければならない。","o":true,"why":"犯罪収益移転防止法4条1項の取引時確認事項の規定である。"},{"s":"特定事業者は、法人との特定取引における事業の内容の確認について、当該法人の代表者からの申告のみで足りる。","o":false,"why":"同法施行規則上、代表者の申告のみでなく当該法人が作成した書類等による確認を要する。"},{"s":"運転免許証に記載された住居と現在の住居が異なる場合、当該運転免許証のみで本人特定事項を確認することができる。","o":false,"why":"この場合は補完書類の提示等の追加的な確認方法が必要とされる。"},{"s":"取引時確認をした事項に係る確認記録は、取引関係が終了した日から7年間保存しなければならない。","o":true,"why":"犯罪収益移転防止法6条2項の保存期間の規定である。"},{"s":"特定事業者は、過去に取引時確認を行い確認記録が保存されている顧客との取引であっても、常に改めて取引時確認をしなければならない。","o":false,"why":"同法上、確認記録保存済みの顧客との一定の取引については再確認を要しない場合がある。"},{"s":"会社の代表者が会社のために取引を行う場合、会社についての確認に加え、当該代表者個人の本人特定事項等も確認しなければならない。","o":true,"why":"いわゆる代表者等の確認（自然人の本人特定事項の確認）が必要とされる。"},{"s":"特定取引に係る取引記録等の保存期間は、取引終了後7年間である。","o":true,"why":"犯罪収益移転防止法7条2項の規定である。"},{"s":"金銭の貸付けを内容とする契約に係る保証契約は、原則として犯収法上の特定取引に含まれる。","o":false,"why":"保証契約は原則として特定取引の対象に含まれないものとされている。"}]}]},{"category":"資金需要者等の保護に関すること","topics":[{"topic":"個人情報保護法","summary":"個人情報とは生存する個人に関する情報で特定の個人を識別できるものをいい、要配慮個人情報（人種・信条・病歴・犯罪歴等）は取得に原則本人同意が必要である。個人信用情報機関への個人データ提供は会員間で広く共有されるため、金融分野の個人情報取扱事業者はオプトアウト方式によらず本人の同意を得なければならない。利用目的は通知・公表が原則で、変更は関連性のある合理的範囲内に限られる。漏えい等が生じ財産的被害のおそれがある場合等は対象人数にかかわらず個人情報保護委員会への報告義務が生じる。","cards":[{"s":"個人情報保護法上の個人情報は、生存する個人に関する情報に限られ、死者に関する情報は含まれない。","o":true,"why":"個人情報の定義は生存する個人に関する情報に限定されるためである。"},{"s":"要配慮個人情報には、人種、信条、社会的身分、病歴、犯罪の経歴が含まれる。","o":true,"why":"これらは本人に対する不当な差別・偏見等の不利益が生じないよう特に配慮を要する記述等として政令で定められているためである。"},{"s":"個人信用情報機関へ個人データを提供する場合、金融分野における個人情報取扱事業者はオプトアウト方式により本人の同意なく提供できる。","o":false,"why":"与信事業に係る個人の返済能力に関する情報の第三者提供にオプトアウト方式を用いることは認められておらず、原則として本人の同意が必要だからである。"},{"s":"クレジットカード番号や電話番号は、個人情報保護法上の個人識別符号に該当する。","o":false,"why":"個人識別符号は政令で定める身体的特徴のデータや公的な番号（マイナンバー等）に限られ、クレジットカード番号や電話番号は原則含まれないためである。"},{"s":"個人情報取扱事業者は、取得の状況からみて利用目的が明らかであると認められる場合、改めて本人へ利用目的を通知・公表する必要はない。","o":true,"why":"利用目的が取得状況から明らかな場合は通知・公表義務の例外とされているためである。"},{"s":"個人情報取扱事業者は、本人が自ら公表している個人情報を取得した場合、利用目的の通知・公表義務を一律に免除される。","o":false,"why":"本人の自発的公表を理由に通知・公表義務が一律に免除される規定はなく、原則として通知又は公表を要するためである。"},{"s":"利用目的の変更は、変更前の利用目的と関連性を有すると合理的に認められる範囲内でのみ認められる。","o":true,"why":"その範囲を超える変更には改めて本人の同意が必要とされているためである。"},{"s":"不正な利益を図る目的で個人情報データベース等を第三者に提供する行為は、個人情報保護法上の刑事罰の対象となる。","o":true,"why":"個人情報データベース等不正提供罪として刑事罰が定められているためである。"},{"s":"個人データの漏えい等が発生した場合、対象人数が1,000人を超えない限り個人情報保護委員会への報告義務は生じない。","o":false,"why":"不正利用により財産的被害が生じるおそれがある漏えい等は、対象人数にかかわらず報告対象事態に該当するためである。"},{"s":"個人データについて高度な暗号化等の秘匿化措置が講じられている場合、漏えい等が生じても報告対象事態から除外され得る。","o":true,"why":"高度な暗号化等の措置により実質的に被害のおそれがないと認められる場合は報告対象事態の除外要件を満たし得るためである。"}]},{"topic":"消費者契約法","summary":"事業者が重要事項について事実と異なることを告げた場合の不実告知や、不退去・退去妨害による困惑を理由とする意思表示は無効ではなく取り消すことができるにとどまる。取消権は追認をすることができる時から1年間、契約締結の時から5年間行使しないときに時効消滅する。消費者が後見開始等の審判を受けたことのみを理由に事業者に解除権を付与する条項（消費者が対価を負担する契約を除く）や、消費者の利益を一方的に害する不当条項は無効である。損害賠償額の予定条項は平均的損害額を超える部分のみが無効となり、条項全体が無効になるわけではない。適格消費者団体は事業者の不当な勧誘行為等について差止請求権を有する。","cards":[{"s":"事業者の不実告知により誤認して締結した消費者契約は、当然に無効となる。","o":false,"why":"不実告知による誤認に基づく意思表示は無効ではなく、取り消すことができるにとどまるためである。"},{"s":"消費者契約法上の取消権は、追認をすることができる時から1年間行わないときは時効によって消滅する。","o":true,"why":"取消権の行使期間は追認可能時から1年間、契約締結時から5年間と定められているためである。"},{"s":"消費者契約法上の取消権は、契約締結の時から5年を経過したときも時効によって消滅する。","o":true,"why":"追認可能時からの1年間の期間制限とは別に、契約締結時からの5年間の期間制限も定められているためである。"},{"s":"消費者契約法上の取消権は、追認をすることができる時から6か月間行わないときに時効消滅する。","o":false,"why":"正しい期間は6か月ではなく1年間であるためである。"},{"s":"消費者が後見開始の審判を受けたことのみを理由として事業者に解除権を付与する条項は、消費者が対価を提供する契約を除き無効である。","o":true,"why":"消費者の権利を不当に制限する不当条項として無効とされているためである。"},{"s":"消費者契約における損害賠償額の予定条項は、平均的損害額を超える部分のみでなく条項全体が無効となる。","o":false,"why":"平均的損害額を超える部分のみが無効となり、条項全体が無効になるわけではないためである。"},{"s":"消費者契約法には、クーリング・オフのような無条件解除権を一般的に付与する規定が存在する。","o":false,"why":"無条件解除権（クーリング・オフ）は特定商取引法等の個別法の制度であり、消費者契約法に一般的な規定はないためである。"},{"s":"不退去により困惑して行った消費者契約の申込みの意思表示は、取り消すことができる。","o":true,"why":"事業者が退去すべき旨を告げたにもかかわらず退去しないこと（不退去）による困惑類型の取消事由に該当するためである。"},{"s":"適格消費者団体は、事業者が不特定多数の消費者に対し重要事項について事実と異なることを告げる行為を行うおそれがあるときは、その差止めを請求できる。","o":true,"why":"消費者契約法は適格消費者団体に不当な勧誘行為等の差止請求権を認めているためである。"},{"s":"消費者の利益を一方的に害する不当条項で、消費者の不作為をもって新たな契約の申込みをしたものとみなす条項は、取り消すことができるにとどまる。","o":false,"why":"このような不当条項は取消しの対象ではなく、無効とされるためである。"}]},{"topic":"景品表示法","summary":"優良誤認表示（商品・役務の内容についての著しい優良誤認）については、内閣総理大臣が期間を定めて裏付けとなる合理的根拠資料の提出を求めることができ、提出がない場合は不当表示とみなす不実証広告規制が適用される。この規制は価格その他の取引条件についての有利誤認表示には適用されない。景品類とは取引に付随して提供される物品・金銭その他の経済上の利益をいう。表示等の規制に関しては公正取引委員会の意見聴取や消費者委員会への諮問等の手続が定められている。措置命令に違反した場合等は刑事罰の対象となり得る。","cards":[{"s":"不実証広告規制（合理的根拠資料の提出要求）は、優良誤認表示だけでなく有利誤認表示にも適用される。","o":false,"why":"不実証広告規制は商品・役務の内容についての優良誤認表示にのみ適用され、取引条件についての有利誤認表示には適用されないためである。"},{"s":"優良誤認表示の疑いがある場合、内閣総理大臣は事業者に対し期間を定めて表示の裏付けとなる合理的根拠資料の提出を求めることができる。","o":true,"why":"不実証広告規制として、商品内容の優良誤認表示について根拠資料提出要求の制度が設けられているためである。"},{"s":"不実証広告規制において事業者が期間内に合理的根拠資料を提出しないときは、当該表示は不当表示とみなされる。","o":true,"why":"資料不提出の場合は不当表示とみなす旨が法律上定められているためである。"},{"s":"景品表示法上の景品類とは、取引に付随することを問わず提供される経済上の利益全般をいう。","o":false,"why":"景品類の定義は「取引に付随して」提供される物品・金銭その他の経済上の利益に限られるためである。"},{"s":"景品表示法上の「表示」には、商品の内容や取引条件について顧客を誘引するための手段としての広告等が含まれる。","o":true,"why":"表示とは顧客を誘引するための手段として事業者が行う広告その他の表示を指すためである。"},{"s":"価格に関する有利誤認表示について、事業者が裏付け資料を提出できなければ直ちに不当表示とみなされる。","o":false,"why":"不実証広告規制（提出できない場合に不当表示とみなす制度）は有利誤認表示には適用されないためである。"},{"s":"措置命令に違反した事業者は、行政指導にとどまらず刑事罰の対象となり得る。","o":true,"why":"景品表示法上、措置命令違反には罰則が定められているためである。"},{"s":"内閣総理大臣が表示等の規制に関する重要事項を定めるに当たっては、公正取引委員会の意見を聴く等の手続が予定されている。","o":true,"why":"景品表示法の運用に関しては関係機関への意見聴取等の手続が設けられているためである。"}]},{"topic":"自主規制規則","summary":"貸金業者向けの自主規制基本規則では、勧誘に先立ち相手方の意向を確認し、契約を締結しない旨の意思（勧誘拒絶）を示した者に対しては当該取引及び類似取引の勧誘を継続して行ってはならないとされ、一律に「1年間」等の画一的期間で区切る規定ではない点に注意を要する。契約内容の理解が困難と認められる者への勧誘は禁止される。勧誘リストには個人信用情報を記載しないよう留意すべきとされる。貸付自粛制度では本人による申告のほか、配偶者等の第三者による申告が一定要件のもとで認められ、本人はいつでも自ら申告を取り消すことができる。","cards":[{"s":"自主規制基本規則上、契約を締結しない旨の意思表示（勧誘拒絶）をした者に対しては、当該取引及び類似取引について勧誘を行ってはならない。","o":true,"why":"勧誘拒絶者への再勧誘は当該取引及び類似取引について禁止されるためである。"},{"s":"自主規制基本規則上、勧誘拒絶をした者への再勧誘禁止期間は一律に1年間と定められている。","o":false,"why":"画一的に1年間と区切る規定ではなく、当該取引及び類似取引について勧誘を行ってはならない旨が定められているにとどまるためである。"},{"s":"自主規制基本規則上、契約内容を理解することが困難と認められる者に対して勧誘を行うことは禁止される。","o":true,"why":"資金需要者等の保護の観点から、理解困難な者への勧誘は禁止行為とされているためである。"},{"s":"勧誘リストの作成に当たっては、個人信用情報を記載しないよう留意すべきとされている。","o":true,"why":"個人信用情報の目的外利用を防ぐ観点から、勧誘リストへの記載を避けるべきとされているためである。"},{"s":"貸付自粛制度において、配偶者等の第三者が本人に代わって自粛の申告をすることは一切認められていない。","o":false,"why":"所在不明・生命身体財産保護の必要性・同意取得困難等の要件を満たす場合は、配偶者等の第三者申告が認められているためである。"},{"s":"貸付自粛制度において、自粛対象者本人はいつでも自らの貸付自粛の申告を取り消すことができる。","o":true,"why":"自粛は本人保護のための制度であり、本人の意思による取消しがいつでも認められているためである。"},{"s":"貸付自粛情報は、申告者による撤回・取消しがない限り、永久に抹消されることはない。","o":false,"why":"撤回・取消しがなくても、一定の登録期間の経過等により抹消され得るためである。"},{"s":"協会員が個人向け貸付けに係るテレビCMや新聞広告等を出稿する際は、協会の広告審査機関の事前承認を得なければならない。","o":true,"why":"自主規制規則上、一定媒体への広告出稿には事前の広告審査が義務付けられているためである。"},{"s":"貸付自粛情報の提供を受けた協会員は、新規貸付けを行わないための必要な措置を講ずるよう努めなければならない。","o":true,"why":"貸付自粛制度の実効性確保のため、情報提供を受けた協会員に努力義務が課されているためである。"}]},{"topic":"紛争解決","summary":"貸金業務等関連苦情とは契約者等による貸金業者に対する不満足の表明であり、自主的な交渉では解決できないものをいう。日本貸金業協会に加入しない貸金業者は指定紛争解決機関との間で手続実施基本契約を締結する等の措置を講じ、その相手方を公表しなければならない。指定紛争解決機関の商号又は名称は契約締結前書面及び契約締結時書面の双方に表示しなければならない。紛争解決手続は原則として非公開とされ、加入貸金業者は指定紛争解決機関からの手続応諾や事情聴取・資料提出要求を正当な理由なく拒むことができない。特別調停案について協会員は原則として受諾義務を負う。","cards":[{"s":"貸金業務等関連苦情とは、契約者等による貸金業者に対する不満足の表明であって自主的な交渉では解決できないものをいい、当事者が和解できるものに限られる。","o":false,"why":"和解可能性は紛争処理手続（あっせん等）の対象要件であり、苦情の定義自体に和解可能性の限定はないためである。"},{"s":"日本貸金業協会に加入しない貸金業者は、指定紛争解決機関との間で手続実施基本契約を締結する措置を講じ、その相手方を公表しなければならない。","o":true,"why":"未加入業者にも紛争解決の実効性を確保するための法定義務であるためである。"},{"s":"指定紛争解決機関の商号又は名称は、契約締結時書面には表示するが、契約締結前書面には表示する必要はない。","o":false,"why":"指定紛争解決機関の商号又は名称は契約締結前書面と契約締結時書面の双方に表示しなければならないためである。"},{"s":"貸金業に関する紛争解決手続は、原則として非公開で行われる。","o":true,"why":"当事者のプライバシーや円滑な解決の観点から、手続は原則非公開とされているためである。"},{"s":"加入貸金業者は、指定紛争解決機関等からの手続応諾の求めを、正当な理由なく拒むことができる。","o":false,"why":"正当な理由がない限り手続応諾の求めを拒むことはできないためである。"},{"s":"特別調停案が提示された場合、協会員は原則としてこれを受諾する義務を負う。","o":true,"why":"特別調停案には協会員に対する原則的な受諾義務が定められているためである。"},{"s":"紛争解決手続開始の申立ては、契約者等からのみ行うことができ、加入貸金業者から行うことはできない。","o":false,"why":"紛争解決手続開始の申立ては契約者等だけでなく加入貸金業者からも行うことができるためである。"},{"s":"訴訟が係属中の紛争について紛争解決手続が開始された場合、その事実等を指定紛争解決機関に報告しなければならない。","o":true,"why":"手続の重複や整合性確保のため、訴訟係属の事実等の報告義務が定められているためである。"},{"s":"苦情処理手続が開始された事案について当事者間で直接交渉を行った場合、協会員等は苦情受付課へその内容を報告する必要はない。","o":false,"why":"交渉の日時・場所・手法・内容等を苦情受付課に報告しなければならないとされているためである。"}]}]},{"category":"財務及び会計に関すること","topics":[{"topic":"企業会計原則","summary":"企業会計原則は一般原則・損益計算書原則・貸借対照表原則から成り、うち一般原則は真実性・正規の簿記・資本取引と損益取引の区分・明瞭性・継続性・保守主義・単一性の7原則で構成される。真実性の原則は他の6原則の上位規範として位置づけられる。正規の簿記の原則は正確な会計帳簿の作成を求め、資本取引・損益取引区分の原則は資本剰余金と利益剰余金の混同を禁止する。継続性の原則は会計処理の期間比較可能性を確保し、保守主義の原則は過度に保守的な会計処理までは求めない点に注意が必要である。単一性の原則は異なる目的で異なる形式の財務諸表を作成すること自体は許容しつつ、実質的な内容は単一の会計記録に基づくべきとする原則である。","cards":[{"s":"企業会計原則の一般原則は、真実性の原則・正規の簿記の原則・資本取引と損益取引の区分の原則・明瞭性の原則・継続性の原則・保守主義の原則・単一性の原則の7つである。","o":true,"why":"一般原則は全部で7つであり、この名称と数は頻出の基本事項である。"},{"s":"真実性の原則は、企業会計は企業の財政状態及び経営成績に関して真実な報告を提供するものでなければならないとする原則であり、他の一般原則の上位規範として位置づけられる。","o":true,"why":"真実性の原則は企業会計原則の最上位にある基本原則である。"},{"s":"正規の簿記の原則とは、株主総会提出用・信用目的用・租税目的用など複数の目的のために異なる形式の財務諸表を作成してはならないとする原則である。","o":false,"why":"これは単一性の原則の内容である。正規の簿記の原則は、すべての取引につき正規の簿記の原則に従って正確な会計帳簿を作成すべきとする原則である。"},{"s":"資本取引と損益取引を明瞭に区別し、特に資本剰余金と利益剰余金とを混同してはならないとする原則を、資本取引・損益取引区分の原則という。","o":true,"why":"資本剰余金（元手）と利益剰余金（成果）の混同禁止は本原則の核心である。"},{"s":"明瞭性の原則とは、企業会計は財務諸表によって利害関係者に対し必要な会計事実を明瞭に表示し、企業の状況に関する判断を誤らせないようにしなければならないとする原則である。","o":true,"why":"利害関係者への明瞭な開示を求める原則であり、注記や区分表示の根拠となる。"},{"s":"継続性の原則とは、企業会計はその処理の原則及び手続を毎期継続して適用し、みだりにこれを変更してはならないとする原則であり、期間比較を可能にする目的がある。","o":true,"why":"会計処理の変更を恣意的に行うことを禁じ、財務諸表の期間比較可能性を確保する原則である。"},{"s":"保守主義の原則とは、企業の財政に不利な影響を及ぼす可能性がある場合には、企業の財務内容につきできる限り健全な会計処理をしなければならないという原則であり、この原則に基づけばより保守的な会計処理ほど常に望ましいとされる。","o":false,"why":"保守主義の原則は健全な会計処理を求めるものであるが、過度に保守的な会計処理（過度の引当金計上等）は真実性の原則に反するため認められない。"},{"s":"単一性の原則とは、株主総会提出用・信用目的用・租税目的用等種々の目的のために異なる形式の財務諸表を作成すること自体は認めつつ、その実質的内容は信頼しうる単一の会計記録に基づいた正確なものでなければならないとする原則である。","o":true,"why":"形式の相違は許容するが、基礎となる会計記録は単一・正確でなければならない点がポイントである。"},{"s":"企業会計原則には「事業・財務収益区分の原則」という独立した一般原則が存在し、正常な収益と附随的な収益を区分すべき旨を定めている。","o":false,"why":"そのような名称の独立した一般原則は存在しない。正常な収益と附随的な収益の区分に関する趣旨は明瞭性の原則等の一部に含まれる考え方であり、独立の原則名として扱う点が誤りである。"},{"s":"多額な取引の内容を財務諸表に注記すべきことは、明瞭性の原則の一内容であり、これを「正確性の原則」と呼ぶことはない。","o":true,"why":"「正確性の原則」という名称の一般原則は存在せず、この内容は明瞭性の原則に含まれる。名称のすり替えに注意する。"}]},{"topic":"貸借対照表","summary":"会社計算規則上、貸借対照表の資産の部は流動資産・固定資産・繰延資産の3区分に分かれ、固定資産はさらに有形固定資産・無形固定資産・投資その他の資産に細分される。負債の部は流動負債及び固定負債の2区分のみであり、独立した「引当金その他の負債」区分は存在しない。純資産の部は株主資本・評価換算差額等・株式引受権・新株予約権の4区分に分かれる。資産の部合計から負債の部合計を控除した額は純資産の部合計と一致する（貸借対照表等式）。1年基準（ワン・イヤー・ルール）により流動・固定の区分が行われる点も基本である。","cards":[{"s":"会社計算規則上、貸借対照表の資産の部は、流動資産、固定資産及び繰延資産に区分される。","o":true,"why":"資産の部の大区分は流動資産・固定資産・繰延資産の3つである。"},{"s":"会社計算規則上、貸借対照表の資産の部は、流動資産、固定資産及び投資その他の資産の3つに区分される。","o":false,"why":"「投資その他の資産」は資産の部の大区分ではなく、固定資産のさらに下の中区分（有形固定資産・無形固定資産・投資その他の資産の一つ）である。大区分は流動資産・固定資産・繰延資産である。"},{"s":"貸借対照表における固定資産は、さらに有形固定資産、無形固定資産及び投資その他の資産に細分される。","o":true,"why":"固定資産の内訳区分として頻出の3分類である。"},{"s":"会社計算規則上、貸借対照表の負債の部は、流動負債、固定負債及び引当金その他の負債の3つに区分される。","o":false,"why":"負債の部は流動負債及び固定負債の2区分のみであり、独立した「引当金その他の負債」という区分は設けられていない。"},{"s":"会社計算規則上、貸借対照表の負債の部は、流動負債及び固定負債に区分される。","o":true,"why":"負債の部の区分は流動・固定の2区分のみである点を資産・純資産の区分数と混同しないよう注意する。"},{"s":"株式会社の貸借対照表における純資産の部は、株主資本、評価・換算差額等、株式引受権及び新株予約権に区分される。","o":true,"why":"純資産の部の4区分は頻出であり、資産・負債の区分数（3・2）と対比して覚える。"},{"s":"貸借対照表において、資産の部の合計額から負債の部の合計額を控除した額は、純資産の部の合計額と一致する。","o":true,"why":"資産＝負債＋純資産という貸借対照表等式の帰結であり、基本かつ頻出の関係式である。"},{"s":"貸借対照表における資産及び負債の流動・固定の区分は、原則として決算日の翌日から起算して2年以内に現金化・費用化されるかどうかを基準に行われる。","o":false,"why":"流動・固定の区分基準は原則として1年以内かどうかによる、いわゆる1年基準（ワン・イヤー・ルール）であり、2年ではない。"},{"s":"1年内に期限が到来しない預金を除く現金及び預金は、貸借対照表上、流動資産に区分される。","o":true,"why":"現金及び要求払・短期の預金は原則として流動資産に含まれる典型例である。"},{"s":"社債は、貸借対照表上、原則として流動負債に区分される。","o":false,"why":"社債は原則として1年を超えて存続する長期の負債であるため、固定負債に区分される。"},{"s":"純資産の部のうち「評価・換算差額等」は、その他有価証券評価差額金や繰延ヘッジ損益など、未実現の評価差額を計上する区分である。","o":true,"why":"評価・換算差額等は株主資本以外の純資産項目のうち、時価評価等に伴う未実現差額を扱う区分である。"}]},{"topic":"損益計算書","summary":"会社計算規則上、損益計算書は売上高・売上原価・販売費及び一般管理費・営業外収益・営業外費用・特別利益・特別損失の各項目に区分して表示する。段階利益は、売上高から売上原価を控除した売上総利益、そこから販管費を控除した営業利益、営業利益に営業外収益を加え営業外費用を控除した経常利益、経常利益に特別利益を加え特別損失を控除した税引前当期純利益、そこから法人税等を控除した当期純利益という順に計算される。特別損益は経常利益ではなく税引前当期純利益の算定にのみ関与する点が頻出のひっかけ箇所である。","cards":[{"s":"損益計算書における売上総利益は、売上高から売上原価を控除して算定される。","o":true,"why":"売上総利益＝売上高－売上原価であり、販管費はまだ控除しない段階である。"},{"s":"損益計算書における売上総利益は、売上高から売上原価及び販売費及び一般管理費を控除して算定される。","o":false,"why":"販売費及び一般管理費まで控除したものは営業利益であり、売上総利益は売上原価のみを控除した額である。"},{"s":"損益計算書における営業利益は、売上総利益から販売費及び一般管理費を控除して算定される。","o":true,"why":"営業利益＝売上総利益－販管費であり、企業の本業による利益を示す。"},{"s":"損益計算書における経常利益は、営業利益に営業外収益を加算し、営業外費用を控除して算定され、特別利益・特別損失はこの段階の計算には含まれない。","o":true,"why":"経常利益の算定に特別損益は含まれない点が最頻出のひっかけポイントである。"},{"s":"損益計算書における経常利益は、営業利益に特別利益を加算し、特別損失を控除して算定される。","o":false,"why":"経常利益の算定に用いるのは営業外収益・営業外費用であり、特別利益・特別損失は税引前当期純利益の算定に用いる項目である。"},{"s":"損益計算書における税引前当期純利益は、経常利益に特別利益を加算し、特別損失を控除して算定される。","o":true,"why":"税引前当期純利益＝経常利益＋特別利益－特別損失という計算構造である。"},{"s":"損益計算書における当期純利益は、経常利益から法人税等を控除して算定される。","o":false,"why":"当期純利益は経常利益からではなく、特別損益を加減した税引前当期純利益から法人税等を控除して算定される。"},{"s":"損益計算書における当期純利益は、税引前当期純利益から法人税等を控除して算定される。","o":true,"why":"段階利益の最終段階であり、当期純利益＝税引前当期純利益－法人税等である。"},{"s":"会社計算規則上、損益計算書は、売上高、売上原価、販売費及び一般管理費、営業外収益、営業外費用、特別利益及び特別損失の各項目に区分して表示しなければならない。","o":true,"why":"損益計算書の法定区分項目として頻出であり、段階利益の計算構造の基礎となる。"},{"s":"損益計算書には、経常利益の算定過程において「営業外利益」という区分が設けられ、営業外収益と営業外費用が相殺されて表示される。","o":false,"why":"「営業外利益」という区分名は存在しない。営業外収益と営業外費用は別個の項目として営業利益に加減され経常利益が算定される。"}]},{"topic":"キャッシュフロー","summary":"キャッシュ・フロー計算書は、営業活動によるキャッシュ・フロー、投資活動によるキャッシュ・フロー、財務活動によるキャッシュ・フローの3区分で表示される。営業活動によるキャッシュ・フローには本業に関する収支のほか、間接法では減価償却費のような資金の増減を伴わない損益項目の調整も含まれる。投資活動によるキャッシュ・フローには有形固定資産の取得・売却、貸付け及び回収に関する収支が含まれる。財務活動によるキャッシュ・フローには借入れ・返済、社債の発行・償還、株式の発行による収入等が含まれる。","cards":[{"s":"キャッシュ・フロー計算書は、営業活動によるキャッシュ・フロー、投資活動によるキャッシュ・フロー及び財務活動によるキャッシュ・フローの3つの区分により表示される。","o":true,"why":"キャッシュ・フロー計算書の3区分は頻出の基本事項である。"},{"s":"キャッシュ・フロー計算書は、営業活動、投資活動、財務活動及び特別活動によるキャッシュ・フローの4つの区分により表示される。","o":false,"why":"「特別活動によるキャッシュ・フロー」という区分は存在しない。区分は営業・投資・財務の3つのみである。"},{"s":"間接法による営業活動によるキャッシュ・フローの区分には、減価償却費など損益計算書上の費用のうち資金の増減を伴わない項目が調整項目として掲記される。","o":true,"why":"間接法は税引前当期純利益を起点に非資金損益項目等を調整して営業CFを算定する方式である。"},{"s":"長期借入れによる収入及び長期借入金の返済による支出は、キャッシュ・フロー計算書上、投資活動によるキャッシュ・フローの区分に掲記される。","o":false,"why":"借入れ・返済に関する収支は財務活動によるキャッシュ・フローの区分に掲記される。"},{"s":"社債の償還による支出及び株式の発行による収入は、キャッシュ・フロー計算書上、財務活動によるキャッシュ・フローの区分に掲記される。","o":true,"why":"資金調達・返済に関する項目は財務活動区分に分類される典型例である。"},{"s":"貸付けによる支出及び貸付金の回収による収入は、キャッシュ・フロー計算書上、投資活動によるキャッシュ・フローの区分に掲記される。","o":true,"why":"資金の貸付け・回収は投資活動によるキャッシュ・フローに分類される。"},{"s":"有形固定資産の取得による支出は、キャッシュ・フロー計算書上、営業活動によるキャッシュ・フローの区分に掲記される。","o":false,"why":"有形固定資産の取得・売却に関する支出・収入は投資活動によるキャッシュ・フローの区分に掲記される。"},{"s":"商品の販売による収入や仕入れによる支出など、企業の主たる営業活動から生じる収支は、営業活動によるキャッシュ・フローの区分に掲記される。","o":true,"why":"本業に関する日常的な収支は営業活動によるキャッシュ・フローの中心的な内容である。"},{"s":"株式の発行による収入は、キャッシュ・フロー計算書上、投資活動によるキャッシュ・フローの区分に掲記される。","o":false,"why":"株式発行による資金調達は財務活動によるキャッシュ・フローの区分に掲記され、投資活動ではない。"}]}]}];

// ---------- storage ----------
const store = {
  get(k,d){ try{ const v=localStorage.getItem("kashikin_"+k); return v?JSON.parse(v):d; }catch(e){ return d; } },
  set(k,v){ try{ localStorage.setItem("kashikin_"+k, JSON.stringify(v)); }catch(e){} }
};
let hist = store.get("hist",{});            // qid -> {a,c,w,t,iv,due}
let chist = store.get("chist",{});          // cardId -> {a,c,w,t,iv,due}
let examResults = store.get("examResults",[]);
let days = store.get("days",{});            // "YYYY-MM-DD" -> 解答数（学習カレンダー用）
let miles = store.get("miles",{});          // milestoneId -> 完了日時
let scoreHist = store.get("scoreHist",{});  // "YYYY-MM-DD" -> 予想得点（推移グラフ用）
let mastered = store.get("mastered",{});    // qid -> true（間違いノートで「覚えた」）
let badges = store.get("badges",{});        // badgeId -> 獲得日
let frozen = store.get("frozen",{});        // "YYYY-MM-DD" -> true（ストリーク保護で凍結した日）
let freezes = store.get("freezes",2);       // 残ストリークフリーズ数
let freezeGranted = store.get("freezeGranted",0);
let celebrated = store.get("celebrated","");// 最後に目標達成演出を出した日
const STORE_VERSION = 4;
const save = ()=>{ store.set("hist",hist); store.set("chist",chist); store.set("examResults",examResults); store.set("days",days); store.set("miles",miles); store.set("scoreHist",scoreHist); store.set("mastered",mastered); store.set("badges",badges); store.set("frozen",frozen); store.set("freezes",freezes); store.set("freezeGranted",freezeGranted); store.set("celebrated",celebrated); store.set("ver",STORE_VERSION); };
// 表示テーマ（自動/ライト/ダーク）
function applyTheme(){
  const t=store.get("theme","auto"); const r=document.documentElement;
  if(t==="auto") r.removeAttribute("data-theme"); else r.setAttribute("data-theme",t);
  const dark = t==="dark" || (t==="auto" && window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches);
  const mt=document.querySelector('meta[name="theme-color"]'); if(mt) mt.setAttribute("content", dark?"#0d1020":"#3b5bdb");
}
function setTheme(t){ store.set("theme",t); applyTheme(); render(); }

// 将来のリリースで学習記録を失わないためのマイグレーション。localStorageは更新をまたいで残るので、
// スキーマ変更時はここで旧データを新形式へ変換する（データは消さない）。
function migrateStore(){
  let v=store.get("ver",1);
  if(v<3){
    // v3: 一部マイルストーンを自動判定化。旧「手動チェック済み」フラグのうち自動項目分を掃除
    if(miles && typeof miles==="object"){ ["basics","phase1","phase2","goal35","text"].forEach(id=>{ if(miles[id]!==undefined) delete miles[id]; }); }
    v=3;
  }
  store.set("ver",STORE_VERSION); save();
}

const GLOSSARY={"貸金業":{"yomi":"かしきんぎょう","cat":"用語","def":"お金を貸したり、貸し借りの仲立ちをしたりすることを仕事（業）として行うこと。ただし銀行や物品販売に付随する貸付けなどは除かれます。"},"貸金業者":{"yomi":"かしきんぎょうしゃ","cat":"用語","def":"内閣総理大臣または都道府県知事の登録を受けて貸金業を営む人・会社のこと。登録なしに営むと違法です。"},"貸付け":{"yomi":"かしつけ","cat":"用語","def":"お金を貸すこと。手形の割引や売渡担保など、実質的にお金を渡す方法も含みます。"},"貸付けの契約":{"yomi":"かしつけのけいやく","cat":"用語","def":"お金を貸す契約と、それに関する保証契約の両方を指します。"},"債務者":{"yomi":"さいむしゃ","cat":"用語","def":"お金を借りて返す義務を負っている人のこと。"},"債務者等":{"yomi":"さいむしゃとう","cat":"用語","def":"お金を借りた人（債務者）だけでなく、過去に借りていた人、保証人・元保証人、物上保証人なども含む広い言葉です。"},"資金需要者等":{"yomi":"しきんじゅようしゃとう","cat":"用語","def":"お金を借りたい人や借りている人、その保証人など、貸金業者の相手方となる人たちをまとめた言い方です。"},"顧客等":{"yomi":"きゃくとう","cat":"用語","def":"貸金業者と取引する相手（借りる人や保証人になる人など）のことです。"},"極度方式基本契約":{"yomi":"きょくどほうしききほんけいやく","cat":"契約","def":"あらかじめ決めた限度額（極度額）の範囲内で、何度でも借りたり返したりできる契約。カードローンがこの形です。"},"極度額":{"yomi":"きょくどがく","cat":"契約","def":"極度方式の契約で「ここまでなら借りてよい」と決められた上限金額のことです。"},"住宅資金貸付契約":{"yomi":"じゅうたくしきんかしつけけいやく","cat":"契約","def":"住宅の建設・購入だけでなく、リフォーム（改良）資金の貸付けも含む契約。総量規制の例外になります。"},"保証契約":{"yomi":"ほしょうけいやく","cat":"契約","def":"借りた人が返せないとき、代わりに返す約束をする契約のこと。"},"根保証契約":{"yomi":"ねほしょうけいやく","cat":"契約","def":"将来くり返し発生する複数の借金をまとめて保証する契約。保証する上限額（極度額）を必ず定める必要があります。"},"保証人":{"yomi":"ほしょうにん","cat":"用語","def":"借りた人が返せないときに、代わりに返す義務を負う人のことです。"},"連帯保証":{"yomi":"れんたいほしょう","cat":"民法","def":"普通の保証より重い保証。「まず本人に請求して」と主張できず、貸主はいきなり保証人に全額請求できます。"},"物上保証人":{"yomi":"ぶつじょうほしょうにん","cat":"民法","def":"自分の財産（不動産など）を担保に差し出すが、返済そのものの義務は負わない人のことです。"},"主たる債務者":{"yomi":"しゅたるさいむしゃ","cat":"民法","def":"保証の場面で、本来お金を返す義務を負っている本人（借りた人）のことです。"},"求償権":{"yomi":"きゅうしょうけん","cat":"民法","def":"保証人が借りた人の代わりに返済したとき、その分を本人に請求できる権利のことです。"},"内閣総理大臣":{"yomi":"ないかくそうりだいじん","cat":"登録","def":"2つ以上の都道府県に営業所を置く貸金業者の登録先（実際の窓口は財務局）。国レベルの登録です。"},"都道府県知事":{"yomi":"とどうふけんちじ","cat":"登録","def":"1つの都道府県内だけに営業所を置く貸金業者の登録先です。"},"登録":{"yomi":"とうろく","cat":"登録","def":"貸金業を始めるために必要な行政の許可のようなもの。3年ごとに更新が必要です。"},"登録の更新":{"yomi":"とうろくのこうしん","cat":"登録","def":"貸金業の登録は3年ごとに更新が必要で、有効期間満了日の2か月前までに申請します。しないと効力を失います。"},"貸金業務取扱主任者":{"yomi":"かしきんぎょうむとりあつかいしゅにんしゃ","cat":"登録","def":"営業所ごとに置く必要がある国家資格者。従業者50人に1人以上の割合で設置します。この試験の資格そのものです。"},"純資産額":{"yomi":"じゅんしさんがく","cat":"登録","def":"会社の財産から借金を引いた正味の財産。貸金業の登録には5,000万円以上が必要です。"},"登録拒否事由":{"yomi":"とうろくきょひじゆう","cat":"登録","def":"破産して復権していない、暴力団員である等、これに当てはまると登録を受けられないという事情のことです。"},"変更の届出":{"yomi":"へんこうのとどけで","cat":"登録","def":"商号・役員・営業所など登録事項が変わったとき、原則2週間以内に行政へ届け出る手続きです。"},"廃業等の届出":{"yomi":"はいぎょうとうのとどけで","cat":"登録","def":"貸金業をやめた・死亡した・合併したなどの場合に、決められた人が30日以内に届け出る手続きです。"},"総量規制":{"yomi":"そうりょうきせい","cat":"規制","def":"借りすぎを防ぐため、個人が借りられる総額を原則「年収の3分の1まで」に制限するルールです。"},"年収の3分の1":{"yomi":"ねんしゅうのさんぶんのいち","cat":"規制","def":"総量規制の基準。貸金業者からの借入残高の合計は、原則この額を超えられません。"},"過剰貸付けの禁止":{"yomi":"かじょうかしつけのきんし","cat":"規制","def":"返済能力を超える貸付けをしてはいけないというルール。総量規制もこの考え方の一つです。"},"返済能力の調査":{"yomi":"へんさいのうりょくのちょうさ","cat":"規制","def":"貸す前に、その人がきちんと返せるかを確認すること。指定信用情報機関の利用が義務づけられています。"},"基準額超過極度方式基本契約":{"yomi":"きじゅんがくちょうかきょくどほうしききほんけいやく","cat":"規制","def":"カードローン等で借入残高が年収の3分の1を超えた状態。貸金業者は利用を止めるなどの対応が必要です。"},"個人過剰貸付契約から除かれる契約":{"yomi":"こじんかじょうかしつけけいやくからのぞかれるけいやく","cat":"規制","def":"総量規制の対象外となる契約（除外・例外）。住宅ローンや自動車ローン、緊急の医療費などが代表例です。"},"指定信用情報機関":{"yomi":"していしんようじょうほうきかん","cat":"規制","def":"借入れの状況を集めて管理する、国が指定した機関。貸金業者は貸す前にここへ照会します。"},"個人信用情報":{"yomi":"こじんしんようじょうほう","cat":"規制","def":"その人の借入額や返済状況などの情報。指定信用情報機関で管理されます。"},"収入証明書":{"yomi":"しゅうにゅうしょうめいしょ","cat":"規制","def":"源泉徴収票や給与明細など、年収を証明する書類。一定額を超える借入れでは提出が必要です。"},"契約締結前の書面":{"yomi":"けいやくていけつまえのしょめん","cat":"書面","def":"契約する前に、貸付条件（金利や返済方法など）を書いて渡す書面。判断材料を先に示すためのものです。"},"契約締結時の書面":{"yomi":"けいやくていけつじのしょめん","cat":"書面","def":"契約が成立したときに、遅滞なく渡す書面。いわゆる17条書面で、契約内容の控えです。"},"受取証書":{"yomi":"うけとりしょうしょ","cat":"書面","def":"返済を受け取ったとき、貸金業者がその都度すぐ渡す領収書のような書面。いわゆる18条書面です。"},"帳簿":{"yomi":"ちょうぼ","cat":"書面","def":"貸金業者が契約ごとに取引内容を記録する帳簿。最終返済等から一定期間の保存義務があります。"},"マンスリーステートメント":{"yomi":"まんすりーすてーとめんと","cat":"書面","def":"1か月分の取引をまとめて交付する明細書。一定の要件を満たせば、都度の書面交付を簡略化できます。"},"取立て行為の規制":{"yomi":"とりたてこういのきせい","cat":"取立て","def":"借金の取立てで、人を威迫したり、私生活の平穏を害したりする行為を禁止するルールです。"},"威迫":{"yomi":"いはく","cat":"取立て","def":"相手を不安や恐怖に陥れるような、おどしに近い言動のこと。取立てで行うと違法です。"},"正当な理由":{"yomi":"せいとうなりゆう","cat":"取立て","def":"法律上認められる、もっともな理由のこと。これがないのに勤務先へ連絡する等は禁止されます。"},"誇大広告の禁止":{"yomi":"こだいこうこくのきんし","cat":"広告","def":"実際より著しく有利だと誤解させる広告を禁止するルールです。"},"貸付条件の広告":{"yomi":"かしつけじょうけんのこうこく","cat":"広告","def":"貸付けの条件（金利など）を示して広告するときに、登録番号や返済例など必要事項の表示が義務づけられます。"},"再勧誘の禁止":{"yomi":"さいかんゆうのきんし","cat":"広告","def":"契約しないと断った相手に、しつこく勧誘を続けてはいけないというルールです。"},"利息制限法":{"yomi":"りそくせいげんほう","cat":"金利","def":"金利の上限を定める法律。元本10万円未満は年20%、10万〜100万円未満は年18%、100万円以上は年15%までです。"},"出資法":{"yomi":"しゅっしほう","cat":"金利","def":"貸金業者の金利上限を年20%とし、これを超えると刑事罰の対象になる法律です。"},"上限金利":{"yomi":"じょうげんきんり","cat":"金利","def":"法律で許される金利の上限。利息制限法（15〜20%）と出資法（20%）で定められています。"},"みなし利息":{"yomi":"みなしりそく","cat":"金利","def":"礼金や手数料など、名目が利息でなくても実質的に利息とみなされるお金。上限金利の計算に含めます。"},"元本":{"yomi":"がんぽん","cat":"金利","def":"借りたお金そのもの（利息を含まない元のお金）のこと。金利の上限は元本の額で変わります。"},"遅延損害金":{"yomi":"ちえんそんがいきん","cat":"金利","def":"返済が遅れたときに払う損害賠償金。貸金業者の上限は年20%です。"},"期限の利益":{"yomi":"きげんのりえき","cat":"民法","def":"「返済期日まで返さなくてよい」という借り手側の利益。返済を怠るとこれを失い、一括請求されることがあります。"},"グレーゾーン金利":{"yomi":"ぐれーぞーんきんり","cat":"金利","def":"かつて利息制限法の上限を超え出資法の上限までの間で取られていた金利。現在は撤廃されています。"},"みなし弁済":{"yomi":"みなしべんさい","cat":"金利","def":"一定の要件を満たせば上限超過利息を有効な返済とみなした旧制度。現在は廃止されています。"},"指定紛争解決機関":{"yomi":"していふんそうかいけつきかん","cat":"紛争","def":"貸金業者と利用者のトラブルを、裁判以外の方法で解決する国指定の機関です。"},"手続実施基本契約":{"yomi":"てつづきじっしきほんけいやく","cat":"紛争","def":"指定紛争解決機関と貸金業者との間で結ぶ契約。トラブル時の解決手続きに応じる約束です。"},"意思表示":{"yomi":"いしひょうじ","cat":"民法","def":"「買う」「契約する」など、自分の意思を相手に示す行為のこと。契約の基礎になります。"},"錯誤":{"yomi":"さくご","cat":"民法","def":"勘違いのこと。重要な部分での勘違いによる契約は、一定の場合に取り消せます。"},"詐欺":{"yomi":"さぎ","cat":"民法","def":"だまされてした契約のこと。だまされた側は契約を取り消せます。"},"強迫":{"yomi":"きょうはく","cat":"民法","def":"おどされてした契約のこと。おどされた側は契約を取り消せます。"},"制限行為能力者":{"yomi":"せいげんこういのうりょくしゃ","cat":"民法","def":"未成年者や成年被後見人など、単独で完全な契約をする能力が制限されている人のことです。"},"未成年者":{"yomi":"みせいねんしゃ","cat":"民法","def":"18歳未満の人。原則として親などの同意なくした契約は取り消せます。"},"成年被後見人":{"yomi":"せいねんひこうけんにん","cat":"民法","def":"判断能力を欠く状態のため、家庭裁判所の審判を受けた人。契約は原則取り消せます。"},"被保佐人":{"yomi":"ひほさにん","cat":"民法","def":"判断能力が著しく不十分な人。借財や保証など重要な行為には保佐人の同意が必要です。"},"代理":{"yomi":"だいり","cat":"民法","def":"本人に代わって別の人が契約などを行い、その効果が本人に及ぶ仕組みのことです。"},"消滅時効":{"yomi":"しょうめつじこう","cat":"民法","def":"一定期間権利を使わないでいると、その権利（借金の返済請求権など）が消える制度です。"},"時効":{"yomi":"じこう","cat":"民法","def":"時間の経過によって権利を得たり失ったりする制度。借金では消滅時効が重要です。"},"相殺":{"yomi":"そうさい","cat":"民法","def":"お互いに同種の債権を持つとき、対当額で帳消しにすること。"},"弁済":{"yomi":"べんさい","cat":"民法","def":"借りたお金を返すなど、債務の内容を実行して消滅させることです。"},"債権譲渡":{"yomi":"さいけんじょうと","cat":"民法","def":"お金を返してもらう権利（債権）を、別の人に譲り渡すことです。"},"抵当権":{"yomi":"ていとうけん","cat":"民法","def":"不動産などを担保にし、返済されないときにそこから優先的に回収できる権利。物は債務者が使い続けられます。"},"質権":{"yomi":"しちけん","cat":"民法","def":"担保として物を預かり、返済されないときそこから回収できる権利。物は貸主が預かります。"},"連帯債務":{"yomi":"れんたいさいむ","cat":"民法","def":"複数人が同じ債務について、それぞれ全額を返す義務を負う形態のことです。"},"契約の解除":{"yomi":"けいやくのかいじょ","cat":"民法","def":"一定の理由があるとき、契約を最初からなかったことにする（または将来に向けやめる）ことです。"},"手形":{"yomi":"てがた","cat":"手形","def":"決められた期日にお金を支払うことを約束・指示する証券。お金の代わりに使われます。"},"約束手形":{"yomi":"やくそくてがた","cat":"手形","def":"振出人が「私が支払います」と約束する手形のことです。"},"為替手形":{"yomi":"かわせてがた","cat":"手形","def":"振出人が第三者に「この人に支払って」と指図する手形のことです。"},"裏書":{"yomi":"うらがき","cat":"手形","def":"手形の裏に署名して、手形の権利を他人に譲り渡すことです。"},"手形割引":{"yomi":"てがたわりびき","cat":"手形","def":"期日前の手形を、利息分を差し引いた金額で買い取ってもらい現金化することです。"},"貸借対照表":{"yomi":"たいしゃくたいしょうひょう","cat":"会計","def":"ある時点の財産の状態（資産・負債・純資産）を示す表。バランスシート（B/S）とも呼ばれます。"},"損益計算書":{"yomi":"そんえきけいさんしょ","cat":"会計","def":"一定期間の収益と費用から、もうけ（利益）を示す表。P/Lとも呼ばれます。"},"資産":{"yomi":"しさん","cat":"会計","def":"会社が持っている財産（現金・土地・売掛金など）のことです。"},"負債":{"yomi":"ふさい","cat":"会計","def":"会社が負っている借金や支払い義務のことです。"},"純資産":{"yomi":"じゅんしさん","cat":"会計","def":"資産から負債を引いた正味の財産。自己資本ともいいます。"},"自己資本比率":{"yomi":"じこしほんひりつ","cat":"会計","def":"総資産のうち返済不要の自己資本が占める割合。高いほど財務が安定しているとされます。"},"流動比率":{"yomi":"りゅうどうひりつ","cat":"会計","def":"短期の支払い能力を示す指標。流動資産÷流動負債で計算します。"},"取引時確認":{"yomi":"とりひきじかくにん","cat":"犯収法","def":"犯罪収益移転防止法に基づき、取引の際に相手の本人特定事項などを確認すること。"},"疑わしい取引の届出":{"yomi":"うたがわしいとりひきのとどけで","cat":"犯収法","def":"マネーロンダリング等が疑われる取引を、行政庁に届け出る義務のことです。"},"個人情報":{"yomi":"こじんじょうほう","cat":"個情法","def":"生存する個人を特定できる情報。氏名や生年月日などで特定できるものを指します。"},"要配慮個人情報":{"yomi":"ようはいりょこじんじょうほう","cat":"個情法","def":"人種・病歴・犯罪歴など、取扱いに特に配慮が必要な個人情報。取得には原則本人同意が必要です。"},"特定公正証書":{"yomi":"とくていこうせいしょうしょ","cat":"業務","def":"強制執行を認める文言のある公正証書。債務者に代わって作成を委任させる等の行為は制限されます。"},"白紙委任状":{"yomi":"はくしいにんじょう","cat":"業務","def":"委任内容の一部を空欄にした委任状。悪用の恐れがあり、取得が制限される場合があります。"},"保証業者":{"yomi":"ほしょうぎょうしゃ","cat":"業務","def":"貸金業者に頼まれて、借り手の保証を引き受けることを仕事とする会社のことです。"}};
const BEGINNER={"16-1":"これは貸金業法の言葉の意味を正しく覚えているかを問う問題です。正しいものはａだけなので、答えは①（１個）になります。\n\nａは正しい説明です。物を売ったり運んだりする会社が、その取引のついでに行うお金の貸し借りは「貸金業」から外れる、というルールはそのとおりです。\n\nｂは間違いです。「債務者等」には、お金を借りた人だけでなく、その保証人や、過去に借りた人・保証人だった人まで広く含まれます。保証人を外している点がひっかけです。\n\nｃも間違いです。「貸付けの契約」に『利益を損なうおそれがないと認められるもの』という条件は付いていません。もっともらしい限定を足しているのが誤りです。\n\nｄも間違いで、手続実施基本契約は、紛争解決機関と貸金業者の二者で結ぶ契約です。借りる側は当事者になりません。\n\n言葉の定義は「余計な条件が足されていないか」に注意して読むのがコツです。","16-2":"これは貸金業を始めるときの登録や更新のルールを問う問題です。正しいのはｂとｄの組み合わせなので、答えは③です。\n\nｂは正しく、登録を続けたいときは、有効期間が切れる２か月前までに更新を申請します。ｄも正しく、貸金業の登録は３年ごとに更新しないと効力を失います。この「２か月前」「３年ごと」という数字はよく出るので覚えておきましょう。\n\nａは間違いです。２つ以上の都道府県に営業所を置く場合は、知事を通さず内閣総理大臣（財務局経由）へ直接申請します。知事を経由するのは、１つの都道府県だけに営業所を置く場合です。\n\nｃも間違いで、申請書には主任者の氏名は書きますが、住所までは書く必要がありません。「住所まで」と広げているのがひっかけです。","16-3":"これは、貸金業者が届け出をするとき「前もって（あらかじめ）」出すのか「変わった後」に出すのかを問う問題です。正しいのは②です。\n\n広告などに載せる営業所の電話番号を変える場合は、前もって届け出る必要があります。これが②で、正解です。\n\n一方①③④の、商号や名前の変更、業務の種類・方法の変更、貸金業以外の事業の種類の変更は、いずれも「前もって」ではなく、変わった後２週間以内に届け出れば足りる事項です。これらを「あらかじめ」と書いているのが誤りです。\n\n覚え方は、広告に出す電話番号だけは事前届出、それ以外の多くは事後（２週間以内）と区別することです。","16-4":"これは、監督当局が貸金業者を見張るときにどこに注目するか（監督指針の着眼点）を問う問題です。正しいのはｂとｄの組み合わせで、答えは③です。\n\nｂとｄは、社内の管理部門がきちんと業務をチェックし、重大な問題を見つけたら経営陣に報告する体制があるか、という内容で、いずれも正しい着眼点です。\n\nａは間違いです。協会に入っていない業者でも、貸金業協会の自主ルールの趣旨を踏まえた社内規則を作る必要があります。「独自性に配慮して従わなくてよい」わけではありません。\n\nｃも間違いで、自己検証を「年３回以上」といった具体的な回数は監督指針では決められていません。もっともらしい数字を作っているのがひっかけです。","16-5":"これは、従業員に身分を示す証明書を持たせる必要があるかどうかを問う問題です。正しいのはａとｄの組み合わせで、答えは②です。\n\nａは正しく、お客さんと直接会わずにシステム管理だけをする人には証明書はいりません。ｄも正しく、業務を委託した先の従業員がその貸金業の仕事をするなら、その人にも証明書を持たせる必要があります。\n\nｂは間違いです。勧誘をせず広告だけをする業務は、証明書を持たせる対象ではありません。ｃも間違いで、派遣されてきた人でも貸金業の仕事をするなら証明書が必要です。\n\nポイントは「お客さんと接して貸金業の仕事をするか」です。接する仕事なら委託先でも派遣でも証明書が必要、と考えるとわかりやすいです。","16-6":"これは、監督指針が「してはいけない不当な行為」として挙げているものがいくつあるかを問う問題です。ａからｄまですべて当てはまるので、答えは④（４個）です。\n\n理由もないのに大きすぎる担保や保証人を求めること、契約内容を理解できないとわかっている人と契約すること、障害を理由に支援者を通す努力もせず簡単に契約を断ること、裁判で無効と公表された条項と同じ内容の条項を使って契約することは、いずれも典型的な不当行為の例です。\n\nこの手の「すべて該当する（４個）」パターンは、一つ一つが弱い立場の人を守る趣旨だと気づければ選びやすくなります。","16-7":"これは、返済能力を調べるときに使う「給料に似た定期収入」に何が当てはまるかを問う問題です。当てはまるのはａ・ｂ・ｃの３つなので、答えは③です。\n\n年金、投資信託の分配金（事業としてでない場合）、定期的な不動産の家賃収入（事業としてでない場合）は、いずれも「給料に似た定期的な収入」に含まれます。\n\nｄの事業所得は、たとえ安定していても、性質が給料とは違うため、この「給料に似た収入」には含まれません。ここがひっかけです。\n\n「毎回決まって入ってくるお給料のような収入か」を基準に考えると区別しやすいです。事業のもうけは別扱い、と覚えましょう。","16-8":"これは、総量規制（借りすぎ防止のルール）の対象から外れる「除外契約」を問う問題です。正しいのはａとｂの組み合わせで、答えは①です。\n\nａは正しく、不動産をよくするための資金は、その不動産を担保にしなくても除外契約になります。ｂも正しく、不動産購入資金のつなぎ融資は、本体の貸付けをする人が銀行などでなくても除外契約になり得ます。\n\nｃは間違いです。不動産の売却代金で返す予定の貸付けが除外になるには、貸す金額がその不動産の売却予定価格を超えないことが条件です。価格を超えたら該当しません。\n\nｄも間違いで、自動車購入資金が除外になるには、原則としてその車の所有権を業者が持つか、譲渡担保にすることが必要です。","16-9":"これは、極度方式基本契約（限度額内で何度も借りられる契約）について、借りすぎになっていないか調べる義務を問う問題です。正しいのは④です。\n\n新しく貸すのを止める措置をとっていて、それを解除しようとするときは、借りすぎ（基準額超過）になっていないか調査しなければなりません。これが④で正解です。\n\n①は、残高だけで一律に調査義務が出るような書き方が誤りです。②は年収資料を求める場面の当てはめが条文と合っていません。③は、限度額を減らす措置をとっていても、それだけで調査義務が一律に免除されるわけではないので誤りです。\n\n「借りすぎチェックはいつ必要か」を場面ごとに押さえるのがコツです。","16-10":"これは、貸付けの条件を広告するときのルールを問う問題です。正しいのは①です。\n\n登録簿に載っているホームページアドレスを広告に出すなら、あわせて登録された電話番号も表示しなければなりません。これが①で正解です。\n\n②は間違いで、返済例の表示は義務ではありません。③も間違いで、自主規制ルールでも、アドレスを出すときに返済シミュレーションを必ず備える義務まではありません。④も間違いで、ギャンブル専門紙などへの広告に啓発文言を一律に義務づける規定はなく、内容が不正確です。\n\nアドレスを出すなら電話番号もセット、と覚えておくと迷いません。","16-11":"これは、契約を結ぶ前にお客さんへ渡す書面（契約締結前書面）に何を書くかを問う問題です。正しいのは②です。\n\n極度方式基本契約の契約締結前書面には、貸金業者の名前・住所・登録番号は書きますが、お客さん側の名前や住所は記載事項ではありません。これが②で正解です。\n\n①は間違いで、元本や利息以外にお客さんが負担するお金についても書く必要があります。③も間違いで、お客さんの承諾があれば電子的な方法で提供できます。④も間違いで、基本契約を結んでいる相手に個別の貸付けをするときは、その都度の契約締結前書面は原則いりません。\n\n「業者の情報は書く、相手の情報は書かない」と押さえましょう。","16-12":"これは、貸金業者が保存すべき書類の期間などを問う問題です。正しいのはｃとｄの組み合わせで、答えは④です。\n\nｃは正しく、貸付契約の帳簿は、最後の返済期日（または債権が消えた日）から少なくとも10年間保存します。ｄも正しく、信用情報を提供する同意の記録は、その同意に基づき機関が情報を持っている間、保存します。\n\nａは間違いです。従業者名簿は「営業所を廃止するまで」ではなく、最後に記載した日から一定期間（原則10年間）保存します。ｂも間違いで、返済能力調査の記録は３年間ではなく、最終返済期日などから少なくとも10年間です。\n\n保存期間は「10年」がキーワードになる場面が多いと覚えておきましょう。","16-13":"これは、指定信用情報機関への情報提供などのルールを問う問題です。正しいのはａとｃの２つで、答えは②です。\n\nａは正しく、信用情報の提供を頼むときは、前もってお客さんの同意（書面か電子的方法）が必要です。ｃも正しく、加入した業者は、どの信用情報機関に入っているかの名前を公表しなければなりません。\n\nｂは間違いです。極度方式基本契約を結んだときの情報提供は「遅滞なく」という表現や、すべてが一律に対象になるという点が不正確です。ｄも間違いで、途上与信で得た情報を債権保全の目的で使うことも、勧誘への二次利用と同じく目的外使用に当たり得るので、両者を区別する説明は誤りです。","16-14":"これは、手数料などが利息とみなされる（みなし利息）かどうかを問う問題です。正しいのはｃとｄの組み合わせで、答えは④です。\n\nｃは正しく、ＡＴＭなどの利用料は、一定額以内（１万円以下なら110円、１万円超なら220円まで）なら利息とみなされません。ｄも正しく、契約内容を書いた書面の再発行手数料は利息とみなされません。\n\nａは間違いで、カードの再発行手数料は利息とみなされます。ｂも間違いで、もう一度口座振替をやり直す費用も利息とみなされます。\n\nコツは、ＡＴＭ利用料（限度内）と書面の再発行だけが例外、と覚えることです。カードの再発行は例外ではない点に注意しましょう。","16-15":"これは、貸金業の登録を断られる理由（登録拒否事由）に当たらないものを選ぶ問題です。当たらないのは②なので、答えは②です。\n\n破産した人でも、復権（借金の手続きが終わって元の立場に戻ること）を得れば、すぐに拒否事由ではなくなります。「復権した日から５年」という制限は付いていません。まだ復権していない人が拒否事由に当たります。だから②は拒否事由に当たらず、これが正解です。\n\n①③④は、心身の故障で職務が適切に行えない、罰金刑から５年たっていない、登録を取り消された会社の当時の役員で５年たっていない、という本当の拒否事由に当たります。\n\n「復権すればすぐOK、５年待ちは不要」がポイントです。","16-16":"これは、お客さんの情報管理について監督当局が注目する点のうち、適切でないものを選ぶ問題です。適切でないのは④です。\n\n情報にアクセスできる権限を、特定の一人に集中させるのは危険です。監督指針では逆に、複数の人に分けて互いにチェックさせる体制が求められています。④は「特定の役職員に集中させる」としている点が誤りで、これが正解です。\n\n①②③は、カード情報の適切な保存や廃棄、インサイダー取引の防止、第三者提供の同意で不当に広い範囲を強いていないか、という内容で、いずれも適切です。\n\n「権限は集中させず分散させる」が情報管理の基本、と覚えましょう。","16-17":"これは、貸金業務取扱主任者についての説明のうち、適切でないものを選ぶ問題です。適切でないのは②です。\n\n主任者が「常時勤務している」と認められるには、社会通念上そう言える実態があれば足ります。営業時間中ずっとその営業所に居続ける（常時駐在）ことまでは求められていません。②は「常時駐在が必要」としている点が言い過ぎで、これが正解です。\n\n①③④は、主任者の設置割合（50分の1以上）、法令違反時の登録取消し、お客さんの請求があれば主任者の氏名を明らかにすること、という内容で、いずれも正しい説明です。\n\n「常時勤務＝ずっと座っている、ではない」がポイントです。","16-18":"これは、返済能力を調べるとき、信用情報機関の情報を使わなければならない場面を問う問題で、適切でないものを選びます。適切でないのは④です。\n\n極度方式貸付け（限度額内での個々の借入れ）をするたびに信用情報を使って調べる義務はありません。基本契約を結ぶときなどの調査で足りる場合があります。④は毎回使わなければならないように書いている点が誤りで、これが正解です。\n\n①は法人相手なので個人向けの信用情報使用義務は及ばず、②③も個人保証人や媒介契約での扱いとして妥当です。\n\n「個々の極度方式貸付けの都度は不要」という点を押さえましょう。","16-19":"これは、限度額（極度額）を増やしたり戻したりするときの返済能力調査を問う問題で、適切でないものを選びます。適切でないのは①です。\n\n限度額を増やすときは、原則として改めて返済能力を調べる必要があります。２年前に源泉徴収票をもらっていたとしても、それだけで新しい資力確認書類を取る義務が一律に免除されるわけではありません。①はこの点が誤りで、これが正解です。\n\n②③④は、限度額を減らした後に戻すときの調査の要否や、増額したときの記録の作成・保存について、いずれも正しい説明です。\n\n「増額のときはしっかり再調査」と覚えておきましょう。","16-20":"これは、総量規制の「例外契約」を問う問題で、適切でないものを選びます。適切でないのは④です。\n\n特定費用（急に必要になった費用など）を払うための貸付けが例外契約になるための返済期間は「１年」ではなく、もっと短い期間（原則１か月）とされています。④は「１年を超えない」としている点が誤りで、これが正解です。\n\n①は、例外契約でも借入残高は個人顧客合算額に算入されるという正しい説明です。②③も、つなぎ融資や、借り換えでお客さんの負担を増やさない貸付けの要件として正しい内容です。\n\n例外契約の「期間の数字」がひっかけになりやすいので注意しましょう。","16-21":"これは、極度方式基本契約の書面を、内容が変わったときに作り直して渡す（再交付）必要があるかを問う問題で、適切でないものを選びます。適切でないのは②です。\n\n限度額を一度下げた後、元の額を超えない範囲まで戻す場合は、お客さんに不利益にならない変更なので、書面の再交付は不要です。②は「再交付しなければならない」としている点が誤りで、これが正解です。\n\n①③は、限度額の引下げや利率の引下げはお客さんに有利なので再交付不要、という正しい説明です。④は返済方法や返済場所の変更は原則再交付が必要という正しい説明です。\n\n「お客さんに不利益でない変更は再交付いらない」がコツです。","16-22":"これは、借金の取立てに関するルールのうち、適切でないものを選ぶ問題です。適切でないのは①です。\n\n家族が郵便を受け取ったり電話に出たときに、業者だと名乗ったり差出人を業者と書いたりする行為が、いつも直ちに違反になるわけではありません。お客さんから「家族に知られたくない」と頼まれているのに、それを無視して行った場合などに違反のおそれが大きくなります。①はこの区別を欠いている点が誤りで、これが正解です。\n\n②③④は、封をして他人にわからないようにする、催告書面に必要事項を書く、送付者の氏名の書き方、という内容で、いずれも正しい説明です。","16-23":"これは、貸付債権を他人に譲るときの規制を問う問題で、適切でないものを選びます。適切でないのは①です。\n\n債権を譲るとき、譲り受ける人へ「これは貸金業の債権で、貸金業法の一部が適用される」と通知する義務があります。この義務は、譲受人が貸金業者でない場合を含めて一定の要件で課されます。①の「譲受人が貸金業者である場合を除き」という限定の付け方が条文の趣旨と合わず、これが誤りで正解です。\n\n②③④は、譲受人への立入検査、契約時書面の交付、自主規制ルールでの役割分担の明確化や帳簿保管という内容で、いずれも正しい説明です。","16-24":"これは、貸金業者が「開始等の届出」をしなければならない事項を問う問題で、適切でないものを選びます。適切でないのは④です。\n\n他人から貸付債権を譲り受けたこと自体は、この届出（開始等の届出）の対象には入っていません。④はこれを届出事項としている点が誤りで、これが正解です。\n\n①②③は、協会への加入・脱退、特定の保証業者との保証契約を通常の条件とするようになったこと、業務委託の開始・終了について、いずれも２週間以内に届け出るという正しい説明です。\n\n「債権を譲り受けただけでは届出不要」と覚えておきましょう。","16-25":"これは、貸金業者への監督に関する説明のうち、適切でないものを選ぶ問題です。適切でないのは③です。\n\n事業報告書を出す期限は「事業年度が終わってから30日以内」ではなく、もっと長い期間（原則として３か月以内など）です。③はこの数字が誤りで、これが正解です。\n\n①②④は、純資産が基準額に満たなくなった場合の登録取消しや業務停止、役員の所在がわからないときの公告による登録取消し、協会に入っていない業者への広告の写しの定期徴収について、いずれも正しい説明です。\n\n「事業報告書は30日ではなく数か月」と数字に注意しましょう。","16-26":"これは、利息制限法の利息や賠償額、媒介手数料の規制を問う問題で、適切でないものを選びます。適切でないのは①です。\n\nお金の貸し借りの仲立ち（媒介）の手数料が制限利率を超える場合は、その契約は超えた部分だけでなく契約全体が無効になります。①は「超過部分について無効」としていますが、これは利息の制限のルールで、媒介手数料とは扱いが違うため誤りで、これが正解です。\n\n②は元本50万円なので上限18％、③は賠償額の予定は年20％が上限、④は天引きが制限を超えたら超過分は元本に充てる、という内容で、いずれも正しい説明です。","16-27":"これは、保証料の制限に関する問題で、適切でないものを選びます。適切でないのは③です。\n\n保証会社がお客さんから受け取る保証料以外のお金は、「契約の締結費用」と「債務の弁済費用」を除いたものが保証料とみなされます。③は弁済費用を除くとだけ書いて、締結費用を除く点が抜けているため不正確で、これが正解です。\n\n①は保証料の上限（法定上限額から利息額を引いた額）、②は特約上限利率がない場合の保証料上限の計算、④は主債務の利息を変えたときの保証料契約への影響について、いずれも正しい説明です。\n\n「除くのは締結費用と弁済費用の両方」と覚えましょう。","16-28":"これは、民法の意思表示（心裡留保・虚偽表示・錯誤・強迫）についての問題です。正しいのは②です。\n\nウソの売買契約（虚偽表示）で作った無効は、事情を知らない第三者には対抗できません。だから、登記を得た善意の第三者Ｃに対してＡは無効を主張できず、②が正解です。\n\n①は間違いで、冗談（心裡留保）でも相手がそれを知っていれば無効になり、Ａは無効を主張できます。③も間違いで、動機の錯誤で取り消すには、その動機が契約の基礎だと相手に示していたことが必要です。④も間違いで、強迫による取消しは詐欺と違い、善意無過失の第三者にも対抗できます。\n\n「虚偽表示は善意の第三者に勝てない」がポイントです。","16-29":"これは、民法の無効と取消しについての問題です。正しいのは④です。\n\n錯誤・詐欺・強迫による取消権を追認（後から認めること）するには、取消しの原因となる状況が消えて、かつ自分に取消権があると知った後でなければ効力が出ません。これが④で正解です。\n\n①は間違いで、無効な行為の追認はさかのぼって有効にはならず、原則として追認した時から新しい行為をしたとみなされます。②も間違いで、制限行為能力者は同意なしで単独でも取り消せます。③も間違いで、いったん追認したら取り消せず、相手の履行着手は関係ありません。","16-30":"これは、民法の時効についての問題です。正しいのは②です。\n\n仮差押えや仮処分があると、その手続が終わった時から６か月を過ぎるまでは時効が完成しません（完成猶予）。これが②で正解です。\n\n①は間違いで、裁判上の請求で権利が確定した場合は、その終了時（確定時）から時効が新たに進み始めるのであって、６か月経過後からではありません。③も間違いで、承認をするのに行為能力の制限を受けていないことまでは必要なく、管理する能力があれば足ります。④も間違いで、時効の利益を「あらかじめ」放棄することはできません。","16-31":"これは、連帯保証についての問題です。正しいのは④です。\n\n連帯保証人に対する請求などで生じる時効の完成猶予・更新は、原則として主たる債務者には効きません。ただし債権者と主債務者が別段の意思を示していればそれに従います。これが④で正解です。\n\n①は間違いで、連帯保証は主債務者の意思に反しても結べます。②も間違いで、契約後に主債務が重くなっても保証人の負担は重くなりません。③も間違いで、連帯保証人には「まず主債務者に催告してくれ」と言える催告の抗弁権がありません。\n\n連帯保証は普通の保証より重い、と押さえておきましょう。","16-32":"これは、相殺（お互いの債権を差し引きで消すこと）についての問題です。正しいのは③です。\n\n両方の債権が相殺できる状態（相殺適状）になった後で、自分の持つ債権が時効で消えても、その時効消滅前に相殺適状にあったなら相殺できます。これが③で正解です。\n\n①は間違いで、相手への債権（受働債権）の弁済期がまだ来ていない場合は、期限の利益を放棄しない限り一律には相殺できません。②も間違いで、相殺の意思表示に条件や期限を付けることはできません。④も間違いで、差押えの後に他人から取得した債権による相殺は、差押債権者に対抗できません。","16-33":"これは、相続についての問題です。正しいのは①です。\n\n相続で得た財産の範囲内でだけ借金や遺贈を払うと決めて相続を承認することを「限定承認」といいます。これが①の内容で、正解です。\n\n②は間違いで、相続放棄をした人の子には代襲相続（子が代わりに相続すること）は起きません。代襲が起きるのは死亡・欠格・廃除のときだけです。③も間違いで、いったんした相続の承認・放棄は熟慮期間内でも撤回できません。④も間違いで、配偶者と兄弟姉妹が相続人のときは、配偶者が４分の３、兄弟姉妹が４分の１です。\n\n相続分の割合はよく出るので数字を覚えましょう。","16-34":"これは、手形法と電子記録債権法についての問題です。正しいのは①です。\n\n確定日払いの約束手形は、支払をする日か、その次の２取引日以内に呈示して支払を受けます。これが①で正解です。\n\n②は間違いで、手形金を分割払いにする条件を書くと手形の要件を欠き、手形自体が無効になります。③も間違いで、電子記録債権の譲渡は譲渡記録をしないと効力が生じません（合意だけではダメ）。④も間違いで、電子記録債権は分割できます。\n\n電子記録債権は「記録して初めて効く」「分割できる」と覚えておくと選びやすいです。","16-35":"これは、強制執行の手続についての問題です。正しいのは④です。\n\n給料の債権は、原則として受け取る額の４分の３にあたる部分は差し押さえられません（残り４分の１だけ差押え可能、一定額を超える場合は上限あり）。これが④で正解です。\n\n①は間違いで、執行証書に基づく強制執行にも執行文の付与が必要です。②も間違いで、不動産への強制執行は強制競売と強制管理を併用できます。③も間違いで、動産への強制執行は執行官の差押えで始まり、裁判所の差押命令ではありません。\n\n給料は「４分の３は守られる」と覚えておきましょう。","16-36":"これは、行為能力についての問題で、適切でないものを選びます。適切でないのは②です。\n\n成年被後見人（判断能力が欠けている人）の行為は、日用品の買い物など日常のもの以外は、たとえ成年後見人の同意があっても取り消すことができます。同意をもらえば有効に借金や保証ができるわけではありません。②はこの点が誤りで、これが正解です。\n\n①は許された営業の範囲では成年者と同じ能力、③は被補助人の同意事項は保佐人の同意を要する行為の一部に限られる、④は催告に確答がなければ追認したとみなす、という内容で、いずれも正しい説明です。","16-37":"これは、代理についての問題で、適切でないものを選びます。適切でないのは④です。\n\n代理権が消えた後の行為で本人が責任を負う（表見代理が成立する）には、相手が代理権の消滅を知らないだけでなく、知らないことに落ち度（過失）がないことも必要です。④は「過失があっても本人が責任を負う」としている点が誤りで、これが正解です。\n\n①は相手が代理人だと知っていれば顕名がなくても本人に効力が及ぶ、②は復代理人の選任には本人の許諾などが必要、③は代理人が成年被後見人になると代理権が消える、という内容で、いずれも正しい説明です。","16-38":"これは、債権の効力（損害賠償など）についての問題で、適切でないものを選びます。適切でないのは②です。\n\n特別の事情で生じた損害でも、当事者がその事情を予見すべきだったときは賠償を請求できます。②は「特約がなければ請求できない」としている点が誤りで、これが正解です。\n\n①は受領遅滞のときの保存義務が軽くなること、③は賠償額の予定と履行請求・解除権の関係、④は損害賠償で全額を受け取ると債務者が当然に代位すること、という内容で、いずれも正しい説明です。\n\n「特別損害は予見できたなら賠償できる」がポイントです。","16-39":"これは、債権譲渡についての問題で、適切でないものを選びます。適切でないのは③です。\n\n債権を譲ったことを「債務者に」主張するには、譲渡人からの通知か債務者の承諾があれば足り、確定日付のある証書までは必要ありません。確定日付が必要なのは、債務者以外の第三者に対抗するときです。③はこの区別を誤っており、これが正解です。\n\n①は譲渡制限特約付き債権の供託、②は将来発生する債権も譲渡できること、④は対抗要件を備える前の原因に基づく債権による相殺の対抗について、いずれも正しい説明です。\n\n「債務者には確定日付不要、第三者には必要」と区別しましょう。","16-40":"これは、定型約款（大量の取引で使う画一的な契約条項）についての問題で、適切でないものを選びます。適切でないのは①です。\n\n定型約款を準備した側は、契約の前や、契約後に相手から請求があったときに遅滞なく内容を示せば足ります。契約前に必ず内容を示す義務はありません。①はこの点が誤りで、これが正解です。\n\n②は相手に一方的に不利な不当条項は合意しなかったとみなすこと、③は約款変更時の周知義務、④は相手の利益に適合する変更なら個別合意なしで変更できること、という内容で、いずれも正しい説明です。\n\n「事前に必ず見せる義務はない」がポイントです。","16-41":"これは、破産法についての問題で、適切でないものを選びます。適切でないのは③です。\n\n別除権（抵当権などを持つ人の権利）は、破産手続によらないで行使できる権利です。③は「破産手続によらなければ行使できない」としている点が逆で、これが誤りで正解です。\n\n①は破産債権の定義と破産手続によるべき原則、②は共同の利益のための費用が財団債権として随時弁済されること、④は破産手続によらない相殺の要件について、いずれも正しい説明です。\n\n別除権は「手続外で行使できる」と覚えておくと迷いません。","16-42":"これは、犯罪収益移転防止法（犯収法）の本人確認の方法として認められないものを選ぶ問題です。認められないのは④です。\n\n運転免許証の「写し」の送付を受ける方法を使う場合は、その住所に転送不要郵便を送るだけでは不十分で、別の本人確認書類の送付など追加の措置が必要です。④は運転免許証の写しの送付だけを組み合わせている点で、単独では確認方法として足りず、これが正解です。\n\n①②③は、健康保険証と年金手帳の提示、健康保険証＋公共料金領収証書の写し、ソフトで撮った容貌と運転免許証の画像送信という、いずれも認められた確認方法です。","16-43":"これは、個人情報保護法の言葉の意味を問う問題です。正しいのは②です。\n\n個人情報取扱事業者に当たるかどうかは、扱っている個人データの人数の多い少ないは関係ありません。データベースを事業に使っていれば当たります。これが②で正解です。\n\n①は間違いで、携帯電話番号やクレジットカード番号は個人識別符号に含まれません（含まれるのは旅券番号や運転免許証番号、マイナンバーなど）。③も間違いで、保有個人データの説明の仕方が不正確です。④も間違いで、犯罪で害を被った事実も要配慮個人情報に含まれます。","16-44":"これは、消費者契約法についての問題です。正しいのは④です。\n\n事業者が、自分（や代表者・従業員）の故意または重大な過失で起こした債務不履行の損害賠償責任の一部を免除する条項は無効になります。これが④で正解です。\n\n①は間違いで、事業のために契約する個人も事業者に含まれます。②も間違いで、不利益な事実を告げなかったことで誤認した場合、契約は無効ではなく取り消せるにとどまります。③も間違いで、平均的な損害の額を超える「部分」が無効になるのであって、条項全体が無効になるわけではありません。","16-45":"これは、貸金業協会の紛争解決に関する規則の言葉の意味を問う問題です。正しいのは①です。\n\n「貸金業務等関連苦情」とは、貸金業務について、契約者などが業務を行った者に対して示す不満のことです。これが①で正解です。\n\n②は間違いで、貸金業務関連紛争の定義の当てはめが不正確です。③も間違いで、苦情処理手続の代理人は弁護士や司法書士などに限られず、もっと広く認められ得ます。④も間違いで、法人でない社団や財団でも、代表者などの定めがあれば紛争解決手続の申立てができます。\n\n定義問題は言葉の範囲を狭めすぎていないか注意しましょう。","16-46":"これは、個人情報保護のガイドラインについての問題で、適切でないものを選びます。適切でないのは③です。\n\n業務を委託するために個人データを渡す場合、利用目的の達成に必要な範囲なら、渡す先は「第三者」に当たりません。③は「第三者に該当する」としている点が誤りで、これが正解です。\n\n①はグループ会社間のデータ交換は原則第三者提供に当たること、②は共同利用の事項を変える場合の事前通知など、④は信用情報機関への提供にオプトアウトを適用しないことについて、いずれも正しい説明です。\n\n「委託先は第三者ではない」と覚えておきましょう。","16-47":"これは、貸金業協会の自主規制ルールの「広告・勧誘」についての問題で、適切でないものを選びます。適切でないのは③です。\n\nお客さんが身体的・精神的な障害などで契約内容の理解が難しいとわかった場合、協会員は貸付契約の勧誘をしてはいけません。③は「丁寧に説明して理解させるよう努める」としていますが、正しくは勧誘自体を控えるので、これが誤りで正解です。\n\n①は勧誘を強く拒否されたら最低1年間勧誘を見合わせる、②は取引を希望しないと言われたら最低6か月見合わせる、④は勧誘には承諾が必要で口頭承諾は記録する、という内容で、いずれも正しい説明です。","16-48":"これは、会社計算規則の貸借対照表についての問題です。正しいのはａだけなので、答えは①（１個）です。\n\nａは正しく、貸借対照表は資産・負債・純資産の各部に分けて表示します。\n\nｂは間違いで、負債の部は「流動負債」と「固定負債」に分けます。「繰延負債」という区分はありません。ｃも間違いで、前受金は原則として流動負債に入ります（資産ではありません）。ｄも間違いで、１年内に費用となる前払費用は流動資産に入り、流動負債ではありません。\n\n「前受金は負債、前払費用は資産」と対にして覚えると混乱しにくいです。","16-49":"これは、キャッシュ・フロー計算書のどの区分に何が入るかを問う問題です。正しいのは③です。\n\n営業活動の区分には、営業利益・営業損失の計算対象になった取引に加え、投資活動にも財務活動にも当たらない取引のキャッシュ・フローが入ります。これが③で正解です。\n\n①は間違いで、短期借入れの収入・返済の支出は財務活動に入ります。②も間違いで、棚卸資産の増減は営業活動に入ります。④も間違いで、貸付けの支出・回収の収入は投資活動に入ります。\n\n借入れは財務、貸付けは投資、と方向で分けると覚えやすいです。","16-50":"これは、企業会計原則の一般原則の名前と内容が合っているかを問う問題で、適切でないものを選びます。適切でないのは②です。\n\n正しくは「資本取引と損益取引を区別し、資本剰余金と利益剰余金を混同してはならない」というのが『資本取引・損益取引区分の原則』です。②は「負債取引」と対比し、それを「明瞭性の原則」と呼んでいる点が二重に誤りで、これが正解です。\n\n①は正規の簿記の原則、③は継続性の原則、④は保守主義の原則で、名前と内容が正しく対応しています。\n\n原則は「名前」と「中身」の組み合わせが入れ替えられやすいので注意しましょう。","17-1":"この問題は、貸金業の世界で使われる大事な言葉の意味を、正しく説明しているものが何個あるかを数える問題です。\n\n正解は「1個」です。正しいのはｂだけで、個人信用情報には氏名・住所・生年月日に加えて、運転免許証などを持っている人ならその免許証の番号も含まれます。\n\nほかは少しずつ間違っています。ａは、貸金業を「もうけ目的で行うもの」とだけ言っていますが、正しくは「お金を貸すこと（やその仲立ち）を仕事として繰り返し行うこと」がポイントで、説明が不正確です。ｃは「住宅の改良（リフォーム）のためのお金は住宅資金貸付契約に含まれない」と言っていますが、実際は改良資金も含まれます。ｄは「紛争解決手続とは裁判での和解」と言っていますが、実際は裁判ではない場所で話し合って解決する仕組み（金融ADR）です。\n\n用語の細かい言い換えに引っかからないよう、意味の芯をつかむのがコツです。","17-2":"この問題は、貸金業を始めるとき国や県に出す「登録申請書」に、何を書かなければいけないかを問うものです。正しい組み合わせを選びます。\n\n正解はｂとｃの組み合わせです。ｂは、支店で仕事を取り仕切る人の代わりを務められる立場の人がいれば、その人の名前も書かなければならない、という内容で正しいです。ｃは、書く電話番号は場所を特定できる番号などに限られる、という内容で正しいです。\n\n間違いはａとｄです。ａは、貸金業務取扱主任者の「住所」まで書くとしていますが、そこまでは書く必要がなく不正確です。ｄは、銀行のATM（現金自動設備）を代理店に含めるとしていますが、これは含まれません。\n\n「どこまでが記載事項か」を細かく問う問題なので、住所やATMなど余分なものを足していないか注意しましょう。","17-3":"この問題は、貸金業者Aが役所へ「届出」をするとき、どんな場合にいつまでに出すのかを問うものです。\n\n正解は④です。会社の役員が仕事に関して法律違反をしたと知ったときは、その日から2週間以内に役所へ届け出なければなりません。\n\nほかの選択肢は届出の期限やタイミングの説明がずれています。①の営業所の場所を変えた場合や③の貸金業をやめた場合も届出は必要ですが、期限などの書き方が正確ではありません。②は特に注意で、新しく極度方式貸付け（限度額の中で何度も借りられる貸し方）を始めるとき、「あらかじめ（事前に）」届け出るとしていますが、実際は始めた後に届け出れば足ります。\n\n「事前か事後か」「何日以内か」を正しく覚えることが得点のコツです。","17-4":"この問題は、貸金業者が仕事の一部を他人（外部の業者など）に任せる（委託する）とき、きちんと管理するために取るべき対策として正しいものが何個あるかを問うものです。\n\n正解は「4個」で、ａからｄまですべて正しい対策です。具体的には、その仕事をきちんとこなせる能力のある相手に任せること（ａ）、任せた後も定期的に様子を確認して必要なら改善させること（ｂ）、相手がうまくできなくなったら別の適切な相手に速やかに任せ直すなど利用者に迷惑がかからないようにすること（ｃ）、必要があれば委託の契約を変えたり解除したりすること（ｄ）です。\n\nどれも「任せっぱなしにせず、最後まで責任を持って管理する」という当たり前の考え方に沿っています。難しく考えず、常識的に必要な管理はすべて正しい、と押さえましょう。","17-5":"この問題は、貸金業でのトラブルを裁判以外で解決する仕組み（金融ADR）について、正しい説明の組み合わせを選ぶものです。\n\n正解はｂとｄです。ｂは、指定された紛争解決機関と契約を結ぶ対応をしたら、その機関の名前を公表しなければならない、という内容で正しいです。ｄは、利用者から申出があれば、和解で決まった約束がちゃんと守られているか調べて、守るよう勧めることができる、という内容で正しいです。\n\n間違いはａとｃです。ａは、協会に入っているかどうかだけで対応が単純に決まるような書き方で不正確です。ｃは、紛争解決委員が示した和解案は「絶対に断れない」と言い切っていますが、実際は一律に断れないわけではなく、特別な調停案などとは区別が必要です。\n\n「絶対」「一律に」という言い切りは疑ってかかるのがコツです。","17-6":"この問題は、営業所ごとに置く「貸金業務取扱主任者」という資格者について、正しい説明が何個あるかを問うものです。\n\n正解は「1個」で、正しいのはａだけです。営業所にたった一人の主任者がいなくなっても、その営業所で仕事を続けるなら、2週間以内に新しい主任者を置かなければなりません。\n\nほかは間違いです。ｂは、従業員110人なら主任者3人以上、と言い切っていますが、ルールは「従業員50人につき1人以上」で、110人だからといって直ちに3人と断定はできません。ｃは、別の営業所の主任者に一時的に兼務させられるとしていますが、主任者は営業所ごとに専任で置くのが原則で、そんな規定はありません。ｄは、ATMを置くと主任者を追加しなければならないとしていますが、ATMの設置は追加の理由にはなりません。\n\n「50人に1人」「営業所ごとに専任」を軸に覚えましょう。","17-7":"この問題は、貸金業者がやってはいけない行為などについて、正しい説明の組み合わせを選ぶものです。\n\n正解はａとｄです。ａは、暴力団員などを仕事に使ってはいけない、という内容で正しいです。ｄは、利用者にウソを告げる行為（不実告知）は重大な違反で、刑事罰の対象になり得る、という内容で正しいです。\n\n間違いはｂとｃです。ｂは、保証会社と契約したときの保証料などの確認について、内容やタイミングの書き方が正確ではありません。ｃは、住宅ローン関連で死亡保険を結ぶときの自殺免責のルールについて、対象や条件が実際とずれています。\n\nウソを告げる行為が刑事罰につながる、という点は特に重要なので押さえておきましょう。","17-8":"この問題は、貸金業者Aが個人Bにお金を貸すときに行う「返済能力の調査」について、正しい説明を選ぶものです。返済能力の調査とは、ちゃんと返せる人かを確かめることです。\n\n正解は④です。お金を貸す契約（限度額方式などを除く）を結んだら、調査の記録を作って、その借金が消えるまで（原則として最後の返済日まで）保存しなければなりません。\n\nほかは間違いです。①は、他の貸金業者を貸主とする貸借の仲立ち契約について、信用情報を使う義務の位置づけが説明とずれています。②は、ちょうど50万円の貸付けだと、収入証明書などの提出を求める基準に届かない場合があります。③は、転職直後で給料明細が1か月分しかないとき、それだけで足りるとは限らず、ほかの資料での補いが必要になり得ます。\n\n「記録は借金が消えるまで保存」を覚えておきましょう。","17-9":"この問題は、貸金業者Aが保証人をつける契約を結ぶときのルールについて、正しい説明を選ぶものです。保証人とは、借りた人が返せないとき代わりに返す人のことです。\n\n正解は④です。個人を保証人にしようとするとき（一定の場合を除く）は、借りる本人Bだけでなく、保証人になろうとするCについても、指定信用情報機関の信用情報を使って返済能力を調べなければなりません。\n\nほかは間違いです。①は、個人の根保証人に収入証明書の提出を求める義務の範囲が説明とずれています。②は、渡す書面は保証契約に関するものが中心で、対象の貸付契約の説明書面まで必ず渡すとは限りません。③は、法人が保証人の場合に求められる確認の内容が説明と違います。\n\n「保証人についても信用情報で調べる」が大事なポイントです。","17-10":"この問題は、借りすぎを防ぐルール（総量規制）の例外にあたる契約を選ぶものです。総量規制は、原則として年収の3分の1を超える貸付けを禁じる仕組みで、これに引っかからない特別扱いの契約を探します。\n\n正解は③です。本人や生計を一にする家族の、緊急に必要な医療費を払うためのお金で、返済能力を超えないと認められるものは、例外として認められます。\n\nほかは要件を満たしません。①の自動車担保の貸付けは、そもそも除外される理由の性質が違います。②のつなぎ融資は、返済期間がおおむね1か月以内の短期のものに限られるのに、1か月を超えるとしています。④の借換えは、今より返済の負担が増えないことが条件ですが、将来払う合計額が増えてしまう内容になっています。\n\n「緊急の医療費」は代表的な例外として覚えておきましょう。","17-11":"この問題は、営業所に掲げる「貸付条件等の掲示」と「標識（お店の看板のような表示）」について、正しい説明を選ぶものです。\n\n正解は②です。お金を貸すときの掲示には、利率や返済方法などと一緒に「主な返済の例」も含まれます。\n\nほかは間違いです。①は、掲示するのは利率・返済方法・返済期間などの貸付条件が中心で、商号や登録番号の扱いと混同しないよう注意が必要です。③と④は、標識の掲示について、営業所だけでなくATMなど一定の設備でも必要になる場合があるのに、一律に不要としている点が正しくありません。\n\n貸付条件の掲示には「主な返済例」が入る、と押さえておくと解きやすくなります。","17-12":"この問題は、一定期間の取引をまとめて知らせる書面「マンスリーステートメント」について、正しい説明が何個あるかを問うものです。ふつうは契約のたびに書面を渡しますが、承諾があればこのまとめ書面で代えられる仕組みです。\n\n正解は「3個」で、正しいのはａ・ｂ・ｄです。ａは、このまとめ書面で渡す旨や個別書面が簡素になる旨を示したうえで、事前に承諾を得ているか留意する、という内容で正しいです。ｂは、利用者が承諾を撤回したいと言ったとき、切替えの時期などをきちんと説明しているか留意する、という内容で正しいです。ｄは、保証人から一部の返済を受けたとき、承諾を得ればまとめ書面で受取証書に代えられる、という内容で正しいです。\n\n間違いはｃです。承諾があれば選べる取扱いなのに、「交付しなければならない」と義務のように書いている点が誤りです。「できる」と「しなければならない」の違いに注意しましょう。","17-13":"この問題は、貸金業者がつける「帳簿」について、正しい説明の組み合わせを選ぶものです。帳簿とは、誰にいくら貸していくら返してもらったかなどを記録する台帳です。\n\n正解はｂとｄです。ｂは、帳簿は借りた人ごとに、その人との全取引が終わった日から少なくとも10年間保存する、という内容で正しいです。ｄは、記録する「交渉の経過」には催告書などの書面の内容も含まれる、という内容で正しいです。\n\n間違いはａとｃです。ａは、主たる営業所だけに置けばよいとしていますが、実際は営業所ごとに備え付けが必要です。ｃは、契約条件の変更の記録について「変更に至らなかったものは除く」と言い切っていますが、交渉の経過として記録すべき対象に含まれ得ます。\n\n「10年間保存」「営業所ごと」を軸に覚えましょう。","17-14":"この問題は、貸金業者が持っている債権（貸したお金を返してもらう権利）を他人に譲るときなどのルール（法24条）について、正しい説明を選ぶものです。\n\n正解は③です。貸金業者から債権を譲り受けた人が、その債権に保証人をつける契約を結ぼうとするときは、契約前に保証契約の内容を説明する書面を保証人になろうとする人へ渡さなければなりません。\n\nほかは間違いです。①は、通知の義務が「相手が貸金業者でない場合に限る」ような書き方で、対象が実際とずれています。②は、契約締結時の書面を誰がいつ渡すかを「譲渡人が渡す」と単純化しすぎています。④は、取立てを任せた相手が悪い立場の人だと「知ることができた」場合には、過失があるとして行政処分の対象になり得るのに、ならないとしている点が誤りです。\n\n「知ることができたのに知らなかった＝過失あり」という考え方に注意しましょう。","17-15":"この問題は、指定信用情報機関へ個人の信用情報を提供する義務について、正しい説明の組み合わせを選ぶものです。\n\n正解はａとｂです。ａは、限度額方式の契約に基づいて貸付けを行ったら、遅滞なくその情報を機関に提供する、という内容で正しいです。ｂは、住宅ローン（住宅資金貸付契約）は総量規制の対象外なので、それに伴い情報提供の義務からも外れる、という内容で正しいです。\n\n間違いはｃとｄです。ｃは、提供する情報に「勤務先の名称」まで含まれるとしていますが、含まれないと考えられます。ｄは、本人確認に使った国民健康保険証の記号番号まで含まれるとしていますが、運転免許証の番号とは扱いが違い、含まれるとはされていません。\n\n提供する情報は氏名・住所・生年月日や契約内容が中心、と押さえましょう。","17-16":"この問題は、同じ相手から重ねてお金を借りたとき、利息制限法の上限金利がどうなるかを問う問題です。上限は元本が10万円未満なら年20％、10万円以上100万円未満なら年18％、100万円以上なら年15％です。ポイントは、すでに借りている残りの元本と、新しく借りる元本を合算して判断することです。\n\n正解は「2個」です。ｃは、残り5万円と新規3万円で合計8万円となり10万円未満なので上限は年20％です。約定18％は上限内で有効なのに「18％を超える部分が無効」としているので、これははっきりした誤りです。\n\nａ・ｂ・ｄは、単純に合算すれば数字は合うように見えますが、契約を結んだタイミング（時間を空けたか同時か）や合算対象の細かい条件で結論が変わり得るため、一概に断定できません。\n\n合算ルールを機械的に当てはめるだけでなく、締結時期などの細部まで確認する姿勢が大切です。","17-17":"この問題は、名目上は利息でなくても実質的に利息とみなされる「みなし利息」について、正しい説明の組み合わせを選ぶものです。原則として、貸主が貸付けに関して受け取るお金は利息とみなされますが、例外もあります。\n\n正解はａとｂです。ａのカード発行手数料も、ｂの貸付金を口座に振り込む際の振込手数料も、貸付けそのものに伴う費用なので、原則みなし利息に含まれます。\n\n間違いはｃとｄです。ｃは、借りた人の都合で再度の口座振替をするときの費用で、借主の都合による事務代行的な費用としてみなし利息から除かれます。ｄは、契約書面を借りた人がなくして再発行するときの手数料で、これも借主の要請による費用として除かれます。\n\n「貸付けに伴う費用は利息、借主都合の事務費用は除外」というイメージで覚えましょう。","17-18":"この問題は、株式会社Aが貸金業の登録を申請したとき、登録を断られる理由（登録拒否事由）にあたらないもの、つまり「適切でない」記述を選ぶものです。\n\n正解は①です。執行猶予がついて、取り消されないまま猶予期間を無事に過ぎた場合は、その時点で刑の言い渡し自体の効力がなくなります。だから「刑の執行終了から5年たっていない人」という拒否事由には当てはまりません。この点を拒否事由だとする①が誤りで、これが正解になります。\n\nほかは正しい記述です。②の常務役員全員に貸付業務の経験がない場合や、④の純資産額が基準に足りない場合は、必要な体制やお金の裏付けを欠くので拒否事由にあたります。③の刑に処せられ5年たっていない人も拒否事由にあたります。\n\n「執行猶予を無事に過ごすと刑の言い渡しの効力が消える」という点が最大のポイントです。","17-19":"この問題は、監督指針にあるシステムリスク管理（情報システムを安全に守る体制）について、「適切でない」記述を選ぶものです。\n\n正解は③です。守るべき重要情報を洗い出すときは、ふだんの業務で使わない領域のデータも除外せず、もれなく把握・管理すべきとされています。③は、そうしたデータを「除く」としている点が誤りで、これが正解になります。\n\nほかは正しい記述です。①のサイバーセキュリティ事案の定義、②の経営陣がシステムを統括する役員を決めているかへの留意、④のシステム監査を外部監査人で代えられる場合があること、いずれも監督指針の考え方に沿っています。\n\n「洗い出しはもれなく（除かない）」がキーワードです。『除く』という言葉が出てきたら疑ってみましょう。","17-20":"この問題は、限度額方式の契約が「借りすぎの基準」を超えていないかを調べる調査について、「適切でない」記述を選ぶものです。\n\n正解は④です。限度額を減らす措置を取ったからといって、元の額に戻すまで調査がずっと不要になるわけではありません。状況によっては改めて調査が必要になり得るので、④は誤りで、これが正解です。\n\nほかは正しい記述です。①や②のように一定期間内の貸付けの合計額や残高の合計が基準を超えるかで調査の要否が決まる点、③のように他社からの借入れと自社の残高の合計が基準を超える場合に収入を証明する書面などの提出を受けなければならない点は、いずれも正しいルールです。\n\n「減額したから調査不要」とは限らない、という点に注意しましょう。","17-21":"この問題は、限度額方式の契約を結ぶ前に渡す「契約締結前の書面」に、書かなくてよい事項（該当しないもの）を選ぶものです。この書面は、契約するかどうかを利用者が判断するための貸付条件を知らせるものです。\n\n正解は①です。「相手方となろうとする個人顧客の氏名及び住所」、つまり利用者本人の名前や住所は、契約前書面で明らかにすべき事項として想定されていません。判断材料は貸付条件であって、自分の名前を書いてもらう書面ではないからです。\n\nほかは書くべき事項です。②の返済期日や返済金額の決め方、③の返済の方法や場所、④の返済の方式は、いずれも契約前書面で明らかにすべき事項にあたります。\n\n「契約前書面は貸付条件を知らせるもの」という目的を思い出すと、本人の氏名・住所が浮くとわかります。","17-22":"この問題は、限度額方式の基本契約の書面（基本契約書面）と、個々の貸付けの書面（個別契約書面）について、「適切でない」記述を選ぶものです。基本契約書面に書いた内容は、個別書面では省ける場合があります。\n\n正解は③です。貸付けの利率は個々の貸付けで大事な条件なので、基本契約書面に利率を書いていても、個別契約書面での利率の記載は省略できません。③は省略できるとしているので誤りで、これが正解です。\n\nほかは正しい記述です。①の登録番号や②の利息の計算方法は、基本契約書面の記載を使って個別書面で省略できます。④のように、各回の返済期日や返済金額を「次回の返済期日・返済金額」で代えることもできます。\n\n「利率は個別に必ず書く」と覚えておきましょう。","17-23":"この問題は、契約締結時に渡した書面の内容を後から変更したとき、書面を渡し直す（再交付する）必要があるかについて、「適切でない」記述を選ぶものです。変更が利用者に有利な場合は、再交付は要りません。\n\n正解は②です。「返済の方法や返済を受ける場所」の変更は、利息計算方法の変更などと同じように一律の再交付義務がかかる事項とはされていません。②はこれを再交付が必要としているので誤りで、これが正解です。\n\nほかは正しい記述です。①の利息の計算方法、③の元本・利息以外に負担すべき金銭に関する事項、④の期限の利益の喪失に関する定めを変更した場合は、利用者に有利な変更のときを除いて、再交付が必要です。\n\nどの項目が再交付の対象かを整理して覚えるのがコツです。","17-24":"この問題は、返済を受けたとき渡す「受取証書」について、「適切でない」記述を選ぶものです。\n\n正解は①です。営業所の窓口で借金の全額の返済を受けたときは、その場で直ちに受取証書を渡すべきものです。①は「遅滞なく渡せば足りる」としていますが、窓口対面ではその場で交付するのが原則なので誤りで、これが正解です。\n\nほかは正しい記述です。②の預金口座への振込みで返済を受けた場合は、借りた人から請求があったときに限り渡せばよいという特則があります。③のように契約番号などで契約を示すことで、登録番号や氏名などの記載を簡略にできます。④の一部返済のときの記載事項も正しい内容です。\n\n「窓口対面はその場で交付、振込みは請求があれば交付」と対比して覚えましょう。","17-25":"この問題は、貸したお金を取り立てるときのルールについて、「適切でない」記述を選ぶものです。\n\n正解は④です。貸金業者以外の人が貸したお金でも、保証契約に基づいて取立てをする場合には、取立て行為の規制（法21条）の趣旨が及び、不適切な取立てをしないよう指導などの対象になり得ます。④は「適用されない」としているので誤りで、これが正解です。\n\nほかは正しい記述です。①の催告書面に送り主の氏名を書くこと、②の借金の処理を任された弁護士から通知が来た後に、正当な理由なく本人へ直接請求を続けてはいけないこと、③の借金の事実が第三者にばれない方法で書面を送ること、いずれも正しいルールです。\n\n「取立ての規制はしっかり及ぶ」という原則を押さえましょう。","17-26":"この問題は、役所による貸金業者の監督について、「適切でない」記述を選ぶものです。\n\n正解は①です。役所の立入検査は「必要があると認めるとき」にできる権限であって、3年ごとに必ず行わなければならない義務ではありません。①はこれを定期的な義務のように書いているので誤りで、これが正解です。\n\nほかは正しい記述です。②の名義貸しで無登録の人に貸金業をやらせた場合は必ず登録を取り消されること、③の正当な理由なく6か月以上業務を休んだ場合に登録を取り消せること、④の利用者保護のために業務改善命令を出せることは、いずれも正しい監督権限です。\n\n「立入検査はできる権限であって、定期義務ではない」と覚えましょう。","17-27":"この問題は、金利などの規制について、「適切でない」記述を選ぶものです。\n\n正解は④です。出資法の上限金利は年20％で、ちょうど年20％の契約は上限を超えていないので刑事罰の対象にはなりません。④は刑事罰の対象としているので誤りで、これが正解です。\n\nほかは正しい記述です。①の仲立ちの手数料を受け取った後、契約更新のときに新たな手数料を受け取ったり請求したりしてはいけないこと、②の期間1年以上の貸借の仲立ち手数料が一定割合を超える契約などに出資法の刑事罰があること、③の利息制限法の制限を超える利息契約を結んだ貸金業者が行政処分の対象になることは、いずれも正しい内容です。\n\n「年20％ちょうどはセーフ、超えたらアウト」と境目を覚えましょう。","17-28":"この問題は、契約などを自分で有効にできる能力（行為能力）について、民法上正しい記述を選ぶものです。\n\n正解は③です。後見開始の審判を受けた人には成年後見人がつきますが、家庭裁判所は人だけでなく法人（会社など）を成年後見人に選ぶこともできます。\n\nほかは間違いです。①は、使い道を決めずに処分を許された財産も自由に使えるのに、使えないとしています。②は、許された営業の範囲外の行為は原則として取り消せるのに、取り消せないとしています。④は、成年被後見人の行為は、日常のこまごました買い物を除き、たとえ後見人の同意を得ていても取り消せるのに、取り消せないとしています。\n\n成年被後見人は「同意があっても取り消せる」のが大きな特徴です。ここは他の制度と違うので注意しましょう。","17-29":"この問題は、権利が時間の経過で消える「消滅時効」について、民法上正しい記述を選ぶものです。\n\n正解は②です。民事調停を申し立てて話がまとまらず終わった場合、その終了時から6か月を過ぎるまでは時効は完成しません（完成が先延ばしされます）。\n\nほかは間違いです。①は、時効の利益は前もって放棄することはできません。③は、催告による先延ばしは最初の1回だけに効き、もう一度催告しても重ねての先延ばし効果はありません。④は、協議を行う旨の書面での合意は「完成を先延ばしする」事由であって、時効の進行をゼロからやり直させる（更新する）ものではありません。\n\n「完成猶予（先延ばし）」と「更新（リセット）」の違いを区別するのがコツです。","17-30":"この問題は、担保の一種である質権と抵当権について、民法上正しい記述を選ぶものです。\n\n正解は①です。動産（品物）を担保にする質権は、貸主にその品物を引き渡すことで初めて効力が生まれます。物を渡すことが成立の条件なのです。\n\nほかは間違いです。②は、質権者は原則として設定者の承諾がなくても、自分の責任で転質（さらに質に入れること）ができます。③は、返済が滞った後は、抵当に入れた不動産から生じる果実（賃料など）にも抵当権の効力が及びます。④は、利息などの定期金について抵当権を行使できるのは、原則として満期になった最後の2年分に限られ、全額ではありません。\n\n「質権は物を渡して成立」「利息は最後の2年分」を押さえましょう。","17-31":"この問題は、保証について民法上正しい記述を選ぶものです。保証とは、借りた人が返せないとき代わりに返す約束です。\n\n正解は④です。主債務者が期限の利益（期日まで返さなくてよい立場）を失ったとき、債権者は個人の保証人に対し、それを知った時から2か月以内に知らせなければなりません。\n\nほかは間違いです。①は、保証人は自分の保証債務について、独自に違約金や損害賠償額を決めることができます。②は、契約後に主債務が重くなっても、保証人の負担は重くなりません。③は、主債務者について生じた時効の完成猶予や更新の効果は、付従性（保証は主債務に従うという性質）により保証人にも及びます。\n\n「2か月以内の通知」と「保証は主債務に従う」を覚えましょう。","17-32":"この問題は、借金などを返す「弁済」について、民法上正しい記述を選ぶものです。\n\n正解は②です。当事者が「第三者による弁済を禁止する」と決めていた場合は、たとえ正当な利益を持つ第三者であっても、代わりに返すことはできません。\n\nほかは間違いです。①は、受領権者らしい外観の人への弁済が有効になるには、返した人が善意なだけでなく無過失であることも必要です。③は、費用・利息・元本への充当順序は、当事者の合意があればそれに従い、合意がないときに法律で定めた順序になります。④は、債権者が前もって受け取りを拒んでいる場合は、実際に持っていかなくても、準備して受け取りを促す口頭の提供で足ります。\n\n「善意だけでなく無過失も必要」という点に特に注意しましょう。","17-33":"この問題は、相続について民法上正しい記述を選ぶものです。\n\n正解は④です。遺産分割協議は相続人どうしの取り決めにすぎません。借金のような分けられる債務は、法律上当然に法定相続分どおりに分かれて引き継がれるため、協議で「一人だけが引き継ぐ」と決めても債権者には通用せず、債権者は各相続人に法定相続分の割合で返済を求められます。\n\nほかは間違いです。①は、胎児は相続では既に生まれたものとみなされます。②は、配偶者と親（直系尊属）が相続人のとき、親の相続分は3分の1です（配偶者が3分の2）。③は、限定承認は相続人全員がそろって行う必要があります。\n\n「借金は協議で押しつけても債権者には通用しない」がポイントです。","17-34":"この問題は、破産法について正しい記述を選ぶものです。\n\n正解は④です。免責許可の決定が確定したときは、破産者は復権します（資格制限などから元の状態に戻ります）。\n\nほかは間違いです。①は、破産財団が手続費用に足りないときでも直ちに却下されるのではなく、同時廃止となる場合があります。②は、免責の申立ての期間について定めがあり、記述の期間の書き方が正確ではありません。③は、浪費やギャンブルによる免責不許可事由があっても、裁判所の裁量で免責を認めることができる場合があります。\n\n「免責確定で復権」と「裁量免責がある」ことを押さえましょう。","17-35":"この問題は、犯罪収益移転防止法（犯収法）について正しい記述を選ぶものです。この法律は、マネーロンダリングを防ぐため本人確認などを求めるものです。\n\n正解は①です。法人と取引するときの本人確認では、法人自体の確認に加えて、実際にその取引をしに来た担当者（自然人）についても本人特定事項の確認が必要です。\n\nほかは間違いです。②は、公共料金の領収証書の原本を見せるだけでは本人特定事項の確認としては不十分です。③は、疑わしい取引の届出は所管の行政庁に対して行うもので、指定信用情報機関へ届け出るのではありません。④は、取引時確認の記録の保存期間や作成時期について、法令の定めを正確に確認する必要があります。\n\n「法人取引では担当者本人の確認も必要」を覚えましょう。","17-36":"この問題は、Aが土地をBに売る代理権をCに与える場面で、代理について「適切でない」記述を選ぶものです。代理とは、本人に代わって契約などをする仕組みです。\n\n正解は④です。無権代理（代理権がないのに代理と称して契約すること）の相手方に認められる取消権は、契約時に代理権がないことを知らなかった善意の相手方にだけ認められます。知っていた（悪意の）相手方には取消権はありません。④は悪意でも取り消せるとしているので誤りで、これが正解です。\n\nほかは正しい記述です。①の詐欺などの有無は代理人について判断すること、②の双方代理は本人の許諾がなければ無権代理行為とみなされること、③の相手方が本人に対し追認するか催告できることは、いずれも正しいです。\n\n「悪意の相手方に取消権なし」がポイントです。","17-37":"この問題は、無効と取消しについて「適切でない」記述を選ぶものです。\n\n正解は④です。法定追認（一定の行為をすると追認したとみなされること）が成立するのは、追認できる時より後に一定の行為があった場合に限られます。追認できる時より前に、取り消せる行為で得た権利を譲渡しても、法定追認にはなりません。④はこれを法定追認としているので誤りで、これが正解です。\n\nほかは正しい記述です。①の取消権者の範囲、②の取り消された行為は初めから無効とみなされること、③の無効な行為は原則追認では効力を生じないが、無効と知って追認すれば新たな行為をしたとみなされることは、いずれも正しいです。\n\n「法定追認は追認できる時より後の行為」というタイミングがカギです。","17-38":"この問題は、債務の引受け（他人の借金を引き受けること）について「適切でない」記述を選ぶものです。\n\n正解は②です。併存的債務引受（元の債務者も残ったまま引受人も加わる形）は、必ず三者そろって契約しなければ成立しないわけではありません。債権者と引受人の契約でも成立でき、債務者と引受人の契約に債権者が承諾する形でも成立します。②は三者間契約でなければ効力を生じないとしているので誤りで、これが正解です。\n\nほかは正しい記述です。①の併存的引受の引受人が債務者と連帯して同じ内容の債務を負うこと、③の免責的引受で債務者が自分の債務を免れること、④の免責的引受の引受人が債務者に求償権を取得しないことは、いずれも正しいです。\n\n「併存的引受は三者そろわなくても成立しうる」を覚えましょう。","17-39":"この問題は、相殺（お互いの債権と債務を差し引きで消すこと）について「適切でない」記述を選ぶものです。\n\n正解は①です。悪意による不法行為の損害賠償を相殺で消すことを禁じるルールは、加害者側からの相殺を封じる趣旨です。被害者である債権者の側が、その賠償債権を自分の債権として相殺することは禁じられていません。①はこれをできないとしているので誤りで、これが正解です。\n\nほかは正しい記述です。②の同時履行の抗弁がついた債権では相殺できないこと、③の差押え後に第三者から取得した債権では差押債権者に相殺を対抗できないこと、④の相殺の意思表示が相殺できる状態になった時にさかのぼって効力を生じることは、いずれも正しいです。\n\n「相殺禁止は加害者側を縛るもの、被害者側からはできる」がポイントです。","17-40":"この問題は、契約について「適切でない」記述を選ぶものです。\n\n正解は③です。契約上の地位の移転には、譲る人と譲り受ける人の合意に加えて、相手方の承諾が必要です。ただ相手方に通知しただけでは地位は移転しません。③は通知だけで移転するとしているので誤りで、これが正解です。\n\nほかは正しい記述です。①の申込者が申込み後に死亡した場合などの扱い、②の双方に責任のない履行不能で債権者が反対給付を拒めること（危険負担）、④の解除による原状回復義務が第三者の権利を害せないことは、いずれも正しいです。\n\n「地位の移転には相手方の承諾が必要」を覚えましょう。","17-41":"この問題は、請負契約（仕事を完成させて報酬をもらう契約）について「適切でない」記述を選ぶものです。\n\n正解は④です。仕事が完成する前なら、注文者は損害を賠償していつでも解除できますが、請負人の側から自由に解除できる権利は認められていません。④は注文者・請負人のどちらからも自由に解除できるとしているので誤りで、これが正解です。\n\nほかは正しい記述です。①の請負の定義、②の物の引渡しを要する請負で報酬支払と引渡しが同時履行の関係にあること、③の注文者が用意した材料や指図による不適合は、請負人が悪意でない限り注文者が責任追及できないことは、いずれも正しいです。\n\n「自由に解除できるのは注文者側だけ」がポイントです。","17-42":"この問題は、不当利得（法律上の理由なく得た利益）と不法行為について「適切でない」記述を選ぶものです。\n\n正解は③です。不当利得の返還範囲は、受け取った人が善意か悪意かで変わります。善意の受益者は今残っている利益（現存利益）だけ返せば足り、悪意の受益者は利息をつけて返す義務を負います。③は善意・悪意を問わず利息をつけて返すとしているので誤りで、これが正解です。\n\nほかは正しい記述です。①の共同不法行為者が連帯して賠償責任を負うこと、②の損害賠償請求権の時効（知った時から3年・不法行為時から20年、生命身体は別）、④の期限前弁済は原則返還請求できないが錯誤の場合は債権者が得た利益を返すことは、いずれも正しいです。\n\n「善意は現存利益、悪意は利息つき」の区別がカギです。","17-43":"この問題は、個人情報保護法について正しい記述を選ぶものです。\n\n正解は①です。個人情報を扱うときは利用目的をできる限り具体的に決めなければならず、目的を変えるときも、変更前の目的と関連性があると合理的に認められる範囲を超えてはいけません。\n\nほかは間違いです。②は、事業を引き継いで得た個人情報を、引き継ぐ前の目的の達成に必要な範囲を超えて使うときは、事後の通知・公表では足りず、あらかじめ本人の同意を得るなどの対応が必要です。③は、取得の状況から利用目的が明らかな場合は通知・公表が不要になる例外があります。④は、契約書などから個人情報を得るときは利用目的の明示で足り、同意を得るところまでは求められていません。\n\n「目的変更は関連性のある範囲まで」を押さえましょう。","17-44":"この問題は、消費者を守る消費者契約法について正しい記述を選ぶものです。\n\n正解は④です。支払いが遅れたときの遅延損害金を定める条項は、年14.6％を超える部分が無効になります（消費者契約法9条）。④は条文どおりで正しいです。\n\nほかは間違いです。①は、ウソを告げられた（不実告知）ことを理由に取り消すには、消費者がそれを事実だと信じて誤認したことが必要なのに、誤認しなくても取り消せるとしています。②は、取消権を使える期間は追認できる時から1年で、「6か月」ではありません。③は、退去させないなどで困らせて契約させた場合は「取り消すことができる」のであって、契約が無効になるのではありません。\n\n「遅延損害金は年14.6％まで」「困惑は無効でなく取消し」を覚えましょう。","17-45":"この問題は、日本貸金業協会の自主規制ルールで、個人向け貸付けの広告を出すときに協会の審査機関の承認が必要な媒体はどれか、を問うものです。\n\n正解は②です。個人向け貸付けの広告のうち、新聞・雑誌への出稿は、協会が設ける審査機関の承認を受けなければならないとされています。\n\nほかは事前承認の対象ではありません。①のインターネット広告、③のチラシ、④の看板は、この承認の対象とされていません。\n\nこれは知識を覚えているかを問う問題です。「承認が必要なのは新聞・雑誌」と、対象が限定されていることを押さえておきましょう。","17-46":"この問題は、個人情報保護法ガイドラインにある安全管理措置の分類について、「適切でない」記述を選ぶものです。安全管理措置には、物理的・人的・組織的・技術的という4つの種類があります。\n\n正解は③です。「担当者や取り扱うデータベースの範囲を限定するためのアクセス制御」は、技術的安全管理措置に位置づけられるものです。③はこれを組織的安全管理措置として説明しているので誤りで、これが正解です。\n\nほかは正しい記述です。①の盗難・紛失防止は物理的措置、②の従業者への周知徹底・教育は人的措置、④の正当なアクセス権を持つ者かの識別・認証は技術的措置で、いずれも正しい分類です。\n\n「アクセス制御は技術的措置」と、どの種類に入るかを整理して覚えるのがコツです。","17-47":"この問題は、景品表示法について「適切でない」記述を選ぶものです。\n\n正解は①です。「景品類」とは、事業者が自分の商品やサービスの取引に付随して提供する経済上の利益に限られます。①は「取引に付随して行われるものかどうかを問わず」としている点が誤りで、これが正解です。\n\nほかは正しい記述です。②の景品類の制限・禁止、③の不実証広告規制（表示の根拠資料を求められて出さないと優良誤認表示とみなされること）、④の措置命令に違反すると刑事罰に処されることは、いずれも条文どおりです。\n\n「景品類は取引に付随するものに限る」という限定を落とさないよう注意しましょう。","17-48":"この問題は、給与所得者の収入や源泉徴収票について、正しい記述を選ぶものです。源泉徴収票は、会社が発行する所得税に関する書類です。\n\n正解は③です。源泉徴収票には支払金額・給与所得控除後の金額・源泉徴収税額などの欄はありますが、前年度の市町村民税の控除額を書く欄はありません。源泉徴収票はあくまで所得税に関する書類だからです。\n\nほかは間違いです。①は、収入は源泉徴収票や給与明細以外に課税証明書などでも把握できます。②は、確定申告が必要になるのは給与年収が2,000万円を超える場合が原則で、1,500万円ではありません。④は、控除対象配偶者の要件について、収入と所得の基準を混同しないよう注意が必要です。\n\n「源泉徴収票は所得税の書類（住民税の控除額欄はない）」を押さえましょう。","17-49":"この問題は、損益計算書について正しい記述を選ぶものです。損益計算書は、一定期間の会社のもうけ（経営成績）を表す書類です。\n\n正解は②です。会社計算規則では、売上総損益金額から販売費及び一般管理費の合計額を引いた額がゼロ以上のとき、それを営業利益金額といいます。\n\nほかは間違いです。①は、ある時点の財政状態を表すのは貸借対照表で、損益計算書は一定期間の経営成績を表します。③は、経常利益は営業損益に営業外の収益・費用を加減して求めるもので、特別損益を使う説明は誤りです。④も、当期純利益の算定に特別損益や税金の扱いを混同しており正確ではありません。\n\n「営業利益＝売上総利益－販管費」という基本の計算を覚えましょう。","17-50":"この問題は、企業会計原則の一般原則について「適切でない」記述を選ぶものです。\n\n正解は③です。企業会計原則の一般原則には、真実性の原則、資本取引と損益取引の区分の原則、単一性の原則などがありますが、「財産目録及び出納帳簿によって会計事実を明瞭に表示する」という内容や、「適切性の原則」という名前の原則は存在しません。③はこの点が誤りで、これが正解です。\n\nほかは正しい記述です。①の真実性の原則、②の資本取引と損益取引の区分の原則、④の単一性の原則は、いずれも実在する原則で内容も正しいです。なお、財務諸表による明瞭な表示を求めるのは「明瞭性の原則」で、③はこれと似た名前で引っかけています。\n\n実在しない原則名や内容を作られていないか、名称と中身を照らし合わせるのがコツです。","18-1":"この問題は、貸金業法で使われる言葉の意味（定義）が正しく書かれているものが何個あるかを数える問題です。正解は「2個」です。\n\nまずａは間違いです。「貸金業者」とは、国の登録を受けてお金を貸す商売をしている人のことで、保証を専門に引き受ける会社（保証業者）はここには含まれません。保証業者は別のルールで扱われるので、混ぜてはいけないのがポイントです。\n\nｂは正しく、「資金需要者等」とはお金を借りたい客や、借りている人、過去に借りていた人をまとめた言葉です。\n\nｃとｄは住宅資金の契約や、紛争を解決するための契約の説明ですが、どちらか一方は条文の細かい言い回しとズレていて不適切です。結局、正しいのはｂともう1つだけで、合わせて2個になります。\n\n用語の定義は「誰が入って誰が入らないか」を意識すると引っかかりにくくなります。","18-2":"この問題は、貸金業の登録を「断られてしまう人（登録拒否事由に当たる人）」の組み合わせを選ぶ問題です。正解はｂとｃの組み合わせです。\n\nｂは、出資法という金利などを取り締まる法律に違反して罰金刑を受け、その刑が終わってから決められた年数がまだ経っていない人です。こういう人は登録を断られます。ｃは、登録を取り消された会社の取締役を、取消しの少し前に辞めた人で、取消しから一定期間経っていない人です。逃げ得を防ぐため、この人も断られます。\n\nｱが間違いなのは、破産しても「復権（元の状態に戻ること）」を得た人はもう問題なく登録できるからです。断られるのは復権をまだ得ていない人です。ｄは説明が逆で、貸金業の経験がある取締役が一人もいない会社こそ断られます。\n\n「まだ立ち直っていない人・逃げた人はダメ」とイメージすると覚えやすいです。","18-3":"この問題は、反社会的勢力（暴力団など）による被害を防ぐために、監督する側が貸金業者をチェックするときの注意点として正しいものが何個あるかを問うものです。正解は「3個」です。\n\nａ・ｂ・ｄはどれも妥当な内容です。専門の担当部署を作って情報を一元管理すること、事前審査や契約書の暴力団排除条項で取引を未然に防ぐこと、不当な要求には法的手段や刑事事件化もためらわず対応すること、いずれも正しい姿勢です。\n\n間違いはｃです。反社会的勢力との取引だとわかったら、被害が広がらないよう「できるだけ早く関係を断つ」のが正しい対応です。ｃは「支払いが滞ったり不当要求があるまで契約を切らない」と書いていて、これでは対応が遅すぎるので不適切です。\n\n「反社とわかったらすぐ縁を切る」が基本、と押さえておきましょう。","18-4":"この問題は、貸金業務取扱主任者（お店に必ず置く法律の専門担当者）についての説明で、正しいものを1つ選ぶ問題です。正解は①です。\n\n①は、主任者の登録を取り消された人は、その処分の日から決められた期間は再び登録を受けられない、という内容で正しいです。悪いことをした人がすぐ復帰できないようにする仕組みです。\n\n②は間違いで、更新のときは講習を受けるだけでなく、更新の申請という手続きも必要です。③も間違いで、主任者はその営業所に「ずっと張り付いている（常時駐在）」ことまでは求められていません。④も間違いで、主任者がいなくなったときの対応期間は「2週間」ではなく、条文が定める別の期間です。\n\n数字（期間）や「申請が必要か」といった手続きの有無が引っかけになりやすい問題です。","18-5":"この問題は、お客さんの年収を証明する書類（年収証明書）に関する説明で、正しい組み合わせを選ぶものです。正解はｃとｄの組み合わせです。\n\nｃは、市区町村が発行する所得・課税証明書は、たとえ法律に発行の直接の根拠がなくても、年収を示す所得証明書に含めてよい、という内容で正しいです。ｄは、年収証明書がもらえず年収がわからないときは、返済能力を確認できないので貸してはいけない、という内容で正しいです。\n\nｱとｂは不適切とされています。ｂは、給与明細を使う場合は「直近の一定期間の複数月分」が必要なのに、「好きな2か月分でよい」と言い切っている点がずれています。ｱも他の選択肢と比べて不適切と判断されます。\n\n「年収がわからなければ貸せない」という総量規制の考え方が根っこにあります。","18-6":"この問題は、総量規制（借りすぎ防止のルール）の対象から外れる「除外契約」に当てはまらないものはどれか、正しい説明が何個あるかを数える問題です。正解は「3個」です。\n\nａ・ｂ・ｃはどれも正しいです。住宅の改良資金でもその住宅を担保にしないものは除外にならない、車の購入資金でも所有権留保や担保がないものは除外にならない、高額療養費のためでも生計を共にしない親族のためのものは除外にならない、という内容で、いずれも条文どおりです。\n\n間違いはｄです。自分の不動産（居宅を含む）を担保にして、返済能力を超えないと認められる貸付けは、居宅であっても除外契約に「当てはまり得る」ので、「当てはまらない」と書いたｄは誤りです。\n\n除外契約は「担保があるか」「その使い道か」で当てはまりが変わる、と整理すると分かりやすいです。","18-7":"この問題は、極度方式基本契約（限度額の範囲で何度も借りられる契約）について、3か月ごとに借りすぎになっていないか調べる義務に関する問題です。正解は②です。\n\n②は、その期間の末日の借入残高がごく少額（10万円以下）にとどまるなら、この調査をしなくてよい、という内容で正しいです。少額なら借りすぎの心配が小さいからです。\n\n①は、合計が100万円を超えると年収証明書が必要になるところ、80万円ならまだ基準に届かないので不要です。だから「提出を受けなければならない」は誤りです。③は、すでに新たな貸付けを止めている場合は別扱いになり得るので、残高20万円でも必ず調査、とは言えず不正確です。④は、借りすぎと判明したときに義務づけられるのは新たな貸付けの停止で、契約の解除までは求められないので誤りです。\n\n「少額なら調査不要」「求められるのは貸付停止」の2点を押さえましょう。","18-8":"この問題は、貸金業の広告や勧誘のルールについて正しいものを1つ選ぶ問題です。正解は②です。\n\n②は、業界団体（日本貸金業協会）のルールで、個人向け貸付けの広告をテレビCM・新聞・雑誌・電話帳に出すときは、協会の審査機関から事前に承認をもらわないといけない、という内容で正しいです。\n\n①は間違いで、貸付条件について事実とまったく違う説明をする行為は、行政処分だけでなく刑事罰の対象にもなり得ます。③は「最低3か月間」と数字を言い切っている点が協会ルールとずれていて不正確です。④も間違いで、借入れが簡単だと過度に強調するような広告をすると、業務改善命令だけでなく、悪質なら登録取消しの対象にもなり得ます。\n\n「取消しにはできない」「刑事罰にはならない」などの言い切りは、たいてい引っかけです。","18-9":"この問題は、契約を結ぶ前にお客さんへ渡す説明書面（契約締結前の書面）についての問題です。正解は④です。\n\n④は、保証人になろうとする人と保証契約を結ぶときは、契約の「概要」を書いた書面と「詳細」を書いた書面の両方を、契約前に渡さなければならない、という内容で正しいです。\n\n①は間違いで、契約年月日など「契約を結んだ後に決まる事項」を、契約前の書面の記載事項として挙げている点が性質に合いません。②は、極度方式の貸付けでは毎回の書面交付に例外があり得るので、一般化すると誤りです。③も間違いで、書面を渡した後・契約前に記載内容が変わった場合は、あらためて書面を渡す対応が必要になることがあり、「再交付は不要」と言い切れません。\n\n保証人には「概要＋詳細」の2つを渡す、とセットで覚えましょう。","18-10":"この問題は、お金を貸す契約を結んだ後、その保証契約をCと結ぶ場合の、契約後に渡す書面（契約締結時書面）についての問題です。正解はｂとｄの組み合わせです。\n\nｂは、Cが連帯保証人になる場合、書面には民法454条（連帯保証人は「まず本人に請求して」などと言えない、という趣旨）を書かなければならない、という内容で正しいです。ｄは、保証契約を結んだら、保証人Cに対しても、もとの貸付契約の内容を明らかにする書面を渡さなければならない、という内容で正しいです。\n\nｱは間違いで、保証契約の書面を渡す相手は保証人Cであって、借りた本人Bに渡すという点がずれています。ｃも間違いで、返済方法の変更がCに有利な変更であっても、原則は変更後の書面を渡し直す必要がある場合があり、「一律に不要」とは言えません。\n\n「連帯保証には454条の記載」「保証人にも契約内容の書面」を押さえましょう。","18-11":"この問題は、極度方式基本契約（限度額つきの契約）の内容を変えたとき、契約後の書面を渡し直す（再交付する）必要があるかどうかを問う問題です。正解はｱとｄの組み合わせです。\n\nｱは、極度額をいったん下げてから、もとの範囲内に上げ直す場合は、再交付しなくてよい、という内容で正しいです。ｄは、登録番号のカッコ書き（更新回数）だけが変わった場合は、契約の大事な中身が変わったわけではないので再交付は不要、という内容で正しいです。\n\nｂは間違いで、返済期日や返済金額のしくみを変えるのは大事な変更なので、再交付が必要です。ｃも間違いで、貸付けの利率(金利)の変更は、たとえ引き下げであっても大事な変更なので再交付が必要です。\n\n「金利や返済方法が変わったら渡し直す」「軽い変更なら不要」と区別すると分かりやすいです。","18-12":"この問題は、貸金業者が法律にもとづいて保存しておかなければならない書類の保存期間について、正しいものを1つ選ぶ問題です。正解は①です。\n\n①は、従業者名簿は「最後に記載した日から10年間」保存する、という内容で正しいです。\n\n②③④はいずれも保存期間の「数え始めの日（起算点）」がずれていて誤りです。②の返済能力調査の記録や④の帳簿は、「契約を結んだ日」や「作った日」からではなく、その契約の最後の返済期日（借金が消えたときはその日）から数えて保存します。③の借りすぎ調査の記録も同じく、作った日からではありません。\n\nこの手の問題は「10年」という年数より、「いつから数えるか」がひっかけです。帳簿は最終返済期日から、名簿は最終記載日から、と区別して覚えましょう。","18-13":"この問題は、貸金業者が貸付けの債権（お金を返してもらう権利）を他人に譲るときのルールについて、正しいものを1つ選ぶ問題です。正解は④です。\n\n④は、債権を他人に譲ったら、原則として決められた期間内に、その旨を登録した役所（内閣総理大臣や都道府県知事）に届け出なければならない、という内容で正しいです。\n\n①は通知すべき内容や相手の当てはめが不正確で誤りです。②は、債権の内容を明らかにする書面を渡す義務が「譲る側だけ」のように書いていますが、譲り受けた側にも交付義務が生じ得るので誤りです。③は、帳簿を譲り受けた人に渡したからといって、譲った側の保存義務が自動的に消えるわけではないので誤りです。\n\n「債権を譲ったら役所に届け出る」を軸に、義務が誰に残るかを丁寧に確認しましょう。","18-14":"この問題は、監督指針でいう「不祥事件」（役員や従業員が業務に関して法令違反などをすること）についての説明で、正しいものが何個あるかを数える問題です。正解は「4個」で、ａ・ｂ・ｃ・ｄすべてが正しいです。\n\nａは、詐欺・横領・背任や、告訴・告発・検挙された行為などが不祥事件に当たるという説明で妥当です。ｂは、不祥事件が起きたときに社内報告・警察等への通報・独立部署による調査を確認するという対応で妥当です。ｃは、発覚後の対応や経営陣の関与の有無などをチェックする着眼点で妥当です。ｄは、届出があったときに当局が深く聞き取りをし、必要なら報告書を求めるという対応で妥当です。\n\nすべて正しい「全部が正解」パターンです。焦って間違い探しをして正しい記述にケチをつけないよう注意しましょう。","18-15":"この問題は、金利や保証料が出資法・利息制限法の上限を超えていないかを問う計算まじりの問題です。正解は「1個」です。\n\nｱは正しいです。元本100万円を年18%で貸しても、出資法の上限を超えていないので、刑事罰の対象にはなりません。\n\n一方、この取引では利息18%に加えて保証料3%も取っています。利息制限法では、利息と保証料を合わせて金利の上限を判断するため、合計すると上限を超える部分が出てくる可能性があります。そのため、保証料が刑事罰の対象にならないとするｂや、利息・保証料の約定が全部有効だとするｃ・ｄは、上限を超える部分について不適切となります。結局、正しいのはｱの1個だけです。\n\n「利息だけでなく保証料も合算して上限を見る」という視点が引っかけの鍵です。","18-16":"この問題は、手数料などが「利息とみなされるかどうか（みなし利息）」について、利息制限法上正しい組み合わせを選ぶ問題です。正解はｱとｂの組み合わせです。\n\nｱは、2万円の返済のときにATM利用料として220円を受け取る、といったごく少額の機械利用料は利息とみなされない、という内容で正しいです。ｂは、税金など公的なお金（公租公課）に充てるための費用は利息とみなされない、という内容で正しいです。\n\nｃは間違いで、口座振替がうまくいかず、お客さんの求めでもう一度手続きした実費は、原則として利息とみなされません。ｄも間違いで、カードの発行手数料は、原則として利息とみなされます。\n\n「少額のATM料・税金分はセーフ」「カード発行手数料はアウト（利息扱い）」とペアで覚えると整理しやすいです。","18-17":"この問題は、貸金業者が届出をするタイミング（事前か事後か）について、適切でないものを1つ選ぶ問題です。正解は④です。\n\n④が誤りです。業務の種類や方法を変えるときは、変更後2週間以内に届け出れば足りる「事後の届出」でよいのに、「あらかじめ届け出なければならない」と書いている点が間違いです。\n\n①の主任者の氏名・登録番号の変更、②の取締役の変更は、どちらも「変更があった日から2週間以内」の事後届出でよく、正しい説明です。③の広告に載せるホームページアドレスの変更は、逆に「あらかじめ（事前に）」届け出るべきものとされていて、正しい説明です。\n\n「事前に届け出るもの」と「後から届け出ればよいもの」を区別するのがこの問題のポイントです。","18-18":"この問題は、廃業などがあったときの届出について、適切でないものを1つ選ぶ問題です。正解は①です。\n\n①が誤りです。届出が必要になるのは破産手続開始の「申立て」をしたときではなく、破産手続開始の「決定」を受けたときです。しかも、そのときに届け出るのは会社自身ではなく「破産管財人」です。つまり①は、数え始める時点と、届け出る人の両方が間違っています。\n\n②の相続人が死亡を知った日から30日以内に届け出ること、③の合併で消える会社の代表役員だった人が届け出ること、④の貸金業貸付媒介の登録を受けたことを届け出ることは、いずれも正しい説明です。\n\n破産のときは「申立てではなく決定」「本人ではなく破産管財人」がひっかけどころです。","18-19":"この問題は、監督指針の経営管理や業務の適切性について、適切でないものを1つ選ぶ問題です。正解は②です。\n\n②が誤りです。ひとりで営む貸金業者が内部監査の代わりに自己検証をする場合、監督指針は「年1回以上」という数字だけを絶対の基準にしているわけではなく、規模や特性に応じて十分な態勢があるかを総合的に見る趣旨です。数字だけを絶対視している点が不正確です。\n\n①の社内規則を法令や法の趣旨をふまえて自主的に作る必要があるという説明、③の貸金業者の役割認識と信頼確立の重要性の説明、④の経営者保証ガイドラインを融資慣行として浸透させる説明は、いずれも監督指針の趣旨に沿っていて正しいです。\n\n「〇回以上」のような数字を言い切る選択肢は、疑ってかかると見抜きやすくなります。","18-20":"この問題は、貸金業者がやってはいけない行為（禁止行為）について、適切でないものを1つ選ぶ問題です。正解は②です。\n\n②が誤りです。借りた人などの死亡で保険金が入る保険契約の締結が禁止されるのは、「自殺による死亡」を保険事故とするものについてです。②は住宅資金貸付契約などを除いてすべての保険契約が禁止されるかのように広げて書いていて、言いすぎなので不適切です。\n\n①の保証人になろうとする人へ「必ず返してもらえる」と誤解させる告知の禁止、③の返済能力がない人などを狙った勧誘表示の禁止、④の媒介手数料について更新のたびに新しい手数料を取ってはいけないというルールは、いずれも正しい説明です。\n\n禁止の範囲を必要以上に広げた選択肢はひっかけ、と意識しましょう。","18-21":"この問題は、返済能力の調査で「指定信用情報機関の情報（信用情報）を使う必要があるかどうか」について、適切でないものを1つ選ぶ問題です。正解は③です。\n\n③が誤りです。極度方式基本契約にもとづく個々の貸付けで信用情報を使った調査が要らないのは、貸付けの金額や残高の合計がごく少額にとどまる場合です。③が挙げる「5万円超かつ合計10万円超」という数字の当てはめが、実際の基準と違っているので誤りです。\n\n①は、法人のお客さんには個人向けの総量規制が使われないので信用情報は不要、という点で正しいです。②は、返済能力が下がっていない前提で、一時的に下げた極度額をもとの範囲に戻すだけなら再調査は不要、という点で正しいです。④は、融通手形を除く手形の割引契約は信用情報の使用義務の対象外で、正しいです。\n\n金額の数字をすり替える引っかけに注意しましょう。","18-22":"この問題は、借りすぎを防ぐ「過剰貸付けの禁止」について、適切でないものを1つ選ぶ問題です。正解は③です。\n\n③が誤りです。個人事業者が事業で得た所得（総収入金額）を、総量規制でいう「給与に類する定期的な収入」に当てはめている点が不正確です。事業所得は原則としてこの「給与に類する収入」には当たらないとされています。\n\n①は、法人への貸付けには個人向けの総量規制が使われないので正しいです。②は、これから新しく事業を始める人向けの資金でも、計画をきちんと確認でき返済能力を超えないと認められれば例外に当たり得るので正しいです。④は、建設工事の請負契約書の写しなどを、契約の最終返済期日まで保存する義務があるという点で正しいです。\n\n「事業の所得＝給与のような定期収入」と扱う点がひっかけです。","18-23":"この問題は、総量規制の「例外契約」（借りすぎ防止の枠から外して貸せる契約）について、適切でないものを1つ選ぶ問題です。正解は①です。\n\n①が誤りです。事業をしている個人への貸付けが例外契約になるには、実態の確認と返済能力の観点の両方を満たすことが求められる場合があるのに、①は「どちらか一方でよい」と書いている点が不正確です。\n\n②の、銀行などの正規の貸付けが確実に行われるまでのつなぎ資金で返済期間が1か月を超えないもの、③の、特定費用のための貸付けで要件を満たさなければ例外に当たらないという説明、④の、既存の借金の借換えでも毎月の負担が前より重くなるものは例外に当たらないという説明は、いずれも正しいです。\n\n「いずれか一方でよい」と要件をゆるめる選択肢は疑いましょう。","18-24":"この問題は、貸付条件の広告や誇大広告の禁止について、適切でないものを1つ選ぶ問題です。正解は①です。\n\n①が誤りです。広告に表示しなければならないのは、貸付けの利率・返済方式・返済期間や回数などです。「貸金業者が受け取る書面の内容」まで表示する義務はないので、①は間違いです。\n\n②は、テレビCM・新聞・広告塔・チラシ・ネット表示などが広く「広告」に当たるという監督指針の説明で正しいです。③は、返済能力を超える貸付けにならないよう配慮し、広告や勧誘が行きすぎないよう努める、という説明で正しいです。④は、広告などに載せる電話番号は登録簿に登録されたもの以外を使ってはいけない、という説明で正しいです。\n\n広告に「何を載せるか」を、条文の項目とセットで押さえておきましょう。","18-25":"この問題は、特定公正証書（返せなければすぐ強制執行に応じる、と書いた公的な証書）に関する制限について、適切でないものを1つ選ぶ問題です。正解は③です。\n\n③が誤りです。この証書を公証人に作ってもらうよう頼んだ場合の、書面を渡して説明する義務は、頼む「前」に行うべきものです。③は「頼んだ後に遅滞なく行う」と時期を書いている点が間違っています。\n\n①の、代理人への委任を証する書面を取ってはいけないというルール、②の、代理人選びに口出し（推薦など）してはいけないというルール、④の、年金など公的給付が入る口座の通帳やカードを取り上げたり預かったりしてはいけないというルールは、いずれも正しい説明です。\n\n「説明は作成を頼む前に」という順番がひっかけどころです。","18-26":"この問題は、貸金業者に対する監督などについて、適切でないものを1つ選ぶ問題です。正解は③です。\n\n③が誤りです。暴力団員などを業務に使ってはいけないというルールに違反した場合、登録取消しや業務停止だけでなく、必要な措置を命じることもできる、という幅のある対応が定められています。③は対応を限定して書いている点が不正確です。\n\n①の、毎事業年度が終わってから3か月以内に事業報告書を出す義務、②の、必要があるときは業務の報告や資料提出を命じられる権限、④の、正当な理由なく登録から一定期間内に貸金業を始めないと登録を取り消せること、はいずれも正しい説明です。\n\n監督処分は「取消し・停止のほかに命令もできる」と幅広く定められている点を押さえましょう。","18-27":"この問題は、同じ相手との複数の貸付契約について、利息制限法の上限金利をどう判断するかを問う問題です。正解は④(適切でないもの)です。\n\n④が誤りです。複数の契約が実質的に一体として結ばれた場合は、元本を合算して上限金利を判断します。ところが④は、第二契約だけを取り出して超過部分を無効とし、第三契約を計算から外していて、この合算の考え方に合わないので誤りです。\n\n①は、前の借金を完済した後の新しい契約は別物として、その元本に応じた上限で判断するので正しいです。②③は、同時に結んだり残高がある状態で追加したりした契約について、元本を合算して上限を判断するという考え方でおおむね正しいです。\n\n「同時・一体の契約は元本を足して上限を見る」「完済後の契約は別物」と区別するのがコツです。","18-28":"この問題は、判断する力（意思能力）や、契約をする資格（行為能力）について、民法上正しいものを1つ選ぶ問題です。正解は③です。\n\n③は、成年被後見人（判断能力が特に不十分で保護される人）の契約は、日用品の購入など日常の行為を除き、たとえ後見人の同意を得ていても取り消せる、という内容で正しいです。同意があっても取り消せる、というのがポイントです。\n\n①は間違いで、判断する力がない状態でした行為は「取消し」ではなく最初から「無効」です。②も間違いで、未成年者が権利をもらうだけ・義務を免れるだけの行為には同意は要らず、説明の対比が逆です。④も間違いで、被保佐人がお金を借りるには保佐人の同意が必要です。\n\n「意思能力なし＝無効」「成年被後見人は同意があっても取消せる」を押さえましょう。","18-29":"この問題は、契約が「無効」になる場合と「取消し」できる場合の違いについて、民法上正しいものを1つ選ぶ問題です。正解は④です。\n\n④は、勘違い（錯誤）・だまし（詐欺）・おどし（強迫）で取り消せる行為を後から認める（追認する）には、その原因となった状況が消え、かつ取消しできると知った後でなければ効力が出ない、という内容で正しいです。\n\n①は間違いで、無効な行為は認めても最初にさかのぼって有効にはならず、認めた時から新しくやり直したものとみなされるだけです。②も間違いで、制限行為能力者は誰かの同意がなくても自分で取消しができます。③も間違いで、取消しの効果は「最初にさかのぼって無効」であり、将来に向かってだけ無効になるわけではありません。\n\n「無効はさかのぼる、取消しもさかのぼる」と押さえると混乱しにくいです。","18-30":"この問題は、時効（時間が経つと権利が消えたりする仕組み）について、民法上正しいものを1つ選ぶ問題です。正解は④です。\n\n④は、裁判の確定判決などで確定した権利は、本来の時効期間が10年より短くても、原則としてその時効期間は10年になる、という内容で正しいです。\n\n①は、消滅時効の年数の当てはめが説明とずれる可能性があり不正確です。②は間違いで、時効の利益は「あらかじめ（前もって）」放棄することはできません。③も間違いで、時効の完成猶予や更新の効力は、原則として当事者とその承継人の間だけに及び、利害関係を持つすべての人に及ぶわけではありません。\n\n「確定判決で確定した権利は10年」「時効の利益は前もって放棄できない」を押さえましょう。","18-31":"この問題は、債権(お金などを請求する権利)の中身や効力について、民法上正しいものを1つ選ぶ問題です。正解は①です。\n\n①は、特定の物を引き渡す債務では、渡すまでの間、その物を「善良な管理者の注意（善管注意義務）」をもって大切に保管しなければならない、という内容で正しいです。自分の物より丁寧に扱うイメージです。\n\n②は間違いで、損害賠償は通常の損害が基本ですが、特別な事情による損害も、予見できた場合には賠償の対象になり得ます。③も間違いで、お金を返す債務(金銭債務)の不履行では「不可抗力だった」という言い訳は通用しません。④も間違いで、賠償額の予定がなくても、金銭債務の損害賠償額は法定利率などで決まり、いちいち損害額を証明しなくてよいとされています。\n\n「特定物は善管注意」「金銭債務に不可抗力の言い訳なし」を覚えましょう。","18-32":"この問題は、AのBに対する貸付金債権を他人に譲るときの、民法上のルールについて正しいものを1つ選ぶ問題です。正解は③です。\n\n③は、Bが確定日付のない証書で承諾した後に、別の譲受人へ確定日付のある通知が届いた場合、確定日付のある通知を備えた側が優先し、先に承諾を得た側は債務者に対抗できない、という内容で正しいです。\n\n①は間違いで、譲渡を禁止する特約があっても譲渡自体は有効です。②も間違いで、確定日付がない通知でも、債務者本人に対しては対抗できます(足りないのは第三者に対する対抗力です)。④も間違いで、二重譲渡の優劣は「確定日付のある通知が債務者に届いた順番」で決まるのが原則で、単に日付の先後だけでは決まりません。\n\n「対抗力は確定日付つき通知の到達順」がこの分野のカギです。","18-33":"この問題は、AのBへの債権(甲)とBのAへの債権(乙)を相殺(そうさい)できるかを問う問題です。正解は②です。\n\n②は、相殺しようとする側の自分の債権(自働債権)の弁済期が来ていなければ、原則として相殺できない、という考え方に沿っていて正しいとされています。\n\n①は間違いで、甲債権が差押えを受けた後にその状況で相殺しようとするのは原則として差押えた人に対抗できません。③も間違いで、差押えの「前」に持っていた債権を自働債権にする相殺は差押債権者に対抗できる場合があるので、「対抗できない」と言い切るのは誤りです。④も間違いで、時効で消えた債権でも、消える前に相殺できる状態(相殺適状)になっていれば相殺できるので、「できない」は誤りです。\n\n相殺は「弁済期」と「差押えの前後」がポイントになります。","18-34":"この問題は、お金の貸し借り(金銭消費貸借)について、民法上正しいものを1つ選ぶ問題です。正解は①です。\n\n①は、書面で結ぶ金銭消費貸借では、借主はお金を受け取る前なら契約を解除できる、という内容で正しいです。まだお金を受け取っていないうちなら「やっぱりやめます」と言えるわけです。\n\n②は間違いで、利息の約束をしていない貸し借りは原則として無利息なので、当然に利息を請求できるわけではありません。③も間違いで、分割払いで1回でも遅れたら全額一括請求できるのは、そういう取り決め(期限の利益喪失条項)がある場合で、無条件ではありません。④も間違いで、利息を1年以上滞納し催告しても払わないときは、貸主は利息を元本に組み入れることができます。\n\n「書面の貸借は受取り前なら解除可」を押さえましょう。","18-35":"この問題は、犯罪収益移転防止法(犯収法)の「取引時確認」について、正しいものを1つ選ぶ問題です。正解は②です。\n\n②は、運転免許証は提示を受ける日に有効なもの、住民票の写しは提示を受ける日より前の一定期間内に作られたものに限る、という内容で正しいです。\n\n①は間違いで、確認する事項は氏名・住居・生年月日・職業などで、「収入」は含まれません。③も間違いで、本人確認では運転免許証は原本の提示が必要で、写しでは足りません。④も間違いで、過去にきちんと取引時確認をして記録が残っているお客さんとの取引では、あらためて確認しなくてよい場合があります。\n\n「確認事項に収入は入らない」「本人確認は原本」を覚えておきましょう。","18-36":"この問題は、意思表示(通謀虚偽表示・錯誤・詐欺・強迫)について、民法上適切でないものを1つ選ぶ問題です。正解は④です。\n\n④が誤りです。おどし(強迫)による意思表示の取消しは、事情を知らず落ち度もない第三者に対しても対抗できます。だまし(詐欺)と違って第三者を保護する特別ルールがないので、「対抗できない」とする④は間違いです。\n\n①の、示し合わせたウソの契約(虚偽表示)の無効は善意の第三者に対抗できないという説明、②の、動機の錯誤はその動機を相手に伝えていなければ取消しを主張できないという説明、③の、詐欺による取消しは善意無過失の第三者に対抗できないという説明は、いずれも正しいです。\n\n「強迫は第三者にも強い(対抗できる)」「詐欺は善意無過失の第三者に弱い」と対比して覚えましょう。","18-37":"この問題は、期間の数え方について、民法上適切でないものを1つ選ぶ問題です。正解は③です。\n\n③が誤りです。期間の最終日が日曜・祝日などの休日に当たるとき、期間がその翌日まで延びるのは「その日に取引をしない習慣がある場合に限る」とされています。③は、いつでも常に前日に終わる、と書いている点が間違いです(方向も逆です)。\n\n①の、時間で定めた期間はすぐに数え始めるという説明、②の、日で数える期間の計算(初日を数えないなど)による期限の当てはめ、④の、応当する日がない月では月末に満了するという説明は、いずれも正しいです。\n\n期間計算は「休日にあたると翌日に延びる(習慣がある場合)」「初日は数えない」など細かいルールを丁寧に確認しましょう。","18-38":"この問題は、質権(しちけん)と抵当権について、民法上適切でないものを1つ選ぶ問題です。正解は②です。\n\n②が誤りです。債権に質権を設定した人(質権者)が第三債務者から直接取り立てできるのは、自分の債権額(担保されている額)に対応する分までです。②は、質に入れた債権の全部を無制限に取り立てられると書いていて言いすぎなので誤りです。\n\n①の、債権質は第三債務者への通知か承諾がないと対抗できないという説明、③の、根抵当権者は元本や利息などについて極度額を限度に権利を行使できるという説明、④の、元本が確定する前なら後順位の権利者などの承諾なしに担保する債権の範囲を変えられるという説明は、いずれも正しいです。\n\n「取り立てられるのは自分の債権額の範囲まで」を押さえましょう。","18-39":"この問題は、保証について、民法上適切でないものを1つ選ぶ問題です。正解は①です。\n\n①が誤りです。保証人の負担が主たる債務より重いときは主たる債務の範囲まで減らされますが、それとは別に、保証人が自分の保証債務についてだけ違約金や損害賠償額を約束すること自体は認められています。①は「約束できない」と書いていて間違いです。\n\n②の、連帯保証人は「まず本人に請求して」「本人の財産を先に」と言える権利(催告・検索の抗弁)を持たないという説明、③の、取り消せる債務を取消原因を知って保証した人は独立の債務を負ったと推定されるという説明、④の、義務として立てる保証人は行為能力者で弁済資力がある人でなければならないという説明は、いずれも正しいです。\n\n「保証債務だけに違約金を付けるのはOK」がひっかけです。","18-40":"この問題は、相続について、民法上適切でないものを1つ選ぶ問題です。Aが配偶者B、子CとD、Dの子(孫)Eを残して亡くなった事例です。正解は④です。\n\n④が誤りです。Dが相続放棄をすると、Dは初めから相続人でなかったことになり、その子Eは代襲相続(親の代わりに相続すること)ができません。だから相続人はBとCだけになり、「Eが共同相続人になる」とする④は間違いです。放棄の場合は代襲がない、というのが大事なポイントです。\n\n①の、配偶者2分の1・子はそれぞれ4分の1という法定相続分、②の、遺言で相続分を変えても債権者には法定相続分で請求できるという説明、③の、相続財産の一部を使ってしまうと単純承認したとみなされるという説明は、いずれも正しいです。\n\n「相続放棄では代襲は起きない(死亡・欠格・廃除では起きる)」を区別しましょう。","18-41":"この問題は、手形法と電子記録債権法について、適切でないものを1つ選ぶ問題です。正解は①です。\n\n①が誤りです。手形には「人的抗弁の切断」というルールがあり、振出人は、自分と直接の相手との間の詐欺などの事情を、その事情を知らず落ち度もない裏書譲受人には対抗できません。①は「対抗できる」と書いていて間違いです。\n\n②の、裏書が連続している手形の所持人は権利者と推定され、自分が正当な権利者だと証明しなくても請求できるという説明、③の、電子記録債権は原則として発生記録で生じるという説明、④の、電子記録名義人への支払いは支払った人に悪意や重過失がなければ有効という説明は、いずれも正しいです。\n\n「善意無過失で手形を受け取った人は保護される」がカギです。","18-42":"この問題は、民事訴訟法について、適切でないものを1つ選ぶ問題です。正解は④です。\n\n④が誤りです。続行の期日に出頭しなくても、出しておいた準備書面の内容を述べたことにする「擬制陳述(ぎせいちんじゅつ)」は、原則として簡易裁判所の手続きでの扱いです。地方裁判所の通常の口頭弁論では原則使えないので、④は間違いです。\n\n①の、専属管轄がある場合を除き第一審に限って合意で管轄裁判所を決められるという説明、②の、地方裁判所は訴状の提出、簡易裁判所は口頭でも訴えを起こせるという説明、③の、登記された支配人は訴訟代理人になれるという説明は、いずれも正しいです。\n\n擬制陳述は「簡易裁判所は続行期日でもOK、地裁は原則ダメ」と区別しましょう。","18-43":"この問題は、個人情報保護法の用語について、正しいものを1つ選ぶ問題です。正解は③です。\n\n③は、体の一部の特徴を機械で使えるように変換した符号のうち政令で定めるもの(指紋データなど)は「個人識別符号」に当たり、それを含む生きている個人の情報は「個人情報」になる、という内容で正しいです。\n\n①は間違いで、取得後に他の情報と照らし合わせて特定の個人を識別できるようになった情報も個人情報に当たり得ます。②も間違いで、「個人データ」は個人情報データベース等を構成する個人情報のことなので、「構成するものに限られない」は誤りです。④も間違いで、「個人関連情報」は個人情報・仮名加工情報・匿名加工情報のどれにも当たらない情報のことで、④は定義が逆です。\n\n用語の定義は「どれに当たり、どれに当たらないか」を正確に区別しましょう。","18-44":"この問題は、消費者契約法について、正しいものを1つ選ぶ問題です。正解は①です。\n\n①は、適格消費者団体は、事業者が不特定多数の消費者に重要な事実と違うことを告げる行為をしている(またはそのおそれがある)とき、その行為の停止や予防を求められる(差止請求)、という内容で正しいです。\n\n②は間違いで、事業者が帰らずに困らせて契約させた場合、その意思表示は「無効」ではなく「取り消せる」ものです。③も間違いで、消費者に一方的に不利な不当条項は「取消し」ではなく「無効」です。④も間違いで、消費者契約法の取消権は追認できる時から「1年」で時効消滅します(契約時から5年でも消滅)。④は「6か月」としている点が誤りです。\n\n「無効か取消しか」「期間は1年」を正確に押さえましょう。","18-45":"この問題は、個人情報保護法で本人が持つ権利について、適切でないものを1つ選ぶ問題です。正解は③です。\n\n③が誤りです。利用停止や消去を請求できる場合は、利用目的違反・不適正な利用・不正な取得のときだけでなく、本人の権利利益が害されるおそれがある場合など、ほかの事由も含まれます。③は「これらに限られる」と書いていて範囲を狭めすぎているので不適切です。\n\n①の、保有個人データを電磁的記録の提供などの方法で開示請求できるという説明、②の、内容が事実でないときに訂正・追加・削除を請求できるという説明、④の、利用停止等をした・しないと決めたときは本人に遅滞なく通知しなければならないという説明は、いずれも正しいです。\n\n「〜に限られる」と権利の範囲を狭める選択肢は要注意です。","18-46":"この問題は、景品表示法について、適切でないものを1つ選ぶ問題です。正解は①です。\n\n①が誤りです。裏付け資料を求め、出てこなければ不当表示とみなす「不実証広告規制」は、商品やサービスの中身についての『優良誤認表示』にだけ使えるものです。①はこれを、価格など取引条件についての『有利誤認表示』にまで及ぼしている点が間違いです。\n\n②の、景品類の制限などを変える際に公聴会を開き消費者委員会の意見を聴くという説明、③の、表示の定義、④の、景品類は取引に「付随して」提供される経済上の利益であるという定義は、いずれも正しいです。\n\n「不実証広告規制は優良誤認(中身)だけ、有利誤認(価格)には使えない」と区別するのがカギです。","18-47":"この問題は、日本貸金業協会の紛争解決等業務の規則について、適切でないものを1つ選ぶ問題です。正解は②です。\n\n②が誤りです。紛争解決手続の申立ては、お客さん(契約者等)だけでなく、加入している貸金業者の側からも行うことができます。②は「契約者等のみ」と書いていて間違いです。\n\n①の、貸金業務関連紛争の定義(自主交渉では解決できず、和解できるもの)、③の、当事者双方が和解案を受け入れた時点で和解が成立するという説明、④の、特別調停案の受諾を拒むときは理由を明らかにして書面で行うという説明は、いずれも正しいです。\n\n「申立ては業者側からもできる」がひっかけポイントです。","18-48":"この問題は、企業会計原則の一般原則について、正しいものを1つ選ぶ問題です。正解は③です。\n\n③は、会計処理の方法を毎期続けて使い、みだりに変えてはならない、という「継続性の原則」の説明で正しいです。コロコロ処理方法を変えると比較できなくなるので、これを防ぐ原則です。\n\n①は間違いで、「単一性の原則」は、目的ごとに形式の違う財務諸表を作ること自体は認めたうえで、その中身は信頼できる一つの会計記録に基づく正確なものでなければならない、という原則です。①は形式の違う作成を禁止する趣旨として説明していて不正確です。②の「総資本区分の原則」、④の「正確性の原則」という名称はいずれも一般には使われず、内容はどちらも明瞭性の原則に関わるもので、名前の当てはめが誤りです。\n\n原則は「名前」と「中身」を正しく結びつけて覚えましょう。","18-49":"この問題は、損益計算書での利益の計算の流れについて、正しいものを1つ選ぶ問題です。正解は④です。\n\n利益は次の順で計算します。売上高から売上原価を引くと「売上総利益」、そこから販売費及び一般管理費を引くと「営業利益」、それに営業外の収益・費用を加減すると「経常利益」、さらに特別利益・特別損失を加減すると「税引前当期純利益」です。\n\n④はこの流れどおり(経常利益に特別損益を加減して税引前当期純利益)で正しいです。①は売上総利益とすべきところを営業利益と呼んでいて誤り、②は営業利益とすべきところを経常利益としていて誤り、③は経常利益とすべきところを「営業外利益」という存在しない区分にしていて誤りです。\n\n「売上総→営業→経常→税引前」という利益の階段を順番で覚えるのが一番の近道です。","18-50":"この問題は、キャッシュ・フロー計算書に関する説明で、適切でないものを1つ選ぶ問題です。正解は②です。\n\nなお、この問題は元のPDFを読み取る際に選択肢①〜④の本文が取得できませんでした。そのため、どの選択肢がどんな内容だったかをここで具体的に噛み砕くことができません。正解が②であることだけは分かっていますので、詳しく学習したい場合は出典の原本PDFで選択肢の本文をご確認ください。\n\nキャッシュ・フロー計算書は、会社の現金がどれだけ入ってきて出ていったかを、営業活動・投資活動・財務活動の3つに分けて示す表です。基本の枠組みを押さえたうえで、原本で選択肢を確認して復習すると理解が深まります。","19-1":"この問題は、貸金業法で使う言葉の意味を正しく覚えているかを問うています。正しいのはｃだけなので、答えは①「１個」です。\nｃの「債務者等」とは、お金を借りたい顧客・借りている人・過去に借りていた人のことで、この説明はそのとおり正しいです。\nｱは、会社が自分の従業員に貸すいわゆる社内貸付けは貸金業から除かれるのに、「含まれる」と書いてあるので誤りです。ｂは、「貸付けの契約」は貸すこと自体の契約を指し、保証契約は別ものなので、保証契約を含めている点が誤りです。ｄの「個人信用情報」は返済能力だけでなく、借入状況など幅広い情報を含むので、「返済能力に関する情報だけ」と限定している点が誤りです。\nコツは、定義問題では『広い言葉を狭く言い換えていないか』『別のものを混ぜていないか』を疑うことです。","19-2":"この問題は、貸金業の登録を断られる（拒否される）
