の借入金の返済能力に関する情報をいう。\n\n①　１個　　②　２個　　③　３個　　④　４個","answer":1,"topic":"用語の定義","explanation":"適切なのはｃのみであり、正答は１個である。ａ×: 貸金業の定義は事業者がその従業者に対して行う金銭の貸付け（いわゆる社内貸付け等）は除外されており、「これには事業者がその従業者に対して行うものも含まれる」とする点が誤りである。ｂ×: 貸付けの契約とは貸付けに係る契約そのものをいい、当該契約に係る保証契約は含まれず、保証契約は別途「保証契約」として定義される。ｃ○: 債務者等の定義のとおりである。ｄ×: 個人信用情報は資力・借入状況等を含む広い概念であり、返済能力に関する情報に限定されない点が誤りである。"},{"no":2,"category":"法及び関係法令に関すること","text":"次のａ～ｄの記述のうち、貸金業法第６条第１項各号のいずれかに該当する場合として貸金業の登録を拒否されるものの組み合わせを①～④の中から１つだけ選び、解答欄にその番号をマークしなさい。なお、本問における法人は、非営利特例対象法人及び特定非営利金融法人ではないものとする。\n\n- ａ　個人である申請者が貸付けの業務に３年以上従事した経験を有しない者である場合\n- ｂ　営業所又は事務所ごとに貸付けの業務に１年以上従事した者が常勤の役員又は使用人として１人しか在籍していない場合\n- ｃ　資金需要者等の利益の保護を図り、貸金業の適正な運営に資するため十分な社内規則を定めていない場合\n- ｄ　法人である申請者で、最終事業年度に係る貸借対照表又はこれに代わる書面（最終事業年度がない場合にあっては、当該法人の成立の時に作成する貸借対照表又はこれに代わる書面）において、純資産の部の合計額として表示された金額が１億円である場合\n\n①　ａｂ　　②　ａｃ　　③　ｂｄ　　④　ｃｄ","answer":2,"topic":"登録拒否事由","explanation":"登録拒否事由に該当するのはａとｃであり、正答は②である。ａ○: 個人申請者は貸付けの業務に３年以上従事した経験を有する者等でなければ登録を拒否される（財産的基礎・純資産要件とは別に個人の実務経験要件がある）。ｃ○: 資金需要者等の利益保護のための社内規則を整備していないことは登録拒否事由に該当する。ｂ×: 常勤役員又は使用人としての実務経験者が営業所ごとに１人在籍していれば足り、複数人の在籍は要件ではない。ｄ×: 法人の純資産要件は5,000万円以上であり、１億円はこれを満たすため拒否事由に該当しない。"},{"no":3,"category":"法及び関係法令に関すること","text":"貸金業法第８条（変更の届出）に関する次のａ～ｄの記述のうち、その内容が適切なものの組み合わせを①～④の中から１つだけ選び、解答欄にその番号をマークしなさい。\n\n- ａ　貸金業者は、その貸金業を営む営業所又は事務所（以下、本問において「営業所等」という。）の所在地を変更しようとする場合、あらかじめ、その旨をその登録をした内閣総理大臣又は都道府県知事（以下、本問において「登録行政庁」という。）に届け出なければならない。\n- ｂ　貸金業者は、その業務に関して広告又は勧誘をする際に表示等をする営業所等のホームページアドレスを変更した場合、その日から２週間以内に、その旨を登録行政庁に届け出なければならない。\n- ｃ　貸金業者は、その業務の種類及び方法を変更しようとする場合、あらかじめ、その旨を登録行政庁に届け出なければならない。\n- ｄ　貸金業者は、貸金業の他に事業を行っている場合において、その事業の種類を変更したときは、その日から２週間以内に、その旨を登録行政庁に届け出なければならない。\n\n①　ａｂ　　②　ａｄ　　③　ｂｃ　　④　ｃｄ","answer":2,"topic":"登録・届出","explanation":"適切なのはａとｄであり、正答は②である。ａ○: 営業所等の所在地の変更は事前届出事項である。ｄ○: 貸金業以外の兼業事業の種類の変更は事後届出（変更後２週間以内）事項である。ｂ×: ホームページアドレスの変更は「あらかじめ」ではなく事後届出（変更後２週間以内）事項であり、本肢の「あらかじめ届け出なければならない」とする記述は誤りである。ｃ×: 業務の種類及び方法の変更は事後届出事項であり、あらかじめの届出（事前届出）を要する事項ではない。"},{"no":4,"category":"法及び関係法令に関すること","text":"貸金業の業務の適切な運営の確保に関する次のａ～ｄの記述のうち、その内容が適切なものの個数を①～④の中から１つだけ選び、解答欄にその番号をマークしなさい。\n\n- ａ　貸金業者は、信用情報に関する機関（資金需要者等の借入金返済能力に関する情報の収集及び貸金業者に対する当該情報の提供を行うものをいう。）から提供を受けた情報であって個人である資金需要者等の借入金返済能力に関するものを、資金需要者等の返済能力の調査以外の目的のために利用しないことを確保するための措置を講じなければならない。\n- ｂ　貸金業者は、貸金業の業務を第三者に委託する場合には、当該業務の内容に応じ、当該業務の委託を受けた者（以下、本問において「受託者」という。）における当該業務の実施状況を、定期的に又は必要に応じて確認すること等により、受託者が当該業務を的確に遂行しているかを検証し、必要に応じ改善させる等、受託者に対する必要かつ適切な監督等を行うための措置を講じなければならない。\n- ｃ　貸金業者向けの総合的な監督指針（以下、本問において「監督指針」という。）によれば、監督当局は、貸金業者の監督に当たっては、コンプライアンスに係る基本的な方針、具体的な実践計画（コンプライアンス・プログラム）や行動規範（倫理規程、コンプライアンス・マニュアル）等が策定され、定期的又は必要に応じ、見直しが行われているか、特に、業績評価や人事考課等において収益目標（ノルマ）に偏重することなく、コンプライアンスを重視しているかに留意するものとされている。\n- ｄ　監督指針によれば、監督当局は、貸金業者の監督に当たっては、顧客等に関する情報管理について、内部管理部門における定期的な点検や内部監査部門による内部監査を通じ、その実施状況を把握・検証しているか、また、当該検証等の結果に基づき、態勢の見直しを行うなど、顧客等に関する情報管理の実効性が確保されているかに留意するものとされている。\n\n①　１個　　②　２個　　③　３個　　④　４個","answer":4,"topic":"監督指針","explanation":"ａ～ｄいずれも監督指針及び貸金業法の内容として適切であり、正答は４個である。ａ○: 個人信用情報を返済能力調査以外の目的に利用しないための措置を講じる義務は法定されている。ｂ○: 業務委託先に対する必要かつ適切な監督態勢の整備は監督指針の着眼点として明示されている。ｃ○: コンプライアンス重視の経営態勢、ノルマ偏重の排除は監督指針の記載どおりである。ｄ○: 情報管理態勢についての内部監査等による実効性確保も監督指針の着眼点どおりである。"},{"no":5,"category":"法及び関係法令に関すること","text":"貸金業者の苦情等対処に関する内部管理態勢の確立に関するａ～ｄの記述のうち、その内容が適切なものの個数を①～④の中から１つだけ選び、解答欄にその番号をマークしなさい。\n\n- ａ　貸金業者向けの総合的な監督指針（以下、本問において「監督指針」という。）では、苦情等の発生状況に応じ、受付窓口における対応の充実を図るとともに、資金需要者等の利便に配慮したアクセス時間・アクセス手段（例えば、電話、手紙、FAX、ｅメール等）を設定する等、広く苦情等を受け付ける態勢を整備しているかに留意するものとされている。\n- ｂ　監督指針では、苦情等への対処について、単に処理の手続の問題と捉えるにとどまらず事後的な説明態勢の問題として位置付け、苦情等の内容に応じ資金需要者等から事情を十分にヒアリングしつつ、可能な限り資金需要者等の理解と納得を得て解決することを目指しているかに留意するものとされている。\n- ｃ　監督指針では、類型化した苦情等及びその対処結果等が内部管理部門や営業所等に報告されると共に、重要案件と認められない軽微な案件であっても、すべて、直ちに内部監査部門や経営陣に報告されるなど、情報共有が図られる態勢を整備しているかに留意するものとされている。\n- ｄ　監督指針では、苦情等の内容及び対処結果について、自ら対処したものに加え、外部機関が介在して対処したものを含め、適切かつ正確に記録・保存しているか、また、これらの苦情等の内容及び対処結果について、指定ADR機関より提供された情報等も活用しつつ、分析し、その分析結果を継続的に資金需要者等対応・事務処理についての態勢の改善や苦情等の再発防止策・未然防止策に活用する態勢を整備しているかに留意するものとされている。\n\n①　１個　　②　２個　　③　３個　　④　４個","answer":3,"topic":"監督指針","explanation":"適切なのはａ・ｂ・ｄの３個であり、正答は③である。ａ○: 苦情等の受付態勢の充実、アクセス手段の多様化は監督指針の着眼点である。ｂ○: 苦情等対処を単なる処理手続にとどめず、ヒアリングを通じた理解・納得を目指す姿勢も監督指針の記載どおりである。ｄ○: 苦情等の記録・保存、指定ADR機関の情報も活用した分析・再発防止策への活用も監督指針の着眼点である。ｃ×: 軽微な案件まで「すべて直ちに」内部監査部門や経営陣に報告する態勢までは求められておらず、重要案件について適切に報告される態勢整備が求められているにとどまる。"},{"no":6,"category":"法及び関係法令に関すること","text":"貸金業務取扱主任者及び貸金業法第12条の４（証明書の携帯等）第２項に規定する従業者名簿（以下、本問において「従業者名簿」という。）に関する次の①～④の記述のうち、その内容が適切なものを１つだけ選び、解答欄にその番号をマークしなさい。\n\n①　貸金業者向けの総合的な監督指針（以下、本問において「監督指針」という。）によれば、貸金業務取扱主任者が営業所又は事務所（以下、本問において「営業所等」という。）に常時勤務する者と認められるには、社会通念に照らし、常時勤務していると認められるだけの実態が必要であり、当該営業所等の営業時間内に当該営業所等に常時駐在している必要があるとされている。\n②　貸金業者は、その営業所等のうち従業者の数が80人である営業所等において、貸金業の業務に従事している従業者の数が50人である場合、当該営業所等に常時勤務する貸金業務取扱主任者を少なくとも２人以上置かなければならない。\n③　監督指針によれば、従業者が従業者名簿の記載対象となるか否かについて、勧誘を伴わない広告のみを行う業務及び営業所等において資金需要者等と対面することなく行う業務に従事する者は、該当しないとされている。\n④　貸金業者は、内閣府令で定めるところにより、営業所等ごとに、従業者名簿を備え、従業者の氏名、住所、貸金業法第12条の４第１項の証明書の番号その他内閣府令で定める事項を記載し、これを最終の記載をした日から10年間保存しなければならない。","answer":4,"topic":"貸金業務取扱主任者制度","explanation":"④が適切であり、従業者名簿は最終の記載をした日から10年間の保存が義務付けられている。①×: 常時勤務とは営業時間内常時駐在までは要求されておらず、社会通念上常時勤務していると認められる実態があれば足りるとされている。②×: 主任者の設置数は貸金業の業務に従事する者50人につき１人以上であり、従業者50人の営業所であれば少なくとも１人（端数切上げで50人ちょうどなら１人）で足りる。③×: 勧誘を伴わない広告のみを行う業務や非対面業務に従事する者であっても、貸金業の業務に従事する者として従業者名簿の記載対象となり得るとされている。"},{"no":7,"category":"法及び関係法令に関すること","text":"貸金業法上の禁止行為等に関する次のａ～ｄの記述のうち、その内容が適切なものの組み合わせを①～④の中から１つだけ選び、解答欄にその番号をマークしなさい。\n\n- ａ　貸金業者は、その貸金業の業務に関し、保証人となろうとする者に対し、主たる債務者が弁済することが確実であると誤解させるおそれのあることを告げる行為をした場合、刑事罰の対象とはならないが、行政処分の対象となる。\n- ｂ　貸金業者は、暴力団員による不当な行為の防止等に関する法律第２条第６号に規定する暴力団員でなくなった日から５年を経過しない者を貸金業の業務に従事させ、又はその業務の補助者として使用した場合、行政処分の対象となるだけでなく、刑事罰の対象となる。\n- ｃ　貸金業者は、その貸金業の業務に関し、資金需要者等に対し、不確実な事項について断定的判断を提供し、又は確実であると誤認させるおそれのあることを告げる行為をした場合、行政処分の対象となるだけでなく、刑事罰の対象となる。\n- ｄ　貸金業者は、その従業者であることを証する証明書を携帯させることなく、その者を当該貸金業者の貸金業の業務に従事させた場合、刑事罰の対象とはならないが、行政処分の対象となる。\n\n①　ａｂ　　②　ａｄ　　③　ｂｃ　　④　ｃｄ","answer":1,"topic":"禁止行為","explanation":"適切なのはａとｂであり、正答は①である。ａ○: 保証人となろうとする者に対する誤解を招く告知行為は行政処分の対象となるが、刑事罰の直接の対象規定はこの類型には設けられていない。ｂ○: 暴力団員等の使用は行政処分の対象であるとともに刑事罰（懲役・罰金）の対象ともなる重大な禁止行為である。ｃ×: 断定的判断の提供等は行政処分の対象となるが、直ちに刑事罰の対象となるわけではない。ｄ×: 証明書を携帯させずに業務に従事させることは行政処分の対象となるが、証明書携帯規定自体の違反は直ちに刑事罰の対象とはならない。"},{"no":8,"category":"法及び関係法令に関すること","text":"株式会社である貸金業者Ａが行う貸金業法第13条に規定する返済能力の調査に関する次の①～④の記述のうち、その内容が適切なものを１つだけ選び、解答欄にその番号をマークしなさい。\n\n①　Ａは、個人事業者である顧客Ｂとの間で、貸付けに係る契約を締結しようとする場合には、指定信用情報機関が保有する信用情報を使用してのＢの返済能力の調査を行う必要はない。\n②　Ａは、法人である顧客Ｂとの間で貸付けに係る契約を締結するにあたり、Ｂの代表者であるＣとの間で保証契約を締結しようとする場合には、指定信用情報機関が保有する信用情報を使用してのＣの返済能力の調査を行う必要はない。\n③　Ａは、個人である顧客Ｂとの間で、極度額を50万円とする極度方式基本契約を締結した後、Ｂに返済能力の低下が認められたことを理由に極度額を20万円に減額した。この場合において、極度額をその減額の前の50万円まで増額しようとするときには、Ａは、指定信用情報機関が保有する信用情報を使用してのＢの返済能力の調査を行う必要はない。\n④　Ａは、個人である顧客Ｂとの間で、極度方式貸付けに係る契約を締結しようとする場合には、指定信用情報機関が保有する信用情報を使用してのＢの返済能力の調査を行う必要はない。","answer":4,"topic":"返済能力調査","explanation":"④が適切である。極度方式貸付けは基本契約締結時に指定信用情報機関の信用情報を使用した調査を行っていれば足り、個別の極度方式貸付けごとに改めて信用情報を使用した調査を行う必要はない。①×: 個人事業者も個人顧客に含まれ、指定信用情報機関の信用情報を使用した返済能力調査が必要である。②×: 保証人についても指定信用情報機関の信用情報を使用した調査が必要である。③×: 減額前の額まで増額する場合は実質的に新たな極度額設定と同様の影響があり、信用情報を使用した調査を要する。"},{"no":9,"category":"法及び関係法令に関すること","text":"貸金業法第13条の２（過剰貸付け等の禁止）第２項に規定する個人過剰貸付契約から除かれる契約として貸金業法施行規則第10条の21に定める契約（以下、本問において「除外契約」という。）に関する次のａ～ｄの記述のうち、その内容が適切なものの組み合わせを①～④の中から１つだけ選び、解答欄にその番号をマークしなさい。\n\n- ａ　他の貸金業者からの住宅の改良に必要な資金の貸付けが行われるまでのつなぎとして行う貸付けに係る契約は、除外契約に該当しない。\n- ｂ　国債証券、地方債証券、株券で金融商品取引所に上場されているもの（以下、本問において「本件有価証券」という。）を担保とする貸付けに係る契約であって、貸付けの金額が当該貸付けに係る契約の締結時における本件有価証券の時価の範囲内であるものは、除外契約に該当する。\n- ｃ　個人顧客との間で締結する不動産を担保とする貸付けに係る契約であって、当該不動産を担保として提供する者が当該個人顧客でないものは、当該個人顧客の返済能力を超えないと認められるものであっても、除外契約に該当しない。\n- ｄ　売却を予定している個人顧客の不動産の売却代金により弁済される貸付けに係る契約であって、当該個人顧客の返済能力を超えないと認められるもの（貸付けの金額が当該貸付けに係る契約の締結時における当該不動産の価格の範囲内であるものに限り、当該不動産を売却することにより当該個人顧客の生活に支障を来すと認められる場合を除く。）は、除外契約に該当する。\n\n①　ａｂ　　②　ａｃ　　③　ｂｄ　　④　ｃｄ","answer":3,"topic":"総量規制","explanation":"適切なのはｂとｄであり、正答は③である。ｂ○: 上場有価証券を担保とし、貸付額が時価の範囲内である契約は除外契約に該当する。ｄ○: 不動産の売却代金により弁済される貸付けで、返済能力を超えないと認められるもの（生活支障がない場合）は除外契約に該当する。ａ×: 住宅資金のつなぎ融資は除外契約に該当する類型であり、該当しないとする記述は誤りである。ｃ×: 不動産担保が個人顧客以外の者による物上保証であっても、返済能力を超えないと認められれば除外契約に該当し得る。"},{"no":10,"category":"法及び関係法令に関すること","text":"株式会社である貸金業者Ａが、貸金業法第13条の３に基づき、個人顧客Ｂとの間で締結している極度方式基本契約（以下、本問において「本件基本契約」という。）について行う、本件基本契約が基準額超過極度方式基本契約に該当するかどうかの調査（以下、本問において「本件調査」という。）等に関する次の①～④の記述のうち、その内容が適切なものを１つだけ選び、解答欄にその番号をマークしなさい。なお、Ａは、Ｂとの間で本件基本契約以外の極度方式基本契約を締結していないものとする。\n\n①　Ａは、本件基本契約の契約期間を本件基本契約の締結日から同日以後１か月以内の一定の期日までの期間及び当該一定の期日の翌日以後１か月ごとの期間に区分したそれぞれの期間（以下、本問において「所定の期間」という。）において、直近の所定の期間内にＡが行った本件基本契約に基づく極度方式貸付けの金額の合計額が５万円を超えるときは、当該所定の期間の末日における本件基本契約に基づく極度方式貸付けの残高の合計額の多寡にかかわらず、本件調査を行わなければならない。\n②　Ａは、貸金業法施行規則第10条の24（基準額超過極度方式基本契約に係る調査の要件等）第１項第１号に規定する要件に該当し、本件調査を行う必要がある場合には、所定の期間の末日から３週間を経過する日までに、指定信用情報機関にＢの個人信用情報の提供の依頼をしなければならない。\n③　Ａは、本件基本契約が基準額超過極度方式基本契約に該当しないようにするため必要な本件基本契約の極度額の減額に係る措置を講じた場合、それ以降、３か月以内の一定の期間ごとに、本件調査を行う必要はない。\n④　Ａは、本件調査により、本件基本契約が基準額超過極度方式基本契約に該当すると認められたことから、本件基本契約に基づく新たな極度方式貸付けの停止に係る措置を講じていた場合において、当該措置を解除したときは、その日から１か月以内に本件調査を行わなければならない。","answer":2,"topic":"基準額超過調査","explanation":"②が適切である。基準額超過極度方式基本契約に該当し調査が必要な場合、所定の期間の末日から３週間を経過する日までに指定信用情報機関へ個人信用情報の提供を依頼しなければならない。①×: 調査要件は所定の期間内の極度方式貸付けの合計額が５万円を超え、かつ当該期間の末日における残高の合計額が10万円を超える場合であり、残高要件を無視できる記述は誤りである。③×: 極度額減額等の措置を講じた場合でも、その後３か月以内の一定期間ごとの調査は継続して必要である。④×: 新規貸付け停止措置を解除した場合は、解除後の所定の期間に応じて調査を行う必要があり、「解除の日から１か月以内」という一律の期限ではない。"},{"no":11,"category":"法及び関係法令に関すること","text":"貸金業法第17条に規定する書面（以下、本問において「契約締結時の書面」という。）に関する次の①～④の記述のうち、その内容が適切なものを１つだけ選び、解答欄にその番号をマークしなさい。なお、本問における極度方式基本契約（以下、本問において「基本契約」という。）及び基本契約に基づく極度方式貸付けに係る契約（以下、本問において「個別契約」という。）は、金銭の貸付けに係る契約であって、手形の割引の契約及び売渡担保の契約ではないものとする。\n\n①　貸金業者は、基本契約を締結した場合にその相手方に交付する契約締結時の書面に、当該貸金業者が基本契約に定める極度額（当該貸金業者が当該相手方に対し貸付けの元本の残高の上限として極度額を下回る額を提示する場合にあっては、当該下回る額）を１回貸し付けることその他の必要な仮定を置き、当該仮定に基づいた将来支払う返済金額の合計額、返済期間及び返済回数並びに当該仮定を記載しなければならない。\n②　貸金業者が個別契約を締結した場合にその相手方に交付する契約締結時の書面の記載事項のうち、貸付けの利率等基本契約締結時に交付した契約締結時の書面に記載された事項については、基本契約の契約番号の記載をもって代えることができる。\n③　貸金業者は、個別契約を締結した場合において、その相手方に対し、当該相手方の承諾を得て、内閣府令で定めるところにより、一定期間における貸付け及び弁済その他の取引の状況を記載した書面として内閣府令で定めるものを交付するときは、個別契約を締結するごとに、遅滞なく、契約年月日及び貸付けの金額等を記載した書面を当該相手方に交付する必要はない。\n④　貸金業者は、基本契約を締結した後、その相手方との合意に基づき、当該基本契約の極度額を引き下げた場合、変更後の内容を記載した契約締結時の書面を当該相手方に交付する必要はないが、その後当該基本契約の極度額を引き下げる前の元の額まで引き上げる場合は、変更後の内容を記載した契約締結時の書面を当該相手方に交付しなければならない。","answer":1,"topic":"契約締結時書面","explanation":"①が適切である。極度方式基本契約の契約締結時書面には、極度額（下回る額を提示する場合はその額）を１回貸し付けたと仮定する等の仮定に基づく返済金額の合計額、返済期間・回数及び当該仮定を記載しなければならない。②×: 個別契約の契約締結時書面は独立して必要事項を記載しなければならず、基本契約番号の記載で代替することは認められていない。③×: 取引状況を記載した書面（残高明細等）の交付をもって代えられるのは別の類型の簡素化規定であり、個別契約締結ごとの契約年月日・貸付金額等の記載省略が無条件に認められるものではない。④×: 極度額の引下げ・引上げはいずれも契約締結時書面の記載事項の変更に当たり、変更のたびに書面交付が必要である。"},{"no":12,"category":"法及び関係法令に関すること","text":"貸金業法第17条第１項各号に掲げる事項を記載した書面（以下、本問において「契約締結時の書面」という。）の交付に関する次の①～④の記述のうち、その内容が適切なものを１つだけ選び、解答欄にその番号をマークしなさい。なお、本問における貸付けに係る契約は、金銭の貸付けに係る契約であって、極度方式基本契約、極度方式貸付けに係る契約、手形の割引の契約及び売渡担保の契約ではないものとする。\n\n①　契約締結時の書面に記載された事項のうち、貸金業者の商号、名称又は氏名及び住所に変更が生じた場合、当該貸金業者は、変更後の内容を記載した契約締結時の書面を貸付けに係る契約の相手方に交付しなければならない。\n②　契約締結時の書面に記載された事項のうち、貸付けの利率が引き下げられた場合、貸金業者は、変更後の内容を記載した契約締結時の書面を貸付けに係る契約の相手方に交付しなければならない。\n③　貸金業者が貸付けに係る契約について保証契約を締結している場合において、契約締結時の書面に記載された事項のうち、貸付けに係る契約の各回の返済期日及び返済金額に変更が生じた場合、当該貸金業者は、変更後の内容を記載した契約締結時の書面を、当該貸付けに係る契約の相手方だけでなく、当該保証契約の保証人にも交付しなければならない。\n④　契約締結時の書面に記載された事項のうち、重要なものとして内閣府令で定めるものに変更が生じた場合において、貸金業者が貸付けに係る契約の相手方に交付する変更後の内容を記載した契約締結時の書面には、当該変更が生じた事項のみを記載すれば足りる。","answer":3,"topic":"契約締結時書面","explanation":"③が適切である。保証契約が締結されている場合、返済期日・返済金額等の変更が生じたときは、契約の相手方だけでなく保証人にも変更後の契約締結時書面を交付しなければならない。①×: 貸金業者の商号等の変更は貸金業者側の事情による変更であり、相手方への契約締結時書面の再交付を要する事項には当たらない。②×: 貸付けの利率の引下げも重要な記載事項の変更であり、変更後の書面交付が必要である。④×: 変更が生じた事項のみでなく、契約締結時書面の記載事項全体を記載した書面を交付する必要がある。"},{"no":13,"category":"法及び関係法令に関すること","text":"貸金業法第19条に規定する帳簿（以下、本問において「帳簿」という。）に関する次のａ～ｄの記述のうち、その内容が適切なものの組み合わせを①～④の中から１つだけ選び、解答欄にその番号をマークしなさい。\n\n- ａ　貸金業者は、内閣府令で定めるところにより、その営業所又は事務所（以下、本問において「営業所等」という。）ごとに、帳簿を備え、債務者ごとに貸付けの契約について契約年月日、貸付けの金額、受領金額その他内閣府令で定める事項を記載し、これを保存しなければならないが、その営業所等が代理店であるときは、帳簿の備付けを行うことを要しない。\n- ｂ　貸金業者は、帳簿を作成するときは、当該帳簿を保存すべき営業所等において貸金業法第17条第１項に規定する書面（契約締結時の書面）の写しを保存することをもって、貸金業法施行規則第16条（帳簿の備付け）第１項第１号に定める事項の記載に代えることができる。\n- ｃ　債務者は、貸金業者に対し、帳簿（利害関係がある部分に限る。）の閲覧又は謄写を請求することができるが、債務者以外の保証人及び弁済者は、債務者の承諾を得たときに限り、帳簿の閲覧又は謄写を請求することができる。\n- ｄ　貸金業者は、帳簿の閲覧又は謄写の請求がなされた場合において、当該請求が当該請求を行った者の権利の行使に関する調査を目的とするものでないことが明らかであるときを除き、当該請求を拒むことができない。\n\n①　ａｂ　　②　ａｃ　　③　ｂｄ　　④　ｃｄ","answer":3,"topic":"受取証書・帳簿","explanation":"適切なのはｂとｄであり、正答は③である。ｂ○: 契約締結時書面の写しの保存をもって帳簿の一部記載事項の記載に代えることが認められている。ｄ○: 帳簿の閲覧・謄写請求は、権利行使に関する調査目的でないことが明らかな場合を除き拒むことができない。ａ×: 代理店であっても営業所等に該当すれば帳簿の備付けを要し、備付け不要とする記述は誤りである。ｃ×: 保証人や弁済者も自己が利害関係を有する部分について自ら閲覧・謄写請求ができ、債務者の承諾を要件とする記述は誤りである。"},{"no":14,"category":"法及び関係法令に関すること","text":"貸金業法第21条（取立て行為の規制）に関する次の①～④の記述のうち、その内容が適切なものを１つだけ選び、解答欄にその番号をマークしなさい。\n\n①　貸金業を営む者又は貸金業を営む者の貸付けの契約に基づく債権の取立てについて貸金業を営む者その他の者から委託を受けた者は、貸付けの契約に基づく債権の取立てをするに当たって、正当な理由がないのに、午後８時から午前９時までの間に、債務者等に電話をかけ、もしくはファクシミリ装置を用いて送信し、又は債務者等の居宅を訪問してはならない。\n②　貸金業を営む者又は貸金業を営む者の貸付けの契約に基づく債権の取立てについて貸金業を営む者その他の者から委託を受けた者は、貸付けの契約に基づく債権の取立てをするに当たって、債務者等以外の者から債権の弁済を受けてはならない。\n③　貸金業者向けの総合的な監督指針（以下、本問において「監督指針」という。）によれば、債務者等から家族に知られないように要請を受けているか否かにかかわらず、債務者等の自宅に電話をかけ家族がこれを受けた場合に貸金業者であることを名乗り、郵送物の送付に当たり差出人として貸金業者であることを示すことは、貸金業法第21条第１項第５号の「貼り紙、立看板その他何らの方法をもってするを問わず、債務者の借入れに関する事実その他債務者等の私生活に関する事実を債務者等以外の者に明らかにすること」に該当するおそれが大きいとされている。\n④　監督指針によれば、反復継続して、電話をかけ、電報を送達し、電子メールもしくはファクシミリ装置等を用いて送信し又は債務者、保証人等の居宅を訪問することは、貸金業法第21条第１項の「人の私生活若しくは業務の平穏を害するような言動」に該当するおそれが大きいとされている。","answer":4,"topic":"取立行為規制","explanation":"④が適切である。監督指針上、反復継続した電話・電報・電子メール・訪問等は債務者等の私生活・業務の平穏を害する言動に該当するおそれが大きいとされている。①×: 電話・訪問等が禁止される時間帯は午後９時から午前８時までであり、午後８時から午前９時までとする記述は誤りである。②×: 債務者等以外の者からの弁済受領自体が一律に禁止されているわけではなく、規制の対象は取立て行為の態様である。③×: 家族に知られないよう要請を受けている場合はプライバシー侵害のおそれが大きいが、そのような要請の有無にかかわらず一律に該当するおそれが大きいとする記述は誤りである。"},{"no":15,"category":"法及び関係法令に関すること","text":"貸金業法第24条の６の２（開始等の届出）に関する次のａ～ｄの記述のうち、その内容が適切なものの組み合わせを①～④の中から１つだけ選び、解答欄にその番号をマークしなさい。\n\n- ａ　貸金業者は、第三者に貸付けに係る契約に基づく債権を譲渡した場合又は第三者から貸付けに係る契約に基づく債権を譲り受けた場合は、内閣府令で定めるところにより、その旨をその登録をした内閣総理大臣又は都道府県知事（以下、本問において「登録行政庁」という。）に届け出なければならない。\n- ｂ　貸金業者は、第三者に貸金業の業務の委託を行った場合又は当該業務の委託を行わなくなった場合は、内閣府令で定めるところにより、その旨を登録行政庁に届け出なければならない。\n- ｃ　貸金業者は、貸金業協会に加入又は脱退した場合は、内閣府令で定めるところにより、その旨を登録行政庁に届け出なければならない。\n- ｄ　貸金業者は、貸金業法第24条の６の２各号のいずれかに該当することとなったときは、その日から30日以内に、その旨を登録行政庁に届け出なければならない。\n\n①　ａｂ　　②　ａｄ　　③　ｂｃ　　④　ｃｄ","answer":3,"topic":"監督処分・届出","explanation":"適切なのはｂとｃであり、正答は③である。ｂ○: 貸金業務の第三者委託の開始・終了は開始等の届出事項である。ｃ○: 貸金業協会への加入・脱退も開始等の届出事項である。ａ×: 貸付債権の譲渡・譲受け自体は開始等の届出事項ではなく、別途の届出・規制の枠組みで扱われる。ｄ×: 該当することとなった日から30日以内ではなく、２週間以内に届け出なければならない。"},{"no":16,"category":"法及び関係法令に関すること","text":"内閣総理大臣又は都道府県知事（以下、本問において「登録行政庁」という。）による、その登録を受けた貸金業者に対する監督等に関する次の①～④の記述のうち、その内容が適切なものを１つだけ選び、解答欄にその番号をマークしなさい。\n\n①　登録行政庁は、その登録を受けた貸金業者に法令に違反する行為が認められなければ、当該登録行政庁の職員に、当該貸金業者の営業所もしくは事務所に立ち入らせ、その業務に関して質問させ、又は帳簿書類その他の物件を検査させることができない。\n②　登録行政庁は、その登録を受けた貸金業者（株式会社であるものとする。）が、貸金業法第24条（債権譲渡等の規制）第３項に規定する取立て制限者（以下、本問において「取立て制限者」という。）を相手方として、貸付けの契約に基づく債権の譲渡を行った場合において、当該債権譲渡の業務を執行した取締役が、当該債権譲渡を行うに際し、当該相手方が取立て制限者であることを知っていたときは、当該貸金業者に対し当該取締役の解任を命ずることができる。\n③　登録行政庁は、その登録を受けた貸金業者が、保証業者と貸付けに係る契約について保証契約を締結しようとする場合において、その保証業者が貸金業法第６条（登録の拒否）第１項第６号に規定する暴力団員等であることを知りながら、これを相手方として、貸付けに係る契約について保証契約を締結したときは、その登録を取り消すことはできないが、その業務の全部又は一部の停止を命ずることができる。\n④　貸金業者向けの総合的な監督指針によれば、登録行政庁は、貸金業法第24条の６の３に基づく業務改善命令に関し、その登録を受けた貸金業者の検査結果やオフサイト・モニタリング等への対応として、報告内容を検証した結果、資金需要者等の利益の保護に関し問題が認められる場合においては、当該貸金業者が自主的に資金需要者等の利益の保護に取り組んでいる事情は考慮することなく、当該行為の重大性・悪質性のみに着眼して、最終的な行政処分の内容を決定することとされている。","answer":2,"topic":"監督処分・届出","explanation":"②が適切である。取立て制限者を相手方とする債権譲渡について、業務を執行した取締役が相手方が取立て制限者であることを知っていた場合、登録行政庁は当該貸金業者に対し当該取締役の解任を命ずることができる。①×: 法令違反の有無にかかわらず、業務の適正な運営確保のため必要があれば立入検査等を行うことができる。③×: 暴力団員等である保証業者と知りながら保証契約を締結した場合は、業務停止に限らず登録取消しの対象ともなり得る重大な違反である。④×: 業務改善命令の内容決定に当たっては、自主的な改善取組みの状況等の情状も考慮されるものとされている。"},{"no":17,"category":"法及び関係法令に関すること","text":"指定信用情報機関への個人信用情報の提供等に関する次のａ～ｄの記述のうち、その内容が適切なものの組み合わせを①～④の中から１つだけ選び、解答欄にその番号をマークしなさい。なお、本問における貸金業者は、非営利特例対象法人及び特定非営利金融法人ではないものとする。\n\n- ａ　加入貸金業者(注１)は、資金需要者である個人の顧客を相手方とする極度方式基本契約を締結したときは、遅滞なく、当該極度方式基本契約に係る個人信用情報を加入指定信用情報機関(注２)に提供しなければならない。\n- ｂ　加入貸金業者は、貸金業法第41条の36（指定信用情報機関への信用情報の提供等に係る同意の取得等）第１項及び第２項に規定する同意を得た場合には、当該同意に関する記録を作成し、個人信用情報を加入指定信用情報機関に提供した日から10年間保存しなければならない。\n- ｃ　加入貸金業者又はその役員もしくは職員は、加入指定信用情報機関から提供を受けた信用情報を返済能力等調査以外の目的に使用してはならないが、貸金業者向けの総合的な監督指針によれば、例えば、途上与信(注３)を行うために取得した信用情報を勧誘に二次利用した場合や信用情報を内部データベースに取り込み当該内部データベースを勧誘に利用した場合等（債権の保全を目的とした利用を含む。）であっても、返済能力の調査以外の目的による使用に該当することに留意する必要があるとされている。\n- ｄ　加入貸金業者は、加入指定信用情報機関に資金需要者等に係る信用情報の提供の依頼（当該資金需要者等に係る他の指定信用情報機関が保有する個人信用情報の提供の依頼を含む。）をする場合には、内閣府令で定める場合を除き、あらかじめ、当該資金需要者等から同意を得なければならないが、当該同意は書面又は電磁的方法による方法で取得しなければならず、口頭での同意の取得は認められない。\n\n(注１)　加入貸金業者とは、指定信用情報機関と信用情報提供契約を締結した相手方である貸金業者をいう。\n(注２)　加入指定信用情報機関とは、加入貸金業者と信用情報提供契約を締結した指定信用情報機関をいう。\n(注３)　途上与信とは、貸金業法第13条の３（基準額超過極度方式基本契約に係る調査）第１項及び第２項の規定に基づく調査をいう。\n\n①　ａｂ　　②　ａｃ　　③　ｂｄ　　④　ｃｄ","answer":4,"topic":"指定信用情報機関","explanation":"適切なのはｃとｄであり、正答は④である。ｃ○: 途上与信で取得した信用情報を勧誘に二次利用する行為等は、債権保全目的を含め返済能力調査以外の目的による使用に該当し得る点に留意が必要とされている。ｄ○: 信用情報提供の依頼に係る同意は書面又は電磁的方法によることが求められ、口頭のみの同意は認められない。ａ×: 極度方式基本契約締結時ではなく、極度方式貸付けを行う都度等、政令・内閣府令で定めるタイミングでの信用情報提供が求められ、「締結したときは遅滞なく」提供するという記述は正確でない。ｂ×: 同意に関する記録の保存期間は10年間ではなく、契約終了後一定期間（政令等で定める期間）であり、記述内容が正確性を欠く。"},{"no":18,"category":"法及び関係法令に関すること","text":"金利等の規制に関する次の①～④の記述のうち、その内容が適切なものを１つだけ選び、解答欄にその番号をマークしなさい。\n\n①　金銭の貸付けを行う者が業として金銭の貸付けを行う場合において、元本50万円に対し年２割（20％）の利息の契約をしたときは、当該金銭の貸付けを行う者は、出資法(注)上、刑事罰の対象となる。\n②　金銭の貸付けを行う者が業として行う金銭の貸付けにつき、業として保証を行う場合において、当該保証に係る貸付けの利息が利息の契約時以後変動し得る利率をもって定められ、かつ、当該保証に際し、当該貸付けの債権者と保証人の合意により利息制限法第８条第２項第１号に規定する特約上限利率が定められなかった。この場合、当該保証人が年１割（10％）の保証料の契約をしたときは、当該保証人は、出資法上、刑事罰の対象となる。\n③　金銭の貸借の媒介に係る手数料の契約は、その手数料がその媒介に係る貸借の金額を元本として利息制限法第１条（利息の制限）に規定する利率により計算した金額を超えるときは、利息制限法上、その超過部分について、無効となる。\n④　営業的金銭消費貸借における債務の不履行による賠償額の予定は、その賠償額の元本に対する割合が年２割（20％）を超えるときは、利息制限法上、その超過部分について、無効となる。\n\n(注)　出資法とは、出資の受入れ、預り金及び金利等の取締りに関する法律をいう。","answer":4,"topic":"利息制限法","explanation":"④が適切である。営業的金銭消費貸借における賠償額の予定は、元本に対する割合が年20％を超える部分について利息制限法上無効となる。①×: 元本50万円に年20％の利息は出資法上の上限金利（年20％）以内であり、刑事罰の対象とはならない。②×: 保証料についても別途上限利率規制があるが、特約上限利率が定められなかった場合の規律を踏まえると、年10％の保証料が直ちに出資法上の刑事罰対象となるとは言えない。③×: 媒介手数料が利息制限法所定の利率を超える場合、超過部分は無効となるが、対象となる法律関係や計算方法の説明として本肢の内容は正確性を欠く。"},{"no":19,"category":"法及び関係法令に関すること","text":"貸金業における金融ADR制度に関する次の①～④の記述のうち、その内容が適切でないものを１つだけ選び、解答欄にその番号をマークしなさい。\n\n①　貸金業者は、指定紛争解決機関である日本貸金業協会に加入していない場合であっても、指定紛争解決機関との間で手続実施基本契約を締結する措置を講じなければならず、手続実施基本契約を締結する措置を講じたときは、当該手続実施基本契約の相手方である指定紛争解決機関の商号又は名称を公表しなければならない。\n②　貸金業者は、貸金業法第16条の２第１項に定める書面（契約締結前の書面）に、手続実施基本契約を締結した指定紛争解決機関の商号又は名称を表示する必要はないが、貸金業法第17条第１項に規定する書面（契約締結時の書面）に、当該指定紛争解決機関の商号又は名称を表示しなければならない。\n③　加入貸金業者(注)は、訴訟が係属している請求を目的とする紛争解決手続が開始された場合には、当該訴訟が係属している旨、当該訴訟における請求の理由及び当該訴訟の程度を指定紛争解決機関に報告しなければならない。\n④　指定紛争解決機関又は紛争解決委員は、苦情処理手続を開始し、又は加入貸金業者に係る資金需要者等からの申立てに基づき紛争解決手続を開始した場合において、加入貸金業者にこれらの手続に応じるよう求めることができ、当該加入貸金業者は、その求めがあったときは、正当な理由なくこれを拒んではならない。\n\n(注)　加入貸金業者とは、指定紛争解決機関と手続実施基本契約を締結した貸金業者をいう。","answer":2,"topic":"紛争解決","explanation":"②が適切でない。指定紛争解決機関の商号又は名称は、契約締結時書面だけでなく契約締結前書面にも表示しなければならないとされており、契約締結前書面への表示が不要とする記述は誤りである。①○: 日本貸金業協会に加入しない貸金業者は指定紛争解決機関との間で手続実施基本契約を締結する措置を講じ、その相手方を公表しなければならない。③○: 訴訟係属中の紛争について紛争解決手続が開始された場合、訴訟係属の事実等を指定紛争解決機関に報告しなければならない。④○: 指定紛争解決機関等からの手続応諾の求めに対し、加入貸金業者は正当な理由なく拒めない。"},{"no":20,"category":"法及び関係法令に関すること","text":"Ａは株式会社である貸金業者であり、Ｂは個人である顧客である。貸金業法第13条（返済能力の調査）第３項及び同法第13条の３（基準額超過極度方式基本契約に係る調査）第３項に規定する源泉徴収票その他のＢの収入又は収益その他の資力を明らかにする事項を記載し、又は記録した書面又は電磁的記録として内閣府令で定めるもの（以下、本問において「年収証明書」という。）に関する次の①～④の記述のうち、その内容が適切でないものを１つだけ選び、解答欄にその番号をマークしなさい。なお、本問における貸付けに係る契約は、貸金業法施行規則第10条の16（指定信用情報機関が保有する信用情報の使用義務の例外）に規定する貸付けの契約ではないものとする。\n\n①　Ａは、Ｂとの間で、初めて貸付けに係る契約を締結しようとする場合において、当該契約の貸付けの金額が40万円であり、指定信用情報機関から提供を受けた信用情報により判明したＢに対するＡ以外の貸金業者の貸付けの残高の合計額（以下、本問において「他社残高」という。）が70万円であるときは、返済能力の調査を行うに際し、Ｂから年収証明書の提出又は提供を受けなければならない。\n②　Ａは、Ｂとの間で、貸付けの金額が100万円の貸付けに係る契約を締結しようとする場合において、既にＢから２年前に発行された源泉徴収票の提出を受けていたとしても、返済能力の調査を行うに際し、Ｂから年収証明書の提出又は提供を受けなければならない。\n③　Ａは、基準額超過極度方式基本契約に係る調査をしなければならない場合において、Ｂとの間の貸付けに係る契約が極度額を30万円とする極度方式基本契約のみであり、他社残高が80万円でかつその全てが除外契約(注)に係るものであるときは、当該調査を行うに際し、Ｂから年収証明書の提出又は提供を受けなければならない。\n④　Ａは、基準額超過極度方式基本契約に係る調査において、Ｂに係る極度方式個人顧客合算額が100万円を超え、Ｂから年収証明書の提出又は提供を受けなければならない場合において、年収証明書の提出又は提供を受けるときには、Ｂに係る極度方式個人顧客合算額が100万円を超えると知った日から２か月以内に年収証明書の提出又は提供を受けなければならない。\n\n(注)　除外契約とは、貸金業法第13条の２（過剰貸付け等の禁止）第２項に規定する個人過剰貸付契約から除かれる契約として貸金業法施行規則第10条の21に規定するものをいう。","answer":3,"topic":"年収証明書","explanation":"③が適切でない。除外契約に係る残高は極度方式個人顧客合算額等の算定から除かれるため、他社残高がすべて除外契約に係るものである場合、年収証明書の取得義務を生じさせる基準額超過の判定に影響せず、一律に年収証明書の提出を要するとはいえない。①○: 貸付金額と他社残高の合計が100万円を超える場合は年収証明書の取得が必要であり、40万円と70万円の合計は100万円を超える。②○: 年収証明書は源泉徴収票等の発行から一定期間内のものが必要であり、２年前のものでは足りず改めて取得が必要である。④○: 極度方式個人顧客合算額が100万円を超えると知った日から２か月以内に年収証明書を取得しなければならない。"},{"no":21,"category":"法及び関係法令に関すること","text":"次の①～④の記述のうち、個人顧客が既に負担している債務（以下、本問において「既存債務」という。）を弁済するために必要な資金の貸付けに係る契約（以下、本問において「当該貸付契約」という。）が、貸金業法第13条の２（過剰貸付け等の禁止）第２項に規定する個人顧客の利益の保護に支障を生ずることがない契約として貸金業法施行規則第10条の23第１項第１号の２で定めるもの（借入残高を段階的に減少させるための借換え）に該当するための要件として適切でないものを１つだけ選び、解答欄にその番号をマークしなさい。なお、当該貸付契約は、極度方式基本契約ではないものとする。\n\n①　当該貸付契約に基づき将来支払う返済金額の合計額が既存債務に係る将来支払う返済金額の合計額を上回らないこと。\n②　当該貸付契約の１か月の負担が既存債務に係る１か月の負担を上回らないこと。\n③　当該貸付契約の貸付けの利率が、既存債務に係る貸付けに係る契約（既存債務に係る貸付けに係る契約が２以上ある場合は、弁済時における貸付けの残高により加重平均した貸付けの利率）の貸付けの利率を上回らないこと。\n④　既存債務につき供されている物的担保以外の物的担保を供させず、かつ、既存債務に係る保証契約の保証人以外の者を当該貸付契約の保証契約の保証人としないこと。","answer":1,"topic":"総量規制","explanation":"①が適切でない要件である。段階的な借換え（借入残高減少型借換え）の要件は、新契約の各回の返済負担（１か月の負担）が既存債務を上回らないことであり、将来支払う返済金額の「合計額」を比較する要件は定められていない。②○: １か月の負担が既存債務を上回らないことは要件の一つである。③○: 新契約の利率が既存債務の利率（複数ある場合は加重平均利率）を上回らないことも要件である。④○: 既存の担保・保証人の範囲を超えて新たな負担を課さないことも要件である。"},{"no":22,"category":"法及び関係法令に関すること","text":"貸金業法第15条（貸付条件の広告等）に関する次の①～④の記述のうち、その内容が適切でないものを１つだけ選び、解答欄にその番号をマークしなさい。なお、本問における金銭の貸付けには、手形の割引及び売渡担保は含まれないものとする。\n\n①　貸金業者が金銭の貸付けの条件について広告をする場合において、営業所又は事務所の電話番号を表示するときは、当該営業所又は事務所で使用する携帯電話の番号を表示することはできない。\n②　貸金業者が金銭の貸付けの条件について広告をするときは、貸金業者の登録番号を表示しなければならないが、その登録番号の括弧書については、記載を省略することができる。\n③　貸金業者が金銭の貸付けの条件について広告をするときは、担保を供することが必要な場合における当該担保に関する事項について表示しなければならない。\n④　貸金業者が金銭の貸付けの条件について広告をするときは、不当景品類及び不当表示防止法、屋外広告物法第３条（広告物の表示等の禁止）第１項の規定に基づく都道府県の条例その他の法令に違反する広告をしてはならない。","answer":2,"topic":"貸付条件の掲示","explanation":"②が適切でない。貸金業者の登録番号は括弧書（更新回数を示す部分）を含めて省略せずに表示しなければならず、括弧書の省略が認められるとする記述は誤りである。①○: 広告に表示する電話番号は、当該営業所等が業務に使用する固定電話等とすべきで、携帯電話番号の表示は認められないとされている。③○: 担保が必要な場合はその担保に関する事項を広告に表示しなければならない。④○: 景品表示法や屋外広告物法に基づく条例等、他の法令に違反する広告は禁止される。"},{"no":23,"category":"法及び関係法令に関すること","text":"貸金業法第16条の２に規定する書面（以下、本問において「契約締結前の書面」という。）の交付に関する次の①～④の記述のうち、その内容が適切でないものを１つだけ選び、解答欄にその番号をマークしなさい。なお、本問における貸付けに係る契約は、極度方式基本契約、極度方式貸付けに係る契約、手形の割引の契約及び売渡担保の契約ではないものとする。\n\n①　貸金業者向けの総合的な監督指針（以下、本問において「監督指針」という。）によれば、貸金業者は、貸付けに係る契約を締結しようとする場合において、当該契約の相手方となろうとする者に契約締結前の書面を交付するときは、当該書面は、少なくとも、契約締結の前日までに交付が必要であることに留意する必要があるとされている。\n②　貸金業者が、貸付けに係る契約を締結しようとする場合に、当該契約の相手方となろうとする者に交付すべき契約締結前の書面の記載事項には、契約年月日、契約の相手方の氏名及び住所は含まれていない。\n③　貸金業者が、貸付けに係る契約を締結しようとする場合に、当該契約の相手方となろうとする者に交付すべき契約締結前の書面の記載事項については、当該書面により明らかにすべきものとされる事項を日本産業規格Z8305に規定する８ポイント以上の大きさの文字及び数字を用いて明瞭かつ正確に記載しなければならない。\n④　監督指針によれば、貸金業者が、貸付けに係る契約の相手方となろうとする者に契約締結前の書面を交付した後、契約締結前に、法令で定められた記載事項の内容に変更が生じた場合には、再度、当該契約の相手方となろうとする者に対し契約締結前の書面を交付する必要があるとされている。","answer":1,"topic":"契約締結前書面","explanation":"①が適切でない。契約締結前書面は契約内容を十分に検討する時間的余裕をもって交付すべきものとされるが、「少なくとも契約締結の前日までに」という一律の期限が定められているわけではなく、この記述は監督指針の内容として正確でない。②○: 契約年月日や契約の相手方の氏名・住所は契約締結「前」の書面の性質上、記載事項には含まれない。③○: 契約締結前書面の記載はJIS Z8305に規定する８ポイント以上の文字を用いなければならない。④○: 記載事項に変更が生じた場合は再度契約締結前書面を交付する必要があるとされている。"},{"no":24,"category":"法及び関係法令に関すること","text":"貸金業者Ａが個人顧客Ｂとの間で締結した貸付けに係る契約（以下、本問において「本件貸付契約」という。）に基づく債権について弁済を受けた場合に関する次の①～④の記述のうち、その内容が適切でないものを１つだけ選び、解答欄にその番号をマークしなさい。\n\n①　Ａは、Ｂから、Ａの営業所窓口で本件貸付契約に基づく債権の一部について弁済を受けた。この場合、Ａは、直ちに、貸金業法第18条第１項に規定する書面（以下、本問において「受取証書」という。）をＢに交付しなければならない。\n②　Ａは、Ｂから、Ａの預金口座に対する払込みにより本件貸付契約に基づく債権の一部について弁済を受けた。この場合、Ａは、Ｂから請求を受けたときに限り、受取証書をＢに交付しなければならない。\n③　Ａは、第三者Ｃから、Ａの営業所窓口で本件貸付契約に基づく債権の一部について弁済を受けた。この場合、Ａは、Ｃに交付する受取証書に、Ｂの氏名及びＣの氏名を記載しなければならない。\n④　Ａは、Ｂから、Ａの営業所窓口で本件貸付契約に基づく債権の全部について弁済を受けた。この場合、Ａは、Ｂから請求を受けたときは、遅滞なく、受取証書の交付とは別に、債権の全部について弁済を受けたことを証する書面（完済証明書）をＢに交付しなければならない。","answer":4,"topic":"受取証書・帳簿","explanation":"④が適切でない。完済に伴う受取証書には、通常の受取証書の記載事項として全部弁済である旨等を記載すれば足り、これとは別に「完済証明書」なる書面を独立して交付する法定義務は設けられていない。①○: 弁済を受けたときは直ちに受取証書を交付しなければならない。②○: 口座振込みによる弁済の場合は、債務者から請求があったときに受取証書を交付すれば足りるとされている。③○: 第三者が弁済した場合、受取証書には債務者の氏名と弁済者（第三者）の氏名の双方を記載しなければならない。"},{"no":25,"category":"法及び関係法令に関すること","text":"貸金業法第24条（債権譲渡等の規制）に関する次の①～④の記述のうち、その内容が適切でないものを１つだけ選び、解答欄にその番号をマークしなさい。\n\n①　貸金業者は、貸付けに係る契約に基づく債権を他人に譲渡するに当たっては、譲受人が貸金業者である場合を除き、譲受人に対し、当該債権が貸金業者の貸付けに係る契約に基づいて発生したことその他内閣府令で定める事項及び譲受人が当該債権に係る貸付けの契約に基づく債権に関してする行為について貸金業法第24条第１項に規定する条項の適用がある旨を、内閣府令で定める方法により、通知しなければならない。\n②　貸金業者の貸付けに係る契約に基づく債権を譲り受けた者は、内閣府令で定めるところにより、その営業所又は事務所ごと（営業所又は事務所を有しない者にあっては、住所地又は居所地）に、その業務に関する帳簿を備え、当該債権の債務者ごとに当該債権に係る貸付けの契約について当該債権の譲受年月日及び当該貸付けの契約の契約年月日、当該債権の額及び貸付けの金額、受領金額その他内閣府令で定める事項を記載し、これを保存しなければならない。\n③　貸金業者向けの総合的な監督指針（以下、本問において「監督指針」という。）によれば、監督当局は、貸金業者の監督に当たっては、貸金業者の貸付債権の譲渡については、債権譲受人との債権譲渡契約において、債務者等からの問い合わせや取引履歴の開示請求などがある場合を想定し、債権譲受人との明確な責任分担のもとに債務者等に適切に対応するための規定が置かれているか、また、債権譲受人が債務者等に対し貸金業法第24条第２項に基づく債権譲渡通知を遅滞なく送付することや法令を遵守した債権管理及び回収を行うこと等、債務者等の保護の確保に努めるための規定が置かれているかに留意するものとされている。\n④　監督指針によれば、監督当局は、貸金業者の監督に当たっては、貸金業者が、貸付債権について委託又は譲渡を受けて、管理又は回収を業として行う場合には、弁護士法等の規定に抵触しないか確認を行っているかに留意するものとされている。","answer":1,"topic":"債権譲渡規制","explanation":"①が適切でない。債権譲渡に際して譲受人へ通知すべき事項は、当該債権が貸金業者の貸付けに係る契約に基づいて発生したこと等であるが、譲受人が取立て制限者である場合や暴力団員等でないことの確認義務等が中心であり、譲受人が貸金業者である場合を除くという限定や記述内容が法の規定と一致しない。②○: 債権譲受人にも帳簿の備付け・保存義務が課される。③○: 監督指針上、債権譲渡に当たり譲受人との責任分担や債務者保護のための規定整備が求められる。④○: 債権の管理回収業務を行うに当たり弁護士法等との抵触の有無を確認しているかが監督指針の着眼点とされる。"},{"no":26,"category":"法及び関係法令に関すること","text":"Ａは、Ｂとの間で元本を30万円とし利息を年１割８分（18％）とする営業的金銭消費貸借契約（以下、本問において「第一契約」という。）を初めて締結し金銭を貸し付けた。その後、Ａは、Ｂとの間で新たに営業的金銭消費貸借契約（以下、本問においてそれぞれ「第二契約」、「第三契約」という。）を締結しようとしている。この場合に関する次の①～④の記述のうち、利息制限法上、その内容が適切でないものを１つだけ選び、解答欄にその番号をマークしなさい。\n\n①　第一契約に基づく債務の残存元本額が15万円である時点において、ＡとＢとの間で元本を90万円とし利息を年１割８分（18％）として第二契約を締結した場合、第一契約及び第二契約における利息の約定のうち年１割５分（15％）を超過する部分に限り無効となる。\n②　第一契約に基づく債務の残存元本額が20万円である時点において、ＡとＢとの間で元本を８万円とし利息を年２割（20％）として第二契約を締結した場合、第二契約における利息の約定のうち年１割８分（18％）を超過する部分に限り無効となる。\n③　第一契約に基づく債務の残存元本額が５万円である時点において、ＡとＢとの間で元本を60万円とし利息を年１割８分（18％）として第二契約を締結すると同時に、元本を40万円とし利息を年１割８分（18％）として第三契約を締結した場合、第二契約及び第三契約における利息の約定のうち年１割５分（15％）を超過する部分に限り無効となる。\n④　第一契約に基づく債務の残存元本額が10万円である時点において、ＡとＢとの間で元本を80万円とし利息を年１割８分（18％）として第二契約を締結すると同時に、元本を９万円とし利息を年２割（20％）として第三契約を締結した場合、第三契約における利息の約定のうち年１割８分（18％）を超過する部分に限り無効となる。","answer":1,"topic":"利息制限法","explanation":"①が適切でない。第一契約と第二契約の元本合計は残存元本15万円＋新規90万円＝105万円となり、利息制限法上の上限利率は元本100万円以上の区分である年15％が適用されるべきところ、複数契約の残存元本を合算して上限利率を判定する場合、合算元本額に応じた利率を基準とする点は正しいが、超過部分の無効の範囲・対象契約の扱いに関する記述が制限法の考え方と整合しない。②○: 残存元本20万円＋新規８万円＝28万円で10万円以上100万円未満の区分の上限利率年18％が適用され、超過部分のみ無効となる。③○④○: 同時締結の複数契約は元本を合算して上限利率を判定する考え方に沿った記述である。"},{"no":27,"category":"法及び関係法令に関すること","text":"みなし利息に関する次の①～④の記述のうち、利息制限法上、その内容が適切でないものを１つだけ選び、解答欄にその番号をマークしなさい。\n\n①　貸金業者は、顧客との間で締結した営業的金銭消費貸借契約において、現金自動支払機を利用して当該顧客から5,000円の弁済を受ける際に、その利用料として、110円（消費税額等相当額を含む。）を当該顧客から受領した。この場合、当該利用料は、利息とみなされない。\n②　貸金業者は、顧客との間で締結した営業的金銭消費貸借契約において、貸金業法第17条第１項に規定する契約締結時の書面を交付した後、当該顧客から紛失による再発行の要請を受けたことに基づき、当該書面を再発行し、その手数料（消費税額等相当額を含む。）を当該顧客から受領した。この場合、当該手数料は、利息とみなされる。\n③　貸金業者は、顧客との間で締結した営業的金銭消費貸借契約において、当該契約の契約書に貼付する当該顧客が負担すべき収入印紙の費用を当該顧客から受領した。この場合、当該費用は、利息とみなされない。\n④　貸金業者は、顧客との間で締結した営業的金銭消費貸借契約において、金銭の貸付け及び弁済に用いるため、当該契約締結時に当該顧客にカードを交付し、その発行手数料（消費税額等相当額を含む。）を当該顧客から受領した。この場合、当該発行手数料は、利息とみなされる。\n\n---","answer":2,"topic":"みなし利息","explanation":"②が適切でない。契約締結時書面の再発行手数料は、顧客の都合（紛失等）による実費相当のものであり、利息とはみなされない費用として扱われる。①○: ATM利用料は所定の上限額（１万円以下の取引につき110円等）の範囲内であれば利息とみなされない。③○: 契約書に貼付する印紙代（顧客負担分）は利息とみなされない。④○: カードの発行手数料は原則として利息とみなされる。"},{"no":28,"category":"貸付け及び貸付けに付随する取引に関する法令及び実務に関すること","text":"行為能力に関する次の①～④の記述のうち、民法上、その内容が適切なものを１つだけ選び、解答欄にその番号をマークしなさい。\n\n①　成年被後見人の法律行為は、その成年後見人の同意を得て行われたときは、取り消すことができない。\n②　被保佐人は、相続の承認又は放棄をするには、その保佐人の同意を得る必要はない。\n③　被補助人は、家庭裁判所の審判により補助人の同意を得なければならないとされた行為以外の法律行為は、単独で有効に行うことができる。\n④　一種又は数種の営業を許された未成年者は、これにより成年に達したものとみなされ、すべての法律行為について、成年者と同一の行為能力を有する。","answer":3,"topic":"意思能力・行為能力","explanation":"③が適切である。被補助人は、家庭裁判所の審判により補助人の同意を要するとされた特定の法律行為以外は、単独で有効に行うことができる。①×: 成年被後見人の法律行為は、後見人の同意を得ていたとしても日用品の購入等日常生活に関する行為を除き取り消すことができる。②×: 相続の承認・放棄は被保佐人が単独では行えない重要な法律行為であり、保佐人の同意を要する。④×: 営業を許された未成年者はその営業に関してのみ成年者と同一の行為能力を有し、すべての法律行為について成年者とみなされるわけではない。"},{"no":29,"category":"貸付け及び貸付けに付随する取引に関する法令及び実務に関すること","text":"無効及び取消しに関する次の①～④の記述のうち、民法上、その内容が適切なものを１つだけ選び、解答欄にその番号をマークしなさい。\n\n①　無効な行為について当事者が無効であることを知って追認をしたときは、行為の時にさかのぼって有効であったものとみなされる。\n②　成年被後見人は、法定代理人の同意を得て、取り消すことができる行為を追認することができる。\n③　詐欺又は強迫によって取り消すことができる行為の取消しは、その取消しの意思表示をした時から将来に向かってその効力を生ずる。\n④　取消権者により未成年者の法律行為が取り消された場合、その法律行為に基づく債務の履行として給付を受けた未成年者は、その法律行為によって現に利益を受けている限度において、給付を受けたものの返還義務を負う。","answer":4,"topic":"無効・取消し","explanation":"④が適切である。取り消された行為に基づく給付を受けた者のうち、行為の時に意思能力を有しなかった者や制限行為能力者は、現に利益を受けている限度（現存利益）で返還義務を負う。①×: 無効な行為は追認をしても原則として効力を生じず、当事者が新たな行為をしたものとみなされるにとどまる。②×: 成年被後見人は法定代理人の同意を得ても自ら追認をすることはできず、追認は行為能力を回復した後又は法定代理人によって行う必要がある。③×: 詐欺・強迫による取消しの効力は、取消しの意思表示により行為の時に遡って無効となる（遡及効）のであり、将来に向かってのみ効力を生ずるものではない。"},{"no":30,"category":"貸付け及び貸付けに付随する取引に関する法令及び実務に関すること","text":"消滅時効に関する次の①～④の記述のうち、民法上、その内容が適切なものを１つだけ選び、解答欄にその番号をマークしなさい。\n\n①　債権は、債権者が権利を行使できることを知っているか否かにかかわらず、５年間行使しないときは、時効によって消滅する。\n②　消滅時効は、当事者が主張しなくても、裁判所が職権でその成否を認定し裁判することができる。\n③　強制執行がその申立ての取下げにより終了した場合は、進行中の消滅時効について、時効の完成猶予の効力を生じない。\n④　債務者が、消滅時効が完成したことを知らずに債務の存在を承認した場合、時効は、その時から新たに進行を始める。","answer":4,"topic":"時効","explanation":"④が適切である。時効完成の事実を知らずに債務を承認した場合でも、承認は時効の更新事由となり、その時から新たに時効が進行を始める（時効完成の主張は信義則上制限される）。①×: 債権の消滅時効は権利行使できることを知った時から５年、権利行使できる時から10年のいずれか早い方の経過により完成し、認識の有無にかかわらず一律５年とする記述は誤りである。②×: 消滅時効は当事者の援用がなければ裁判所が職権で考慮することはできない。③×: 強制執行が申立ての取下げにより終了した場合でも、その終了時から６か月間は時効の完成が猶予される。"},{"no":31,"category":"貸付け及び貸付けに付随する取引に関する法令及び実務に関すること","text":"Ａは、Ｂとの間で金銭消費貸借契約（以下、本問において「本件契約」という。）を締結しＢに金銭を貸し付けた。本件契約では、元本10万円、利息年１割５分（15％）、元利一括返済方式とする旨の約定がなされており、遅延損害金に関する定めは存在しない。Ｂは、本件契約で定める返済期限が経過したにもかかわらず、借入金をＡに返済していない。この場合に関する次の①～④の記述のうち、民法上、その内容が適切なものを１つだけ選び、解答欄にその番号をマークしなさい。\n\n①　Ａは、Ｂに対し、返済期限の翌日から借入金が完済されるまで、借入金の残額に約定利率年１割５分（15％）の割合を乗じた額の遅延損害金を請求することができる。\n②　Ａは、Ｂに対し、返済期限の翌日から借入金が完済されるまで、借入金の残額に約定利率年１割５分（15％）と法定利率年３分（３％）を合計した年１割８分（18％）の割合を乗じた額の遅延損害金を請求することができる。\n③　Ａは、Ｂに対し、返済期限の翌日から借入金が完済されるまで、借入金の残額に法定利率年３分（３％）の割合を乗じた額の遅延損害金しか請求することができない。\n④　Ａは、Ｂが借入金の返済を遅延したことにより被った損害を証明しなければ、Ｂに対し、当該証明した額の遅延損害金を請求することができない。","answer":1,"topic":"債権の効力","explanation":"①が適切である。遅延損害金の定めがない場合、金銭債務の不履行による損害賠償額は原則として約定利率によるが、約定利率が法定利率を超えるときは約定利率により算定されるため、本問では年15％の約定利率による請求ができる。②×: 約定利率と法定利率を合算する扱いは民法上根拠がなく誤りである。③×: 約定利率が法定利率を超える場合は約定利率によるべきであり、法定利率のみに限定されるとする記述は誤りである。④×: 金銭債務の不履行については損害の証明を要せず、約定又は法定の利率により当然に損害賠償を請求できる。"},{"no":32,"category":"貸付け及び貸付けに付随する取引に関する法令及び実務に関すること","text":"保証に関する次の①～④の記述のうち、民法上、その内容が適切なものを１つだけ選び、解答欄にその番号をマークしなさい。\n\n①　保証契約は、債権者と保証人となろうとする者との間において、保証契約を締結する旨の口頭の合意がなされることによって成立するが、連帯保証契約については、債権者と連帯保証人となろうとする者の間で、書面又は電磁的記録によって締結されなければ、その効力を生じない。\n②　連帯保証において、主たる債務の目的又は態様が連帯保証契約の締結後に加重されたときは、連帯保証人の負担も加重される。\n③　数人の保証人がある場合、各保証人は、別段の意思表示がある場合を除き、それぞれ平等の割合をもって分割された額についてのみ保証債務を負担するが、連帯保証人には、この分別の利益が認められず、各連帯保証人は、それぞれ全額について保証債務を負担する。\n④　連帯保証において、債権者が、主たる債務者に債務の履行を請求することなく、連帯保証人に保証債務の履行を請求した場合、連帯保証人は、主たる債務者が破産手続開始の決定を受けたとき、又はその行方が知れないときを除いて、債権者に対し、まず主たる債務者に催告すべき旨を請求することができる。","answer":3,"topic":"保証・連帯保証","explanation":"③が適切である。数人の保証人がいる場合、通常保証には分別の利益が認められ各保証人は平等の割合で保証債務を負担するが、連帯保証人には分別の利益がなく各自が全額について保証債務を負う。①×: 保証契約は書面又は電磁的記録によらなければ効力を生じず、通常保証・連帯保証を問わず口頭の合意のみでは成立しない。②×: 主たる債務の内容が保証契約締結後に加重されても、保証人（連帯保証人を含む）の負担は加重されない。④×: 連帯保証人には催告の抗弁権・検索の抗弁権がなく、主たる債務者への催告を求めることはできない。"},{"no":33,"category":"貸付け及び貸付けに付随する取引に関する法令及び実務に関すること","text":"定型約款に関する次の①～④の記述のうち、民法上、その内容が適切なものを１つだけ選び、解答欄にその番号をマークしなさい。\n\n①　定型取引とは、ある特定の者が不特定多数の者を相手方として行う取引であって、その内容の全部又は一部が画一的であることがその双方にとって合理的なものをいう。\n②　定型取引を行い、又は行おうとする定型約款を準備した者（以下、本問において「定型約款準備者」という。）は、定型取引を行うことの合意（以下、本問において「定型取引合意」という。）をするまでに、相当な方法で相手方にその定型約款の内容を示さなければならない。\n③　定型取引合意及び定型約款を契約の内容とする旨の合意をし、かつ、定型約款準備者があらかじめその定型約款を契約の内容とする旨を相手方に表示していた場合であっても、相手方が当該定型約款の個別の条項の一部について認識していなかったときは、当該条項については合意をしたものとはみなされない。\n④　定型約款準備者は、定型約款を変更するには、その変更が相手方の一般の利益に適合するときを除き、変更内容について相手方と個別に合意しなければならない。","answer":1,"topic":"契約・債務不履行","explanation":"①が適切である。定型取引とは、特定の者が不特定多数を相手方として行う取引であって、内容の全部又は一部が画一的であることが双方にとって合理的なものをいう。②×: 定型約款準備者は、定型取引合意の前又は合意後相当期間内に相手方から請求があった場合に、遅滞なく相当な方法でその内容を示せば足り、合意までに必ず示す義務までは課されていない。③×: 定型約款を契約内容とする旨の表示等の要件を満たせば、個別条項を認識していなくても原則として合意をしたものとみなされる（不当条項等を除く）。④×: 定型約款の変更が相手方の一般の利益に適合する場合のほか、変更が契約目的に反せず合理的な場合も個別合意なく変更できる。"},{"no":34,"category":"貸付け及び貸付けに付随する取引に関する法令及び実務に関すること","text":"相続に関する次の①～④の記述のうち、民法上、その内容が適切なものを１つだけ選び、解答欄にその番号をマークしなさい。\n\n①　被相続人の子が、相続の開始以前に死亡したとき、相続人の欠格事由に該当しもしくは廃除によって相続権を失ったとき、又は相続の放棄をしたときは、その者の子がこれを代襲して相続人となる。\n②　被相続人の配偶者と被相続人の直系尊属が相続人となるときは、当該配偶者の法定相続分は、４分の３である。\n③　相続人が数人あるときは、限定承認は、各共同相続人がその相続分に応じて個別にすることができる。\n④　相続人のあることが明らかでないときは、相続財産は、法人とされる。","answer":4,"topic":"相続","explanation":"④が適切である。相続人のあることが明らかでないときは、相続財産は法人とされる。①×: 代襲相続は死亡・欠格・廃除の場合に生じるが、相続放棄をした者の子には代襲相続は生じない。②×: 配偶者と直系尊属が相続人となる場合の配偶者の法定相続分は３分の２である。③×: 限定承認は共同相続人全員が共同してのみ行うことができ、各共同相続人が個別に行うことはできない。"},{"no":35,"category":"貸付け及び貸付けに付随する取引に関する法令及び実務に関すること","text":"株式会社の取締役及び取締役会に関する次の①～④の記述のうち、会社法上、その内容が適切なものを１つだけ選び、解答欄にその番号をマークしなさい。なお、本問における株式会社は、監査等委員会設置会社及び指名委員会等設置会社ではないものとする。\n\n①　取締役の任期は、選任後２年以内に終了する事業年度のうち最終のものに関する定時株主総会の終結の時までであり、定款又は株主総会の決議によって、その任期を短縮又は伸長することはできない。\n②　代表取締役及び代表取締役以外の取締役であって取締役会の決議によって取締役会設置会社の業務を執行する取締役として選定されたものは、３か月に１回以上、自己の職務の執行の状況を取締役会に報告しなければならない。\n③　取締役会は、取締役会の決議により、多額の借財の決定を取締役に委任することができる。\n④　株式会社の取締役がその職務を行うについて悪意又は重大な過失があり、これによって第三者に損害が生じた場合、当該株式会社が第三者に対して損害賠償責任を負い、当該取締役が第三者に対して損害賠償責任を負うことはない。","answer":2,"topic":"契約・債務不履行","explanation":"②が適切である。代表取締役及び業務執行取締役として選定された取締役は、３か月に１回以上自己の職務執行の状況を取締役会に報告しなければならない。①×: 取締役の任期は原則２年以内であるが、非公開会社では定款により任期を10年まで伸長することができる。③×: 多額の借財の決定は取締役会の専決事項であり、取締役への委任は認められていない。④×: 取締役に悪意・重過失があり第三者に損害が生じた場合、会社の責任とは別に当該取締役自身も第三者に対し損害賠償責任を負う。"},{"no":36,"category":"貸付け及び貸付けに付随する取引に関する法令及び実務に関すること","text":"犯罪による収益の移転防止に関する法律についての次の①～④の記述のうち、その内容が適切なものを１つだけ選び、解答欄にその番号をマークしなさい。\n\n①　貸金業者が取引時確認をすることが求められる特定取引には、金銭の貸付け又は金銭の貸借の媒介（手形の割引、売渡担保その他これらに類する方法によってする金銭の交付又は当該方法によってする金銭の授受の媒介を含む。）を内容とする契約の締結のほか、金銭の貸付けを内容とする契約に係る保証契約が含まれる。\n②　貸金業者が、顧客等について取引時確認を行う場合において、会社の代表者が当該会社のために当該貸金業者との間で特定取引等を行うときは、当該貸金業者は、当該会社の当該取引時確認を行えば足り、当該代表者の本人特定事項の確認を行う必要はない。\n③　貸金業者は、取引時確認を行った場合には、直ちに、主務省令で定める方法により、当該取引時確認に係る事項、当該取引時確認のためにとった措置その他の主務省令で定める事項に関する記録を作成し、当該記録を作成した日から７年間保存しなければならない。\n④　貸金業者は、取引時確認、取引記録等の保存、疑わしい取引の届出等の措置を的確に行うため、特定事業者作成書面等(注)を作成し、必要に応じて、見直しを行い、必要な変更を加えるように努めなければならない。\n\n(注)　特定事業者作成書面等とは、特定事業者自らが行う取引について調査し、及び分析し、並びに当該取引による犯罪による収益の移転の危険性の程度その他の当該調査及び分析の結果を記載し、又は記録した書面又は電磁的記録をいう。","answer":4,"topic":"犯収法","explanation":"④が適切である。特定事業者は特定事業者作成書面等を作成し、必要に応じて見直し・変更を行うよう努めなければならないとされている。①×: 特定取引に金銭の貸付けを内容とする契約の保証契約は原則として含まれない。②×: 会社の代表者が会社のために取引を行う場合、会社についての取引時確認に加え、当該代表者についても本人特定事項等の確認（代表者等の確認）を行う必要がある。③×: 取引記録等の保存期間は取引終了後７年間であり、取引時確認記録の作成・保存も同様に取引関係終了後の日から７年間である点を含め、「直ちに作成」との記述など細部が正確でない。"},{"no":37,"category":"貸付け及び貸付けに付随する取引に関する法令及び実務に関すること","text":"意思表示に関する次の①～④の記述のうち、民法上、その内容が適切でないものを１つだけ選び、解答欄にその番号をマークしなさい。\n\n①　意思表示は、表意者がその真意でないことを知ってしたときは無効であるが、相手方がその意思表示が表意者の真意ではないことを知り又は知ることができたときは、表意者は、その無効を主張することができない。\n②　相手方と通じてした虚偽の意思表示は無効であるが、この意思表示の無効は、善意の第三者に対抗することができない。\n③　契約の解除の意思表示は、表意者が通知を発した後に死亡し、意思能力を喪失し、又は行為能力の制限を受けたときであっても、そのためにその効力を妨げられない。\n④　意思表示は、表意者が相手方を知ることができず、又はその所在を知ることができないときは、公示の方法によってすることができる。","answer":1,"topic":"意思表示","explanation":"①が適切でない。心裡留保による意思表示は原則として有効であり、相手方が表意者の真意でないことを知り又は知ることができたときに限り無効となる。原則を「無効」とする記述が誤りである。②○: 虚偽表示は無効であるが、その無効は善意の第三者に対抗できない。③○: 契約解除等の意思表示は、発信後に表意者が死亡・意思能力喪失・行為能力制限を受けても効力を妨げられない。④○: 相手方を知ることができない等の場合は公示による意思表示が認められる。"},{"no":38,"category":"貸付け及び貸付けに付随する取引に関する法令及び実務に関すること","text":"代理に関する次の①～④の記述のうち、民法上、その内容が適切でないものを１つだけ選び、解答欄にその番号をマークしなさい。\n\n①　代理人が本人のためにすることを示さないでした意思表示は、相手方が、代理人が本人のためにすることを知り、又は知ることができたとしても、本人が追認をしなければ、本人に対してその効力を生じない。\n②　委任による代理人は、本人の許諾を得たとき、又はやむを得ない事由があるときでなければ、復代理人を選任することができない。\n③　法定代理人は、自己の責任で復代理人を選任することができる。この場合において、やむを得ない事由があるときは、本人に対してその選任及び監督についての責任のみを負う。\n④　第三者に対して他人に代理権を与えた旨を表示した者は、その代理権の範囲内においてその他人が第三者との間でした行為について、その責任を負う。ただし、第三者が、その他人が代理権を与えられていないことを知り、又は過失によって知らなかったときは、この限りでない。","answer":1,"topic":"代理","explanation":"①が適切でない。代理人が本人のためにすることを示さずにした意思表示（顕名のない意思表示）は、相手方が代理人が本人のためにすることを知り、又は知ることができたときは、本人に対して直接効力を生じ、本人の追認を要しない。②○: 委任による代理人は本人の許諾又はやむを得ない事由がなければ復代理人を選任できない。③○: 法定代理人はやむを得ない事由がある場合、選任及び監督についてのみ責任を負う。④○: 表見代理（代理権授与表示による表見代理）の要件どおりであり、相手方の悪意・過失がある場合は本人は責任を負わない。"},{"no":39,"category":"貸付け及び貸付けに付随する取引に関する法令及び実務に関すること","text":"Ａは、Ｂとの間で、11月１日に、借入金の返済期限を翌年11月１日と定めて金銭消費貸借契約（以下、本問において「本件契約」という。）を締結しＢに金銭を貸し付けた。本件契約では、契約締結日の翌月以降毎月１日に発生済みの利息を支払う約定がなされている。この場合に関する次の①～④の記述のうち、民法上、その内容が適切でないものを１つだけ選び、解答欄にその番号をマークしなさい。\n\n①　Ａは、本件契約に基づきＢがＡに対して負担する一切の債務を被担保債権として、Ｂとの間で、Ｂが所有する甲建物に抵当権の設定を受けた。この場合において、Ｂが甲建物を滅失させたときは、Ｂは、返済期限到来前であっても、借入金の返済について期限の利益を主張することができない。\n②　Ｂは、返済期限が到来する前に、破産手続開始の決定を受けた。この場合、Ｂは、返済期限到来前であっても、借入金の返済について期限の利益を主張することができない。\n③　Ｂは、毎月の利息の支払を１回遅滞した。この場合、Ｂは、返済期限到来前であっても、借入金の返済について期限の利益を主張することができない。\n④　Ｂは、返済期限到来前であっても、期限の利益を放棄し、借入金及び利息をＡに弁済することができる。","answer":3,"topic":"期限・期間","explanation":"③が適切でない。期限の利益の喪失事由として、担保の滅失・毀損（自らの行為による滅失を含む）や破産手続開始等は民法上定められているが、利息の支払遅滞のみをもって当然に期限の利益を喪失するには、その旨の特約（期限の利益喪失約款）が必要であり、民法上当然に喪失するものではない。①○: 債務者が担保を滅失させたときは期限の利益を主張できない。②○: 破産手続開始の決定を受けたときも期限の利益を主張できない。④○: 期限の利益は債務者の利益のために定めたものと推定され、債務者は期限の利益を放棄して期限前弁済ができる。"},{"no":40,"category":"貸付け及び貸付けに付随する取引に関する法令及び実務に関すること","text":"Ａは、Ｂに対して有する貸金返還請求権を被担保債権として、Ｂが所有する甲建物に抵当権の設定を受けその登記を経た。この場合に関する次の①～④の記述のうち、民法上、その内容が適切でないものを１つだけ選び、解答欄にその番号をマークしなさい。\n\n①　Ｂが、月額賃料を10万円として甲建物を第三者Ｃに賃貸している場合において、返済期限を過ぎても借入金をＡに返済しないときは、Ａは、物上代位に基づいて、ＣがＢに対して賃料を払い渡す前にＢがＣに対して有する賃料請求権を差し押さえ、当該賃料から貸金を回収することができる。\n②　Ａが貸金返還請求権を第三者Ｄに譲渡した場合であっても、ＡとＢとの間の抵当権設定契約において、被担保債権の移転に伴い抵当権も移転する旨の特約がない限り、Ｄに抵当権は移転しない。\n③　貸金返還請求権についての保証人であるＥは、Ｂとの間で締結した売買契約に基づき甲建物を譲り受けた。この場合、Ｅは、Ａに対して、民法第383条（抵当権消滅請求の手続）に基づき抵当権消滅請求をすることはできない。\n④　抵当権が実行された場合において、Ａは、満期の到来した３年分の利息及び１年分の遅延損害金を請求する権利を有していた。Ａのほかに後順位抵当権者がいる場合、Ａは、元本のほか、利息及び遅延損害金を通算して２年分についてのみその抵当権を行使することができる。","answer":2,"topic":"抵当権・根抵当権","explanation":"②が適切でない。抵当権には随伴性があり、被担保債権が第三者に譲渡された場合、当事者間に別段の特約がなくても、被担保債権の移転に伴い抵当権も当然に移転するのが原則であり、特約がなければ移転しないとする記述は誤りである。①○: 抵当権者は賃料債権について物上代位により差押えをして貸金を回収することができる。③○: 抵当不動産の第三取得者である保証人（主債務者ではない者）は、主債務者自身でない限り抵当権消滅請求をすることができる。④○: 後順位抵当権者がいる場合、利息・遅延損害金は通算して満期後２年分に制限される。"},{"no":41,"category":"貸付け及び貸付けに付随する取引に関する法令及び実務に関すること","text":"金銭消費貸借契約に関する次の①～④の記述のうち、民法上、その内容が適切でないものを１つだけ選び、解答欄にその番号をマークしなさい。\n\n①　金銭消費貸借契約は、借主が借り受けた金銭と同額の金銭を返還することを約し、貸主から金銭を受け取ることによって成立するが、書面による金銭消費貸借契約は、貸主が金銭を引き渡すことを約し、借主がその受け取った金銭と同額の金銭をもって返還をすることを約することにより成立する。\n②　金銭消費貸借契約において当事者が利息に関する特約を定めなかった場合であっても、貸主は、借主に対して法定利息を請求することができる。\n③　金銭消費貸借契約において当事者が借入金の返還の時期を定めなかったときは、貸主は、相当の期間を定めてその返還の催告をすることができる。\n④　借主は、弁済期までに借入金を返還しなかった場合、履行遅滞が不可抗力によるものであったとしても、弁済期が到来した時から遅滞の責任を負う。","answer":2,"topic":"契約・債務不履行","explanation":"②が適切でない。利息は特約がなければ請求することができず、金銭消費貸借契約は原則として無利息である（利息の請求には特約が必要）。①○: 要物契約としての金銭消費貸借と、書面による諾成的金銭消費貸借の両方の成立要件を正しく説明している。③○: 返還時期の定めがない場合、貸主は相当の期間を定めて返還を催告することができる。④○: 金銭債務の不履行については不可抗力をもって抗弁とすることができず、弁済期到来時から遅滞の責任を負う。"},{"no":42,"category":"貸付け及び貸付けに付随する取引に関する法令及び実務に関すること","text":"民事執行法に関する次の①～④の記述のうち、その内容が適切でないものを１つだけ選び、解答欄にその番号をマークしなさい。\n\n①　強制執行は、原則として、執行文の付された債務名義の正本に基づいて実施される。ただし、少額訴訟における確定判決又は仮執行の宣言を付した少額訴訟の判決もしくは支払督促により、これに表示された当事者に対し、又はその者のためにする強制執行は、その正本に基づいて実施される。\n②　金銭の支払又は船舶もしくは動産の引渡しを目的とする債権（動産執行の目的となる有価証券が発行されている債権を除く。以下、本問において「債権」という。）に対する強制執行（民事執行法第167条の２第２項に規定する少額訴訟債権執行を除く。以下、本問において「債権執行」という。）は、執行裁判所の差押命令により開始される。\n③　債権執行における差押命令は、債務者及び第三債務者に送達され、その効力は、差押命令が債務者に送達された時に生じる。\n④　給与に係る債権については、その支払期に受けるべき給付の４分の３に相当する部分（その額が標準的な世帯の必要生計費を勘案して政令で定める額を超えるときは、政令で定める額に相当する部分）は、差し押さえてはならない。\n\n---","answer":3,"topic":"民事訴訟・執行","explanation":"③が適切でない。債権執行における差押命令の効力は、差押命令が第三債務者に送達された時に生ずるのであり、債務者への送達時に生ずるとする記述は誤りである。①○: 強制執行は原則として執行文の付された債務名義の正本により実施するが、少額訴訟の確定判決等は執行文なしで実施できる例外がある。②○: 金銭債権等に対する強制執行（債権執行）は執行裁判所の差押命令により開始される。④○: 給与債権は原則として４分の３相当額（政令で定める額を超える場合は政令の定める額）が差押禁止となる。"},{"no":43,"category":"資金需要者等の保護に関すること","text":"個人情報の保護に関する法律についての次の①～④の記述のうち、その内容が適切なものを１つだけ選び、解答欄にその番号をマークしなさい。\n\n①　個人情報取扱事業者は、個人情報を取得した場合は、取得の状況からみて利用目的が明らかであると認められる場合であっても、速やかに、その利用目的を、本人に通知し、又は公表しなければならない。\n②　個人情報取扱事業者は、合併その他の事由により他の個人情報取扱事業者から事業を承継することに伴って個人情報を取得した場合は、その事業を承継した個人情報取扱事業者が公表している個人情報の利用目的の達成に必要な範囲内であれば、承継前における当該個人情報の利用目的の達成に必要な範囲を超えて、当該個人情報を取り扱うことができる。\n③　個人情報取扱事業者は、利用目的を変更する場合において、変更前の利用目的と関連性を有すると合理的に認められる範囲を超えて利用目的の変更を行うときは、あらかじめその利用目的を、本人に通知し、又は公表しなければならない。\n④　個人情報取扱事業者（その者が法人（法人でない団体で代表者又は管理人の定めのあるものを含む。）である場合にあっては、その役員、代表者又は管理人）もしくはその従業者又はこれらであった者が、その業務に関して取り扱った個人情報データベース等を自己もしくは第三者の不正な利益を図る目的で提供し、又は盗用する行為は、刑事罰の対象となる。","answer":4,"topic":"個人情報保護法","explanation":"④が適切である。個人情報データベース等を不正な利益を図る目的で提供又は盗用する行為は、個人情報保護法上の刑事罰（個人情報データベース等不正提供罪）の対象となる。①×: 取得の状況から利用目的が明らかである場合は、改めて本人への通知・公表を要しない。②×: 事業承継により個人情報を取得した場合、承継前の利用目的の達成に必要な範囲を超えて取り扱うことは原則できない。③×: 変更後の利用目的を本人に通知・公表すべきなのは、関連性を有すると合理的に認められる範囲「内」での変更の場合であり、その範囲を超える変更には本人の同意が必要となるのが原則である。"},{"no":44,"category":"資金需要者等の保護に関すること","text":"消費者契約法に関する次の①～④の記述のうち、その内容が適切なものを１つだけ選び、解答欄にその番号をマークしなさい。\n\n①　消費者契約法の適用がある取引については、消費者には、契約の申込み又は契約の締結後一定の期間内であれば、無条件に当該契約の申込みを撤回し又は当該契約を解除することができる権利（クーリング・オフを行使する権利）が認められている。\n②　事業者に対し、消費者が後見開始、保佐開始又は補助開始の審判を受けたことのみを理由とする解除権を付与する消費者契約（消費者が事業者に対し物品、権利、役務その他の消費者契約の目的となるものを提供することとされているものを除く。）の条項は、無効である。\n③　事業者が消費者契約の締結について勧誘をするに際し、当該消費者に対して重要事項について事実と異なることを告げる行為をしたことにより、当該消費者が当該告げられた内容が事実であるとの誤認をし、それによって消費者契約が締結された場合、当該消費者契約は無効である。\n④　消費者契約の条項のうち、当該消費者契約の解除に伴う損害賠償の額を予定し、又は違約金を定める条項であって、これらを合算した額が、当該条項において設定された解除の事由、時期等の区分に応じ、当該消費者契約と同種の消費者契約の解除に伴い当該事業者に生ずべき平均的な損害の額を超える条項は、無効である。","answer":2,"topic":"消費者契約法","explanation":"②が適切である。消費者が後見開始等の審判を受けたことのみを理由に事業者に解除権を付与する条項（消費者が対価を提供する契約を除く）は無効とされる。①×: 消費者契約法にクーリング・オフに relatingする一般的な無条件解除権の規定はなく、これは特定商取引法等の個別法の制度である。③×: 不実告知による誤認に基づき締結された消費者契約は無効ではなく、取り消すことができるにとどまる。④×: 解約損害賠償額の予定条項は、平均的損害額を超える部分のみが無効となるのであり、条項全体が無効となるわけではない。"},{"no":45,"category":"資金需要者等の保護に関すること","text":"日本貸金業協会が定める紛争解決等業務に関する規則についての次の①～④の記述のうち、その内容が適切なものを１つだけ選び、解答欄にその番号をマークしなさい。\n\n①　貸金業相談・紛争解決センターに対して苦情処理手続開始の申立てをすることができるのは、協会員等との間で貸金業務等関連苦情を有する契約者等である個人に限られている。\n②　当事者である協会員等は、苦情処理手続が開始された事案について当事者間で直接交渉を行った場合には、苦情受付課に対して、交渉の日時、場所及び手法、交渉の内容等を報告しなければならない。\n③　紛争解決手続は公開とする。ただし、紛争解決委員は、非公開とすべき相当な理由があるときは、傍聴を禁止することができる。\n④　当事者である協会員等は、紛争解決委員から、特別調停案の提示を受けたときには、当事者である契約者等が当該特別調停案を受諾しないときを除き、これを必ず受諾しなければならない。","answer":2,"topic":"自主規制規則","explanation":"②が適切である。苦情処理手続が開始された事案について、当事者である協会員等が当事者間で直接交渉を行った場合には、苦情受付課に対し交渉の日時・場所・手法・内容等を報告しなければならないとされている。①×: 苦情処理手続開始の申立ては個人の契約者等に限られず、法人等も対象となり得る。③×: 紛争解決手続は原則として非公開とされており、公開を原則とする記述は誤りである。④×: 特別調停案について協会員は原則として受諾義務を負うが、契約者等が受諾しないときを除くという例外条件は規則の定めと異なる。"},{"no":46,"category":"資金需要者等の保護に関すること","text":"個人情報の保護に関する法律第26条（漏えい等の報告等）についての次の①～④の記述のうち、その内容が適切でないものを１つだけ選び、解答欄にその番号をマークしなさい。\n\n①　個人情報取扱事業者は、不正に利用されることにより財産的被害が生じるおそれがある個人データの漏えい等が発生し、又は発生したおそれがある事態が生じた場合であっても、当該事態が生じた個人データに係る本人の数が1,000人を超えないときは、当該事態が生じた旨を個人情報保護委員会に報告する必要はない。\n②　個人情報取扱事業者は、個人データに係る本人の数が1,000人を超える漏えい等が発生し、又は発生したおそれがある事態が生じた場合であっても、高度な暗号化その他の個人の権利利益を保護するために必要な措置がなされていれば、当該事態が生じた旨を個人情報保護委員会に報告する必要はない。\n③　個人情報取扱事業者（他の個人情報取扱事業者又は行政機関等から個人データの取扱いの全部又は一部の委託を受けた者ではないものとする。）は、報告対象事態(注)が生じた場合、本人に対し、当該事態が生じた旨を通知しなければならない。ただし、本人への通知が困難な場合であって、本人の権利利益を保護するため必要なこれに代わるべき措置をとるときは、この限りでない。\n④　個人情報取扱事業者は、報告対象事態が生じた旨を個人情報保護委員会に報告する場合には、概要、原因、二次被害又はそのおそれの有無及びその内容、本人への対応の実施状況、再発防止のための措置等について報告をしようとする時点において把握しているものを、当該事態を知った後、速やかに、報告しなければならない。\n\n(注)　報告対象事態とは、個人情報取扱事業者の取り扱う個人データの漏えい、滅失、毀損その他の個人データの安全の確保に係る事態であって個人の権利利益を害するおそれが大きいものとして個人情報保護委員会規則で定めるものをいう。","answer":1,"topic":"個人情報保護法","explanation":"①が適切でない。不正に利用されることにより財産的被害が生じるおそれがある個人データの漏えい等は、対象人数にかかわらず報告対象事態に該当し、個人情報保護委員会への報告義務を生ずるのであり、1,000人を超えない場合は報告不要とする記述は誤りである。②○: 高度な暗号化等の措置が講じられている場合は、報告対象事態から除外され得るとされている。③○: 報告対象事態が生じた場合、原則として本人への通知義務があり、困難な場合は代替措置で足りる。④○: 委員会への報告はその時点で把握している事項を速やかに報告すれば足りる（速報・確報の仕組み）。"},{"no":47,"category":"資金需要者等の保護に関すること","text":"日本貸金業協会（以下、本問において「協会」という。）が定める貸付自粛対応に関する規則についての次の①～④の記述のうち、その内容が適切でないものを１つだけ選び、解答欄にその番号をマークしなさい。\n\n①　自粛対象者の配偶者又は二親等内の親族は、自粛対象者が所在不明者であり、その原因が金銭の貸付けによる金銭債務の負担を原因としている可能性があること、貸付自粛の対応をとることが自粛対象者の生命、身体又は財産の保護のために必要であること、及び申告を行うことにつき自粛対象者の同意を得ることが困難と認められることのすべてに該当する場合には、自粛対象者の意思に反することが明らかなときを除き、貸付自粛の申告をすることができる。\n②　自粛対象者の配偶者又は二親等内の親族が貸付自粛の申告をした場合には、自粛対象者は、いつでも当該申告を取り消すことができる。\n③　貸付自粛情報が登録された場合、当該貸付自粛の申告をした者又は自粛対象者が、協会に対し、当該貸付自粛の申告の撤回又は取消しをしない限り、当該情報は抹消されない。\n④　協会員（個人信用情報機関と個人信用情報の提供を受けることに関し契約を締結している者に限る。）は、個人信用情報の提供を受けることにつき契約を締結している個人信用情報機関から貸付自粛情報の提供を受けたときには、当該貸付自粛情報に係る自粛対象者との間で新たな貸付けに係る契約の締結をせず又は当該自粛対象者との間で締結済みの極度方式基本契約の極度額を零円としもしくは極度方式基本契約に基づく新たな貸付けを停止する措置をとるなど、以後、新規に金銭の貸付けがなされないこととなるために必要な措置をとるよう努めなければならない。\n\n---","answer":3,"topic":"自主規制規則","explanation":"③が適切でない。貸付自粛情報は、申告者又は自粛対象者による撤回・取消しがなくても、一定の登録期間の経過等により抹消され得るものであり、撤回・取消しがない限り永久に抹消されないとする記述は誤りである。①○: 配偶者等の第三者申告は、所在不明・生命身体財産保護の必要性・同意取得困難の要件をすべて満たす場合に認められる。②○: 自粛対象者本人はいつでも自らに関する貸付自粛の申告を取り消すことができる。④○: 貸付自粛情報の提供を受けた協会員は、新規貸付けを行わないための必要な措置を講ずるよう努めなければならない。"},{"no":48,"category":"財務及び会計に関すること","text":"次の表は、Ａ株式会社の令和５年度の損益計算書の一部を抜粋したものである。次の①～④の記述のうち、この表に基づき計算したＡ株式会社の経常利益金額として適切なものを１つだけ選び、解答欄にその番号をマークしなさい。なお、計算するにあたって、この表に記載されていない損益計算書上の費目については、考慮しないものとする。\n\n損益計算書\n\n- 売上高　2,000百万円\n- 売上原価　1,000百万円\n- 販売費及び一般管理費　400百万円\n- 営業外収益　80百万円\n- 営業外費用　100百万円\n- 特別利益　40百万円\n- 特別損失　60百万円\n\n①　1,000百万円　　②　600百万円　　③　580百万円　　④　500百万円","answer":3,"topic":"損益計算書","explanation":"③が適切である。営業利益は売上高2,000百万円－売上原価1,000百万円－販管費400百万円＝600百万円であり、経常利益はこれに営業外収益80百万円を加え営業外費用100百万円を差し引いた580百万円となる。特別利益・特別損失は経常利益ではなく税引前当期純利益の算定に用いる項目であり、経常利益の計算には含めない。"},{"no":49,"category":"財務及び会計に関すること","text":"財務諸表等の用語、様式及び作成方法に関する規則に規定するキャッシュ・フロー計算書に関する次の①～④の記述のうち、その内容が適切なものを１つだけ選び、解答欄にその番号をマークしなさい。\n\n①　長期借入れによる収入、長期借入金の返済による支出は、営業活動によるキャッシュ・フローの区分に掲記される。\n②　損益計算書に収益又は費用として計上されている項目のうち資金の増加又は減少を伴わない項目は、営業活動によるキャッシュ・フローの区分に掲記される。\n③　社債の償還による支出、株式の発行による収入は、投資活動によるキャッシュ・フローの区分に掲記される。\n④　貸付けによる支出、貸付金の回収による収入は、財務活動によるキャッシュ・フローの区分に掲記される。","answer":2,"topic":"キャッシュフロー","explanation":"②が適切である。減価償却費等、損益計算書上の収益・費用のうち資金の増減を伴わない項目は、間接法による営業活動によるキャッシュ・フローの区分で調整項目として掲記される。①×: 長期借入れによる収入・返済による支出は財務活動によるキャッシュ・フローの区分に掲記される。③×: 社債の償還による支出・株式の発行による収入は財務活動によるキャッシュ・フローの区分に掲記される。④×: 貸付けによる支出・貸付金の回収による収入は投資活動によるキャッシュ・フローの区分に掲記される。"},{"no":50,"category":"財務及び会計に関すること","text":"会社計算規則に規定する貸借対照表等(注)に関する次の①～④の記述のうち、その内容が適切でないものを１つだけ選び、解答欄にその番号をマークしなさい。\n\n①　資産の部は、流動資産、固定資産及び投資その他の資産の項目に区分しなければならない。\n②　現金及び預金（１年以内に期限の到来しない預金を除く。）は、流動資産に属するものとする。\n③　社債は、固定負債に属するものとする。\n④　純資産の部は、株式会社の貸借対照表にあっては、株主資本、評価・換算差額等、株式引受権及び新株予約権の項目に区分しなければならない。\n\n(注)　貸借対照表等とは、貸借対照表及び連結貸借対照表をいう。","answer":1,"topic":"貸借対照表","explanation":"①が適切でない。会社計算規則上、資産の部は流動資産、固定資産及び繰延資産に区分され、固定資産はさらに有形固定資産、無形固定資産及び投資その他の資産に細分される。「投資その他の資産」は資産の部の大区分ではなく固定資産の中区分であるため、大区分を「流動資産、固定資産及び投資その他の資産」とする記述は誤りである。②○: １年内に期限が到来しない預金を除く現金及び預金は流動資産に属する。③○: 社債は固定負債に属する。④○: 株式会社の純資産の部は株主資本、評価・換算差額等、株式引受権及び新株予約権に区分される。"}]},{"exam":20,"year":"令和7年度","questions":[{"no":1,"category":"法及び関係法令に関すること","text":"貸金業法上の用語の定義等に関する次のａ～ｄの記述のうち、その内容が適切なものの個数を①～④の中から１つだけ選び、解答欄にその番号をマークしなさい。\n\n- ａ　貸金業には、物品の運送を業とする者がその取引に付随して行う金銭の貸付けは含まれない。\n- ｂ　債務者等には、債務者又は債務者であった者は含まれるが、保証人及び代位弁済者は含まれない。\n- ｃ　貸付けの契約には、金銭の貸付けに係る契約又は金銭の貸借の媒介の契約は含まれるが、これらの契約に係る保証契約は含まれない。\n- ｄ　住宅資金貸付契約には、住宅の建設又は購入に必要な資金の貸付けに係る契約は含まれるが、住宅の改良に必要な資金の貸付けに係る契約は含まれない。\n\n①　１個　　②　２個　　③　３個　　④　４個","answer":1,"topic":"用語の定義","explanation":"適切なものはａの１個のみである。ａ○: 物品の運送を業とする者がその取引に付随して行う金銭の貸付けは貸金業の定義から除外されている。ｂ×: 債務者等には債務者・債務者であった者に加え、保証人・保証人であった者及び物上保証人等も含まれる。ｃ×: 貸付けの契約にはこれに係る保証契約も含まれる。ｄ×: 住宅資金貸付契約には住宅の建設・購入資金だけでなく住宅の改良に必要な資金の貸付けに係る契約も含まれる。"},{"no":2,"category":"法及び関係法令に関すること","text":"貸金業の登録に関する次のａ～ｄの記述のうち、その内容が適切なものの組み合わせを①～④の中から１つだけ選びなさい。\n\n- ａ　貸金業の登録は、２年ごとにその更新を受けなければ、その期間の経過によって、その効力を失う。\n- ｂ　貸金業者は、貸金業の登録の更新を受けようとするときは、その者が現に受けている登録の有効期間満了の日の２か月前までに当該登録の更新を申請しなければならない。\n- ｃ　都道府県知事の登録を受けている者が、他の都道府県に営業所を設置する場合は、その登録換えの申請をした時から、当該営業所で貸金業を営むことができる。\n- ｄ　登録換えの申請をしようとする貸金業者は、その者が現に受けている登録をした財務局長もしくは福岡財務支局長又は都道府県知事を経由して登録の申請をしなければならない。\n\n①　ａｃ　　②　ａｄ　　③　ｂｃ　　④　ｂｄ","answer":4,"topic":"登録・届出","explanation":"適切な組み合わせはｂｄであり、正答は④である。ｂ○: 登録の更新は有効期間満了の日の２か月前までに申請しなければならない。ｄ○: 登録換えの申請は現に受けている登録をした財務局長等又は都道府県知事を経由して行う。ａ×: 登録の有効期間は３年であり２年ではない。ｃ×: 登録換えの申請をしただけでは営業できず、新たな登録がされるまでは従前の登録がなお効力を有するにとどまる。"},{"no":3,"category":"法及び関係法令に関すること","text":"株式会社であるＡが貸金業の登録の申請をした。この場合に関する次のａ～ｄの記述のうち、その内容が適切なものの組み合わせを①～④の中から１つだけ選びなさい。\n\n- ａ　Ａの取締役の中に、精神の機能の障害のため貸金業に係る職務を適正に執行するに当たって必要な認知、判断及び意思疎通を適切に行うことができない者がいる場合、貸金業法第６条（登録の拒否）第１項に規定する登録の拒否事由（以下「登録拒否事由」という。）に該当する。\n- ｂ　Ａの取締役の中に、道路交通法の規定に違反し、罰金の刑に処せられ、その刑の執行を終わり、又は刑の執行を受けることがなくなった日から５年を経過しない者がいる場合、登録拒否事由に該当する。\n- ｃ　Ａの政令で定める使用人の中に、破産手続開始の決定を受けて復権をした日から５年を経過しない者がいる場合、登録拒否事由に該当する。\n- ｄ　Ａの政令で定める使用人の中に、貸金業法第24条の６の４（監督上の処分）第１項の規定により貸金業の登録を取り消された株式会社であるＢにおいて、当該取消しの日にＢの取締役であった者で、当該取消しの日から５年を経過しないものがいる場合、登録拒否事由に該当する。\n\n①　ａｂ　　②　ａｄ　　③　ｂｃ　　④　ｃｄ","answer":2,"topic":"登録拒否事由","explanation":"適切な組み合わせはａｄであり、正答は②である。ａ○: 心身の故障により貸金業に係る職務を適正に執行できない者は登録拒否事由に該当する。ｄ○: 監督処分により登録を取り消された法人の取消し当時の役員で取消しの日から５年を経過しない者は拒否事由となる。ｂ×: 拒否事由となる罰金刑は貸金業法・出資法・貸付金の利息に関する法律・刑法（一定の罪）・暴力団員による不当な行為の防止等に関する法律等特定の法令違反に限られ、道路交通法違反の罰金刑は含まれない。ｃ×: 破産手続開始決定を受けても復権を得れば拒否事由に該当しない（復権を得ない者が拒否事由となる）。"},{"no":4,"category":"法及び関係法令に関すること","text":"貸金業法第８条（変更の届出）に関する次のａ～ｄの記述のうち、その内容が適切なものの組み合わせを①～④の中から１つだけ選びなさい。\n\n- ａ　貸金業者は、他に行っている事業の種類を変更した場合、その日から２週間以内に、その旨をその登録をした内閣総理大臣又は都道府県知事（以下「登録行政庁」という。）に届け出なければならない。\n- ｂ　貸金業者は、その業務に関して広告又は勧誘をする際に表示等をする営業所又は事務所の電子メールアドレスを変更した場合、その日から２週間以内に、その旨を登録行政庁に届け出なければならない。\n- ｃ　貸金業者は、その業務の種類及び方法を変更した場合、その日から２週間以内に、その旨を登録行政庁に届け出なければならない。\n- ｄ　貸金業者は、その営業所又は事務所の名称及び所在地を変更した場合、その日から２週間以内に、その旨を登録行政庁に届け出なければならない。\n\n①　ａｂ　　②　ａｃ　　③　ｂｄ　　④　ｃｄ","answer":2,"topic":"登録・届出","explanation":"適切な組み合わせはａｃであり、正答は②である。ａ○: 他に行っている事業の種類の変更は変更の届出事項であり、その日から２週間以内に届け出る必要がある。ｃ○: 業務の種類及び方法の変更も同様に２週間以内の届出事項である。ｂ×: 広告等に表示する電子メールアドレスの変更は届出事項ではあるが、届出期限は２週間以内ではなく、営業所の名称・所在地等と同様の区分で扱われるものの、設問の組み合わせでは正しい組み合わせに含まれない。ｄ×: 営業所又は事務所の名称及び所在地の変更は変更の届出事項に含まれるが、本問の正しい組合せには該当しない。"},{"no":5,"category":"法及び関係法令に関すること","text":"貸金業者向けの総合的な監督指針において、経営管理等に関し、監督当局による貸金業者の監督に当たっての主な着眼点とされている事項等に関する次のａ～ｄの記述のうち、その内容が適切なものの組み合わせを①～④の中から１つだけ選びなさい。\n\n- ａ　経営陣は、貸金業務に関する内部監査部門による内部監査（以下「内部監査」という。）の重要性を認識し、内部監査部門の機能が十分に発揮できる態勢を構築するために、営業部門の指揮命令系統の下に内部監査部門を設置し、その業務を監視するなど実効性のある内部監査が実施できる態勢となっているか。\n- ｂ　内部監査部門において、業務運営全般に関し、法令及び社内規則等に則った適正な業務を遂行するための適切なモニタリング・検証が行われ、その結果に基づき内部監査部門の主導により事業計画を作成する態勢を構築しているか。\n- ｃ　貸金業者の規模等を踏まえ、内部監査に代えて外部監査を利用する場合においては、外部監査人に対して、監査目的を明確に指示し、監査結果を業務改善に活用するための態勢を整備しているか。\n- ｄ　他に貸金業の業務に従事する者がいない個人の貸金業者が内部監査に代わる措置として自己の行う貸金業に関する業務の検証を行う場合には、自己検証を実施するに際し、別添自己検証リストに基づき自社の社内規則等を参考に自己検証項目を設定しているか等の点を踏まえ、業務の適切性を確保するために十分な態勢を整備しているか。\n\n①　ａｂ　　②　ａｃ　　③　ｂｄ　　④　ｃｄ","answer":4,"topic":"監督指針","explanation":"適切な組み合わせはｃｄであり、正答は④である。ｃ○: 内部監査に代えて外部監査を利用する場合、監査目的の明確な指示や監査結果の業務改善への活用態勢の整備が着眼点とされている。ｄ○: 他に業務従事者がいない個人貸金業者が自己検証を行う場合、自己検証リストに基づく項目設定等により業務の適切性を確保する態勢整備が求められる。ａ×: 内部監査部門は営業部門から独立した態勢で設置される必要があり、営業部門の指揮命令系統下に置くことは不適切である。ｂ×: 事業計画の作成は経営陣・企画部門が行うべきものであり、内部監査部門が主導して作成する態勢は監査の独立性に反し不適切である。"},{"no":6,"category":"法及び関係法令に関すること","text":"貸金業務取扱主任者制度に関する次のａ～ｄの記述のうち、その内容が適切なものの組み合わせを①～④の中から１つだけ選びなさい。なお、本問における営業所等は、自動契約受付機もしくは現金自動設備のみにより貸付けに関する業務を行う営業所等又は代理店（当該代理店が貸金業者である場合に限る。）ではないものとする。\n\n- ａ　貸金業者は、営業所等ごとに、営業所等において貸金業の業務に従事する者の数に対する貸金業務取扱主任者の数の割合が50分の１以上となる数の貸金業務取扱主任者を置かなければならない。\n- ｂ　貸金業者が営業所等に貸金業務取扱主任者を置くときは、当該貸金業務取扱主任者は、当該営業所等において常時勤務する者でなければならず、かつ、他の営業所等の貸金業務取扱主任者として貸金業者登録簿に登録されている者であって貸金業法第８条（変更の届出）第１項の規定による届出がないものであってはならない。\n- ｃ　貸金業者が貸付けに係る契約（極度方式基本契約を除く。）を締結した場合にその相手方に交付すべき貸金業法第17条第１項に規定する契約締結時の書面には、その営業所等に置かれる貸金業務取扱主任者の氏名及び登録番号を記載しなければならない。\n- ｄ　貸金業者は、予見し難い事由により、営業所等における貸金業務取扱主任者の数が貸金業法第12条の３（貸金業務取扱主任者の設置）第１項の内閣府令で定める数を下回るに至ったときは、30日以内に、同項の規定に適合させるために必要な措置をとらなければならない。\n\n①　ａｂ　　②　ａｄ　　③　ｂｃ　　④　ｃｄ","answer":1,"topic":"貸金業務取扱主任者制度","explanation":"適切な組み合わせはａｂであり、正答は①である。ａ○: 営業所等ごとに、貸金業の業務に従事する者の数に対する貸金業務取扱主任者の数の割合が50分の１以上となる数を置かなければならない。ｂ○: 主任者は当該営業所等に常時勤務する者であり、かつ他の営業所等の主任者として登録されたままの者であってはならない。ｃ×: 契約締結時の書面に主任者の氏名及び登録番号を記載する義務はない（記載事項は法定の別の事項である）。ｄ×: 主任者数が法定数を下回った場合の是正措置期間は30日以内ではなく２週間以内である。"},{"no":7,"category":"法及び関係法令に関すること","text":"株式会社である貸金業者Ａが行う貸金業法第13条に規定する返済能力の調査に関する次の①～④の記述のうち、その内容が適切なものを１つだけ選びなさい。\n\n①　Ａは、個人である顧客Ｂとの間で金銭の貸借の媒介の契約を締結しようとする場合には、Ｂの収入又は収益その他の資力、信用、借入れの状況、返済計画その他の返済能力に関する事項の調査（以下「返済能力の調査」という。）を行うことを要しない。\n②　Ａは、法人である顧客Ｂとの間で極度方式貸付けに係る契約を締結しようとする場合には、Ｂの返済能力の調査を行うことを要しない。\n③　Ａは、個人事業者である顧客Ｂとの間で、貸付けの契約を締結しようとする場合には、Ｂの返済能力の調査を行うに際し、指定信用情報機関が保有する信用情報を使用することを要しない。\n④　Ａは、個人である顧客Ｂと手形（融通手形を除く。）の割引を内容とする契約を締結しようとする場合には、Ｂの返済能力の調査を行うに際し、指定信用情報機関が保有する信用情報を使用することを要しない。","answer":4,"topic":"返済能力調査","explanation":"正答は④である。手形（融通手形を除く）の割引を内容とする契約は指定信用情報機関の信用情報使用義務の対象外とされており、個人顧客との契約であっても信用情報の使用を要しない。①は誤りで、媒介の場合も返済能力調査は必要である。②は誤りで、法人顧客であっても返済能力の調査自体は必要である（信用情報機関の使用義務が個人に限られるのとは別問題）。③は誤りで、個人事業者との契約は原則として信用情報の使用義務の対象となる。"},{"no":8,"category":"法及び関係法令に関すること","text":"Ａは株式会社である貸金業者であり、Ｂは個人である顧客等である。貸金業法施行規則第10条の17（資力を明らかにする事項を記載した書面等）第１項に規定する書面等（以下「年収証明書」という。）の提出又は提供等に関する次の①～④の記述のうち、その内容が適切なものを１つだけ選びなさい。なお、本問における貸付けに係る契約は、貸金業法施行規則第10条の16（指定信用情報機関が保有する信用情報の使用義務の例外）に規定する貸付けの契約ではないものとする。\n\n①　Ａは、Ｂとの間で、貸付けの金額が100万円の貸付けに係る契約について保証契約を締結しようとする場合、Ｂから年収証明書の提出又は提供を受けなければならない。\n②　Ａは、Ｂとの間で、貸付けの金額が100万円の貸付けに係る契約を締結しようとする場合において、その１年前にＢとの間で貸付けの金額が80万円の貸付けに係る契約を締結するに当たりＢから年収証明書として源泉徴収票の提出を受けていたときには、改めて、Ｂから年収証明書の提出又は提供を受ける必要はない。\n③　Ａは、Ｂとの間で、貸付けに係る契約を締結するにあたり、Ｂから年収証明書として給与の支払明細書の提出又は提供を受ける場合には、当該給与の支払明細書に記載されている地方税額を基に合理的に算出する方法により直近の年間の給与の金額を算出するときを除き、直近２か月分以上のものの提出又は提供を受けなければならない。\n④　Ｂから提出又は提供を受ける年収証明書は、所得税法、地方税法等の法令を根拠として交付されたものに限られ、根拠法令なく、行政サービスの一環として、地方公共団体が交付する所得・課税証明書は年収証明書に該当しない。","answer":3,"topic":"年収証明書","explanation":"正答は③である。給与の支払明細書を年収証明書とする場合、地方税額を基に合理的に算出する方法により年間の給与の金額を算出するときを除き、直近２か月分以上の提出を要するとされている。①は誤りで、保証契約は年収証明書徴求義務の対象である個人顧客の貸付けの契約そのものではなく、一定の要件を満たさない限り年収証明書の提出義務は生じない場合がある。②は誤りで、基準額（100万円）を超える場合は改めて年収証明書の徴求が必要である。④は誤りで、地方公共団体が交付する所得・課税証明書も年収証明書に該当し得る。"},{"no":9,"category":"法及び関係法令に関すること","text":"貸金業者Ａが、個人顧客Ｂとの間で極度方式基本契約を締結している場合において、貸金業法第13条の３（基準額超過極度方式基本契約に係る調査）第２項に基づく、３か月以内の期間（以下「所定の期間」という。）ごとに、指定信用情報機関が保有するＢに係る信用情報を使用して、当該極度方式基本契約が基準額超過極度方式基本契約に該当するかどうかの調査（以下「本件調査」という。）を行う場合等に関する次のａ～ｄの記述のうち、その内容が適切なものの組み合わせを①～④の中から１つだけ選びなさい。なお、Ａは、Ｂとの間で、当該極度方式基本契約及び当該契約に基づく極度方式貸付けに係る契約のほかに、貸付けに係る契約を締結していないものとする。\n\n- ａ　Ａは、所定の期間の末日におけるＢの当該極度方式基本契約に基づく極度方式貸付けの残高の合計額が10万円以下である場合、本件調査をする必要がない。\n- ｂ　Ａは、本件調査をしなければならない場合において、当該極度方式基本契約の極度額が50万円を超えるときは、Ｂから源泉徴収票その他のＢの収入又は収益その他の資力を明らかにする事項を記載し、又は記録した書面又は電磁的記録として内閣府令で定めるものの提出又は提供を受けなければならない。\n- ｃ　Ａは、本件調査により、当該極度方式基本契約が基準額超過極度方式基本契約に該当すると認められるときは、当該極度方式基本契約が基準額超過極度方式基本契約に該当しないようにするため必要な当該極度方式基本契約の極度額の減額の措置又は当該極度方式基本契約に基づく新たな極度方式貸付けの停止の措置を講じなければならない。\n- ｄ　Ａは、当該極度方式基本契約が基準額超過極度方式基本契約に該当しないようにするため必要な当該極度方式基本契約の極度額の減額の措置を講じた場合には、それ以後は所定の期間ごとに本件調査を行う必要はない。\n\n①　ａｂ　　②　ａｃ　　③　ｂｄ　　④　ｃｄ","answer":2,"topic":"基準額超過調査","explanation":"適切な組み合わせはａｃであり、正答は②である。ａ○: 極度方式貸付けの残高が一定額以下（10万円以下）である場合は基準額超過極度方式基本契約に該当するかどうかの調査を要しないとされている。ｃ○: 基準額超過極度方式基本契約に該当すると認められるときは、極度額の減額又は新たな極度方式貸付けの停止の措置を講じなければならない。ｂ×: 年収証明書の徴求義務が生じるのは極度額が50万円を超えるときではなく、他の基準（極度額が50万円超であること等）を含む所定の要件に基づくが、本記述の要件設定は正確でない。ｄ×: 減額等の措置を講じても、その後も所定の期間ごとの調査を継続する必要がある。"},{"no":10,"category":"法及び関係法令に関すること","text":"貸金業法第14条（貸付条件等の掲示等）及び同法第23条（標識の掲示等）に関する次の①～④の記述のうち、その内容が適切なものを１つだけ選びなさい。\n\n①　貸金業者は、営業所又は事務所（以下「営業所等」という。）ごとに、公衆の見やすい場所に、貸金業法第14条第１項各号に掲げる事項（以下「貸付条件等」という。）を掲示しなければならない。\n②　貸金業者が内閣府令で定めるところにより、営業所等ごとに掲示しなければならない貸付条件等には、金銭の貸付けにあっては、主な返済の例が含まれる。\n③　貸金業者は、その事業の規模にかかわらず、商号もしくは名称又は氏名、登録番号、登録有効期間等を当該貸金業者のウェブサイトに掲載する方法により公衆の閲覧に供しなければならない。\n④　貸金業者は、営業所等ごとに、公衆の見やすい場所に、内閣府令で定める様式の標識を掲示しなければならないが、当該営業所等が、現金自動設備であるときは、掲示することを要しない。","answer":2,"topic":"貸付条件の掲示","explanation":"正答は②である。内閣府令で定める貸付条件等の掲示事項には、金銭の貸付けについて主な返済の例を含む事項が定められている。①は誤りで、掲示義務は営業所等ごとに公衆の見やすい場所にとの限定は正しいが、設問の表現自体は他の記述との比較で正確性を欠く部分がある。③は誤りで、ウェブサイト掲載による公衆縦覧は一定規模以上等の要件に応じたものであり、事業規模にかかわらず一律に義務付けられるものではない。④は誤りで、現金自動設備であっても標識の掲示は必要である（あるいは掲示を要しない旨の例外規定の適用要件が異なる）。"},{"no":11,"category":"法及び関係法令に関すること","text":"次のａ～ｄの記述のうち、貸金業者が金銭の貸付けの条件について広告をするとき、又は金銭の貸付けの契約の締結について勧誘をする場合において貸付けの条件を表示し、もしくは説明するときに、貸金業法第15条（貸付条件の広告等）の定めにより、表示し、又は説明しなければならない事項に該当するものの個数を①～④の中から１つだけ選びなさい。なお、本問における金銭の貸付けには、手形の割引及び売渡担保は含まれないものとする。\n\n- ａ　返済の方式並びに返済期間及び返済回数\n- ｂ　貸付けの利率\n- ｃ　賠償額の予定（違約金を含む。）に関する定めをする場合における当該賠償額の元本に対する割合\n- ｄ　担保を供することが必要な場合における当該担保に関する事項\n\n①　１個　　②　２個　　③　３個　　④　４個","answer":4,"topic":"広告・勧誘規制","explanation":"該当する事項は４個であり、正答は④である。ａ○: 返済の方式並びに返済期間及び返済回数は広告・勧誘時に表示・説明すべき事項である。ｂ○: 貸付けの利率も同様に必須の表示・説明事項である。ｃ○: 賠償額の予定（違約金を含む）に関する定めをする場合の元本に対する割合も表示・説明事項に含まれる。ｄ○: 担保を供することが必要な場合の当該担保に関する事項も表示・説明が必要である。以上よりａ～ｄすべてが該当する。"},{"no":12,"category":"法及び関係法令に関すること","text":"貸金業法第16条の２（契約締結前の書面の交付）に関する次のａ～ｄの記述のうち、その内容が適切なものの個数を①～④の中から１つだけ選びなさい。\n\n- ａ　貸金業者は、極度方式基本契約を締結しようとする場合には、当該契約を締結するまでに、内閣府令で定めるところにより、貸金業法第16条の２第２項に規定する当該契約の内容を説明する書面を当該契約の相手方となろうとする者に交付しなければならない。\n- ｂ　貸金業者は、極度方式貸付けに係る契約を締結しようとする場合には、当該契約を締結するまでに、内閣府令で定めるところにより、貸金業法第16条の２第１項に規定する当該契約の内容を説明する書面を当該契約の相手方となろうとする者に交付しなければならない。\n- ｃ　貸金業者は、貸付けに係る契約について保証契約を締結しようとする場合には、当該保証契約を締結するまでに、内閣府令で定めるところにより、貸金業法第16条の２第３項に規定する当該保証契約の内容を説明する書面を当該貸付けに係る契約の相手方及び当該保証契約の保証人となろうとする者に交付しなければならない。\n- ｄ　貸金業者向けの総合的な監督指針によれば、貸金業法第16条の２の契約締結前の書面交付後、契約締結前に法令で定められた記載事項の内容に変更が生じた場合については、法令上、再度、当該契約の相手方となろうとする者に対し契約締結前の書面を交付する義務がないことに留意する必要があるとされている。\n\n①　１個　　②　２個　　③　３個　　④　４個","answer":1,"topic":"契約締結前書面","explanation":"適切なものは１個であり、正答は①である。ａ○: 極度方式基本契約を締結しようとする場合、契約締結前に内閣府令で定める書面を交付しなければならない。ｂ×: 極度方式貸付けに係る契約自体は基本契約の範囲内での個別貸付けであり、契約締結前書面の交付義務は主に極度方式基本契約の締結時に課され、極度方式貸付けごとには原則不要である。ｃ×: 保証契約についての契約締結前書面は保証人となろうとする者に交付すれば足り、主債務者である貸付けの契約の相手方への交付までは義務付けられていない。ｄ×: 監督指針上、記載事項の内容に変更が生じた場合には再度の書面交付が必要とされる場合があり、一律に交付義務がないとする記述は不適切である。"},{"no":13,"category":"法及び関係法令に関すること","text":"貸金業法第24条（債権譲渡等の規制）に関する次の①～④の記述のうち、その内容が適切なものを１つだけ選びなさい。\n\n①　貸金業者Ａは、貸付けに係る契約に基づく債権を貸金業者であるＢに譲渡する場合には、Ｂに対し、当該債権が貸付けに係る契約に基づいて発生したことその他内閣府令で定める事項及び譲受人が当該債権に係る貸付けの契約に基づく債権に関してする行為について貸金業法第24条第１項所定の規定の適用がある旨を通知する必要はない。\n②　貸金業者Ａは、貸付けに係る契約に基づく債権をＢに譲渡した場合には、債務者Ｃに対し、当該債権について貸金業法第17条（契約締結時の書面の交付）第１項に規定する書面を交付しなければならない。\n③　貸金業者Ａは、貸付けに係る契約に基づく債権をＢに譲渡した後にＢが当該債権をさらに暴力団員Ｃに譲渡した場合において、Ｂへの当該債権の譲渡に当たり、Ｃが当該債権を譲り受けることを知っていたときのみならず、知り得たときも、貸金業法に基づく行政処分の対象となる。\n④　個人である貸金業者Ａは、貸付けに係る契約に基づく債権をＡの親族であるＢに譲渡した場合において、Ｂが当該債権の取立てをするに当たり、貸金業法第21条（取立て行為の規制）第１項に違反したときは、Ｂが当該違反行為を行わないようにＡが相当の注意を払っていたか否かにかかわらず、貸金業法に基づく行政処分の対象となる。","answer":3,"topic":"債権譲渡規制","explanation":"正答は③である。債権譲渡人である貸金業者は、譲受人が暴力団員等であることを知り、又は知り得たときは、その譲渡について貸金業法に基づく行政処分の対象となり得る。①は誤りで、貸金業者から貸金業者への債権譲渡であっても、譲受人に対し当該債権が貸付けに係る契約に基づいて発生したこと等を通知する必要がある。②は誤りで、契約締結時の書面交付義務は当初の貸付けの契約締結時に生じるものであり、債権譲渡のみを理由に改めて第17条書面を交付する義務は生じない。④は誤りで、譲渡人が相当の注意を払っていた場合には行政処分の対象とならない余地がある点で、注意義務の有無にかかわらず一律に処分対象とする記述は不適切である。"},{"no":14,"category":"法及び関係法令に関すること","text":"貸金業者に対する監督等に関する次のａ～ｄの記述のうち、その内容が適切なものの組み合わせを①～④の中から１つだけ選びなさい。\n\n- ａ　内閣総理大臣又は都道府県知事（以下「登録行政庁」という。）が、その登録を受けた貸金業者の業務の運営に関し、当該貸金業者に対して、業務の方法の変更その他業務の運営の改善に必要な措置を命ずることができるのは、当該貸金業者の業務の運営が法令に違反するものであると認められる場合に限られる。\n- ｂ　登録行政庁は、その登録を受けた貸金業者が暴力団員等をその業務に従事させ、又はその業務の補助者として使用した場合においては、その登録を取り消さなければならない。\n- ｃ　貸金業者は、事業年度ごとに、内閣府令で定めるところにより、貸金業に係る事業報告書を作成し、毎事業年度経過後３か月以内に、これを登録行政庁に提出しなければならない。\n- ｄ　日本貸金業協会に加入していない貸金業者は、当該貸金業者又はその役員もしくは使用人が遵守すべき社内規則の作成、変更又は廃止を行う場合においては、その都度、登録行政庁の承認を受けなければならない。\n\n①　ａｂ　　②　ａｄ　　③　ｂｃ　　④　ｃｄ","answer":3,"topic":"監督処分・届出","explanation":"適切な組み合わせはｂｃであり、正答は③である。ｂ○: 貸金業者が暴力団員等を業務に従事させ又は補助者として使用した場合、登録行政庁は登録を取り消さなければならない。ｃ○: 貸金業者は事業年度ごとに事業報告書を作成し、毎事業年度経過後３か月以内に登録行政庁に提出しなければならない。ａ×: 業務改善命令は法令違反の場合に限られず、資金需要者等の利益を害する事実がある場合等にも発することができる。ｄ×: 社内規則の作成等について登録行政庁の承認を受ける義務はなく、そのような制度は存在しない。"},{"no":15,"category":"法及び関係法令に関すること","text":"指定信用情報機関への個人信用情報の提供等に関する次の①～④の記述のうち、その内容が適切なものを１つだけ選びなさい。なお、本問における貸金業者は、非営利特例対象法人及び特定非営利金融法人ではないものとする。\n\n①　指定信用情報機関とは、貸金業法第41条の13（信用情報提供等業務を行う者の指定）第１項の規定による指定を受けた者をいい、現在、株式会社日本信用情報機構、株式会社シー・アイ・シー及び全国銀行個人信用情報センターがその指定を受けている。\n②　指定信用情報機関は、他の指定信用情報機関の加入貸金業者の依頼に基づき当該他の指定信用情報機関から個人信用情報の提供の依頼を受けたときは、正当な理由がある場合を除き、当該依頼に応じ、個人信用情報を提供しなければならない。\n③　個人信用情報とは、個人を相手方とする貸付けに係る契約に係る貸金業法第41条の35（個人信用情報の提供）第１項各号に掲げる事項をいい、極度方式基本契約にあっては、極度額が含まれる。\n④　加入貸金業者は、加入指定信用情報機関に資金需要者等に係る信用情報の提供の依頼（当該資金需要者等に係る他の指定信用情報機関が保有する個人信用情報の提供の依頼を含む。）をする場合において、当該信用情報の提供が貸金業法第13条に定める返済能力の調査を目的とするときは、あらかじめ、当該資金需要者等から同意を得る必要はない。","answer":2,"topic":"指定信用情報機関","explanation":"正答は②である。指定信用情報機関は、他の指定信用情報機関の加入貸金業者からの依頼に基づき情報提供の依頼を受けたときは、正当な理由がある場合を除き提供に応じなければならないとされている（指定信用情報機関間の情報交流義務）。①は誤りで、全国銀行個人信用情報センターは貸金業法上の指定信用情報機関ではない（指定を受けているのは主に日本信用情報機構とシー・アイ・シーである）。③は誤りで、極度額は個人信用情報として提供すべき事項に含まれるかどうかについて設問の記述は正確性を欠く。④は誤りで、信用情報提供の依頼をする場合、原則としてあらかじめ資金需要者等本人の同意を得る必要がある。"},{"no":16,"category":"法及び関係法令に関すること","text":"貸金業者であるＡの廃業等の届出等に関する次の①～④の記述のうち、その内容が適切でないものを１つだけ選びなさい。\n\n①　個人であるＡが死亡した場合、Ａの相続人は、その事実を知った日から30日以内に、その旨をその登録をした内閣総理大臣又は都道府県知事（以下「登録行政庁」という。）に届け出なければならない。\n②　株式会社であるＡが株式会社であるＢとの合併により消滅した場合、Ｂの代表取締役は、その日から30日以内に、その旨を登録行政庁に届け出なければならない。\n③　Ａについて破産手続開始の決定があったときは、貸金業の登録は、その効力を失う。\n④　Ａは、貸金業を廃止した場合であっても、Ａが締結した貸付けの契約に基づく取引を結了する目的の範囲内においては、なお貸金業者とみなされる。","answer":2,"topic":"監督処分・届出","explanation":"適切でないものは②であり、正答は②である。株式会社Ａが合併により消滅した場合、届出義務を負うのは消滅会社であるＡの代表役員であった者であり、存続会社Ｂの代表取締役ではない。①は正しく、個人である貸金業者が死亡した場合、相続人はその事実を知った日から30日以内に届出をしなければならない。③は正しく、破産手続開始の決定があったときは登録の効力は失われる。④は正しく、廃業後も結了目的の範囲内ではなお貸金業者とみなされる、いわゆるみなし貸金業者の規定である。"},{"no":17,"category":"法及び関係法令に関すること","text":"貸金業者向けの総合的な監督指針における取引時確認、疑わしい取引の届出について、監督当局が貸金業者を監督するに当たって留意することとされている事項に関する次の①～④の記述のうち、その内容が適切でないものを１つだけ選びなさい。\n\n①　犯罪による収益の移転防止に関する法律第３条第３項に基づき国家公安委員会が作成・公表する犯罪収益移転危険度調査書の内容を勘案し、取引・商品特性や取引形態、取引に関係する国・地域、顧客属性等の観点から、自らが行う取引がテロ資金供与やマネー・ローンダリング等に利用されるリスクについて適切に調査・分析した上で、その結果を記載した書面等（特定事業者作成書面等）を作成し、定期的に見直しを行っているか。\n②　法人顧客との取引における実質的支配者の確認や、外国PEPs該当性の確認、個人番号や基礎年金番号の取扱いを含む本人確認書類の適切な取扱いなど、取引時確認を適正に実施するための態勢が整備されているか。\n③　疑わしい取引として届出を行うか否かの判断を行うに当たっては、別途公表している疑わしい取引の参考事例に基づきその要否を判断する態勢を整備しているか。なお、当該参考事例に該当する取引はもれなく届出を行う必要があり、一方、これに該当しない取引は届出の対象とならないことに留意する必要がある。\n④　取引時確認と疑わしい取引の届出が相互に関連性を有していることを十分に認識し、取引時確認の的確な実施により資金需要者等の基礎的な情報を把握し、その上で当該情報及び資金需要者等の取引態様等を総合的に勘案のうえ判断し、疑わしい取引の届出が行われるよう、一体的、一元的な社内体制等が構築されているか。","answer":3,"topic":"監督指針","explanation":"適切でないものは③であり、正答は③である。監督指針上、疑わしい取引の参考事例はあくまで例示であり、これに該当しない取引であっても実質的な判断によって疑わしい取引に該当することがあり得るため、参考事例に該当しない取引が一律に届出の対象とならないとする記述は不適切である。①・②・④はいずれも監督指針が定める取引時確認・疑わしい取引の届出に関する態勢整備の着眼点として適切な内容である。"},{"no":18,"category":"法及び関係法令に関すること","text":"貸金業者の禁止行為に関する次の①～④の記述のうち、その内容が適切でないものを１つだけ選びなさい。\n\n①　貸金業者は、貸金業の業務に従事する使用人その他の従業者に対し、その業務が営業所等において資金需要者等と対面することなく行うものであるとしても、その従業者であることを証する証明書を携帯させなければ、その者をその業務に従事させてはならない。\n②　貸金業者は、その貸金業の業務に関し、資金需要者等に対し、不確実な事項について断定的判断を提供し、又は確実であると誤認させるおそれのあることを告げる行為をしてはならない。\n③　貸金業者は、貸付けの契約（住宅資金貸付契約その他の内閣府令で定める契約を除く。）の相手方又は相手方となろうとする者の死亡によって保険金の支払を受けることとなる保険契約を締結しようとする場合には、当該保険契約において、自殺による死亡を保険事故としてはならない。\n④　貸金業者は、その貸金業の業務に関して広告又は勧誘をするときは、公的な年金、手当等の受給者の借入意欲をそそるような表示又は説明をしてはならない。","answer":1,"topic":"禁止行為","explanation":"適切でないものは①であり、正答は①である。従業者証明書の携帯義務は、資金需要者等と対面して業務を行う従業者を主眼とした規定であり、対面することなく行う業務に従事する者について一律に携帯させなければならないとする点で不正確である。②は正しく、断定的判断の提供等は禁止行為に該当する。③は正しく、自殺による死亡を保険事故とする保険契約の締結は原則禁止される。④は正しく、公的年金等の受給者の借入意欲をそそる表示・説明の禁止は広告・勧誘規制上の禁止行為である。"},{"no":19,"category":"法及び関係法令に関すること","text":"次の①～④の記述のうち、貸金業法第13条の２（過剰貸付け等の禁止）第２項に規定する個人過剰貸付契約から除かれる契約として貸金業法施行規則第10条の21に規定するものに該当しないものを１つだけ選びなさい。\n\n①　売却を予定している個人顧客の不動産（借地権を含む。）の売却代金により弁済される貸付けに係る契約であって、当該個人顧客の返済能力を超えないと認められるもの（貸付けの金額が当該貸付けに係る契約の締結時における当該不動産の価格の範囲内であるものに限り、当該不動産を売却することにより当該個人顧客の生活に支障を来すと認められる場合を除く。）\n②　個人顧客の居宅を担保とする貸付けに係る契約であって、当該個人顧客の返済能力を超えないと認められるもの（貸付けの金額が当該貸付けに係る契約の締結時における当該居宅の価格の範囲内であるものに限る。）\n③　自ら又は他の者により住宅資金貸付契約に係る貸付けが行われるまでのつなぎとして行う貸付けに係る契約\n④　個人顧客又は当該個人顧客の親族で当該個人顧客と生計を一にする者の健康保険法に規定する高額療養費を支払うために必要な資金の貸付けに係る契約","answer":2,"topic":"総量規制","explanation":"個人過剰貸付契約から除かれる契約（除外契約）に該当しないものは②であり、正答は②である。個人顧客の居宅を担保とする貸付けは除外契約ではなく、いわゆる例外契約（顧客の利益の保護に支障を生じない契約）として別途規定されるものであり、除外契約の要件（不動産の売却代金による弁済等）には該当しない。①は不動産売却代金による弁済を内容とする除外契約として適切である。③はつなぎ融資として除外契約に該当する。④は高額療養費支払資金の貸付けとして除外契約に該当する。"},{"no":20,"category":"法及び関係法令に関すること","text":"貸金業法第13条の２（過剰貸付け等の禁止）第２項に規定する個人顧客の利益の保護に支障を生ずることがない契約として貸金業法施行規則第10条の23で定めるもの（以下「例外契約」という。）に関する次の①～④の記述のうち、その内容が適切でないものを１つだけ選びなさい。\n\n①　貸金業者が事業を営む個人顧客との間で貸付けに係る契約を締結する場合において、当該契約が例外契約に該当するための要件の１つとして、当該契約に関し、実地調査、当該個人顧客の直近の確定申告書の確認その他の方法により当該事業の実態が確認されていることが必要である。\n②　貸金業者が事業を営む個人顧客との間で貸付けに係る契約を締結する場合において、当該契約に係る貸付けの金額が100万円以下であるときは、当該契約が例外契約に該当するための要件の１つとして、当該契約に関し、当該個人顧客の営む事業の状況、収支の状況及び資金繰りの状況に照らし、当該個人顧客の返済能力を超えない貸付けに係る契約であると認められることが必要である。\n③　預金保険法第２条第１項に規定する金融機関からの貸付け（以下「正規貸付け」という。）が行われるまでのつなぎとして行う貸付けに係る契約であって、正規貸付けが行われることが確実であると認められ、かつ、返済期間が３か月を超えないものは、例外契約に該当する。\n④　例外契約に係る貸付けの残高は、貸金業法第13条（返済能力の調査）第３項第２号の規定に基づき算出される個人顧客合算額に算入される。","answer":3,"topic":"総量規制","explanation":"適切でないものは③であり、正答は③である。正規貸付け（金融機関からの貸付け）が行われるまでのつなぎ融資が例外契約に該当するための返済期間の上限は１か月とされており、３か月を超えないものとする記述は誤りである。①は正しく、事業を営む個人顧客との契約が例外契約に該当するには事業の実態確認が必要である。②は正しく、貸付金額100万円以下の場合の返済能力を超えないことの確認要件も適切である。④は正しく、例外契約に係る貸付けの残高も個人顧客合算額に算入される。"},{"no":21,"category":"法及び関係法令に関すること","text":"貸金業法第17条（契約締結時の書面の交付）に関する次の①～④の記述のうち、その内容が適切でないものを１つだけ選びなさい。\n\n①　貸金業者は、極度方式基本契約を締結した場合にその相手方に交付すべき契約締結時の書面に、極度方式基本契約に関し貸金業者が受け取る書面の内容を記載しなければならない。\n②　貸金業者が極度方式基本契約を締結した場合にその相手方に交付すべき契約締結時の書面に記載すべき貸金業者の登録番号については、その登録番号の括弧書の記載を省略することができる。\n③　貸金業者が顧客との間で極度方式貸付けに係る契約を締結した場合において、当該顧客に対し、その承諾を得て、内閣府令で定めるところにより、一定期間における貸付け及び弁済その他の取引の状況を記載した書面として内閣府令で定めるものを交付するときは、貸金業法第17条第１項に規定する書面（当該極度方式貸付けに係る契約についての契約締結時の書面）の交付に代えて、契約年月日及び貸付けの金額のほか内閣府令で定める事項を記載した書面を当該顧客に交付することができる。\n④　貸金業者は、極度方式基本契約を締結した場合にその相手方に交付すべき契約締結時の書面に記載すべき事項について、その相手方から書面による交付を希望する旨の申出があった場合を除き、当該事項を電磁的方法により提供することができる。","answer":4,"topic":"契約締結時書面","explanation":"適切でないものは④であり、正答は④である。契約締結時の書面は書面交付が原則であり、電磁的方法による提供は相手方の承諾を得た場合に限られるのであって、相手方から書面交付を希望する旨の申出があった場合を除き電磁的方法により提供できるとする記述（承諾を要しないかのような構成）は不適切である。①は正しく、極度方式基本契約の契約締結時書面には貸金業者が受け取る書面の内容の記載が必要である。②は正しく、登録番号の括弧書きの記載省略は認められている。③は正しく、一定の取引状況を記載した書面を交付する場合の簡易記載による代替は認められている。"},{"no":22,"category":"法及び関係法令に関すること","text":"貸金業者であるＡは、個人顧客であるＢとの間で、金銭の貸付けに係る契約を締結し、遅滞なく、貸金業法第17条第１項に規定する書面（以下「契約締結時の書面」という。）をＢに交付した。この場合に関する次の①～④の記述のうち、その内容が適切でないものを１つだけ選びなさい。なお、本件契約は、極度方式基本契約及び極度方式貸付けに係る契約ではないものとする。\n\n①　Ａは、契約締結時の書面を交付した後に、貸付けの利率を引き下げた場合、変更後の内容を記載した契約締結時の書面をＢに交付する必要はない。\n②　Ａは、契約締結時の書面を交付した後に、各回の返済金額を減額した場合、変更後の内容を記載した契約締結時の書面をＢに交付する必要はない。\n③　Ａは、契約締結時の書面を交付した後に、期限の利益の喪失の定めについてＢの利益となる変更を加えた場合、変更後の内容を記載した契約締結時の書面をＢに交付する必要はない。\n④　Ａは、契約締結時の書面を交付した後に、契約締結時の書面に記載されている保証人との間で締結している保証契約を解除した場合、変更後の内容を記載した契約締結時の書面をＢに交付する必要はない。","answer":2,"topic":"契約締結時書面","explanation":"適切でないものは②であり、正答は②である。各回の返済金額を減額する変更は、契約締結時書面の記載事項の変更として、変更後の内容を記載した書面を改めて交付すべき場合に該当し、交付不要とする記述は不適切である。①は正しく、利率を引き下げる変更は顧客に不利益とならないため再交付は不要とされる。③は正しく、期限の利益喪失の定めについて顧客に有利な変更も再交付を要しない。④は正しく、保証契約の解除も顧客に不利益とならない変更として再交付を要しない。"},{"no":23,"category":"法及び関係法令に関すること","text":"貸金業法第21条（取立て行為の規制）に関する次の①～④の記述のうち、その内容が適切でないものを１つだけ選びなさい。\n\n①　貸金業を営む者又は貸金業を営む者の貸付けの契約に基づく債権の取立てについて貸金業を営む者その他の者から委託を受けた者（以下「貸金業を営む者等」という。）は、貸付けの契約に基づく債権の取立てをするに当たって、正当な理由がないのに、午後９時から午前８時までの間に、債務者等に電話をかけ、もしくはファクシミリ装置を用いて送信し、又は債務者等の居宅を訪問してはならないが、貸金業者向けの総合的な監督指針（以下「監督指針」という。）によれば、例えば、債務者等と連絡をとるための合理的方法が他にない場合は、正当な理由に該当する可能性が高いとされている。\n②　貸金業を営む者等は、貸付けの契約に基づく債権の取立てをするに当たって、債務者等が弁済し、又は連絡し、もしくは連絡を受ける時期を申し出た場合において、その申出が社会通念に照らし相当であると認められないことその他の正当な理由がないのに、午前８時から午後９時までの間に、債務者等に電話をかけ、もしくはファクシミリ装置を用いて送信し、又は債務者等の居宅を訪問してはならないが、監督指針によれば、例えば、直近において債務者等から弁済や連絡に関する申し出が履行されていない場合は、正当な理由に該当する可能性が高いとされている。\n③　貸金業を営む者等は、貸付けの契約に基づく債権の取立てをするに当たって、正当な理由がないのに、債務者等の勤務先その他の居宅以外の場所を訪問してはならないが、監督指針によれば、例えば、債権の取立てをするに当たって勤務先を訪問する旨を告げたとしても、そのことをもって違反行為に該当するものではないとされている。\n④　貸金業を営む者等は、貸付けの契約に基づく債権の取立てをするに当たって、貼り紙、立看板その他何らの方法をもってするを問わず、債務者の借入れに関する事実その他債務者等の私生活に関する事実を債務者等以外の者に明らかにしてはならないが、監督指針によれば、例えば、債務者等から家族に知られないように要請を受けている場合以外においては、債務者等の自宅に電話をかけ家族がこれを受けた場合に貸金業者であることを名乗り、郵送物の送付に当たり差出人として貸金業者であることを示したとしても、直ちに違反行為に該当するものではないとされている。","answer":3,"topic":"取立行為規制","explanation":"適切でないものは③であり、正答は③である。監督指針上、勤務先訪問を告げる行為自体が直ちに違反行為に該当しないとまでは言い切れず、状況によっては私生活の平穏を害する取立てとして違反行為に該当し得るとされており、一律に違反行為に該当しないとする記述は不適切である。①・②・④はいずれも監督指針が示す正当な理由の該当例・非該当例として概ね適切な内容である。"},{"no":24,"category":"法及び関係法令に関すること","text":"貸金業法第24条の６の２（開始等の届出）に関する次の①～④の記述のうち、その内容が適切でないものを１つだけ選びなさい。\n\n①　貸金業者は、その政令で定める使用人が破産手続開始の決定を受けた場合、内閣府令で定めるところにより、その旨をその登録をした内閣総理大臣又は都道府県知事（以下「登録行政庁」という。）に届け出なければならない。\n②　貸金業者は、貸金業務取扱主任者が死亡したことにより、その営業所又は事務所について貸金業法第12条の３（貸金業務取扱主任者の設置）に規定する要件を欠くこととなった場合、内閣府令で定めるところにより、その旨を登録行政庁に届け出なければならない。\n③　貸金業者は、その使用人に貸金業の業務に関し法令に違反する行為があったことを知った場合、内閣府令で定めるところにより、その旨を登録行政庁に届け出なければならない。\n④　貸金業者（資金需要者等の利益を損なうおそれがないものとして内閣府令で定める事由がある者を除く。）は、その登録期間中に純資産額が5000万円未満となったことを知った場合、内閣府令で定めるところにより、その旨を登録行政庁に届け出なければならない。","answer":1,"topic":"監督処分・届出","explanation":"適切でないものは①であり、正答は①である。開始等の届出の対象は貸金業者自身が破産手続開始の決定を受けた場合等であり、政令で定める使用人が破産手続開始の決定を受けたことは開始等の届出事項として規定されていない。②は正しく、主任者の死亡により設置要件を欠くに至った場合は届出事項である。③は正しく、使用人の法令違反行為を知った場合も届出事項である。④は正しく、純資産額が5000万円未満となったことを知った場合も届出事項である。"},{"no":25,"category":"法及び関係法令に関すること","text":"金利等の規制に関する次の①～④の記述のうち、その内容が適切でないものを１つだけ選びなさい。\n\n①　出資の受入れ、預り金、及び金利等の取締りに関する法律上、金銭の貸借の媒介を行う者は、その媒介に係る貸借の金額の100分の５に相当する金額（当該貸借の期間が１年未満であるものについては、当該貸借の金額に、その期間の日数に応じ、年５％の割合を乗じて計算した金額）を超える手数料の契約をし、又はこれを超える手数料を受領してはならない。\n②　利息制限法上、営業的金銭消費貸借上の債務の不履行による賠償額の予定は、その賠償額の元本に対する割合が年２割（20％）を超えるときは、その超過部分について、無効とされる。\n③　利息制限法上、営業的金銭消費貸借上の債務を主たる債務とする保証（業として行うものに限る。）がされた場合における保証料（主たる債務者が支払うものに限る。）の契約は、その保証料が当該主たる債務の元本に係る法定上限額（同法第１条及び第５条の規定の例により計算した金額をいう。）から当該主たる債務について支払うべき利息の額を減じて得た金額を超えるときは、その超過部分について、無効とされる。\n④　貸金業法上、貸金業者は、その利息（みなし利息を含む。）が利息制限法第１条及び第５条の規定の例により計算した金額を超える利息の契約を締結した場合、刑事罰の対象となる。","answer":4,"topic":"出資法","explanation":"適切でないものは④であり、正答は④である。貸金業者が利息制限法の上限を超える利息の契約を締結しただけでは直ちに刑事罰の対象となるわけではなく、出資法上の上限金利（年20％）を超える場合に刑事罰の対象となるのであって、利息制限法超過利息の契約締結を刑事罰の対象とする記述は不正確である。①は正しく、金銭の貸借の媒介手数料の上限に関する出資法の規定である。②は正しく、賠償額の予定の上限（年20％）に関する利息制限法の規定である。③は正しく、保証料に関する利息制限法上の上限規制である。"},{"no":26,"category":"法及び関係法令に関すること","text":"複数の営業的金銭消費貸借契約（以下「第一契約」「第二契約」「第三契約」という。）における利息の制限の適用に関する次の①～④の記述のうち、利息制限法上、その内容が適切でないものを１つだけ選びなさい。\n\n①　Ａは、Ｂとの間で、元本を50万円とし利息を年１割８分（18％）とする第一契約を締結し50万円をＢに貸し付けると同時に、Ｂとの間で元本を100万円とし利息を年１割（10％）とする第二契約を締結し100万円をＢに貸し付けた。この場合、第一契約における利息の約定は、年１割５分（15％）を超過する部分に限り無効となる。\n②　Ａは、Ｂとの間で、元本を100万円とし利息を年１割５分（15％）とする第一契約を締結し100万円をＢに貸し付けた。その後、Ａは、第一契約に基づく債務の元本残高が30万円である時点において、Ｂとの間で元本を70万円とし利息を年１割８分（18％）とする第二契約を締結し70万円をＢに貸し付けた。この場合、第二契約における利息の約定は、年１割５分（15％）を超過する部分に限り無効となる。\n③　Ａは、Ｂとの間で、元本を100万円とし利息を年１割５分（15％）とする第一契約を締結し100万円をＢに貸し付けた。Ａは、ＢがＡに対して第一契約に基づく債務をすべて弁済した後に、Ｂとの間で元本を８万円とし利息を年２割（20％）とする第二契約を締結し８万円をＢに貸し付けると同時に、元本を30万円とし利息を年１割８分（18％）とする第三契約を締結し30万円をＢに貸し付けた。この場合、第二契約における利息の約定は、年１割８分（18％）を超過する部分に限り無効となる。\n④　Ａは、Ｂとの間で、元本を70万円とし利息を年１割８分（18％）とする第一契約を締結し70万円をＢに貸し付けた。その後、貸金業者であるＣは、ＢがＡから70万円を借り入れた事実を把握した上で、Ｂとの間で、元本を30万円とし利息を年１割８分（18％）とする初めての第二契約を締結し30万円をＢに貸し付けた。この場合、第二契約における利息の約定は、年１割５分（15％）を超過する部分に限り無効となる。","answer":4,"topic":"利息制限法","explanation":"適切でないものは④であり、正答は④である。第二契約はＣによる初めての貸付けであり、Ａの貸付けとは別の貸主による契約であるため、Ｂの複数契約の残高を合算して上限金利を判断する規定（同一貸主間での既存債務残高との合算）の適用対象とはならず、Ｃとの契約の上限金利はＣＢ間の第二契約の元本額（30万円）のみを基準に年１割８分（18％）となるべきであり、年１割５分（15％）を超過する部分に限り無効となるとする記述は誤りである。①・②・③は複数契約の残高合算による利息制限法上限の判定として適切な内容である。"},{"no":27,"category":"法及び関係法令に関すること","text":"みなし利息に関する次の①～④の記述のうち、利息制限法上、その内容が適切でないものを１つだけ選びなさい。\n\n①　貸金業者は、顧客との間で締結した営業的金銭消費貸借契約において、当該契約で約定された弁済期における口座振替の方法による弁済に係る口座振替手続に要する費用（消費税額等相当額を含むものとする。）を当該顧客から受領した。この場合、当該費用は、利息とみなされない。\n②　貸金業者は、顧客との間で締結した営業的金銭消費貸借契約において、貸金業法第17条（契約締結時の書面の交付）第１項に規定する書面を交付し、当該交付に要する費用（消費税額等相当額を含むものとする。）を当該顧客から受領した。この場合、当該費用は、利息とみなされる。\n③　貸金業者は、顧客との間で締結した営業的金銭消費貸借契約において、金銭の貸付け及び弁済に用いるため当該契約締結時に当該顧客に交付したカードの発行費用（消費税額等相当額を含むものとする。）を当該顧客から受領した。この場合、当該費用は、利息とみなされる。\n④　貸金業者は、顧客との間で締結した営業的金銭消費貸借契約において、顧客が金銭の受領又は弁済のために利用する現金自動支払機その他の機械の利用料として、10,000円の弁済を受領する際に110円（消費税額等相当額を含むものとする。）を当該顧客から受領した。この場合、当該利用料は、利息とみなされない。","answer":1,"topic":"みなし利息","explanation":"適切でないものは①であり、正答は①である。口座振替の方法による弁済に係る費用は、原則としてみなし利息に該当し、利息とみなされないとする記述は誤りである（口座振替手数料は原則みなし利息の対象となる）。②は正しく、契約締結時書面の交付費用は原則みなし利息に該当する。③は正しく、カードの発行費用も原則みなし利息に該当する。④は正しく、現金自動支払機等の利用料は一定の金額の範囲内（10,000円以下の場合110円等）であればみなし利息に含まれない特則が定められている。"},{"no":28,"category":"貸付け及び貸付けに付随する取引に関する法令及び実務に関すること","text":"意思表示に関する次の①～④の記述のうち、民法上、その内容が適切なものを１つだけ選びなさい。\n\n①　意思表示は、その通知を相手方に発した時からその効力を生ずる。\n②　表意者は、意思表示の相手方の所在を知ることができないときは、公示の方法によって意思表示をすることができるが、意思表示の相手方を知ることができないときは、公示の方法によって意思表示をすることができない。\n③　意思表示が、意思表示に対応する意思を欠く錯誤に基づくものであって、その錯誤が、法律行為の目的及び取引上の社会通念に照らして重要なものであり、かつ、表意者の重大な過失によるものでなかった場合には、表意者は、その意思表示を取り消すことができる。\n④　相手方に対する意思表示について第三者が強迫を行った場合においては、相手方がその事実を知り、又は知ることができたときに限り、表意者は、その意思表示を取り消すことができる。","answer":3,"topic":"意思表示","explanation":"正答は③である。錯誤が法律行為の目的及び取引上の社会通念に照らして重要なものであり、かつ表意者に重大な過失がない場合、表意者はその意思表示を取り消すことができる。①は誤りで、意思表示はその通知が相手方に到達した時からその効力を生ずる（到達主義）。②は誤りで、相手方を知ることができないときも公示による意思表示が認められる。④は誤りで、相手方に対する意思表示について第三者が強迫を行った場合、相手方の善意・悪意にかかわらず表意者は取り消すことができる（詐欺の場合と異なり強迫は相手方の認識を要件としない）。"},{"no":29,"category":"貸付け及び貸付けに付随する取引に関する法令及び実務に関すること","text":"Ａは、Ｂ所有の甲土地を売却する旨の売買契約を締結しようとしている。この場合に関する次の①～④の記述のうち、民法上、その内容が適切なものを１つだけ選びなさい。\n\n①　Ａは、Ｂから甲土地の売却について代理権を付与されていたが、Ｃとの間で、当該代理権に基づく代理行為を行うに際し、Ｂのためにすることを示さないで甲土地の売買契約を締結した。この場合において、Ｃが、当該契約を締結するに際し、当該契約がＢのためにされたものであることを知っていたときであっても、当該契約はＡとＣとの間にその効力を生ずる。\n②　Ａは、Ｂから甲土地の売却について付与されていた代理権が消滅した後に、その代理権の範囲内において、Ｂの代理人として、Ｄとの間で甲土地の売買契約を締結した。この場合において、Ｄが、当該代理権の消滅の事実を過失により知らなかったときであっても、当該契約は、ＢとＤとの間にその効力を生ずる。\n③　Ａは、何らの代理権も付与されていないのに、Ｂの代理人として、Ｅとの間で甲土地の売買契約を締結した。この場合において、Ｅは、当該契約締結時に、当該契約を締結することにつきＡに代理権がないことを知らなかったときは、Ｂが追認をしない間は、当該契約を取り消すことができる。\n④　Ａは、Ｂから甲土地の売却について代理権を付与されていた一方で、Ｆからも甲土地の購入について代理権を付与されていた。この場合において、Ａが、Ｂ及びＦの双方の代理人として、甲土地の売買契約を締結したときは、当該契約はＢとＦとの間にその効力を生ずる。","answer":3,"topic":"代理","explanation":"正答は③である。無権代理行為の相手方が代理権のないことを知らなかった（善意）ときは、本人が追認をしない間、その契約を取り消すことができる（無権代理の相手方の取消権）。①は誤りで、顕名なき代理行為でも相手方が本人のためにすることを知っていた場合は本人に効果が帰属する。②は誤りで、代理権消滅後の行為は表見代理の問題であり、相手方に過失（善意無過失を要する）があれば本人に効果は帰属しない。④は誤りで、双方代理は原則として無権代理行為とみなされ、本人があらかじめ許諾した行為等を除き効果は本人に帰属しない。"},{"no":30,"category":"貸付け及び貸付けに付随する取引に関する法令及び実務に関すること","text":"法律行為の無効及び取消しに関する次の①～④の記述のうち、民法上、その内容が適切なものを１つだけ選びなさい。\n\n①　未成年者は、その法定代理人の同意がなければ、自己の行った法律行為を取り消すことができない。\n②　取り消された法律行為は、初めから無効であったものとみなされる。\n③　無効な法律行為に基づく債務の履行として給付を受けた者は、その給付を受けた当時その法律行為が無効であることを知っていたか否かにかかわらず、その法律行為によって現に利益を受けた限度において、相手方に対し、返還の義務を負う。\n④　取消権は、法律行為の時から５年間行使しないときは、時効によって消滅する。","answer":2,"topic":"無効・取消し","explanation":"正答は②である。取り消された法律行為は、初めから無効であったものとみなされる（遡及効）。①は誤りで、未成年者は法定代理人の同意を得ずに単独で自己の行った法律行為を取り消すことができる。③は誤りで、無効な行為に基づく給付を受けた者が給付時に無効であることを知っていた（悪意であった）場合には、受けた利益に利息を付して返還し損害があれば賠償する義務を負うなど、現存利益に限られない場合がある。④は誤りで、取消権は追認をすることができる時から５年間、又は行為の時から20年間行使しないときに時効消滅する。"},{"no":31,"category":"貸付け及び貸付けに付随する取引に関する法令及び実務に関すること","text":"根抵当権に関する次の①～④の記述のうち、民法上、その内容が適切なものを１つだけ選びなさい。\n\n①　根抵当権は、債務者との取引によって生ずる債権について、その担保すべき範囲を限定して定めることを要しない。\n②　根抵当権者は、確定した元本のほか、利息その他の定期金を請求する権利又は債務の不履行によって生じた損害の賠償を請求する権利を有するときは、その最後の２年分についてのみ、その根抵当権を行使することができる。\n③　元本の確定前に根抵当権者から根抵当権の被担保債権を取得した者は、その債権についてその根抵当権を行使することができる。\n④　根抵当権により担保すべき元本の確定すべき期日の定めがない場合、根抵当権設定者は、その根抵当権の設定の時から３年を経過したときは、その担保すべき元本の確定を請求することができる。","answer":4,"topic":"抵当権・根抵当権","explanation":"正答は④である。根抵当権の元本確定期日の定めがない場合、根抵当権設定者は根抵当権設定の時から３年を経過したときは元本の確定を請求することができる。①は誤りで、根抵当権は担保すべき債権の範囲を定めなければならない。②は誤りで、確定した元本のほか利息等について根抵当権を行使できるのは最後の２年分に限られない（根抵当権は極度額の範囲内で全部について行使できる点が抵当権と異なる）。③は誤りで、元本確定前に根抵当権の被担保債権を譲り受けた者は、その債権について根抵当権を行使することができない（随伴性の否定）。"},{"no":32,"category":"貸付け及び貸付けに付随する取引に関する法令及び実務に関すること","text":"債権の効力に関する次の①～④の記述のうち、民法上、その内容が適切なものを１つだけ選びなさい。\n\n①　債務の不履行又はこれによる損害の発生もしくは拡大に関して債権者に過失があったときは、裁判所は、これを考慮して、損害賠償の責任及びその額を定める。\n②　債務者は、債権者に対し、損害賠償として、その債権の目的である物又は権利の価額の全部の支払をした場合であっても、債権者の承諾を得なければ、その物又は権利について債権者に代位することができない。\n③　債権者は、自己の債権を保全するため必要があるときは、債務者の一身に専属する権利を行使することができる。\n④　債権者は、裁判外において、詐害行為取消権を行使して、債務者が債権者を害することを知ってした財産権を目的とする行為を取り消すことができる。","answer":1,"topic":"債権の効力","explanation":"正答は①である。債務不履行又はこれによる損害の発生・拡大について債権者に過失があったときは、裁判所はこれを考慮して損害賠償の責任及びその額を定める（過失相殺）。②は誤りで、損害賠償として物又は権利の価額の全部の支払をしたときは、債権者の承諾を要せず当然に債権者に代位する（賠償者代位）。③は誤りで、債権者代位権の対象から一身専属権は除外される。④は誤りで、詐害行為取消権は裁判上（訴えにより）行使しなければならず、裁判外での行使はできない。"},{"no":33,"category":"貸付け及び貸付けに付随する取引に関する法令及び実務に関すること","text":"ＡのＢに対する貸付金債権（以下「本件債権」という。）の譲渡に関する次の①～④の記述のうち、民法上、その内容が適切なものを１つだけ選びなさい。\n\n①　Ａが、本件債権をＣに譲渡し、Ｃへの本件債権の譲渡についてＢに通知をし、当該通知がＢに到達した。この場合、Ｃは、本件債権の譲受けをＢに対抗することができる。\n②　Ａが、本件債権をＣ及びＤに二重に譲渡した場合において、AC間の債権譲渡について、ＢがＡに対して確定日付のある証書によらない承諾をした後、AD間の債権譲渡について、ＡがＢに対して確定日付のある証書による通知をし、当該通知がＢに到達した。この場合、Ｃは、本件債権の譲受けをＤに対抗することができる。\n③　Ａが、本件債権をＣ及びＤに二重に譲渡した場合において、いずれの債権譲渡についても、ＡからＢに対して確定日付のある証書による通知がなされた。AC間の債権譲渡の通知よりも先にAD間の債権譲渡の通知がＢに到達したが、AC間の債権譲渡の通知に係る確定日付はAD間の債権譲渡の通知に係る確定日付よりも早い日であった。この場合、Ｃは、本件債権の譲受けをＤに対抗することができる。\n④　Ａが、本件債権をＣに譲渡した後に、本件債権は、Ａの債権者Ｅにより差し押さえられた。この場合において、Ｃに本件債権を譲渡した旨の確定日付のある証書による通知がＢに到達した後に、当該差押命令がＢに送達されたときであっても、Ｅは、本件債権の差押えをＣに対抗することができる。","answer":1,"topic":"債権譲渡","explanation":"正答は①である。債権譲渡について譲渡人から債務者への通知が債務者に到達すれば、譲受人は債務者に対して債権譲受けを対抗することができる。②は誤りで、確定日付のある証書による通知・承諾が二重譲渡の優劣を決するため、確定日付のない承諾より後に確定日付のある通知がされたＤが優先する。③は誤りで、確定日付のある証書による通知が複数ある場合、優劣は確定日付の先後ではなく債務者への通知の到達の先後で決まるため、先に到達したＤが優先する。④は誤りで、債権譲渡の対抗要件具備（確定日付のある通知の到達）が差押命令の送達より先であれば、譲受人Ｃが差押債権者Ｅに優先する。"},{"no":34,"category":"貸付け及び貸付けに付随する取引に関する法令及び実務に関すること","text":"相殺に関する次の①～④の記述のうち、民法上、その内容が適切なものを１つだけ選びなさい。\n\n①　相殺の意思表示には、条件又は期限を付することができる。\n②　時効によって消滅した債権がその消滅以前に相殺に適するようになっていた場合であっても、その債権者は、これを自働債権として相殺をすることができない。\n③　相殺の意思表示は、その意思表示をした時から将来に向かってその効力を生ずる。\n④　当事者が相殺を禁止し、又は制限する旨の意思表示をした場合には、その意思表示は、第三者がこれを知り、又は重大な過失によって知らなかったときに限り、その第三者に対抗することができる。","answer":4,"topic":"相殺","explanation":"正答は④である。相殺禁止・制限の意思表示は、第三者がこれを知り、又は重大な過失によって知らなかったときに限り、その第三者に対抗することができる。①は誤りで、相殺の意思表示には条件又は期限を付することができない。②は誤りで、時効消滅した債権であっても消滅以前に相殺適状にあった場合は自働債権として相殺をすることができる。③は誤りで、相殺の意思表示はその効力を生じた双方の債権が互いに相殺に適するようになった時に遡って効力を生ずる（遡及効）。"},{"no":35,"category":"貸付け及び貸付けに付随する取引に関する法令及び実務に関すること","text":"相続に関する次の①～④の記述のうち、民法上、その内容が適切なものを１つだけ選びなさい。\n\n①　相続人は、相続開始の時から、被相続人の一身に専属したものを含め、その財産に属した一切の権利義務を承継する。\n②　共同相続人は、民法第908条（遺産の分割の方法の指定及び遺産の分割の禁止）第１項の規定により被相続人が遺言で遺産の分割を禁じた場合又は同条第２項の規定により共同相続人間で遺産の分割をしない旨の契約をした場合を除き、いつでも、その協議で、遺産の全部又は一部の分割をすることができる。\n③　相続においては、被相続人の債権だけでなく、債務も遺産の分割の対象となり、遺産の分割により共同相続人の１人が被相続人の金銭債務の全てを承継した場合には、当該金銭債務の債権者は他の共同相続人に当該金銭債務の履行を請求することができない。\n④　相続の放棄は、他の相続人に対する意思表示によってその効力を生じ、相続の放棄をした者は、その相続に関しては、初めから相続人とならなかったものとみなされる。","answer":2,"topic":"相続","explanation":"正答は②である。遺言による分割禁止又は共同相続人間の不分割契約がある場合を除き、共同相続人はいつでも協議により遺産の全部又は一部を分割することができる。①は誤りで、被相続人の一身に専属したもの（一身専属権）は相続財産に承継されない。③は誤りで、金銭債務のような可分債務は原則として相続開始と同時に法定相続分に応じて当然分割され、遺産分割の対象とはならないため、分割によって特定の相続人が全部を承継しても債権者は他の共同相続人に法定相続分の履行を請求できる。④は誤りで、相続の放棄は家庭裁判所への申述によってその効力を生じ、他の相続人に対する意思表示によるものではない。"},{"no":36,"category":"貸付け及び貸付けに付随する取引に関する法令及び実務に関すること","text":"破産法に関する次の①～④の記述のうち、その内容が適切なものを１つだけ選びなさい。\n\n①　破産債権とは、破産者に対する財産上の請求権であって、破産手続開始後の原因に基づいて生じたものをいう。\n②　別除権は、破産財団に属する財産につき特別の先取特権、質権又は抵当権を有する者がこれらの権利の目的である財産について認められる権利であり、破産手続によらなければ行使することができない。\n③　破産者が破産手続開始後に破産財団に属する財産に関してした法律行為は、破産手続の関係においては、その効力を主張することができない。\n④　破産債権者は、破産手続開始後に破産財団に対して債務を負担した場合、破産手続によらずに、相殺をすることができる。","answer":3,"topic":"破産法","explanation":"正答は③である。破産者が破産手続開始後に破産財団に属する財産に関してした法律行為は、破産手続の関係においてはその効力を主張することができない。①は誤りで、破産債権とは破産手続開始前の原因に基づいて生じた財産上の請求権をいう。②は誤りで、別除権は破産手続によらないで行使することができる権利である。④は誤りで、破産債権者が破産手続開始後に破産財団に対して債務を負担した場合は、原則として相殺が禁止される。"},{"no":37,"category":"貸付け及び貸付けに付随する取引に関する法令及び実務に関すること","text":"意思能力及び行為能力に関する次の①～④の記述のうち、民法上、その内容が適切でないものを１つだけ選びなさい。\n\n①　法律行為の当事者が意思表示をした時に意思能力を有しなかったときは、その法律行為は、無効とされる。\n②　成年被後見人とは、精神上の障害により事理を弁識する能力を欠く常況にある者で、家庭裁判所により後見開始の審判を受けたものをいう。\n③　未成年者が法律行為を行うにあたり、成年者であることを信じさせるため詐術を用いたとしても、当該未成年者の法定代理人は当該法律行為を取り消すことができる。\n④　未成年者を相手方として法律行為を行った者が、当該未成年者が行為能力者とならない間に、当該未成年者の法定代理人に対し、１か月以上の期間を定めて、当該期間内に当該法律行為を追認するかどうかを確答すべき旨の催告をした場合において、当該法定代理人が当該期間内に確答を発しなかったときは、当該法律行為を追認したものとみなされる。","answer":3,"topic":"意思能力・行為能力","explanation":"適切でないものは③であり、正答は③である。未成年者が詐術を用いて成年者であると信じさせて法律行為を行った場合、当該行為は取り消すことができなくなり、法定代理人であってもこれを取り消すことはできない。①は正しく、意思無能力者の法律行為は無効である。②は正しく、成年被後見人の定義として適切である。④は誤りではなく正しい記述であり、法定代理人が催告期間内に確答を発しなかったときは追認したものとみなされる。"},{"no":38,"category":"貸付け及び貸付けに付随する取引に関する法令及び実務に関すること","text":"期限及び期間に関する次の①～④の記述のうち、民法上、その内容が適切でないものを１つだけ選びなさい。\n\n①　法律行為に始期を付したときは、その法律行為の履行は、期限が到来するまで、これを請求することができない。\n②　債務者は、担保を滅失させ、損傷させ、又は減少させたときは、期限の利益を主張することができない。\n③　日、週、月又は年によって期間を定めたときは、期間の初日は、算入しない。ただし、その期間が午前零時から始まるときは、この限りでない。\n④　週、月又は年によって期間を定めた場合において、週、月又は年の初めから期間を起算しないときは、その期間は、最後の週、月又は年においてその起算日に応当する日に満了する。","answer":4,"topic":"期限・期間","explanation":"適切でないものは④であり、正答は④である。週、月又は年によって期間を定めた場合において、その期間が起算日に応当する日のない月に満了すべきときはその月の末日に満了するなどの規定はあるが、起算日に応当する日に満了するとの一般原則自体は概ね正しい内容であり、設問の記述のうち不適切な部分の判断が問われている。①は正しく、始期付き法律行為は期限到来まで履行請求できない。②は誤りではなく正しく、担保を滅失・損傷・減少させた債務者は期限の利益を主張できない。③は正しく、期間の初日不算入の原則とその例外（午前零時から始まる場合）の規定である。"},{"no":39,"category":"貸付け及び貸付けに付随する取引に関する法令及び実務に関すること","text":"消滅時効に関する次の①～④の記述のうち、民法上、その内容が適切でないものを１つだけ選びなさい。\n\n①　債権は、債権者が権利を行使することができることを知った時から５年間行使しないとき、又は権利を行使することができる時から10年間行使しないときは、時効によって消滅する。\n②　保証人は、主たる債務の消滅時効が完成した場合には、当該主たる債務の消滅時効を援用することができる。\n③　消滅時効が完成し債務者が時効の援用をした場合には、その効果は、援用をした時から将来に向かってのみその効力を生ずる。\n④　債権者と債務者との間で、両者の間に生じた債権について消滅時効が完成する前に、その消滅時効が完成しても債務者は時効の援用をしない旨の合意をしたとしても、当該合意は無効である。","answer":3,"topic":"時効","explanation":"適切でないものは③であり、正答は③である。消滅時効の援用による効果は、援用の時からではなく起算点に遡って（債権発生時等に遡って）その効力を生ずる（時効の遡及効）。①は正しく、債権の消滅時効は主観的起算点から５年、客観的起算点から10年である。②は正しく、保証人は主たる債務の消滅時効を援用することができる（時効の援用権者）。④は正しく、時効利益の事前放棄は無効であり、消滅時効完成前に時効の援用をしない旨を合意することはできない。"},{"no":40,"category":"貸付け及び貸付けに付随する取引に関する法令及び実務に関すること","text":"連帯保証に関する次の①～④の記述のうち、民法上、その内容が適切でないものを１つだけ選びなさい。\n\n①　主たる債務者に対する履行の請求その他の事由による時効の完成猶予及び更新は、連帯保証人に対しても、その効力を生ずる。\n②　連帯保証人は、主たる債務者が主張することができる抗弁をもって債権者に対抗することができる。\n③　連帯保証人は、主たる債務者が債権者に対して相殺権を有するときは、相殺権の行使によって主たる債務者がその債務を免れるべき限度において、債権者に対して債務の履行を拒むことができる。\n④　連帯保証人に対する履行の請求その他の事由による時効の完成猶予及び更新は、主たる債務者に対しても、その効力を生ずる。","answer":4,"topic":"保証・連帯保証","explanation":"適切でないものは④であり、正答は④である。連帯保証人に対する履行の請求その他の事由による時効の完成猶予及び更新は、原則として主たる債務者に対してそ
