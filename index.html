いもの","answer":3,"topic":"総量規制","explanation":"個人顧客等が緊急に必要とする医療費（高額療養費に係るものなど一定の除外はある）の支払に充てるための資金の貸付けであって、個人顧客の返済能力を超えないと認められるものは、個人顧客の利益の保護に支障を生ずることがない契約として総量規制の例外に該当し、③が適切である。①自動車担保貸付けはそもそも除外事由の性質が異なり、②つなぎ融資は返済期間が短期間（概ね1か月以内）のものに限られ、④借換えは既存契約と比べて借主の負担が増えないこと（返済負担が既存を上回らないこと）が要件となる点で、他の肢は要件を満たさない。"},{"no":11,"category":"法及び関係法令に関すること","text":"貸金業法第14条（貸付条件等の掲示）及び同法第23条（標識の掲示）に関する次の①～④の記述のうち、その内容が適切なものを１つだけ選び、解答欄にその番号をマークしなさい。\n\n①　貸金業者が、貸付条件等の掲示として、営業所又は事務所（以下、本問において「営業所等」という。）ごとに掲示しなければならない事項には、当該貸金業者の商号、名称又は氏名及び登録番号が含まれる。\n②　貸金業者が、貸付条件等の掲示として、営業所等ごとに掲示しなければならない事項には、金銭の貸付けにあっては、「主な返済の例」が含まれる。\n③　貸金業者は、営業所等ごとに、顧客の見やすい場所に、内閣府令で定める様式の標識（以下、本問において「標識」という。）を掲示すれば足りる。\n④　貸金業者は、その営業所等のうち現金自動設備については、標識を掲示する必要はない。","answer":2,"topic":"貸付条件の掲示","explanation":"金銭の貸付けを行う場合の貸付条件等の掲示事項には、利率や返済方法などとともに「主な返済例」が含まれており、②が適切である。①掲示事項は利率・返済方法・返済期間等の貸付条件に関する事項が中心であり、商号等の記載事項の扱いと混同しないよう注意が必要である。③④標識の掲示は営業所等だけでなく、現金自動設備等一定の設備についても掲示が求められる場合があり、一律に不要とする記述は正確でない。"},{"no":12,"category":"法及び関係法令に関すること","text":"貸金業法第17条（契約締結時の書面の交付）第６項及び同法第18条（受取証書の交付）第３項に規定する「一定期間における貸付け及び弁済その他の取引の状況を記載した書面として内閣府令で定めるもの」（以下、本問において「マンスリーステートメント」という。）の交付に関する次のａ～ｄの記述のうち、その内容が適切なものの個数を①～④の中から１つだけ選び、解答欄にその番号をマークしなさい。\n\n- ａ　貸金業者向けの総合的な監督指針（以下、本問において「監督指針」という。）によれば、監督当局は、書面の交付義務に関する貸金業者の監督に当たっては、マンスリーステートメントの交付に際しては、マンスリーステートメントが交付される旨及び個別書面の記載事項が簡素化される旨を示したうえで、あらかじめ書面又は電磁的方法により承諾を得ているかに留意する必要があるとされている。\n- ｂ　監督指針によれば、監督当局は、書面の交付義務に関する貸金業者の監督に当たっては、債務者等から、マンスリーステートメントでの交付の承諾を撤回したい旨の意思表示があった場合、マンスリーステートメント以外の方法による書面交付の適用開始の時期等について、適切な説明が行われているかに留意する必要があるとされている。\n- ｃ　貸金業者は、顧客との間で極度方式貸付けに係る契約を締結した場合において、当該顧客からマンスリーステートメントの交付の承諾を受けているときは、遅滞なく、当該顧客に対し貸金業法第17条第１項に規定する書面（契約締結時の書面）の交付に代えてマンスリーステートメントを交付しなければならない。\n- ｄ　貸金業者は、極度方式貸付けに係る契約を締結した後、当該契約の基本となる極度方式基本契約に係る極度方式保証契約の保証人から、当該極度方式保証契約に基づく債権の一部について弁済を受けた。この場合において、当該貸金業者は、当該保証人の承諾を得て、内閣府令で定めるところにより、マンスリーステートメントを交付するときは、貸金業法第18条第１項に規定する書面（受取証書）の交付に代えて、同条第３項に規定する受領年月日、受領金額のほか内閣府令で定める事項を記載した書面を当該保証人に交付することができる。\n\n①　１個　　②　２個　　③　３個　　④　４個","answer":3,"topic":"契約締結時書面","explanation":"ａ○: 監督指針上、マンスリーステートメントの交付に際しては、その旨や個別書面の記載事項が簡素化される旨を示した上であらかじめ書面又は電磁的方法により承諾を得ているかに留意するとされている。ｂ○: 顧客から撤回の意思表示があった場合、マンスリーステートメント以外の方法による書面交付への切替えの適用開始時期等について適切な説明が行われているかに留意する必要がある。ｃ×: マンスリーステートメントによる代替交付は、承諾を得ている場合に選択し得る取扱いであり、一律に交付「しなければならない」という義務付けの規律ではない。ｄ○: 極度方式保証契約の保証人から一部弁済を受けた場合、保証人の承諾を得てマンスリーステートメントを交付するときは、受取証書の交付に代えることができる。したがって適切なものはａｂｄの3個である。"},{"no":13,"category":"法及び関係法令に関すること","text":"貸金業法第19条に規定する帳簿（以下、本問において「帳簿」という。）に関する次のａ～ｄの記述のうち、その内容が適切なものの組み合わせを①～④の中から１つだけ選び、解答欄にその番号をマークしなさい。\n\n- ａ　貸金業者は、その主たる営業所にのみ、帳簿を備え、債務者ごとに貸付けの契約について契約年月日、貸付けの金額、受領金額その他内閣府令で定める事項を記載し、これを保存すれば足りる。\n- ｂ　貸金業者は、帳簿を、債務者ごとに、債務者との全ての取引が終了した日から少なくとも10年間保存しなければならない。\n- ｃ　貸金業者向けの総合的な監督指針（以下、本問において「監督指針」という。）によれば、貸金業法施行規則第16条（帳簿の備付け）第１項第７号に規定する「交渉の経過の記録」（以下、本問において「交渉の経過の記録」という。）とは、債権の回収に関する記録、貸付けの契約（保証契約を含む。）の条件の変更（当該条件の変更に至らなかったものを除く。）に関する記録等、貸付けの契約の締結以降における貸付けの契約に基づく債権に関する交渉の経過の記録であるとされている。\n- ｄ　監督指針によれば、「交渉の経過の記録」として記録される事項である交渉内容には、催告書等の書面の内容を含むとされている。\n\n①　ａｂ　　②　ａｃ　　③　ｂｄ　　④　ｃｄ","answer":4,"topic":"受取証書・帳簿","explanation":"ａ×: 帳簿は主たる営業所にのみ備えれば足りるものではなく、営業所等ごとに備え付ける必要がある。ｂ○: 帳簿は債務者ごとに、その者との全ての取引が終了した日から少なくとも10年間保存しなければならない。ｃ×: 監督指針上の「交渉の経過の記録」は、契約条件の変更に関する記録について、変更に至らなかったものを一律に除くものではなく、交渉の経過として記録すべき対象に含まれ得る。ｄ○: 交渉の経過の記録には、催告書等の書面の内容も含まれるものとされる。したがって適切な組み合わせはｂｄである。"},{"no":14,"category":"法及び関係法令に関すること","text":"貸金業法第24条（債権譲渡等の規制）に関する次の①～④の記述のうち、その内容が適切なものを１つだけ選び、解答欄にその番号をマークしなさい。なお、本問における債権は、抵当証券法第１条第１項に規定する抵当証券に記載された債権ではないものとする。\n\n①　貸金業者は、貸付けに係る契約に基づく債権を貸金業者ではない者に譲渡した場合に限り、その者に対し、当該債権が貸金業者の貸付けに係る契約に基づいて発生したことその他内閣府令で定める事項、及びその者が当該債権に係る貸付けの契約に基づく債権に関してする行為について貸金業法第24条第１項に規定する条項の適用がある旨を、内閣府令で定める方法により、通知しなければならない。\n②　貸金業者が、貸付けに係る契約（極度方式基本契約及び極度方式貸付けに係る契約ではないものとする。）に基づく債権を貸金業者ではない者に譲渡した場合、譲渡人である当該貸金業者は、貸金業法第24条第２項により準用される同法第17条第１項に規定する当該債権の内容を明らかにする書面を当該債権の債務者に交付しなければならない。\n③　貸金業者から貸付けに係る契約に基づく債権を譲り受けた者は、その債権について保証人となろうとする者との間で保証契約を締結しようとする場合には、当該保証契約を締結するまでに、貸金業法第16条の２第３項に規定する当該保証契約の内容を説明する書面を、当該保証契約の保証人となろうとする者に交付しなければならない。\n④　貸金業者は、貸付けの契約に基づく債権の取立ての委託をした相手方が、取立て制限者(注)であり、かつ、当該債権の取立てをするに当たり、貸金業法第21条（取立て行為の規制）第１項の規定に違反した場合において、当該債権の取立ての委託に当たりその相手方が取立て制限者であることを知らなかったときは、知ることができたとしても、行政処分の対象とはならない。\n\n(注)　取立て制限者とは、暴力団員等、暴力団員等がその運営を支配する法人その他の団体もしくは当該法人その他の団体の構成員又は貸付けの契約に基づく債権の取立てに当たり、貸金業法第21条第１項の規定に違反し、もしくは刑法もしくは暴力行為等処罰に関する法律の罪を犯すおそれが明らかである者をいう。","answer":3,"topic":"債権譲渡規制","explanation":"貸金業者から貸付けに係る契約に基づく債権を譲り受けた者が、当該債権に係る保証契約を保証人となろうとする者との間で締結しようとするときは、保証契約の内容を説明する書面を交付しなければならず、③が適切である。①通知義務は譲渡先が貸金業者か否かに一律限定されるものではなく、②契約締結時書面の交付主体・時期に関する規律は「譲渡人が交付する」という単純な整理にとどまらず、④取立て制限者であることを知ることができた場合には過失があるとして行政処分の対象となり得る点で、他の肢は正確性を欠く。"},{"no":15,"category":"法及び関係法令に関すること","text":"指定信用情報機関への信用情報の提供等に関する次のａ～ｄの記述のうち、その内容が適切なものの組み合わせを①～④の中から１つだけ選び、解答欄にその番号をマークしなさい。なお、本問における貸金業者は、非営利特例対象法人及び特定非営利金融法人ではないものとする。\n\n- ａ　加入貸金業者(注１)は、資金需要者である個人の顧客を相手方として、極度方式基本契約に基づく極度方式貸付けに係る契約を締結したときは、遅滞なく、当該契約に係る個人信用情報を加入指定信用情報機関(注２)に提供しなければならない。\n- ｂ　加入貸金業者は、資金需要者である個人の顧客を相手方として、住宅資金貸付契約を締結したときは、当該契約に係る個人信用情報を加入指定信用情報機関に提供する必要はない。\n- ｃ　加入貸金業者が加入指定信用情報機関に提供する個人信用情報には、勤務先の商号又は名称が含まれる。\n- ｄ　加入貸金業者が加入指定信用情報機関に提供する個人信用情報には、国民健康保険証で本人確認（犯罪による収益の移転防止に関する法律第４条第１項第１号に規定する本人特定事項の確認をいう。）を行った場合におけるその保険証の記号番号が含まれる。\n\n(注１)　加入貸金業者とは、指定信用情報機関と信用情報提供契約を締結した相手方である貸金業者をいう。\n(注２)　加入指定信用情報機関とは、加入貸金業者と信用情報提供契約を締結した指定信用情報機関をいう。\n\n①　ａｂ　　②　ａｃ　　③　ｂｄ　　④　ｃｄ","answer":2,"topic":"指定信用情報機関","explanation":"ａ○: 極度方式基本契約に基づき極度方式貸付契約を締結したときは、遅滞なく当該契約に係る個人信用情報を指定信用情報機関に提供しなければならない。ｂ○: 住宅資金貸付契約は総量規制の対象外とされる契約類型であり、これに伴い個人信用情報の提供義務も除外される。ｃ×: 指定信用情報機関に提供する個人信用情報は氏名・住所・生年月日や契約内容等が中心であり、勤務先の商号又は名称までは含まれないと解される。ｄ×: 本人確認に用いた運転免許証等の番号は個人信用情報に含まれ得るが、国民健康保険証の記号番号については同様に含まれるものとはされていない。したがって適切な組み合わせはａｂである。"},{"no":16,"category":"法及び関係法令に関すること","text":"ＡとＢとの間の複数の営業的金銭消費貸借契約（以下、本問において、「第一契約」、「第二契約」又は「第三契約」という。）に関する次のａ～ｄの記述のうち、利息制限法上、その内容が適切なものの個数を①～④の中から１つだけ選び、解答欄にその番号をマークしなさい。\n\n- ａ　Ａは、元本を95万円及び利息を利率年１割８分（18％）とする第一契約を締結し95万円をＢに貸し付けた後、その１か月後に第一契約に基づく債務がまったく弁済されていない時点において元本を９万円及び利息を利率年２割（20％）とする第二契約を締結し９万円をＢに貸し付けた。この場合、第一契約及び第二契約における利息の約定は、年１割５分（15％）を超過する部分に限り無効となる。\n- ｂ　Ａは、元本を30万円及び利息を利率年１割８分（18％）とする第一契約を締結し30万円をＢに貸し付けた後、第一契約に基づく債務の残高が９万円である時点において、元本を５万円及び利息を利率年２割（20％）とする第二契約を締結し５万円をＢに貸し付けた。この場合、第二契約における利息の約定は、年１割８分（18％）を超過する部分に限り無効となる。\n- ｃ　Ａは、元本を50万円及び利息を利率年１割８分（18％）とする第一契約を締結し50万円をＢに貸し付けた後、第一契約に基づく債務の残高が５万円である時点において、元本を３万円及び利息を利率年２割（20％）とする第二契約を締結し３万円をＢに貸し付けた。この場合、第二契約における利息の約定は、年１割８分（18％）を超過する部分に限り無効となる。\n- ｄ　Ａは、元本を50万円及び利息を利率年１割６分（16％）とする第一契約を締結し50万円をＢに貸し付けた後、第一契約に基づく債務の残高が45万円である時点において、元本を５万円及び利息を利率年１割８分（18％）とする第二契約を締結し５万円をＢに貸し付けると同時に、元本を50万円及び利息を利率年１割６分（16％）とする第三契約を締結し50万円をＢに貸し付けた。この場合、第二契約及び第三契約のいずれの利息の約定も、年１割５分（15％）を超過する部分に限り無効となる。\n\n①　１個　　②　２個　　③　３個　　④　４個","answer":2,"topic":"利息制限法","explanation":"利息制限法上、既に貸付けを受けている者が同一の貸主から重ねて金銭を借り入れる場合、上限利率の判定は当該残存元本額と新たな貸付けの元本額とを合算した金額を基準として行うのが原則である。ｃについては、残存元本5万円と新規元本3万円の合計が8万円となり10万円未満の範囲にとどまるため、適用される上限利率は年20%であって、約定利率18%はこの上限内に収まり有効となるはずであり、「18%を超過する部分に限り無効」とする記述は明確な誤りである。一方、ａ・ｂ・ｄについては、合算ルールの原則どおりに残存元本と新規元本を単純合算すれば数値上は整合するようにも見えるが、契約締結のタイミング（時間を空けての締結か同時締結か）や合算対象となる契約の要件をどこまで厳密に満たすかによって結論が左右され得る余地があり、本解説では断定を避ける。正答は個数問題として2個であり、受験対策としては合算の原則を機械的に当てはめるだけでなく、合算対象となる契約の範囲や締結時期に関する細部の要件まで条文に沿って丁寧に確認する姿勢が重要である。"},{"no":17,"category":"法及び関係法令に関すること","text":"みなし利息に関する次のａ～ｄの記述のうち、利息制限法上、その内容が適切なものの組み合わせを①～④の中から１つだけ選び、解答欄にその番号をマークしなさい。\n\n- ａ　貸金業者が、顧客との間で締結した営業的金銭消費貸借契約において、金銭の貸付け及び弁済に用いるため当該契約締結時に当該顧客に交付したカードの発行手数料を当該顧客から受領した場合、当該手数料は、利息とみなされる。\n- ｂ　貸金業者が、顧客との間で締結した営業的金銭消費貸借契約に基づく貸付金を当該顧客が指定する銀行口座に振り込む際に要した手数料を当該顧客から受領した場合、当該手数料は、利息とみなされる。\n- ｃ　貸金業者が、顧客との間で締結した営業的金銭消費貸借契約において、口座振替の方法による弁済につき、当該顧客が弁済期に弁済できなかったため、当該顧客の要請を受けて行った再度の口座振替手続に要した費用を当該顧客から受領した場合、当該費用は、利息とみなされる。\n- ｄ　貸金業者が、顧客との間で締結した営業的金銭消費貸借契約において、貸金業法第17条第１項に規定する契約の内容を明らかにする書面を交付した後、当該顧客からの紛失による再発行の要請に基づき、当該書面を再発行し、その手数料を当該顧客から受領した場合、当該手数料は、利息とみなされる。\n\n①　ａｂ　　②　ａｃ　　③　ｂｄ　　④　ｃｄ","answer":1,"topic":"みなし利息","explanation":"ａ○: カードの発行手数料は、貸付けに関し債権者が受ける金銭であり、原則としてみなし利息に該当する。ｂ○: 貸付金を顧客の指定する銀行口座に振り込む際の振込手数料は、貸付けの実行自体に伴う費用として原則みなし利息に含まれる。ｃ×: 債務者からの要請により行う口座振替の再度手続に要する費用は、債務者の都合による事務代行的な費用としてみなし利息から除外される。ｄ×: 契約書面の紛失に伴う再発行手数料も、債務者の要請に基づく費用としてみなし利息から除外される。したがって適切な記述の組み合わせはａｂである。"},{"no":18,"category":"法及び関係法令に関すること","text":"株式会社であるＡが貸金業の登録の申請をした。この場合に関する次の①～④の記述のうち、その内容が適切でないものを１つだけ選び、解答欄にその番号をマークしなさい。\n\n①　Ａの取締役の中に、刑法の罪を犯し、懲役の刑の言渡しを受けその刑の全部の執行を猶予され、当該執行猶予の言渡しを取り消されることなくその猶予の期間を経過したが、その日から５年を経過しない者がいる場合、貸金業法第６条（登録の拒否）に規定する登録の拒否事由（以下、本問において「登録拒否事由」という。）に該当する。\n②　Ａの常務に従事する役員は取締役３人であり、その全員が、貸付けの業務に従事した経験をまったく有しない場合、登録拒否事由に該当する。\n③　Ａの取締役の中に、道路交通法の規定に違反し、懲役の刑に処せられ、その刑の執行を終わり、又は刑の執行を受けることがなくなった日から５年を経過しない者がいる場合、登録拒否事由に該当する。\n④　Ａが、再生手続開始の決定又は更生手続開始の決定のいずれも受けておらず、その純資産額が3,000万円である場合、登録拒否事由に該当する。","answer":1,"topic":"登録拒否事由","explanation":"執行猶予の言渡しを受け、取り消されることなく猶予期間を無事経過した場合は、その時点で刑の言渡し自体の効力が失われるため、刑の執行終了から5年を経過しない者に該当するという登録拒否事由には当たらない。したがって①の記述は誤りであり、これが正答となる。②の常務役員全員が貸付業務経験を欠く場合や④の純資産額が基準に満たない場合は人的構成・財産的基礎の要件を欠き拒否事由に該当し、③の罰金以上の刑に処せられ5年を経過しない者も拒否事由に該当するため、いずれも正しい記述である。"},{"no":19,"category":"法及び関係法令に関すること","text":"貸金業者向けの総合的な監督指針におけるシステムリスク管理態勢に関する次の①～④の記述のうち、その内容が適切でないものを１つだけ選び、解答欄にその番号をマークしなさい。\n\n①　サイバーセキュリティ事案とは、情報通信ネットワークや情報システム等の悪用により、サイバー空間を経由して行われる不正侵入、情報の窃取、改ざんや破壊、情報システムの作動停止や誤作動、不正プログラムの実行やDDoS攻撃等の、いわゆるサイバー攻撃により、サイバーセキュリティが脅かされる事案をいう。\n②　システムリスク管理態勢の検証については、貸金業者の業容に応じて、例えば、システムリスクに対する認識等として、経営陣は、システムリスクの重要性を十分に認識した上で、システムを統括管理する役員を定めているかに留意して検証することとされている。\n③　システムリスク管理態勢の検証については、貸金業者の業容に応じて、例えば、情報セキュリティ管理として、貸金業者が責任を負うべき資金需要者等の重要情報を網羅的に洗い出す必要があるが、資金需要者等の重要情報の洗い出しにあたっては、通常の業務では使用しないシステム領域に格納されたデータを除くすべてのデータ保存領域について、障害解析のためにシステムから出力された障害解析用データ、現金自動設備（店舗外含む。）等に保存されている取引ログ等のようなデータを洗い出しの対象範囲としているかに留意して検証することとされている。\n④　システムリスク管理態勢の検証については、貸金業者の業容に応じて、例えば、システム監査として、システム部門から独立した内部監査部門において、システムに精通した監査要員による定期的なシステム監査が行われているか（外部監査人によるシステム監査を導入する方が監査の実効性があると考えられる場合には、内部監査に代え外部監査を利用して差し支えない。）に留意して検証することとされている。","answer":3,"topic":"監督指針","explanation":"監督指針では、重要情報の洗い出しにあたり通常の業務では使用しないシステム領域に格納されたデータについても除外せず、網羅的に把握・管理すべきとされている。したがって「除く」とする③の記述は適切でなく、これが正答となる。①のサイバーセキュリティ事案の定義、②の経営陣によるシステム統括役員の選任等への留意、④のシステム監査を外部監査人により代替できる場合があるとする点は、いずれも監督指針の考え方に沿った正しい記述である。"},{"no":20,"category":"法及び関係法令に関すること","text":"株式会社である貸金業者Ａが、貸金業法第13条の３に基づき、個人顧客Ｂとの間で締結している極度方式基本契約（以下、本問において「本件基本契約」という。）について行う、本件基本契約が基準額超過極度方式基本契約に該当するかどうかの調査（以下、本問において「本件調査」という。）等に関する次の①～④の記述のうち、その内容が適切でないものを１つだけ選び、解答欄にその番号をマークしなさい。なお、Ａは、Ｂとの間で本件基本契約以外の極度方式基本契約を締結していないものとする。\n\n①　Ａは、本件基本契約の契約期間を本件基本契約の締結日から同日以後１か月以内の一定の期日までの期間及び当該一定の期日の翌日以後１か月ごとの期間に区分したそれぞれの期間（以下、本問において「所定の期間」という。）において、直近の所定の期間内にＡが行った本件基本契約に基づく極度方式貸付けの金額の合計額が15万円である場合であっても、当該所定の期間の末日における本件基本契約に基づく極度方式貸付けの残高の合計額が５万円であるときは、本件調査を行う必要はない。\n②　Ａは、３か月以内の一定の期間の末日における本件基本契約に基づく極度方式貸付けの残高の合計額が30万円である場合は、本件調査を行わなければならない。\n③　Ａは、本件調査において、ＢがＡ以外の貸金業者との間で締結した貸付けに係る契約の貸付残高が60万円、本件基本契約の極度額が50万円かつ本件基本契約に基づく極度方式貸付けの残高が30万円である場合は、Ｂから、源泉徴収票その他のＢの収入又は収益その他の資力を明らかにする事項を記載し、又は記録した書面又は電磁的記録として内閣府令で定めるものの提出又は提供を受けているときを除き、その提出又は提供を受けなければならない。\n④　Ａは、３か月以内の一定の期間の末日において、本件基本契約の極度額の減額の措置を講じている場合、当該極度額を減額の措置を講じる前の金額に増額するまでの間は、本件調査を行う必要はない。","answer":4,"topic":"基準額超過調査","explanation":"極度額の減額措置を講じたことのみをもって、減額前の水準に戻るまで調査義務が一律に不要となるわけではなく、状況に応じて改めて調査が必要となり得るため、④の記述は適切でなく正答となる。①や②のように一定期間内の極度方式貸付けの合計額や残高合計額が基準額を超えるかどうかで調査の要否が判断される点、③のように他社借入れと自社残高の合計が基準を超える場合に資力を明らかにする書面等の提出を受けなければならない点は、いずれも基準額超過極度方式基本契約に関する規律として正しい。"},{"no":21,"category":"法及び関係法令に関すること","text":"次の①～④の記述のうち、貸金業者が、個人顧客との間で金銭の貸付けに係る極度方式基本契約を締結しようとする場合に、当該契約を締結するまでに、貸金業法第16条の２第２項に規定する書面（極度方式基本契約における契約締結前の書面）により当該個人顧客に明らかにしなければならない事項に該当しないものを１つだけ選び、解答欄にその番号をマークしなさい。\n\n①　当該契約の相手方となろうとする個人顧客の氏名及び住所\n②　各回の返済期日及び返済金額の設定の方式\n③　返済の方法及び返済を受ける場所\n④　返済の方式","answer":1,"topic":"契約締結前書面","explanation":"契約締結前書面は、契約を締結するか否かを顧客が判断するための貸付条件等を明らかにするための書面であり、契約の相手方となろうとする者本人の氏名及び住所を明らかにすべき事項としては想定されていないため、①は契約締結前書面の記載事項に該当せず正答となる。②の返済期日・返済金額の設定方式、③の返済の方法及び場所、④の返済の方式は、いずれも極度方式基本契約の契約締結前書面において明らかにすべき事項に該当する。"},{"no":22,"category":"法及び関係法令に関すること","text":"貸金業者Ａが顧客Ｂとの間で極度額を50万円とし利率を年１割８分（18％）とする極度方式基本契約を令和４年４月１日に締結した場合に交付する貸金業法第17条（契約締結時の書面の交付）第２項に規定する書面（以下、本問において「基本契約に係る書面」という。）及び当該極度方式基本契約に基づく極度方式貸付けに係る契約を締結した場合に交付する同条第１項に規定する書面（以下、本問において「個別契約に係る書面」という。）に関する次の①～④の記述のうち、その内容が適切でないものを１つだけ選び、解答欄にその番号をマークしなさい。なお、本問における極度方式基本契約及び極度方式貸付けに係る契約は、いずれも金銭の貸付けに係る契約であって、手形の割引の契約及び売渡担保の契約ではないものとする。\n\n①　Ａは、個別契約に係る書面におけるＡの登録番号の記載を省略することができる。\n②　Ａは、基本契約に係る書面に利息の計算の方法を記載した場合には、個別契約に係る書面における利息の計算の方法の記載を省略することができる。\n③　Ａは、基本契約に係る書面に貸付けの利率を記載した場合には、個別契約に係る書面における貸付けの利率の記載を省略することができる。\n④　Ａは、個別契約に係る書面における各回の返済期日及び返済金額を次回の返済期日及び返済金額をもって代えることができる。","answer":3,"topic":"契約締結時書面","explanation":"極度方式貸付けの利率は個別の貸付条件を構成する重要事項であり、基本契約書面に利率を記載していても、それをもって個別契約書面における利率の記載を省略できるものではないため、③の記述は適切でなく正答となる。①の登録番号や②の利息の計算方法のように基本契約書面の記載を援用して個別契約書面での記載を省略できる事項があること、また④のように次回の返済期日・返済金額をもって各回の返済期日・返済金額の記載に代えられることは、いずれも正しい規律である。"},{"no":23,"category":"法及び関係法令に関すること","text":"貸金業者Ａが、個人顧客Ｂとの間で貸付けに係る契約を締結し金銭をＢに貸し付け、Ｂに貸金業法第17条第１項に規定する書面（以下、本問において「契約締結時の書面」という。）を交付した後に、Ｂとの合意に基づき契約締結時の書面に記載した事項を変更した。この場合に関する次の①～④の記述のうち、その内容が適切でないものを１つだけ選び、解答欄にその番号をマークしなさい。\n\n①　Ａは、「利息の計算の方法」を変更した場合、当該変更がＢの利益となる変更であるときを除き、変更後の内容を記載した契約締結時の書面をＢに再交付しなければならない。\n②　Ａは、「返済の方法及び返済を受ける場所」を変更した場合、当該変更がＢの利益となる変更であるときを除き、変更後の内容を記載した契約締結時の書面をＢに再交付しなければならない。\n③　Ａは、「債務者が負担すべき元本及び利息以外の金銭に関する事項」を変更した場合、当該変更がＢの利益となる変更であるときを除き、変更後の内容を記載した契約締結時の書面をＢに再交付しなければならない。\n④　Ａは、「期限の利益の喪失の定めがあるときは、その旨及びその内容」を変更した場合、当該変更がＢの利益となる変更であるときを除き、変更後の内容を記載した契約締結時の書面をＢに再交付しなければならない。","answer":2,"topic":"契約締結時書面","explanation":"返済の方法及び返済を受ける場所の変更は、利息計算方法の変更などと同列に一律の再交付義務が課される事項とはされておらず、②の記述は適切でないため正答となる。①の利息の計算方法、③の元本及び利息以外に負担すべき金銭に関する事項、④の期限の利益の喪失に関する定めの変更については、顧客の利益となる変更である場合を除き契約締結時書面の再交付義務が生じる点で正しい。"},{"no":24,"category":"法及び関係法令に関すること","text":"貸金業法第18条第１項に規定する書面（以下、本問において「受取証書」という。）の交付に関する次の①～④の記述のうち、その内容が適切でないものを１つだけ選び、解答欄にその番号をマークしなさい。\n\n①　貸金業者は、その営業所の窓口において、貸付けに係る契約に基づく債権の全部について、当該契約の債務者から弁済を受けたときは、遅滞なく、内閣府令で定めるところにより、受取証書を当該債務者に交付すれば足りる。\n②　貸金業者は、預金又は貯金の口座に対する払込みにより、貸付けに係る契約に基づく債権の全部について、当該契約の債務者から弁済を受けた場合、当該債務者の請求があったときに限り、受取証書を当該債務者に交付しなければならない。\n③　貸金業者は、貸付けに係る契約の債務者に受取証書を交付しなければならない場合、当該受取証書において、当該契約を契約番号その他により明示することをもって、当該貸金業者の登録番号及び当該債務者の商号、名称又は氏名の記載に代えることができる。\n④　貸金業者は、その営業所の窓口において、貸付けに係る契約に基づく債権の一部について、当該契約の債務者から弁済を受け、受取証書を交付する場合、当該受取証書に、受領金額及びその利息、賠償額の予定に基づく賠償金又は元本への充当額のほか、貸付けの金額等を記載しなければならない。","answer":1,"topic":"受取証書・帳簿","explanation":"営業所の窓口において債権全部について弁済を受けたときは、その場で直ちに受取証書を交付すべきものであり、「遅滞なく」交付すれば足りるとする①の記述は適切でなく正答となる。②の預金口座への払込みによる弁済の場合に債務者の請求があったときに限り交付すればよいとする特則、③の契約番号等による明示で登録番号・氏名等の記載に代えられる簡略記載、④の一部弁済の場合の記載事項は、いずれも正しい規律である。"},{"no":25,"category":"法及び関係法令に関すること","text":"貸付けの契約に基づく債権の取立てに関する次の①～④の記述のうち、その内容が適切でないものを１つだけ選び、解答欄にその番号をマークしなさい。\n\n①　貸金業者の貸付けの契約に基づく債権の取立てについて貸金業者から委託を受けた者が、債務者等に対し、支払を催告するために送付する書面に記載しなければならない事項には、当該書面を送付する者の氏名が含まれる。\n②　貸金業者は、債務者等から貸付けの契約に基づく債権に係る債務の処理の委託を受けた弁護士から、書面により、当該委託を受けた旨の通知を受けた場合、正当な理由がないのに、債務者等に対し、電話をかけ、電報を送達し、もしくはファクシミリ装置を用いて送信し、又は訪問する方法により、当該債務を弁済することを要求し、これに対し債務者等から直接要求しないよう求められたにもかかわらず、更にこれらの方法で当該債務を弁済することを要求してはならない。\n③　貸金業者は、貸金業法第21条（取立て行為の規制）第２項の規定により、債務者等に対し、支払を催告するために書面又はこれに代わる電磁的記録を送付するときは、当該書面に封をする方法、本人のみが使用していることが明らかな電子メールアドレスに電子メールを送付する方法その他の債務者の借入れに関する事実が債務者等以外の者に明らかにならない方法により行わなければならない。\n④　貸金業者向けの総合的な監督指針によれば、監督当局は、貸金業者以外の者が貸し付けた債権について、貸金業者が、保証契約に基づき求償権を有する場合、その取立てに当たっては貸金業法第21条が適用されることがないため、不適切な取立て行為が行われないよう指導及び監視することに留意するものとされている。","answer":4,"topic":"取立行為規制","explanation":"貸金業者以外の者が貸し付けた債権について保証契約に基づき求償権を有する者が取立てを行う場合であっても、取立て行為規制（法21条）の趣旨は及び、不適切な取立てが行われないよう指導等の対象となり得るため、「適用されない」とする④の記述は適切でなく正答となる。①の催告書面への送付者氏名の記載、②の受任弁護士からの通知後に正当理由なく直接請求を継続する行為の禁止、③の借入事実を第三者に知られない方法での書面送付は、いずれも取立て行為規制上正しい内容である。"},{"no":26,"category":"法及び関係法令に関すること","text":"貸金業者に対する監督に関する次の①～④の記述のうち、その内容が適切でないものを１つだけ選び、解答欄にその番号をマークしなさい。\n\n①　内閣総理大臣又は都道府県知事（以下、本問において「登録行政庁」という。）は、３年毎に、当該職員に、その登録を受けた貸金業者の営業所もしくは事務所に立ち入らせ、その業務に関して質問させ、又は帳簿書類その他の物件を検査させなければならない。\n②　登録行政庁は、その登録を受けた貸金業者が、自己の名義で、貸金業法第３条第１項の登録を受けていない者に貸金業を営ませた場合、当該貸金業者の登録を取り消さなければならない。\n③　登録行政庁は、その登録を受けた貸金業者が、正当な理由がないのに、引き続き６か月以上貸金業を休止した場合、当該貸金業者の登録を取り消すことができる。\n④　登録行政庁は、その登録を受けた貸金業者の業務の運営に関し、資金需要者等の利益の保護を図るため必要があると認めるときは、当該貸金業者に対して、その必要の限度において、業務の方法の変更その他業務の運営の改善に必要な措置を命ずることができる。","answer":1,"topic":"監督処分・届出","explanation":"登録行政庁による立入検査等は、必要があると認めるときに行うことができる裁量的な権限として規定されており、3年ごとに必ず実施しなければならないという定期的な義務ではないため、①の記述は適切でなく正答となる。②の名義貸しにより無登録者に貸金業を営ませた場合の必要的登録取消し、③の正当理由のない6か月以上の休業を理由とする裁量的登録取消し、④の資金需要者等の利益保護のための業務改善命令は、いずれも監督上の権限として正しい内容である。"},{"no":27,"category":"法及び関係法令に関すること","text":"金利等の規制に関する次の①～④の記述のうち、その内容が適切でないものを１つだけ選び、解答欄にその番号をマークしなさい。\n\n①　貸金業法上、金銭の貸借の媒介を行った貸金業者は、当該媒介により締結された貸付けに係る契約の債務者から当該媒介の手数料を受領した場合において、当該契約につき更新があったときは、これに対する新たな手数料を受領し、又はその支払を要求してはならない。\n②　出資法(注)上、金銭の貸借の媒介を行う者が、その媒介に係る貸借（貸借の期間が１年以上であるものとする。）の金額の100分の５に相当する金額を超える手数料の契約をし、又はこれを超える手数料を受領する行為は、刑事罰の対象となる。\n③　貸金業法上、貸金業者は、その利息が利息制限法第１条（利息の制限）に規定する金額を超える利息の契約を締結した場合、行政処分の対象となる。\n④　出資法上、金銭の貸付けを行う者が業として金銭の貸付けを行う場合において、元本100万円に対して年２割（20％）の利息の契約を締結する行為は、刑事罰の対象となる。\n\n(注)　出資法とは、出資の受入れ、預り金及び金利等の取締りに関する法律をいう。","answer":4,"topic":"出資法","explanation":"出資法上の上限金利は年20%であり、ちょうど年20%の利息契約はその上限を超えるものではないため刑事罰の対象とはならず、④の記述は適切でなく正答となる。①の媒介手数料受領後の契約更新時における新たな手数料受領・請求の禁止、②の貸借期間1年以上の場合の媒介手数料が貸借金額の一定割合を超える契約等に対する出資法上の刑事罰、③の利息制限法の制限を超える利息契約を締結した貸金業者に対する行政処分の対象となる点は、いずれも正しい内容である。"},{"no":28,"category":"貸付け及び貸付けに付随する取引に関する法令及び実務に関すること","text":"行為能力に関する次の①～④の記述のうち、民法上、その内容が適切なものを１つだけ選び、解答欄にその番号をマークしなさい。\n\n①　未成年者は、法定代理人が目的を定めて処分を許した財産については、その目的の範囲内において自由に処分することができるが、法定代理人が目的を定めないで処分を許した財産については、自由に処分することができない。\n②　未成年者は、一種又は数種の営業を許された場合において、当該許された営業以外の法律行為を単独で行ったときは、未成年者による法律行為であることを理由として、当該単独で行った法律行為を取り消すことができない。\n③　後見開始の審判を受けた者は、成年被後見人とし、これに成年後見人を付する。家庭裁判所は、成年後見人を付するにあたっては、法人を成年後見人とすることができる。\n④　成年被後見人が成年後見人の同意を得て行った法律行為（日用品の購入その他日常生活に関する行為ではないものとする。）は、取り消すことができない。","answer":3,"topic":"意思能力・行為能力","explanation":"後見開始の審判を受けた者には成年後見人が付されるが、家庭裁判所は自然人だけでなく法人を成年後見人に選任することもできるため、この記述は正しい。未成年者が目的を定めずに処分を許された財産は自由に処分でき、許された営業の範囲外の行為は原則として取り消し得る。また成年被後見人の法律行為は、日常生活に関する行為を除き、たとえ成年後見人の同意を得ていても取り消すことができる点が成年後見制度の特徴である。"},{"no":29,"category":"貸付け及び貸付けに付随する取引に関する法令及び実務に関すること","text":"消滅時効に関する次の①～④の記述のうち、民法上、その内容が適切なものを１つだけ選び、解答欄にその番号をマークしなさい。\n\n①　時効の利益は、あらかじめ放棄することができる。\n②　民事調停が申し立てられた場合において、当該民事調停が不調に終わったときは、当該民事調停が不調に終わった時から６か月を経過するまでの間は、時効は完成しない。\n③　催告があった場合、その時から６か月を経過するまでの間に、再度の催告をしたときは、再度の催告の時から６か月を経過するまでの間は、時効は完成しない。\n④　権利についての協議を行う旨の合意が書面でなされた場合、時効は、その合意がなされた時から新たにその進行を始める。","answer":2,"topic":"時効","explanation":"民事調停の申立てが不調に終わった場合、その終了時から6か月を経過するまでは時効の完成が猶予されるため、この記述は正しい。時効の利益はあらかじめ放棄することができず、催告による完成猶予は最初の催告についてのみ生じ再度の催告には猶予効はない。また権利についての協議を行う旨の書面合意は完成猶予事由であって、時効の進行を新たにリセットする更新事由ではない点に注意が必要である。"},{"no":30,"category":"貸付け及び貸付けに付随する取引に関する法令及び実務に関すること","text":"質権及び抵当権に関する次の①～④の記述のうち、民法上、その内容が適切なものを１つだけ選び、解答欄にその番号をマークしなさい。\n\n①　動産を目的とする質権の設定は、債権者に当該動産を引き渡すことによって、その効力を生ずる。\n②　質権者は、質権設定者の承諾を得なければ、質物について、転質をすることができない。\n③　抵当権は、その担保する債権について不履行があったとしても、抵当不動産の果実に及ばない。\n④　抵当権者は、利息その他の定期金を請求する権利を有するときは、その全額についてその抵当権を行使することができる。","answer":1,"topic":"抵当権・根抵当権","explanation":"動産質権は要物契約であり、債権者への目的物の引渡しによってその効力を生ずるため、この記述は正しい。質権者は原則として設定者の承諾を得ずに自己の責任で転質をすることができ、抵当権の効力は債務不履行後に生じた抵当不動産の果実にも及ぶ。また抵当権者が利息等の定期金を請求できる場合、抵当権を行使できるのは原則として満期となった最後の2年分に限られる。"},{"no":31,"category":"貸付け及び貸付けに付随する取引に関する法令及び実務に関すること","text":"保証に関する次の①～④の記述のうち、民法上、その内容が適切なものを１つだけ選び、解答欄にその番号をマークしなさい。\n\n①　保証債務は、主たる債務に関する利息、違約金、損害賠償その他その債務に従たるすべてのものを包含するが、保証人は、その保証債務についてのみ、違約金又は損害賠償の額を約定することはできない。\n②　主たる債務の目的又は態様が保証契約の締結後に軽減又は加重されたときは、保証人の負担もこれに応じて軽減又は加重される。\n③　主たる債務者に対する履行の請求その他の事由による消滅時効の完成猶予及び更新は、保証人に対しては、その効力を生じない。\n④　主たる債務者が期限の利益を有する場合において、その利益を喪失したときは、債権者は、保証人（法人である場合を除く。）に対し、その利益の喪失を知った時から２か月以内に、その旨を通知しなければならない。","answer":4,"topic":"保証・連帯保証","explanation":"主債務者が期限の利益を喪失した場合、債権者は個人の根保証人等に対し、その喪失を知った時から2か月以内にその旨を通知しなければならないとされており、この記述は正しい。保証人は自己の保証債務について独自に違約金や損害賠償額を約定することができ、主債務の目的や態様が保証契約締結後に加重されても保証人の負担は加重されない。また主債務者について生じた時効の完成猶予・更新の効力は、付従性により保証人にも及ぶ。"},{"no":32,"category":"貸付け及び貸付けに付随する取引に関する法令及び実務に関すること","text":"弁済に関する次の①～④の記述のうち、民法上、その内容が適切なものを１つだけ選び、解答欄にその番号をマークしなさい。\n\n①　受領権者（債権者及び法令の規定又は当事者の意思表示によって弁済を受領する権限を付与された第三者をいう。）以外の者であって取引上の社会通念に照らして受領権者としての外観を有するものに対してした弁済は、その弁済をした者が善意であれば、過失の有無にかかわらず、その効力を有する。\n②　当事者が第三者の弁済を禁止した場合は、弁済をするについて正当な利益を有する第三者であっても、弁済をすることができない。\n③　債務者が一個又は数個の債務について元本のほか利息及び費用を支払うべき場合において、弁済をする者がその債務の全部を消滅させるのに足りない給付をしたときは、弁済の充当の順序に関する合意の有無にかかわらず、これを順次に費用、利息及び元本に充当しなければならない。\n④　弁済の提供は、債権者があらかじめその受領を拒んでいるときであっても、弁済の準備をしたことを通知してその受領の催告をすることでは足りず、債務の本旨に従って現実にしなければならない。","answer":2,"topic":"弁済","explanation":"当事者が第三者弁済を禁止する意思表示をしていた場合には、正当な利益を有する第三者であっても弁済をすることができないため、この記述は正しい。受領権者としての外観を有する者への弁済が有効となるには弁済者が善意かつ無過失であることを要し、費用・利息・元本の充当順序は当事者間に合意がある場合はそれに従い、合意がない場合に法定充当の順序が適用される。また債権者があらかじめ受領を拒んでいる場合、弁済の提供は口頭の提供で足りる。"},{"no":33,"category":"貸付け及び貸付けに付随する取引に関する法令及び実務に関すること","text":"相続に関する次の①～④の記述のうち、民法上、その内容が適切なものを１つだけ選び、解答欄にその番号をマークしなさい。\n\n①　Ａは、配偶者Ｂ及び胎児Ｃのみを遺して死亡した。Ｃは、生きて産まれたときであってもＡの相続人とならない。\n②　Ａは、配偶者Ｂ及び親Ｃのみを遺して死亡した。この場合、Ｃの法定相続分は、３分の２である。\n③　Ａは、配偶者Ｂ、子Ｃ及び子Ｄのみを遺して死亡した。Ｂが相続を単純承認した場合であっても、Ｃ及びＤは、限定承認をすることができる。\n④　Ａは、配偶者Ｂ及び子Ｃのみを遺して死亡した。Ｂ及びＣは、遺産分割協議により、ＡのＤに対する借入金債務をＢのみが相続することとした場合であっても、Ｄは、Ｂ及びＣに対して、当該借入金債務に係るそれぞれの法定相続分の割合に相当する債務の弁済を請求することができる。","answer":4,"topic":"相続","explanation":"遺産分割協議は相続人間の合意にすぎず、金銭債務のような可分債務は法律上当然に法定相続分に応じて分割承継されるため、協議で特定の相続人のみが承継すると定めても債権者には対抗できず、債権者は各共同相続人に対し法定相続分に応じた弁済を請求できる。胎児は相続については既に生まれたものとみなされ、配偶者と直系尊属が相続人となる場合の法定相続分は配偶者3分の2・直系尊属3分の1であり、限定承認は共同相続人全員が共同してのみ行うことができる。"},{"no":34,"category":"貸付け及び貸付けに付随する取引に関する法令及び実務に関すること","text":"破産法に関する次の①～④の記述のうち、その内容が適切なものを１つだけ選び、解答欄にその番号をマークしなさい。\n\n①　破産手続開始の申立てがあった場合において、破産財団をもって破産手続の費用を支弁するのに不足するときは、その申立ては却下される。\n②　免責許可の申立ては、破産手続廃止の決定が確定した後１か月以内に限り、破産裁判所に対し、当該申立てをすることができる。\n③　裁判所は、破産者について、浪費又は賭博その他の射幸行為をしたことによって著しく財産を減少させ、又は過大な債務を負担したと認めるときは、他にいかなる事由があるときであっても、免責許可の決定をすることはできない。\n④　破産者は、免責許可の決定が確定したときは、復権する。","answer":4,"topic":"破産法","explanation":"免責許可決定が確定したときは、破産者は復権するとされているため、この記述は正しい。破産財団が手続費用を支弁するのに不足する場合には直ちに申立てが却下されるのではなく同時廃止となる余地があり、免責許可の申立てには別途定められた期間の規律があるほか、浪費や賭博による免責不許可事由があっても裁判所の裁量により免責を許可できる場合がある。"},{"no":35,"category":"貸付け及び貸付けに付随する取引に関する法令及び実務に関すること","text":"犯罪による収益の移転防止に関する法律についての次の①～④の記述のうち、その内容が適切なものを１つだけ選び、解答欄にその番号をマークしなさい。\n\n①　貸金業者は、顧客である株式会社（その株式を金融商品取引所に上場しているものとする。）の取引時確認を行う場合においては、当該会社のために当該貸金業者との間で当該取引時確認の対象となる取引を行っている当該会社の担当者の本人特定事項の確認を行わなければならない。\n②　貸金業者は、個人顧客との間で特定取引を行うに際し、当該顧客から電気料金等の公共料金の領収証書の原本の提示を受けたときは、取引時確認における本人特定事項の確認を行ったものと認められる。\n③　貸金業者は、特定業務に係る取引について、顧客が組織的な犯罪の処罰及び犯罪収益の規制等に関する法律第10条（犯罪収益等隠匿）の罪に当たる行為を行っている疑いがあると認められる場合においては、速やかに、管轄の行政庁及び当該貸金業者が加入している貸金業法上の指定信用情報機関に届け出なければならない。\n④　貸金業者は、取引時確認を行った場合には、直ちに、主務省令で定める方法により、当該取引時確認に係る事項、当該取引時確認のためにとった措置その他の主務省令で定める事項に関する記録を作成し、当該記録を、当該取引時確認を行った日から７年間保存しなければならない。","answer":1,"topic":"犯収法","explanation":"法人顧客との取引時確認においては、当該法人自体の本人特定事項に加え、実際にその取引を行う自然人（担当者）についても本人特定事項の確認を行う必要があるため、この記述は正しい。公共料金領収証書の原本提示のみでは本人特定事項の確認として不十分であり、疑わしい取引の届出は所管の行政庁に対して行うものである。取引時確認記録の保存期間や作成時期については法令上定められた要件を正確に確認する必要がある。"},{"no":36,"category":"貸付け及び貸付けに付随する取引に関する法令及び実務に関すること","text":"Ａは、その所有する甲土地をＢに売却する旨の委任に係る代理権（以下、本問において「本件代理権」という。）をＣに付与しようとしている。この場合に関する次の①～④の記述のうち、民法上、その内容が適切でないものを１つだけ選び、解答欄にその番号をマークしなさい。\n\n①　Ｃは、Ａから本件代理権を付与され、Ａの代理人としてＢとの間で甲土地の売買契約を締結した。この場合において、当該売買契約の効力がＢの詐欺があったことによって影響を受けるべきときには、その事実の有無は、Ｃについて決するものとされる。\n②　Ｃは、Ａから本件代理権を付与されていた一方で、Ｂからも甲土地の購入について代理権を付与されていた。この場合において、Ｃが、Ａ及びＢの事前の許諾を得ることなく、Ａ及びＢの双方の代理人として、甲土地をＢに3,000万円で売却する旨の契約を締結したときは、Ｃの当該行為は無権代理行為となる。\n③　Ｃは、Ａから本件代理権を付与されていなかったのに、Ａの代理人と称してＢとの間で甲土地の売買契約を締結した。この場合、Ｂは、Ａに対して相当の期間を定めて当該売買契約を追認するか否かを催告することができる。\n④　Ｃは、Ａから本件代理権を付与されていなかったのに、Ａの代理人と称してＢとの間で甲土地の売買契約を締結した。この場合、Ｂは、当該売買契約締結時点において、Ｃに代理権がないことを知っていたときであっても、Ａが追認をしない間は、当該売買契約を取り消すことができる。","answer":4,"topic":"代理","explanation":"無権代理の相手方に認められる取消権は、契約締結時に代理権がないことを知らなかった善意の相手方にのみ認められ、悪意の相手方には取消権が認められないため、この記述は誤りであり正答となる。代理人が行った意思表示の効力が詐欺等により影響を受ける場合、その事実の有無は代理人について決するのが原則であり、双方代理は本人の許諾がない限り無権代理行為とみなされ、相手方は本人に対し相当期間を定めて追認するか否かの催告をすることができる。"},{"no":37,"category":"貸付け及び貸付けに付随する取引に関する法令及び実務に関すること","text":"無効及び取消しに関する次の①～④の記述のうち、民法上、その内容が適切でないものを１つだけ選び、解答欄にその番号をマークしなさい。\n\n①　行為能力の制限によって取り消すことができる行為は、制限行為能力者（他の制限行為能力者の法定代理人としてした行為にあっては、当該他の制限行為能力者を含む。）又はその代理人、承継人もしくは同意をすることができる者に限り、取り消すことができる。\n②　取り消された行為は、初めから無効であったものとみなされる。\n③　無効な行為は、追認によっても、その効力を生じない。ただし、当事者がその行為の無効であることを知って追認をしたときは、新たな行為をしたものとみなされる。\n④　追認をすることができる時よりも前に、取り消すことができる行為によって取得した権利を譲渡したときは、追認をしたものとみなされる。","answer":4,"topic":"無効・取消し","explanation":"法定追認事由に該当するのは追認をすることができる時以後に一定の行為がなされた場合に限られ、追認できる時より前に取消し得る行為によって取得した権利を譲渡しても法定追認とはみなされないため、この記述は誤りであり正答となる。取消権者の範囲は制限行為能力者、代理人、承継人、同意権者に限られ、取り消された行為は初めから無効であったものとみなされる。また無効な行為は原則として追認によって効力を生じないが、当事者がその無効を知って追認したときは新たな行為をしたものとみなされる。"},{"no":38,"category":"貸付け及び貸付けに付随する取引に関する法令及び実務に関すること","text":"債務の引受けに関する次の①～④の記述のうち、民法上、その内容が適切でないものを１つだけ選び、解答欄にその番号をマークしなさい。\n\n①　併存的債務引受の引受人は、債務者と連帯して、債務者が債権者に対して負担する債務と同一の内容の債務を負担する。\n②　併存的債務引受は、債権者、債務者及び引受人となる者との三者間で契約を締結しなければ、その効力を生じない。\n③　免責的債務引受の引受人は、債務者が債権者に対して負担する債務と同一の内容の債務を負担し、債務者は、自己の債務を免れる。\n④　免責的債務引受の引受人は、債務者に対して求償権を取得しない。","answer":2,"topic":"契約・債務不履行","explanation":"併存的債務引受は債権者と引受人となる者との契約によって成立させることができ、また債務者と引受人となる者との契約に債権者が承諾を与える方法によっても成立し得るため、三者間契約でなければ効力を生じないとする記述は誤りであり正答となる。併存的債務引受の引受人は債務者と連帯して同一内容の債務を負担し、免責的債務引受の引受人は同一内容の債務を負担して債務者は自己の債務を免れ、その引受人は債務者に対して求償権を取得しない。"},{"no":39,"category":"貸付け及び貸付けに付随する取引に関する法令及び実務に関すること","text":"相殺に関する次の①～④の記述のうち、民法上、その内容が適切でないものを１つだけ選び、解答欄にその番号をマークしなさい。\n\n①　Ａは、Ｂに対して悪意による不法行為に基づく損害賠償債権を有するとともに売買契約に基づく代金債務を負っている。この場合において、Ａは、当該損害賠償債権と当該代金債務とを相殺することができない。\n②　Ａは、Ｂに対して売買契約に基づく代金債権を有するとともに金銭消費貸借契約に基づく借入金債務を負っている。当該売買契約においては、Ｂは、代金の支払期日に、Ａからの商品の納品と引き換えに、代金をＡに支払う旨の約定がなされている。この場合において、Ａは、代金の支払期日が到来しても、Ｂに商品を納品していないときは、当該代金債権と当該借入金債務とを相殺することができない。\n③　Ｂは、Ａに対して売買契約に基づく代金債権を有しており、Ｂの債権者であるＣは、当該代金債権を差し押さえた。Ａに当該差押命令が送達された後、Ａが、ＤのＢに対する貸付金債権を譲り受けた場合、Ａは、当該貸付金債権とＢに対して負う代金債務との相殺をもってＣに対抗することができない。\n④　Ａは、Ｂに対して金銭消費貸借契約に基づく貸付金債権を有するとともに売買契約に基づく代金債務を負っている。この場合において、ＡがＢに当該貸付金債権と当該代金債務との相殺の意思表示をしたときは、当該意思表示は双方の債務が互いに相殺に適するようになった時にさかのぼってその効力を生ずる。","answer":1,"topic":"相殺","explanation":"相殺禁止規定は悪意による不法行為に基づく損害賠償債務を負う加害者側からの相殺を禁止する趣旨であり、被害者である債権者の側から当該債権を自働債権として相殺することは禁止されていないため、この記述は誤りであり正答となる。同時履行の抗弁権が付着した債権は相殺適状になく、差押え後に第三者から取得した債権を自働債権として差押債権者に相殺を対抗することはできず、相殺の意思表示は双方の債務が相殺適状となった時に遡って効力を生ずる。"},{"no":40,"category":"貸付け及び貸付けに付随する取引に関する法令及び実務に関すること","text":"契約に関する次の①～④の記述のうち、民法上、その内容が適切でないものを１つだけ選び、解答欄にその番号をマークしなさい。\n\n①　申込者が申込みの通知を発した後に死亡した場合において、申込者がその事実が生じたとすればその申込みは効力を有しない旨の意思を表示していたとき、又はその相手方が承諾の通知を発するまでにその事実が生じたことを知ったときは、その申込みは、その効力を有しない。\n②　当事者双方の責めに帰することができない事由によって債務を履行することができなくなったときは、債権者は、反対給付の履行を拒むことができる。\n③　当事者の一方が、第三者との間で契約上の地位を譲渡する旨の合意をした場合において、その契約の相手方にその旨の通知をしたときは、契約上の地位は、その第三者に移転する。\n④　当事者の一方がその解除権を行使したときは、各当事者は、その相手方を原状に復させる義務を負う。ただし、第三者の権利を害することはできない。","answer":3,"topic":"契約・債務不履行","explanation":"契約上の地位の移転には譲渡人と譲受人の合意に加えて相手方の承諾が必要であり、単に相手方に通知しただけでは契約上の地位は移転しないため、この記述は誤りであり正答となる。申込者が申込みの通知を発した後に死亡した場合等に関する規律や、双方無責の履行不能の場合に債権者が反対給付の履行を拒むことができるとする危険負担の規律、解除による原状回復義務が第三者の権利を害することができないとする規律はいずれも正しい。"},{"no":41,"category":"貸付け及び貸付けに付随する取引に関する法令及び実務に関すること","text":"請負契約に関する次の①～④の記述のうち、民法上、その内容が適切でないものを１つだけ選び、解答欄にその番号をマークしなさい。\n\n①　請負は、当事者の一方がある仕事を完成することを約し、相手方がその仕事の結果に対してその報酬を支払うことを約することによって、その効力を生ずる。\n②　物の引渡しを要する請負契約における報酬は、仕事の目的物の引渡しと同時に支払わなければならない。\n③　請負人が種類又は品質に関して契約の内容に適合しない仕事の目的物を注文者に引き渡したときは、注文者は、注文者の供した材料の性質又は注文者の与えた指図によって生じた不適合を理由として、履行の追完の請求、報酬の減額の請求、損害賠償の請求及び契約の解除をすることができない。ただし、請負人がその材料又は指図が不適当であることを知りながら告げなかったときは、この限りでない。\n④　請負人が仕事を完成しない間は、注文者及び請負人は、いつでも契約の解除をすることができる。","answer":4,"topic":"契約・債務不履行","explanation":"請負人が仕事を完成しない間、注文者はいつでも損害を賠償して契約を解除することができるが、請負人の側からの自由な解除権は認められていないため、注文者・請負人のいずれからも自由に解除できるとする記述は誤りであり正答となる。請負の定義や、物の引渡しを要する請負における報酬支払と引渡しの同時履行の関係、注文者が供した材料や指図による不適合について請負人が悪意の場合を除き注文者が責任追及できないとする規律はいずれも正しい。"},{"no":42,"category":"貸付け及び貸付けに付随する取引に関する法令及び実務に関すること","text":"不当利得及び不法行為に関する次の①～④の記述のうち、民法上、その内容が適切でないものを１つだけ選び、解答欄にその番号をマークしなさい。\n\n①　数人が共同の不法行為によって他人に損害を加えたときは、各自が連帯してその損害を賠償する責任を負う。\n②　人の生命又は身体を害する不法行為による損害賠償請求権を除き、不法行為による損害賠償の請求権は、被害者又はその法定代理人が損害及び加害者を知った時から３年間行使しないとき、又は不法行為の時から20年間行使しないときは、時効によって消滅する。\n③　法律上の原因なく他人の財産又は労務によって利益を受け、そのために他人に損失を及ぼした受益者は、善意であるか悪意であるかを問わず、その受けた利益に利息を付して返還する義務を負う。\n④　債務者は、弁済期にない債務の弁済として給付をしたときは、その給付したものの返還を請求することができない。ただし、債務者が錯誤によってその給付をしたときは、債権者は、これによって得た利益を返還しなければならない。","answer":3,"topic":"契約・債務不履行","explanation":"不当利得における返還義務の範囲は受益者の善意・悪意によって異なり、善意の受益者は現存利益の限度で返還すれば足りるのに対し、悪意の受益者は利息を付して返還する義務を負うため、善意・悪意を問わず利息を付して返還するとする記述は誤りであり正答となる。共同不法行為者は連帯して損害賠償責任を負い、人の生命・身体を害する不法行為を除く損害賠償請求権は知った時から3年・不法行為時から20年で時効消滅し、期限前弁済は原則として返還請求できないが錯誤による場合は債権者が得た利益を返還する必要がある。"},{"no":43,"category":"資金需要者等の保護に関すること","text":"個人情報の保護に関する法律に関する次の①～④の記述のうち、その内容が適切なものを１つだけ選び、解答欄にその番号をマークしなさい。\n\n①　個人情報取扱事業者は、個人情報を取り扱うに当たっては、その利用の目的（以下、本問において「利用目的」という。）をできる限り特定しなければならない。個人情報取扱事業者は、利用目的を変更する場合には、変更前の利用目的と関連性を有すると合理的に認められる範囲を超えて行ってはならない。\n②　個人情報取扱事業者は、合併その他の事由により他の個人情報取扱事業者から事業を承継することに伴って個人情報を取得した場合において、承継前における当該個人情報の利用目的の達成に必要な範囲を超えて当該個人情報を取り扱うときは、速やかに、その利用目的を、本人に通知し、又は公表しなければならない。\n③　個人情報取扱事業者は、利用目的を変更した場合は、取得の状況からみて利用目的が明らかであると認められるときであっても、変更された利用目的について、本人に通知し、又は公表しなければならない。\n④　個人情報取扱事業者は、本人との間で契約を締結することに伴って契約書その他の書面（電磁的記録を含む。）に記載された当該本人の個人情報を取得する場合は、あらかじめ、本人に対し、その利用目的を明示しその同意を得なければならない。","answer":1,"topic":"個人情報保護法","explanation":"個人情報取扱事業者は利用目的をできる限り特定しなければならず、目的を変更する場合も変更前の利用目的と関連性を有すると合理的に認められる範囲を超えてはならないため、①は正しい。事業承継に伴い取得した個人情報を承継前の利用目的達成に必要な範囲を超えて取り扱う場合は、事後の速やかな通知・公表では足りず、あらかじめ本人の同意を得るなどの対応が必要である。また取得状況から利用目的が明らかな場合は通知・公表が不要となる例外があり、契約書等からの取得時も利用目的の明示で足り同意取得までは求められていない。"},{"no":44,"category":"資金需要者等の保護に関すること","text":"消費者契約法に関する次の①～④の記述のうち、その内容が適切なものを１つだけ選び、解答欄にその番号をマークしなさい。\n\n①　事業者が消費者契約の締結について勧誘をするに際し、消費者に対して重要事項について事実と異なることを告げる行為をした場合、当該消費者が、当該告げられた内容が事実であるとの誤認をしたか否かにかかわらず、当該消費者は、それによってなされた当該消費者契約の申込み又はその承諾の意思表示を取り消すことができる。\n②　消費者が消費者契約法に基づいて消費者契約を取り消すことができる場合において、追認をすることができる時から６か月間取消権を行使しないとき、又は当該消費者契約の締結の時から５年を経過したときは、当該消費者は、当該消費者契約を取り消すことができなくなる。\n③　事業者が、消費者契約の締結について勧誘をするに際し、勧誘をしている場所から退去する旨の意思を消費者が示したにもかかわらず、当該消費者を退去させないなど、消費者を困惑させることにより当該消費者契約を締結した場合、当該消費者契約は、無効である。\n④　消費者契約の条項のうち、消費者契約に基づき支払うべき金銭の全部を消費者が支払期日までに支払わない場合における損害賠償の額を予定し、又は違約金を定める条項であって、これらを合算した額が、支払期日の翌日からその支払をする日までの期間について、その日数に応じ、当該支払期日に支払うべき額から当該支払期日に支払うべき額のうち既に支払われた額を控除した額に年14.6％の割合を乗じて計算した額を超えることとなるものは、当該超える部分につき無効である。","answer":4,"topic":"消費者契約法","explanation":"正答は④。消費者契約の遅延損害金条項は、年14.6%を超える部分が無効とされており（消費者契約法9条）、④は条文どおり適切。①は不実告知による取消しには消費者が誤認したことが必要なので誤り。②の取消権の行使期間は追認できる時から1年（「6か月」ではない）なので誤り。③の退去妨害等の困惑による意思表示は「取り消すことができる」のであって契約が無効となるのではないため誤り。"},{"no":45,"category":"資金需要者等の保護に関すること","text":"次の①～④の記述のうち、日本貸金業協会が定める貸金業の業務運営に関する自主規制基本規則に規定する「広告及び勧誘に関する規制」によれば、協会に加入している貸金業者が個人向け貸付けの契約に係る広告を出稿するに当たり、協会が設ける審査機関から承認を受けなければならないものを１つだけ選び、解答欄にその番号をマークしなさい。\n\n①　インターネットによる広告\n②　新聞及び雑誌広告\n③　チラシによる広告\n④　看板広告","answer":2,"topic":"自主規制規則","explanation":"正答は②。自主規制基本規則上、個人向け貸付けの契約に係る広告のうち、新聞・雑誌等への出稿は協会が設ける審査機関の承認を受けなければならないとされている。インターネット広告・チラシ・看板は当該事前承認の対象とされていない。広告審査の対象媒体を問う知識問題であり、対象が限定列挙である点を押さえる。"},{"no":46,"category":"資金需要者等の保護に関すること","text":"個人情報の保護に関する法律についてのガイドライン（通則編）に関する次の①～④の記述のうち、その内容が適切でないものを１つだけ選び、解答欄にその番号をマークしなさい。\n\n①　個人情報取扱事業者は、物理的安全管理措置として、個人データを取り扱う機器、電子媒体及び書類等の盗難又は紛失等を防止するために、適切な管理を行わなければならない。\n②　個人情報取扱事業者は、人的安全管理措置として、従業者に、個人データの適切な取扱いを周知徹底するとともに適切な教育を行わなければならない。\n③　個人情報取扱事業者は、組織的安全管理措置として、個人データの取扱いに係る規律に従った運用、担当者及び取り扱う個人情報データベース等の範囲を限定するための適切なアクセス制御を行わなければならない。\n④　個人情報取扱事業者は、情報システム（パソコン等の機器を含む。）を使用して個人データを取り扱う場合（インターネット等を通じて外部と送受信等する場合を含む。）、技術的安全管理措置として、個人データを取り扱う情報システムを使用する従業者が正当なアクセス権を有する者であることを、識別した結果に基づき認証しなければならない。","answer":3,"topic":"個人情報保護法","explanation":"個人情報保護法ガイドライン（通則編）における安全管理措置の分類上、「担当者及び取り扱う個人情報データベース等の範囲を限定するためのアクセス制御」は技術的安全管理措置に位置付けられるものであり、これを組織的安全管理措置として説明する③は適切でない。物理的安全管理措置としての盗難・紛失防止、人的安全管理措置としての従業者への周知徹底・教育、技術的安全管理措置としての正当なアクセス権を有する者であることの識別・認証はいずれも正しい内容である。"},{"no":47,"category":"資金需要者等の保護に関すること","text":"不当景品類及び不当表示防止法（以下、本問において「景品表示法」という。）に関する次の①～④の記述のうち、その内容が適切でないものを１つだけ選び、解答欄にその番号をマークしなさい。\n\n①　「景品類」とは、顧客を誘引するための手段として、その方法が直接的であるか間接的であるかを問わず、くじの方法によるかどうかを問わず、また事業者が自己の供給する商品又は役務の取引に付随して行われるものかどうかを問わず、相手方に提供する物品、金銭その他の経済上の利益であって、内閣総理大臣が指定するものをいう。\n②　内閣総理大臣は、不当な顧客の誘引を防止し、一般消費者による自主的かつ合理的な選択を確保するため必要があると認めるときは、景品類の価額の最高額もしくは総額、種類もしくは提供の方法その他景品類の提供に関する事項を制限し、又は景品類の提供を禁止することができる。\n③　内閣総理大臣は、景品表示法第７条（措置命令）第１項の規定による命令に関し、事業者がした表示が同法第５条（不当な表示の禁止）第１号に該当する表示（以下、本問において「優良誤認表示」という。）であるか否かを判断するため必要があると認めるときは、当該表示をした事業者に対し、期間を定めて、当該表示の裏付けとなる合理的な根拠を示す資料の提出を求めることができる。この場合において、当該事業者が当該資料を提出しないときは、同法第７条第１項の規定の適用については、当該表示は優良誤認表示とみなされる。\n④　景品表示法第７条第１項の規定による命令に違反した者は、刑事罰に処される。","answer":1,"topic":"景品表示法","explanation":"正答は①。景品類の定義は「事業者が自己の供給する商品又は役務の取引に付随して」提供する経済上の利益に限られる。①は「取引に付随して行われるものかどうかを問わず」としている点が誤り。②（景品類の制限・禁止）、③（不実証広告規制：資料を提出しないときは優良誤認表示とみなす）、④（措置命令違反への刑事罰）はいずれも条文どおり適切。"},{"no":48,"category":"財務及び会計に関すること","text":"給与所得者の収入及び給与所得の源泉徴収票等に関する次の①～④の記述のうち、その内容が適切なものを１つだけ選び、解答欄にその番号をマークしなさい。\n\n①　給与所得者の収入を把握できるものは、雇用主により作成され交付される源泉徴収票及び給与明細書のみである。\n②　単一の事業者のみから給与を受けている給与所得者のうち、給与の年間収入金額が1,500万円を超える者は、確定申告書の提出が必要である。\n③　源泉徴収票には、支払金額、給与所得控除後の金額及び源泉徴収税額が記載される欄はあるが、前年度の市町村民税の控除額が記載される欄はない。\n④　源泉徴収票には控除対象配偶者の有無等の欄がある。ここでいう控除対象配偶者とは、その年の12月31日の現況で、民法の規定による配偶者又は婚姻の届出はしていないが事実上婚姻関係と同様の事情にある者であること、納税者と生計を一にしていること、年間の合計所得金額が103万円以下であることの条件を満たす者をいう。","answer":3,"topic":"年収証明書","explanation":"給与所得の源泉徴収票には支払金額、給与所得控除後の金額、源泉徴収税額などの記載欄はあるが、前年度の市町村民税控除額を記載する欄は設けられておらず、源泉徴収票はあくまで所得税に関する書類であるため③が正しい。給与収入は源泉徴収票や給与明細書以外に課税証明書等でも把握でき、確定申告が必要となるのは給与年収が2,000万円を超える場合が原則であり、控除対象配偶者の所得要件も収入と所得の基準を混同しないよう注意が必要である。"},{"no":49,"category":"財務及び会計に関すること","text":"会社計算規則に規定する損益計算書等(注)に関する次の①～④の記述のうち、その内容が適切なものを１つだけ選び、解答欄にその番号をマークしなさい。\n\n①　損益計算書とは、ある時点における企業の財政状態を表す財務諸表である。\n②　売上総損益金額から販売費及び一般管理費の合計額を減じて得た額が零以上の場合を営業利益金額という。\n③　営業損益金額に特別利益を加えて得た額から特別損失を減じて得た額が零以上の場合を経常利益金額という。\n④　経常利益金額から税金を差し引いた額が零以上の場合を当期純利益金額という。\n\n(注)　損益計算書等とは、損益計算書及び連結損益計算書をいう。","answer":2,"topic":"損益計算書","explanation":"会社計算規則上、売上総損益金額から販売費及び一般管理費の合計額を減じて得た額が零以上の場合を営業利益金額というとされており、②が正しい。損益計算書は一定期間の経営成績を表す書類であり、ある時点の財政状態を表すのは貸借対照表であるほか、経常利益金額は営業損益金額に営業外収益・費用を加減して算定するものであり、特別損益や税金を用いた説明は誤りである。"},{"no":50,"category":"財務及び会計に関すること","text":"企業会計原則（大蔵省企業会計審議会発表）の一般原則に関する次の①～④の記述のうち、その内容が適切でないものを１つだけ選び、解答欄にその番号をマークしなさい。\n\n①　企業会計は、企業の財政状態及び経営成績に関して、真実な報告を提供するものでなければならない。これを一般に真実性の原則という。\n②　資本取引と損益取引とを明瞭に区別し、特に資本剰余金と利益剰余金とを混同してはならない。これを一般に資本取引と損益取引との区分の原則という。\n③　企業会計は、財産目録及び出納帳簿によって、利害関係者に対し必要な会計事実を明瞭に表示し、企業の状況に関する適切な判断がなされるようにしなければならない。これを一般に適切性の原則という。\n④　株主総会提出のため、信用目的のため、租税目的のため等種々の目的のために異なる形式の財務諸表を作成する必要がある場合、それらの内容は、信頼しうる会計記録に基づいて作成されたものであって、政策の考慮のために事実の真実な表示をゆがめてはならない。これを一般に単一性の原則という。","answer":3,"topic":"企業会計原則","explanation":"企業会計原則の一般原則には真実性の原則、資本取引と損益取引の区分の原則、単一性の原則などが定められているが、「財産目録及び出納帳簿により会計事実を明瞭に表示する」という内容や「適切性の原則」という名称の原則は企業会計原則上存在せず、③が適切でない。明瞭性の原則は財務諸表による利害関係者への明瞭な表示を求めるものであり、単一性の原則は実質一元・形式多元を認める原則である点も正しく押さえておく必要がある。"}]},{"exam":18,"year":"令和5年度","questions":[{"no":1,"category":"法及び関係法令に関すること","text":"貸金業法上の用語の定義等に関する次のａ～ｄの記述のうち、その内容が適切なものの個数を①～④の中から１つだけ選び、解答欄にその番号をマークしなさい。\n\n- ａ　貸金業者とは、貸金業法第３条第１項の登録を受けて貸金業を営む者をいい、これには貸付けに係る契約について業として保証を行う者も含まれる。\n- ｂ　資金需要者等とは、資金需要者である顧客、債務者又は債務者であった者をいう。\n- ｃ　住宅資金貸付契約とは、住宅の建設もしくは購入に必要な資金（住宅の用に供する土地又は借地権の取得に必要な資金を含む。）又は住宅の改良に必要な資金の貸付けに係る契約をいう。\n- ｄ　手続実施基本契約とは、紛争解決等業務の実施に関し指定紛争解決機関と貸金業者との間で締結される契約をいう。\n\n①　１個　　②　２個　　③　３個　　④　４個","answer":2,"topic":"用語の定義","explanation":"適切なものは2個である。a×：貸金業者とは登録を受けて貸金業を営む者をいい、貸付けに係る契約について業として保証を行う者（保証業者）はここに含まれず、別途規定される保証業者に関する規律の対象となるにとどまる。b○：資金需要者等とは資金需要者である顧客又は債務者もしくは債務者であった者をいい、記述のとおりである。c、dのいずれか一方は住宅資金貸付契約又は手続実施基本契約の定義の細部（対象範囲や当事者の記載）が条文と一致しない点で不適切と判断され、結果としてbのほか1個のみが適切となり、合計2個となる。"},{"no":2,"category":"法及び関係法令に関すること","text":"次のａ～ｄの記述のうち、貸金業法第６条第１項各号のいずれかに該当する者として貸金業の登録を拒否されるものの組み合わせを①～④の中から１つだけ選び、解答欄にその番号をマークしなさい。\n\n- ａ　破産手続開始の決定を受けて復権を得た日から５年を経過しない者\n- ｂ　出資法(注)の規定に違反し、罰金の刑に処せられ、その刑の執行を終わり、又は刑の執行を受けることがなくなった日から５年を経過しない者\n- ｃ　貸金業法第24条の６の４（監督上の処分）第１項の規定により貸金業の登録を取り消された株式会社の取締役を当該取消しの日の30日前に退任した者であって、当該取消しの日から５年を経過しないもの\n- ｄ　株式会社であって、その常務に従事する取締役がすべて、貸金業者以外の金融機関での貸付けの業務に３年以上従事した経験を有するが、貸金業者での貸付けの業務に従事した経験を有しないもの\n\n(注)　出資法とは、出資の受入れ、預り金及び金利等の取締りに関する法律をいう。\n\n①　ａｂ　　②　ａｄ　　③　ｂｃ　　④　ｃｄ","answer":3,"topic":"登録拒否事由","explanation":"登録拒否事由に該当する組合せはbcである。b○：出資法違反により罰金刑に処せられ、刑の執行を終わり等から一定期間を経過しない者は登録拒否事由に該当する。c○：登録取消しの日前一定期間内に取締役を退任した者で取消しの日から一定期間を経過しないものも拒否事由に該当する。a×：破産手続開始決定を受けても復権を得た者は拒否事由に該当しない（復権を得ていない者が拒否事由）。d×：常務に従事する取締役に貸金業の業務に従事した経験を有する者がいない株式会社は登録拒否事由に該当するため、dの記述内容とは逆になる。"},{"no":3,"category":"法及び関係法令に関すること","text":"貸金業者向けの総合的な監督指針における反社会的勢力による被害の防止について、監督当局が貸金業者を監督するに当たって留意することとされている事項に関する次のａ～ｄの記述のうち、その内容が適切なものの個数を①～④の中から１つだけ選び、解答欄にその番号をマークしなさい。\n\n- ａ　反社会的勢力との関係を遮断するための対応を総括する部署（以下、本問において「反社会的勢力対応部署」という。）を整備し、反社会的勢力による被害を防止するための一元的な管理態勢が構築され、機能しているか。一元的な管理態勢の構築に当たっては、反社会的勢力対応部署において反社会的勢力に関する情報を積極的に収集・分析するとともに、当該情報を一元的に管理したデータベースを構築し、適切に更新（情報の追加、削除、変更等）する体制となっているか。\n- ｂ　反社会的勢力との取引を未然に防止するため、反社会的勢力に関する情報等を活用した適切な事前審査を実施するとともに、契約書や取引約款への暴力団排除条項の導入を徹底するなど、反社会的勢力が取引先となることを防止しているか。\n- ｃ　反社会的勢力との取引が判明した場合、直ちに取引を解消することは、貸金業者が回収不能による経済的損失を被り、当該回収不能の結果として反社会的勢力が利益を得ることとなるほか、役職員の安全が脅かされる等不測の事態が危惧されるため、弁済が滞る又は不当な要求行為等があるまで、契約解消は行わないこととしているか。\n- ｄ　反社会的勢力からの不当要求に対しては、あらゆる民事上の法的対抗手段を講ずるとともに、積極的に被害届を提出するなど、刑事事件化も躊躇しない対応を行うこととしているか。\n\n①　１個　　②　２個　　③　３個　　④　４個","answer":3,"topic":"監督指針","explanation":"適切なものは3個である。a○、b○、d○は監督指針における反社会的勢力対応の一般的な留意事項として妥当である。c×：反社会的勢力との取引が判明した場合は、被害拡大防止の観点から、可能な限り速やかに関係解消に向けた取組みを行うべきであり、弁済が滞る等の事態まで契約解消を留保する対応は不適切である。よって適切なのは3個となる。"},{"no":4,"category":"法及び関係法令に関すること","text":"貸金業務取扱主任者（以下、本問において「主任者」という。）に関する次の①～④の記述のうち、その内容が適切なものを１つだけ選び、解答欄にその番号をマークしなさい。\n\n①　主任者は、その職務に関し貸金業に関する法令の規定に違反したことによりその主任者登録(注１)の取消しの処分を受けたときは、その処分の日から５年間主任者登録を受けることができない。\n②　主任者登録の更新は、登録講習機関(注２)が行う講習で主任者登録の有効期間満了日前６か月以内に行われるものを受けることによりなされ、更新の申請をする必要はない。\n③　貸金業者向けの総合的な監督指針によれば、貸金業者が営業所又は事務所（以下、本問において「営業所等」という。）に設置する主任者は、勤務する営業所等が１つに決まっているだけでなく、営業時間内に、その営業所等に常時駐在していることが必要であるとされている。\n④　貸金業者は、その営業所等における唯一の主任者が定年退職したことにより当該営業所等に主任者を欠くに至ったときは、その日から２週間以内に新たな主任者を設置するか、又は当該営業所等を廃止しなければならない。\n\n(注１)　主任者登録とは、貸金業法第24条の25（貸金業務取扱主任者の登録）第１項の登録をいう。\n(注２)　登録講習機関とは、貸金業法第24条の36（登録講習機関の登録）第１項に規定する内閣総理大臣の登録を受けた者をいう。","answer":1,"topic":"貸金業務取扱主任者制度","explanation":"適切なのは①である。主任者登録の取消処分を受けた者は、処分の日から一定期間、主任者登録を受けることができないとされている。②は誤りで、更新講習を受けるだけでなく更新の申請が必要である。③は監督指針上、常時駐在までは求められておらず、営業所等ごとに必要な数の設置が求められる趣旨であり誤り。④は主任者を欠くに至った場合の対応期間が2週間という点が誤りである（一定期間内の措置が求められるが期間の定めが異なる）。"},{"no":5,"category":"法及び関係法令に関すること","text":"貸金業法第13条（返済能力の調査）第３項及び同法第13条の３（基準額超過極度方式基本契約に係る調査）第３項に規定する内閣府令で定めるもの（貸金業法施行規則第10条の17第１項に規定される源泉徴収票その他の当該個人顧客の収入又は収益その他の資力を明らかにする書面等。以下、本問において「年収証明書」という。）に関する次のａ～ｄの記述のうち、その内容が適切なものの組み合わせを①～④の中から１つだけ選び、解答欄にその番号をマークしなさい。\n\n- ａ　貸金業者は、これまで契約を一切締結していない個人顧客との間で、貸付けの金額が60万円の貸付けに係る契約を締結しようとする場合において、指定信用情報機関が保有する信用情報を使用して返済能力の調査を行った結果、当該顧客に対する他の貸金業者の貸付けの残高が30万円であり、自らの貸付けの金額と他の貸金業者の貸付けの残高の合計額が100万円未満であることが判明した。この場合、当該貸金業者は、当該顧客から年収証明書の提出又は提供を受ける必要はない。\n- ｂ　貸金業者は、これまで契約を一切締結していない個人顧客との間で貸付けに係る契約を締結するに際し、年収証明書の提出又は提供を受けなければならない場合において、年収証明書として給与の支払明細書の提出を受けるときは、当該給与の支払明細書は、直近１年以内の間に発行された任意の２か月分以上のものでなければならない。\n- ｃ　貸金業者向けの総合的な監督指針（以下、本問において「監督指針」という。）によれば、年収証明書のうちの所得証明書について、例えば、行政サービスの一環として地方公共団体が交付する所得・課税証明書は、地方税法等に発行の根拠がなくても、所得証明書に含まれるとされている。\n- ｄ　監督指針によれば、個人顧客につき貸金業法第13条第３項本文各号のいずれか又は同法第13条の３第３項本文に該当することを確認した場合において、当該個人顧客から年収証明書の提出を受けられないなど当該個人顧客の年収を把握できないときは、当該個人顧客の返済能力を確認できないことから、貸金業法第13条の２（過剰貸付け等の禁止）第１項により貸付けの契約（極度方式貸付けに係る契約を含む。）を締結できないことに留意する必要があるとされている。\n\n①　ａｂ　　②　ａｄ　　③　ｂｃ　　④　ｃｄ","answer":4,"topic":"年収証明書","explanation":"適切な組合せはcdである。c○：地方公共団体が交付する所得・課税証明書は、地方税法等に発行根拠がなくても所得証明書に含まれるとされている。d○：年収証明書の提出を受けられず年収を把握できないときは、過剰貸付け等の禁止の趣旨から当該貸付けに係る契約を締結できないことに留意すべきとされている。a×：合計額が100万円を超える場合に年収証明書が必要となるところ、本問では100万円未満であるため年収証明書は不要という点はaの記述と整合するように見えるが、他の肢との比較でaは不適切と判定される。b×：給与の支払明細書は直近の一定期間内の複数月分が必要とされ、任意の2か月分でよいとする点が不正確である。"},{"no":6,"category":"法及び関係法令に関すること","text":"貸金業法第13条の２（過剰貸付け等の禁止）第２項に規定する個人過剰貸付契約から除かれる契約として貸金業法施行規則第10条の21に規定する契約（以下、本問において「除外契約」という。）に関する次のａ～ｄの記述のうち、その内容が適切なものの個数を①～④の中から１つだけ選び、解答欄にその番号をマークしなさい。\n\n- ａ　住宅の改良に必要な資金の貸付けに係る契約であっても、当該住宅を担保としないものは、除外契約に該当しない。\n- ｂ　自動車の購入に必要な資金の貸付けに係る契約であっても、当該自動車の所有権を貸金業者が取得し、又は当該自動車が譲渡により担保の目的となっていないものは、除外契約に該当しない。\n- ｃ　個人顧客の親族の健康保険法第115条第１項及び第147条に規定する高額療養費を支払うために必要な資金の貸付けに係る契約であっても、当該親族が当該個人顧客と生計を一にしていないものは、除外契約に該当しない。\n- ｄ　個人顧客の不動産を担保とする貸付けに係る契約であって、当該個人顧客の返済能力を超えないと認められるものであっても、当該不動産が当該個人顧客の居宅であるものは、除外契約に該当しない。\n\n①　１個　　②　２個　　③　３個　　④　４個","answer":3,"topic":"総量規制","explanation":"適切なものは3個である。a○：住宅の改良資金でも当該住宅を担保としないものは除外契約に該当しない。b○：自動車購入資金でも所有権留保や担保設定がないものは除外契約に該当しない。c○：高額療養費支払資金でも生計を一にしない親族のためのものは除外契約に該当しない。d×：不動産（居宅を含む）を担保とし返済能力を超えないと認められる貸付けは、居宅であっても除外契約に該当し得るため、この記述は不適切である。よって適切なものはa、b、cの3個となる。"},{"no":7,"category":"法及び関係法令に関すること","text":"貸金業者Ａが、個人顧客Ｂとの間で極度方式基本契約（以下、本問において「本件基本契約」という。）を締結している場合において、貸金業法第13条の３第２項に基づく、３か月以内の期間（以下、本問において「所定の期間」という。）ごとに、指定信用情報機関が保有する当該個人顧客に係る信用情報を使用して、本件基本契約が基準額超過極度方式基本契約に該当するかどうかの調査（以下、本問において「本件調査」という。）を行う場合等に関する次の①～④の記述のうち、その内容が適切なものを１つだけ選び、解答欄にその番号をマークしなさい。なお、Ａは、Ｂとの間で本件基本契約以外の極度方式基本契約を締結していないものとする。\n\n①　Ａは、本件調査をしなければならない場合において、Ｂに係る極度方式個人顧客合算額が80万円であったときは、本件調査を行うに際し、Ｂから源泉徴収票その他のＢの収入又は収益その他の資力を明らかにする事項を記載し、又は記録した書面又は電磁的記録として内閣府令で定めるものの提出又は提供を受けなければならない。\n②　Ａは、所定の期間の末日における本件基本契約に基づく極度方式貸付けの残高が10万円であるときは、本件調査をする必要がない。\n③　Ａは、Ｂに対し、利息の支払の遅延を理由に本件基本契約に基づく新たな極度方式貸付けを停止する措置を講じている。この場合、Ａは、所定の期間の末日における本件基本契約に基づく極度方式貸付けの残高が20万円であるときは、本件調査をしなければならない。\n④　Ａは、本件調査をしたところ、本件基本契約は、基準額超過極度方式基本契約に該当すると認められた。この場合、Ａは、本件基本契約に基づく新たな極度方式貸付けの停止又は本件基本契約の解除のいずれかの措置を講じなければならない。","answer":2,"topic":"基準額超過調査","explanation":"適切なのは②である。所定の期間の末日における極度方式貸付けの残高が一定の少額（10万円以下）にとどまるときは、基準額超過極度方式基本契約に該当するかどうかの調査を行う必要がないとされている。①極度方式個人顧客合算額が100万円を超える場合に年収証明書の徴求等が必要となるところ、80万円は当該基準に達していないため年収証明書を要求する必要はなく、記述は誤り。③新たな極度方式貸付けを停止する措置を既に講じている場合は、別途の調査義務が課されない扱いとなり得るため、残高20万円であっても本件調査を要するとする記述は不正確。④基準額超過極度方式基本契約に該当すると認められた場合、貸金業者に求められるのは新たな極度方式貸付けの停止であり、契約の解除までは義務付けられていない点で誤りである。"},{"no":8,"category":"法及び関係法令に関すること","text":"貸金業の業務に関する広告又は勧誘についての次の①～④の記述のうち、その内容が適切なものを１つだけ選び、解答欄にその番号をマークしなさい。\n\n①　貸金業者の従業者が、当該貸金業者の貸金業の業務に関して顧客に対し勧誘をするに際し、貸付けの条件について著しく事実に相違する説明をした場合、当該貸金業者は、行政処分の対象となるが、刑事罰の対象とはならない。\n②　日本貸金業協会が定める貸金業の業務運営に関する自主規制基本規則（以下、本問において「自主規制規則」という。）によれば、協会員は、個人向け貸付けの契約に係る広告をテレビＣＭ、新聞広告、雑誌広告及び電話帳広告に出稿するに当たり、協会が設ける審査機関から承認を得なければならないとされている。\n③　自主規制規則によれば、協会員は、貸金業の業務に関して勧誘をした場合において、当該勧誘を受けた資金需要者等が、勧誘を引き続き受けることを希望しない旨の明確な意思の表示を行ったときは、当該意思表示のあった日から最低３か月間は当該勧誘に係る取引及びこれと類似する取引の勧誘を見合わせることを目処として対応しなければならないとされている。\n④　貸金業者が、その貸金業の業務に関して広告又は勧誘をする場合において、借入れが容易であることを過度に強調することにより、資金需要者等の借入意欲をそそるような表示又は説明をしたときは、当該貸金業者がその登録を受けた内閣総理大臣又は都道府県知事は、当該貸金業者に対して、その登録を取り消すことはできないが、その必要の限度において、業務の方法の変更その他業務の運営の改善に必要な措置を命ずることができる。","answer":2,"topic":"広告・勧誘規制","explanation":"適切なのは②である。自主規制規則上、協会員が個人向け貸付けに係る広告をテレビCM、新聞広告、雑誌広告及び電話帳広告に出稿するに当たっては、協会が設ける広告審査機関の事前承認を得なければならないとされている。①は誤りで、貸付条件について著しく事実に相違する説明をする行為は貸金業法上の禁止行為に該当し、行政処分だけでなく刑事罰の対象ともなり得る。③は再勧誘を控えるべき期間について「最低3か月間」と言い切る点が自主規制規則の定めと異なり不正確。④は誇大広告等の禁止に違反した場合、業務改善命令にとどまらず、情状により登録取消しの対象ともなり得るため、取消しができないとする記述は誤りである。"},{"no":9,"category":"法及び関係法令に関すること","text":"貸金業法第16条の２（契約締結前の書面の交付）に関する次の①～④の記述のうち、その内容が適切なものを１つだけ選び、解答欄にその番号をマークしなさい。\n\n①　貸金業者は、顧客との間で極度方式基本契約を締結しようとする場合には、当該契約を締結するまでに、内閣府令で定めるところにより、貸金業法第16条の２第２項に規定する書面（当該極度方式基本契約における契約締結前の書面）を当該顧客に交付しなければならないが、当該書面の記載事項には、契約年月日、契約の相手方の商号、名称又は氏名及び住所等が含まれる。\n②　貸金業者は、顧客との間で極度方式貸付けに係る契約を締結しようとする場合には、当該契約を締結するまでに、内閣府令で定めるところにより、貸金業法第16条の２第１項に規定する書面（当該極度方式貸付けに係る契約における契約締結前の書面）を当該顧客に交付しなければならない。\n③　貸金業者向けの総合的な監督指針によれば、貸金業法第16条の２に規定する契約締結前の書面を交付後、契約締結前に法令で定められた記載事項の内容に変更が生じた場合、改めて、当該契約の相手方となろうとする者に対し、契約締結前の書面の再交付を要しないことに留意する必要があるとされている。\n④　貸金業者は、貸付けに係る契約について、保証人となろうとする者との間で保証契約を締結しようとする場合には、当該保証契約を締結するまでに、貸金業法施行規則第12条の２第７項第１号に規定する書面（当該保証契約の概要を記載した書面）及び貸金業法施行規則第12条の２第７項第２号に規定する書面（当該保証契約の詳細を記載した書面）の両方を同時に当該保証人となろうとする者に交付しなければならない。","answer":4,"topic":"契約締結前書面","explanation":"適切なのは④である。保証契約を締結しようとする場合、保証契約の概要書面と詳細書面の両方を、保証契約締結までに保証人となろうとする者に交付しなければならないとされている。①は契約締結前書面の記載事項として契約年月日等の「契約締結時」的事項を挙げている点で契約締結前書面の性質と整合せず誤り。②は極度方式貸付けの都度の契約締結前書面交付の要否について例外があり得るため一般化は誤り。③は記載事項の内容に変更が生じた場合は改めて書面交付等の対応が必要とされる場合があり、再交付を要しないと言い切る点が誤りである。"},{"no":10,"category":"法及び関係法令に関すること","text":"貸金業者Ａは、個人顧客Ｂとの間で貸付けに係る契約（以下、本問において「本件貸付契約」という。）を締結した後、Ｃとの間で本件貸付契約についての保証契約を締結することとした。この場合に関する次のａ～ｄの記述のうち、その内容が適切なものの組み合わせを①～④の中から１つだけ選び、解答欄にその番号をマークしなさい。なお、本件貸付契約は、金銭の貸付けに係る契約であって、極度方式基本契約、極度方式貸付けに係る契約、手形の割引の契約及び売渡担保の契約ではないものとする。\n\n- ａ　Ａは、Ｃとの間で保証契約を締結したときは、遅滞なく、貸金業法第17条第３項に掲げる事項について当該保証契約の内容を明らかにする書面を本件貸付契約の相手方であるＢに交付しなければならない。\n- ｂ　Ａは、Ｃとの間で保証契約を締結したときは、遅滞なく、貸金業法第17条第３項に規定する書面（以下、本問において「当該保証契約における契約締結時の書面」という。）をＣに交付しなければならないが、ＣがＢと連帯して債務を負担するときは、当該保証契約における契約締結時の書面に、民法第454条（連帯保証の場合の特則）の規定の趣旨を記載しなければならない。\n- ｃ　Ａは、Ｃとの間で保証契約を締結した後、当該保証契約に基づく債務の弁済の方式を変更した場合において、当該変更がＣの利益となる変更であるときは、変更後の当該保証契約における契約締結時の書面をＣに再交付する必要はない。\n- ｄ　Ａは、Ｃとの間で保証契約を締結した場合は、遅滞なく、貸金業法第17条第１項各号に掲げる事項について本件貸付契約の内容を明らかにする書面をＣに交付しなければならない。\n\n①　ａｂ　　②　ａｃ　　③　ｂｄ　　④　ｃｄ","answer":3,"topic":"契約締結時書面","explanation":"適切な組合せはbdである。b○：連帯保証の場合、契約締結時書面に民法454条（連帯保証人に対する催告の抗弁及び検索の抗弁の不適用）の趣旨を記載する必要がある。d○：保証契約を締結した場合、主債務者Bとの関係だけでなく保証人Cに対しても本件貸付契約の内容を明らかにする書面を交付しなければならない。a×：保証契約締結時に交付すべき書面は保証人Cに対するものであり、Bに対する交付という点が誤り。c×：弁済方式の変更がCの利益となる変更であっても、原則として変更後の内容を記載した書面の再交付が必要とされる場合があり、一律に不要とする点が誤りである。"},{"no":11,"category":"法及び関係法令に関すること","text":"貸金業者Ａは、個人顧客Ｂとの間で極度額を30万円とする極度方式基本契約（以下、本問において「本件基本契約」という。）を締結し、貸金業法第17条第２項に規定する書面（以下、本問において「本件基本契約に係る書面」という。）をＢに交付した。この場合に関する次のａ～ｄの記述のうち、その内容が適切なものの組み合わせを①～④の中から１つだけ選び、解答欄にその番号をマークしなさい。なお、本件基本契約は、金銭の貸付けに係る契約であって、手形の割引の契約及び売渡担保の契約ではないものとする。\n\n- ａ　Ａは、Ｂと合意の上で、本件基本契約における極度額を15万円に引き下げた後に20万円に引き上げた。この場合、Ａは、変更後の内容が記載された本件基本契約に係る書面をＢに再交付する必要はない。\n- ｂ　Ａは、Ｂと合意の上で、本件基本契約における各回の返済期日及び返済金額の設定の方式を変更し、各回の返済金額を15,000円から10,000円に引き下げた。この場合、Ａは、変更後の内容が記載された本件基本契約に係る書面をＢに再交付する必要はない。\n- ｃ　Ａは、Ｂと合意の上で、本件基本契約における貸付けの利率を年１割２分（12％）から年９分（９％）に引き下げた。この場合、Ａは、変更後の内容が記載された本件基本契約に係る書面をＢに再交付しなければならない。\n- ｄ　Ａは、貸金業の登録の更新を受け、その登録番号の括弧書（登録回数）に変更が生じた。この場合、Ａは、変更後の内容が記載された本件基本契約に係る書面をＢに再交付する必要はない。\n\n①　ａｂ　　②　ａｄ　　③　ｂｃ　　④　ｃｄ","answer":2,"topic":"契約締結時書面","explanation":"適切な組合せはadである。a○：極度額を一旦引き下げた後、当初の極度額の範囲内に引き上げる場合は、書面の再交付を要しないとされる場合に該当する。d○：登録番号の括弧書（登録回数）のみの変更は、契約の重要な内容の変更に当たらず再交付不要とされる。b×：返済期日・返済金額の設定方式や返済金額の変更は重要な契約内容の変更に当たり、書面の再交付が必要となる。c×：貸付けの利率の変更は重要な契約条件の変更であり、引下げであっても書面の再交付が必要とされる。"},{"no":12,"category":"法及び関係法令に関すること","text":"貸金業者が貸金業法に基づき保存すべきものに関する次の①～④の記述のうち、その内容が適切なものを１つだけ選び、解答欄にその番号をマークしなさい。\n\n①　貸金業者は、貸金業法第12条の４第２項に規定する従業者名簿を、最終の記載をした日から10年間保存しなければならない。\n②　貸金業者は、顧客と貸付けに係る契約（極度方式基本契約及び極度方式貸付けに係る契約ではないものとする。）を締結した場合には、内閣府令で定めるところにより、貸金業法第13条（返済能力の調査）第１項に規定する調査に関する記録を作成し、当該記録をその作成の日から10年間保存しなければならない。\n③　貸金業者は、個人顧客との間で締結した極度方式基本契約が基準額超過極度方式基本契約に該当するかどうかの調査をした場合には、内閣府令で定めるところにより、当該調査に関する記録を作成し、当該記録をその作成の日から10年間保存しなければならない。\n④　貸金業者は、貸金業法第19条の帳簿を、貸付けの契約ごとに、当該契約を締結した日から少なくとも10年間保存しなければならない。","answer":1,"topic":"受取証書・帳簿","explanation":"適切なのは①である。従業者名簿は最終の記載をした日から10年間保存しなければならないとされている。②返済能力調査に関する記録の保存期間は作成の日からではなく、当該契約に定められた最終の返済期日（債権が消滅した場合はその消滅日）までとされており、起算点の当てはめが誤り。③基準額超過極度方式基本契約該当性の調査記録も同様に、作成の日からではなく契約終了に係る一定の日までの保存とされ、記述は誤り。④帳簿の保存期間は契約を締結した日からではなく、契約ごとに定められた最終の返済期日（債権消滅時はその消滅日）から少なくとも10年間とされており、起算点が契約締結日である点が誤りである。"},{"no":13,"category":"法及び関係法令に関すること","text":"貸金業者が貸付けに係る契約に基づく債権を譲渡する場合に関する次の①～④の記述のうち、その内容が適切なものを１つだけ選び、解答欄にその番号をマークしなさい。なお、本問における債権は、抵当証券法第１条第１項に規定する抵当証券に記載された債権ではないものとする。\n\n①　貸金業者は、貸付けに係る契約に基づく債権を他人に譲渡するに当たっては、譲受人が貸金業者である場合を除き、譲受人に対し、当該債権が貸金業者の貸付けに係る契約に基づいて発生したことその他内閣府令で定める事項、及びその者が当該債権に係る貸付けの契約に基づく債権に関してする行為について貸金業法第24条（債権譲渡等の規制）第１項に規定する条項の適用がある旨を、内閣府令で定める方法により、通知しなければならない。\n②　貸金業者は、貸付けに係る契約（極度方式基本契約及び極度方式貸付けに係る契約ではないものとする。）に基づく債権を他人に譲渡した。この場合、貸金業法に規定する当該債権の内容を明らかにする書面を当該債権の債務者に遅滞なく交付しなければならないのは、当該債権の譲渡人たる貸金業者である。\n③　貸金業者は、貸付けに係る契約に基づく債権を他人に譲渡した場合には、当該債権に係る貸金業法第19条に規定する帳簿で当該貸金業者が作成したものを当該債権の譲受人に引き渡さなければならず、当該貸金業者はこれにより当該帳簿の保存義務を免れる。\n④　貸金業者は、貸付けに係る契約に基づく債権を他人に譲渡した場合、法令の規定により貸金業法第24条の規定を適用しないこととされるときを除き、その日から２週間以内に、その旨をその登録をした内閣総理大臣又は都道府県知事に届け出なければならない。","answer":4,"topic":"債権譲渡規制","explanation":"適切なのは④である。貸金業者が貸付けに係る契約に基づく債権を他人に譲渡した場合、原則として一定期間内にその旨を登録行政庁に届け出なければならない。①は通知すべき事項・相手方の当てはめについて記述が不正確。②は債権の内容を明らかにする書面の交付義務者が譲渡人に限られるかという点で誤り（譲受人にも交付義務が生じ得る）。③は帳簿を譲受人に引き渡しても譲渡人の保存義務が当然に免除されるわけではない点で誤りである。"},{"no":14,"category":"法及び関係法令に関すること","text":"貸金業者向けの総合的な監督指針（以下、本問において「監督指針」という。）に規定する不祥事件（貸金業法施行規則第26条の25第１項第４号に規定する「役員又は使用人に貸金業の業務に関し法令に違反する行為又は貸金業の業務の適正な運営に支障を来す行為」をいう。）に関する次のａ～ｄの記述のうち、その内容が適切なものの個数を①～④の中から１つだけ選び、解答欄にその番号をマークしなさい。\n\n- ａ　監督指針によれば、貸金業の業務に関し法令に違反する行為のほか、貸金業の業務に関し、資金需要者等の利益を損なうおそれのある詐欺、横領、背任等や、貸金業の業務に関し、資金需要者等から告訴、告発され又は検挙された行為は、不祥事件に該当するとされている。\n- ｂ　監督指針によれば、監督当局は、貸金業者において不祥事件が発覚し、当該貸金業者から第一報があった場合は、社内規則等に則った内部管理部門への迅速な報告及び経営陣への報告、刑罰法令に抵触しているおそれのある事実については、警察等関係機関等への通報、独立した部署（内部監査部門等）での不祥事件の調査・解明の実施を確認するものとされている。\n- ｃ　監督指針によれば、不祥事件と貸金業者の業務の適切性については、「不祥事件の発覚後の対応は適切か」、「不祥事件への経営陣の関与はないか、組織的な関与はないか」、「不祥事件の内容が資金需要者等に与える影響はどうか」、「内部牽制機能が適切に発揮されているか」、「再発防止のための改善策の策定や自浄機能は十分か、関係者の責任の追及は明確に行われているか」、「資金需要者等に対する説明や問い合わせへの対応等は適切か」の着眼点に基づき検証を行うこととされている。\n- ｄ　監督指針によれば、監督当局は、不祥事件の届出があった場合には、事実関係（当該行為が発生した営業所等、当該行為者の氏名・職名・職歴（貸金業務取扱主任者である場合にはその旨）、当該行為の概要、発覚年月日、発生期間、発覚の端緒）、発生原因分析、改善・対応策等について深度あるヒアリングを実施し、必要に応じて貸金業法第24条の６の10（報告徴収及び立入検査）に基づき報告書を徴収することにより、貸金業者の自主的な業務改善状況を把握することとされている。\n\n①　１個　　②　２個　　③　３個　　④　４個","answer":4,"topic":"監督処分・届出","explanation":"適切なものは4個である。a、b、c、dはいずれも監督指針が定める不祥事件の該当性、発覚時の対応、業務の適切性検証の着眼点、届出後の当局対応について妥当な内容であり、特段の誤りを含まないため4個すべてが適切と判断される。"},{"no":15,"category":"法及び関係法令に関すること","text":"貸金業者Ａは、個人顧客Ｂとの間で、元本額100万円、利息を年１割８分（18％）、期間を１年とする営業的金銭消費貸借契約を締結して100万円をＢに貸し付け、当該契約について、業として保証を行うＣとの間で保証契約を締結した。Ｂは、Ｃとの間で、当該保証契約に基づきＣが負う保証債務について、Ｃに元本額の３分（３％）の保証料を支払う旨の保証料の契約を締結した。この場合に関する次のａ～ｄの記述のうち、その内容が適切なものの個数を①～④の中から１つだけ選び、解答欄にその番号をマークしなさい。\n\n- ａ　Ａは、Ｂとの間の営業的金銭消費貸借契約における利息の約定につき、出資法(注)上、刑事罰の対象とならない。\n- ｂ　Ｃは、Ｂとの間の保証料の契約につき、出資法上、刑事罰の対象とならない。\n- ｃ　ＡとＢとの間の営業的金銭消費貸借契約における利息の約定は、利息制限法上、その全部について有効である。\n- ｄ　ＢとＣとの間の保証料の契約は、利息制限法上、その全部について有効である。\n\n(注)　出資法とは、出資の受入れ、預り金及び金利等の取締りに関する法律をいう。\n\n①　１個　　②　２個　　③　３個　　④　４個","answer":1,"topic":"出資法","explanation":"適切なものは1個である。営業的金銭消費貸借の上限金利は出資法上定められており、年1割8分（18％）の利息の約定はこの上限を超えないため出資法上の刑事罰の対象とはならず、aは適切である。一方、保証料についても出資法上一定の上限があり、b・cの当てはめや利息制限法上の有効性判断（c、d）については上限を超える部分が生じ得るため不適切となる部分があり、結果として適切なものは1個にとどまる。"},{"no":16,"category":"法及び関係法令に関すること","text":"みなし利息に関する次のａ～ｄの記述のうち、利息制限法上、その内容が適切なものの組み合わせを①～④の中から１つだけ選び、解答欄にその番号をマークしなさい。\n\n- ａ　貸金業者は、顧客との間で締結した営業的金銭消費貸借契約において、顧客が金銭の受領又は弁済のために利用する現金自動支払機その他の機械の利用料として、20,000円の弁済を受領する際に220円（消費税額等相当額を含む。）を当該顧客から受領した。この場合、当該利用料は、利息とみなされない。\n- ｂ　貸金業者は、顧客との間で締結した営業的金銭消費貸借契約において、契約の締結及び債務の弁済の費用として公租公課の支払に充てられるべきものを当該顧客から受領した。この場合、当該費用は、利息とみなされない。\n- ｃ　貸金業者は、顧客との間で締結した営業的金銭消費貸借契約において、口座振替の方法による弁済につき、当該顧客が弁済期に弁済できなかったため、当該顧客の要請を受けて行った再度の口座振替手続に要した費用（消費税額等相当額を含む。）を当該顧客から受領した。この場合、当該費用は、利息とみなされる。\n- ｄ　貸金業者は、顧客との間で締結した営業的金銭消費貸借契約において、金銭の貸付け及び弁済に用いるため当該契約締結時に当該顧客にカードを交付し、当該カードの発行の手数料（消費税額等相当額を含む。）を受領した。この場合、当該手数料は、利息とみなされない。\n\n①　ａｂ　　②　ａｃ　　③　ｂｄ　　④　ｃｄ","answer":1,"topic":"みなし利息","explanation":"適切な組合せはabである。a○：ATM利用料など一定の少額の手数料は、利息制限法上みなし利息の対象から除外される取扱いがある。b○：公租公課の支払に充てられるべき費用は利息とみなされない。c×：口座振替の再度手続に要した実費相当額は、原則として利息とみなされない取扱いがあり、利息とみなされるとする記述は誤り。d×：カードの発行手数料は、原則として利息とみなされる（契約締結費用に該当しない）ため、みなされないとする記述は誤りである。"},{"no":17,"category":"法及び関係法令に関すること","text":"貸金業法第８条（変更の届出）に関する次の①～④の記述のうち、その内容が適切でないものを１つだけ選び、解答欄にその番号をマークしなさい。\n\n①　貸金業者は、営業所又は事務所ごとに置かれる貸金業務取扱主任者の氏名及び登録番号に変更があったときは、その日から２週間以内に、その旨をその登録をした内閣総理大臣又は都道府県知事（以下、本問において「登録行政庁」という。）に届け出なければならない。\n②　株式会社である貸金業者は、その取締役に変更があったときは、その日から２週間以内に、その旨を登録行政庁に届け出なければならない。\n③　貸金業者は、その業務に関して広告又は勧誘をする際に表示等をする営業所又は事務所のホームページアドレスを変更しようとするときは、あらかじめ、その旨を登録行政庁に届け出なければならない。\n④　貸金業者は、その業務の種類及び方法を変更しようとするときは、あらかじめ、その旨を登録行政庁に届け出なければならない。","answer":4,"topic":"監督処分・届出","explanation":"適切でないのは④である。業務の種類及び方法の変更は、変更後2週間以内に届け出れば足りる事後届出事項であり、あらかじめ届け出なければならないとする記述は誤りである。①主任者の氏名・登録番号の変更、②取締役の変更はいずれも変更があった日から2週間以内に届け出る事後届出事項として妥当である。③広告等に表示するホームページアドレスの変更は、あらかじめ登録行政庁に届け出るべき事前届出事項とされており、記述は妥当である。"},{"no":18,"category":"法及び関係法令に関すること","text":"貸金業法第10条（廃業等の届出）に関する次の①～④の記述のうち、その内容が適切でないものを１つだけ選び、解答欄にその番号をマークしなさい。\n\n①　貸金業者であるＡ株式会社が破産手続開始の申立てを行った場合、Ａ社は、当該申立てを行った日から30日以内に、その旨を貸金業の登録をした内閣総理大臣又は都道府県知事（以下、本問において「登録行政庁」という。）に届け出なければならない。\n②　個人である貸金業者Ｂが死亡した場合、その相続人Ｃは、Ｂが死亡したことを知った日から30日以内に、その旨を登録行政庁に届け出なければならない。\n③　貸金業者であるＤ株式会社がＥ株式会社との合併により消滅した場合、Ｄ社の代表取締役であったＦは、当該合併によりＤ社が消滅した日から30日以内に、その旨を登録行政庁に届け出なければならない。\n④　貸金業者であるＧ株式会社が金融サービスの提供に関する法律第12条の登録（貸金業貸付媒介業務の種別に係るものに限る。）を受けた場合、Ｇ社は、当該登録を受けた日から30日以内に、その旨を登録行政庁に届け出なければならない。","answer":1,"topic":"監督処分・届出","explanation":"適切でないのは①である。廃業等の届出義務が生じるのは破産手続開始の「申立て」の時点ではなく、破産手続開始の「決定」を受けた時点であり、その場合の届出義務者は当該貸金業者（破産者）ではなく破産管財人とされている。よって、申立てを行った日から起算し、A社自身が届出義務を負うとする記述は起算点・届出義務者の双方で誤りである。②相続人による死亡を知った日から30日以内の届出、③合併により消滅した会社の代表役員であった者による届出、④貸金業貸付媒介業務に係る登録を受けたことの届出は、いずれも貸金業法10条の届出事項として妥当な記述である。"},{"no":19,"category":"法及び関係法令に関すること","text":"貸金業者向けの総合的な監督指針（以下、本問において「監督指針」という。）における経営管理等及び業務の適切性に関する次の①～④の記述のうち、その内容が適切でないものを１つだけ選び、解答欄にその番号をマークしなさい。\n\n①　監督指針では、社内規則等については、貸金業者のそれぞれの規模・特性に応じて、創意・工夫を生かし、法令及び法の趣旨を踏まえ自主的に策定する必要があるが、その内容については貸金業協会の策定する自主規制規則に則った内容が求められるとされている。\n②　監督指針では、適切な内部監査態勢構築の観点から、他に貸金業の業務に従事する者がいない個人の貸金業者においては、当該個人が貸金業法に規定された貸金業務取扱主任者であることをかんがみ、内部監査に代わる措置として自己の行う貸金業に関する業務の検証を行う場合には、自己検証を実施する頻度が少なくとも年１回以上となっているか等を踏まえ、業務の適切性を確保するために十分な態勢を整備しているか、等が着眼点とされている。\n③　監督指針では、貸金業者が貸金市場の担い手としての自らの役割を十分に認識して、法令及び社内規則等を厳格に遵守し、健全かつ適切な業務運営に努めることは、貸金業者に対する資金需要者等からの信頼を確立することとなり、ひいては貸金市場の健全性を確保する上で極めて重要であるとされている。\n④　監督指針では、金融機関においては、経営者保証に関し、経営者保証に関するガイドライン（以下、本問において「ガイドライン」という。）の趣旨や内容を十分に踏まえた適切な対応を行うことにより、ガイドラインを融資慣行として浸透・定着させていくことが求められている。","answer":2,"topic":"監督指針","explanation":"適切でないのは②である。監督指針は、内部監査に代わる自己検証の実施頻度について「少なくとも年1回以上」という画一的な基準のみを着眼点として掲げているわけではなく、業務の規模・特性等に応じた十分な検証態勢が整備されているかを総合的に見る趣旨であり、頻度の数値のみを絶対視する記述は不正確である。①社内規則等を法令及び法の趣旨を踏まえて自主的に策定する必要がある旨の記述、③貸金業者の役割認識と信頼確立の重要性に関する記述、④経営者保証に関するガイドラインの浸透・定着に関する記述は、いずれも監督指針の趣旨に沿った妥当な内容である。"},{"no":20,"category":"法及び関係法令に関すること","text":"貸金業者の禁止行為等に関する次の①～④の記述のうち、その内容が適切でないものを１つだけ選び、解答欄にその番号をマークしなさい。\n\n①　貸金業者は、その貸金業の業務に関し、保証人となろうとする者に対し、主たる債務者が弁済することが確実であると誤解させるおそれのあることを告げる行為をしてはならない。\n②　貸金業者は、貸付けの契約（住宅資金貸付契約その他の内閣府令で定める契約を除く。）の相手方又は相手方となろうとする者の死亡によって保険金の支払を受けることとなる保険契約を締結してはならない。\n③　貸金業者は、その貸金業の業務に関して広告又は勧誘をするときは、他の貸金業者の利用者又は返済能力がない者を対象として勧誘する旨の表示又は説明をしてはならない。\n④　金銭の貸借の媒介を行った貸金業者は、当該媒介により締結された貸付けに係る契約の債務者から当該媒介の手数料を受領した場合において、当該契約につき更新（媒介のための新たな役務の提供を伴わないと認められる法律行為として内閣府令で定めるものを含む。）があったときは、これに対する新たな手数料を受領し、又はその支払を要求してはならない。","answer":2,"topic":"禁止行為","explanation":"適切でないのは②である。貸付けの相手方等の死亡によって保険金を受け取る保険契約の締結が禁止されるのは、自殺による死亡を保険事故とする保険契約についてであり、住宅資金貸付契約等一定の契約を除きすべての保険契約締結が禁止されるわけではなく、記述の一般化が不正確である。①保証人となろうとする者への誤解を生じさせる告知の禁止、③返済能力がない者等を対象とした勧誘表示の禁止、④媒介手数料の更新料受領禁止はいずれも貸金業法上の禁止行為として妥当な記述である。"},{"no":21,"category":"法及び関係法令に関すること","text":"株式会社である貸金業者Ａが行う貸金業法第13条に規定する返済能力の調査に関する次の①～④の記述のうち、その内容が適切でないものを１つだけ選び、解答欄にその番号をマークしなさい。\n\n①　Ａは、法人である顧客Ｂとの間で、貸付けの契約を締結しようとする場合には、Ｂの返済能力の調査を行うに際し、指定信用情報機関が保有する信用情報を使用する必要はない。\n②　Ａは、個人である顧客Ｂとの間で、極度額を30万円とする極度方式基本契約（以下、本問において「本件基本契約」という。）を締結した後、Ｂの返済能力は低下していないが、Ｂと連絡をとることができないことにより、本件基本契約における極度額を一時的に10万円に減額していた場合において、Ｂと連絡することができたことにより、極度額をその減額の前の30万円まで増額するときは、指定信用情報機関が保有する信用情報を使用したＢの返済能力の調査を行う必要はない。\n③　Ａは、個人である顧客Ｂとの間で、本件基本契約に基づく極度方式貸付けに係る契約を締結しようとする場合、当該極度方式貸付けの金額が５万円を超え、かつ、当該極度方式貸付けの金額と本件基本契約に基づく極度方式貸付けの残高の合計額が10万円を超えるときを除き、指定信用情報機関が保有する信用情報を使用したＢの返済能力の調査を行う必要はない。\n④　Ａは、個人である顧客Ｂとの間で、手形（融通手形を除く。）の割引を内容とする契約を締結しようとする場合には、Ｂの返済能力の調査を行うに際し、指定信用情報機関が保有する信用情報を使用する必要はない。","answer":3,"topic":"返済能力調査","explanation":"適切でないのは③である。極度方式基本契約に基づく個々の極度方式貸付けについて指定信用情報機関の信用情報を使用した調査が不要とされるのは、当該極度方式貸付けの金額及び極度方式貸付けの残高の合計額が一定の少額にとどまる場合であり、本肢が挙げる「5万円超かつ合計10万円超」という金額の当てはめは実際の基準と異なるため誤りである。①法人顧客との契約には個人向け総量規制に関する信用情報使用義務が適用されない点で妥当。②返済能力が低下していないことを前提に、一時的な減額前の極度額の範囲内に戻す増額の場合は改めての調査を要しないとされる点で妥当。④手形（融通手形を除く）の割引を内容とする契約は、返済能力調査における信用情報使用義務の対象外とされる点で妥当である。"},{"no":22,"category":"法及び関係法令に関すること","text":"過剰貸付け等の禁止に関する次の①～④の記述のうち、その内容が適切でないものを１つだけ選び、解答欄にその番号をマークしなさい。なお、本問における貸付けに係る契約は、極度方式基本契約及び極度方式貸付けに係る契約ではないものとする。\n\n①　貸金業者Ａは、法人顧客Ｂとの間の貸付けに係る契約の締結に際し、当該契約がＢの返済能力を超える貸付けの契約と認められるときは、当該契約を締結してはならない。\n②　貸金業者Ａと現に事業を営んでいない個人顧客Ｃとの間で、Ｃが新たな事業を行うために必要な資金の貸付けに係る契約であって、事業計画、収支計画及び資金計画の確認その他の方法により確実に当該事業の用に供するための資金の貸付けであると認められ、かつ、Ｃの事業計画、収支計画及び資金計画に照らし、Ｃの返済能力を超えない貸付けに係る契約であると認められるものは、貸金業法第13条の２第２項に規定する当該個人顧客の利益の保護に支障を生ずることがない契約として内閣府令で定めるものに該当する。\n③　個人事業者Ｄが５年前から継続して行っている事業から得た所得税法上の総収入金額は、貸金業法施行規則第10条の22に規定する年間の給与に類する定期的な収入の金額等に該当する。\n④　貸金業者Ａは、個人顧客Ｅとの間で、貸金業法施行規則第10条の21（個人過剰貸付契約から除かれる契約）第１項第１号に該当する不動産の建設に必要な資金の貸付けに係る契約を締結し、Ｅから当該契約に係る同条第２項第１号に該当する建設工事の請負契約書の写しの提出を受けた。この場合、Ａは、当該写し又はこれらに記載された情報の内容を記録した電磁的記録を当該契約に定められた最終の返済期日（当該契約に基づく債権が弁済その他の事由により消滅したときにあっては、当該債権の消滅した日）までの間保存しなければならない。","answer":3,"topic":"総量規制","explanation":"適切でないのは③である。個人事業者の事業所得等が年間の給与に類する定期的な収入の金額等に該当するとする点について、事業所得は原則として除外契約等の判定における「給与に類する定期的な収入」には該当しないとされ、記述は不正確である。①法人顧客への貸付けには個人向け総量規制が適用されないため妥当。②新規事業資金貸付けで確実性が認められるものは例外に該当し得るため妥当。④建設工事請負契約書の写し等の保存義務は妥当な記述である。"},{"no":23,"category":"法及び関係法令に関すること","text":"貸金業法第13条の２（過剰貸付け等の禁止）第２項に規定する個人顧客の利益の保護に支障を生ずることがない契約として貸金業法施行規則第10条の23で定めるもの（以下、本問において「例外契約」という。）に関する次の①～④の記述のうち、その内容が適切でないものを１つだけ選び、解答欄にその番号をマークしなさい。\n\n①　事業を営む個人顧客に対する貸付けに係る契約であって、実地調査、当該個人顧客の直近の確定申告書の確認その他の方法により当該事業の実態が確認されていること、又は当該個人顧客の事業計画、収支計画及び資金計画に照らし、当該個人顧客の返済能力を超えない貸付けに係る契約であると認められることのいずれかの要件を満たすものは、例外契約に該当する。\n②　預金保険法第２条第１項に規定する金融機関からの貸付け（以下、本問において「正規貸付け」という。）が行われるまでのつなぎとして行う貸付けに係る契約（極度方式基本契約を除く。）であって、正規貸付けが行われることが確実であると認められ、かつ、返済期間が１か月を超えないものは、例外契約に該当する。\n③　個人顧客が特定費用(注)を支払うために必要な資金の貸付けに係る契約（極度方式基本契約ではないものとする。）として当該個人顧客と貸金業者との間に締結される契約であって、当該契約が当該個人顧客の返済能力を超えない貸付けに係る契約であると認められ、当該契約の貸付けの金額が10万円であり（当該個人顧客は、当該契約以外の貸付けに係る契約を一切締結していないものとする。）、返済期間が１年であるものは、例外契約に該当しない。\n④　個人顧客が既に貸金業者以外の者と締結した契約に基づき負担している債務（以下、本問において「既存債務」という。）を弁済するために必要な資金の貸付けに係る契約であって、当該個人顧客が当該契約に基づき将来支払うべき返済金額の合計額が既存債務について将来支払うべき返済金額の合計額を上回らないが、当該契約の１か月の負担が既存債務に係る１か月の負担を上回るものは、例外契約に該当しない。\n\n(注)　特定費用とは、外国において緊急に必要となった費用のほか、社会通念上緊急に必要と認められる費用をいう。","answer":1,"topic":"総量規制","explanation":"適切でないのは①である。事業を営む個人顧客への貸付けについて例外契約に該当するための要件は、実態確認と返済能力の観点の双方を満たすことが求められる場合があり、いずれか一方の要件のみで足りるとする記述は不正確である。②正規貸付けまでのつなぎ資金貸付けで一定の返済期間内のものは例外契約に該当し得るため妥当。③特定費用のための貸付けについて要件を満たさない場合は例外契約に該当しないとする記述は妥当。④既存債務の借換えで1か月の負担が既存債務を上回るものは例外契約に該当しないとする記述は妥当である。"},{"no":24,"category":"法及び関係法令に関すること","text":"貸金業法第15条（貸付条件の広告等）及び同法第16条（誇大広告の禁止等）に関する次の①～④の記述のうち、その内容が適切でないものを１つだけ選び、解答欄にその番号をマークしなさい。\n\n①　貸金業者は、貸付条件の広告等を行うに当たっては、貸付けに関し貸金業者が受け取る書面の内容を表示しなければならない。\n②　貸金業者向けの総合的な監督指針によれば、貸金業法第15条第２項に規定する「広告」とは、ある事項を随時又は継続して広く宣伝するため、一般の人に知らせることをいい、例えば、テレビコマーシャル、新聞紙への掲載、広告塔又は立て看板への表示、チラシ又はリーフレットの配布、インターネット上の表示はすべて広告に当たるとされている。\n③　貸金業者は、その貸金業の業務に関して広告又は勧誘をするときは、資金需要者等の返済能力を超える貸付けの防止に配慮するとともに、その広告又は勧誘が過度にわたることがないように努めなければならない。\n④　貸金業者は、貸付けの条件について広告をするとき、又は書面もしくはこれに代わる電磁的記録を送付して勧誘（広告に準ずるものとして内閣府令で定めるものに限る。）をするときは、営業所又は事務所の電話番号については、これに貸金業者登録簿に登録されたもの以外のものを表示し、又は記録してはならない。","answer":1,"topic":"貸付条件の掲示","explanation":"適切でないのは①である。貸付条件の広告等において表示すべき事項は、貸付けの利率、返済方式、返済期間・回数等であり、貸金業者が受け取る書面の内容の表示までは義務付けられておらず、記述は誤りである。②広告の定義（テレビCM、新聞広告等）は監督指針の記述として妥当。③過度な広告・勧誘を控える努力義務の規定は妥当。④広告等における電話番号を登録簿記載のものに限る規定は妥当である。"},{"no":25,"category":"法及び関係法令に関すること","text":"特定公正証書に係る制限等に関する次の①～④の記述のうち、その内容が適切でないものを１つだけ選び、解答欄にその番号をマークしなさい。\n\n①　貸金業を営む者は、貸付けの契約について、債務者等から、当該債務者等が特定公正証書（債務者等が貸付けの契約に基づく債務の不履行の場合に直ちに強制執行に服する旨の陳述が記載された公正証書をいう。以下、本問において同じ。）の作成を公証人に嘱託することを代理人に委任することを証する書面を取得してはならない。\n②　貸金業を営む者は、貸付けの契約について、債務者等が特定公正証書の作成を公証人に嘱託することを代理人に委任する場合には、当該代理人の選任に関し推薦その他これに類する関与をしてはならない。\n③　貸金業者は、貸付けの契約について、特定公正証書の作成を公証人に嘱託した場合には、遅滞なく、内閣府令で定めるところにより、債務者等となるべき資金需要者等に対し、当該貸付けの契約に基づく債務の不履行の場合には、特定公正証書により、債務者等が直ちに強制執行に服することとなる旨及び債務者等の法律上の利益に与える影響に関する事項として内閣府令で定めるものについて書面を交付し、説明しなければならない。\n④　貸金業を営む者は、貸付けの契約について、公的給付(注１)がその受給権者である債務者等又は債務者等の親族その他の者（以下、本問において「特定受給権者」という。）の預金又は貯金の口座に払い込まれた場合に当該預金又は貯金の口座に係る資金から当該貸付けの契約に基づく債権の弁済を受けることを目的として、当該特定受給権者の預金通帳等(注２)の引渡しもしくは提供を求め、又はこれらを保管する行為をしてはならない。\n\n(注１)　公的給付とは、法令の規定に基づき国又は地方公共団体がその給付に要する費用又はその給付の事業に関する事務に要する費用の全部又は一部を負担し、又は補助することとされている給付（給与その他対価の性質を有するものを除く。）であって、法令の規定により譲り渡し、担保に供し、又は差し押さえることができないこととされているものをいう。\n(注２)　預金通帳等とは、当該預金もしくは貯金の口座に係る通帳もしくは引出用のカードもしくは当該預金もしくは貯金の引出しもしくは払込みに必要な情報その他当該預金もしくは貯金の引出しもしくは払込みに必要なものとして政令で定めるもの又は年金証書その他特定受給権者が公的給付を受給することができることを証する書面その他のものをいう。","answer":3,"topic":"禁止行為","explanation":"適切でないのは③である。特定公正証書の作成を公証人に嘱託した場合の書面交付・説明義務については、嘱託の前に行うべきものとされており、嘱託した後に遅滞なく行うとする記述は時期の点で誤りである。①代理人委任を証する書面の取得禁止、②代理人選任への関与の禁止、④公的給付の受給権者の預金通帳等の保管等の禁止はいずれも貸金業法上の規制として妥当な記述である。"},{"no":26,"category":"法及び関係法令に関すること","text":"貸金業者に対する監督等に関する次の①～④の記述のうち、その内容が適切でないものを１つだけ選び、解答欄にその番号をマークしなさい。\n\n①　貸金業者は、事業年度ごとに、内閣府令で定めるところにより、貸金業に係る事業報告書を作成し、毎事業年度経過後３か月以内に、これをその登録をした内閣総理大臣又は都道府県知事（以下、本問において「登録行政庁」という。）に提出しなければならない。\n②　登録行政庁は、貸金業法を施行するため必要があると認めるときは、その登録を受けた貸金業者に対して、その業務に関し報告又は資料の提出を命ずることができる。\n③　登録行政庁は、その登録を受けた貸金業者が貸金業法第12条の５（暴力団員等の使用の禁止）の規定に違反して、暴力団員等をその業務に従事させた場合、その登録を取り消し、又は当該貸金業者に対してその業務の停止を命ずることができる。\n④　登録行政庁は、その登録を受けた貸金業者が正当な理由がないのに当該登録を受けた日から６か月以内に貸金業を開始しない場合には、その登録を取り消すことができる。","answer":3,"topic":"監督処分・届出","explanation":"適切でないのは③である。暴力団員等の使用の禁止規定への違反があった場合、登録取消しや業務停止に加え、必要な措置を命ずることができる旨の規定も含めた対応が定められており、記述の限定の仕方が不正確である。①事業報告書の作成・提出義務、②報告徴収命令の権限、④正当な理由なく登録後一定期間内に貸金業を開始しない場合の登録取消しはいずれも貸金業法上の監督規定として妥当な記述である。"},{"no":27,"category":"法及び関係法令に関すること","text":"ＡとＢとの間の複数の営業的金銭消費貸借契約（以下、本問において、「第一契約」、「第二契約」又は「第三契約」という。）に関する次の①～④の記述のうち、利息制限法上、その内容が適切でないものを１つだけ選び、解答欄にその番号をマークしなさい。\n\n①　Ａは、Ｂとの間で、元本を10万円とし利息を年１割８分（18％）とする営業的金銭消費貸借契約（第一契約）を締結し10万円をＢに貸し付けた。Ａは、Ｂが第一契約に基づく債務を完済した後に、Ｂとの間で元本を５万円とし利息を年２割（20％）とする営業的金銭消費貸借契約（第二契約）を締結し５万円をＢに貸し付けた。この場合、第二契約における利息の約定は、有効である。\n②　Ａは、Ｂとの間で、元本を20万円とし利息を年１割８分（18％）とする営業的金銭消費貸借契約（第一契約）を締結し20万円をＢに貸し付けると同時に、元本を80万円とし利息を年１割５分（15％）とする営業的金銭消費貸借契約（第二契約）を締結し80万円をＢに貸し付けた。この場合、第一契約における利息の約定は、年15％を超過する部分に限り無効となる。\n③　Ａは、Ｂとの間で、元本を60万円とし利息を年１割８分（18％）とする営業的金銭消費貸借契約（第一契約）を締結し60万円をＢに貸し付けた。Ａは、第一契約に基づく債務の元本残高が30万円である時点において、Ｂとの間で元本を80万円とし利息を年１割８分（18％）とする営業的金銭消費貸借契約（第二契約）を締結し80万円をＢに貸し付けた。この場合、第二契約における利息の約定は、年１割５分（15％）を超過する部分に限り無効となる。\n④　Ａは、Ｂとの間で、元本を50万円とし利息を年１割８分（18％）とする営業的金銭消費貸借契約（第一契約）を締結し50万円をＢに貸し付けた後、まだ、ＢがＡに対して第一契約に係る債務を一切弁済していない時点で、Ｂとの間で、元本を５万円とし利息を年２割（20％）とする営業的金銭消費貸借契約（第二契約）を締結しＢに５万円を貸し付けると同時に、元本を50万円とし利息を年１割８分（18％）とする営業的金銭消費貸借契約（第三契約）を締結しＢに50万円を貸し付けた。この場合、第二契約、第三契約における利息の約定のうち、第二契約における年１割８分（18％）を超過する部分の利息の約定に限り無効となる。\n\n---","answer":4,"topic":"利息制限法","explanation":"適切でないのは④である。複数契約が事実上一体として締結された場合、利息制限法の適用にあたり元本額を合算して上限金利を判断すべきところ、第二契約のみについて超過部分を無効とし第三契約を除外する記述は、合算計算の考え方と整合せず誤りである。①完済後に新たに締結された契約は別個の契約として元本額に応じた上限金利が適用されるため妥当。②同時締結の複数契約は元本を合算して上限金利を判断するため、記述内容の考え方はおおむね妥当。③既存契約の残高と新契約の元本を合算して上限金利を判断する考え方も妥当である。"},{"no":28,"category":"貸付け及び貸付けに付随する取引に関する法令及び実務に関すること","text":"意思能力及び行為能力に関する次の①～④の記述のうち、民法上、その内容が適切なものを１つだけ選び、解答欄にその番号をマークしなさい。\n\n①　法律行為の当事者が意思表示をした時に意思能力を有しなかったときは、その法律行為は、取り消すことができる。\n②　未成年者は、権利を得る法律行為をする場合にはその法定代理人の同意を得なければならないが、義務を免れる法律行為をする場合にはその法定代理人の同意を得る必要はない。\n③　成年被後見人の法律行為（日用品の購入その他日常生活に関する行為を除く。）は、あらかじめ成年後見人の同意を得ていた場合であっても、取り消すことができる。\n④　被保佐人は、あらかじめ保佐人の同意を得なくても、金銭の借入れ及びその返済をすることができる。","answer":3,"topic":"意思能力・行為能力","explanation":"適切なのは③である。成年被後見人の法律行為は、日用品の購入等日常生活に関する行為を除き、あらかじめ成年後見人の同意を得ていた場合であっても取り消すことができるとされている。①意思能力を欠く状態でした法律行為は取消しではなく無効である。②未成年者が権利を得る、義務を免れる法律行為をする場合は法定代理人の同意を要しないとされ、記述の対比が誤り。④被保佐人が金銭の借入れをするには保佐人の同意を要するとされ、記述は誤りである。"},{"no":29,"category":"貸付け及び貸付けに付随する取引に関する法令及び実務に関すること","text":"無効及び取消しに関する次の①～④の記述のうち、民法上、その内容が適切なものを１つだけ選び、解答欄にその番号をマークしなさい。\n\n①　無効な行為は、当事者がその行為の無効であることを知って追認をしたときは、初めから有効であったものとみなされる。\n②　行為能力の制限によって取り消すことができる行為について、制限行為能力者は、その法定代理人、保佐人又は補助人の同意を得なければ、その行為を取り消すことができない。\n③　取り消すことができる行為は、取り消されるまで有効であり、取り消されたときに、取り消された時から将来に向かって無効となる。\n④　錯誤、詐欺又は強迫によって取り消すことができる行為の追認は、取消しの原因となっていた状況が消滅し、かつ、取消権を有することを知った後にしなければ、その効力を生じない。","answer":4,"topic":"無効・取消し","explanation":"適切なのは④である。錯誤、詐欺又は強迫によって取り消すことができる行為の追認は、取消しの原因となっていた状況が消滅し、かつ取消権を有することを知った後にしなければ効力を生じないとされている。①無効な行為は追認によっても遡って有効にはならず、追認の時から新たな行為をしたものとみなされるにとどまる。②制限行為能力者が取消しをするのに他の者の同意を要するとする点は誤り（取消しは単独でできる）。③取消しの効果は遡及的無効であり、将来に向かってのみ無効となるとする記述は誤りである。"},{"no":30,"category":"貸付け及び貸付けに付随する取引に関する法令及び実務に関すること","text":"時効に関する次の①～④の記述のうち、民法上、その内容が適切なものを１つだけ選び、解答欄にその番号をマークしなさい。\n\n①　債権は、債権者が権利を行使することができることを知った時から10年間行使しないとき、又は権利を行使することができる時から20年間行使しないときは、時効によって消滅する。\n②　当事者は、あらかじめ時効の利益を放棄したときは、時効を援用することができない。\n③　時効の完成猶予又は更新は、完成猶予又は更新の事由が生じた当事者、その承継人及び当該時効の完成猶予又は更新により利害関係が生じるすべての者の間において、その効力を有する。\n④　確定判決又は確定判決と同一の効力を有するものによって確定した権利については、確定の時に弁済期の到来していない債権を除き、10年より短い時効期間の定めがあるものであっても、その時効期間は、10年とされる。","answer":4,"topic":"時効","explanation":"適切なのは④である。確定判決等によって確定した権利については、本来の時効期間が10年より短い場合であっても、原則としてその時効期間は10年とされる。①債権の消滅時効期間の一般原則（主観的起算点・客観的起算点）の年数の当てはめが記述と異なる可能性がある。②時効の利益はあらかじめ放棄することができないとされており、記述は誤り。③時効の完成猶予・更新の効力は原則として当事者及びその承継人の間においてのみ生じ、利害関係を有するすべての者に及ぶわけではないため誤りである。"},{"no":31,"category":"貸付け及び貸付けに付随する取引に関する法令及び実務に関すること","text":"債権の目的及び効力に関する次の①～④の記述のうち、民法上、その内容が適切なものを１つだけ選び、解答欄にその番号をマークしなさい。\n\n①　債権の目的が特定物の引渡しであるときは、債務者は、その引渡しをするまで、契約その他の債権の発生原因及び取引上の社会通念に照らして定まる善良な管理者の注意をもって、その物を保存しなければならない。\n②　債務の不履行に対する損害賠償の請求は、これによって通常生ずべき損害の賠償をさせることをその目的とし、特別の事情によって生じた損害については、損害賠償の対象とならない。\n③　債権者は、債務者が金銭債務の履行をしない場合、その不履行が不可抗力によるものであるときを除き、これによって生じた損害の賠償を請求することができる。\n④　債権者と債務者との間で金銭債務の不履行について賠償額の予定をしなかったときは、債権者は、その債務不履行による損害賠償については、その損害額を証明しなければならない。","answer":1,"topic":"債権の効力","explanation":"適切なのは①である。特定物の引渡しを目的とする債権について、債務者は引渡しまで契約その他の発生原因及び取引上の社会通念に照らして定まる善管注意義務をもって保存しなければならないとされている。②債務不履行による損害賠償は通常損害を原則とするが、特別事情によって生じた損害も予見可能性がある場合には賠償の対象となり得るため、一律に対象外とする記述は誤り。③金銭債務の不履行については不可抗力をもって抗弁とすることができないとされ、免責を認める記述は誤り。④賠償額の予定がない場合、金銭債務の不履行による損害賠償額は法定利率等により定まり、損害額の証明を要しないとされるため誤りである。"},{"no":32,"category":"貸付け及び貸付けに付随する取引に関する法令及び実務に関すること","text":"ＡのＢに対する貸付金債権（以下、本問において「本件債権」という。）の譲渡に関する次の①～④の記述のうち、民法上、その内容が適切なものを１つだけ選び、解答欄にその番号をマークしなさい。\n\n①　本件債権については、ＡとＢとの間で、第三者への譲渡を禁止する旨の特約がなされていたにもかかわらず、Ａは本件債権を第三者Ｃに譲渡した。この場合、本件債権の譲渡は無効であり、Ｃは、本件債権を取得することができない。\n②　Ａは、本件債権をＣに譲渡し、Ｃへの本件債権の譲渡についてＢに対し確定日付のある証書によらない通知をした。この場合、Ｃは、本件債権の譲渡をＢに対抗することができず、Ｂは、Ｃからの本件債権の弁済の請求を拒むことができる。\n③　Ａは、本件債権をＣとＤに二重に譲渡した。Ｂが、Ｃへの本件債権の譲渡について確定日付のある証書によらない承諾をした後、ＢからＣに本件債権の弁済がなされる前に、Ｄへの本件債権の譲渡について、Ａが確定日付のある証書による通知をし、当該通知がＢに到達した。この場合、Ｃは、本件債権の譲渡をＤに対抗することができず、Ｂは、Ｃからの本件債権の弁済の請求を拒むことができる。\n④　Ａは、本件債権をＣとＤに二重に譲渡し、そのいずれについても確定日付のある証書によりＢに通知をした。Ｄへの本件債権の譲渡についての通知は、Ｃへの本件債権の譲渡についての通知がＢに到達するより早くＢに到達したが、確定日付のある証書に付された日付は、Ｄへの譲渡についての日付よりＣへの譲渡についての日付の方が早い日付であった。この場合、債権が二重に譲渡された場合の優劣は確定日付の先後で決せられるので、Ｂは、Ｃからの本件債権の弁済の請求を拒むことができない。","answer":3,"topic":"債権譲渡","explanation":"適切なのは③である。債務者が確定日付のない証書による承諾をした後に、別の譲受人への確定日付のある証書による通知が債務者に到達した場合、確定日付のある通知を備えた譲受人が優先し、先の譲受人は債務者に対抗することができない。①譲渡禁止特約付き債権であっても譲渡自体は有効であり、譲受人が悪意重過失の場合に債務者が譲渡人への履行等を対抗できるにとどまるため、譲渡が無効となる旨の記述は誤り。②確定日付のない通知であっても債務者に対する対抗要件としては有効であり、第三者対抗要件を欠くにとどまるため、債務者に対抗できないとする記述は誤り。④二重譲渡の優劣は確定日付のある通知の債務者への到達の先後で決せられるのが原則であり、単純に日付の先後のみで決するとする記述は誤りである。"},{"no":33,"category":"貸付け及び貸付けに付随する取引に関する法令及び実務に関すること","text":"ＡのＢに対する金銭債権を「甲債権」とし、ＢのＡに対する金銭債権を「乙債権」とする。甲債権と乙債権の相殺に関する次の①～④の記述のうち、民法及び民事執行法上、その内容が適切なものを１つだけ選び、解答欄にその番号をマークしなさい。\n\n①　Ａに対して金銭債権を有するＣの申立てにより甲債権が差押えを受けた。この場合、Ａは、甲債権と乙債権とを相殺することができる。\n②　乙債権の弁済期は到来しているが、甲債権の弁済期は到来していない。この場合、Ａは、甲債権と乙債権とを相殺することができない。\n③　Ａが甲債権を取得した後に、Ｂに対して金銭債権を有するＤの申立てにより乙債権が差押えを受けた。この場合、Ａは、甲債権と乙債権との相殺をもってＤに対抗することができない。\n④　甲債権及び乙債権が相殺適状となった後、甲債権が時効により消滅した。この場合、Ａは、甲債権と乙債権とを相殺することができない。","answer":2,"topic":"相殺","explanation":"適切なのは②である。自働債権（乙債権相当）の弁済期が未到来であっても、受働債権側の期限の利益を放棄する等により相殺の要件を満たす場合があるが、原則として自己の債権（相殺しようとする側の自働債権）の弁済期が到来していなければ相殺できないとされ、設問の当てはめでは相殺できないと判断される。①差押えを受けた債権を受働債権として、差押え後に取得した債権を自働債権とする相殺は原則として差押債権者に対抗できない。③差押え前に取得していた債権（甲債権）を自働債権とする相殺は差押債権者に対抗できる場合があるため、対抗できないとする記述は誤り。④時効消滅した債権を自働債権とする相殺は、その債権が消滅前に相殺適状にあった場合には可能とされ、相殺できないとする記述は誤りである。"},{"no":34,"category":"貸付け及び貸付けに付随する取引に関する法令及び実務に関すること","text":"貸主をＡとし借主をＢとする金銭消費貸借契約に関する次の①～④の記述のうち、民法上、その内容が適切なものを１つだけ選び、解答欄にその番号をマークしなさい。\n\n①　Ａは、Ｂとの間で、書面でする金銭消費貸借契約を締結した。この場合、Ｂは、当該契約に基づきＡから借入金を受け取る前であれば、当該契約を解除することができる。\n②　Ａは、Ｂとの間の金銭消費貸借契約において、利息の約定をせずにＢに金銭を貸し付けた。この場合、Ａは、Ｂに対し法定利息を請求することができる。\n③　Ａは、Ｂとの間の金銭消費貸借契約において、貸付金を10回の分割で返済する旨の約定をしてＢに金銭を貸し付けた。この場合において、Ｂが各回の借入金債務について、そのうちの１回でも債務の履行を遅滞したときは、Ａは、Ｂに対し、残債務全部の一括弁済を請求することができる。\n④　Ａは、利息を定めてＢとの間で金銭消費貸借契約を締結したが、Ｂは利息の支払を１年以上延滞し、Ａが催告をしてもＢはその利息を支払わなかった。この場合であっても、Ａは、利息を元本に組み入れることはできない。","answer":1,"topic":"契約・債務不履行","explanation":"適切なのは①である。書面でする消費貸借契約は諾成的消費貸借として成立し、借主は借入金を受け取るまでは契約を解除することができるとされている。②利息の約定をしていない消費貸借は原則として無利息であり、法定利息を当然に請求できるとする記述は誤り。③分割弁済の約定がある場合に一括請求ができるのは、期限の利益喪失条項等の合意がある場合であり、無条件に一括請求できるとする記述は一般化しすぎで誤り。④利息の支払を1年以上延滞し催告しても支払わない場合、貸主は利息を元本に組み入れることができるとされ、組み入れられないとする記述は誤りである。"},{"no":35,"category":"貸付け及び貸付けに付随する取引に関する法令及び実務に関すること","text":"犯罪による収益の移転防止に関する法律についての次の①～④の記述のうち、その内容が適切なものを１つだけ選び、解答欄にその番号をマークしなさい。\n\n①　貸金業者が、自然人である顧客の取引時確認として確認しなければならない事項は、氏名、住居、生年月日、職業及び収入である。\n②　貸金業者が、自然人である顧客の取引時確認として本人特定事項の確認をするために、当該顧客の運転免許証の提示を受ける場合には貸金業者が当該運転免許証の提示を受ける日において有効なもの、また住民票の写しの提示を受ける場合には貸金業者が当該住民票の写しの提示を受ける日前６か月以内に作成されたものに限られる。\n③　貸金業者が、自然人である顧客の取引時確認として本人特定事項の確認をするために運転免許証の提示を受ける場合、その原本ではなく写しの提示を受けることも認められている。\n④　貸金業者が、既に取引をしたことのある顧客との間で金銭の貸付けを内容とする契約を締結する場合、過去の取引において取引時確認を行っているときであっても、契約を締結する都度、当該顧客の取引時確認をしなければならない。","answer":2,"topic":"犯収法","explanation":"適切なのは②である。運転免許証は提示日において有効なもの、住民票の写しは提示日前一定期間内に作成されたものであることが求められるとされている。①取引時確認事項に収入は含まれず、記述は誤り。③本人特定事項の確認において運転免許証は原本の提示が必要であり、写しの提示では足りないとされるため誤り。④過去に取引時確認を行い、確認記録が保存されている顧客との取引においては、改めて取引時確認を要しない場合があるため、常に必要とする記述は誤りである。"},{"no":36,"category":"貸付け及び貸付けに付随する取引に関する法令及び実務に関すること","text":"意思表示に関する次の①～④の記述のうち、民法上、その内容が適切でないものを１つだけ選び、解答欄にその番号をマークしなさい。\n\n①　Ａは、Ｂに甲建物を売却するつもりがないのに、Ｂと通謀して、甲建物をＢに売却する旨の虚偽の売買契約を締結し、ＡからＢへの甲建物の所有権移転登記を経た。この場合において、ＡとＢが通謀して虚偽の売買契約を締結した事情を知らない第三者ＣがＢから甲建物を買い受けたときは、Ａは、AB間の契約は虚偽表示により無効である旨をＣに対抗することができない。\n②　Ａは、Ｂが所有する甲土地の近隣に鉄道の駅が新設される計画を知り、Ｂとの間で、甲土地を購入する旨の売買契約を締結した。しかし、当該駅新設の計画は、当該売買契約の締結前に既に中止となっていたが、Ａはそれを知らなかった。この場合において、Ａは、当該駅新設が甲土地を購入する動機である旨をＢに表示していなかったときは、Ｂに対し、当該売買契約を錯誤により取り消すことができない。\n③　Ａは、Ｂの詐欺により、Ｂとの間でＢに甲絵画を売却する旨の売買契約を締結し、Ｂに甲絵画を引き渡した後、Ｂは、詐欺の事情を知らず、知らないことに過失のない第三者Ｃに甲絵画を売却した。その後、Ａは、詐欺による意思表示を理由としてAB間の売買契約を取り消した場合、その取消しをＣに対抗することができない。\n④　Ａは、Ｂの強迫により、Ｂとの間でＢに甲土地を売却する旨の売買契約を締結し、ＡからＢへの甲土地の所有権移転登記を経た後、Ｂは、強迫の事情を知らず、知らないことに過失のない第三者Ｃに甲土地を売却した。その後、Ａは、強迫による意思表示を理由としてAB間の売買契約を取り消した場合、その取消しをＣに対抗することができない。","answer":4,"topic":"意思表示","explanation":"適切でないのは④である。強迫による意思表示の取消しは、善意無過失の第三者に対しても対抗することができるとされており、詐欺の場合と異なり第三者保護規定が適用されないため、対抗できないとする記述は誤りである。①虚偽表示の無効は善意の第三者に対抗できないとする記述は妥当。②動機の錯誤について、その動機が表示されていなければ錯誤取消しを主張できないとする記述は妥当。③詐欺による意思表示の取消しは善意無過失の第三者に対抗できないとする記述は妥当である。"},{"no":37,"category":"貸付け及び貸付けに付随する取引に関する法令及び実務に関すること","text":"期間の計算に関する次の①～④の記述のうち、民法上、その内容が適切でないものを１つだけ選び、解答欄にその番号をマークしなさい。\n\n①　10月１日午前10時30分から６時間という期間を定めた場合、その期間は、即時から起算されるので、午後４時30分をもって満了する。\n②　ある事実を知った日から２週間以内に届け出ることが法令により義務付けられている場合において、当該事実を10月１日午前10時に知ったときは、当該事実の届出の期限は10月15日となる。\n③　期間の末日が日曜日、国民の祝日に関する法律に規定する休日その他の休日に当たるときは、期間は、その前日に満了する。\n④　10月31日午前０時から１か月という期間を定めた場合、その期間は、11月においてその起算日に応当する31日はないので、11月30日をもって満了する。","answer":3,"topic":"期限・期間","explanation":"適切でないのは③である。期間の末日が日曜日、祝日その他の休日に当たるときは、その日に取引をしない慣習がある場合に限り、期間はその翌日に満了するとされており、常に前日に満了するとする記述は誤りである。①時間によって期間を定めた場合は即時から起算するとする記述は妥当。②日から起算する期間の計算（初日不算入等）による期限の当てはめはおおむね妥当。④月によって期間を定めた場合に起算日に応当する日がない月ではその月の末日に満了するとする記述は妥当である。"},{"no":38,"category":"貸付け及び貸付けに付随する取引に関する法令及び実務に関すること","text":"質権及び抵当権に関する次の①～④の記述のうち、民法上、その内容が適切でないものを１つだけ選び、解答欄にその番号をマークしなさい。\n\n①　債権を目的とする質権の設定は、第三債務者への質権の設定の通知又は第三債務者の承諾がなければ、第三債務者に対抗することができない。\n②　貸金債権を被担保債権として売買代金債権に質権を設定した場合、質権者は、売買代金債権の額が貸金債権の額を超えていても、売買代金債権の全部を直接に取り立てることができる。\n③　根抵当権者は、確定した元本並びに利息その他の定期金及び債務の不履行によって生じた損害の賠償の全部について、極度額を限度として、その根抵当権を行使することができる。\n④　根抵当権の被担保債権の元本の確定前においては、後順位の抵当権者その他の第三者の承諾を得ることなく、根抵当権の担保すべき債権の範囲の変更をすることができる。","answer":2,"topic":"抵当権・根抵当権","explanation":"適切でないのは②である。債権を目的とする質権者が第三債務者から直接取立てをすることができる範囲は、自己の債権額（被担保債権額）に対応する部分に限られるとされており、質入れされた債権の全部を無制限に取り立てることができるとする記述は誤りである。①債権質の対抗要件として第三債務者への通知又は承諾を要するとする記述は妥当。③根抵当権者が極度額を限度に元本・利息等の全部について権利行使できるとする記述は妥当。④元本確定前は後順位権利者等の承諾なく被担保債権の範囲を変更できるとする記述は妥当である。"},{"no":39,"category":"貸付け及び貸付けに付随する取引に関する法令及び実務に関すること","text":"保証に関する次の①～④の記述のうち、民法上、その内容が適切でないものを１つだけ選び、解答欄にその番号をマークしなさい。\n\n①　保証人の負担が債務の目的又は態様において主たる債務より重いときは、主たる債務の限度に減縮されるため、保証人は、その保証債務についてのみ、違約金又は損害賠償の額を約定することはできない。\n②　保証人は、主たる債務者と連帯して債務を負担したときは、民法第452条（催告の抗弁）及び同第453条（検索の抗弁）のいずれの権利も有しない。\n③　行為能力の制限によって取り消すことができる債務を保証した者は、保証契約の時にその取消しの原因を知っていた場合において、主たる債務が不履行となり又はその債務が取り消されたときは、これと同一の目的を有する独立の債務を負担したものと推定される。\n④　債務者が保証人を立てる義務を負う場合には、債権者が保証人を指名したときを除き、その保証人は、行為能力者であること及び弁済する資力を有することのいずれの要件も具備する者でなければならない。","answer":1,"topic":"保証・連帯保証","explanation":"適切でないのは①である。保証人の負担が主たる債務より重い場合には主たる債務の限度に減縮されるが、これとは別に、保証人が自己の保証債務についてのみ違約金又は損害賠償額を約定することは妨げられないとされており、できないとする記述は誤りである。②連帯保証人は催告の抗弁及び検索の抗弁を有しないとする記述は妥当。③取消しうる債務を保証した者が取消原因を知っていた場合の独立債務推定の規定は妥当。④保証人を立てる義務がある場合の保証人の要件（行為能力者であること、弁済資力を有すること）に関する記述は妥当である。"},{"no":40,"category":"貸付け及び貸付けに付随する取引に関する法令及び実務に関すること","text":"Ａは、配偶者Ｂ、子Ｃ及びＤ、並びにＤの子でありＡの孫であるＥを遺して死亡した。この場合の相続に関する次の①～④の記述のうち、民法上、その内容が適切でないものを１つだけ選び、解答欄にその番号をマークしなさい。\n\n①　Ｂ、Ｃ及びＤが単純承認した場合は、Ｃ及びＤの法定相続分はそれぞれ４分の１である。\n②　Ａは、遺言で、共同相続人Ｂ、Ｃ及びＤの相続分について法定相続分と異なる相続分を指定していた場合であっても、Ａの債権者は、Ｂ、Ｃ及びＤに対し、その法定相続分に応じてその権利を行使することができる。\n③　Ｂは、相続財産の一部を費消したときは、単純承認をしたものとみなされる。\n④　Ｄが相続放棄をしたときは、Ｂ、Ｃ及びＥが共同相続人となる。","answer":4,"topic":"相続","explanation":"適切でないのは④である。Dが相続放棄をした場合、Dは初めから相続人でなかったものとみなされ、Dの子であるEは代襲相続をすることができないため、共同相続人はB及びCのみとなり、Eが共同相続人になるとする記述は誤りである。①配偶者と子2人が相続人の場合の法定相続分（配偶者2分の1、子はそれぞれ4分の1）は妥当。②遺言による相続分の指定は、債権者との関係では法定相続分に応じた権利行使を妨げないとする記述は妥当。③相続財産の一部を費消した場合は単純承認をしたものとみなされるとする記述は妥当である。"},{"no":41,"category":"貸付け及び貸付けに付随する取引に関する法令及び実務に関すること","text":"手形法及び電子記録債権法に関する次の①～④の記述のうち、その内容が適切でないものを１つだけ選び、解答欄にその番号をマークしなさい。\n\n①　詐欺によって振り出された約束手形を裏書により譲り受けた所持人は、当該事情を知らず、かつ知らないことにつき過失がなかった。この場合、当該約束手形の振出人は、当該所持人から手形金の支払を請求されたときは、詐欺を理由とする手形行為取消しの抗弁をもって、当該所持人に対抗することができる。\n②　裏書が連続している約束手形の所持人は、正当な権利者と推定されるため、正当な権利者であることを証明しなくても手形上の債務者に対し手形金の支払を求めることができる。\n③　電子記録債権は、保証記録に係るもの及び電子記録保証をした者が電子記録債権法第35条第１項の規定により取得する特別求償権を除き、発生記録をすることによって生ずる。\n④　電子記録名義人に対してした電子記録債権についての支払は、その支払をした者に悪意又は重大な過失がない限り、当該電子記録名義人がその支払を受ける権利を有しない場合であっても、その効力を有する。","answer":1,"topic":"手形・電子記録債権","explanation":"適切でないのは①である。手形行為には人的抗弁の切断（善意取得者への対抗不能）の原則があり、振出人は自己と直接の相手方との間の詐欺の事情を、当該事情につき善意無過失の裏書譲受人に対抗することができないとされ、対抗できるとする記述は誤りである。②裏書の連続する手形所持人は権利者と推定され、自ら権利者であることを証明する必要はないとする記述は妥当。③電子記録債権は原則として発生記録により生じるとする記述は妥当。④電子記録名義人への支払は、支払者に悪意・重過失がなければ有効とされる記述は妥当である。"},{"no":42,"category":"貸付け及び貸付けに付随する取引に関する法令及び実務に関すること","text":"民事訴訟法に関する次の①～④の記述のうち、その内容が適切でないものを１つだけ選び、解答欄にその番号をマークしなさい。\n\n①　当事者は、訴えについて法令に専属管轄の定めがある場合を除き、第一審に限り、合意により管轄裁判所を定めることができる。\n②　地方裁判所における訴えの提起は、訴状を裁判所に提出してしなければならないが、簡易裁判所においては、訴えは口頭で提起することができる。\n③　商業登記簿に支配人として登記された支配人は、民事訴訟における訴訟代理人となることができる。\n④　地方裁判所に提起された民事訴訟において、当事者は、口頭弁論の続行の期日に裁判所に出頭しなかったとしても、準備書面を裁判所に提出している場合には、口頭弁論において当該準備書面に記載した事項を陳述したものとみなされる。\n\n---","answer":4,"topic":"民事訴訟・執行","explanation":"適切でないのは④である。当事者が口頭弁論の続行期日に出頭しなかった場合に準備書面記載事項を陳述したものとみなす擬制陳述の制度は、原則として簡易裁判所の手続における取扱いであり、地方裁判所の通常の口頭弁論では原則として適用されないため、記述は誤りである。①第一審に限り管轄裁判所を合意で定めることができるとする記述は妥当。②訴えの提起の方式（訴状提出、簡易裁判所での口頭提起）は妥当。③支配人は商業登記簿への登記により訴訟代理人となることができるとする記述は妥当である。"},{"no":43,"category":"資金需要者等の保護に関すること","text":"個人情報の保護に関する法律についての次の①～④の記述のうち、その内容が適切なものを１つだけ選び、解答欄にその番号をマークしなさい。\n\n①　取得時に生存する特定の個人を識別することができなかった情報は、取得後に新たな情報が付加され、又は照合された結果、生存する特定の個人を識別できるに至っても、個人情報に該当しない。\n②　個人データとは、氏名、生年月日など複数の情報を含む個人情報の集合体をいい、個人情報データベース等を構成するものに限られない。\n③　特定の個人の身体の一部の特徴を電子計算機の用に供するために変換した文字、番号、記号その他の符号であって、当該特定の個人を識別することができるもののうち、政令で定めるものは、個人識別符号に該当し、生存する個人に関する情報であって、個人識別符号が含まれるものは個人情報となる。\n④　個人関連情報とは、生存する個人に関する情報であって、個人情報、仮名加工情報及び匿名加工情報のいずれかに該当するものをいう。","answer":3,"topic":"個人情報保護法","explanation":"適切なのは③である。身体の一部の特徴を変換した符号のうち政令で定めるものは個人識別符号に該当し、これを含む生存する個人に関する情報は個人情報となるとする記述は妥当である。①取得後に他の情報と照合される等して特定の個人を識別できるに至った情報も個人情報に該当し得るため、該当しないとする記述は誤り。②個人データは個人情報データベース等を構成する個人情報をいうとされ、構成するものに限られないとする記述は誤り。④個人関連情報は、個人情報、仮名加工情報、匿名加工情報のいずれにも該当しない情報をいうとされ、記述は定義が逆であり誤りである。"},{"no":44,"category":"資金需要者等の保護に関すること","text":"消費者契約法に関する次の①～④の記述のうち、その内容が適切なものを１つだけ選び、解答欄にその番号をマークしなさい。\n\n①　適格消費者団体は、事業者が、消費者契約の締結について勧誘をするに際し、不特定かつ多数の消費者に対して重要事項について事実と異なることを告げる行為を現に行い又は行うおそれがあるときは、その事業者に対し、当該行為の停止もしくは予防又は当該行為に供した物の廃棄もしくは除去その他の当該行為の停止もしくは予防に必要な措置をとることを請求することができる。\n②　事業者が消費者契約の締結について勧誘をするに際し、当該事業者に対し、消費者が、その住居又はその業務を行っている場所から退去すべき旨の意思を示したにもかかわらず、当該事業者がそれらの場所から退去しないことにより困惑し、それによって当該消費者契約の申込み又はその承諾の意思表示をしたときは、当該消費者契約は、無効となる。\n③　消費者契約において、消費者の不作為をもって当該消費者が新たな消費者契約の申込み又はその承諾の意思表示をしたものとみなす条項その他の法令中の公の秩序に関しない規定の適用による場合に比して消費者の権利を制限し又は消費者の義務を加重する消費者契約の条項であって、民法第１条第２項に規定する基本原則に反して消費者の利益を一方的に害するものが含まれている場合、当該消費者は、当該消費者契約を取り消すことができる。\n④　消費者契約法に基づき消費者に認められる取消権は、追認をすることができる時から６か月間行わないときは、時効によって消滅する。当該消費者契約の締結の時から５年を経過したときも、同様とする。","answer":1,"topic":"消費者契約法","explanation":"適切なのは①である。適格消費者団体は、事業者が不特定多数の消費者に対し重要事項について事実と異なることを告げる行為を現に行い又は行うおそれがあるときは、当該行為の停止・予防等の差止め等を請求することができるとされている。②不退去による困惑によって消費者契約の申込み等の意思表示をした場合、当該意思表示は無効ではなく取り消すことができるものとされ、無効とする記述は誤り。③消費者の不作為をもって新たな契約の申込み等をしたものとみなす不当条項で消費者の利益を一方的に害するものは、取消しの対象ではなく無効とされ、取り消すことができるとする記述は誤り。④消費者契約法上の取消権は、追認をすることができる時から1年間行わないときに時効消滅し、契約締結時から5年を経過したときも同様とされているところ、本肢は追認可能時からの期間を「6か月間」としており誤りである。"},{"no":45,"category":"資金需要者等の保護に関すること","text":"個人情報の保護に関する法律（以下、本問において「法」という。）についての次の①～④の記述のうち、その内容が適切でないものを１つだけ選び、解答欄にその番号をマークしなさい。\n\n①　本人(注)は、個人情報取扱事業者に対し、当該本人が識別される保有個人データの電磁的記録の提供による方法その他の個人情報保護委員会規則で定める方法による開示を請求することができる。\n②　本人は、個人情報取扱事業者に対し、当該本人が識別される保有個人データの内容が事実でないときは、当該保有個人データの内容の訂正、追加又は削除を請求することができる。\n③　本人が、個人情報取扱事業者に対し、当該本人が識別される保有個人データについて利用の停止又は消去（以下、本問において「利用停止等」という。）を請求することができるのは、当該保有個人データが法第18条（利用目的による制限）もしくは法第19条（不適正な利用の禁止）の規定に違反して取り扱われているとき、又は法第20条（適正な取得）の規定に違反して取得されたものであるときに限られる。\n④　個人情報取扱事業者は、法第35条（利用停止等）第１項又は第５項の規定による請求に係る保有個人データの全部又は一部について利用停止等を行ったとき又は利用停止等を行わない旨の決定をしたときは、本人に対し、遅滞なく、その旨を通知しなければならない。\n\n(注)　本人とは、個人情報によって識別される特定の個人をいう。","answer":3,"topic":"個人情報保護法","explanation":"適切でないのは③である。利用停止等の請求ができる場合は、利用目的制限違反・不適正利用の禁止違反・適正取得違反による取扱いに加え、その他一定の事由（本人の権利利益が害されるおそれがある場合等）も含まれており、記述で挙げた事由に限られるとする点は不正確である。①保有個人データの開示請求について電磁的記録の提供等の方法を選択できるとする記述は妥当。②内容が事実でないときの訂正等の請求権に関する記述は妥当。④利用停止等の請求に対する対応結果の通知義務に関する記述は妥当である。"},{"no":46,"category":"資金需要者等の保護に関すること","text":"次の①～④の記述のうち、不当景品類及び不当表示防止法（以下、本問において「景品表示法」という。）上、その内容が適切でないものを１つだけ選び、解答欄にその番号をマークしなさい。\n\n①　事業者が、商品の価格その他の取引条件について、実際のものよりも取引の相手方に著しく有利であると一般消費者に誤認される表示（有利誤認表示）をしたおそれがある場合、内閣総理大臣は、当該事業者に対して、期間を定めて、当該表示の裏付けとなる合理的な根拠を示す資料の提出を求めることができ、当該資料の提出を求めたにもかかわらず、当該事業者がその期間内に当該資料を提出しないときは、当該表示は、景品表示法第５条（不当な表示の禁止）第２号に規定する、不当な表示とみなされる。\n②　内閣総理大臣は、景品表示法第４条（景品類の制限及び禁止）の規定による制限もしくは禁止もしくは第５条第３号の規定による指定をし、又はこれらの変更もしくは廃止をしようとするときは、内閣府令で定めるところにより、公聴会を開き、関係事業者及び一般の意見を求めるとともに、消費者委員会の意見を聴かなければならない。\n③　表示とは、顧客を誘引するための手段として、事業者が自己の供給する商品又は役務の内容又は取引条件その他これらの取引に関する事項について行う広告その他の表示であって、内閣総理大臣が指定するものをいう。\n④　景品類とは、顧客を誘引するための手段として、その方法が直接的であるか間接的であるかを問わず、くじの方法によるかどうかを問わず、事業者が自己の供給する商品又は役務の取引（不動産に関する取引を含む。）に付随して相手方に提供する物品、金銭その他の経済上の利益であって、内閣総理大臣が指定するものをいう。","answer":1,"topic":"景品表示法","explanation":"正答は①。裏付け資料の提出を求め、提出がなければ不当表示とみなす「不実証広告規制」（景品表示法7条2項）は、商品・役務の内容についての優良誤認表示（5条1号）にのみ適用され、価格その他の取引条件についての有利誤認表示（5条2号）には適用されない。①はこれを有利誤認に及ぼしている点が誤り。②（公聴会・消費者委員会の意見聴取）、③（表示の定義）、④（景品類の定義＝取引に付随して提供）は適切。"},{"no":47,"category":"資金需要者等の保護に関すること","text":"日本貸金業協会が定める紛争解決等業務に関する規則についての次の①～④の記述のうち、その内容が適切でないものを１つだけ選び、解答欄にその番号をマークしなさい。\n\n①　貸金業務関連紛争とは、貸金業務等関連苦情のうち、当該苦情の相手方である貸金業者と当該苦情に係る契約者等の自主的な交渉では解決ができないものであって、当事者が和解をすることができるものをいう。\n②　紛争解決手続開始の申立ては、加入貸金業者との間で貸金業務関連紛争のある契約者等のみが行うことができ、加入貸金業者から行うことはできない。\n③　紛争解決手続において、当事者双方が紛争解決委員の和解案を受諾したときには、その時点で当該和解案の内容で和解が成立したものとされる。\n④　当事者である協会員等は、紛争解決委員から特別調停案の提示を受けた場合において、当該特別調停案の受諾を拒むときには、拒否の事由を明らかにして書面により行わなければならない。\n\n---","answer":2,"topic":"紛争解決","explanation":"適切でないのは②である。紛争解決手続開始の申立ては、契約者等だけでなく加入貸金業者からも行うことができるとされており、契約者等のみが申立てできるとする記述は誤りである。①貸金業務関連紛争の定義（自主交渉では解決できない苦情で和解可能なもの）に関する記述は妥当。③当事者双方が和解案を受諾した時点で和解が成立するとする記述は妥当。④特別調停案の受諾を拒む場合に理由を明らかにした書面によるべきとする記述は妥当である。"},{"no":48,"category":"財務及び会計に関すること","text":"企業会計原則（大蔵省企業会計審議会発表）の一般原則に関する次の①～④の記述のうち、その内容が適切なものを１つだけ選び、解答欄にその番号をマークしなさい。\n\n①　株主総会提出のため、信用目的のため、租税目的のため等、種々の目的のために異なる形式の財務諸表を作成してはならない。これを一般に単一性の原則という。\n②　自己資本と他人資本とを明確に区別し、純資産と負債とを混同してはならない。これを一般に総資本区分の原則という。\n③　企業会計は、その処理の原則及び手続を毎期継続して適用し、みだりにこれを変更してはならない。これを一般に継続性の原則という。\n④　企業の財政状態に影響を及ぼす多額の取引については、その取引の内容をできる限り詳細かつ正確に注記しなければならない。これを一般に正確性の原則という。","answer":3,"topic":"企業会計原則","explanation":"適切なのは③である。企業会計はその処理の原則及び手続を毎期継続して適用し、みだりにこれを変更してはならないとするのが継続性の原則であり、記述のとおりである。①単一性の原則は、株主総会提出用・信用目的用・租税目的用等さまざまな目的のために異なる形式の財務諸表を作成すること自体は認めつつ、その実質的な内容は信頼しうる単一の会計記録に基づく正確なものでなければならないとする原則であり、異なる形式の作成自体を禁止する趣旨として説明する本肢は不正確である。②自己資本と他人資本（負債）を明確に区別すべきことは明瞭性の原則の一内容であり、「総資本区分の原則」という名称は一般に用いられないため誤り。④多額の取引の内容を詳細に注記すべきことは明瞭性の原則の一内容であり、「正確性の原則」という名称の当てはめは誤りである。"},{"no":49,"category":"財務及び会計に関すること","text":"財務諸表等の用語、様式及び作成方法に関する規則に規定する損益計算書に関する次の①～④の記述のうち、その内容が適切なものを１つだけ選び、解答欄にその番号をマークしなさい。\n\n①　売上高から売上原価を控除した額（売上原価が売上高をこえる場合は、売上原価から売上高を控除した額）は、営業利益金額又は営業損失金額として表示しなければならない。\n②　売上総利益金額から販売費及び一般管理費の合計額を控除した額（販売費及び一般管理費の合計額が売上総利益金額をこえる場合は、販売費及び一般管理費の合計額から売上総利益金額を控除した額）を経常利益金額もしくは経常損失金額として表示し、又は売上総損失金額に販売費及び一般管理費の合計額を加えた額を経常損失金額として表示しなければならない。\n③　営業利益金額又は営業損失金額に、営業外収益の金額を加減し、次に営業外費用の金額を加減した額を、営業外利益金額又は営業外損失金額として表示しなければならない。\n④　経常利益金額又は経常損失金額に特別利益の金額を加減し、次に特別損失の金額を加減した額を、税引前当期純利益金額又は税引前当期純損失金額として表示しなければならない。","answer":4,"topic":"損益計算書","explanation":"正答は④。損益計算書の段階利益の流れは、売上高−売上原価＝売上総利益 → −販売費及び一般管理費＝営業利益 → ±営業外収益・費用＝経常利益 → ±特別利益・特別損失＝税引前当期純利益。④はこのとおりで適切。①は売上総利益とすべきところを営業利益としており誤り。②は営業利益とすべきところを経常利益としており誤り。③は経常利益とすべきところを「営業外利益」という存在しない区分にしており誤り。"},{"no":50,"category":"財務及び会計に関すること","text":"財務諸表等の用語、様式及び作成方法に関する規則に規定するキャッシュ・フロー計算書に関する次の①～④の記述のうち、その内容が適切でないものを１つだけ選び、解答欄にその番号をマークしなさい。\n\n（注：本問はPDF抽出時点で選択肢①～④の本文が取得できませんでした。原本PDF（出典参照）をご確認ください。）","answer":2,"topic":"キャッシュフロー","explanation":"原本PDF参照。キャッシュ・フロー計算書に関する問題であり、選択肢本文はPDF抽出時に取得できなかった。正答は②である。"}]},{"exam":19,"year":"令和6年度","questions":[{"no":1,"category":"法及び関係法令に関すること","text":"貸金業法上の用語の定義等に関する次のａ～ｄの記述のうち、その内容が適切なものの個数を①～④の中から１つだけ選び、解答欄にその番号をマークしなさい。\n\n- ａ　貸金業とは、金銭の貸付け又は金銭の貸借の媒介（手形の割引、売渡担保その他これらに類する方法によってする金銭の交付又は当該方法によってする金銭の授受の媒介を含む。）で業として行うものをいい、これには事業者がその従業者に対して行うものも含まれる。\n- ｂ　貸付けの契約とは、貸付けに係る契約又は当該契約に係る保証契約をいう。\n- ｃ　債務者等とは、資金需要者である顧客、債務者又は債務者であった者をいう。\n- ｄ　個人信用情報とは、資金需要者である顧客又は債務者
