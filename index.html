の効力を生じない（相対効の原則）。①は正しく、主たる債務者に対する時効の完成猶予及び更新は連帯保証人にも効力を及ぼす（付従性）。②は正しく、連帯保証人は主たる債務者の抗弁を援用できる。③は正しく、連帯保証人は主たる債務者の相殺権を根拠に履行拒絶権を有する。"},{"no":41,"category":"貸付け及び貸付けに付随する取引に関する法令及び実務に関すること","text":"弁済に関する次の①～④の記述のうち、民法上、その内容が適切でないものを１つだけ選びなさい。\n\n①　債務者が１個の債務について、元本のほか利息及び費用を支払うべき場合において、弁済をする者がその債務の全部を消滅させるのに足りない給付をしたときは、別段の合意がない限り、これを順次に費用、利息及び元本に充当しなければならない。\n②　受領権者（債権者及び法令の規定又は当事者の意思表示によって弁済を受領する権限を付与された第三者をいう。）以外の者であって取引上の社会通念に照らして受領権者としての外観を有するものに対してした弁済は、その弁済をした者が善意のときは、過失があったとしても、その効力を有する。\n③　抵当権の目的となっている不動産の第三取得者は、当該抵当権の被担保債務の債務者及び債権者があらかじめ第三者による弁済を禁止し又は制限していないときは、当該債務者の意思に反しても、当該被担保債務を弁済することができる。\n④　差押えを受けた債権の第三債務者が自己の債権者に弁済をしたときは、差押債権者は、その受けた損害の限度において更に弁済をすべき旨を当該第三債務者に請求することができる。","answer":2,"topic":"弁済","explanation":"適切でないものは②であり、正答は②である。受領権者としての外観を有する者に対する弁済が有効となるのは、弁済者が善意であり、かつ過失がない場合に限られるのであって、過失があっても有効とする記述は誤りである。①は正しく、費用・利息・元本の順に充当する法定充当の原則である。③は正しく、抵当不動産の第三取得者は債務者の意思に反しても弁済をすることができる（利害関係を有する第三者の弁済）。④は正しく、差押えを受けた債権の第三債務者が自己の債権者に弁済した場合、差押債権者は損害の限度で第三債務者に再度の弁済を請求できる。"},{"no":42,"category":"貸付け及び貸付けに付随する取引に関する法令及び実務に関すること","text":"犯罪による収益の移転防止に関する法律に基づき、貸金業者が顧客との間で特定取引を行うに際し当該顧客について行う取引時確認に関する次の①～④の記述のうち、その内容が適切でないものを１つだけ選びなさい。なお、本問における特定取引は、同法第４条第２項各号に掲げる取引（ハイリスク取引）ではないものとする。\n\n①　貸金業者が取引時確認をしなければならない本人特定事項は、自然人にあっては氏名、住居（本邦内に住居を有しない外国人で政令で定めるものにあっては、主務省令で定める事項）及び生年月日、法人にあっては名称及び本店又は主たる事務所の所在地である。\n②　貸金業者が顧客から本人確認書類として運転免許証（有効なものとする。）の提示を受ける場合において、当該運転免許証に記載されている住居が現在の住居と異なるときは、現在の住居が記載された官公庁発行書類（有効なものとする。）の写しの送付を受けることにより現在の住居の確認を行うことができる。\n③　貸金業者が取引時確認をしなければならない事項は、自然人にあっては、本人特定事項のほか、取引を行う目的及び職業である。\n④　貸金業者が国内に本店又は主たる営業所もしくは事務所を有する法人である顧客について取引時確認をする場合、当該法人の事業の内容は当該法人の代表者から申告を受けることにより確認を行うことができる。","answer":4,"topic":"犯収法","explanation":"適切でないものは④であり、正答は④である。法人の事業の内容の確認は、代表者からの申告のみによることは認められておらず、当該法人が作成した書類その他の当該事業の内容を確認するに足りる書類の提示又は提出を受ける方法等によることが求められる。①は正しく、取引時確認における本人特定事項の内容である。②は正しく、運転免許証記載の住居と現在の住居が異なる場合の補完的確認方法として適切である。③は正しく、自然人については本人特定事項のほか取引を行う目的及び職業の確認が必要である。"},{"no":43,"category":"資金需要者等の保護に関すること","text":"個人情報の保護に関する法律についての次の①～④の記述のうち、その内容が適切なものを１つだけ選びなさい。\n\n①　個人情報とは、個人に関する情報であって、当該情報に含まれる氏名、生年月日その他の記述等により特定の個人を識別することができるもの又は個人識別符号が含まれるものをいい、生存する個人に関する情報に限られない。\n②　個人識別符号とは、個人に発行されるカードその他の書類に記載され、もしくは電磁的方式により記録された文字、番号、記号その他の符号であって、特定の利用者を識別することができるものをいい、クレジットカード番号や電話番号は個人識別符号に該当する。\n③　要配慮個人情報とは、本人の人種、信条、社会的身分、病歴、犯罪の経歴、犯罪により害を被った事実その他本人に対する不当な差別、偏見その他の不利益が生じないようにその取扱いに特に配慮を要するものとして政令で定める記述等が含まれる個人情報をいう。\n④　個人データとは、個人情報データベース等を構成する個人情報をいい、例えば、防犯カメラに録画された映像情報に本人を識別できる情報が含まれる場合には、当該映像情報が本人を容易に検索することができるよう体系的に構成されていないものであっても、当該映像情報に含まれる本人を識別できる情報は個人データに該当する。","answer":3,"topic":"個人情報保護法","explanation":"正答は③である。要配慮個人情報は、人種、信条、社会的身分、病歴、犯罪の経歴、犯罪により害を被った事実その他本人に対する不当な差別・偏見等の不利益が生じないよう特に配慮を要するものとして政令で定める記述等が含まれる個人情報をいう。①は誤りで、個人情報は生存する個人に関する情報に限られる。②は誤りで、クレジットカード番号や電話番号は原則として個人識別符号には該当しない。④は誤りで、個人データに該当するには個人情報データベース等を構成する必要があり、体系的に構成されていない映像情報等は個人データに該当しない。"},{"no":44,"category":"資金需要者等の保護に関すること","text":"金融分野における個人情報保護に関するガイドラインに規定する個人データの第三者提供の制限（個人情報保護法第27条関係）についての次の①～④の記述のうち、その内容が適切なものを１つだけ選びなさい。\n\n①　金融分野における個人情報取扱事業者は、与信事業に係る個人の返済能力に関する情報を個人信用情報機関へ提供するに当たっては、個人情報保護法第27条（第三者提供の制限）第２項の規定に従い、適切にオプトアウトの手続をすることとされている。\n②　個人信用情報機関に対して個人データが提供される場合には、個人信用情報機関を通じて当該機関の会員企業にも情報が提供されることとなるため、個人信用情報機関に個人データを提供する金融分野における個人情報取扱事業者が本人の同意を得ることとされている。\n③　個人情報保護法第27条第５項第３号に定める通知等（共同利用の際の通知等）に関し、事業者による「共同して利用する者の範囲」の通知等については、本人がその範囲を明確に判断できるように、共同して利用する者の名称等を個別に全て列挙する必要があるとされている。\n④　金融分野における個人情報取扱事業者は、個人情報保護法第27条第１項に従い、個人データの第三者提供についての本人の同意を得る際には、個人データの提供先の第三者、提供先の第三者における利用目的及び第三者に提供される個人データの項目を本人に認識させた上で同意を得ることとされているが、書面又は電磁的記録による必要はない。","answer":2,"topic":"個人情報保護法","explanation":"正答は②である。個人信用情報機関に個人データを提供する場合、会員企業を通じて広く情報が共有されることになるため、金融分野における個人情報取扱事業者は原則として本人の同意を得ることとされている。①は誤りで、与信事業に係る個人の返済能力に関する情報のような信用情報の第三者提供についてはオプトアウト方式によることは認められていない。③は誤りで、共同利用における「共同して利用する者の範囲」の通知等は、本人がその範囲を明確に判断できる程度に明示すれば足り、個別に全て列挙することまでは必要とされない場合がある。④は誤りで、金融分野における個人情報取扱事業者が第三者提供の同意を得る際は、原則として書面（電磁的記録を含む）による同意取得が求められる。"},{"no":45,"category":"資金需要者等の保護に関すること","text":"個人情報の保護に関する法律についての次の①～④の記述のうち、その内容が適切でないものを１つだけ選びなさい。\n\n①　個人情報取扱事業者は、特定された利用目的の達成に必要な範囲を超えて個人情報を取り扱う場合には、あらかじめ本人の同意を得なければならない。\n②　個人情報取扱事業者は、合併その他の事由により他の個人情報取扱事業者から事業を承継することに伴って個人情報を取得する場合であって、当該個人情報に係る承継前の利用目的の達成に必要な範囲内で当該個人情報を取り扱うときは、あらかじめ本人の同意を得る必要はない。\n③　個人情報取扱事業者は、インターネットなどで本人が自発的に公にしている個人情報を取得した場合には、その利用目的を、本人に通知し、又は公表する必要はない。\n④　個人情報取扱事業者は、個人情報の利用目的を変更する場合には、変更前の利用目的と関連性を有すると合理的に認められる範囲を超えて行ってはならない。","answer":3,"topic":"個人情報保護法","explanation":"適切でないものは③であり、正答は③である。本人が自発的に公にしている個人情報を取得した場合であっても、個人情報取扱事業者は原則として利用目的を本人に通知し、又は公表する必要があり、通知・公表義務が一律に免除されるわけではない。①は正しく、利用目的の達成に必要な範囲を超える取扱いには本人の同意が必要である。②は正しく、事業承継に伴う個人情報取得で承継前の利用目的の範囲内であれば同意不要である。④は正しく、利用目的の変更は変更前の利用目的と関連性を有する合理的な範囲内でのみ認められる。"},{"no":46,"category":"資金需要者等の保護に関すること","text":"日本貸金業協会が定める貸金業の業務運営に関する自主規制基本規則についての次の①～④の記述のうち、その内容が適切でないものを１つだけ選びなさい。\n\n①　協会員は、債務者等に対して貸付けの契約に係る勧誘を行うに際しては、当該債務者等から当該勧誘を行うことについての承諾を得なければならない。\n②　協会員は、勧誘リスト等を作成するにあたっては、当該勧誘リストに個人信用情報の記載等をすることがないよう留意しなければならない。\n③　協会員は、資金需要者等が身体的・精神的な障害等により契約の内容が理解困難なことを認識した場合には、貸付けの契約の締結に係る勧誘を行ってはならない。\n④　協会員は、貸金業の業務に関して勧誘をした場合において、当該勧誘対象者が勧誘に係る取引についての契約を締結しない旨の意思を表示した場合、当該意思表示のあった日から最低１年間は当該勧誘に係る取引及びこれと類似する取引の勧誘を行ってはならない。","answer":4,"topic":"自主規制規則","explanation":"適切でないものは④であり、正答は④である。自主規制基本規則上、勧誘拒絶の意思表示があった場合の再勧誘禁止期間は「最低１年間」といった画一的な期間ではなく、当該取引及び類似取引について勧誘を行ってはならない旨が定められているにとどまり、期間を１年間と限定する記述は不正確である。①は正しく、勧誘に先立ち承諾を得る必要がある（勧誘に係る事前承諾規制）。②は正しく、勧誘リストに個人信用情報を記載しないよう留意すべきとされている。③は正しく、契約内容の理解が困難な者への勧誘は禁止される。"},{"no":47,"category":"資金需要者等の保護に関すること","text":"日本貸金業協会が定める紛争解決等業務に関する規則についての次の①～④の記述のうち、その内容が適切でないものを１つだけ選びなさい。\n\n①　貸金業務等関連苦情とは、貸金業務等に関し、その契約者等による当該貸金業務等を行った貸金業者に対する不満足の表明のうち、当該貸金業者と当該契約者等の自主的な交渉では解決ができないものであって、当事者が和解をすることができるものをいう。\n②　協会員等は、貸金業相談・紛争解決センターによる紛争解決等業務を周知するため、その内容及び手続の概要、受付窓口などに関し、協会員等のウェブサイトに掲示し又は店頭に掲示するなど適切な方法で公表しなければならない。\n③　協会員等との間で貸金業務等関連苦情を有する契約者等である個人、法人又は法人でない社団もしくは財団で代表者もしくは管理者の定めがある者は、貸金業相談・紛争解決センターに対して苦情処理手続開始の申立てをすることができる。\n④　貸金業相談・紛争解決センターが苦情の解決の促進を図る場合において、当事者である協会員等は、正当な理由なく事情の聴取及び資料提出の求めを拒むことはできない。","answer":1,"topic":"紛争解決","explanation":"適切でないものは①であり、正答は①である。貸金業務等関連苦情は、契約者等による貸金業者に対する不満足の表明であって自主的な交渉では解決ができないものをいうが、当事者が和解をすることができるものに限定されるのは苦情ではなく紛争処理手続（あっせん等）の対象範囲に関する要件であり、苦情の定義として和解可能性を要件とする記述は不正確である。②は正しく、紛争解決等業務の周知・公表義務の内容である。③は正しく、苦情処理手続開始の申立てができる者の範囲として適切である。④は正しく、事情聴取・資料提出要求に対する協会員等の応諾義務の内容である。"},{"no":48,"category":"財務及び会計に関すること","text":"会社計算規則に規定する損益計算書等に関する次の①～④の記述のうち、その内容が適切なものを１つだけ選びなさい。\n\n①　損益計算書等は、売上高（売上高以外の名称を付すことが適当な場合には、当該名称を付した項目。以下「売上高」という。）、売上原価、販売費及び一般管理費、営業外収益、営業外費用、特別利益、特別損失の各項目に区分して表示しなければならない。\n②　当期純利益とは、経常利益から法人税等を控除した額をいう。\n③　経常利益とは、売上高に営業外収益及び特別利益を加えたものから売上原価、販売費及び一般管理費、営業外費用並びに特別損失を減じたものをいう。\n④　売上総利益とは、売上高から売上原価並びに販売費及び一般管理費を控除したものをいう。","answer":1,"topic":"損益計算書","explanation":"正答は①である。会社計算規則上、損益計算書等は売上高、売上原価、販売費及び一般管理費、営業外収益、営業外費用、特別利益、特別損失の各項目に区分して表示しなければならない。②は誤りで、当期純利益は税引前当期純利益（経常利益に特別損益を加減したもの）から法人税等を控除した額をいう。③は誤りで、経常利益は売上高から売上原価及び販売費・一般管理費を控除した営業利益に営業外収益を加え営業外費用を控除したものであり、特別利益・特別損失は算入されない。④は誤りで、売上総利益は売上高から売上原価のみを控除したものをいい、販売費及び一般管理費は控除しない（それを控除したものは営業利益である）。"},{"no":49,"category":"財務及び会計に関すること","text":"企業会計原則（大蔵省企業会計審議会発表）の一般原則に関する次の①～④の記述のうち、その内容が適切でないものを１つだけ選びなさい。\n\n①　企業会計は、企業の財政状態及び経営成績に関して、真実な報告を提供するものでなければならない。これを一般に真実性の原則という。\n②　事業取引と投資等の財務活動とを明瞭に区別し、特に事業収益と財務活動による収益とを混同してはならない。これを一般に事業・財務収益区分の原則という。\n③　企業会計は、その処理の原則及び手続を毎期継続して適用し、みだりにこれを変更してはならない。これを一般に継続性の原則という。\n④　企業の財政に不利な影響を及ぼす可能性がある場合には、これに備えて適当に健全な会計処理をしなければならない。これを一般に保守主義の原則という。","answer":2,"topic":"企業会計原則","explanation":"適切でないものは②であり、正答は②である。企業会計原則の一般原則には「事業・財務収益区分の原則」という名称の原則は存在せず、該当する内容（正常な収益と附随的な収益等を区分すべき旨）は明瞭性の原則等の一部として位置付けられるものであり、独立の原則名として掲げる点が不適切である。①は正しく真実性の原則、③は正しく継続性の原則、④は正しく保守主義の原則の説明として適切である。"},{"no":50,"category":"財務及び会計に関すること","text":"貸借対照表に関する次の①～④の記述のうち、その内容が適切でないものを１つだけ選びなさい。なお、本問においては、連結貸借対照表は考慮しなくてよいものとする。\n\n①　会社計算規則によれば、資産の部は、流動資産、固定資産、繰延資産に区分しなければならないとされている。\n②　会社計算規則によれば、負債の部は、流動負債、固定負債、引当金その他の負債に区分しなければならないとされている。\n③　会社計算規則によれば、株式会社における純資産の部は、株主資本、評価・換算差額等、株式引受権、新株予約権に区分しなければならないとされている。\n④　貸借対照表では、資産の部の合計額から負債の部の合計額を差し引いた額は、純資産の部の合計額と一致する。","answer":2,"topic":"貸借対照表","explanation":"適切でないものは②であり、正答は②である。会社計算規則上、負債の部は流動負債及び固定負債に区分するものとされており、引当金その他の負債という独立区分は設けられていない。①は正しく、資産の部は流動資産、固定資産、繰延資産に区分される。③は正しく、株式会社の純資産の部は株主資本、評価・換算差額等、株式引受権、新株予約権に区分される。④は正しく、資産の部合計から負債の部合計を控除した額は純資産の部合計と一致する（貸借対照表等式）。"}]},{"exam":21,"year":"AI予想模試","questions":[{"no":1,"category":"法及び関係法令に関すること","topic":"用語の定義","text":"貸金業法上の用語の定義に関する次のａ～ｄの記述のうち、その内容が適切なものの個数として正しいものはどれか。\n\n- ａ　物品の運送を業とする者が、その取引に付随して行う金銭の貸付けは、貸金業の定義から除外される。\n- ｂ　「債務者等」には、債務者及び債務者であった者のほか、保証人・保証人であった者、物上保証人等は含まれない。\n- ｃ　貸付けの契約には、これに係る保証契約も含まれると解される。\n- ｄ　住宅資金貸付契約には、住宅の建設・購入資金の貸付けに係る契約のほか、住宅の改良に必要な資金の貸付けに係る契約も含まれる。\n\n①　１個　　②　２個　　③　３個　　④　４個","answer":3,"explanation":"適切なものはａ・ｃ・ｄの３個であり、正答は③である。ａ○：物品の運送を業とする者がその取引に付随して行う金銭の貸付けは、貸金業法2条1項の除外規定により貸金業の定義から除外される。ｃ○：貸付けの契約にはこれに係る保証契約も含まれると解される。ｄ○：住宅資金貸付契約には住宅の建設・購入資金だけでなく、住宅の改良に必要な資金の貸付けに係る契約も含まれる。ｂ×：「債務者等」には、債務者及び債務者であった者のほか、保証人・保証人であった者、物上保証人等も含まれるのであって、含まれないとする記述は誤りである。"},{"no":2,"category":"法及び関係法令に関すること","topic":"登録・届出","text":"貸金業の登録及び登録の更新に関する次の①～④の記述のうち、その内容が適切なものを１つだけ選びなさい。\n\n①　貸金業の登録の有効期間は、２年である。\n②　登録の更新は、有効期間満了の日の１か月前までに申請しなければならない。\n③　登録換えの申請をしただけで、新たな登録がされる前であっても、従前の登録の効力は直ちに失われる。\n④　登録の更新の申請があった場合において、有効期間の満了の日までにその申請について登録又は登録拒否の処分がなされないときは、従前の登録は有効期間の満了後もその処分がされるまでの間、なお効力を有する。","answer":4,"explanation":"正答は④である。登録の更新申請に対して有効期間満了日までに処分がなされない場合、従前の登録は処分がされるまでの間なお効力を有するとされている。①は誤りで、登録の有効期間は２年ではなく３年である。②は誤りで、登録の更新は有効期間満了の日の２か月前までに申請しなければならない。③は誤りで、登録換えの申請をしただけでは従前の登録の効力は失われず、新たな登録がされるまでは従前の登録がなお効力を有する。"},{"no":3,"category":"法及び関係法令に関すること","topic":"登録・届出","text":"貸金業者の変更の届出に関する次のａ～ｄの記述のうち、その内容が適切なものの組み合わせはどれか。\n\n- ａ　他に行っている事業の種類に変更があった場合、その日から２週間以内に届け出なければならない。\n- ｂ　広告等に表示する電子メールアドレス・ホームページアドレスの変更は、変更後２週間以内に届け出れば足りる。\n- ｃ　業務の種類及び方法の変更は、あらかじめ届け出なければならない事前届出事項である。\n- ｄ　登録換えの申請は、現に受けている登録をした財務局長等又は都道府県知事を経由して行う。\n\n①　ａｂ　　②　ａｄ　　③　ｂｃ　　④　ｃｄ","answer":2,"explanation":"適切な組み合わせはａｄであり、正答は②である。ａ○：他に行っている事業の種類の変更は、変更のあった日から２週間以内に届け出なければならない。ｄ○：登録換えの申請は、現に受けている登録をした財務局長等又は都道府県知事を経由して行う。ｂ×：広告・勧誘の際に表示する電子メールアドレス・ホームページアドレスの変更は「あらかじめ」届け出なければならない事前届出事項であり、変更後２週間以内の事後届出ではない。ｃ×：業務の種類及び方法の変更は事後届出事項であり、変更後２週間以内に届け出れば足りるのであって、事前届出事項ではない。"},{"no":4,"category":"法及び関係法令に関すること","topic":"登録拒否事由","text":"貸金業の登録拒否事由に関する次のａ～ｄの記述のうち、その内容が適切なものの組み合わせはどれか。\n\n- ａ　心身の故障により貸金業の業務を適正に執行することができない者は、登録拒否事由に該当する。\n- ｂ　道路交通法違反により罰金の刑に処せられ、その執行を終わった日から５年を経過しない者は、登録拒否事由に該当する。\n- ｃ　破産手続開始の決定を受け、復権を得た者は、登録拒否事由に該当する。\n- ｄ　法人である登録申請者の純資産額が5,000万円未満である場合、登録拒否事由に該当する。\n\n①　ａｂ　　②　ａｄ　　③　ｂｃ　　④　ｃｄ","answer":2,"explanation":"適切な組み合わせはａｄであり、正答は②である。ａ○：心身の故障により貸金業の業務を適正に執行できない者は登録拒否事由に該当する。ｄ○：法人である登録申請者の純資産額の要件は5,000万円以上であり、これに満たない場合は登録拒否事由に該当する。ｂ×：登録拒否事由となる罰金刑は貸金業法・出資法・刑法の一定の罪等特定の法令違反に限られ、道路交通法違反は含まれない。ｃ×：破産手続開始の決定を受けても復権を得れば登録拒否事由に該当しなくなる。"},{"no":5,"category":"法及び関係法令に関すること","topic":"貸金業務取扱主任者制度","text":"貸金業務取扱主任者制度に関する次の①～④の記述のうち、その内容が適切でないものを１つだけ選びなさい。\n\n①　営業所等ごとに、貸金業の業務に従事する者の数に対する貸金業務取扱主任者の数の割合が50分の１以上となる数の主任者を置かなければならない。\n②　貸金業務取扱主任者は、当該営業所等に常時勤務する者でなければならず、他の営業所等の主任者として登録されたままの者であってはならない。\n③　主任者の数が法定数を下回った場合、30日以内に必要な措置を執らなければならない。\n④　従業者名簿は、最終の記載をした日から10年間保存しなければならない。","answer":3,"explanation":"適切でないものは③であり、正答は③である。主任者の数が法定数を下回った場合の是正措置期間は30日以内ではなく２週間以内である。①は正しく、営業所等ごとに従業者50人に対して主任者1人以上の割合で設置しなければならない。②は正しく、主任者は当該営業所等に常時勤務し、他の営業所等の主任者として登録されたままの者であってはならない。④は正しく、従業者名簿は最終の記載をした日から10年間保存しなければならない。"},{"no":6,"category":"法及び関係法令に関すること","topic":"監督指針","text":"貸金業者向けの監督指針に関する次の①～④の記述のうち、その内容が適切なものを１つだけ選びなさい。\n\n①　内部監査部門は、営業部門の指揮命令系統下に置いても差し支えない。\n②　反社会的勢力との取引が判明した場合、弁済が滞る等の事態が生じるまで契約解消を留保することが適切な対応である。\n③　業務委託先に対する必要かつ適切な監督態勢の整備は、監督指針上の着眼点として明示されている。\n④　軽微な苦情案件も含め、すべて直ちに内部監査部門や経営陣に報告する態勢が監督指針上一律に求められる。","answer":3,"explanation":"正答は③である。業務委託先に対する必要かつ適切な監督態勢の整備は監督指針上の着眼点として明示されている。①は誤りで、内部監査部門は営業部門から独立した態勢で設置される必要があり、営業部門の指揮命令系統下に置くことは不適切である。②は誤りで、反社会的勢力との取引が判明した場合は可能な限り速やかに関係解消に向けた取組みを行うべきである。④は誤りで、軽微な苦情案件まで一律に直ちに報告する態勢が求められるものではなく、重要案件について適切に報告される態勢整備が求められているにとどまる。"},{"no":7,"category":"法及び関係法令に関すること","topic":"監督指針","text":"貸金業者向けの監督指針に関する次の①～④の記述のうち、その内容が適切でないものを１つだけ選びなさい。\n\n①　事業計画の作成は経営陣・企画部門が行うべきものであり、内部監査部門が主導して作成することは監査の独立性に反し不適切である。\n②　苦情等の記録・保存や指定ADR機関の情報を活用した分析・再発防止策への活用は、監督指針上の着眼点である。\n③　個人信用情報を返済能力調査以外の目的に利用しないための措置を講じる義務は、法定されていない。\n④　他に業務従事者がいない個人貸金業者は、自己検証リスト等により業務の適切性を確保する態勢整備が求められる。","answer":3,"explanation":"適切でないものは③であり、正答は③である。個人信用情報を返済能力調査以外の目的に利用しないための措置を講じる義務は、貸金業法及び監督指針上法定されているのであって、法定されていないとする記述は誤りである。①は正しく、事業計画の作成に内部監査部門が主導的に関与することは監査の独立性の観点から不適切とされる。②は正しく、苦情等対処態勢の実効性確保のための着眼点である。④は正しく、他に業務従事者がいない個人貸金業者にも自己検証等による態勢整備が求められる。"},{"no":8,"category":"法及び関係法令に関すること","topic":"返済能力調査","text":"貸金業者の返済能力調査に関する次の①～④の記述のうち、その内容が適切なものを１つだけ選びなさい。\n\n①　貸付けの媒介を行う場合には、返済能力の調査を行う必要はない。\n②　法人顧客との貸付契約については、返済能力の調査自体が不要である。\n③　保証人となろうとする者については、指定信用情報機関の信用情報を使用した調査は不要である。\n④　極度方式基本契約締結時に信用情報を使用した調査を行っていれば、個別の極度方式貸付けごとに改めて信用情報を使用した調査を行う必要はない。","answer":4,"explanation":"正答は④である。極度方式基本契約締結時に信用情報を使用した調査を行っていれば、個別の極度方式貸付けごとに改めて信用情報を使用した調査を行う必要はない。①は誤りで、貸付けの媒介を行う場合も返済能力の調査は必要である。②は誤りで、法人顧客であっても返済能力の調査自体は必要であり、信用情報機関の使用義務が個人顧客に限られることとは別問題である。③は誤りで、保証人となろうとする者についても指定信用情報機関の信用情報を使用した調査が必要である。"},{"no":9,"category":"法及び関係法令に関すること","topic":"年収証明書","text":"個人顧客に係る年収証明書に関する次のａ～ｄの記述のうち、その内容が適切なものの組み合わせはどれか。\n\n- ａ　貸付けの金額と個人顧客合算額との合計額が100万円を超える場合、年収証明書の徴求が必要となる。\n- ｂ　地方公共団体が交付する所得証明書・課税証明書は、年収証明書に該当しない。\n- ｃ　給与の支払明細書を年収証明書とする場合、地方税額を基に合理的に算出する方法によるときを除き、直近２か月分以上の提出を要する。\n- ｄ　一度年収証明書を徴求すれば、その後合算額が基準額（100万円）を超えても再度の徴求は不要である。\n\n①　ａｂ　　②　ａｃ　　③　ｂｄ　　④　ｃｄ","answer":2,"explanation":"適切な組み合わせはａｃであり、正答は②である。ａ○：貸付けの金額と個人顧客合算額との合計額が100万円を超える場合に年収証明書の徴求が必要となる。ｃ○：給与の支払明細書を年収証明書とする場合、地方税額を基に合理的に算出する方法によるときを除き、直近２か月分以上の提出を要する。ｂ×：地方公共団体が交付する所得証明書・課税証明書も年収証明書に該当し得る。ｄ×：合算額が基準額（100万円）を超える場合は、改めて年収証明書の徴求が必要である。"},{"no":10,"category":"法及び関係法令に関すること","topic":"総量規制","text":"総量規制における除外契約・例外契約に関する次の①～④の記述のうち、その内容が適切でないものを１つだけ選びなさい。\n\n①　不動産の売却代金により弁済されることが確実であると認められる貸付けは、除外契約に該当する。\n②　個人顧客の居宅を担保とする貸付けは、除外契約に該当する。\n③　高額療養費支払資金の貸付けは、除外契約に該当する。\n④　正規貸付けが行われるまでのつなぎ融資が例外契約に該当するための返済期間の上限は、１か月である。","answer":2,"explanation":"適切でないものは②であり、正答は②である。個人顧客の居宅を担保とする貸付けは除外契約ではなく、要件を満たせば例外契約として扱われるものであり、除外契約に該当するとする記述は誤りである。①は正しく、不動産売却代金弁済型のつなぎ融資は除外契約とされる。③は正しく、高額療養費支払資金の貸付けは除外契約とされる。④は正しく、つなぎ融資が例外契約に該当するための返済期間の上限は１か月である。"},{"no":11,"category":"法及び関係法令に関すること","topic":"総量規制","text":"総量規制に関する次の①～④の記述のうち、その内容が適切なものを１つだけ選びなさい。\n\n①　例外契約に係る貸付けの残高は、個人顧客合算額に算入されない。\n②　事業を営む個人顧客との契約が例外契約に該当するには、事業の実態確認が必要である。\n③　個人向け貸付けは、除外・例外貸付けを含め、他社分も合算した貸付残高が年収の３分の１を超えてはならない。\n④　借換え（借入残高減少型）が例外契約に該当するための要件として、新契約の１か月の返済負担が既存債務を上回ることが求められる。","answer":2,"explanation":"正答は②である。事業を営む個人顧客との契約が例外契約に該当するには事業の実態確認が必要である。①は誤りで、例外契約に係る貸付けの残高も個人顧客合算額に算入される。③は誤りで、総量規制の対象は除外・例外貸付けを「除いた」残高であり、除外・例外貸付けを含めて年収の３分の１を超えてはならないとする記述は誤りである。④は誤りで、段階的借換えが例外契約に該当するには新契約の１か月の返済負担が既存債務を「上回らない」ことが要件とされる。"},{"no":12,"category":"法及び関係法令に関すること","topic":"基準額超過調査","text":"極度方式基本契約に係る基準額超過極度方式基本契約の調査に関する次の①～④の記述のうち、その内容が適切でないものを１つだけ選びなさい。\n\n①　極度方式貸付けの残高が10万円以下である場合は、基準額超過極度方式基本契約に該当するかどうかの調査を要しない。\n②　基準額超過極度方式基本契約に該当すると認められるときは、極度額の減額又は新たな極度方式貸付けの停止の措置を講じなければならない。\n③　極度額の減額等の措置を講じた場合、その後は調査を継続する必要がない。\n④　調査が必要となるのは、所定の期間内の極度方式貸付けの合計額が5万円を超え、かつ当該期間の末日における残高の合計額が10万円を超える場合である。","answer":3,"explanation":"適切でないものは③であり、正答は③である。極度額の減額等の措置を講じた場合であっても、その後も３か月以内の一定期間ごとの調査を継続する必要がある。①は正しく、残高が10万円以下である場合は調査を要しない。②は正しく、基準額超過極度方式基本契約に該当すると認められるときは極度額の減額又は新たな極度方式貸付けの停止の措置を講じなければならない。④は正しく、所定の期間内の極度方式貸付けの合計額が5万円を超え、かつ当該期間の末日における残高の合計額が10万円を超える場合に調査が必要となる。"},{"no":13,"category":"法及び関係法令に関すること","topic":"広告・勧誘規制","text":"貸金業者の広告・勧誘規制に関する次のａ～ｄの記述のうち、その内容が適切なものの個数として正しいものはどれか。\n\n- ａ　広告に表示する電話番号は、担当者の携帯電話番号でもよい。\n- ｂ　広告における貸金業者の登録番号は、括弧書（更新回数を示す部分）を省略して表示することができる。\n- ｃ　誇大広告等の禁止に違反した場合、業務改善命令にとどまり登録取消しの対象とはならない。\n- ｄ　賠償額の予定（違約金を含む）に関する定めをする場合、その元本に対する割合を広告等で表示・説明しなければならない。\n\n①　１個　　②　２個　　③　３個　　④　４個","answer":2,"explanation":"正答は②（適切なものは2個）。ｂ○: 広告等に表示する登録番号は、括弧書（更新回数部分）を省略することができる。ｄ○: 賠償額の予定（違約金を含む）の定めをする場合の元本に対する割合は、貸金業法15条により広告・勧誘時に表示・説明すべき事項に該当する（第20回問11参照）。ａ×: 広告に表示する電話番号は貸金業者登録簿に登録された電話番号である必要があり、担当者の携帯電話番号は認められない。ｃ×: 誇大広告等の禁止（16条）への違反は業務改善命令にとどまらず、業務停止命令等の監督処分の対象となり得る。"},{"no":14,"category":"法及び関係法令に関すること","topic":"契約締結前書面","text":"契約締結前書面に関する次の①～④の記述のうち、その内容が適切なものを１つだけ選びなさい。\n\n①　極度方式基本契約を締結しようとする場合、契約締結前に内閣府令で定める書面を交付しなければならない。\n②　保証契約についての契約締結前書面は、保証人となろうとする者ではなく主債務者に交付すれば足りる。\n③　契約締結前書面の記載事項の内容に変更が生じた場合、再度の書面交付は一切不要である。\n④　契約締結前書面には、契約年月日や契約の相手方の氏名・住所を記載しなければならない。","answer":1,"explanation":"正答は①である。極度方式基本契約を締結しようとする場合、契約締結前に内閣府令で定める書面を交付しなければならない。②は誤りで、保証契約についての契約締結前書面は保証人となろうとする者に交付する必要がある。③は誤りで、記載事項の内容に変更が生じた場合は再度の書面交付が必要とされる場合がある。④は誤りで、契約締結「前」の書面の性質上、契約年月日等の契約締結後に確定する事項は記載事項に含まれない。"},{"no":15,"category":"法及び関係法令に関すること","topic":"契約締結時書面","text":"契約締結時書面に関する次の①～④の記述のうち、その内容が適切でないものを１つだけ選びなさい。\n\n①　契約締結時書面は、相手方から書面交付を希望する申出がない限り、承諾を得ずに電磁的方法により提供することができる。\n②　貸付けの利率を引き下げる変更をした場合、契約締結時書面を改めて交付する必要はない。\n③　登録番号の括弧書（登録回数）のみの変更は、契約締結時書面の再交付を要する重要な変更に当たらない。\n④　極度方式基本契約の契約締結時書面には、極度額を１回貸し付けたと仮定する等の仮定に基づく返済金額の合計額、返済期間・回数を記載しなければならない。","answer":1,"explanation":"適切でないものは①であり、正答は①である。契約締結時書面の電磁的方法による提供は、相手方の承諾を得た場合に限られるのであって、承諾を得ずに提供できるとする記述は誤りである。②は正しく、顧客に不利益とならない利率引下げは再交付を要しない。③は正しく、登録番号の括弧書のみの変更は重要な内容の変更に当たらず再交付不要とされる。④は正しく、極度方式基本契約の契約締結時書面の記載事項として仮定に基づく返済金額等の記載が求められる。"},{"no":16,"category":"法及び関係法令に関すること","topic":"契約締結時書面","text":"契約締結時書面の再交付に関する次の①～④の記述のうち、その内容が適切なものを１つだけ選びなさい。\n\n①　各回の返済金額を減額する変更をした場合、契約締結時書面を改めて交付する必要はない。\n②　極度額を一旦引き下げた後、当初の極度額の範囲内に引き上げる場合は、書面の再交付を要しない。\n③　保証契約が締結されている場合、返済期日・返済金額等の変更が生じても、保証人への書面交付は不要である。\n④　個別の貸付契約の契約締結時書面は、基本契約番号を記載すれば契約年月日・貸付金額等の記載を省略できる。","answer":2,"explanation":"正答は②である。極度額を一旦引き下げた後に当初の極度額の範囲内に引き上げる場合は、実質的に新たな不利益を生じないため書面の再交付を要しない。①は誤りで、各回の返済金額の減額など重要な内容の変更は再交付が必要である。③は誤りで、保証契約がある場合、返済期日・返済金額等の変更が生じたときは保証人にも変更後の契約締結時書面を交付しなければならない。④は誤りで、個別の貸付契約の契約締結時書面は独立して契約年月日・貸付金額等の必要事項を記載しなければならない。"},{"no":17,"category":"法及び関係法令に関すること","topic":"受取証書・帳簿","text":"受取証書及び帳簿の備付けに関する次の①～④の記述のうち、その内容が適切なものを１つだけ選びなさい。\n\n①　口座振込みによる弁済の場合、貸金業者は債務者から請求がなくても常に受取証書を交付しなければならない。\n②　第三者が弁済した場合、受取証書には弁済者の氏名のみを記載すれば足りる。\n③　帳簿の保存期間は、契約を締結した日から起算して10年間である。\n④　契約締結時書面の写しの保存をもって、帳簿の一部記載事項の記載に代えることが認められている。","answer":4,"explanation":"正答は④である。施行規則により、契約締結時書面の写しの保存をもって帳簿の一部記載事項の記載に代えることが認められている。①は誤りで、口座振込みによる弁済の場合は債務者から請求があったときに受取証書を交付すれば足りる。②は誤りで、第三者が弁済した場合、受取証書には債務者の氏名と弁済者の氏名の双方を記載しなければならない。③は誤りで、帳簿の保存期間は契約締結日からではなく、契約ごとに定められた最終の返済期日（債権消滅時はその消滅日）から少なくとも10年間である。"},{"no":18,"category":"法及び関係法令に関すること","topic":"取立行為規制","text":"貸金業法21条の取立行為規制に関する次の①～④の記述のうち、その内容が適切でないものを１つだけ選びなさい。\n\n①　正当な理由なく債務者を訪問することが禁止される時間帯は、午後9時から午前8時までである。\n②　反復継続した電話・電報・電子メール・訪問等は、債務者等の私生活・業務の平穏を害する言動に該当するおそれが大きい。\n③　家族に知られないよう要請を受けている場合であっても、そのような要請の有無にかかわらず取立ての違反該当性の判断は変わらない。\n④　勤務先訪問を告げる行為は、状況によっては私生活の平穏を害する取立てとして違反行為に該当し得る。","answer":3,"explanation":"適切でないものは③であり、正答は③である。家族に知られないよう要請を受けている場合は、プライバシー侵害のおそれが特に大きいと判断されるのであって、要請の有無にかかわらず判断が変わらないとする記述は誤りである。①は正しく、取立てにおいて正当な理由なく訪問等が禁止される時間帯は午後9時から午前8時までである。②は正しく、反復継続した電話・電報・訪問等は私生活・業務の平穏を害する言動に該当するおそれが大きいとされる。④は正しく、勤務先訪問を告げる行為は状況によっては違反行為に該当し得る。"},{"no":19,"category":"法及び関係法令に関すること","topic":"債権譲渡規制","text":"貸金業者の債権譲渡規制に関する次のａ～ｄの記述のうち、その内容が適切なものの個数として正しいものはどれか。\n\n- ａ　貸付債権を貸金業者から貸金業者へ譲渡する場合は、譲受人への通知義務は生じない。\n- ｂ　貸金業者は、債権の譲受人が暴力団員等であることを知り、又は知り得たときは、行政処分の対象となり得る。\n- ｃ　貸付債権の譲渡があった場合、譲渡人である貸金業者が、債務者に対し、改めて貸金業法第17条に規定する事項を記載した書面を交付しなければならない。\n- ｄ　貸金業者が貸付けに係る契約に基づく債権を他人に譲渡した場合、原則として一定期間内にその旨を登録行政庁に届け出なければならない。\n\n①　１個　　②　２個　　③　３個　　④　４個","answer":2,"explanation":"正答は②（適切なものは2個）。ｂ○: 譲受人が暴力団員等であることを知り、又は知り得たときは行政処分の対象となり得る（第20回問13参照）。ｄ○: 貸付けに係る契約に基づく債権を他人に譲渡したときは、開始等の届出事項として登録行政庁への届出を要する。ａ×: 譲受人が貸金業者であっても、譲渡人は貸金業法24条1項の通知（24条の規定の適用がある旨等）を行わなければならない。ｃ×: 債権譲渡後に17条書面に相当する書面の交付義務を負うのは譲受人であり（24条2項）、譲渡人ではない。"},{"no":20,"category":"法及び関係法令に関すること","topic":"監督処分・届出","text":"貸金業者の監督処分及び届出に関する次の①～④の記述のうち、その内容が適切でないものを１つだけ選びなさい。\n\n①　貸金業者が暴力団員等を業務に従事させ又は補助者として使用した場合、登録行政庁は登録を取り消さなければならない。\n②　貸金業者は事業年度ごとに事業報告書を作成し、毎事業年度経過後３か月以内に登録行政庁に提出しなければならない。\n③　個人である貸金業者が死亡した場合、相続人はその事実を知った日から２週間以内に届け出なければならない。\n④　業務改善命令は、法令違反の場合に限らず、資金需要者等の利益を害する事実がある場合等にも発することができる。","answer":3,"explanation":"適切でないものは③であり、正答は③である。個人である貸金業者が死亡した場合、相続人による届出期限は事実を知った日から２週間以内ではなく30日以内である。①は正しく、暴力団員等の業務従事・使用は必要的な登録取消し事由である。②は正しく、事業報告書は毎事業年度経過後３か月以内に提出しなければならない。④は正しく、業務改善命令は法令違反の場合に限られず、資金需要者等の利益を害する事実がある場合等にも発することができる。"},{"no":21,"category":"法及び関係法令に関すること","topic":"監督処分・届出","text":"貸金業者の届出事項に関する次のａ～ｄの記述のうち、その内容が適切なものの組み合わせはどれか。\n\n- ａ　貸金業務の第三者委託の開始・終了は、開始等の届出事項として該当することとなった日から２週間以内に届け出る。\n- ｂ　貸金業協会への加入・脱退は、該当することとなった日から30日以内に届け出れば足りる。\n- ｃ　株式会社Ａが合併により消滅した場合、届出義務を負うのは存続会社Ｂの代表取締役である。\n- ｄ　破産手続開始の決定があったときは、貸金業者の登録の効力は失われる。\n\n①　ａｂ　　②　ａｄ　　③　ｂｃ　　④　ｃｄ","answer":2,"explanation":"適切な組み合わせはａｄであり、正答は②である。ａ○：貸金業務の第三者委託の開始・終了は、開始等の届出事項として該当することとなった日から２週間以内に届け出る。ｄ○：破産手続開始の決定があったときは、貸金業者の登録の効力は失われる。ｂ×：貸金業協会への加入・脱退の届出期限は30日以内ではなく２週間以内である。ｃ×：合併により株式会社Ａが消滅した場合、届出義務を負うのは存続会社Ｂの代表取締役ではなく、消滅会社Ａの代表役員であった者である。"},{"no":22,"category":"法及び関係法令に関すること","topic":"指定信用情報機関","text":"指定信用情報機関に関する次の①～④の記述のうち、その内容が適切なものを１つだけ選びなさい。\n\n①　全国銀行個人信用情報センターは、貸金業法上の指定信用情報機関である。\n②　指定信用情報機関は、他の指定信用情報機関の加入貸金業者からの依頼に基づき情報提供の依頼を受けたときは、正当な理由がある場合を除き提供に応じなければならない。\n③　信用情報提供の依頼に係る同意は、口頭のみで取得すれば足りる。\n④　極度方式貸付けについては、極度方式基本契約締結時にのみ信用情報を提供すればよく、その後の個別貸付けの都度の提供は不要である。","answer":2,"explanation":"正答は②である。指定信用情報機関は、他の指定信用情報機関の加入貸金業者からの情報提供依頼を受けたときは、正当な理由がある場合を除き提供に応じなければならない（指定信用情報機関間の情報交流義務）。①は誤りで、貸金業法上の指定信用情報機関は主に日本信用情報機構とシー・アイ・シーであり、全国銀行個人信用情報センターは指定を受けていない。③は誤りで、信用情報提供の依頼に係る同意は書面又は電磁的方法によることが求められ、口頭のみでは足りない。④は誤りで、極度方式貸付けを行う都度等、政令・内閣府令で定めるタイミングでの信用情報提供が求められる。"},{"no":23,"category":"法及び関係法令に関すること","topic":"利息制限法","text":"利息制限法の上限利率に関する次の①～④の記述のうち、その内容が適切でないものを１つだけ選びなさい。\n\n①　元本額が10万円未満の場合の上限利率は、年20％である。\n②　元本額が100万円以上の場合の上限利率は、年15％である。\n③　貸主が異なる２つの契約であっても、借主が同一人であれば元本を合算して上限利率を判定する。\n④　利息制限法の上限利率を超える利息の約定をした場合、その超過部分に限り無効となる。","answer":3,"explanation":"適切でないものは③であり、正答は③である。元本の合算は同一貸主に対する複数契約について行われるものであり、貸主が異なる場合は借主が同一人であっても合算されない。①は正しく、元本額10万円未満の上限利率は年20％である。②は正しく、元本額100万円以上の上限利率は年15％である。④は正しく、上限を超える利息の約定は契約全体ではなく超過部分に限り無効となる。"},{"no":24,"category":"法及び関係法令に関すること","topic":"利息制限法","text":"Ａ社からＢが既に元本20万円を借り入れており、残存元本が20万円ある状態で、Ｂが同じＡ社から新たに90万円を借り入れる場合の利息制限法上の上限利率等に関する次の①～④の記述のうち、その内容が適切なものを１つだけ選びなさい。\n\n①　合算元本額110万円を基準に、新規貸付けの上限利率は年15％が適用される。\n②　新規貸付けの元本90万円のみを基準に、上限利率は年18％が適用される。\n③　営業的金銭消費貸借における賠償額の予定（遅延損害金を含む）は、元本に対する割合が年30％を超える部分について無効となる。\n④　保証料については、利息制限法上の上限利率規制の対象とならない。","answer":1,"explanation":"正答は①である。同一貸主に対する複数契約がある場合は、既存の残存元本と新規貸付けの元本を合算した額を基準に上限利率を判定するため、合算元本額110万円（20万円＋90万円）を基準とすると100万円以上の区分に該当し、上限利率は年15％が適用される。②は誤りで、新規貸付けの元本のみを基準とせず、残存元本と合算して判定しなければならない。③は誤りで、賠償額の予定（遅延損害金を含む）は元本に対する割合が年20％を超える部分について無効となるのであり、年30％ではない。④は誤りで、利息制限法は保証料についても利息とみなして上限利率規制の対象とする規定を置いている。"},{"no":25,"category":"法及び関係法令に関すること","topic":"みなし利息","text":"みなし利息に関する次の①～④の記述のうち、その内容が適切でないものを１つだけ選びなさい。\n\n①　口座振替の方法による弁済に係る費用（口座振替手数料）は、原則としてみなし利息に該当しない。\n②　契約締結時書面の交付費用は、原則としてみなし利息に該当する。\n③　カードの発行費用は、原則としてみなし利息に該当する。\n④　現金自動支払機（ATM）等の利用料は、１万円以下の取引につき110円以内であればみなし利息に含まれない。","answer":1,"explanation":"適切でないものは①であり、正答は①である。口座振替の方法による弁済に係る費用（口座振替手数料）は、原則としてみなし利息に該当し、該当しないとする記述は誤りである。②は正しく、契約締結時書面の交付費用は原則としてみなし利息に該当する。③は正しく、カードの発行費用も原則としてみなし利息に該当する。④は正しく、ATM等の利用料は一定の金額の範囲内（1万円以下の場合110円以内、1万円超の場合220円以内）であればみなし利息に含まれない特則がある。"},{"no":26,"category":"法及び関係法令に関すること","topic":"出資法","text":"出資法の上限金利等に関する次の①～④の記述のうち、その内容が適切でないものを１つだけ選びなさい。\n\n①　貸金業者が金銭の貸付けを行う場合の上限金利は、年20％である。\n②　貸金業者が利息制限法の上限を超える利息の契約を締結しただけで、直ちに出資法上の刑事罰の対象となる。\n③　金銭の貸借の媒介手数料は、元本に対し年5％を超えて受領してはならない。\n④　貸金業者でない者どうしの金銭貸借（個人間貸借等）において刑事罰の対象となる上限金利は、年109.5％である。","answer":2,"explanation":"適切でないものは②であり、正答は②である。出資法上の刑事罰の対象となるのは出資法上の上限金利（貸金業者の場合は年20％）を超える場合であって、利息制限法の上限を超える利息の契約を締結しただけでは直ちに出資法上の刑事罰の対象とはならない。①は正しく、貸金業者に対する出資法上の上限金利は年20％である。③は正しく、金銭の貸借の媒介手数料は元本に対し年5％を超えて受領してはならない。④は正しく、貸金業者でない者どうしの金銭貸借において刑事罰の対象となる上限金利は年109.5％である。"},{"no":27,"category":"法及び関係法令に関すること","topic":"禁止行為","text":"貸金業法上の禁止行為に関する次の①～④の記述のうち、その内容が適切でないものを１つだけ選びなさい。\n\n①　対面することなく行う業務にのみ従事する者についても、一律に従業者証明書を携帯させなければならない。\n②　貸金業者が不確実な事項について断定的判断を提供して勧誘する行為は禁止される。\n③　貸金業者は、貸付けの相手方等の自殺による死亡を保険事故とする保険契約を原則として締結してはならない。\n④　特定公正証書の作成を公証人に嘱託する場合の書面交付・説明義務は、嘱託の前に行わなければならない。","answer":1,"explanation":"適切でないものは①であり、正答は①である。従業者証明書の携帯義務は、資金需要者等と対面して業務を行う従業者を主眼とした規定であり、対面することなく行う業務にのみ従事する者について一律に携帯させなければならないとする記述は誤りである。②は正しく、不確実な事項について断定的判断を提供して勧誘する行為は禁止行為に該当する。③は正しく、自殺による死亡を保険事故とする保険契約の締結は原則禁止される。④は正しく、特定公正証書作成の嘱託に関する書面交付・説明義務は嘱託の前に行わなければならない。"},{"no":28,"category":"貸付け及び貸付けに付随する取引に関する法令及び実務に関すること","topic":"意思表示","text":"意思表示に関する次の①～④の記述のうち、民法上、その内容が適切でないものを１つだけ選びなさい。\n\n①　意思表示は、その通知が相手方に到達した時からその効力を生ずる。\n②　心裡留保による意思表示は、相手方がその意思表示が表意者の真意ではないことを知り、又は知ることができたときであっても、常に有効である。\n③　虚偽表示による意思表示の無効は、善意の第三者に対抗することができない。\n④　表意者が意思表示の通知を発した後に死亡した場合であっても、意思表示はそのために効力を妨げられない。","answer":2,"explanation":"①適切である。意思表示は、その通知が相手方に到達した時からその効力を生ずる（到達主義、民法97条1項）。②適切でない。心裡留保による意思表示は原則として有効であるが、相手方がその意思表示が表意者の真意ではないことを知り、又は知ることができたときは無効となる（民法93条1項ただし書）。相手方が悪意であった場合に常に有効であるとする記述は誤りである。③適切である。虚偽表示による意思表示の無効は、善意の第三者に対抗することができない（民法94条2項）。④適切である。表意者が意思表示の通知を発した後に死亡した場合であっても、意思表示はそのために効力を妨げられない（民法97条3項）。"},{"no":29,"category":"貸付け及び貸付けに付随する取引に関する法令及び実務に関すること","topic":"意思能力・行為能力","text":"ＡはＢとの間で金銭消費貸借契約を締結した。この場合に関する次の①～④の記述のうち、民法上、その内容が適切なものを１つだけ選びなさい。\n\n①　Ｂが契約締結時に意思能力を有しない状態にあった場合、当該契約は無効ではなく、取り消すことができるにとどまる。\n②　Ｂが被保佐人であった場合、金銭を借り入れるにあたり、保佐人の同意を得ることを要しない。\n③　Ｂが未成年者であり、法定代理人の同意を得ずに契約を締結した場合において、Ｂが詐術を用いて自己を成年者であると信じさせていたときは、Ｂ及びその法定代理人のいずれも当該契約を取り消すことができない。\n④　Ｂが成年被後見人であった場合、後見人の同意を得て契約を締結したときは、日用品の購入その他日常生活に関する行為でなくとも、当該契約を取り消すことができない。","answer":3,"explanation":"①適切でない。Ｂが契約締結時に意思能力を有しない状態にあった場合、当該契約は取り消すことができるのではなく、無効である（民法3条の2）。②適切でない。Ｂが被保佐人であった場合、金銭を借り入れるには保佐人の同意を得なければならない（民法13条1項2号）。同意を要しないとする記述は誤りである。③適切である。Ｂが未成年者であり、法定代理人の同意を得ずに契約を締結した場合において、Ｂが詐術を用いて自己を成年者であると信じさせていたときは、Ｂ及びその法定代理人のいずれも当該契約を取り消すことができない（民法21条）。④適切でない。Ｂが成年被後見人であった場合、後見人の同意を得て契約を締結したときであっても、日用品の購入その他日常生活に関する行為を除き、当該契約を取り消すことができる（民法9条本文）。"},{"no":30,"category":"貸付け及び貸付けに付随する取引に関する法令及び実務に関すること","topic":"代理","text":"ＡはＢのために代理人としてＣとの間で金銭消費貸借契約を締結した。この場合に関する次の①～④の記述のうち、民法上、その内容が適切なものを１つだけ選びなさい。\n\n①　Ａが本人Ｂのためにすることを示さずに意思表示をした場合であっても、相手方Ｃがそのことを知っていたときは、その意思表示は本人Ｂに対して直接に効力を生ずる。\n②　Ａに代理権がなかった場合において、相手方Ｃが代理権のないことを知らなかったときは、Ｃが悪意であるときに限り、Ｃは本人Ｂが追認をしない間、契約を取り消すことができる。\n③　Ａの代理権が消滅した後にＡがした行為について、相手方Ｃに過失があった場合であっても、表見代理が成立し、本人Ｂに効果が帰属する。\n④　ＡがＢの代理人であると同時にＣの代理人でもある双方代理は、本人の許諾の有無にかかわらず、当然に有効な代理行為となる。","answer":1,"explanation":"①適切である。Ａが本人Ｂのためにすることを示さずに意思表示をした場合であっても、相手方Ｃがそのことを知っていた（悪意であった）ときは、その意思表示は本人Ｂに対して直接に効力を生ずる（民法100条ただし書）。②適切でない。Ａに代理権がなかった場合（無権代理）において、相手方Ｃが代理権のないことを知らなかった（善意であった）ときは、Ｃは本人Ｂが追認をしない間、契約を取り消すことができる（民法115条）。Ｃが悪意の場合に限り取り消せるとする記述は誤りである。③適切でない。Ａの代理権が消滅した後にＡがした行為について、相手方Ｃに過失があった場合には表見代理は成立せず、本人Ｂに効果は帰属しない。代理権消滅後の表見代理は相手方が善意無過失であることを要件とする（民法112条）。④適切でない。ＡがＢの代理人であると同時にＣの代理人でもある双方代理は、本人があらかじめ許諾した行為を除き、原則として無権代理行為とみなされる（民法108条1項）。当然に有効な代理行為となるとする記述は誤りである。"},{"no":31,"category":"貸付け及び貸付けに付随する取引に関する法令及び実務に関すること","topic":"無効・取消し","text":"法律行為の無効及び取消しに関する次の①～④の記述のうち、民法上、その内容が適切でないものを１つだけ選びなさい。\n\n①　取り消された法律行為は、初めから無効であったものとみなされる。\n②　制限行為能力者は、法定代理人等の同意を得ることなく、単独で自ら行った法律行為を取り消すことができる。\n③　意思無能力者が取り消された行為に基づく給付を受けていた場合、現に利益を受けている限度で返還すれば足りる。\n④　無効な法律行為を、当事者がその行為の無効を知って追認したときは、その行為の時に遡って有効となる。","answer":4,"explanation":"①適切である。取り消された法律行為は、初めから無効であったものとみなされる（民法121条）。②適切である。制限行為能力者は、法定代理人等の同意を得ることなく、単独で自ら行った法律行為を取り消すことができる（民法120条1項）。③適切である。意思無能力者が取り消された行為に基づく給付を受けていた場合、現に利益を受けている限度（現存利益）で返還すれば足りる（民法121条の2第3項）。④適切でない。無効な法律行為を追認したときであっても、その行為が遡って有効になるわけではなく、当事者がその行為の無効を知って追認をしたときは、新たな行為をしたものとみなされるにとどまる（民法119条）。行為の時に遡って有効となるとする記述は誤りである。"},{"no":32,"category":"貸付け及び貸付けに付随する取引に関する法令及び実務に関すること","topic":"時効","text":"ＡはＢに対して有する貸付金債権について消滅時効の完成の有無が問題となっている。この場合に関する次の①～④の記述のうち、民法上、その内容が適切なものを１つだけ選びなさい。\n\n①　ＡのＢに対する貸付金債権が時効によって消滅するというためには当事者による援用を要せず、裁判所が職権でその完成を考慮することができる。\n②　ＢがＡに対する債務の存在を承認した場合において、時効完成の事実を知らずに承認をしたときは、時効の更新の効力は生じない。\n③　ＡのＢに対する貸付金債権は、Ａが権利を行使することができることを知った時から5年間、又は権利を行使することができる時から10年間のいずれか早い方の経過によって、時効により消滅する。\n④　消滅時効の完成前に、あらかじめＢが時効の利益を放棄する旨をＡと合意することができる。","answer":3,"explanation":"①適切でない。ＡのＢに対する貸付金債権が時効によって消滅するというためには、当事者であるＢ（時効の援用権者）による援用が必要であり、裁判所が職権でその完成を考慮することはできない（民法145条）。②適切でない。ＢがＡに対する債務の存在を承認した場合、当該承認は時効の更新事由となり、時効はその時から新たにその進行を始める。時効完成の事実を知らずに承認をした場合であっても更新の効力が否定されるものではない。③適切である。ＡのＢに対する貸付金債権は、Ａが権利を行使することができることを知った時から5年間、又は権利を行使することができる時から10年間のいずれか早い方の経過によって、時効により消滅する（民法166条1項）。④適切でない。消滅時効の完成前に、あらかじめＢが時効の利益を放棄する旨をＡと合意することはできない（民法146条）。"},{"no":33,"category":"貸付け及び貸付けに付随する取引に関する法令及び実務に関すること","topic":"抵当権・根抵当権","text":"ＡはＢに対する貸付金債権を担保するため、Ｂ所有の不動産に根抵当権の設定を受けた。この場合に関する次の①～④の記述のうち、民法上、その内容が適切なものを１つだけ選びなさい。\n\n①　根抵当権は、担保すべき不特定の債権について、その範囲を定めることなく担保することができる。\n②　元本確定期日の定めがない根抵当権について、根抵当権設定者は根抵当権設定の時から3年を経過したときは、元本の確定を請求することができる。\n③　確定した元本のほか利息その他の定期金について根抵当権を行使できる範囲は、抵当権と同様に最後の2年分に限定される。\n④　元本確定前にＡの被担保債権をＣが譲り受けた場合、Ｃはその債権について根抵当権を行使することができる。","answer":2,"explanation":"①適切でない。根抵当権は、担保すべき不特定の債権について、その範囲を定めなければならず、範囲を定めることなく担保することはできない（民法398条の2第1項）。②適切である。元本確定期日の定めがない根抵当権について、根抵当権設定者は根抵当権設定の時から3年を経過したときは、元本の確定を請求することができる（民法398条の19第1項）。③適切でない。確定した元本のほか利息その他の定期金について根抵当権を行使できる範囲は、抵当権のように最後の2年分に限定されるものではなく、極度額の範囲内で全部について行使することができる（民法398条の3第1項）。④適切でない。元本確定前にＡの被担保債権をＣが譲り受けた場合であっても、Ｃはその債権について根抵当権を行使することができない。元本確定前の根抵当権には随伴性がないためである（民法398条の7第1項）。"},{"no":34,"category":"貸付け及び貸付けに付随する取引に関する法令及び実務に関すること","topic":"保証・連帯保証","text":"ＡはＢに対する貸付けに際し、ＣをＢの連帯保証人とする連帯保証契約を締結した。この場合に関する次の①～④の記述のうち、民法上、その内容が適切なものを１つだけ選びなさい。\n\n①　ＡＣ間の保証契約は、書面（又は電磁的記録）でしなければその効力を生じない。\n②　連帯保証人Ｃは、Ａから履行の請求を受けたときは、まずＢに催告すべき旨を請求する催告の抗弁権を有する。\n③　ＡのＢに対する履行の請求による時効の完成猶予の効力は、連帯保証人Ｃに対しては及ばない。\n④　ＡがＣに対して履行を請求したことによる時効の完成猶予及び更新の効力は、主たる債務者Ｂに対しても及ぶ。","answer":1,"explanation":"①適切である。ＡＣ間の保証契約は、書面（又は電磁的記録）でしなければその効力を生じない（民法446条2項）。②適切でない。連帯保証人Ｃは、Ａから履行の請求を受けたときであっても、まずＢに催告すべき旨を請求する催告の抗弁権を有しない（民法454条）。③適切でない。ＡのＢに対する履行の請求による時効の完成猶予の効力は、付従性により連帯保証人Ｃに対しても及ぶ（民法457条1項）。及ばないとする記述は誤りである。④適切でない。ＡがＣに対して履行を請求したことによる時効の完成猶予及び更新の効力は、原則として主たる債務者Ｂに対しては及ばない（相対効の原則、民法458条による441条の準用）。Ｂに対しても及ぶとする記述は誤りである。"},{"no":35,"category":"貸付け及び貸付けに付随する取引に関する法令及び実務に関すること","topic":"保証・連帯保証","text":"保証債務に関する次の①～④の記述のうち、民法上、その内容が適切でないものを１つだけ選びなさい。\n\n①　通常の保証人は、債権者に対し催告の抗弁権及び検索の抗弁権を有する。\n②　保証人は、主たる債務者が有する相殺権を根拠として、債権者に対する履行を拒むことができる。\n③　数人の連帯保証人がいる場合、各連帯保証人は分別の利益を有し、自己の負担部分についてのみ保証債務を負う。\n④　主たる債務の内容が保証契約締結後に加重された場合であっても、保証人の負担は当然には加重されない。","answer":3,"explanation":"①適切である。通常の保証人は、債権者に対し催告の抗弁権及び検索の抗弁権を有する（民法452条・453条）。②適切である。保証人は、主たる債務者が有する相殺権を根拠として、債権者に対する履行を拒むことができる（民法457条3項）。③適切でない。数人の連帯保証人がいる場合、各連帯保証人には分別の利益がなく、各自が債務の全額について保証債務を負う。自己の負担部分についてのみ保証債務を負うとする記述は誤りである。④適切である。主たる債務の内容が保証契約締結後に加重された場合であっても、保証人の負担は当然には加重されない（民法448条2項）。"},{"no":36,"category":"貸付け及び貸付けに付随する取引に関する法令及び実務に関すること","topic":"債権譲渡","text":"ＡはＢに対する貸付金債権をＣ及びＤに二重に譲渡した。この場合に関する次の①～④の記述のうち、民法上、その内容が適切なものを１つだけ選びなさい。\n\n①　ＡからＢへの債権譲渡は、Ａ（譲渡人）からＢ（債務者）への通知又はＢの承諾がなくとも、Ｂその他の第三者に対抗することができる。\n②　Ｃ及びＤへの譲渡の通知がいずれも確定日付のある証書によるものである場合、両者の優劣は、確定日付の日付の先後によって決せられる。\n③　当事者Ａ・Ｂ間で譲渡制限の意思表示がされていた債権について譲渡がされた場合、当該譲渡は無効である。\n④　将来発生する債権についても、譲渡の対象とすることができる。","answer":4,"explanation":"①適切でない。ＡからＢへの債権譲渡は、Ａ（譲渡人）からＢ（債務者）への通知又はＢの承諾がなければ、Ｂその他の第三者に対抗することができない（民法467条1項）。②適切でない。Ｃ及びＤへの譲渡の通知がいずれも確定日付のある証書によるものである場合、判例上、両者の優劣は確定日付の日付の先後ではなく、確定日付のある通知が債務者Ｂに到達した日時の先後によって決せられる。③適切でない。当事者Ａ・Ｂ間で譲渡制限の意思表示がされていた債権について譲渡がされた場合であっても、譲渡自体は有効である（民法466条2項）。④適切である。将来発生する債権についても、譲渡の対象とすることができる（民法466条の6第1項）。"},{"no":37,"category":"貸付け及び貸付けに付随する取引に関する法令及び実務に関すること","topic":"弁済","text":"弁済に関する次の①～④の記述のうち、民法上、その内容が適切なものを１つだけ選びなさい。\n\n①　受領権者としての外観を有する者に対してした弁済は、弁済者が善意でありさえすれば、過失の有無を問わず有効となる。\n②　弁済をするについて正当な利益を有しない第三者は、債務者の意思に反する場合であっても、常に弁済をすることができる。\n③　弁済として数個の給付をすべき場合において、当事者間に充当の合意がないときは、費用、利息、元本の順に充当する。\n④　差押えを受けた債権の第三債務者が自己の債権者（差押債務者）に弁済したときは、差押債権者は、その弁済の効力を否定して再度の履行を請求することができない。","answer":3,"explanation":"①適切でない。受領権者としての外観を有する者に対してした弁済は、弁済者が善意であり、かつ過失がない場合に限り有効となる（民法478条）。善意であれば過失の有無を問わず有効であるとする記述は誤りである。②適切でない。弁済をするについて正当な利益を有しない第三者は、債務者の意思に反して弁済をすることができない（民法474条2項本文）。常にできるとする記述は誤りである。③適切である。弁済として数個の給付をすべき場合において、当事者間に充当の合意がないときは、費用、利息、元本の順に充当する（民法489条1項・491条）。④適切でない。差押えを受けた債権の第三債務者が自己の債権者（差押債務者）に弁済したときは、差押債権者は損害の限度で、その弁済の効力を否定して再度の履行を請求することができる（民法481条1項）。差押債権者が再度の履行請求をすることができないとする記述は誤りである。"},{"no":38,"category":"貸付け及び貸付けに付随する取引に関する法令及び実務に関すること","topic":"相殺","text":"ＡはＢに対して貸付金債権を有し、ＢはＡに対して売買代金債権を有している。この場合に関する次の①～④の記述のうち、民法上、その内容が適切でないものを１つだけ選びなさい。\n\n①　相殺の意思表示には、条件又は期限を付することができない。\n②　ＡのＢに対する貸付金債権が時効によって消滅した場合、その消滅以前に相殺適状にあったときであっても、Ａは当該債権を自働債権として相殺をすることができない。\n③　相殺の意思表示は、双方の債権が互いに相殺に適するようになった時に遡ってその効力を生ずる。\n④　当事者が相殺を禁止し又は制限する旨の意思表示をした場合、当該意思表示は、第三者がこれを知り、又は重大な過失によって知らなかったときに限り、その第三者に対抗することができる。","answer":2,"explanation":"①適切である。相殺の意思表示には、条件又は期限を付することができない（民法506条1項後段）。②適切でない。ＡのＢに対する貸付金債権が時効によって消滅した場合であっても、その消滅以前に相殺適状にあったときは、Ａは当該債権を自働債権として相殺をすることができる（民法508条）。消滅時効完成後は相殺できないとする記述は誤りである。③適切である。相殺の意思表示は、双方の債権が互いに相殺に適するようになった時に遡ってその効力を生ずる（民法506条2項）。④適切である。当事者が相殺を禁止し又は制限する旨の意思表示をした場合、当該意思表示は、第三者がこれを知り、又は重大な過失によって知らなかったときに限り、その第三者に対抗することができる（民法505条2項）。"},{"no":39,"category":"貸付け及び貸付けに付随する取引に関する法令及び実務に関すること","topic":"相続","text":"貸金業者Ａの貸付先であるＢが死亡し、Ｂの相続人としてＣ及びＤがいる場合に関する次の①～④の記述のうち、民法上、その内容が適切なものを１つだけ選びなさい。\n\n①　ＢのＡに対する金銭債務のような可分債務は、遺産分割を経なければ、Ｃ及びＤに承継されない。\n②　ＢのＡに対する債務について限定承認をする場合、共同相続人であるＣ及びＤの一人が単独ですることができる。\n③　ＣがＢの相続を放棄した場合、Ｃの子がＣを代襲して相続人となる。\n④　ＣがＢの相続を放棄する場合、家庭裁判所への申述によってその効力を生ずる。","answer":4,"explanation":"①適切でない。ＢのＡに対する金銭債務のような可分債務は、遺産分割を経ることなく、相続開始と同時に法定相続分に応じて当然にＣ及びＤに分割承継される。②適切でない。ＢのＡに対する債務について限定承認をする場合、共同相続人であるＣ及びＤの一人が単独ですることはできず、共同相続人全員が共同してのみすることができる（民法923条）。③適切でない。ＣがＢの相続を放棄した場合、Ｃの子がＣを代襲して相続人となることはない。代襲相続は死亡・欠格・廃除の場合に生ずるものであり、相続放棄の場合には生じない（民法887条2項）。④適切である。ＣがＢの相続を放棄する場合、家庭裁判所への申述によってその効力を生ずる（民法938条）。"},{"no":40,"category":"貸付け及び貸付けに付随する取引に関する法令及び実務に関すること","topic":"破産法","text":"貸金業者Ａの貸付先であるＢについて破産手続が開始された場合に関する次の①～④の記述のうち、破産法上、その内容が適切でないものを１つだけ選びなさい。\n\n①　ＡのＢに対する破産債権とは、Ｂに対し破産手続開始前の原因に基づいて生じた財産上の請求権をいう。\n②　Ａが抵当権のような別除権を有する場合、当該別除権は破産手続によらないで行使することができる。\n③　Ａが別除権を有する場合、Ａは被担保債権の全額について破産手続に参加し配当を受けることができる。\n④　Ａが破産手続開始後に破産財団に対して債務を負担した場合、原則として相殺をすることができない。","answer":3,"explanation":"①適切である。ＡのＢに対する破産債権とは、Ｂに対し破産手続開始前の原因に基づいて生じた財産上の請求権をいう（破産法2条5項）。②適切である。Ａが抵当権のような別除権を有する場合、当該別除権は破産手続によらないで行使することができる（破産法2条9項）。③適切でない。Ａが別除権を有する場合、Ａは被担保債権の全額について破産手続に参加し配当を受けることができるものではなく、別除権の行使によって弁済を受けられない不足額についてのみ破産債権者として権利を行使することができる（不足額責任主義）。④適切である。Ａが破産手続開始後に破産財団に対して債務を負担した場合、原則として相殺をすることができない（破産法71条1項1号）。"},{"no":41,"category":"貸付け及び貸付けに付随する取引に関する法令及び実務に関すること","topic":"手形・電子記録債権","text":"手形及び電子記録債権に関する次の①～④の記述のうち、その内容が適切でないものを１つだけ選びなさい。\n\n①　裏書の連続する手形の所持人は、適法な所持人と推定され、自ら実質的権利を有することを証明する必要はない。\n②　手形の振出人は、直接の相手方に対する人的抗弁事由を、当該事由につき善意の裏書譲受人に対抗することができる。\n③　電子記録債権は、原則として発生記録をすることによって生ずる。\n④　電子記録債権の譲渡は、譲渡記録をしなければその効力を生じない。","answer":2,"explanation":"①適切である。裏書の連続する手形の所持人は、適法な所持人と推定され、自ら実質的権利を有することを証明する必要はない（手形法16条1項）。②適切でない。手形の振出人は、直接の相手方に対する人的抗弁事由（詐欺等）を、当該事由につき善意の裏書譲受人に対抗することができない。人的抗弁は善意の第三者に対抗できないという人的抗弁の切断の原則（手形法17条）に反する記述である。③適切である。電子記録債権は、原則として発生記録をすることによって生ずる（電子記録債権法15条）。④適切である。電子記録債権の譲渡は、譲渡記録をしなければその効力を生じない（電子記録債権法17条）。"},{"no":42,"category":"貸付け及び貸付けに付随する取引に関する法令及び実務に関すること","topic":"犯収法","text":"貸金業者Ａが顧客Ｂとの間で特定取引を行うに際して行う取引時確認に関する次の①～④の記述のうち、犯罪収益移転防止法上、その内容が適切なものを１つだけ選びなさい。\n\n①　Ａは、自然人であるＢとの特定取引において、本人特定事項に加え、取引を行う目的及び職業を確認しなければならない。\n②　Ｂが法人である場合の事業の内容の確認は、当該法人の代表者からの申告のみで足りる。\n③　Ｂの運転免許証に記載された住居と現在の住居が異なる場合であっても、当該運転免許証のみで本人特定事項を確認することができる。\n④　取引時確認をした事項に係る確認記録は、特定取引等に係る契約が終了した日等から5年間保存すれば足りる。","answer":1,"explanation":"①適切である。自然人の取引時確認では、本人特定事項（氏名・住居・生年月日）に加え、取引を行う目的及び職業を確認しなければならない。②適切でない。法人の事業の内容の確認は、定款・登記事項証明書等の書類により行う必要があり、代表者からの申告のみでは足りない。③適切でない。本人確認書類に記載された住居が現在の住居と異なるときは、現在の住居が記載された官公庁発行書類等による確認が必要である。④適切でない。確認記録の保存期間は、特定取引等に係る契約が終了した日等から7年間であり、5年間ではない。"},{"no":43,"category":"資金需要者等の保護に関すること","topic":"個人情報保護法","text":"個人情報保護法に関する次の①～④の記述のうち、その内容が適切でないものを１つだけ選びなさい。\n① 個人情報保護法上の個人情報は、生存する個人に関する情報に限られ、死者に関する情報は含まれない。\n② 要配慮個人情報には、人種、信条、社会的身分、病歴及び犯罪の経歴が含まれる。\n③ 個人信用情報機関へ個人データを提供する場合、金融分野における個人情報取扱事業者はオプトアウト方式により本人の同意を得ることなく当該個人データを提供することができる。\n④ 個人情報取扱事業者は、個人データの取扱いを委託することに伴い当該個人データが提供される場合において、当該提供を受ける者は、原則として第三者に該当しない。","answer":3,"explanation":"適切でないものは③であり、正答は③である。①は正しい。個人情報の定義は生存する個人に関する情報に限定されるため、死者に関する情報は個人情報に含まれない。②は正しい。要配慮個人情報には人種、信条、社会的身分、病歴、犯罪の経歴等が含まれ、本人に対する不当な差別・偏見等の不利益が生じないよう特に配慮を要するものとして政令で定められている。③は誤りである。個人信用情報機関への個人データの提供は会員間で広く情報が共有されることになるため、与信事業に係る個人の返済能力に関する情報の第三者提供にオプトアウト方式を用いることは認められておらず、金融分野における個人情報取扱事業者は原則として本人の同意を得なければならない。④は正しい。委託に伴う提供は第三者提供の制限における第三者に該当しないとされる取扱いであり、一般に認められている考え方である。"},{"no":44,"category":"資金需要者等の保護に関すること","topic":"消費者契約法","text":"消費者契約法に関する次の①～④の記述のうち、その内容が適切なものを１つだけ選びなさい。\n① 事業者の不実告知により誤認して締結した消費者契約の申込みの意思表示は、当然に無効となる。\n② 消費者契約法上の取消権は、追認をすることができる時から１年間行わないときは、時効によって消滅する。\n③ 消費者契約における損害賠償額の予定条項は、平均的損害額を超える部分のみでなく、条項全体が無効となる。\n④ 消費者契約法には、クーリング・オフのような無条件解除権を一般的に付与する規定が存在する。","answer":2,"explanation":"適切なものは②であり、正答は②である。①は誤りである。事業者の不実告知による誤認に基づく意思表示は当然に無効となるのではなく、取り消すことができるにとどまる。②は正しい。消費者契約法上の取消権は、追認をすることができる時から１年間行わないとき、又は契約締結の時から５年を経過したときに時効によって消滅する。③は誤りである。損害賠償額の予定条項については、平均的損害額を超える部分のみが無効となるのであって、条項全体が無効になるわけではない。④は誤りである。クーリング・オフのような無条件解除権は特定商取引法等の個別法上の制度であり、消費者契約法に一般的にこれを付与する規定は存在しない。"},{"no":45,"category":"資金需要者等の保護に関すること","topic":"景品表示法","text":"景品表示法に関する次の①～④の記述のうち、その内容が適切でないものを１つだけ選びなさい。\n① 優良誤認表示の疑いがある場合、内閣総理大臣は事業者に対し期間を定めて表示の裏付けとなる合理的根拠資料の提出を求めることができる。\n② 不実証広告規制において、事業者が期間内に合理的根拠資料を提出しないときは、当該表示は不当表示とみなされる。\n③ 不実証広告規制（合理的根拠資料の提出要求）は、優良誤認表示だけでなく、価格その他の取引条件についての有利誤認表示にも適用される。\n④ 景品表示法上の景品類とは、取引に付随して提供される物品、金銭その他の経済上の利益をいう。","answer":3,"explanation":"適切でないものは③であり、正答は③である。①は正しい。優良誤認表示の疑いがある場合、内閣総理大臣は期間を定めて合理的根拠資料の提出を求めることができる不実証広告規制が設けられている。②は正しい。期間内に合理的根拠資料の提出がないときは、当該表示は不当表示とみなされる。③は誤りである。不実証広告規制は商品・役務の内容についての優良誤認表示にのみ適用されるものであり、取引条件についての有利誤認表示には適用されない。④は正しい。景品類とは取引に付随して提供される物品、金銭その他の経済上の利益をいい、取引に付随することが要件となる。"},{"no":46,"category":"資金需要者等の保護に関すること","topic":"自主規制規則","text":"貸金業者向けの自主規制基本規則に関する次の①～④の記述のうち、その内容が適切でないものを１つだけ選びなさい。\n① 契約を締結しない旨の意思表示（勧誘拒絶）をした者に対しては、当該取引及び類似取引について勧誘を行ってはならない。\n② 勧誘拒絶をした者への再勧誘禁止期間は、一律に１年間と定められている。\n③ 契約内容を理解することが困難と認められる者に対して勧誘を行うことは禁止される。\n④ 勧誘リストの作成に当たっては、個人信用情報を記載しないよう留意すべきとされている。","answer":2,"explanation":"適切でないものは②であり、正答は②である。①は正しい。勧誘拒絶の意思表示をした者に対しては、当該取引及び類似取引について勧誘を行ってはならないとされている。②は誤りである。再勧誘禁止期間について画一的に１年間と区切る規定ではなく、当該取引及び類似取引について勧誘を行ってはならない旨が定められているにとどまる。③は正しい。資金需要者等の保護の観点から、契約内容の理解が困難と認められる者への勧誘は禁止行為とされている。④は正しい。個人信用情報の目的外利用を防ぐ観点から、勧誘リストに個人信用情報を記載しないよう留意すべきとされている。"},{"no":47,"category":"資金需要者等の保護に関すること","topic":"紛争解決","text":"貸金業に係る紛争解決等業務に関する次の①～④の記述のうち、その内容が適切なものを１つだけ選びなさい。\n① 日本貸金業協会に加入しない貸金業者は、指定紛争解決機関との間で手続実施基本契約を締結する等の措置を講じ、その相手方を公表しなければならない。\n② 指定紛争解決機関の商号又は名称は、契約締結時書面には表示するが、契約締結前書面には表示する必要はない。\n③ 加入貸金業者は、指定紛争解決機関等からの手続応諾の求めを、正当な理由なく拒むことができる。\n④ 紛争解決手続開始の申立ては、契約者等からのみ行うことができ、加入貸金業者から行うことはできない。","answer":1,"explanation":"適切なものは①であり、正答は①である。①は正しい。日本貸金業協会に加入しない貸金業者は、指定紛争解決機関との間で手続実施基本契約を締結する等の措置を講じ、その相手方を公表しなければならないとされている。②は誤りである。指定紛争解決機関の商号又は名称は、契約締結前書面及び契約締結時書面の双方に表示しなければならない。③は誤りである。加入貸金業者は、正当な理由がない限り、指定紛争解決機関等からの手続応諾の求めを拒むことができない。④は誤りである。紛争解決手続開始の申立ては契約者等だけでなく、加入貸金業者から行うこともできる。"},{"no":48,"category":"財務及び会計に関すること","topic":"企業会計原則","text":"企業会計原則の一般原則に関する次の①～④の記述のうち、その内容が適切でないものを１つだけ選びなさい。\n① 真実性の原則は、企業会計は企業の財政状態及び経営成績に関して真実な報告を提供するものでなければならないとする原則であり、他の一般原則の上位規範として位置づけられる。\n② 正規の簿記の原則とは、株主総会提出用、信用目的用、租税目的用など複数の目的のために異なる形式の財務諸表を作成してはならないとする原則である。\n③ 資本取引と損益取引を明瞭に区別し、特に資本剰余金と利益剰余金とを混同してはならないとする原則を、資本取引・損益取引区分の原則という。\n④ 保守主義の原則は、企業の財政に不利な影響を及ぼす可能性がある場合には健全な会計処理を求めるものであるが、過度に保守的な会計処理までは認められない。","answer":2,"explanation":"適切でないものは②であり、正答は②である。①は正しい。真実性の原則は企業会計原則の最上位にある基本原則として、他の一般原則の上位規範に位置づけられる。②は誤りである。設問の内容は単一性の原則の説明であり、正規の簿記の原則は、すべての取引につき正規の簿記の原則に従って正確な会計帳簿を作成すべきとする原則である。③は正しい。資本剰余金（元手）と利益剰余金（成果）の混同を禁止することが資本取引・損益取引区分の原則の核心である。④は正しい。保守主義の原則は健全な会計処理を求めるものであるが、過度に保守的な会計処理（過度の引当金計上等）は真実性の原則に反するため認められない。"},{"no":49,"category":"財務及び会計に関すること","topic":"損益計算書","text":"損益計算書における段階利益に関する次のａ～ｄの記述のうち、その内容が適切なものの組み合わせを①～④の中から１つだけ選びなさい。\nａ．売上総利益は、売上高から売上原価を控除して算定される。\nｂ．営業利益は、売上総利益から販売費及び一般管理費を控除して算定される。\nｃ．経常利益は、営業利益に特別利益を加算し、特別損失を控除して算定される。\nｄ．当期純利益は、税引前当期純利益から法人税等を控除して算定される。\n①　ａｂ\n②　ａｃ\n③　ｂｄ\n④　ａｂｄ","answer":4,"explanation":"適切な組み合わせはａｂｄであり、正答は④である。ａ○：売上総利益は売上高から売上原価のみを控除して算定され、販管費はまだ控除しない段階である。ｂ○：営業利益は売上総利益から販売費及び一般管理費を控除して算定され、企業の本業による利益を示す。ｃ×：経常利益は営業利益に営業外収益を加算し営業外費用を控除して算定されるものであり、特別利益・特別損失は経常利益の算定には含まれず、税引前当期純利益の算定に用いる項目である。ｄ○：当期純利益は段階利益の最終段階であり、税引前当期純利益から法人税等を控除して算定される。以上よりａｂｄが適切であり、④が正答となる。"},{"no":50,"category":"財務及び会計に関すること","topic":"貸借対照表","text":"会社計算規則上の貸借対照表に関する次の①～④の記述のうち、その内容が適切でないものを１つだけ選びなさい。\n① 貸借対照表の資産の部は、流動資産、固定資産及び繰延資産に区分される。\n② 貸借対照表の負債の部は、流動負債、固定負債及び引当金その他の負債の3つに区分される。\n③ 株式会社の貸借対照表における純資産の部は、株主資本、評価・換算差額等、株式引受権及び新株予約権に区分される。\n④ 資産の部の合計額から負債の部の合計額を控除した額は、純資産の部の合計額と一致する。","answer":2,"explanation":"適切でないものは②であり、正答は②である。①は正しい。資産の部の大区分は流動資産、固定資産及び繰延資産の3つである。②は誤りである。負債の部は流動負債及び固定負債の2区分のみであり、独立した「引当金その他の負債」という区分は設けられていない。③は正しい。純資産の部は株主資本、評価・換算差額等、株式引受権及び新株予約権の4区分に分かれる。④は正しい。資産の部合計から負債の部合計を控除した額は純資産の部合計と一致するという貸借対照表等式の帰結である。"}]}]};
const DECKS=[{"category":"法及び関係法令に関すること","topics":[{"topic":"用語の定義","summary":"貸金業とは金銭の貸付け又は金銭の貸借の媒介で業として行うものをいい、事業者がその従業者に対して行う貸付けや物品の運送等の取引に付随して行う貸付けは除外される。債務者等には債務者・債務者であった者のほか、保証人・保証人であった者、物上保証人等も含まれる。貸付けの契約にはこれに係る保証契約も含まれる。住宅資金貸付契約には住宅の建設・購入資金だけでなく改良資金の貸付けに係る契約も含まれる。","cards":[{"s":"貸金業の定義には、事業者がその従業者に対して行う金銭の貸付けも含まれる。","o":false,"why":"事業者がその従業者に対して行う貸付けは貸金業の定義から除外される。"},{"s":"物品の運送を業とする者がその取引に付随して行う金銭の貸付けは、貸金業の定義から除外される。","o":true,"why":"貸金業法2条1項の除外規定に該当する。"},{"s":"債務者等には、債務者及び債務者であった者のほか、保証人・保証人であった者、物上保証人等も含まれる。","o":true,"why":"貸金業法2条3項の債務者等の定義による。"},{"s":"貸付けの契約には、これに係る保証契約は含まれない。","o":false,"why":"貸付けの契約には保証契約も含まれると解される。"},{"s":"住宅資金貸付契約には、住宅の建設・購入資金の貸付けに係る契約のみが含まれ、住宅の改良に必要な資金の貸付けは含まれない。","o":false,"why":"住宅の改良に必要な資金の貸付けに係る契約も住宅資金貸付契約に含まれる。"},{"s":"個人信用情報とは、資金需要者である個人顧客等の借入状況等、返済能力に関する情報に限定される狭い概念である。","o":false,"why":"個人信用情報は返済能力に関する情報に限定されない広い概念である。"},{"s":"貸金業者とは、貸金業の登録を受けて貸金業を営む者をいい、貸付けに係る契約について業として保証を行う者（保証業者）は含まれない。","o":true,"why":"保証業者は貸金業者とは別に規定される概念である。"}]},{"topic":"登録・届出","summary":"貸金業の登録の有効期間は3年であり、更新は有効期間満了の日の2か月前までに申請しなければならない。登録換えの申請は現に受けている登録をした財務局長等又は都道府県知事を経由して行うが、新たな登録がされるまでは従前の登録がなお効力を有する。変更の届出事項（他に行っている事業の種類、業務の種類及び方法、営業所の名称・所在地、ホームページアドレス等）は、変更後2週間以内に届け出なければならない。営業所等の所在地の変更そのものは事前届出事項である点に注意する。","cards":[{"s":"貸金業の登録の有効期間は2年である。","o":false,"why":"登録の有効期間は3年である。"},{"s":"登録の更新は、有効期間満了の日の2か月前までに申請しなければならない。","o":true,"why":"貸金業法3条3項及び施行規則の定めによる。"},{"s":"登録換えの申請をしただけで、新たな登録がされる前でも従前の登録の効力は失われ、営業することができなくなる。","o":false,"why":"新たな登録がされるまでは従前の登録がなお効力を有する。"},{"s":"他に行っている事業の種類に変更があった場合、その日から2週間以内に届け出なければならない。","o":true,"why":"貸金業法8条の変更届出事項であり、届出期限は2週間以内である。"},{"s":"業務の種類及び方法の変更は、あらかじめ届け出なければならない事前届出事項である。","o":false,"why":"業務の種類及び方法の変更は事後届出事項であり、変更後2週間以内に届け出れば足りる。"},{"s":"広告等に表示するホームページアドレスの変更は、変更後2週間以内に届け出れば足りる。","o":false,"why":"広告・勧誘の際に表示する電子メールアドレス・ホームページアドレスの変更は「あらかじめ」届出が必要（貸金業法8条1項）。2週間以内の事後届出ではない。"},{"s":"営業所又は事務所の所在地の変更は、事前に届け出なければならない。","o":true,"why":"営業所等の所在地の変更は事前届出事項に区分される。"},{"s":"登録換えの申請は、新たに営業所等を設置する予定地を管轄する登録行政庁に直接行う。","o":false,"why":"登録換えの申請は現に受けている登録をした財務局長等又は都道府県知事を経由して行う。"}]},{"topic":"登録拒否事由","summary":"心身の故障により貸金業の職務を適正に執行できない者、監督処分により登録を取り消された法人の取消し当時の役員で取消しの日から5年を経過しない者は登録拒否事由に該当する。拒否事由となる罰金刑は貸金業法・出資法・刑法の一定の罪等特定の法令違反に限られ、道路交通法違反は含まれない。破産手続開始決定を受けても復権を得れば拒否事由に該当しない。個人申請者は貸付けの業務に3年以上従事した実務経験等が必要であり、法人の純資産要件は5,000万円以上である。","cards":[{"s":"心身の故障により貸金業の業務を適正に執行できない者は、登録拒否事由に該当する。","o":true,"why":"貸金業法6条1項の登録拒否事由に該当する。"},{"s":"道路交通法違反により罰金刑に処せられた者は、その執行を終わった日から一定期間、登録拒否事由に該当する。","o":false,"why":"拒否事由となる罰金刑は貸金業法・出資法等特定の法令違反に限られ、道路交通法違反は含まれない。"},{"s":"破産手続開始の決定を受けた者は、復権を得た後であっても登録拒否事由に該当し続ける。","o":false,"why":"復権を得れば登録拒否事由に該当しなくなる。"},{"s":"監督処分により登録を取り消された法人の取消し当時の役員は、取消しの日から5年を経過しない限り登録拒否事由に該当する。","o":true,"why":"貸金業法6条1項の登録拒否事由に該当する。"},{"s":"個人である登録申請者は、貸付けの業務に3年以上従事した経験を有する者等でなければ登録を拒否される。","o":true,"why":"個人申請者には実務経験等の要件が課される。"},{"s":"法人である登録申請者の純資産額の要件は、1億円以上である。","o":false,"why":"法人の純資産要件は5,000万円以上である。"},{"s":"資金需要者等の利益の保護を図るための社内規則を整備していないことは、登録拒否事由に該当する。","o":true,"why":"業務運営体制の整備不備は登録拒否事由となる。"},{"s":"常勤の役員又は使用人としての貸金業の実務経験者は、営業所ごとに複数人在籍していなければ登録拒否事由に該当する。","o":false,"why":"実務経験者が営業所ごとに1人在籍していれば足りる。"}]},{"topic":"貸金業務取扱主任者制度","summary":"営業所等ごとに、貸金業の業務に従事する者の数に対する貸金業務取扱主任者の数の割合が50分の1以上となる数を置かなければならない（従業者50人に1人以上）。主任者は当該営業所等に常時勤務する者でなければならず、他の営業所等の主任者として登録されたままの者であってはならない。主任者が法定数を下回った場合の是正措置期間は2週間以内である。登録の更新には更新講習の受講に加え更新の申請が必要である。従業者名簿は最終の記載をした日から10年間保存しなければならない。","cards":[{"s":"営業所等ごとに、貸金業の業務に従事する者の数50人に対して1人以上の割合で貸金業務取扱主任者を置かなければならない。","o":true,"why":"貸金業法12条の3、施行規則で従業者50人に1人以上の割合と定められている。"},{"s":"貸金業務取扱主任者は、他の営業所等の主任者として登録されたままの状態でも、当該営業所等の主任者として選任することができる。","o":false,"why":"主任者は当該営業所等に常時勤務し、他の営業所等の主任者として登録されたままの者であってはならない。"},{"s":"主任者の数が法定数を下回った場合、2週間以内に必要な措置を執らなければならない。","o":true,"why":"貸金業法12条の3第2項により是正措置期間は2週間以内である。"},{"s":"主任者の数が法定数を下回った場合、是正措置の期間は30日以内である。","o":false,"why":"是正措置期間は30日以内ではなく2週間以内である。"},{"s":"契約締結時の書面には、貸金業務取扱主任者の氏名及び登録番号を記載しなければならない。","o":false,"why":"契約締結時書面の法定記載事項に主任者の氏名・登録番号は含まれない。"},{"s":"貸金業務取扱主任者資格者証の更新を受けるには、更新講習を受講するだけでよく、別途の更新申請は不要である。","o":false,"why":"更新講習の受講に加え、更新の申請を行う必要がある。"},{"s":"従業者名簿は、最終の記載をした日から10年間保存しなければならない。","o":true,"why":"貸金業法12条の4、施行規則の定めによる。"},{"s":"「常時勤務する」とは、営業時間内は常に当該営業所等に駐在していることを意味する。","o":false,"why":"社会通念上常時勤務していると認められる実態があれば足り、常時駐在までは要求されない。"}]},{"topic":"監督指針","summary":"内部監査部門は営業部門から独立した態勢で設置される必要があり、営業部門の指揮命令系統下に置くことは不適切である。他に業務従事者がいない個人貸金業者は自己検証リスト等により業務の適切性を確保する態勢整備が求められるが、頻度を画一的な基準のみで判断するものではない。反社会的勢力との取引が判明した場合は、可能な限り速やかに関係解消に向けた取組みを行うべきである。苦情等対処は単なる処理手続にとどめず、記録・保存や再発防止策への活用が求められる。","cards":[{"s":"内部監査部門は、営業部門の指揮命令系統下に置いても差し支えない。","o":false,"why":"内部監査部門は営業部門から独立した態勢で設置される必要がある。"},{"s":"反社会的勢力との取引が判明した場合、弁済が滞る等の事態が生じるまで契約解消を留保することが適切な対応である。","o":false,"why":"可能な限り速やかに関係解消に向けた取組みを行うべきである。"},{"s":"事業計画の作成は、経営陣・企画部門が行うべきものであり、内部監査部門が主導して作成することは監査の独立性に反し不適切である。","o":true,"why":"監督指針上、内部監査部門の独立性確保の観点から不適切とされる。"},{"s":"苦情等の記録・保存や指定ADR機関の情報を活用した分析・再発防止策への活用は、監督指針上の着眼点である。","o":true,"why":"監督指針は苦情等対処態勢の実効性確保を求めている。"},{"s":"軽微な苦情案件であっても、すべて直ちに内部監査部門や経営陣に報告する態勢が監督指針上一律に求められる。","o":false,"why":"重要案件について適切に報告される態勢整備が求められているにとどまる。"},{"s":"業務委託先に対する必要かつ適切な監督態勢の整備は、監督指針上の着眼点として明示されている。","o":true,"why":"監督指針は業務委託先管理態勢の整備を求めている。"},{"s":"個人信用情報を返済能力調査以外の目的に利用しないための措置を講じる義務は、法定されている。","o":true,"why":"貸金業法及び監督指針上、目的外利用防止措置が求められる。"}]},{"topic":"返済能力調査","summary":"貸金業者は資金需要者等の返済能力の調査を行う義務を負い、媒介の場合や法人顧客であっても調査自体は必要である。個人顧客との一定の貸付契約については指定信用情報機関の信用情報を使用しなければならないが、手形（融通手形を除く）の割引を内容とする契約は当該義務の対象外である。極度方式基本契約締結時に信用情報を使用した調査を行っていれば、個別の極度方式貸付けごとに改めて調査する必要はない。保証人についても信用情報を使用した調査が必要である。","cards":[{"s":"貸付けの媒介を行う場合には、返済能力の調査を行う必要はない。","o":false,"why":"媒介の場合も返済能力調査は必要である。"},{"s":"手形（融通手形を除く）の割引を内容とする契約は、指定信用情報機関の信用情報使用義務の対象外である。","o":true,"why":"手形割引は信用情報使用義務の対象外とされている。"},{"s":"法人顧客との貸付契約については、返済能力の調査自体が不要である。","o":false,"why":"法人顧客であっても返済能力の調査自体は必要であり、信用情報機関の使用義務が個人に限られるのとは別問題である。"},{"s":"極度方式基本契約締結時に信用情報を使用した調査を行っていれば、個別の極度方式貸付けごとに改めて信用情報を使用した調査を行う必要はない。","o":true,"why":"極度方式貸付けは基本契約締結時の調査で足りる。"},{"s":"保証人となろうとする者については、指定信用情報機関の信用情報を使用した調査は不要である。","o":false,"why":"保証人についても信用情報を使用した調査が必要である。"},{"s":"個人事業者は個人顧客に含まれないため、信用情報を使用した返済能力調査の対象外である。","o":false,"why":"個人事業者も個人顧客に含まれ、信用情報を使用した調査が必要である。"},{"s":"極度方式基本契約の極度額を、過去に減額した額の範囲内に戻す増額をする場合、改めて信用情報を使用した調査を要しない。","o":true,"why":"返済能力が低下していないことを前提に、当初の極度額の範囲内に戻す増額は再調査を要しないとされる。"}]},{"topic":"年収証明書","summary":"個人顧客との貸付けの契約について、当該貸付けの金額と既存の個人顧客合算額との合計額が100万円を超える場合には年収証明書の徴求が必要となる。給与の支払明細書を年収証明書とする場合、地方税額を基に合理的に算出する方法によるときを除き、直近2か月分以上の提出を要する。地方公共団体が交付する所得・課税証明書も年収証明書に該当し得る。合計額が100万円を超えると知った日から2か月以内に年収証明書を取得しなければならない。","cards":[{"s":"貸付けの金額と個人顧客合算額との合計額が100万円を超える場合、年収証明書の徴求が必要となる。","o":true,"why":"貸金業法13条の3、施行規則により合計額100万円超で年収証明書が必要となる。"},{"s":"給与の支払明細書を年収証明書とする場合、地方税額を基に合理的に算出する方法によるときを除き、直近2か月分以上の提出を要する。","o":true,"why":"施行規則により直近2か月分以上の給与明細の提出が求められる。"},{"s":"地方公共団体が交付する所得証明書・課税証明書は、年収証明書に該当しない。","o":false,"why":"地方公共団体が交付する所得・課税証明書も年収証明書に該当し得る。"},{"s":"一度年収証明書を徴求すれば、その後合算額が基準額（100万円）を超えても再度の徴求は不要である。","o":false,"why":"基準額を超える場合は改めて年収証明書の徴求が必要である。"},{"s":"2年前に取得した源泉徴収票であっても、年収証明書として現在も有効に使用できる。","o":false,"why":"年収証明書は一定期間内に発行されたものが必要であり、2年前のものでは足りない。"},{"s":"他社での借入残高がすべて総量規制の除外契約に係るものである場合、その残高は年収証明書要否の基準額判定に算入されない。","o":true,"why":"除外契約に係る残高は個人顧客合算額等の算定から除かれる。"}]},{"topic":"総量規制","summary":"個人向け貸付けは、除外契約・例外契約を除き、他社分も合算した貸付残高が年収の3分の1を超えてはならない（総量規制）。不動産の売却代金による弁済を内容とする契約、上場有価証券担保の一定の貸付け、高額療養費支払資金の貸付け、正規貸付けまでのつなぎ融資（返済期間1か月以内）は除外契約に該当する。個人顧客の居宅を担保とする貸付けは除外契約ではなく例外契約として扱われる。事業を営む個人顧客との契約が例外契約に該当するには事業の実態確認が必要であり、除外・例外契約に係る残高も個人顧客合算額に算入される。","cards":[{"s":"個人向け貸付けは、除外・例外貸付けを除き、他社分も合算した貸付残高が年収の3分の1を超えてはならない。","o":true,"why":"貸金業法13条の2の総量規制の原則である。"},{"s":"不動産の売却代金により弁済されることが確実であると認められる貸付けは、除外契約に該当する。","o":true,"why":"不動産売却代金弁済型のつなぎ融資は除外契約とされる。"},{"s":"個人顧客の居宅を担保とする貸付けは、除外契約に該当する。","o":false,"why":"居宅担保の貸付けは除外契約ではなく、要件を満たせば例外契約として扱われる。"},{"s":"正規貸付けが行われるまでのつなぎ融資が例外契約に該当するための返済期間の上限は、3か月である。","o":false,"why":"つなぎ融資の返済期間の上限は1か月である。"},{"s":"貸付金額100万円以下の場合、返済能力を超えないことを確認すれば例外契約に該当し得る。","o":true,"why":"少額かつ返済能力を超えない貸付けは例外契約の要件の一つである。"},{"s":"高額療養費支払資金の貸付けは、除外契約に該当する。","o":true,"why":"高額療養費支払資金の貸付けは総量規制の除外契約とされる。"},{"s":"例外契約に係る貸付けの残高は、個人顧客合算額に算入されない。","o":false,"why":"例外契約に係る貸付けの残高も個人顧客合算額に算入される。"},{"s":"借換え（借入残高減少型）が例外契約に該当するための要件の一つに、新契約の1か月の返済負担が既存債務を上回らないことがある。","o":true,"why":"段階的借換えの例外契約要件の一つである。"}]},{"topic":"基準額超過調査","summary":"極度方式基本契約について、所定の期間内の極度方式貸付けの合計額が5万円を超え、かつ当該期間の末日における残高の合計額が10万円を超える場合に、基準額超過極度方式基本契約に該当するかどうかの調査が必要となる。残高が10万円以下である場合は当該調査を要しない。基準額超過極度方式基本契約に該当すると認められるときは、極度額の減額又は新たな極度方式貸付けの停止の措置を講じなければならず、その後も3か月以内の一定期間ごとの調査を継続する必要がある。","cards":[{"s":"極度方式貸付けの残高が10万円以下である場合は、基準額超過極度方式基本契約に該当するかどうかの調査を要しない。","o":true,"why":"残高10万円以下の場合は調査不要とされている。"},{"s":"基準額超過極度方式基本契約に該当すると認められるときは、極度額の減額又は新たな極度方式貸付けの停止の措置を講じなければならない。","o":true,"why":"貸金業法及び施行規則の定めによる措置義務である。"},{"s":"極度額の減額等の措置を講じた場合、その後は調査を継続する必要がない。","o":false,"why":"減額等の措置後も3か月以内の一定期間ごとの調査を継続する必要がある。"},{"s":"調査が必要となるのは、所定の期間内の極度方式貸付けの合計額が5万円を超え、かつ当該期間の末日における残高の合計額が10万円を超える場合である。","o":true,"why":"施行規則が定める基準額超過調査の要件である。"},{"s":"基準額超過極度方式基本契約に該当する場合の調査が必要な際は、所定期間の末日から3週間を経過する日までに指定信用情報機関へ情報提供を依頼しなければならない。","o":true,"why":"施行規則上の調査期限（3週間以内）の定めである。"},{"s":"新たな極度方式貸付けの停止措置を解除した場合、解除の日から1か月以内に一律の調査を行えばよい。","o":false,"why":"解除後は所定の期間に応じた調査が必要であり、一律に「解除の日から1か月以内」とは定められていない。"},{"s":"基準額超過極度方式基本契約に該当すると認められた場合、貸金業者は当該契約を必ず解除しなければならない。","o":false,"why":"求められるのは極度額の減額又は新規貸付けの停止であり、契約解除までは義務付けられていない。"}]},{"topic":"広告・勧誘規制","summary":"貸付けの広告・勧誘に際しては、貸付けの利率、返済の方式並びに返済期間及び返済回数、賠償額の予定（違約金を含む）の元本に対する割合、担保に関する事項等の表示・説明が必要である。広告に表示する電話番号は登録簿記載の固定電話等に限られ、携帯電話番号の表示は認められない。登録番号は括弧書（更新回数）を含めて省略せずに表示しなければならない。誇大広告等の禁止に違反した場合は業務改善命令にとどまらず、情状により登録取消しの対象ともなり得る。","cards":[{"s":"広告には、貸付けの利率のほか、返済の方式並びに返済期間及び返済回数を表示しなければならない。","o":true,"why":"貸金業法15条・16条及び施行規則の広告表示事項である。"},{"s":"広告に表示する電話番号は、担当者の携帯電話番号でもよい。","o":false,"why":"広告に表示する電話番号は営業所等が業務に使用する固定電話等に限られる。"},{"s":"広告における貸金業者の登録番号は、括弧書（更新回数を示す部分）を省略して表示することができる。","o":false,"why":"登録番号は括弧書を含め省略せずに表示しなければならない。"},{"s":"担保を供することが必要な場合、広告にはその担保に関する事項を表示しなければならない。","o":true,"why":"担保に関する事項も広告の必須表示事項である。"},{"s":"誇大広告等の禁止に違反した場合、業務改善命令にとどまり登録取消しの対象とはならない。","o":false,"why":"誇大広告等の禁止違反は情状により登録取消しの対象ともなり得る。"},{"s":"賠償額の予定（違約金を含む）に関する定めをする場合、その元本に対する割合を広告等で表示・説明しなければならない。","o":true,"why":"賠償額予定の割合は広告・勧誘時の必須表示・説明事項である。"},{"s":"自主規制規則上、勧誘拒絶の意思表示があった場合の再勧誘禁止期間は画一的に1年間と定められている。","o":false,"why":"画一的な期間ではなく、当該取引及び類似取引について勧誘を行ってはならない旨が定められているにとどまる。"}]},{"topic":"契約締結前書面","summary":"極度方式基本契約を締結しようとする場合は、契約締結前に内閣府令で定める書面を交付しなければならない。保証契約についての契約締結前書面は保証人となろうとする者に交付すれば足りる。契約締結前書面の記載事項に変更が生じた場合は再度の交付が必要とされる。記載は日本工業規格（JIS Z8305）に規定する8ポイント以上の文字を用いなければならない。契約締結前書面には契約年月日等の契約締結後に確定する事項は記載事項に含まれない。","cards":[{"s":"極度方式基本契約を締結しようとする場合、契約締結前に内閣府令で定める書面を交付しなければならない。","o":true,"why":"貸金業法16条の2第2項の契約締結前書面交付義務である。"},{"s":"保証契約についての契約締結前書面は、保証人となろうとする者ではなく主債務者に交付すれば足りる。","o":false,"why":"保証契約の契約締結前書面は保証人となろうとする者に交付する必要がある。"},{"s":"契約締結前書面の記載事項の内容に変更が生じた場合、再度の書面交付は一切不要である。","o":false,"why":"記載事項の内容に変更が生じた場合は再度の書面交付が必要とされる場合がある。"},{"s":"契約締結前書面の記載には、JIS Z8305に規定する8ポイント以上の文字を用いなければならない。","o":true,"why":"施行規則が定める文字サイズの基準である。"},{"s":"契約締結前書面には、契約年月日や契約の相手方の氏名・住所を記載しなければならない。","o":false,"why":"契約締結「前」の書面の性質上、契約年月日等の契約締結後に確定する事項は記載事項に含まれない。"},{"s":"契約締結前書面は、少なくとも契約締結の前日までに交付しなければならないと法令上一律に定められている。","o":false,"why":"検討時間の余裕をもって交付すべきとはされるが、前日までという一律の期限は定められていない。"},{"s":"保証契約を締結しようとする場合、保証契約の概要書面と詳細書面の両方を保証契約締結までに交付しなければならない。","o":true,"why":"保証契約の契約締結前書面として概要書面・詳細書面双方の交付が求められる。"}]},{"topic":"契約締結時書面","summary":"貸付けに係る契約を締結したときは、遅滞なく内閣府令で定める事項を記載した書面を交付しなければならない。電磁的方法による提供は相手方の承諾を得た場合に限られる。利率の引下げなど顧客に不利益とならない変更は再交付を要しないが、各回の返済金額の減額や返済期日の変更など重要な内容の変更は再交付が必要である。極度額を一旦引き下げた後に当初の範囲内に戻す引上げや登録番号の括弧書のみの変更は再交付不要とされる。保証契約がある場合、契約内容に変更が生じたときは保証人にも書面を交付しなければならない。","cards":[{"s":"契約締結時書面は、相手方から書面交付を希望する申出がない限り、承諾を得ずに電磁的方法により提供することができる。","o":false,"why":"電磁的方法による提供は相手方の承諾を得た場合に限られる。"},{"s":"貸付けの利率を引き下げる変更をした場合、契約締結時書面を改めて交付する必要はない。","o":true,"why":"顧客に不利益とならない利率引下げは再交付を要しない。"},{"s":"各回の返済金額を減額する変更をした場合、契約締結時書面を改めて交付する必要はない。","o":false,"why":"返済金額の減額など重要な内容の変更は再交付が必要である。"},{"s":"極度額を一旦引き下げた後、当初の極度額の範囲内に引き上げる場合は、書面の再交付を要しない。","o":true,"why":"実質的に新たな不利益を生じない範囲内の引上げは再交付不要とされる。"},{"s":"登録番号の括弧書（登録回数）のみの変更は、契約締結時書面の再交付を要する重要な変更に当たる。","o":false,"why":"登録番号の括弧書のみの変更は重要な内容の変更に当たらず再交付不要とされる。"},{"s":"保証契約が締結されている場合、返済期日・返済金額等の変更が生じたときは、保証人にも変更後の契約締結時書面を交付しなければならない。","o":true,"why":"保証人に対する契約内容の開示のため書面交付が必要である。"},{"s":"極度方式基本契約の契約締結時書面には、極度額を1回貸し付けたと仮定する等の仮定に基づく返済金額の合計額、返済期間・回数を記載しなければならない。","o":true,"why":"施行規則が定める極度方式基本契約の書面記載事項である。"},{"s":"個別の貸付契約の契約締結時書面は、基本契約番号を記載すれば契約年月日・貸付金額等の記載を省略できる。","o":false,"why":"個別契約の契約締結時書面は独立して必要事項を記載しなければならない。"}]},{"topic":"受取証書・帳簿","summary":"貸金業者は弁済を受けたときは直ちに受取証書を交付しなければならないが、口座振込みによる弁済の場合は債務者から請求があったときに交付すれば足りる。第三者が弁済した場合、受取証書には債務者と弁済者双方の氏名を記載する。帳簿は営業所等ごとに備え付け、契約ごとに定められた最終の返済期日（債権消滅時はその消滅日）から少なくとも10年間保存しなければならない。契約締結時書面の写しの保存で帳簿の一部記載事項の記載に代えることができる。保証人や弁済者も自ら利害関係を有する部分について閲覧・謄写請求ができる。","cards":[{"s":"貸金業者は弁済を受けたときは、原則として直ちに受取証書を交付しなければならない。","o":true,"why":"貸金業法18条の受取証書交付義務の原則である。"},{"s":"口座振込みによる弁済の場合、貸金業者は債務者から請求がなくても常に受取証書を交付しなければならない。","o":false,"why":"口座振込みの場合は債務者から請求があったときに交付すれば足りる。"},{"s":"第三者が弁済した場合、受取証書には弁済者の氏名のみを記載すれば足りる。","o":false,"why":"受取証書には債務者の氏名と弁済者の氏名の双方を記載しなければならない。"},{"s":"帳簿の保存期間は、契約を締結した日から起算して10年間である。","o":false,"why":"帳簿の保存期間は契約締結日からではなく、最終の返済期日（債権消滅時はその消滅日）から少なくとも10年間である。"},{"s":"契約締結時書面の写しの保存をもって、帳簿の一部記載事項の記載に代えることが認められている。","o":true,"why":"施行規則により契約締結時書面の写しの保存で代替可能とされている。"},{"s":"保証人は、自己が利害関係を有する部分について、債務者の承諾がなければ帳簿の閲覧・謄写請求ができない。","o":false,"why":"保証人や弁済者は自ら利害関係を有する部分について債務者の承諾を要せず閲覧・謄写請求ができる。"},{"s":"従業者名簿は、最終の記載をした日から10年間保存しなければならない。","o":true,"why":"施行規則の定める従業者名簿の保存期間である。"},{"s":"代理店に該当する営業所等であれば、帳簿の備付けを要しない。","o":false,"why":"代理店であっても営業所等に該当すれば帳簿の備付けを要する。"}]},{"topic":"取立行為規制","summary":"貸金業法21条は、人を威迫し又は私生活・業務の平穏を害するような言動で取立てを行うことを禁止する。監督指針上、正当な理由なく午後9時から午前8時までの時間帯に電話・訪問等をすることは違反行為に該当し得る。反復継続した電話・電報・訪問等は私生活・業務の平穏を害する言動に該当するおそれが大きい。家族に知られないよう要請を受けている場合はプライバシー侵害のおそれが特に大きい。勤務先訪問を告げる行為も状況によっては違反行為に該当し得る。","cards":[{"s":"貸金業法上、取立てにおいて正当な理由なく債務者を訪問することが禁止される時間帯は、午後9時から午前8時までである。","o":true,"why":"貸金業法21条・施行規則が定める取立て制限時間帯である。"},{"s":"取立てにおいて正当な理由なく債務者に電話・訪問することが禁止される時間帯は、午後8時から午前9時までである。","o":false,"why":"禁止される時間帯は午後9時から午前8時までであり、午後8時からではない。"},{"s":"反復継続した電話・電報・電子メール・訪問等は、債務者等の私生活・業務の平穏を害する言動に該当するおそれが大きい。","o":true,"why":"監督指針が取立て規制の着眼点として明示している。"},{"s":"家族に知られないよう要請を受けている場合であっても、そのような要請の有無にかかわらず取立ての違反該当性の判断は変わらない。","o":false,"why":"家族に知られないよう要請を受けている場合はプライバシー侵害のおそれが特に大きいと判断される。"},{"s":"勤務先訪問を告げる行為は、状況にかかわらず一律に違反行為に該当しない。","o":false,"why":"状況によっては私生活の平穏を害する取立てとして違反行為に該当し得る。"},{"s":"債務者等以外の者からの弁済受領行為は、それ自体が一律に禁止されている。","o":false,"why":"禁止の対象は取立て行為の態様であり、債務者等以外の者からの弁済受領自体が一律に禁止されるものではない。"},{"s":"取立てにおいて人を威迫し、又は私生活・業務の平穏を害するような言動で人を困惑させることは禁止される。","o":true,"why":"貸金業法21条1項の取立行為規制の内容である。"}]},{"topic":"債権譲渡規制","summary":"貸金業者は、貸付けに係る契約に基づく債権を譲渡したときは、譲受人に対し当該債権が貸付けに係る契約に基づいて発生したこと等を通知する必要があり、これは譲受人が貸金業者であっても同様である。譲渡人である貸金業者は、譲受人が暴力団員等であることを知り、又は知り得たときは行政処分の対象となり得る。契約締結時の書面交付義務は当初の貸付契約締結時に生じるものであり、債権譲渡のみを理由に改めて書面を交付する義務は生じない。貸付債権を他人に譲渡した場合、一定期間内にその旨を登録行政庁に届け出なければならない。","cards":[{"s":"貸付債権を貸金業者から貸金業者へ譲渡する場合は、譲受人への通知義務は生じない。","o":false,"why":"譲受人が貸金業者であっても、当該債権が貸付けに係る契約に基づいて発生したこと等の通知が必要である。"},{"s":"貸金業者は、債権の譲受人が暴力団員等であることを知り、又は知り得たときは、行政処分の対象となり得る。","o":true,"why":"貸金業法24条及び監督指針の趣旨による。"},{"s":"貸付債権の譲渡があった場合、譲渡のみを理由として改めて契約締結時書面（第17条書面）を交付する義務が生じる。","o":false,"why":"契約締結時書面の交付義務は当初の貸付契約締結時に生じるものであり、債権譲渡のみを理由に改めて交付義務は生じない。"},{"s":"貸金業者が貸付けに係る契約に基づく債権を他人に譲渡した場合、原則として一定期間内にその旨を登録行政庁に届け出なければならない。","o":true,"why":"貸金業法24条に基づく届出義務である。"},{"s":"貸金業者が相当の注意を払っていた場合でも、譲受人が暴力団員等であれば一律に行政処分の対象となる。","o":false,"why":"譲渡人が相当の注意を払っていた場合には行政処分の対象とならない余地がある。"},{"s":"債権譲渡人は、帳簿を譲受人に引き渡せば、自らの帳簿保存義務は当然に免除される。","o":false,"why":"帳簿を譲受人に引き渡しても譲渡人の保存義務が当然に免除されるわけではない。"},{"s":"債権の譲受人にも、帳簿の備付け・保存義務が課される。","o":true,"why":"債権譲受人も貸金業者として帳簿備付け・保存義務を負う。"}]},{"topic":"監督処分・届出","summary":"貸金業者が暴力団員等を業務に従事させ又は補助者として使用した場合、登録行政庁は登録を取り消さなければならない。事業年度ごとの事業報告書は毎事業年度経過後3か月以内に登録行政庁に提出しなければならない。個人である貸金業者が死亡した場合、相続人はその事実を知った日から30日以内に届出をしなければならない。開始等の届出事項（第三者委託の開始・終了、貸金業協会への加入・脱退等）は該当することとなった日から2週間以内に届け出る。合併により消滅した会社の届出義務者は消滅会社の代表役員であった者である。","cards":[{"s":"貸金業者が暴力団員等を業務に従事させ又は補助者として使用した場合、登録行政庁は登録を取り消さなければならない。","o":true,"why":"貸金業法24条の6の5等に基づく必要的登録取消し事由である。"},{"s":"貸金業者は事業年度ごとに事業報告書を作成し、毎事業年度経過後3か月以内に登録行政庁に提出しなければならない。","o":true,"why":"貸金業法施行規則が定める事業報告書の提出期限である。"},{"s":"個人である貸金業者が死亡した場合、相続人はその事実を知った日から2週間以内に届け出なければならない。","o":false,"why":"相続人による死亡の届出期限は知った日から30日以内である。"},{"s":"貸金業務の第三者委託の開始・終了は、開始等の届出事項として該当することとなった日から2週間以内に届け出る。","o":true,"why":"貸金業法施行規則の開始等の届出事項である。"},{"s":"貸金業協会への加入・脱退は、該当することとなった日から30日以内に届け出れば足りる。","o":false,"why":"貸金業協会への加入・脱退の届出期限は30日以内ではなく2週間以内である。"},{"s":"株式会社Aが合併により消滅した場合、届出義務を負うのは存続会社Bの代表取締役である。","o":false,"why":"届出義務を負うのは消滅会社Aの代表役員であった者である。"},{"s":"破産手続開始の決定があったときは、貸金業者の登録の効力は失われる。","o":true,"why":"貸金業法の規定により破産手続開始決定は登録失効事由となる。"},{"s":"業務改善命令は、法令違反の場合に限り発することができる。","o":false,"why":"業務改善命令は法令違反の場合に限られず、資金需要者等の利益を害する事実がある場合等にも発することができる。"}]},{"topic":"指定信用情報機関","summary":"指定信用情報機関は、他の指定信用情報機関の加入貸金業者からの依頼に基づき情報提供の依頼を受けたときは、正当な理由がある場合を除き提供に応じなければならない（指定信用情報機関間の情報交流義務）。信用情報提供の依頼をする場合、原則としてあらかじめ資金需要者等本人の同意を得る必要があり、同意は書面又は電磁的方法によることが求められる。極度方式基本契約締結時だけでなく、極度方式貸付けを行う都度等、政令・内閣府令で定めるタイミングでの信用情報提供が求められる。全国銀行個人信用情報センターは貸金業法上の指定信用情報機関ではない。","cards":[{"s":"指定信用情報機関は、他の指定信用情報機関の加入貸金業者からの情報提供依頼を受けたときは、正当な理由がある場合を除き提供に応じなければならない。","o":true,"why":"貸金業法上の指定信用情報機関間の情報交流義務である。"},{"s":"全国銀行個人信用情報センターは、貸金業法上の指定信用情報機関である。","o":false,"why":"貸金業法上の指定信用情報機関は主に日本信用情報機構とシー・アイ・シーであり、全国銀行個人信用情報センターは指定を受けていない。"},{"s":"貸金業者が指定信用情報機関に信用情報の提供を依頼する場合、原則としてあらかじめ資金需要者等本人の同意を得る必要がある。","o":true,"why":"個人情報保護の観点から本人同意の取得が原則求められる。"},{"s":"信用情報提供の依頼に係る同意は、口頭のみで取得すれば足りる。","o":false,"why":"同意は書面又は電磁的方法によることが求められ、口頭のみの同意は認められない。"},{"s":"極度方式貸付けについては、極度方式基本契約締結時にのみ信用情報を提供すればよく、その後の個別貸付けの都度の提供は不要である。","o":false,"why":"極度方式貸付けを行う都度等、政令・内閣府令で定めるタイミングでの信用情報提供が求められる。"},{"s":"途上与信で取得した信用情報を勧誘に二次利用する行為は、返済能力調査以外の目的による使用に該当し得る。","o":true,"why":"目的外利用として留意が必要とされている。"},{"s":"信用情報提供の依頼に係る同意の記録の保存期間は、10年間である。","o":false,"why":"同意記録の保存期間は10年間ではなく、契約終了後の一定期間とされている。"}]},{"topic":"利息制限法","summary":"利息制限法の上限利率は元本額に応じて、10万円未満は年20%、10万円以上100万円未満は年18%、100万円以上は年15%である。同一貸主に対する複数契約がある場合は、残存元本と新規貸付けの元本を合算した額を基準に上限利率を判定する。ただし貸主が異なる場合は合算されない。賠償額の予定（遅延損害金を含む）は元本に対する割合が年20%を超える部分について無効となる。上限を超える利息の約定は超過部分に限り無効となる。","cards":[{"s":"利息制限法上、元本額が10万円未満の場合の上限利率は年20%である。","o":true,"why":"利息制限法1条の元本区分に基づく上限利率である。"},{"s":"利息制限法上、元本額が100万円以上の場合の上限利率は年15%である。","o":true,"why":"利息制限法1条の元本区分に基づく上限利率である。"},{"s":"同一の貸主から複数回にわたり貸付けを受けている場合、既存の残存元本と新規貸付けの元本を合算した額を基準に上限利率を判定する。","o":true,"why":"利息制限法5条の複数契約の元本合算の考え方による。"},{"s":"貸主が異なる2つの契約であっても、借主が同一人であれば元本を合算して上限利率を判定する。","o":false,"why":"元本の合算は同一貸主間の複数契約について行われるものであり、貸主が異なる場合は合算されない。"},{"s":"営業的金銭消費貸借における賠償額の予定（遅延損害金を含む）は、元本に対する割合が年20%を超える部分について無効となる。","o":true,"why":"利息制限法4条・7条の賠償額予定の上限規制である。"},{"s":"利息制限法の上限利率を超える利息の約定をした場合、契約全体が無効となる。","o":false,"why":"上限を超える利息の約定は契約全体ではなく超過部分に限り無効となる。"},{"s":"利息制限法上、保証料についても別途の上限利率規制が定められている。","o":true,"why":"利息制限法は保証料についても利息とみなして規制する規定を置いている。"},{"s":"残存元本15万円の契約がある状態で新たに90万円を借り入れる場合、合算元本額105万円を基準に上限利率年15%が適用される。","o":true,"why":"合算元本額が100万円以上となるため上限利率は年15%が適用される。"}]},{"topic":"みなし利息","summary":"契約締結時書面の交付費用やカードの発行費用は原則としてみなし利息に該当する。口座振替の方法による弁済に係る費用（口座振替手数料）も原則としてみなし利息に該当する。現金自動支払機（ATM）等の利用料は、一定の金額の範囲内（1万円以下の場合110円、1万円超の場合220円等）であればみなし利息に含まれない特則がある。公租公課の支払に充てられるべき費用（印紙代等）は利息とみなされない。","cards":[{"s":"契約締結時書面の交付費用は、原則としてみなし利息に該当する。","o":true,"why":"利息制限法6条によりみなし利息に該当する。"},{"s":"カードの発行費用は、原則としてみなし利息に該当しない。","o":false,"why":"カードの発行手数料は原則としてみなし利息に該当する。"},{"s":"口座振替の方法による弁済に係る費用（口座振替手数料）は、原則としてみなし利息に該当しない。","o":false,"why":"口座振替手数料は原則としてみなし利息の対象となる。"},{"s":"現金自動支払機（ATM）等の利用料は、1万円以下の取引につき110円以内であればみなし利息に含まれない。","o":true,"why":"利息制限法施行令が定める特則の金額基準である。"},{"s":"契約書に貼付する印紙代（顧客負担分）は、みなし利息に該当する。","o":false,"why":"公租公課に充てられる費用である印紙代はみなし利息に該当しない。"},{"s":"契約締結時書面の再発行手数料（顧客都合による紛失等の実費相当額）は、みなし利息に該当する。","o":false,"why":"顧客の都合による実費相当のものはみなし利息に該当しないと扱われる。"},{"s":"ATM利用料の特則の金額基準は、1万円超の取引の場合220円以内である。","o":true,"why":"利息制限法施行令が定めるATM利用料の上限額である。"}]},{"topic":"出資法","summary":"出資法上の上限金利は年20%であり、これを超える利息の契約をし、又はこれを超える割合による利息を受領した貸金業者には刑事罰が科される。利息制限法の上限を超えるが出資法の上限（年20%）以下の利息の契約を締結しただけでは直ちに刑事罰の対象とはならない。かつて存在した高金利処罰の特例（年109.5%）は日賦貸金業者等に適用されていたものであり、現在の一般的な上限金利は年20%である。金銭の貸借の媒介手数料の上限も出資法で規制され、元本に対し年5%を超える手数料を受領することは禁止される。","cards":[{"s":"出資法上、貸金業者が金銭の貸付けを行う場合の上限金利は年20%である。","o":true,"why":"出資法5条2項の貸金業者に対する上限金利規制である。"},{"s":"貸金業者が利息制限法の上限を超える利息の契約を締結しただけで、直ちに出資法上の刑事罰の対象となる。","o":false,"why":"出資法上の上限金利（年20%）を超える場合に刑事罰の対象となるのであり、利息制限法超過利息の契約締結だけでは直ちに刑事罰の対象とはならない。"},{"s":"出資法上、金銭の貸借の媒介手数料は元本に対し年5%を超えて受領してはならない。","o":true,"why":"出資法4条の媒介手数料の上限規制である。"},{"s":"元本50万円の貸付けについて年20%の利息を約定した場合、出資法上の上限金利を超え刑事罰の対象となる。","o":false,"why":"年20%は出資法上の上限金利の範囲内であり、これを超えない限り刑事罰の対象とならない。"},{"s":"出資法上、貸金業者でない者どうしの金銭貸借（個人間貸借等）において刑事罰の対象となる上限金利は、年109.5%である。","o":true,"why":"出資法5条1項。貸金業者（業として行う場合）の基準は年20%（同条2項・3項）で、両者の基準は異なる。"},{"s":"出資法違反により罰金刑に処せられた者は、一定期間、貸金業の登録拒否事由に該当し得る。","o":true,"why":"出資法違反の罰金刑は貸金業法上の登録拒否事由となる特定の法令違反に含まれる。"},{"s":"出資法上、貸金業者による貸付けの上限金利（刑事罰の基準）は年109.5%である。","o":false,"why":"貸金業者は年20%超で刑事罰（出資法5条2項）。年109.5%は貸金業者でない者の基準（同条1項）。"}]},{"topic":"禁止行為","summary":"貸金業者は、断定的判断の提供その他不確実な事項について断定的判断を提供して勧誘する行為を禁止される。自殺による死亡を保険事故とする保険契約の締結は原則禁止される。公的年金等の受給者の借入意欲をそそる表示・説明は禁止される。従業者証明書の携帯義務は対面業務に従事する者を主眼とした規定である。特定公正証書作成の嘱託に関する書面交付・説明義務は嘱託の前に行わなければならない。暴力団員等の使用は行政処分及び刑事罰の対象となる重大な禁止行為である。","cards":[{"s":"貸金業者が不確実な事項について断定的判断を提供して勧誘する行為は禁止される。","o":true,"why":"貸金業法16条の禁止行為に該当する。"},{"s":"貸金業者は、貸付けの相手方等の自殺による死亡を保険事故とする保険契約を原則として締結してはならない。","o":true,"why":"貸金業法12条の7等が定める保険契約締結の禁止行為である。"},{"s":"対面することなく行う業務にのみ従事する者についても、一律に従業者証明書を携帯させなければならない。","o":false,"why":"従業者証明書の携帯義務は資金需要者等と対面して業務を行う従業者を主眼とした規定である。"},{"s":"公的年金等の受給者に対し、その受給権を担保として借入れの意欲をそそるような表示・説明をすることは禁止される。","o":true,"why":"広告・勧誘規制上の禁止行為に該当する。"},{"s":"特定公正証書の作成を公証人に嘱託する場合の書面交付・説明義務は、嘱託した後、遅滞なく行えばよい。","o":false,"why":"書面交付・説明は嘱託の前に行うべきものとされている。"},{"s":"貸金業者が暴力団員等をその業務に従事させ、又は業務の補助者として使用した場合、登録行政庁はその登録を取り消さなければならない。","o":true,"why":"貸金業法24条の6の4第1項。裁量ではない必要的取消事由である。"},{"s":"保証人となろうとする者に対し、誤解を招くおそれのある告知をする行為は禁止行為に該当する。","o":true,"why":"貸金業法16条の3等が定める保証人保護のための禁止行為である。"},{"s":"貸金業者が代理人に貸付けの契約の締結を委任させるため、その委任を証する書面を取得することは禁止される。","o":true,"why":"代理人選任への不当な関与を防ぐ禁止行為である。"}]}]},{"category":"貸付け及び貸付けに付随する取引に関する法令及び実務に関すること","topics":[{"topic":"意思表示","summary":"意思表示は相手方への到達時に効力を生じる到達主義が原則である。心裡留保は原則有効だが相手方が悪意・有過失なら無効、虚偽表示は無効だがいずれも善意の第三者には対抗できない。錯誤は重要な錯誤かつ表意者に重過失がないことを要件として取消しができるにとどまる。詐欺による取消しは善意無過失の第三者に対抗できないが、強迫による取消しは第三者の善意悪意を問わず対抗できる点が異なる。相手方への意思表示は、発信後に表意者が死亡・意思能力喪失・行為能力の制限を受けても効力を妨げられない。","cards":[{"s":"意思表示は、その通知が相手方に到達した時からその効力を生ずる。","o":true,"why":"民法97条1項が定める到達主義の原則である。"},{"s":"心裡留保による意思表示は、相手方がその意思表示が表意者の真意ではないことを知っていた場合であっても、常に有効である。","o":false,"why":"民法93条1項ただし書により相手方が悪意又は有過失のときは無効となる。"},{"s":"虚偽表示による意思表示の無効は、善意の第三者に対抗することができない。","o":true,"why":"民法94条2項の規定である。"},{"s":"錯誤による意思表示の取消しは、その錯誤が法律行為の目的及び取引上の社会通念に照らして重要なものであり、かつ表意者に重大な過失がないことを要件とする。","o":true,"why":"民法95条1項・3項の要件である。"},{"s":"詐欺による意思表示の取消しは、善意無過失の第三者に対抗することができない。","o":true,"why":"民法96条3項の規定である。"},{"s":"第三者が相手方に対する意思表示について強迫を行った場合、表意者は相手方が強迫の事実を知っていたときに限り、その意思表示を取り消すことができる。","o":false,"why":"強迫の場合は詐欺と異なり相手方の善意悪意を問わず取り消すことができる（民法96条2項は詐欺のみに適用）。"},{"s":"意思表示は、表意者が通知を発した後に死亡した場合、その効力を生じない。","o":false,"why":"民法97条3項により発信後の死亡等は意思表示の効力を妨げない。"},{"s":"表意者が相手方を知ることができないときは、公示による意思表示をすることができる。","o":true,"why":"民法98条1項の規定である。"}]},{"topic":"意思能力・行為能力","summary":"意思能力を欠く状態でした法律行為は無効であり、制限行為能力者の行為は取消しの対象にとどまる点が異なる。未成年者・成年被後見人・被保佐人・被補助人でそれぞれ保護の範囲と同意権者が異なり、被補助人は特定の行為のみ補助人の同意を要する。制限行為能力者が詐術を用いて能力者であると信じさせた場合は取消権を失う。成年被後見人の日用品購入等の日常生活行為は取消しの対象外である。","cards":[{"s":"意思能力を有しない状態で行った法律行為は、取り消すことができる。","o":false,"why":"民法3条の2により意思無能力者の法律行為は取消しではなく無効である。"},{"s":"成年被後見人が日用品の購入その他日常生活に関する行為を行った場合、後見人の同意を得ていなくても取り消すことができない。","o":true,"why":"民法9条ただし書の規定である。"},{"s":"成年被後見人が後見人の同意を得て法律行為を行った場合、当該行為を取り消すことはできない。","o":false,"why":"民法9条本文により同意の有無を問わず日用品購入等を除き取り消すことができる。"},{"s":"被保佐人が金銭を借り入れるには、保佐人の同意を得なければならない。","o":true,"why":"民法13条1項2号に列挙された行為に該当する。"},{"s":"被補助人は、家庭裁判所の審判で補助人の同意を要するとされた特定の法律行為以外は、単独で有効に行うことができる。","o":true,"why":"民法17条の補助制度は個別に定めた行為にのみ同意権が及ぶ。"},{"s":"未成年者が単に権利を得る法律行為をする場合には、法定代理人の同意を得る必要はない。","o":true,"why":"民法5条1項ただし書の規定である。"},{"s":"未成年者が詐術を用いて自己を成年者であると信じさせて契約を締結した場合、法定代理人であれば当該契約を取り消すことができる。","o":false,"why":"民法21条により詐術を用いた場合は本人・法定代理人いずれも取消権を失う。"},{"s":"営業を許された未成年者は、その許された営業に関する行為については成年者と同一の行為能力を有する。","o":true,"why":"民法6条1項の規定である。"}]},{"topic":"代理","summary":"代理人が本人のためにすることを示さない行為でも、相手方が悪意又は有過失であれば本人に効果が帰属する。代理権消滅後の行為や無権代理は表見代理・相手方の催告権や取消権の問題となり、善意の相手方は本人が追認するまで契約を取り消すことができる。双方代理・自己契約は原則として無権代理行為とみなされる。復代理人の選任は委任による代理人は本人の許諾又はやむを得ない事由がある場合に限られる。","cards":[{"s":"代理人が本人のためにすることを示さずにした意思表示は、相手方がそのことを知っていたときであっても、当然に本人に対して効力を生じない。","o":false,"why":"民法100条ただし書により相手方が悪意又は有過失なら本人に直接効力を生ずる。"},{"s":"無権代理行為の相手方が代理権のないことを知らなかったときは、本人が追認をしない間、その契約を取り消すことができる。","o":true,"why":"民法115条の相手方の取消権である。"},{"s":"自己契約及び双方代理は、本人があらかじめ許諾した行為を除き、原則として無権代理行為とみなされる。","o":true,"why":"民法108条1項の規定である。"},{"s":"委任による代理人は、本人の許諾を得なくても、いつでも自由に復代理人を選任することができる。","o":false,"why":"民法104条により本人の許諾又はやむを得ない事由が必要である。"},{"s":"法定代理人は、自己の責任で復代理人を選任することができ、やむを得ない事由がある場合は選任及び監督についてのみ責任を負う。","o":true,"why":"民法105条の規定である。"},{"s":"代理権消滅後にされた元代理人の行為について、相手方に過失があった場合でも表見代理が成立し本人に効果が帰属する。","o":false,"why":"民法112条は相手方が善意無過失であることを要件とする。"},{"s":"無権代理人が本人を単独で相続した場合、無権代理行為は当然に有効になるとするのが判例である。","o":true,"why":"無権代理人が本人の地位を単独相続した場合、信義則上追認拒絶できず有効となるとするのが判例の立場である。"},{"s":"代理権授与の表示による表見代理は、相手方が代理権の不存在について悪意又は有過失であっても成立する。","o":false,"why":"民法109条1項ただし書により相手方の善意無過失を要する。"}]},{"topic":"無効・取消し","summary":"無効は初めから効力を生じず追認しても遡って有効にはならないが、取消しは取消しの意思表示により行為の時に遡って無効となる。制限行為能力者や意思無能力者は現存利益の限度で返還義務を負う。取消権は追認可能時から5年、行為時から20年で時効消滅する。詐欺・強迫による取消しの追認は取消原因の消滅後かつ取消権を有すると知った後にしなければ効力を生じない。","cards":[{"s":"取り消された法律行為は、初めから無効であったものとみなされる。","o":true,"why":"民法121条の遡及効の規定である。"},{"s":"無効な法律行為を追認したときは、その行為は行為の時に遡って有効となる。","o":false,"why":"民法119条により無効行為の追認は遡及せず、新たな行為をしたものとみなされる。"},{"s":"取消権は、追認をすることができる時から5年間行使しないときは、時効によって消滅する。","o":true,"why":"民法126条前段の規定である。"},{"s":"取消権は、行為の時から20年を経過したときは、消滅する。","o":true,"why":"民法126条後段の規定である。"},{"s":"意思無能力者が取り消された行為に基づく給付を受けていた場合、現に利益を受けている限度で返還すれば足りる。","o":true,"why":"民法121条の2第3項が意思無能力者・制限行為能力者について現存利益の返還にとどめている。"},{"s":"無効な行為に基づく給付を受けた者が給付の時に無効であることを知っていたときは、受けた利益に利息を付して返還し、損害があれば賠償する義務を負う。","o":true,"why":"民法121条の2第1項・第704条相当の悪意受益者の返還義務である。"},{"s":"詐欺による意思表示の取消しの追認は、取消しの原因となっていた状況が消滅する前であっても、取消権を有することを知っていればすることができる。","o":false,"why":"民法124条1項は取消原因消滅後かつ取消権を知った後の追認を要求する。"},{"s":"制限行為能力者は、単独で自ら行った法律行為を取り消すことができる。","o":true,"why":"民法120条1項は取消しについては単独ですることができると定める。"}]},{"topic":"時効","summary":"債権の消滅時効は権利行使できることを知った時から5年、行使できる時から10年のいずれか早い方の経過で完成する。時効の効果は起算日に遡って生じ、援用がなければ裁判所は職権で考慮できない。承認は時効の更新事由となり新たに進行を始める。時効の完成猶予・更新の効力は原則として当事者間のみに相対的に生じるが、保証人には主債務の時効の効力が及ぶ。時効利益はあらかじめ放棄することができない。","cards":[{"s":"債権は、債権者が権利を行使することができることを知った時から5年間行使しないときは、時効によって消滅する。","o":true,"why":"民法166条1項1号の主観的起算点からの時効期間である。"},{"s":"債権は、権利を行使することができる時から10年間行使しないときは、時効によって消滅する。","o":true,"why":"民法166条1項2号の客観的起算点からの時効期間である。"},{"s":"消滅時効は、当事者の援用がなくても裁判所が職権でその完成を考慮することができる。","o":false,"why":"民法145条は当事者の援用を要件とする。"},{"s":"消滅時効の効果は、援用の時からその効力を生ずる。","o":false,"why":"時効の効果は起算日に遡って生ずる（遡及効、民法144条）。"},{"s":"保証人は、主たる債務の消滅時効を援用することができる。","o":true,"why":"民法145条かっこ書により保証人は時効の援用権者に含まれる。"},{"s":"消滅時効の完成前に、あらかじめ時効の利益を放棄する旨の合意をすることはできない。","o":true,"why":"民法146条により時効の利益の事前放棄は認められない。"},{"s":"債務者が時効完成の事実を知らずに債務を承認した場合、当該承認は時効の更新事由とはならない。","o":false,"why":"承認による更新は時効完成の認識の有無を問わず生じ、その後の時効完成主張は信義則上制限される。"},{"s":"確定判決によって確定した権利については、本来の時効期間が10年より短いものであっても、その時効期間は10年とされる。","o":true,"why":"民法169条1項の規定である。"}]},{"topic":"期限・期間","summary":"期間の初日は原則として算入しない初日不算入の原則があるが、午前零時から始まるときは算入する。週・月・年で定めた期間は起算日に応当する日の前日に満了し、応当日のない場合は月の末日に満了する。期限の利益は債務者のために定めたものと推定され、担保の滅失・損傷や破産手続開始決定を受けたときは主張できなくなる。期限の利益喪失は単なる利息延滞のみでは当然に生じず、特約が必要である。","cards":[{"s":"日、週、月又は年によって期間を定めたときは、その期間の初日は算入しない。","o":true,"why":"民法140条本文の初日不算入の原則である。"},{"s":"期間が午前零時から始まるときであっても、初日は算入されない。","o":false,"why":"民法140条ただし書により午前零時から始まる場合は初日を算入する。"},{"s":"週、月又は年によって期間を定めた場合、その期間は起算日に応当する日の前日に満了する。","o":true,"why":"民法143条2項本文の規定である。"},{"s":"月によって期間を定めた場合において、最後の月に応当する日がないときは、その月の末日に満了する。","o":true,"why":"民法143条2項ただし書の規定である。"},{"s":"債務者が担保を滅失させ、損傷させ、又は減少させたときは、債務者は期限の利益を主張することができない。","o":true,"why":"民法137条2号の期限の利益喪失事由である。"},{"s":"債務者が破産手続開始の決定を受けたときは、当然に期限の利益を主張することができなくなる。","o":true,"why":"民法137条1号の期限の利益喪失事由である。"},{"s":"債務者が利息の支払を1回でも怠ったときは、特約がなくても当然に期限の利益を喪失する。","o":false,"why":"民法137条には利息延滞のみを喪失事由とする定めはなく、当然喪失させるには期限の利益喪失特約が必要である。"},{"s":"期限の利益は債務者のために定めたものと推定され、債務者はその利益を放棄して期限前に弁済することができる。","o":true,"why":"民法136条の規定である。"}]},{"topic":"抵当権・根抵当権","summary":"抵当権は被担保債権の移転に伴い当然に移転する随伴性を持つが、根抵当権は元本確定前は随伴性がなく、譲り受けた債権について根抵当権を行使できない。抵当権の利息・遅延損害金は後順位権利者がいる場合に満期後2年分に制限されるが、根抵当権は極度額の範囲内で元本・利息等の全部について行使できる点が異なる。根抵当権は担保すべき債権の範囲を定めなければならず、元本確定期日の定めがない場合、設定者は設定から3年経過後に元本確定を請求できる。抵当権者は物上代位により賃料債権等を差し押さえることができる。","cards":[{"s":"抵当権の被担保債権が第三者に譲渡された場合、特約がなくても被担保債権の移転に伴い抵当権も当然に移転する。","o":true,"why":"抵当権の随伴性による（民法369条以下、判例通説）。"},{"s":"元本確定前に根抵当権の被担保債権を譲り受けた者は、その債権について根抵当権を行使することができる。","o":false,"why":"民法398条の7第1項により元本確定前の根抵当権には随伴性がなく行使できない。"},{"s":"根抵当権は、担保すべき不特定の債権をその範囲を定めることなく担保することができる。","o":false,"why":"民法398条の2第1項により担保すべき債権の範囲を定めなければならない。"},{"s":"元本確定期日の定めがない根抵当権について、根抵当権設定者は根抵当権設定の時から3年を経過したときは元本の確定を請求することができる。","o":true,"why":"民法398条の19第1項の規定である。"},{"s":"確定した元本のほか利息その他の定期金について根抵当権を行使できるのは、最後の2年分に限られる。","o":false,"why":"民法398条の3第1項により根抵当権は極度額の範囲内で全部について行使でき、抵当権の民法375条のような制限はない。"},{"s":"抵当権者は、抵当不動産の賃借人が有する賃料債権について、物上代位によりこれを差し押さえて優先弁済を受けることができる。","o":true,"why":"民法372条による304条準用の物上代位の規定である。"},{"s":"抵当不動産の後順位抵当権者がいる場合、抵当権者が利息その他の定期金を請求できるのは、満期となった最後の2年分に限られる。","o":true,"why":"民法375条1項の規定である。"},{"s":"根抵当権の極度額の変更は、利害関係を有する者の承諾を得なくてもすることができる。","o":false,"why":"民法398条の5により極度額の変更には利害関係人の承諾を要する。"}]},{"topic":"保証・連帯保証","summary":"保証契約は書面又は電磁的記録によらなければ効力を生じない。連帯保証人には催告の抗弁権・検索の抗弁権及び分別の利益がなく、通常保証人にはこれらが認められる点が最大の相違である。主債務者について生じた事由（時効の完成猶予・更新など）は保証人・連帯保証人いずれにも及ぶが、連帯保証人について生じた事由は原則として主債務者に効力を及ぼさない（相対効）。主債務が保証契約締結後に加重されても保証人の負担は加重されない。","cards":[{"s":"保証契約は、書面でしなければその効力を生じない。","o":true,"why":"民法446条2項の要式行為の規定である。"},{"s":"連帯保証人は、債権者から履行の請求を受けたとき、まず主たる債務者に催告すべき旨を請求することができる。","o":false,"why":"民法454条により連帯保証人には催告の抗弁権がない。"},{"s":"通常の保証人は、債権者に対し催告の抗弁権及び検索の抗弁権を有する。","o":true,"why":"民法452条・453条の規定である。"},{"s":"数人の連帯保証人がいる場合、各連帯保証人は自己の負担部分についてのみ保証債務を負う分別の利益を有する。","o":false,"why":"連帯保証人には分別の利益がなく、各自が全額について保証債務を負う。"},{"s":"主たる債務者に対する履行の請求による時効の完成猶予は、保証人に対してもその効力を生ずる。","o":true,"why":"民法457条1項の付従性の規定である。"},{"s":"連帯保証人に対する履行の請求による時効の完成猶予及び更新は、原則として主たる債務者に対してその効力を生じない。","o":true,"why":"民法458条による441条準用の相対効の原則である。"},{"s":"主たる債務の内容が保証契約締結後に加重された場合、保証人の負担も当然に加重される。","o":false,"why":"民法448条2項により主債務が加重されても保証人の負担は加重されない。"},{"s":"保証人は、主たる債務者が有する相殺権を根拠として、債権者に対する履行を拒むことができる。","o":true,"why":"民法457条3項の履行拒絶権の規定である。"}]},{"topic":"債権の効力","summary":"金銭債務の不履行による損害賠償は、原則として法定利率によるが約定利率が法定利率を超えるときは約定利率による。金銭債務の不履行は不可抗力をもって抗弁とすることができず、損害の証明も不要である。債務不履行に関し債権者に過失があれば過失相殺により責任・額が定められる。債権者代位権の対象から一身専属権は除外され、詐害行為取消権は必ず裁判上（訴えにより）行使しなければならない。損害賠償として物の価額全部の支払をしたときは当然に債権者に代位する（賠償者代位）。","cards":[{"s":"金銭債務の不履行による損害賠償の額は、原則として法定利率によって定めるが、約定利率が法定利率を超えるときは約定利率による。","o":true,"why":"民法419条1項の規定である。"},{"s":"金銭債務の不履行については、債務者は不可抗力をもって抗弁とすることができる。","o":false,"why":"民法419条3項は不可抗力の抗弁を認めない。"},{"s":"金銭債務の不履行による損害賠償の請求において、債権者は損害の発生及びその額を証明しなければならない。","o":false,"why":"民法419条2項により損害の証明は不要である。"},{"s":"債務不履行又はこれによる損害の発生・拡大について債権者に過失があったときは、裁判所はこれを考慮して損害賠償の責任及びその額を定める。","o":true,"why":"民法418条の過失相殺の規定である。"},{"s":"損害賠償として物又は権利の価額の全部を支払った者は、債権者の承諾を得なければ、その物又は権利について債権者に代位することができない。","o":false,"why":"民法422条により当然に債権者に代位し、承諾は不要である。"},{"s":"債権者代位権の対象となる権利には、一身専属権も含まれる。","o":false,"why":"民法423条1項ただし書により一身専属権は代位の対象から除外される。"},{"s":"詐害行為取消権は、裁判外の意思表示によって行使することができる。","o":false,"why":"民法424条1項により詐害行為取消権は必ず裁判上（訴え）で行使しなければならない。"},{"s":"特定物の引渡しを目的とする債権の債務者は、引渡しをするまで善良な管理者の注意をもってその物を保存しなければならない。","o":true,"why":"民法400条の善管注意義務の規定である。"}]},{"topic":"債権譲渡","summary":"債権譲渡は譲渡人から債務者への通知又は債務者の承諾がなければ債務者その他の第三者に対抗できない。第三者対抗要件は確定日付のある証書による通知又は承諾であり、複数譲受人間の優劣は確定日付の先後ではなく確定日付のある通知の債務者への到達（又は承諾）の先後で決する。譲渡制限特約付き債権も譲渡自体は有効であり、悪意・重過失の譲受人には債務者が履行拒絶等を対抗できるにとどまる。","cards":[{"s":"債権の譲渡は、譲渡人が債務者に通知をし、又は債務者が承諾をしなければ、債務者その他の第三者に対抗することができない。","o":true,"why":"民法467条1項の対抗要件の規定である。"},{"s":"債権が二重に譲渡された場合、両方の譲受人への通知がいずれも確定日付のある証書によるものであるときは、通知の日付の先後によって優劣が決せられる。","o":false,"why":"判例上、確定日付の先後ではなく確定日付のある通知が債務者に到達した日時の先後で優劣を決する。"},{"s":"確定日付のある証書による通知が先に債務者に到達した譲受人は、後に確定日付のある証書による通知が到達した譲受人に優先する。","o":true,"why":"到達時到達主義に基づく判例の立場である。"},{"s":"確定日付のない証書による承諾をした後に、別の譲受人への確定日付のある証書による通知が債務者に到達した場合、先に承諾を得た譲受人が優先する。","o":false,"why":"確定日付のある通知を備えた譲受人が優先し、確定日付のない承諾のみの譲受人は対抗要件を欠く。"},{"s":"当事者が譲渡制限の意思表示をした債権について譲渡がされた場合、譲渡自体は有効である。","o":true,"why":"民法466条2項により譲渡制限特約があっても債権譲渡の効力は妨げられない。"},{"s":"譲渡制限の意思表示がされた債権を譲り受けた者が、その意思表示につき悪意又は重過失であった場合、債務者は当該譲受人への履行を拒むことができる。","o":true,"why":"民法466条3項の規定である。"},{"s":"債権譲渡の対抗要件具備が差押債権者への送達より先であれば、譲受人は差押債権者に優先する。","o":true,"why":"対抗要件の具備の先後により優劣が決せられる一般原則による。"},{"s":"将来発生する債権についても、譲渡の対象とすることができる。","o":true,"why":"民法466条の6第1項により将来債権譲渡が明文で認められている。"}]},{"topic":"弁済","summary":"受領権者としての外観を有する者への弁済は、弁済者が善意かつ無過失の場合に限り有効となる。弁済の充当は当事者間に合意がない場合、費用・利息・元本の順に充当される法定充当が適用される。利害関係を有する第三者は債務者の意思に反しても弁済できる場合がある一方、利害関係を有しない第三者は債務者の意思に反して弁済することができない。差押えを受けた債権の第三債務者が自己の債権者に弁済した場合、差押債権者は損害の限度で第三債務者に対し再度の履行を請求できる。","cards":[{"s":"受領権者としての外観を有する者に対してした弁済は、弁済者が善意であれば過失の有無を問わず有効である。","o":false,"why":"民法478条は弁済者が善意かつ無過失であることを要件とする。"},{"s":"弁済として数個の給付をすべき場合において、当事者間に充当の合意がないときは、費用、利息、元本の順に充当する。","o":true,"why":"民法489条1項・491条の法定充当の順序である。"},{"s":"弁済をするについて正当な利益を有する第三者は、債務者の意思に反しても弁済をすることができる。","o":true,"why":"民法474条2項ただし書の反対解釈であり、抵当不動産の第三取得者等が該当する。"},{"s":"弁済をするについて正当な利益を有しない第三者は、債務者の意思に反しても常に弁済をすることができる。","o":false,"why":"民法474条2項本文により、正当な利益を有しない第三者は債務者の意思に反して弁済できない。"},{"s":"差押えを受けた債権の第三債務者が自己の債権者（差押債務者）に弁済したときは、差押債権者は損害の限度でその弁済の効力を否定し再度の履行を請求できる。","o":true,"why":"民法481条1項の規定である。"},{"s":"債務者が第三者に弁済した場合、その弁済が受領権者以外の者に対する弁済であっても、債権者がこれによって利益を受けた限度で効力を有する。","o":true,"why":"民法479条の規定である。"},{"s":"口座振込みによる弁済は、債権者が受領書を請求した場合であっても振込通知の到達をもって弁済の効力を生じ、受取証書の交付は不要である。","o":false,"why":"受領権者からの請求があった場合、貸金業実務上も受取証書交付義務が生じ得る取扱いであり、交付を一律不要とはできない。"},{"s":"弁済の提供は、原則として債務の本旨に従って現実にしなければならない。","o":true,"why":"民法493条本文の現実の提供の原則である。"}]},{"topic":"相殺","summary":"相殺は当事者双方の債権が相殺適状にある場合に一方的意思表示により行うことができ、条件又は期限を付することはできない。相殺の効力は相殺適状が生じた時に遡って生じる。時効消滅した債権であっても消滅以前に相殺適状にあった場合は自働債権として相殺できる。悪意による不法行為に基づく損害賠償債権等は受働債権とする相殺が禁止される。相殺禁止の特約は、第三者がこれを知り又は重大な過失によって知らなかったときに限り対抗できる。","cards":[{"s":"相殺の意思表示には、条件又は期限を付することができる。","o":false,"why":"民法506条1項後段により条件・期限を付すことはできない。"},{"s":"相殺の意思表示は、双方の債権が互いに相殺に適するようになった時に遡ってその効力を生ずる。","o":true,"why":"民法506条2項の遡及効の規定である。"},{"s":"時効によって消滅した債権は、その消滅以前に相殺適状にあった場合であっても、自働債権として相殺をすることはできない。","o":false,"why":"民法508条により消滅前に相殺適状にあれば時効消滅後も相殺できる。"},{"s":"悪意による不法行為に基づく損害賠償の債務者は、当該債務を受働債権として相殺をすることをもって債権者に対抗することができない。","o":true,"why":"民法509条1号の相殺禁止の規定である。"},{"s":"当事者が相殺を禁止し又は制限する旨の意思表示をした場合、当該意思表示は、第三者がこれを知り又は重大な過失によって知らなかったときに限り、その第三者に対抗することができる。","o":true,"why":"民法505条2項の規定である。"},{"s":"受働債権が差押えを受けた後に取得した債権を自働債権として、差押債権者に相殺を対抗することができる。","o":false,"why":"民法511条1項により差押え後に取得した債権を自働債権とする相殺は原則として対抗できない。"},{"s":"支払期限の定めがある自働債権について、その期限が未到来であっても常に相殺をすることができる。","o":false,"why":"相殺には自働債権の弁済期が到来していることを要するのが原則である（受働債権は期限の利益放棄により到来前でも可）。"},{"s":"差押え前に取得していた債権を自働債権として、差押え後に相殺をもって差押債権者に対抗することができる。","o":true,"why":"民法511条1項本文により差押え前取得債権を自働債権とする相殺は対抗できる。"}]},{"topic":"相続","summary":"被相続人の一身専属権は相続財産に承継されないが、金銭債権のような可分債権・可分債務は相続開始と同時に法定相続分に応じて当然に分割される。配偶者と子が相続人となる場合の法定相続分は各2分の1、配偶者と直系尊属の場合は配偶者3分の2・直系尊属3分の1である。限定承認は共同相続人全員が共同してのみ行うことができる。相続の放棄は家庭裁判所への申述によって効力を生じ、放棄した者の子には代襲相続が生じない。相続人のあることが明らかでないときは相続財産は法人とされる。","cards":[{"s":"被相続人の一身に専属したものは、相続財産に承継されない。","o":true,"why":"民法896条ただし書の規定である。"},{"s":"配偶者と子が相続人であるときの法定相続分は、配偶者2分の1、子（全員で）2分の1である。","o":true,"why":"民法900条1号の規定である。"},{"s":"配偶者と直系尊属が相続人であるときの法定相続分は、配偶者2分の1、直系尊属2分の1である。","o":false,"why":"民法900条2号により配偶者3分の2、直系尊属3分の1である。"},{"s":"金銭債務のような可分債務は、遺産分割を経なければ各共同相続人に承継されない。","o":false,"why":"可分債務は相続開始と同時に法定相続分に応じて当然に分割され、遺産分割の対象とならないのが原則である。"},{"s":"限定承認は、共同相続人の一人が単独ですることができる。","o":false,"why":"民法923条により限定承認は共同相続人全員が共同してのみすることができる。"},{"s":"相続の放棄は、家庭裁判所への申述によってその効力を生ずる。","o":true,"why":"民法938条の規定である。"},{"s":"相続を放棄した者の子は、その者を代襲して相続人となる。","o":false,"why":"民法887条2項は死亡・欠格・廃除の場合の代襲を定め、相続放棄の場合には代襲相続は生じない。"},{"s":"相続人のあることが明らかでないときは、相続財産は法人とされる。","o":true,"why":"民法951条の規定である。"}]},{"topic":"契約・債務不履行","summary":"書面でする消費貸借は諾成契約として成立し、借主は金銭を受け取るまで契約を解除できる。金銭消費貸借は特約がなければ無利息であり、利息を請求するには特約を要する。定型約款は不特定多数を相手方とする取引で内容が画一的であることが双方に合理的なものであり、表示等の要件を満たせば個別条項を認識していなくても合意をしたものとみなされる。定型約款準備者は相手方から請求があった場合に遅滞なく相当な方法で内容を示せば足りる。","cards":[{"s":"書面でする消費貸借契約は、借主が金銭を受け取るまでは、借主から契約を解除することができる。","o":true,"why":"民法587条の2第2項の諾成的消費貸借の規定である。"},{"s":"利息の約定をしていない金銭消費貸借契約であっても、貸主は法定利息を当然に請求することができる。","o":false,"why":"民法589条1項により利息を請求するには特約が必要であり、原則無利息である。"},{"s":"返還時期の定めのない消費貸借において、貸主は相当の期間を定めて返還の催告をすることができる。","o":true,"why":"民法591条1項の規定である。"},{"s":"定型取引とは、特定の者が不特定多数の者を相手方として行う取引であって、その内容の全部又は一部が画一的であることが双方にとって合理的なものをいう。","o":true,"why":"民法548条の2第1項の定義である。"},{"s":"定型約款を契約内容とする旨の表示等の要件を満たせば、相手方が個別の条項の内容を認識していなくても、原則として合意をしたものとみなされる。","o":true,"why":"民法548条の2第1項の「みなし合意」の規定である。"},{"s":"定型約款準備者は、定型取引合意の前後を問わず、相手方から請求がなくても必ずその内容を示さなければならない。","o":false,"why":"民法548条の3第1項により相手方から請求があった場合に遅滞なく示せば足りる。"},{"s":"定型約款の変更が相手方の一般の利益に適合する場合は、個別に相手方と合意をしなくても契約内容を変更することができる。","o":true,"why":"民法548条の4第1項1号の規定である。"},{"s":"相手方に不利な定型約款の変更は、契約目的に反せず変更の必要性・相当性等に照らして合理的なものであっても、個別の合意なしに行うことはできない。","o":false,"why":"民法548条の4第1項2号により合理性等の要件を満たせば個別合意なく変更できる。"}]},{"topic":"破産法","summary":"破産債権とは破産手続開始前の原因に基づいて生じた財産上の請求権をいう。別除権は破産手続によらないで行使することができる担保権等である。破産者が破産手続開始後に破産財団に属する財産についてした法律行為は、破産手続の関係でその効力を主張することができない。破産債権者が破産手続開始後に破産財団に対して債務を負担した場合は、原則として相殺が禁止される。","cards":[{"s":"破産債権とは、破産者に対し破産手続開始前の原因に基づいて生じた財産上の請求権をいう。","o":true,"why":"破産法2条5項の定義である。"},{"s":"別除権は、破産手続によらなければ行使することができない権利である。","o":false,"why":"破産法2条9項により別除権は破産手続によらないで行使することができる。"},{"s":"破産者が破産手続開始後に破産財団に属する財産に関してした法律行為は、破産手続の関係においてその効力を主張することができない。","o":true,"why":"破産法47条1項の規定である。"},{"s":"破産債権者が破産手続開始後に破産財団に対して債務を負担した場合、原則として相殺をすることができる。","o":false,"why":"破産法71条1項1号により原則として相殺が禁止される。"},{"s":"破産手続開始の決定があった場合、破産者の財産の管理処分権は破産管財人に専属する。","o":true,"why":"破産法78条1項の規定である。"},{"s":"抵当権のような別除権を有する者は、その被担保債権額の全額について破産手続に参加し配当を受けることができる。","o":false,"why":"別除権者は別除権の行使によって弁済を受けられない不足額についてのみ破産債権者として権利を行使できる（不足額責任主義）。"},{"s":"破産手続開始の申立て後、破産手続開始の決定前にされた債務者の財産処分行為は、常に否認の対象となる。","o":false,"why":"否認権の対象は破産法160条以下の要件（詐害行為・偏頗行為の要件等）を満たす場合に限られ、一
